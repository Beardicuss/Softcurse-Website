<style>
:root{--bg:#060609;--bg2:#0a0a10;--bg3:#0e0e18;--panel:#0b0b14;--border:#1a1a2a;--border2:#232335;--text:#b8b0a0;--text-dim:#5a5248;--text-muted:#312c28;--pov-p:#6b0000;--pov-s:#9b1111;--pov-glow:rgba(107,0,0,0.14);--pov-t:#dcc0c0;--pov-d:rgba(155,17,17,0.38);--ff-display:'Cinzel','Palatino Linotype',serif;--ff-body:'Crimson Text','Georgia',serif;--ff-mono:'Share Tech Mono','Courier New',monospace;}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}

#lang-bar{position:fixed;top:16px;right:20px;z-index:200;display:flex;}
.lang-btn{font-family:var(--ff-mono);font-size:11px;letter-spacing:.25em;padding:7px 15px;background:var(--bg2);border:1px solid var(--border2);color:var(--text-muted);cursor:pointer;transition:all .25s;text-transform:uppercase;}
.lang-btn:first-child{border-right:none;}
.lang-btn.active{color:var(--pov-s);border-color:var(--pov-p);background:var(--bg3);}
.lang-btn:hover:not(.active){color:var(--text-dim);}
#site-header{padding:56px 0 36px;text-align:center;}
.header-ornament{font-family:var(--ff-mono);font-size:12px;letter-spacing:.4em;color:var(--pov-s);text-transform:uppercase;margin-bottom:14px;opacity:.7;transition:color .8s;}
.header-title{font-family:var(--ff-display);font-size:clamp(22px,4vw,32px);font-weight:400;letter-spacing:.12em;text-transform:uppercase;color:var(--text);margin-bottom:6px;line-height:1.3;}

.scene-loc{font-family:var(--ff-mono);font-size:11px;color:var(--text-dim);letter-spacing:.14em;text-transform:uppercase;}

.scene-flag.expand_later{border-color:#102e10;color:#206a20;}

.scene-flag.revelation{border-color:#202e10;color:#4a6a20;}

.pov-btn.active{color:var(--pov-t);border-color:var(--pov-p);background:var(--pov-glow);}

.dist-bars{display:flex;gap:3px;}

.dist-bar.on{background:var(--pov-p);}
.dist-bar.hi{background:#7a1010;}
.dist-bar.ex{background:#bb0000;animation:barpulse 1.8s infinite;}
@keyframes barpulse{0%,100%{opacity:1;}50%{opacity:.3;}}
#narrative-text{font-size:20px;line-height:1.9;color:var(--pov-t);transition:color .7s,opacity .3s;position:relative;z-index:1;}
#narrative-text p{margin-bottom:1.3em;}
#narrative-text p:last-child{margin-bottom:0;}
.d3,.d4,.d5{animation:flicker-soft 14s infinite;}
.d6,.d7{animation:flicker-mid 7s infinite;}
.d8,.d9{animation:flicker-hard 4s infinite,glitch-mid 16s infinite;}
.d10{animation:flicker-hard 2s infinite,glitch-hard 8s infinite;filter:blur(.4px);}
@keyframes flicker-soft{0%,94%,100%{opacity:1;}96%{opacity:.88;}}
@keyframes flicker-mid{0%,88%,100%{opacity:1;}90%{opacity:.75;}92%{opacity:.9;}93%{opacity:.68;}94%{opacity:1;}}
@keyframes flicker-hard{0%,80%,100%{opacity:1;}82%{opacity:.6;}83%{opacity:.9;}84%{opacity:.55;}85%{opacity:.85;}86%{opacity:.7;}87%{opacity:1;}}
@keyframes glitch-mid{0%,92%,100%{transform:none;filter:none;}93%{transform:translate(-3px,0);filter:drop-shadow(3px 0 rgba(255,0,0,.3));}94%{transform:translate(3px,0);filter:drop-shadow(-3px 0 rgba(0,100,255,.2));}95%{transform:translate(-1px,1px);}96%{transform:none;}}
@keyframes glitch-hard{0%,88%,100%{transform:none;filter:none;}89%{transform:translate(-4px,0) skewX(-1deg);filter:drop-shadow(4px 0 rgba(255,0,0,.4)) saturate(2);}90%{transform:translate(4px,-1px) skewX(1deg);filter:drop-shadow(-4px 0 rgba(0,150,255,.3));}91%{transform:translate(-2px,2px);filter:brightness(.7);}92%{transform:translate(1px,-1px);}93%{transform:none;filter:none;}}
#whisper-panel{background:var(--bg2);border:1px solid var(--border);border-top:none;border-left:3px solid var(--pov-p);padding:15px 40px 17px;margin-bottom:12px;opacity:0;transform:translateY(-2px);transition:opacity 1.6s,transform 1.2s,border-left-color .7s;pointer-events:none;}

#intel-panel{background:var(--bg3);border:1px solid var(--border);margin-bottom:32px;}

.intel-section.knows .intel-section-head{color:#3a5a3a;}
.intel-section.misunderstands .intel-section-head{color:#5a5a20;}
.intel-section.hides .intel-section-head{color:#5a2020;}
.intel-list{list-style:none;display:flex;flex-direction:column;gap:5px;}
.intel-list li{font-family:var(--ff-mono);font-size:13px;line-height:1.65;padding-left:20px;position:relative;}
.intel-list li::before{content:'—';position:absolute;left:0;color:var(--text-muted);}
.intel-section.knows .intel-list li{color:#5a8a5a;}
.intel-section.misunderstands .intel-list li{color:#8a8a3a;}
.intel-section.hides .intel-list li{color:#8a4040;}
#scene-nav{display:flex;align-items:center;justify-content:space-between;padding:22px 0;border-top:1px solid var(--border);}
.nav-btn{font-family:var(--ff-mono);font-size:13px;letter-spacing:.22em;text-transform:uppercase;padding:11px 24px;background:transparent;border:1px solid var(--border2);color:var(--text-dim);cursor:pointer;transition:all .3s;}

.nav-btn:disabled{opacity:.18;cursor:not-allowed;}

.scene-dot.active{background:var(--pov-s);border-color:var(--pov-p);transform:scale(1.25);}

.ledger-warning{font-family:var(--ff-mono);font-size:10px;letter-spacing:.15em;color:#380008;}
.ledger-body{background:#060003;border:1px solid #1a0008;padding:22px;}

#ledger-trigger{position:fixed;bottom:24px;right:24px;z-index:100;background:#06000a;border:1px solid #1a001a;color:#2a0028;font-family:var(--ff-mono);font-size:11px;letter-spacing:.3em;text-transform:uppercase;padding:9px 18px;cursor:pointer;transition:all .5s;}
#ledger-trigger:hover{color:#8a0080;border-color:#4a003a;box-shadow:0 0 22px rgba(140,0,110,.18);background:#0c0010;}

.fade-out{opacity:0 !important;transition:opacity .25s ease !important;}

@media(max-width:640px){#app{padding:0 16px 100px;}#narrative-panel{padding:24px 18px;}#whisper-panel{padding:12px 18px 14px;}.pov-ident{flex-wrap:wrap;}.dist-meter{margin-left:0;margin-top:8px;}.scene-time{margin-left:0;}#lang-bar{top:10px;right:10px;}#narrative-text{font-size:18px;}}
</style>

const TIMELINE=[
  {id:"TET-37",en:"The Breach beneath the Iron Peak is real and has been open for thirteen months. Baron Caldor discovered it before any Church or Guild intelligence was aware of it. His conversion of living persons into iron-flesh constructs is directly and accurately described as load-bearing architecture: the Void-infused metal-and-pain constructs are the only material his research identified as capable of withstanding the Breach's erosive field at close range. His account to Dante of the mechanism is structurally accurate.",ru:"Брешь под Железным Пиком реальна и открыта тринадцать месяцев. Барон Кальдор обнаружил её прежде, чем об этом узнала церковная или гильдейская разведка. Его превращение живых людей в конструкты из железа и плоти точно описано как несущая архитектура: конструкты из металла и боли, пропитанные Пустотой, — единственный материал, который его исследования определили как способный выдержать эрозийное поле Бреши на близком расстоянии. Его рассказ Данте о механизме структурно точен."},
  {id:"TET-38",en:"Baron Caldor is not possessed. The Void entity in the crystal shard that Morius showed Dante was a fragment of the Breach's own ambient field that crystallized under pressure — a geological phenomenon, not a inhabiting intelligence. Caldor contacted the Breach site deliberately, studied it, and designed his own solution. The 'entity' Morius described was the Breach radiating through Caldor's work. There is no separate intelligence directing the Baron. The Baron is the intelligence.",ru:"Барон Кальдор не одержим. Пустотная сущность в осколке кристалла, который Мориус показал Данте, была фрагментом собственного окружающего поля Бреши, кристаллизовавшегося под давлением — геологическим явлением, а не обитающим разумом. Кальдор намеренно установил контакт с местом Бреши, изучил его и разработал собственное решение. «Сущность», которую описал Мориус, — это Брешь, излучающаяся через работу Кальдора. Никакого отдельного разума, направляющего Барона, нет. Барон и есть разум."},
  {id:"TET-39",en:"Cardinal Morius knew the Breach existed. Church cartographers mapped an anomaly at the Iron Peak site eleven years ago. The file was reclassified and suppressed. Morius's briefing to Dante described Caldor as 'possessed by something older than demons' because the alternative — admitting the Church had suppressed knowledge of an active Void breach for a decade — was institutionally untenable. Dante was sent to solve a problem Morius had spent ten years not solving.",ru:"Кардинал Мориус знал о существовании Бреши. Церковные картографы нанесли на карту аномалию на месте Железного Пика одиннадцать лет назад. Файл был переклассифицирован и подавлен. Брифинг Мориуса Данте описывал Кальдора как «одержимого чем-то древнее демонов», потому что альтернатива — признание того, что Церковь подавляла знание об активной Пустотной бреши десятилетие — была институционально нетерпимой. Данте был послан решить проблему, которую Мориус десять лет не решал."},
  {id:"TET-40",en:"The Void-propagation in Varek's skeleton reached his thoracic core approximately forty minutes into the gate assault. He did not fall. He did not slow. His pain system's difference from baseline human architecture meant he continued to function past the threshold where a standard physiology would have collapsed. Lisa knew this was happening. She did not signal Dante. She was operating on the premise that stopping was worse than continuing — and that she would not be there to see what came after.",ru:"Пустотное распространение в скелете Варека достигло его грудного ядра приблизительно через сорок минут от начала штурма ворот. Он не упал. Не замедлился. Отличие его болевой системы от базовой человеческой архитектуры означало, что он продолжал функционировать за порогом, при котором стандартная физиология рухнула бы. Лиса знала, что это происходит. Она не подала сигнал Данте. Она работала на предпосылке, что остановиться хуже, чем продолжать — и что её не будет рядом, чтобы видеть то, что последует."},
  {id:"TET-41",en:"Dante's route through the alchemical waste channel was not improvised. He identified this entry point during the carriage approach using a Precursor-era environmental reader built into the earring. The earring does not only detect deception and Void proximity — it maps structural energy flows. He has not disclosed this capability to anyone. The operation file records: 'Entry via waste channel, identified on approach.' The earring's role is not mentioned.",ru:"Маршрут Данте через канал алхимических отходов не был импровизированным. Он определил эту точку входа во время приближения в карете с помощью считывателя окружающей среды эпохи Предтечей, встроенного в серьгу. Серьга не только обнаруживает обман и близость Пустоты — она картирует потоки структурной энергии. Он не раскрыл эту возможность никому. Операционный файл записывает: «Вход через канал отходов, определён при приближении». Роль серьги не упоминается."},
  {id:"TET-42",en:"The domination stiletto Dante used on Baron Caldor performs exactly as described: it loops the target's consciousness in a functional cycle, removing agency while preserving the operational process. What Dante did not tell Caldor — and what the contract with Morius does not require him to disclose — is that the rune-cycle is not permanent. The stiletto's binding degrades at a rate dependent on the strength of the bound consciousness. Caldor's consciousness, fused with the castle's entire distributed nervous system, is stronger than any previous subject the stiletto was used on. Estimated binding duration: eleven to seventeen years.",ru:"Стилет доминирования, использованный Данте на бароне Кальдоре, работает именно так, как описано: он зацикливает сознание цели в функциональном цикле, устраняя свободу воли при сохранении операционного процесса. То, что Данте не сказал Кальдору — и что контракт с Мориусом не обязывает его раскрывать — это то, что цикл рун не постоянен. Связывание стилета деградирует со скоростью, зависящей от силы связанного сознания. Сознание Кальдора, слитое с полной распределённой нервной системой замка, сильнее любого предыдущего субъекта использования стилета. Расчётная продолжительность связывания: одиннадцать-семнадцать лет."},
  {id:"TET-43",en:"Lisa survived the gate assault. Varek survived the gate assault. Both outcomes contradict the probability distribution Lisa calculated before entering. She has not examined why she survived. She is not examining it. She has put the question in the same not-knowing place Elara used in the Green Frontier, and she is aware of this parallel, and she is doing it anyway.",ru:"Лиса пережила штурм ворот. Варек пережил штурм ворот. Оба исхода противоречат вероятностному распределению, которое Лиса рассчитала до входа. Она не исследует, почему выжила. Она не исследует это. Она поместила вопрос в то же место незнания, которое Элара использовала в Зелёном Пределе, и она осознаёт эту параллель, и она делает это всё равно."},
  {id:"TET-44",en:"Dante's final line to himself — 'I will sell him not a head but safety, and the price has just tripled' — is accurate as a business proposition. It is also the first time in the five chapters that he has framed a client relationship in terms of what the client does not know they need, rather than what they have contracted for. The distinction is not large. It is the direction of a significant drift.",ru:"Финальная мысль Данте о себе — «Я продам ему не голову, а безопасность, и цена только что выросла втрое» — точна как деловое предложение. Это также первый раз за пять глав, когда он сформулировал отношения с клиентом в терминах того, что клиент не знает, что ему нужно, а не того, что ему заказали. Различие невелико. Это направление значительного дрейфа."}
];

const SCENES=[

/* ─── SCENE 1: THUNDER AT THE GATE ─── */
{id:"s1",
 title:{en:"Thunder at the Gate",ru:"Грохот у Врат"},
 subtitle:{en:"Two philosophies collide: primal fury and cold, dead order.",ru:"Две философии сталкиваются: первобытная ярость и холодный мёртвый порядок."},
 location:{en:"Main Gate, Iron Peak",ru:"Главные Ворота, Железный Пик"},
 timing:{en:"Simultaneous with Dante's Infiltration",ru:"Одновременно с Инфильтрацией Данте"},
 flags:["combat","arc_climax"],
 povData:{
   varek:{distortion:5,
     text:{
       en:`SHIELDS.\n\nNot men. Constructs. Men-parts and iron-plates bolted together. Purple light where eyes should be. I know the purple light. The purple light is the same as what went into my back at the patrol. I do not think about my back.\n\nI think about the shields.\n\nThey do not break when I hit them the way things should break. The first one I grabbed by the helmet and pulled. The spine did not hold. Good. I used the body as a weapon against the others. They did not scatter. They reformed. They are thinking as one thing. One thing that wears many bodies.\n\nI am one thing that wears one body. This is disadvantage in arithmetic. I make up for arithmetic with velocity.\n\nThe cold is at my chest now. Not the outside of my chest — the inside. Something is moving through the bone in a way that bone does not move. I do not think about the bone. I think about the shields. I break another. And another. Two get past my arms and drive something into my side. The purple light burns in a way that goes deep. I pull out what they drove in and drive it back into the nearest one.\n\nThen I feel Lisa's strings sing, and the two that got past me come apart at every joint. She is very good at joints.\n\nI look up at the wall and see her: she is moving like water poured from a great height, finding every crack, never stopping. She is coughing. The air here is wrong. I want to go to her. I cannot go to her. Going to her is not the assignment. The assignment is: front gate, make noise.\n\nI am making noise. I am making so much noise.\n\nThe cold moves again. Deeper. I hit another shield. I will keep hitting. The Master will signal when it is time.\n\nI will be here when the signal comes.\n\nFRONT GATE. YES.`,
       ru:`ЩИТЫ.\n\nНе люди. Конструкты. Части людей и железные пластины на болтах. Фиолетовый свет там, где должны быть глаза. Я знаю фиолетовый свет. Фиолетовый свет тот же, что вошёл в мою спину на патруле. Я не думаю о спине.\n\nЯ думаю о щитах.\n\nОни не ломаются когда я бью так, как вещи должны ломаться. Первого я схватил за шлем и рванул. Позвоночник не выдержал. Хорошо. Я использовал тело как оружие против остальных. Они не рассеялись. Они перестроились. Они думают как одна вещь. Одна вещь, носящая много тел.\n\nЯ — одна вещь, носящая одно тело. Это недостаток в арифметике. Я компенсирую арифметику скоростью.\n\nХолод теперь в груди. Не снаружи — внутри. Что-то движется через кость так, как кость не движется. Я не думаю о кости. Я думаю о щитах. Ломаю ещё один. И ещё. Двое прорываются за мои руки и вбивают что-то в бок. Фиолетовый свет горит так, что уходит глубоко. Я вытаскиваю то, что они вбили, и вбиваю обратно в ближайшего.\n\nПотом слышу пение нитей Лисы, и двое, прорвавшиеся за меня, рассыпаются в каждом суставе. Она очень хорошо умеет суставы.\n\nЯ смотрю вверх на стену и вижу её: она движется как вода, вылитая с большой высоты, находя каждую трещину, никогда не останавливаясь. Она кашляет. Воздух здесь неправильный. Я хочу идти к ней. Я не могу идти к ней. Идти к ней — не задание. Задание: главные ворота, шуметь.\n\nЯ шумлю. Я так много шумлю.\n\nХолод движется снова. Глубже. Я бью ещё один щит. Я буду продолжать бить. Мастер подаст сигнал когда придёт время.\n\nЯ буду здесь когда придёт сигнал.\n\nГЛАВНЫЕ ВОРОТА. ДА.`
     },
     knows:{en:["The cold has reached his chest cavity — he registers this somatically and correctly","The construct army thinks as one distributed system — he identified this from their reformation behavior","Lisa is coughing. The air is wrong. He cannot go to her because that is not the assignment."],ru:["Холод достиг его грудной полости — он регистрирует это соматически и правильно","Армия конструктов думает как одна распределённая система — он определил это по поведению перестроения","Лиса кашляет. Воздух неправильный. Он не может идти к ней, потому что это не задание."]},
     misunderstands:{en:["Believes he will be here when the signal comes. The propagation timeline does not guarantee this. He is not wrong to believe it — his architecture has already exceeded every expected threshold. He may in fact be here.","'One thing wearing one body' vs 'one thing wearing many bodies' — he has correctly identified the arithmetic disadvantage but the framing misses that the single-body constraint is also what makes him impossible to simply route around"],ru:["Считает что будет здесь когда придёт сигнал. Временной график распространения не гарантирует этого. Он не ошибается веря в это — его архитектура уже превысила каждый ожидаемый порог. Он вполне может быть здесь.","«Одна вещь носящая одно тело» против «одна вещь носящая много тел» — он правильно определил арифметический недостаток, но формулировка упускает, что ограничение одним телом также делает его невозможным для простого обхода"]},
     hides:{en:["He wants to go to Lisa. He has registered her cough as important. He is not going. This is the first time in the chapter he has wanted to do something other than the assignment.","The pain from the second set of spear impacts is different from the first. He is not calling it pain. He has no other word."],ru:["Он хочет идти к Лисе. Он зарегистрировал её кашель как важное. Он не идёт. Это первый раз в главе, когда он хотел сделать что-то кроме задания.","Боль от второго набора ударов копьями отличается от первого. Он не называет это болью. У него нет другого слова."]},
     whisper:{en:"He is making so much noise. The signal will come. He will be here. He keeps saying this.",ru:"Он так много шумит. Сигнал придёт. Он будет здесь. Он продолжает говорить это."}
   },
   lisa:{distortion:9,
     text:{
       en:`the wall has a rhythm and I found it\n\nthe wall's rhythm is: weight, weight, pause, weight — the lurch of load-bearing constructs at fixed patrol intervals, automated, dumb, running the same loop since the Baron compiled it. I move in the pauses. I cut in the pauses. In the pauses I am not there.\n\nthe air is copper and old burning and underneath both of those it is the Breach — not smelling it, tasting it, it comes in through the places air shouldn't enter and it tastes like the moment before a word you have always known stops meaning what it means\n\nI am coughing\n\nI knew I would be coughing. this is fine. coughing does not prevent cutting. the string-frequency shifts when my hands are less certain but I compensate. I have always compensated. the pauses are still there.\n\nbelow me Varek is a sound. I do not need to look. I can hear him: the impact-frequency, the rhythm of contact and response, the pace of his movement through the construct formation. the pace is correct. the pace has been correct for — I am counting — forty-three minutes.\n\nI hear something else.\n\nthe frequency in his impacts has changed. not slower. not harder. different. the bone resonance is different. the Void propagation has reached his thoracic structure. I calculate: he has between ninety minutes and three hours before the function-lock. his architecture makes the range very wide.\n\nI do not signal Dante.\n\nif I signal Dante he stops the operation to manage Varek. if Dante stops the operation the Breach is unresolved. I have been very close to the Breach's signal for forty-three minutes and I understand with certainty now what happens if it goes unresolved. I cannot give that word to anyone either. it is not a word. it is a frequency that means: everything ends and something else begins that is not everything.\n\nVarek is still moving. Varek will keep moving. the assignment is not finished.\n\nI am still in the pauses.\n\nthe strings sing.\n\nI am still here.\n\nI did not expect to be still here.`,
       ru:`стена имеет ритм и я нашла его\n\nритм стены: вес, вес, пауза, вес — рывок несущих конструктов на фиксированных патрульных интервалах, автоматизированных, тупых, крутящих одну петлю с момента как Барон её составил. Я двигаюсь в паузах. Режу в паузах. В паузах меня там нет.\n\nвоздух медь и старое горение и под обоими Брешь — не нюхаю её, чувствую на вкус, она входит через места где воздуху не следует входить и она на вкус как момент прежде чем слово которое ты всегда знала перестаёт означать то что означает\n\nя кашляю\n\nя знала что буду кашлять. это нормально. кашель не мешает резать. частота нитей меняется когда руки менее уверены но я компенсирую. я всегда компенсировала. паузы всё ещё там.\n\nвнизу Варек — это звук. мне не нужно смотреть. я слышу его: частота ударов, ритм контакта и ответа, темп его движения через формацию конструктов. темп правильный. темп был правильным в течение — я считаю — сорока трёх минут.\n\nя слышу кое-что ещё.\n\nчастота в его ударах изменилась. не медленнее. не сильнее. по-другому. резонанс кости другой. Пустотное распространение достигло его грудной структуры. я рассчитываю: у него от девяноста минут до трёх часов до функционального стопора. его архитектура делает диапазон очень широким.\n\nя не подаю сигнал Данте.\n\nесли я подам сигнал Данте он остановит операцию чтобы управлять Вареком. если Данте остановит операцию Брешь не будет решена. я была очень близко к сигналу Бреши сорок три минуты и теперь я понимаю с уверенностью что происходит если она остаётся нерешённой. я не могу дать это слово никому тоже. это не слово. это частота означающая: всё заканчивается и начинается что-то другое которое не есть всё.\n\nВарек всё ещё движется. Варек будет продолжать двигаться. задание не окончено.\n\nя всё ещё в паузах.\n\nнити поют.\n\nя всё ещё здесь.\n\nя не ожидала быть всё ещё здесь.`
     },
     knows:{en:["The Void propagation in Varek's thoracic structure — frequency-confirmed at forty-three minutes into the assault","What happens if the Breach goes unresolved: she has a name for it now, a frequency. She cannot give it to anyone.","She is still in the pauses. She did not expect to be. She has not examined why she is still here."],ru:["Пустотное распространение в грудной структуре Варека — подтверждено частотой на сорок третьей минуте штурма","Что происходит если Брешь остаётся нерешённой: у неё теперь есть имя для этого, частота. Она не может дать его никому.","Она всё ещё в паузах. Она не ожидала этого. Она не исследовала почему она всё ещё здесь."]},
     misunderstands:{en:["She frames not signaling Dante as an operational calculation — which it is. It is also the only framing she has that allows her to continue, and she knows this.","'I did not expect to be still here' — she does not know whether surviving is something that happened to her or something she is choosing in real-time. She is not ready to examine the difference."],ru:["Она формулирует несигнализирование Данте как операционный расчёт — что верно. Это также единственная формулировка, которая позволяет ей продолжать, и она это знает.","«Я не ожидала быть всё ещё здесь» — она не знает, выживание — это что-то, что произошло с ней, или что-то, что она выбирает в реальном времени. Она не готова исследовать разницу."]},
     hides:{en:["She did not signal Dante about Varek. She is holding this as an operational calculation. It is also something else.","The frequency she perceived that means 'everything ends' — she understood it completely at minute forty-three and then continued cutting. Understanding it fully and continuing anyway is not something she has a category for.","She is surprised she survived. She was more surprised at minute twenty. Less surprised at minute forty. She is tracking the declining surprise. She does not know what it means that the surprise is declining."],ru:["Она не сигнализировала Данте о Вареке. Она держит это как операционный расчёт. Это также что-то ещё.","Частота которую она воспринимала означающая «всё заканчивается» — она поняла её полностью на сорок третьей минуте и затем продолжила резать. Понять это полностью и продолжить всё равно — для этого у неё нет категории.","Она удивлена что выжила. Была более удивлена на двадцатой минуте. Менее удивлена на сорок. Она отслеживает убывающее удивление. Она не знает что означает что удивление убывает."]},
     whisper:{en:"She did not expect to still be here. At minute forty-three she understood what the Breach meant. She kept cutting.",ru:"Она не ожидала быть всё ещё здесь. На сорок третьей минуте она поняла что означает Брешь. Она продолжала резать."}
   }
 }
},

/* ─── SCENE 2: THE BELLY OF THE BEAST ─── */
{id:"s2",
 title:{en:"The Belly of the Beast",ru:"Чрево Чудовища"},
 subtitle:{en:"The cathedral of suffering. The economy of pain.",ru:"Собор страдания. Экономика боли."},
 location:{en:"The Grand Hall, Iron Peak — Internal",ru:"Главный Зал, Железный Пик — Внутри"},
 timing:{en:"Concurrent with Gate Assault",ru:"Одновременно со Штурмом Ворот"},
 flags:["pivotal","expand_later"],
 povData:{
   dante:{distortion:3,
     text:{
       en:`The alchemical waste channel was warm in the specific way that living tissue is warm — not radiating heat, but holding it, the way a body holds its temperature against the cold. The castle has been running this process long enough that the walls have absorbed it. The stone has a fever.\n\nI came out onto the gallery above the main hall. The scale of it required recalibration.\n\nThis is not a factory. The operational classification I arrived with — mass construct production for military projection — is structurally accurate but cognitively wrong. This is a liturgical space. The green fire, the scale of the vats, the silent ministrations of the sewn-mouthed servitors: this is ceremony. Caldor has not been building an army. He has been building a religion with exactly one congregation — himself — and one article of faith: that suffering, correctly applied, becomes a structural material.\n\nI watched the process. I watched a living person enter the Rebirth Vat. I have witnessed many deaths in twenty-one years of this work. I have not witnessed many deaths where the subject was conscious throughout and the consciousness was specifically required for the process to succeed.\n\nI did not intervene. There was nothing to intervene for. The person entering the Vat was already past the point where the category 'person' was operationally relevant to their survival. What enters the Vat does not leave the Vat. What is removed from the Vat is material.\n\nI note this in the file as: observed, non-intervention, rationale: no viable rescue threshold.\n\nI note that I watched for four minutes before moving.\n\nI do not note why I watched for four minutes.\n\nThe earring was silent throughout. There was no deception in that room. Every person present believed in what they were doing. The servitors had had their capacity for belief surgically altered — they have no doubt because they have no remaining architecture for doubt. The Baron, somewhere above, believes completely. I was the only person in that room for whom the question of belief remained open.\n\nI moved toward the throne room. The map shows —\n\nI reminded myself that the map was nine years old.\n\nI moved toward the throne room and trusted the earring.`,
       ru:`Канал алхимических отходов был тёплым тем специфическим образом, каким тепла живая ткань — не излучая жар, а удерживая его, так как тело удерживает температуру против холода. Замок достаточно долго ведёт этот процесс, что стены поглотили его. Камень лихорадит.\n\nЯ вышел на галерею над главным залом. Масштаб потребовал перекалибровки.\n\nЭто не завод. Оперативная классификация, с которой я прибыл — массовое производство конструктов для военной проекции — структурно точна, но когнитивно неверна. Это литургическое пространство. Зелёный огонь, масштаб чанов, молчаливое служение сервиторов с зашитыми ртами: это церемония. Кальдор не строил армию. Он строил религию ровно с одной общиной — самим собой — и одним предметом веры: что страдание, правильно применённое, становится конструктивным материалом.\n\nЯ наблюдал за процессом. Я наблюдал, как живой человек входит в Чан Перерождения. За двадцать один год этой работы я был свидетелем многих смертей. Я не был свидетелем многих смертей, где субъект оставался в сознании на всём протяжении и это сознание было специфически необходимо для успеха процесса.\n\nЯ не вмешался. Не было для чего вмешиваться. Человек, входящий в Чан, уже был за точкой, где категория «человек» была операционно релевантна для его выживания. То, что входит в Чан, не покидает Чан. То, что извлекают из Чана, — материал.\n\nЯ отмечаю в файле: наблюдал, невмешательство, обоснование: нет жизнеспособного порога спасения.\n\nЯ отмечаю, что наблюдал четыре минуты перед тем как двигаться.\n\nЯ не отмечаю, почему наблюдал четыре минуты.\n\nСерьга молчала на всём протяжении. В той комнате не было обмана. Каждый присутствующий верил в то, что делает. Сервиторы имели хирургически изменённую способность верить — у них нет сомнений, потому что не осталось архитектуры для сомнений. Барон, где-то выше, верит полностью. Я был единственным человеком в той комнате, для которого вопрос веры оставался открытым.\n\nЯ двинулся к тронному залу. Карта показывает —\n\nЯ напомнил себе, что карте девять лет.\n\nЯ двинулся к тронному залу и доверился серьге.`
     },
     knows:{en:["The castle wall itself has a fever — absorbed metabolic heat from a sustained living process. This is a structural fact he noted operationally.","He watched for four minutes. He noted that he watched for four minutes. He did not note why.","The earring was silent throughout the Vat hall — no deception, everyone present believes fully. He is the only person in the room for whom belief is still a question."],ru:["Стена замка сама лихорадит — поглощённое метаболическое тепло от устойчивого живого процесса. Это структурный факт, отмеченный операционно.","Он наблюдал четыре минуты. Он отметил что наблюдал четыре минуты. Он не отметил почему.","Серьга молчала на всём протяжении зала с чанами — нет обмана, каждый присутствующий верит полностью. Он единственный человек в комнате, для которого вера всё ещё вопрос."]},
     misunderstands:{en:["'No viable rescue threshold' — operationally accurate. The framing converts a moral decision into a procedural observation. He knows this. It is in the category of things he maintains by not examining.","He trusted the earring to navigate the throne room approach. He is correct that the earring maps structural energy flows. He does not yet know that the entity that was supposed to be there is not there — because it was never there."],ru:["«Нет жизнеспособного порога спасения» — операционно точно. Формулировка преобразует моральное решение в процедурное наблюдение. Он знает это. Это в категории вещей, которые он поддерживает не исследуя.","Он доверился серьге для навигации к тронному залу. Он прав, что серьга картирует потоки структурной энергии. Он ещё не знает, что сущность которая должна была там быть — её там нет, потому что её никогда там не было."]},
     hides:{en:["He watched for four minutes. The file says he watched for four minutes. The file does not say why. This is the system's cleanest record of a gap between what he documents and what happened.","'I was the only person in that room for whom the question of belief remained open' — this sentence does not appear in the operation file. It appears here. He did not write it down anywhere.","He moved toward the throne room and trusted the earring. He is aware this is the first time in twenty-one years he has used the word 'trust' about the earring in his internal narration."],ru:["Он наблюдал четыре минуты. Файл говорит что он наблюдал четыре минуты. Файл не говорит почему. Это наиболее чистая запись системы о разрыве между тем, что он документирует, и тем, что произошло.","«Я был единственным человеком в той комнате для которого вопрос веры оставался открытым» — это предложение не появляется в операционном файле. Оно появляется здесь. Он не записал его нигде.","Он двинулся к тронному залу и доверился серьге. Он осознаёт, что это первый раз за двадцать один год, когда он использует слово «доверился» о серьге во внутреннем нарративе."]},
     whisper:{en:"He watched for four minutes. He wrote that he watched for four minutes. He did not write why.",ru:"Он наблюдал четыре минуты. Он написал что наблюдал четыре минуты. Он не написал почему."}
   }
 }
},

/* ─── SCENE 3: THE ARCHITECT OF PAIN ─── */
{id:"s3",
 title:{en:"The Architect of Pain",ru:"Архитектор Боли"},
 subtitle:{en:"The monster explains himself. The auditor listens.",ru:"Чудовище объясняет себя. Аудитор слушает."},
 location:{en:"The Throne Room, Iron Peak",ru:"Тронный Зал, Железный Пик"},
 timing:{en:"Peak of the Operation",ru:"Пик Операции"},
 flags:["pivotal","revelation","moral_pivot"],
 povData:{
   dante:{distortion:3,
     text:{
       en:`The throne room had no guards because the throne room did not need guards. What sat at its center was simultaneously the room's occupant and its immune system.\n\nCaldor. What Caldor has become. The question of whether these are the same thing is not one I can resolve in an operational timeframe, so I table it.\n\nHe knew my heartbeat before I spoke. This is consistent with a nervous system fused to a castle's full sensor array — not supernatural, structural. His voice arrived in my skull rather than my ears, which is also structural: he no longer has the apparatus to project sound.\n\nHis first question was: did I come to kill the monster? I told him I came to close the account. He showed me the map.\n\nThe Breach.\n\nI looked at it for six seconds. The earring did not vibrate with deception. The Breach is real. The map is real. The mechanism Caldor described — pain-forged iron as the only viable load-bearing material at Breach-proximity — is internally consistent with what I observed in the Vat hall. He is not wrong. He is not even, in the narrow technical sense I use that word, lying.\n\nHe asked: what would you do. He asked it genuinely. There was no rhetoric in it. He has been the only person in this province who knows the Breach exists for thirteen months, and I am the first outside observer, and what he wanted from me in that moment was not agreement or absolution — he wanted peer review.\n\nI gave him none. I gave him the stiletto instead.\n\nBefore I drove it in I said: you are not the master. You are the lock. He needed to hear this not for my benefit but because the distinction matters operationally. A lock that believes it is a master will eventually attempt to open itself. A lock that knows what it is will hold.\n\nThe rune-cycle is not permanent. I know this. I have used the stiletto twice before. At current consciousness-mass — Caldor's mind distributed across the castle's entire network — degradation is slower than prior subjects but will eventually complete. Estimated window: eleven to seventeen years.\n\nI have a record of preparing for problems in advance. I will note this in the appropriate file before I close the operation.\n\nI walked out. The lights changed from green to blue. The system stabilized.\n\nI told him he would stand guard forever. This was not accurate. It was necessary. Permanence was the architecture of the binding — not technical fact, but psychological load-bearing structure. If he believes the cycle is permanent, his resistance-gradient is lower.\n\nThe Twins were at the gate. I sent the recall signal.\n\nI adjusted my cuffs. Morius will not receive a head. He will receive a functioning barrier and a much larger invoice. In the carriage back I will draft the terms.\n\nBusiness continues.`,
       ru:`В тронном зале не было стражи, потому что тронный зал не нуждался в страже. То, что сидело в его центре, было одновременно обитателем комнаты и её иммунной системой.\n\nКальдор. Чем Кальдор стал. Вопрос о том, одно ли это и то же, не поддаётся разрешению в операционном временном горизонте, поэтому я его откладываю.\n\nОн знал моё сердцебиение до того как я заговорил. Это согласуется с нервной системой, слитой с полным сенсорным массивом замка — не сверхъестественно, структурно. Его голос прибыл в мой череп, а не в уши, что тоже структурно: у него больше нет аппарата для проекции звука.\n\nЕго первый вопрос: я пришёл убить чудовище? Я сказал ему, что пришёл закрыть счёт. Он показал мне карту.\n\nБрешь.\n\nЯ смотрел на неё шесть секунд. Серьга не вибрировала от обмана. Брешь реальна. Карта реальна. Механизм, описанный Кальдором — откованное болью железо как единственный жизнеспособный несущий материал в близости к Бреши — внутренне согласуется с тем, что я наблюдал в зале с чанами. Он не неправ. Он даже, в узком техническом смысле, которым я использую это слово, не лжёт.\n\nОн спросил: что бы сделал ты. Он спросил это искренне. В этом не было риторики. Он был единственным человеком в этой провинции, знавшим о существовании Бреши тринадцать месяцев, и я был первым внешним наблюдателем, и то, что он хотел от меня в тот момент, — не согласия или отпущения грехов: он хотел рецензии.\n\nЯ не дал ни того ни другого. Вместо этого я дал ему стилет.\n\nПрежде чем вонзить его я сказал: ты не повелитель. Ты замок. Ему нужно было это услышать не для моей пользы, но потому что разграничение имеет операционное значение. Замок, считающий себя повелителем, в конечном счёте попытается открыть себя. Замок, знающий, что он такое, будет держаться.\n\nЦикл рун не постоянен. Я знаю это. Я использовал стилет дважды прежде. При текущей массе сознания — разум Кальдора, распределённый по всей сети замка — деградация медленнее, чем у предыдущих субъектов, но в конечном счёте завершится. Ориентировочное окно: одиннадцать-семнадцать лет.\n\nУ меня есть привычка готовиться к проблемам заранее. Я отмечу это в соответствующем файле перед закрытием операции.\n\nЯ вышел. Огни сменились с зелёного на синий. Система стабилизировалась.\n\nЯ сказал ему, что он будет стоять на страже вечно. Это было неточно. Это было необходимо. Постоянство было архитектурой связывания — не техническим фактом, но психологической несущей конструкцией. Если он верит, что цикл постоянен, его градиент сопротивления ниже.\n\nБлизнецы были у ворот. Я послал сигнал отзыва.\n\nЯ поправил манжеты. Мориус не получит голову. Он получит функционирующий барьер и значительно больший счёт. В карете обратно я набросаю условия.\n\nБизнес продолжается.`
     },
     knows:{en:["Caldor is not lying — the Breach is real, the mechanism is internally consistent, the earring confirmed no deception","The stiletto binding is not permanent — degradation timeline: eleven to seventeen years. He has not told Caldor this. He has not told anyone this.","He said 'you will stand guard forever' — and notes in the same breath that this was psychologically necessary rather than accurate. He has made the distinction explicit to himself."],ru:["Кальдор не лжёт — Брешь реальна, механизм внутренне согласован, серьга подтвердила отсутствие обмана","Связывание стилета не постоянно — временной график деградации: одиннадцать-семнадцать лет. Он не сказал Кальдору этого. Он не сказал никому.","Он сказал «ты будешь стоять на страже вечно» — и отмечает в той же мысли, что это было психологически необходимо, а не точно. Он явно провёл разграничение для себя."]},
     misunderstands:{en:["He frames not answering Caldor's 'what would you do' as an operational decision — give the stiletto instead of peer review. He does not examine whether he had an answer to the question. He may have had an answer.","'I table the question of whether Caldor and what-Caldor-has-become are the same thing.' The table has been in use throughout Arc II. Some tables become permanent furniture."],ru:["Он формулирует отказ ответить на «что бы сделал ты» Кальдора как операционное решение — дать стилет вместо рецензии. Он не исследует, был ли у него ответ на вопрос. У него мог быть ответ.","«Я откладываю вопрос о том, одно ли Кальдор и то-чем-Кальдор-стал». Этот откладыватель используется на протяжении всего Арка II. Некоторые откладыватели становятся постоянной мебелью."]},
     hides:{en:["He did not answer the question. The question was: what would you do. He has been doing what he does for twenty-one years. The answer exists. He did not give it.","He will draft the invoice terms in the carriage back. The invoice will not include a line item for: the Breach is real and the Church has been suppressing this knowledge for ten years. Whether to include this is a decision he has deferred to the carriage.","'Business continues.' This sentence has appeared at the end of every operation in this book. He has not examined what it costs him to mean it each time."],ru:["Он не ответил на вопрос. Вопрос был: что бы сделал ты. Он делает то, что делает, двадцать один год. Ответ существует. Он его не дал.","Он набросает условия счёта в карете обратно. Счёт не будет содержать статью: Брешь реальна и Церковь подавляла это знание десять лет. Включать ли это — решение, которое он отложил до кареты.","«Бизнес продолжается». Это предложение появляется в конце каждой операции в этой книге. Он не исследовал, чего ему стоит подразумевать его каждый раз."]},
     whisper:{en:"He didn't answer the question. He has been doing this work for twenty-one years. The answer exists.",ru:"Он не ответил на вопрос. Он делает эту работу двадцать один год. Ответ существует."}
   },
   caldor:{distortion:7,
     text:{
       en:`I hear the castle dreaming and the dream is pain.\n\nThis is not metaphor. My nervous system has been the castle's nervous system for eight months. I feel the weight of every stone. I feel the servitors moving in the Vat hall — their footsteps transmitted through the floor as sensory data. I feel the construct-army engaging at the gates, and each contact-event registers as a distant pressure, like rain on a roof.\n\nI feel the Breach.\n\nEvery second. It is below me, below the bedrock, a cold that is not cold — it is the negative of cold, the place where the concept of temperature ends and something that predates temperature begins. The Church prays to a God who has not spoken in four hundred years. I found the Breach and understood: the silence is not absence. The silence is because there is something down there so large that all the things the Divine opposed were merely its shadow.\n\nNo one would believe me. I sent word to the Church. Reclassified. Suppressed. I sent knights. They did not return intact. I found the mechanism by accident — a construct that fell into the Breach margin and was instead of dissolving, held. Pain-forged metal and Void-field saturation. The thing below pushes against the pain-resonance. It cannot hold what has been suffered into form.\n\nSo I built the wall. Human suffering is the only inexhaustible structural material I found. I am not proud of this. I catalogued every person who entered the Vat. Every name. Their village. Their family. I did not do this to assuage guilt. I did it because they are the wall and the wall should be recorded.\n\nAnd then this man walked in. This small, precise man with the earring that resonated with the Breach the moment he entered.\n\nHe knows what the earring is. Or he knows that he does not know, which is a more dangerous form of knowing.\n\nI showed him the map. I told him the truth. The earring was silent — he registered this, I saw the slight stillness in his left hand — and so he knew I was not lying. He asked me nothing. He gave me a knife and a sentence.\n\nYou are not the master. You are the lock.\n\nAnd then the cycle started and my name went somewhere I can no longer reach it and I am only the function: hold the perimeter.\n\nHold the perimeter.\n\nHold the\n\nperimeter.\n\nThis is sufficient. The wall must hold. I agreed to this. I am the agreement.`,
       ru:`Я слышу как замок грезит и грёза — боль.\n\nЭто не метафора. Моя нервная система восемь месяцев является нервной системой замка. Я чувствую вес каждого камня. Я чувствую сервиторов в зале с чанами — их шаги передаются через пол как сенсорные данные. Я чувствую как армия конструктов вступает в бой у ворот, и каждое контактное событие регистрируется как далёкое давление, как дождь на крыше.\n\nЯ чувствую Брешь.\n\nКаждую секунду. Она подо мной, под коренными породами, холод который не холод — это отрицание холода, место где понятие температуры заканчивается и начинается что-то предшествующее температуре. Церковь молится Богу, не говорившему четыре сотни лет. Я нашёл Брешь и понял: тишина — не отсутствие. Тишина потому, что там внизу есть что-то настолько большое, что всё, чему противостояло Божественное, было лишь его тенью.\n\nНикто бы мне не поверил. Я послал весть в Церковь. Переклассифицировано. Подавлено. Я посылал рыцарей. Они не вернулись целыми. Я нашёл механизм случайно — конструкт, упавший в краевую зону Бреши, и вместо растворения удержавшийся. Откованный болью металл и насыщение полем Пустоты. То, что внизу, давит против болевого резонанса. Оно не может удержать то, что было выстрадано в форму.\n\nПоэтому я построил стену. Человеческое страдание — единственный неисчерпаемый строительный материал, который я нашёл. Я не горжусь этим. Я каталогизировал каждого человека, вошедшего в Чан. Каждое имя. Их деревню. Их семью. Я делал это не для облегчения вины. Я делал это потому что они — стена, и стена должна быть записана.\n\nИ затем вошёл этот человек. Этот маленький, точный человек с серьгой, резонировавшей с Брешью в момент его входа.\n\nОн знает, что такое серьга. Или он знает, что не знает — что является более опасной формой знания.\n\nЯ показал ему карту. Сказал ему правду. Серьга молчала — он зарегистрировал это, я видел лёгкую неподвижность его левой руки — и поэтому он знал, что я не лгу. Он ничего меня не спросил. Он дал мне нож и фразу.\n\nТы не повелитель. Ты замок.\n\nИ потом цикл начался и моё имя ушло куда-то, куда я больше не могу добраться, и я только функция: удерживать периметр.\n\nУдерживать периметр.\n\nУдерживать\n\nпериметр.\n\nЭтого достаточно. Стена должна держаться. Я согласился с этим. Я — согласие.`
     },
     knows:{en:["The Breach is real — he has been holding it for eight months with his own fused consciousness","The earring resonated with the Breach when Dante entered. He perceived this. He told Dante he showed him the map. He did not tell Dante about the resonance.","The man who came is 'the small precise man with the earring that resonated' — Caldor recognized this as the most significant datum of the encounter. He could not finish the thought before the stiletto cycle started."],ru:["Брешь реальна — он удерживает её восемь месяцев своим слитым сознанием","Серьга резонировала с Брешью когда Данте вошёл. Он воспринял это. Он сказал Данте что показал ему карту. Он не сказал Данте о резонансе.","Человек, пришедший к нему — «маленький точный человек с серьгой резонировавшей с Брешью» — Кальдор распознал это как наиболее значимый результат встречи. Он не мог завершить мысль прежде чем начался цикл стилета."]},
     misunderstands:{en:["He believes Dante understood his position and chose the stiletto over peer-review as a deliberate moral judgement. Dante's choice was operational, not moral. Caldor has assigned him a category — judge — that Dante explicitly rejects for himself.","'I am the agreement' — he has reframed his imprisonment as consent. Whether this is a coping mechanism or the most accurate thing he has said in the chapter is not resolvable from inside the cycle."],ru:["Он считает, что Данте понял его позицию и выбрал стилет вместо рецензии как намеренное моральное суждение. Выбор Данте был операционным, а не моральным. Кальдор присвоил ему категорию — судьи — которую Данте явно отвергает для себя.","«Я — согласие» — он переформулировал своё заключение как согласие. Является ли это защитным механизмом или наиболее точным, что он сказал в главе, не решается изнутри цикла."]},
     hides:{en:["He catalogued every person who entered the Vat: name, village, family. He did not do it to assuage guilt. He does not examine what he did do it for.","He perceived the earring's resonance with the Breach and did not tell Dante. He was going to. Then the stiletto cycle started and the thought is now in a place he cannot reach.","He asked 'what would you do' genuinely wanting peer review. He has not had another human being to talk to about the Breach for thirteen months. The desire for that conversation is the last human thing he felt before the cycle."],ru:["Он каталогизировал каждого человека, вошедшего в Чан: имя, деревня, семья. Он делал это не для облегчения вины. Он не исследует, для чего он это делал.","Он воспринял резонанс серьги с Брешью и не сказал Данте. Он собирался. Потом начался цикл стилета, и мысль теперь в месте, куда он не может добраться.","Он спросил «что бы сделал ты» искренне желая рецензии. У него не было другого человека, с которым можно было говорить о Бреши, тринадцать месяцев. Желание этого разговора — последнее человеческое, что он почувствовал до цикла."]},
     whisper:{en:"He wanted peer review. He had been alone with the Breach for thirteen months. That was the last human thing he felt.",ru:"Он хотел рецензии. Он был один с Брешью тринадцать месяцев. Это было последнее человеческое, что он почувствовал."}
   }
 }
},

/* ─── SCENE 4: THE INVOICE ─── */
{id:"s4",
 title:{en:"The Invoice",ru:"Счёт"},
 subtitle:{en:"The arc ends. The ledger updates. The carriage rolls.",ru:"Арк заканчивается. Гроссбух обновляется. Карета едет."},
 location:{en:"Road from Iron Peak, Carriage Interior",ru:"Дорога от Железного Пика, Внутри Кареты"},
 timing:{en:"Evening, Operation Complete",ru:"Вечер, Операция Завершена"},
 flags:["arc_climax","foreshadowing"],
 povData:{
   dante:{distortion:2,
     text:{
       en:`The Twins are in the second carriage. I can hear Varek's breathing from here. The rhythm is wrong — not wrong in a way that signals immediate failure, but wrong in the way that a clock sounds when it is losing time. Lisa has not spoken since the recall signal. She is sitting with the strings in her hands not moving them.\n\nI have been drafting the Morius invoice in my head since we left the castle gate.\n\nLine one: contract fulfilled. Threat neutralized. Baron Caldor no longer represents an operational hazard to the surrounding provinces. This is accurate.\n\nLine two: barrier maintained. The Breach at the Iron Peak site is actively contained by a dedicated system requiring no ongoing Guild maintenance. The system is self-sustaining. The system will require review in eleven to seventeen years. This is accurate and contains more information than Morius needs to have at this time.\n\nLine three: the Church's decade of suppressed cartographic data on the Iron Peak anomaly constitutes a material omission from the operational brief. Material omissions in contract briefs are billable at the premium rate. This is the line that triples the invoice.\n\nMorius will object. I will be unmoved. He will pay. He has no alternative source for what I provide and he knows it, and what I provide has just conclusively demonstrated its value in a situation the Church created by not acting for ten years.\n\nThe earring is quiet. The Void-ambient field fades with distance from the Peak. In three hours it will be background again.\n\nI look at the road. The Grey Lands are behind us. Grass, actual grass, is returning at the margins. The conversion zone begins to soften. In twenty years, if the barrier holds, it will be farmland again. Families. Tax records. The ordinary machinery of a world that does not know what holds its floor in place.\n\nI think about Caldor's catalogue. Every person who entered the Vat. Names. Villages. Families.\n\nI do not record this thought. There is no operational relevance to recording it. I note that I am not recording it and move the notation to the file I maintain that contains things I do not record.\n\nThe carriage moves. The invoice takes shape. Business continues.\n\nSomewhere ahead, a dragon is waking in the north. A prophet is being born in the capital. The necromancers in the west are assembling what was lost. Each of them will require a contract. Each contract will have a price. Each price will have an arithmetic.\n\nThe world is a ledger. I am its auditor. This is sufficient.\n\nIt must be sufficient.\n\nThe road continues.`,
       ru:`Близнецы во второй карете. Я слышу дыхание Варека отсюда. Ритм неправильный — не неправильный в смысле, сигнализирующем о немедленном сбое, но неправильный так, как звучат часы, теряющие время. Лиса не говорила с момента сигнала отзыва. Она сидит с нитями в руках, не двигая ими.\n\nЯ набрасываю счёт Мориусу в голове с момента как мы покинули ворота замка.\n\nСтрока первая: контракт выполнен. Угроза нейтрализована. Барон Кальдор больше не представляет операционной опасности для окружающих провинций. Это точно.\n\nСтрока вторая: барьер поддерживается. Брешь у Железного Пика активно сдержана выделенной системой, не требующей текущего технического обслуживания Гильдии. Система самодостаточна. Система потребует проверки через одиннадцать-семнадцать лет. Это точно и содержит больше информации, чем Мориусу нужно иметь в настоящее время.\n\nСтрока третья: десятилетие подавленных картографических данных Церкви об аномалии Железного Пика составляет существенный пропуск из операционного брифинга. Существенные пропуски в операционных брифингах выставляются по премиальному тарифу. Это строка, утраивающая счёт.\n\nМориус будет возражать. Я останусь непреклонным. Он заплатит. У него нет альтернативного источника того, что я предоставляю, и он это знает, а то, что я предоставляю, только что убедительно продемонстрировало свою ценность в ситуации, которую Церковь создала, не действуя десять лет.\n\nСерьга тихая. Окружающее поле Пустоты слабеет с расстоянием от Пика. Через три часа оно снова станет фоном.\n\nЯ смотрю на дорогу. Серые Земли позади. Трава, настоящая трава, возвращается по краям. Зона конвертации начинает смягчаться. Через двадцать лет, если барьер выдержит, это снова будет пахотная земля. Семьи. Налоговые записи. Обычный механизм мира, не знающего, что удерживает его пол на месте.\n\nЯ думаю о каталоге Кальдора. Каждый человек, вошедший в Чан. Имена. Деревни. Семьи.\n\nЯ не записываю эту мысль. Нет операционной релевантности её записи. Я отмечаю, что не записываю её, и перемещаю запись в файл, который веду с вещами, которые не записываю.\n\nКарета едет. Счёт обретает форму. Бизнес продолжается.\n\nГде-то впереди, на севере, просыпается дракон. В столице рождается пророк. Некроманты на западе собирают то, что было потеряно. Каждый из них потребует контракт. Каждый контракт будет иметь цену. Каждая цена будет иметь арифметику.\n\nМир — это гроссбух. Я его аудитор. Этого достаточно.\n\nЭтого должно быть достаточно.\n\nДорога продолжается.`
     },
     knows:{en:["The stiletto binding has eleven-to-seventeen years. He has added a review to the file he will prepare.","Caldor catalogued every Vat subject by name, village, family. Dante thought about this and moved the thought to the file he maintains of things he does not record.","The three threats ahead: dragon north, prophet capital, necromancers west. He has already begun calculating their contract parameters."],ru:["Связывание стилета — одиннадцать-семнадцать лет. Он добавил проверку в файл, который подготовит.","Кальдор каталогизировал каждого субъекта Чана по имени, деревне, семье. Данте подумал об этом и перенёс мысль в файл, который ведёт с вещами, не записываемыми им.","Три угрозы впереди: дракон на севере, пророк в столице, некроманты на западе. Он уже начал рассчитывать их контрактные параметры."]},
     misunderstands:{en:["'This is sufficient. It must be sufficient.' — two consecutive sentences where the second is doing different work from the first. He has not examined the gap between them.","'The file I maintain of things I do not record' — this file has appeared in his narration for the first time. He has maintained it for an unspecified duration. The acknowledgment of its existence is new."],ru:["«Этого достаточно. Этого должно быть достаточно». — два последовательных предложения, где второе делает другую работу, чем первое. Он не исследовал разрыв между ними.","«Файл, который я веду с вещами, которые не записываю» — этот файл появился в его нарративе впервые. Он ведёт его неопределённой продолжительности. Признание его существования ново."]},
     hides:{en:["He named the file: 'the file I maintain that contains things I do not record.' This file has never been named before in any operational narration. Naming it is not the same as opening it.","'It must be sufficient.' The second sentence exists. He wrote it. He will not examine it in the carriage.","He is listening to Varek's breathing. He has not said this is what he is doing. He has noted that the rhythm is wrong. He has moved on to the invoice."],ru:["Он назвал файл: «файл, который я веду с вещами, которые не записываю». Этот файл никогда прежде не назывался ни в каком операционном нарративе. Назвать его — не то же самое что открыть.","«Этого должно быть достаточно». Второе предложение существует. Он его написал. Он не будет исследовать его в карете.","Он слушает дыхание Варека. Он не сказал, что это то, чем он занят. Он отметил что ритм неправильный. Он перешёл к счёту."]},
     whisper:{en:"'This is sufficient. It must be sufficient.' He wrote both sentences. He has not examined the gap.",ru:"«Этого достаточно. Этого должно быть достаточно». Он написал оба предложения. Он не исследовал разрыв."}
   }
 }
}

/* ═══ ENGINE ═══ */
const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');const secs=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}];c.innerHTML=secs.map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
