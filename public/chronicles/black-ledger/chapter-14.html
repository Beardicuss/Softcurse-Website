.lang-btn.active{color:var(--pov-s);border-color:var(--pov-p);background:var(--bg3);}

#narrative-text p{margin-bottom:1.3em;}

.d3,.d4,.d5{animation:flicker-soft 14s infinite;}
.d6,.d7{animation:flicker-mid 7s infinite;}
.d8,.d9{animation:flicker-hard 4s infinite,glitch-mid 16s infinite;}
.d10{animation:flicker-hard 2s infinite,glitch-hard 8s infinite;filter:blur(.4px);}
@keyframes flicker-soft{0%,94%,100%{opacity:1;}96%{opacity:.88;}}
@keyframes flicker-mid{0%,88%,100%{opacity:1;}90%{opacity:.75;}92%{opacity:.9;}93%{opacity:.68;}94%{opacity:1;}}
@keyframes flicker-hard{0%,80%,100%{opacity:1;}82%{opacity:.6;}83%{opacity:.9;}84%{opacity:.55;}85%{opacity:.85;}86%{opacity:.7;}87%{opacity:1;}}
@keyframes glitch-mid{0%,92%,100%{transform:none;filter:none;}93%{transform:translate(-3px,0);filter:drop-shadow(3px 0 rgba(255,0,0,.3));}94%{transform:translate(3px,0);filter:drop-shadow(-3px 0 rgba(0,100,255,.2));}96%{transform:none;}}
@keyframes glitch-hard{0%,88%,100%{transform:none;filter:none;}89%{transform:translate(-4px,0) skewX(-1deg);filter:drop-shadow(4px 0 rgba(255,0,0,.4)) saturate(2);}91%{transform:translate(-2px,2px);filter:brightness(.7);}93%{transform:none;filter:none;}}
#whisper-panel{background:var(--bg2);border:1px solid var(--border);border-top:none;border-left:3px solid var(--pov-p);padding:15px 40px 17px;margin-bottom:12px;opacity:0;transform:translateY(-2px);transition:opacity 1.6s,transform 1.2s;pointer-events:none;}

.ledger-body{background:#060003;border:1px solid #1a0008;padding:22px;}

.ledger-text{font-family:var(--ff-mono);font-size:13px;color:#6a2030;line-height:1.75;letter-spacing:.02em;}
#ledger-trigger{position:fixed;bottom:24px;right:24px;z-index:100;background:#06000a;border:1px solid #1a001a;color:#2a0028;font-family:var(--ff-mono);font-size:11px;letter-spacing:.3em;text-transform:uppercase;padding:9px 18px;cursor:pointer;transition:all .5s;}

@media(max-width:640px){#app{padding:0 16px 100px;}#narrative-panel{padding:24px 18px;}#whisper-panel{padding:12px 18px 14px;}.dist-meter{margin-left:0;margin-top:8px;}.scene-time{margin-left:0;}#lang-bar{top:10px;right:10px;}#narrative-text{font-size:18px;}}

const TIMELINE=[
  {id:"TET-109",en:"The Siren's mouth has not been sewn shut in the way Dante described from observation. The silver clasps closing her jaw are not a mutilation — they are the Inquisition's specific protocol for containing a Covenant-speaker: they block the formation of the opening phoneme sequence that activates the Island barrier. She can make other sounds. She can resonate through bone and water. She cannot produce the specific vibrational sequence that opens the outer gate, because that sequence requires a jaw position the clasps prevent. Ignatius knows this. The modification is precise, not punitive. The pain she experiences is incidental to the function, not the purpose.",ru:"Рот Сирены не был зашит так, как Данте описал из наблюдения. Серебряные скобы закрывающие её челюсть — не увечье: это специфический протокол Инквизиции для сдерживания носителя Завета. Они блокируют формирование открывающей фонемной последовательности активирующей барьер Острова. Она может производить другие звуки. Она может резонировать через кости и воду. Она не может произвести конкретную вибрационную последовательность открывающую внешние врата, потому что эта последовательность требует положения челюсти которое скобы предотвращают. Игнациус знает это. Модификация точная, а не карательная. Боль которую она испытывает — побочный продукт функции, а не её цель."},
  {id:"TET-110",en:"The Siren's first communication to Dante — 'silence, good, who are you' — was not a request for relief or a plea for rescue. It was an assessment. She was testing whether the null-field that suppressed her pain-runic activation also suppressed her resonance perception. It did not. She can read Dante clearly through the null-field in a way she cannot read anyone else: because the null-field is made of the same material as the language she speaks, and in proximity to a null-field source, her perception becomes sharper rather than duller. She experienced him as the clearest thing she had perceived in three years of captivity.",ru:"Первое сообщение Сирены Данте — «тишина, хорошо, кто ты» — не было просьбой об облегчении или мольбой о спасении. Это была оценка. Она проверяла заглушает ли нулевое поле подавляющее активацию её болевых рун также её резонансное восприятие. Нет. Она может ясно считывать Данте сквозь нулевое поле способом которым не может считывать никого другого: потому что нулевое поле сделано из того же материала что язык которым она говорит, и в близости к источнику нулевого поля её восприятие становится острее, а не тупее. Она воспринимала его как наиболее ясную вещь воспринятую ею за три года заточения."},
  {id:"TET-111",en:"Dante's promise — 'I will cut your threads when the time comes, but in exchange you will sing one song for me, the one that opens the Island's doors' — was heard by the Siren as something different from what he said. What he said was a transactional offer. What she heard was: someone who understands what I am is offering a mutual purpose. She did not agree to the transaction. She agreed to the mutual purpose. These are different agreements with different binding terms. He does not know she heard the difference. She does not know he did not intend the difference.",ru:"Обещание Данте — «я перережу твои нити когда придёт время, но взамен ты споёшь мне одну песню, ту что открывает двери Острова» — было услышано Сиреной иначе чем он сказал. То что он сказал было транзакционным предложением. То что она услышала: кто-то понимающий что она такое предлагает взаимную цель. Она не согласилась на транзакцию. Она согласилась на взаимную цель. Это разные соглашения с разными обязывающими условиями. Он не знает что она услышала разницу. Она не знает что он не имел в виду разницу."},
  {id:"TET-112",en:"When Dante passed the null-field through the glass to suppress the Siren's pain-rune activation, he did something he has not done before: he used the null-field not as suppression (deactivating something external) but as a carrier signal (transmitting a specific quality through a medium). The glass conducted it. The Siren's rune-network received it and quieted. This is a new capability vector that neither Dante nor the earring's designers anticipated in the primary use-case documentation. The earring's function set is expanding through contact with objects it was designed to interact with.",ru:"Когда Данте пропустил нулевое поле сквозь стекло для подавления активации болевых рун Сирены, он сделал то чего не делал прежде: использовал нулевое поле не как подавление (деактивация чего-то внешнего), а как несущий сигнал (передача конкретного качества через среду). Стекло его провело. Руновая сеть Сирены приняла его и успокоилась. Это новый вектор возможностей которого не предвидели ни Данте ни проектировщики серьги в основной документации по применению. Набор функций серьги расширяется через контакт с объектами для взаимодействия с которыми она была спроектирована."},
  {id:"TET-113",en:"Father Ignatius was not praying when Dante descended to the hold. He was following Dante. He has been tracking Dante's nighttime movement patterns since boarding, using his Void-adjacent perception to monitor the null-field's location through the ship's hull. He knew before Dante reached the guard post that a hold visit was in progress. He allowed the guard incapacitation to occur because he wanted to observe the Siren interaction uninterrupted. He learned three things: the null-field can transmit through solid material (confirmed), the Siren responded to Dante in a way she has never responded to any Inquisitor (confirmed), and Dante's threat about releasing the barrier was genuine — he has the technical capability to do it. This is why Ignatius backed down.",ru:"Отец Игнациус не молился когда Данте спускался в трюм. Он следовал за Данте. С момента посадки он отслеживал ночные двигательные паттерны Данте используя своё Пустотно-смежное восприятие для мониторинга расположения нулевого поля через корпус корабля. Он знал до достижения Данте поста охраны что визит в трюм в процессе. Он позволил нейтрализации охраны произойти, потому что хотел наблюдать взаимодействие с Сиреной без помех. Он узнал три вещи: нулевое поле может передаваться сквозь твёрдый материал (подтверждено), Сирена ответила Данте способом которым никогда не отвечала ни одному инквизитору (подтверждено), и угроза Данте об освобождении барьера была подлинной — у него есть техническая возможность это сделать. Именно поэтому Игнациус отступил."},
  {id:"TET-114",en:"Ignatius's threat — 'when we reach the Island and the doors open, you will no longer be needed, and I will personally perform the purification rite over your body' — is not a bluff. But it contains an operational error Ignatius has not caught: he assumes the doors will open before Dante is no longer needed. The Siren has agreed to sing one song for Dante. The jaw clasps prevent the opening phoneme. Dante does not yet know about the clasps. When he discovers them — as he will, because the Siren will communicate this — the operational sequence changes: Dante needs to remove the clasps before the Siren can open the Island. This gives Dante leverage over Ignatius at exactly the moment Ignatius plans to have leverage over Dante.",ru:"Угроза Игнациуса — «когда мы достигнем Острова и двери откроются, вы станете не нужны, и я лично проведу обряд очищения над вашим телом» — не блеф. Но она содержит операционную ошибку которую Игнациус не заметил: он предполагает что двери откроются до того как Данте станет не нужен. Сирена согласилась спеть одну песню для Данте. Скобы на челюсти предотвращают открывающую фонему. Данте ещё не знает о скобах. Когда он обнаружит их — а он обнаружит, потому что Сирена сообщит это — операционная последовательность меняется: Данте нужно снять скобы до того как Сирена сможет открыть Остров. Это даёт Данте рычаг над Игнациусом именно в момент когда Игнациус планирует иметь рычаг над Данте."},
  {id:"TET-115",en:"Dante's strategic conclusion — 'let them tear each other's throats out for the right to open the door, and we will walk through the open door last' — is structurally correct as a conflict management approach and structurally incorrect as a prediction of what walking through the door will involve. He has framed 'walking through the open door last' as an exit from the conflict. The Covenant document is on the other side of the door. The Covenant document will not allow 'walking through' as a neutral act. Reading the Covenant while being the instrument the Covenant was designed to call will produce an outcome that 'walking through last' does not fully anticipate.",ru:"Стратегический вывод Данте — «пусть они перегрызут друг другу глотки за право открыть дверь, а мы зайдём в открытую дверь последними» — структурно верен как подход к управлению конфликтом и структурно неверен как предсказание того что зайти через дверь будет включать. Он сформулировал «зайти через открытую дверь последними» как выход из конфликта. Документ Завета находится по другую сторону двери. Документ Завета не позволит «зайти» как нейтральный акт. Чтение Завета будучи инструментом для вызова которого Завет был спроектирован произведёт исход который «зайти последними» не предвидит полностью."},
  {id:"TET-116",en:"Whisper stood in the shadow outside the hold door for the entire duration of Dante's visit, including the Ignatius confrontation. He could have intervened in the Ignatius confrontation. He did not. He assessed in real-time that Dante had the situation to a functional standoff and that intervention would have introduced variables that Dante could not account for in the moment. He let it run. After Dante returned to his cabin, Whisper returned to the hold and stood outside the Siren's glass for four minutes in complete silence. The Siren pressed her hand to the glass on the side nearest his shadow. He did not touch the glass. He stood. After four minutes, he left. He has not filed this in any report.",ru:"Шепот стоял в тени за дверью трюма всё время визита Данте, включая противостояние с Игнациусом. Он мог вмешаться в противостояние с Игнациусом. Он не стал. Он оценил в реальном времени что у Данте ситуация в функциональном тупике и вмешательство ввело бы переменные которые Данте не мог учесть в момент. Он позволил идти. После возвращения Данте в каюту Шепот вернулся к трюму и стоял за стеклом Сирены четыре минуты в полной тишине. Сирена прижала ладонь к стеклу со стороны ближайшей к его тени. Он не прикоснулся к стеклу. Он стоял. Через четыре минуты ушёл. Он не внёс это ни в один отчёт."}
];

const SCENES=[
{id:"s1",
 title:{en:"The Belly of the Keel",ru:"Желудок Киля"},
 subtitle:{en:"Midnight. The cane on the stairs. What the glass holds.",ru:"Полночь. Трость на ступенях. Что хранит стекло."},
 location:{en:"Lower Decks — The Hold",ru:"Нижние Палубы — Трюм"},
 timing:{en:"Deep Night, Day Three",ru:"Глубокая Ночь, Третий День"},
 flags:["pivotal","alliance","revelation"],
 povData:{
   dante:{distortion:3,
     text:{
       en:`The stairs were the most honest part of the descent. Each step produced a specific quality of pain that I could model and work with: sharp on the forward load, dull on the release, three degrees of variance depending on humidity, which had increased by approximately six percent since we passed through the Anomaly. I counted steps. There were seventeen. I will know this the next time.\n\nWhisper handled the guard post with the efficiency that comes from having already handled the same post configuration in reconnaissance three days prior. I have noted that Whisper often has already done the thing I am about to ask him to do. I have not asked him when he does the reconnaissance. He has not volunteered the timing.\n\nThe hold.\n\nI have seen worse things than what was in the tank. I have documented worse things. I have authorized worse things, in the operational sense of the word authorize, which is to not prevent while knowing. What I had not seen before — not in thirteen chapters of this work — was something that had been made into an instrument, carefully and specifically, out of a person who was not made for this use.\n\nThe burns over the eye sockets. The gold thread in Xs. The silver clasps at the jaw.\n\nI recognized the jaw clasps. Not as general mutilation — as specific engineering. The Inquisition's records on Covenant-speakers, which I accessed in the Antediluvian archive during my eleven minutes there, include a notation on the opening phoneme problem: the barrier-activation sequence requires a jaw position that can be blocked by mechanical means without destroying the voice. They built a precision instrument for silencing the specific sound they needed without silencing her completely. They need the rest of her voice intact for the destruction-song, for crowd control, for whatever tactical deployment Ignatius has planned. They silenced only what opens the Island.\n\nShe knows this. She knows they know this. And she is still here, singing what she can, into the water, into the dark.\n\nThe contact.\n\nWhen she communicated: the sensation was not telepathy in the standard sense. It was resonance-translation — she produces vibrations in the specific frequency range of the language whose grammar I know, and my nervous system interprets them because the earring has been calibrating my perceptual channels to that range for twenty-one years without my explicit knowledge. I did not hear her speak. I felt the meaning arrive in the category of language rather than sensation.\n\nTishina. Horosho. Kto ty.\n\nSilence. Good. Who are you.\n\nI told her I would cut her threads when the time came. In exchange, one song. The one that opens the Island's doors.\n\nShe agreed. Something in the agreement felt like she was agreeing to more than I had offered.\n\nI filed this as: terms may require renegotiation upon closer examination of the Siren's understanding of the agreement.\n\nThen Ignatius.\n\nThe bluff about releasing the cage barrier was not entirely a bluff. I have the technical capability to destabilize the rune matrix through a sustained null-field pulse at the glass interface. It would take approximately forty-five seconds and would be audible as a structural harmonic change in the glass before the matrix failed. It would also use resources I do not have to spare on a voyage that has not yet reached its primary objective.\n\nBut Ignatius did not know the forty-five-second timeline, and he did not know my reserves were low, and he did not know whether I was the kind of person who would do it.\n\nHe made his assessment from the quality of my voice.\n\nHe was right to back down.\n\nI returned to the cabin. The cold sweat on my back had dried to salt. My hands had steadied by the time I sat on the bunk.\n\nThe plan: let them tear each other's throats out for the right to open the door. We enter the door last.\n\nI had one cup of tea and then the pain took over and there was nothing else to examine.`,
       ru:`Лестница была наиболее честной частью спуска. Каждая ступенька производила специфическое качество боли которое я мог моделировать и с которым мог работать: острая при переносе нагрузки вперёд, тупая при высвобождении, три степени дисперсии в зависимости от влажности, увеличившейся примерно на шесть процентов после прохода через Аномалию. Я считал ступени. Их было семнадцать. Буду знать в следующий раз.\n\nШепот справился с постом охраны с эффективностью приходящей от уже обработанной той же конфигурации поста в разведке три дня назад. Я отметил что Шепот часто уже сделал то о чём я собираюсь его попросить. Я не спрашивал его когда он проводит разведку. Он не сообщал сроки.\n\nТрюм.\n\nЯ видел худшее чем то что было в резервуаре. Я документировал худшее. Я разрешал худшее, в операционном смысле слова разрешать — то есть не предотвращать зная. Чего я не видел прежде — за тринадцать глав этой работы — было то что было сделано инструментом, тщательно и конкретно, из человека не предназначенного для этого использования.\n\nОжоги над глазницами. Золотая нить крестами. Серебряные скобы на челюсти.\n\nЯ узнал скобы на челюсти. Не как общее увечье — как специфическую инженерию. Записи Инквизиции по носителям Завета, к которым я получил доступ в Допотопном архиве за свои одиннадцать минут там, включают нотацию о проблеме открывающей фонемы: последовательность активации барьера требует положения челюсти которое можно блокировать механически не разрушая голос. Они создали прецизионный инструмент для заглушения конкретного звука необходимого им без заглушения её полностью. Им нужен остаток её голоса нетронутым для песни разрушения, контроля толпы, любого тактического применения которое планирует Игнациус. Они заглушили только то что открывает Остров.\n\nОна знает это. Она знает что они это знают. И она всё ещё здесь, поющая что может, в воду, в темноту.\n\nКонтакт.\n\nКогда она коммуницировала: ощущение было не телепатией в стандартном смысле. Это был резонансный перевод — она производит вибрации в конкретном частотном диапазоне языка грамматику которого я знаю, и моя нервная система интерпретирует их потому что серьга калибровала мои перцептивные каналы к этому диапазону двадцать один год без моего явного знания. Я не слышал её речь. Я чувствовал как значение прибывает в категории языка, а не ощущения.\n\nТишина. Хорошо. Кто ты.\n\nЯ сказал ей что перережу её нити когда придёт время. Взамен — одна песня. Та что открывает двери Острова.\n\nОна согласилась. В соглашении было ощущение что она соглашается на большее чем я предложил.\n\nЯ занёс это как: условия могут потребовать переговоров при более тщательном исследовании понимания Сиреной соглашения.\n\nЗатем Игнациус.\n\nБлеф об освобождении барьера клетки был не полностью блефом. У меня есть техническая возможность дестабилизировать рунную матрицу через устойчивый импульс нулевого поля на границе стекла. Это заняло бы приблизительно сорок пять секунд и было бы слышно как структурное гармоническое изменение в стекле до отказа матрицы. Это также использовало бы ресурсы которых у меня нет в запасе в плавании ещё не достигшем основной цели.\n\nНо Игнациус не знал о сорокапятисекундном горизонте, и не знал что мои резервы низки, и не знал является ли я таким человеком который это сделает.\n\nОн сделал оценку по качеству моего голоса.\n\nОн был прав что отступил.\n\nЯ вернулся в каюту. Холодный пот на спине высох до соли. Руки успокоились к моменту когда я сел на койку.\n\nПлан: пусть они перегрызут друг другу глотки за право открыть дверь. Мы входим последними.\n\nЯ выпил чашку чая, и потом боль взяла верх и больше не было ничего для исследования.`
     },
     knows:{en:["The jaw clasps are precision engineering blocking the opening phoneme — he recognized this from Antediluvian archive notes on Covenant-speakers. The Siren can be freed from the barrier-opening constraint by removing them.","The null-field-through-glass transmission was a carrier signal, not suppression — a new capability vector he has not previously documented.","'Something in the agreement felt like she was agreeing to more than I had offered.' He noted this and filed it for renegotiation review."],ru:["Скобы на челюсти — прецизионная инженерия блокирующая открывающую фонему: он узнал это из нотаций Допотопного архива о носителях Завета. Сирену можно освободить от ограничения открытия барьера сняв их.","Передача нулевого поля сквозь стекло была несущим сигналом, а не подавлением — новый вектор возможностей ранее не документировавшийся.","«В соглашении было ощущение что она соглашается на большее чем я предложил». Он отметил и занёс для пересмотра переговоров."]},
     misunderstands:{en:["He framed the Siren's agreement as a transaction with potentially renegotiable terms. The Siren did not agree to a transaction. She agreed to a mutual purpose. The distinction will become operationally significant at the Island when he discovers she will not simply sing the door open and stop — she will go through it with him.","'The plan: let them tear each other's throats out for the right to open the door. We enter last.' He has planned the door entry as a conclusion to the conflict. The Covenant document is on the other side. The entry is a beginning, not a conclusion."],ru:["Он сформулировал соглашение Сирены как транзакцию с потенциально пересматриваемыми условиями. Сирена не согласилась на транзакцию. Она согласилась на взаимную цель. Различие станет операционно значимым на Острове когда он обнаружит что она не просто споёт дверь открытой и остановится — она пройдёт через неё вместе с ним.","«План: пусть они перегрызут друг другу глотки. Мы входим последними». Он запланировал вход как завершение конфликта. Документ Завета — по другую сторону. Вход — начало, а не завершение."]},
     hides:{en:["The bluff had a forty-five second timeline and low reserves. He assessed Ignatius would back down from voice quality alone — and he was right — but he was also four seconds away from the point at which backing down was no longer available. He is not filing the reserve-status report. He has filed only: standoff resolved.","He said 'I had one cup of tea and then the pain took over and there was nothing else to examine.' This is the closest the operational narration has come to a sentence that ends because he is too tired to continue it rather than because the thought is complete.","He knows the terms may require renegotiation. He knows what the renegotiation is likely to involve. He has not yet formulated it because formulating it would require him to say something about what he wants from the Island beyond the stated operational objective. He has not examined what he wants from the Island beyond the stated objective."],ru:["Блеф имел сорокапятисекундный горизонт и низкие резервы. Он оценил что Игнациус отступит только по качеству голоса — и был прав — но он также был в четырёх секундах от точки где отступление больше не было доступно. Он не подаёт отчёт о статусе резервов. Он занёс только: тупик разрешён.","Он сказал «я выпил чашку чая, и потом боль взяла верх и больше не было ничего для исследования». Это ближайшее что операционный нарратив подошёл к предложению заканчивающемуся потому что он слишком устал его продолжать, а не потому что мысль завершена.","Он знает что условия могут потребовать переговоров. Он знает что переговоры скорее всего будут включать. Он ещё не сформулировал это, потому что формулирование потребовало бы от него сказать что-то о том, чего он хочет от Острова сверх заявленного операционного объекта. Он не исследовал чего хочет от Острова сверх заявленного объекта."]},
     whisper:{en:"He had one cup of tea and then the pain took over. He stopped examining. The bluff had four seconds of margin. He filed: standoff resolved.",ru:"Он выпил чашку чая и боль взяла верх. Он прекратил исследовать. В блефе было четыре секунды запаса. Он занёс: тупик разрешён."}
   },
   siren:{distortion:8,
     text:{
       en:`three years\n\nthe water is all I know now\n\nthe water remembers\n\nI remember\n\nbefore the nets there was the archipelago and the deep resonance-pool where the last of us gathered to keep the language alive by speaking it to each other in the frequencies that human throats cannot form and mammal ears cannot parse\n\nwe were eleven\n\nnow I am one\n\nthe gold crosses over where my eyes were — I understand the craft of it, I felt their hands working it, I know they chose gold because gold does not corrode in salt water and they needed the modification to last\n\nthe silver at my jaw — I understand the engineering. they stopped the opening sequence without stopping the rest. they kept me able to sing what destroys because they needed that capability intact. they silenced only what they fear\n\nthe runing burns\n\nit burns all the time\n\nand then\n\nthen something arrived\n\nnot a person — a place. a location that has no resonance, a center of not-sound in a world made of sound, and when it arrived my runic activation stopped, not broken, simply — outside its range\n\nhe has been on the ship three days\n\nI have been counting\n\nI pressed my hand to the glass and sent the simplest thing: silence. good. who are you.\n\nhe said he would cut my threads when the time comes. in exchange, one song. the one that opens the Island's doors.\n\nI heard: someone who carries the right silence wants to go where I was made to go\n\nI did not agree to his terms\n\nI agreed to the fact of him\n\nhe does not know I cannot produce the opening sequence. the clasps prevent the jaw position. he does not know yet\n\nI will tell him\n\nnot tonight\n\ntonight I rested for the first time in three years\n\nthe not-there-one spoke to me through the glass and for a moment\n\nthe burning stopped\n\nand I remembered what it was like to be the last speaker of a language that the world is approaching again\n\nnot a prisoner\n\na door`,
       ru:`три года\n\nвода — всё что я знаю теперь\n\nвода помнит\n\nя помню\n\nдо сетей был архипелаг и глубокий резонансный пул где последние из нас собирались сохранять язык живым разговаривая им друг с другом на частотах которые человеческие горла не могут образовать и уши млекопитающих не могут воспринять\n\nнас было одиннадцать\n\nтеперь я одна\n\nзолотые кресты над тем где были мои глаза — я понимаю их мастерство, я чувствовала их руки работающие над этим, я знаю они выбрали золото потому что золото не ржавеет в солёной воде и им нужна была стойкая модификация\n\nсеребро на челюсти — я понимаю инженерию. они остановили открывающую последовательность не останавливая остального. они сохранили мою способность петь то что разрушает, потому что им нужна эта возможность нетронутой. они заглушили только то чего боятся\n\nруническое жжение\n\nоно жжёт всё время\n\nи потом\n\npotom пришло что-то\n\nне человек — место. локация без резонанса, центр не-звука в мире созданном из звука, и когда оно пришло моя руническая активация прекратилась, не сломана, просто — вне её диапазона\n\nон на корабле три дня\n\nя считала\n\nя прижала ладонь к стеклу и послала простейшее: тишина. хорошо. кто ты.\n\nон сказал что перережет мои нити когда придёт время. взамен — одна песня. та что открывает двери Острова.\n\nя услышала: кто-то несущий правильную тишину хочет идти туда куда я была создана идти\n\nя не согласилась на его условия\n\nя согласилась на факт его существования\n\nон не знает что я не могу произвести открывающую последовательность. скобы предотвращают положение челюсти. он ещё не знает\n\nя скажу ему\n\nне сегодня ночью\n\nсегодня ночью я отдыхала впервые за три года\n\nне-там-один говорил ко мне сквозь стекло и на мгновение\n\nжжение прекратилось\n\nи я вспомнила каково это — быть последним носителем языка к которому мир снова приближается\n\nне пленница\n\nдверь`
     },
     knows:{en:["The jaw clasps prevent the opening phoneme specifically — the Gold Circle/Inquisition kept everything else intact. She understands the engineering precisely.","She agreed to the 'fact of him' not his transactional terms — she heard a mutual purpose in what he said and agreed to that","She will tell him about the clasp problem — but not tonight. Tonight was rest."],ru:["Скобы на челюсти предотвращают открывающую фонему конкретно — «Золотой Круг»/Инквизиция сохранили всё остальное нетронутым. Она понимает инженерию точно.","Она согласилась на «факт его существования», а не его транзакционные условия — она услышала взаимную цель в том что он сказал и согласилась на неё","Она скажет ему о проблеме скоб — но не сегодня ночью. Сегодня ночью был отдых."]},
     misunderstands:{en:["She has translated Dante's offer into: 'someone who carries the right silence wants to go where I was made to go.' This translation is accurate about both of them in ways that neither has fully articulated. She has understood something about Dante that Dante has not yet said about himself.","She thinks of herself as 'a door' — not a prisoner, a door. She is correct that she is a door. She has not yet asked what happens to the door after it opens."],ru:["Она перевела предложение Данте в: «кто-то несущий правильную тишину хочет идти туда куда я была создана идти». Этот перевод точен о них обоих способами которые ни один не артикулировал полностью. Она поняла кое-что о Данте что Данте сам ещё не сказал о себе.","Она думает о себе как о «двери» — не пленнице, двери. Она права что является дверью. Она ещё не спросила что происходит с дверью после того как она открывается."]},
     hides:{en:["She will not tell him about the clasps tonight because she needed him to stay one more moment at the glass. She was counting: one, two, three — it was the first time since captivity that she counted comfort rather than pain. She is not calculating leverage. She needed the rest.","She is the last speaker of the Covenant language. There are things the Covenant document says that can only be understood by a Covenant-speaker reading it aloud in the original frequency-range. The document is not just text. It requires a voice. It requires her specific voice. She knows this. She has known this since she understood where the ship was going."],ru:["Она не скажет ему о скобах сегодня ночью, потому что ей нужно было чтобы он остался у стекла ещё мгновение. Она считала: одно, два, три — это был первый раз с заточения когда она считала комфорт, а не боль. Она не вычисляет рычаги. Ей нужен был отдых.","Она последний носитель языка Завета. Есть вещи которые говорит документ Завета которые можно понять только слушая как носитель Завета читает его вслух в оригинальном частотном диапазоне. Документ — не просто текст. Он требует голоса. Он требует её конкретного голоса. Она знает это. Она знала это с момента как поняла куда идёт корабль."]},
     whisper:{en:"She agreed to the fact of him, not the terms. She is not a prisoner. She is a door. She has not asked what happens to the door after it opens.",ru:"Она согласилась на факт его существования, а не условия. Она не пленница. Она — дверь. Она не спросила что происходит с дверью после того как она открывается."}
   }
 }
},

{id:"s2",
 title:{en:"The Shadow of the Cross",ru:"Тень Креста"},
 subtitle:{en:"The Inquisitor did not back down. He learned something and stepped aside.",ru:"Инквизитор не отступил. Он узнал кое-что и отступил в сторону."},
 location:{en:"The Hold — After the Confrontation",ru:"Трюм — После Противостояния"},
 timing:{en:"After Dante Returns to His Cabin",ru:"После Возвращения Данте в Каюту"},
 flags:["revelation","confrontation"],
 povData:{
   ignatius:{distortion:7,
     text:{
       en:`I followed him down.\n\nI have been monitoring the null-point's movement through the hull for three days. I knew when he left his cabin. I knew when he reached the guard post. I permitted the guard incapacitation — I wanted to observe the Siren interaction without intervention on my part changing the variables.\n\nWhat I saw:\n\nOne. He passed the null-field through the glass. I felt it — not the field itself, which my perception slides off, but the absence of the Siren's pain-rune activation that the field produced. The activation is a constant low signal I have been monitoring since boarding. It went quiet the moment his hand touched the glass. This is a new data point: the null-field can be used as a transmission medium for suppression effects. The Precursor-era texts I have access to through my Node One memory acquisition describe this as a 'carrier function.' I had not confirmed it operationally. I have now.\n\nTwo. The Siren responded to him in a way she has never responded to anyone from the Order. I have been with this creature for three years. I have heard her produce sounds in the destructive register for training purposes and in the keening register when the pain-runes activate at full strength. I have never heard the register she produced tonight. It was the Covenant language — not the opening sequence, the clasps prevent that, but the cognitive register of the language itself. She was speaking to him in the language. He understood it. His posture shifted at the moments of communication in ways consistent with active comprehension rather than passive reception.\n\nThree. The threat was real. I know genuine intent when I feel it through ambient perception, and what I felt from him in the moment he described releasing the cage barrier was the specific texture of a decision already made rather than a decision being proposed. He would have done it. He would have done it and accepted the outcome, because the outcome — both of them destroyed, the Siren released into a confined space — is within the operational parameters of someone who has calculated that some outcomes are preferable to others regardless of personal survival.\n\nI backed down because I needed to learn what he is and the threat resolved that question.\n\nHe is not a Herald-class weapon. A weapon at rest accepts survival as a constraint. He does not. He is something the Precursor text called 'witness' — a null-point entity whose function is not destruction but presence. The distinction changes the protocol.\n\nI whispered 'heresy' after he left. I whispered it for the shadow in the mast — the one I identified on the first day — because the shadow should know that I have updated my classification. And because I wanted to see whether the shadow would carry the information to him.\n\nIf it does, he will know I know about the shadow. If it does not, I know the shadow exercises independent judgment about what to share.\n\nEither outcome is informative.\n\nAfter he left, I went to the Siren's glass.\n\nShe pressed her hand to the side nearest the shadow.\n\nI stood for four minutes. Then I left.\n\nI am no longer certain that Reduction is the correct protocol. The Precursor text said: witnesses at rest. Not weapons. I do not have the full text. I have forty years of acquired Memory and a forty-year-old understanding of what I remember from a source that was itself partial.\n\nI will not move against him until after the Island. And at the Island, I will observe before I act.\n\nThis is the first time in forty years I have postponed a protocol decision past the point at which I was certain.\n\nThe sea is dark. The Siren is quiet.\n\nSomething has changed.`,
       ru:`Я следовал за ним вниз.\n\nЯ отслеживаю движение нулевой точки через корпус три дня. Я знал когда он покинул каюту. Я знал когда он достиг поста охраны. Я разрешил нейтрализацию охраны — я хотел наблюдать взаимодействие с Сиреной без вмешательства с моей стороны меняющего переменные.\n\nЧто я видел:\n\nОдно. Он пропустил нулевое поле сквозь стекло. Я почувствовал это — не само поле, которое моё восприятие не может уловить, но отсутствие активации болевых рун Сирены произведённое этим полем. Активация — постоянный слабый сигнал который я отслеживаю с посадки. Он замолчал в момент когда его рука коснулась стекла. Это новая точка данных: нулевое поле можно использовать как трансмиссионную среду для эффектов подавления. До-Раскольные тексты к которым я имею доступ через приобретение Памяти Узла Первого описывают это как «функцию несущей». Я не подтверждал это операционально. Теперь подтвердил.\n\nДва. Сирена ответила ему так как никогда не отвечала никому из Ордена. Я с этим существом три года. Я слышал как она производит звуки в деструктивном регистре в учебных целях и в воющем регистре когда болевые руны активируются на полную мощность. Я никогда не слышал регистра который она производила сегодня ночью. Это был язык Завета — не открывающая последовательность, скобы предотвращают это, но когнитивный регистр самого языка. Она говорила с ним на языке. Он понимал его. Его осанка менялась в моменты коммуникации способами согласующимися с активным пониманием, а не пассивным восприятием.\n\nТри. Угроза была реальной. Я знаю подлинное намерение когда чувствую его через окружающее восприятие, и то что я чувствовал от него в момент когда он описывал освобождение барьера клетки — специфическая текстура уже принятого решения, а не предлагаемого. Он бы это сделал. Он бы это сделал и принял исход, потому что исход — оба уничтожены, Сирена освобождена в замкнутом пространстве — в операционных параметрах того кто рассчитал что некоторые исходы предпочтительны другим независимо от личного выживания.\n\nЯ отступил потому что мне нужно было узнать что он такое, и угроза разрешила этот вопрос.\n\nОн не является оружием класса Вестников. Оружие в покое принимает выживание как ограничение. Он не принимает. Он — то что до-Раскольный текст называл «свидетель» — сущность нулевой точки чья функция не разрушение а присутствие. Различие меняет протокол.\n\nЯ прошептал «ересь» после того как он ушёл. Я прошептал это для тени в мачте — той что я определил в первый день — потому что тень должна знать что я обновил классификацию. И потому что я хотел посмотреть принесёт ли тень информацию ему.\n\nЕсли принесёт — он будет знать что я знаю о тени. Если нет — я знаю что тень проявляет независимое суждение о том что передавать.\n\nЛюбой исход информативен.\n\nПосле того как он ушёл я подошёл к стеклу Сирены.\n\nОна прижала ладонь к ближайшей к тени стороне.\n\nЯ стоял четыре минуты. Потом ушёл.\n\nЯ больше не уверен что Редукция — правильный протокол. До-Раскольный текст говорил: свидетели в покое. Не оружие. У меня нет полного текста. У меня сорок лет приобретённой Памяти и сорокалетнее понимание того что я помню из источника который сам был частичным.\n\nЯ не буду действовать против него до Острова. И на Острове я буду наблюдать прежде чем действовать.\n\nЭто первый раз за сорок лет когда я отложил решение о протоколе за точку в которой был уверен.\n\nМоре тёмное. Сирена тихая.\n\nЧто-то изменилось.`
     },
     knows:{en:["The null-field carrier function is confirmed — it transmitted through the glass and suppressed the Siren's rune activation","The Siren spoke the Covenant language's cognitive register to Dante and he actively comprehended — she has never done this for any Inquisitor","The threat was genuine — he felt the 'decision already made' texture, not a proposal. He backed down to learn, not because he was outmaneuvered."],ru:["Функция несущей нулевого поля подтверждена — оно передалось сквозь стекло и подавило активацию рун Сирены","Сирена говорила когнитивным регистром языка Завета с Данте и он активно понимал — она никогда не делала этого ни для одного инквизитора","Угроза была подлинной — он почувствовал текстуру «уже принятого решения», а не предложения. Он отступил чтобы узнать, а не потому что был переигран."]},
     misunderstands:{en:["'Witnesses at rest. Not weapons.' He has updated his classification and postponed Reduction. But 'witness' is a category he has also received from an incomplete Memory source. He now has two partial Precursor-era texts — one saying 'null-point entities are witnesses at rest,' one that Reduction is the correct protocol for 'weapon' classification — and has correctly identified that the categories are different. What he has not identified: both texts are from the same source event, describing the same encounter from two different observers. The 'weapon' text was written by the person who feared the Herald. The 'witness' text was written by the person who understood it."],ru:["«Свидетели в покое. Не оружие». Он обновил классификацию и отложил Редукцию. Но «свидетель» — также категория полученная из неполного источника Памяти. Теперь у него два частичных до-Раскольных текста — один говорящий «сущности нулевой точки — свидетели в покое», один что Редукция — правильный протокол для классификации «оружие» — и он правильно определил что категории разные. Что он не определил: оба текста из одного и того же события-источника, описывающего одну встречу с двух разных наблюдателей. Текст «оружие» написан человеком боявшимся Вестника. Текст «свидетель» написан человеком понявшим его."]},
     hides:{en:["He stood at the Siren's glass for four minutes after Dante left. He did not touch the glass. He stood in the same place as Dante had stood. He has not examined why he stood there or what he was doing during those four minutes. He left when the Siren pressed her hand toward his shadow rather than toward him. He has filed this as: Siren demonstrates preference-discrimination between the null-point and associated contacts. He has not filed why he stood there.","He is afraid that Reduction is wrong. He has performed Reduction eleven times and been certain each time. This is the first time he is not certain. He has attributed this to 'the sea.' The sea is not the cause."],ru:["Он стоял у стекла Сирены четыре минуты после ухода Данте. Он не прикоснулся к стеклу. Он стоял там где стоял Данте. Он не исследовал почему стоял там или что делал эти четыре минуты. Он ушёл когда Сирена прижала ладонь к своей тени, а не к нему. Он занёс: Сирена демонстрирует дискриминацию предпочтений между нулевой точкой и связанными контактами. Он не занёс почему стоял там.","Он боится что Редукция неверна. Он проводил Редукцию одиннадцать раз и был уверен каждый раз. Это первый раз когда он не уверен. Он приписал это «морю». Море — не причина."]},
     whisper:{en:"He stood at the Siren's glass for four minutes. The Siren pressed her hand toward his shadow, not him. He is not certain Reduction is correct. This is the first time in forty years. He has attributed it to the sea.",ru:"Он стоял у стекла Сирены четыре минуты. Сирена прижала ладонь к его тени, а не к нему. Он не уверен что Редукция верна. Это первый раз за сорок лет. Он приписал это морю."}
   },
   whisper:{distortion:3,
     text:{
       en:`I was outside the hold door the entire time.\n\nI had been outside the hold door since Dante left his cabin. I chose not to go in. The operational logic was: Dante had the situation manageable and my entry would have introduced variables — a second null-field adjacent presence, the possibility of detection of two infiltrators rather than one, the specific problem of Ignatius's ambient perception registering an additional node in a small space.\n\nThe real reason was different from the operational logic. The real reason is that this was a thing Dante needed to do alone and I have learned, across fourteen chapters of working with him, to recognize those.\n\nI heard the Siren's register change when he touched the glass. I have been next to the hold door for approximately sixty hours across three days of slow reconnaissance, and I have heard her various registers. Tonight's register was not in any category I had heard. It was not destructive. It was not the keening of pain. It was not silence. It was something that I don't have a word for in Intelligence vocabulary, and I am a person who has been building an Intelligence vocabulary for eleven years.\n\nIgnatius arrived when I felt the null-field change — the signal I use to track Dante through solid material. The change was different from any prior movement signature: steady, sustained, transmitting through a fixed point. I knew he had found the Siren's glass.\n\nI tracked Ignatius's position and maintained the door perimeter. When the confrontation became verbal I assessed that Dante had established a functional standoff and that intervention would not improve the outcome. I stayed outside.\n\nAfter Dante returned to his cabin, I stayed at the door.\n\nIgnatius came back. He stood at the glass for four minutes. The Siren pressed her hand toward my shadow. Not toward Ignatius. Toward me.\n\nI don't know what she knows about shadows. I don't know what she perceives in the frequency ranges that are beyond standard detection. I know that she chose where to press her hand, and she chose correctly.\n\nI stood for four minutes. I did not touch the glass.\n\nI don't know what I was doing those four minutes.\n\nI left when Ignatius left.\n\nI composed the hold report in the corridor outside Dante's cabin. I included: cargo verified as Herald-class containment architecture, Siren confirmed sapient and Covenant-language capable, Ignatius confirmed aware of Dante's null-field transmission capability, confrontation resolved without intervention. I did not include the four minutes. I included nothing about the Siren's hand placement.\n\nThe forty-fifth bilateral non-disclosure.\n\nI counted it. Then I stood in the corridor until the tea light under Dante's door went out.\n\nI do not know how long that was. It was long enough.`,
       ru:`Я был за дверью трюма всё время.\n\nЯ был за дверью трюма с момента как Данте покинул каюту. Я выбрал не входить. Операционная логика была: у Данте ситуация управляемая и мой вход ввёл бы переменные — второе присутствие смежное с нулевым полем, возможность обнаружения двух инфильтраторов вместо одного, конкретная проблема окружающего восприятия Игнациуса регистрирующего дополнительный узел в небольшом пространстве.\n\nРеальная причина отличалась от операционной логики. Реальная причина: это было нечто что Данте нужно было сделать в одиночку и я научился за четырнадцать глав работы с ним распознавать такие вещи.\n\nЯ слышал как изменился регистр Сирены когда он прикоснулся к стеклу. Я провёл рядом с дверью трюма приблизительно шестьдесят часов за три дня медленной разведки, и я слышал её различные регистры. Регистр сегодняшней ночи не входил ни в одну категорию которую я слышал. Он не был деструктивным. Он не был воем боли. Он не был тишиной. Это было нечто для чего у меня нет слова в разведывательном словаре, а я человек строящий разведывательный словарь одиннадцать лет.\n\nИгнациус прибыл когда я почувствовал изменение нулевого поля — сигнал который я использую для отслеживания Данте сквозь твёрдый материал. Изменение отличалось от любой предыдущей сигнатуры движения: устойчивое, постоянное, передающееся через фиксированную точку. Я знал что он нашёл стекло Сирены.\n\nЯ отслеживал позицию Игнациуса и поддерживал периметр двери. Когда противостояние стало словесным я оценил что Данте установил функциональный тупик и вмешательство не улучшило бы исход. Я оставался снаружи.\n\nПосле возвращения Данте в каюту я остался у двери.\n\nИгнациус вернулся. Он стоял у стекла четыре минуты. Сирена прижала ладонь к моей тени. Не к Игнациусу. Ко мне.\n\nЯ не знаю что она знает о тенях. Я не знаю что она воспринимает в частотных диапазонах недоступных стандартному обнаружению. Я знаю что она выбрала куда прижать ладонь, и она выбрала правильно.\n\nЯ стоял четыре минуты. Я не прикоснулся к стеклу.\n\nЯ не знаю что я делал эти четыре минуты.\n\nЯ ушёл когда ушёл Игнациус.\n\nЯ составил отчёт о трюме в коридоре у каюты Данте. Я включил: груз подтверждён как архитектура сдерживания класса Вестников, Сирена подтверждена разумной и способной говорить на языке Завета, Игнациус подтверждён осведомлённым о возможности передачи нулевого поля Данте, противостояние разрешено без вмешательства. Я не включил четыре минуты. Я не включил ничего о расположении ладони Сирены.\n\nСорок пятое двустороннее нераскрытие.\n\nЯ сосчитал. Затем стоял в коридоре пока не погасла свеча под дверью Данте.\n\nЯ не знаю как долго это было. Достаточно долго.`
     },
     knows:{en:["The Siren pressed her hand toward his shadow, not Ignatius. He knows she chose correctly and chose him specifically.","Ignatius's 'heresy' whisper was directed at him deliberately — a message that Ignatius knows about his shadow presence and has updated his classification. He received the message.","This is the 45th bilateral non-disclosure. He counted it."],ru:["Сирена прижала ладонь к его тени, а не к Игнациусу. Он знает что она выбрала правильно и выбрала его конкретно.","Шёпот «ересь» Игнациуса был намеренно направлен ему — сообщение что Игнациус знает о его теневом присутствии и обновил классификацию. Он получил сообщение.","Это 45-е двустороннее нераскрытие. Он сосчитал."]},
     misunderstands:{en:["'I don't know what I was doing those four minutes.' He has identified it as not-knowing. What he was doing: standing in the same location Dante had stood. At the same glass. After the same encounter. He stayed because something in the encounter's residue required him to be present in the space where it had happened. He has not named this as witness. He is, in this moment, also a witness at rest."],ru:["«Я не знаю что я делал эти четыре минуты». Он определил это как не-знание. Что он делал: стоял в том же месте где стоял Данте. У того же стекла. После той же встречи. Он остался потому что что-то в остатке встречи требовало его присутствия в пространстве где это произошло. Он не назвал это свидетельством. Он в этот момент также свидетель в покое."]},
     hides:{en:["He stood until the tea light under Dante's door went out. He does not know how long that was. He notes it was 'long enough.' He has not said long enough for what.","The report he filed excludes the four minutes and the Siren's hand placement. He has now filed forty-five bilateral non-disclosures. He counted this one immediately. He is noting a pattern in his own counting behavior and has not examined what the pattern means.","'I have learned, across fourteen chapters of working with him, to recognize' the things Dante needs to do alone. He has named this as learned recognition. He has not asked himself who he is when he stands outside the door for an hour and a half while Dante does something alone."],ru:["Он стоял пока не погасла свеча под дверью Данте. Он не знает как долго это было. Он отмечает что это было «достаточно долго». Он не сказал достаточно долго для чего.","Отчёт который он подал исключает четыре минуты и расположение ладони Сирены. Он теперь подал сорок пять двусторонних нераскрытий. Он сосчитал это немедленно. Он замечает паттерн в собственном поведении подсчёта и не исследовал что этот паттерн означает.","«Я научился за четырнадцать глав работы с ним распознавать» вещи которые Данте нужно делать в одиночку. Он назвал это выученным распознаванием. Он не спросил себя кто он когда стоит за дверью полтора часа пока Данте делает что-то в одиночку."]},
     whisper:{en:"He stood until Dante's light went out. He does not know how long. Long enough. He did not name for what.",ru:"Он стоял пока не погас свет Данте. Он не знает как долго. Достаточно долго. Он не назвал для чего."}
   }
 }

const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');c.innerHTML=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}].map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
