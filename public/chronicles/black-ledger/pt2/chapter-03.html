#narrative-text{font-size:20px;line-height:1.9;color:var(--pov-t);position:relative;z-index:1;}
#narrative-text p{margin-bottom:1.3em;}

@keyframes flicker-mid{0%,88%,100%{opacity:1;}90%{opacity:.75;}93%{opacity:.68;}94%{opacity:1;}}
#whisper-panel{background:var(--bg2);border:1px solid var(--border);border-top:none;border-left:3px solid var(--pov-p);padding:15px 40px 17px;margin-bottom:12px;opacity:0;transform:translateY(-2px);transition:opacity 1.6s,transform 1.2s;pointer-events:none;}

@media(max-width:640px){#app{padding:0 16px 100px;}#narrative-panel{padding:24px 18px;}#whisper-panel{padding:12px 18px 14px;}.dist-meter{margin-left:0;margin-top:8px;}.scene-time{margin-left:0;}#lang-bar{top:10px;right:10px;}#narrative-text{font-size:18px;}}

const UI={
  en:{arcLabel:"BOOK IV: AUDITOR — EMPIRE OF SHADOWS / ARC I — LIQUIDITY CRISIS",headerTitle:"Chronicles of the Fallen World: Book IV",headerSubtitle:"AUDITOR: EMPIRE OF SHADOWS",stripChapter:"Chapter 3",stripTitle:"Sovereign Debt",stripLocation:"Royal Palace / Cathedral of Eternal Flame / Port Margrave",povLabel:"Perspective",distLabel:"Distortion",whisperLabel:"◆ Subtext",intelLabel:"Intelligence Report — Click to Expand",knows:"Knows",misunderstands:"Misunderstands",hides:"Hides",prevBtn:"← Prev",nextBtn:"Next →",ledgerTitle:"True Event Timeline — Classified",ledgerWarning:"Diverges from all POV accounts",ledgerOpen:"✕ Close Ledger",ledgerClosed:"◆ Black Ledger",scene:"Scene"},

  dante:{name:"DANTE",title:{en:"The Auditor — Arc I Resolution",ru:"Аудитор — Разрешение Арки I"},primary:"#2a0058",secondary:"#6a30aa",glow:"rgba(42,0,88,0.2)",textColor:"#d8cef8",dimColor:"rgba(106,48,170,0.5)"},
  liliana:{name:"LILIANA",title:{en:"Princess — Imperial Reform Committee Head",ru:"Принцесса — Глава Комитета Имперских Реформ"},primary:"#003828",secondary:"#006a48",glow:"rgba(0,56,40,0.22)",textColor:"#c0e8d8",dimColor:"rgba(0,106,72,0.48)"},
  ludovic:{name:"LUDOVIC",title:{en:"Prince-Regent — The Debtor",ru:"Принц-Регент — Должник"},primary:"#302000",secondary:"#6a4810",glow:"rgba(48,32,0,0.22)",textColor:"#e0c890",dimColor:"rgba(106,72,16,0.5)"}

const TIMELINE=[
  {id:"TET-B4-15",en:"Ludovic's drug of choice — 'Dream' crystallized extract — is a new compound from Isabella's laboratories that Dante did not know had entered the palace distribution network. Isabella's Vivisection Sector has been producing pharmaceutical-grade altered-consciousness compounds as a side product of the Gel-biological integration research. Dream is the stabilized, non-lethal fraction of a failed chimera-suppression compound. It produces approximately eight hours of euphoric dissociation and leaves no physical addiction markers in standard medical tests. The dealers who brought it to the palace are operating under Guild supply chain infrastructure without specific authorization from Dante — this is the first Guild-adjacent operation that has occurred without his knowledge. Isabella is running her own distribution network.",ru:"Наркотик Людовика по выбору — кристаллизованный экстракт «Мечты» — новое соединение из лаборатории Изабеллы о котором Данте не знал что оно попало в дворцовую дистрибуционную сеть. Сектор Вивисекции Изабеллы производит фармацевтические препараты изменённого сознания как побочный продукт исследования биологической интеграции с Гелем. «Мечта» — стабилизированная нелетальная фракция провального соединения подавления химер. Она производит приблизительно восемь часов эйфорической диссоциации и не оставляет физических маркеров зависимости в стандартных медицинских тестах. Дилеры принёсшие её во дворец работают под инфраструктурой цепочки поставок Гильдии без конкретного разрешения Данте."},
  {id:"TET-B4-16",en:"Ludovic's letter to Ambassador Zhang represents the first external geopolitical actor entering the narrative. The Eastern power whose ambassador Zhang represents has been conducting economic intelligence on the Guild's northern operations for approximately three months — their attaches identified the Gel production capability and its strategic significance before Dante had established the political legitimacy framework in the capital. They were not waiting for Dante to move first. They were waiting to see which domestic faction would be most receptive to an approach. Ludovic's vulnerability makes him the most accessible contact point. The Eastern power's interest is not in supporting Ludovic specifically. It is in disrupting the Guild's northern supply chain before the Guild's political consolidation makes disruption prohibitively expensive.",ru:"Письмо Людовика послу Чжану представляет первого внешнего геополитического актора входящего в нарратив. Восточная держава чей посол представляет Чжана проводила экономическую разведку северных операций Гильдии приблизительно три месяца — их атташе определили возможность производства Геля и её стратегическое значение до того как Данте установил рамку политической легитимности в столице. Они ждали не пока Данте сделает первый ход. Они ждали чтобы увидеть какая внутренняя фракция будет наиболее восприимчива к подходу."},
  {id:"TET-B4-17",en:"Moriус's decision to comply — writing the order to unfreeze the Guild accounts — was correct as an immediate tactical choice. He assessed that fighting Dante now, with the Registry lost and Liliana installed, costs more than compliance. He is correct. What he has not assessed: compliance establishes a precedent. Every subsequent time the Guild requires institutional cooperation from the Church, it will reference this compliance as the baseline. Dante has not merely gotten accounts unfrozen. He has established that the Church is a compliant institution when properly leveraged. This changes the Church's institutional posture from a potential adversary to a manageable constraint.",ru:"Решение Мориуса подчиниться — написание приказа о разморозке счетов Гильдии — было верным как немедленный тактический выбор. Он оценил что борьба с Данте сейчас, с потерянным Реестром и установленной Лилианой, стоит больше чем подчинение. Он прав. Что он не оценил: подчинение устанавливает прецедент. Каждый последующий раз когда Гильдии потребуется институциональное сотрудничество Церкви, она будет ссылаться на это подчинение как базовый уровень. Данте не просто разморозил счета. Он установил что Церковь является подчинённой институцией при правильном использовании рычага."},
  {id:"TET-B4-18",en:"The crisis at Object 7-B — Code Black, perimeter lost, machines stalling, Gel thickening in the pipes, a sound that transmitted vibration to the capital through the communication crystal — is not a tribal uprising. It is a Covenant-resonance event. The shamans' claim that Torin 'woke the blood of the earth' is acoustically accurate: the drilling at Widow's Gorge and Ymir's Peak penetrated a Precursor-era resonance node — a secondary Covenant maintenance structure, one of the seventeen secondary sites that the donor-memory archive classified as outstanding objectives. The 'blood of the earth' that the shamans detected is the Covenant's dormant activation signal. Torin's drilling disrupted the dormancy layer. The object producing the low vibration that shook the capital's windows is not a creature. It is an awakening Precursor-infrastructure system responding to the disruption of its protective boundary layer.",ru:"Кризис на Объекте 7-Б — Код Чёрный, потеря периметра, глохнущие машины, густеющий в трубах Гель, звук передавший вибрацию в столицу через коммуникационный кристалл — не племенное восстание. Это событие резонанса Завета. Утверждение шаманов что Торин «разбудил кровь земли» акустически точно: бурение в Ущелье Вдов и на Пике Имира пробило резонансный узел эпохи Предтечей — вторичную структуру обслуживания Завета, один из семнадцати вторичных объектов классифицированных архивом донорской памяти как незавершённые цели. «Кровь земли» которую обнаружили шаманы — дремлющий активационный сигнал Завета."},
  {id:"TET-B4-19",en:"'We are going to kill myths.' — This is the sentence Dante said as he left the Citadel for the armored train. He has framed the crisis as a mythological disruption — local shaman beliefs producing tribal resistance — rather than as a Covenant-infrastructure awakening. He is heading to Object 7-B with an armored train, combat-configured weapons systems, and Isabella's unstable chimeras, prepared for a human insurgency. He is not prepared for a Precursor-era secondary site activation event. The armored train is the correct vehicle for human insurgency. It is the wrong vehicle for what is actually happening at the northern site."},
  {id:"TET-B4-20",en:"Isabella's 'chimeras' — described as 'all of them, even the unstable ones' — are the first output of the Vivisection Sector's biological modification program. In three months of research with the Gel sample Dante sent her, Isabella has produced what she described as 'people who will stop being human.' The unstable chimeras are subjects whose Gel integration has passed the point of enhancement and is progressing toward the terminal architecture she described in Chapter 24 — the state where the biological tissue has been sufficiently replaced that the neural architecture cannot process the composite's signal load. The unstable chimeras are dying. They are also, in their current state, the most combat-capable biological systems Isabella has ever produced. She is bringing them to a battlefield because they will be used, and then they will be gone, and she will have data."}
];

const SCENES=[
{id:"s1",
 title:{en:"Family Breakfast",ru:"Семейный Завтрак"},
 subtitle:{en:"Your creditor is no longer the bank. Your creditor is me. And the interest on this credit is your obedience.",ru:"Твой кредитор — больше не банк. Твой кредитор — я. И проценты по этому кредиту — твоё послушание."},
 location:{en:"Royal Palace — Ludovic's Chambers",ru:"Королевский Дворец — Покои Людовика"},
 timing:{en:"Morning — Day After the Bank Operation",ru:"Утро — День После Банковской Операции"},
 flags:["social_combat","pivotal"],
 povData:{
   liliana:{distortion:3,
     text:{
       en:`The palace smells of rot beneath the gold.\n\nThis is not a metaphor. The ventilation system of the Alterum Royal Palace was designed in the fourth century of the Third Dynasty by an architect who prioritized visual grandeur over air circulation. Behind the marble and gilt, the interior walls have been accumulating biological moisture for four hundred years. The mold produces a specific sweetish compound in the air that the palace's human inhabitants have stopped noticing. I noticed it the first time I visited at six years old and have noticed it on every visit since.\n\nLudovic noticed nothing. He never has.\n\nHe was in the predicted state: wine from the night before, Dream crystals on the table, the specific pale-grey skin tone of someone who has been using dissociative compounds long enough for the metabolic effect to become baseline. The crystals were Isabella's work — I recognized the compound's specific crystalline structure from a Guild trade intelligence report that passed through my proxy network two months ago. Dante does not know that his alchemist is running a palace distribution operation. I decided not to tell him today. It is a useful piece of information to hold.\n\nThe confrontation proceeded as I had modeled it, with one deviation: he attempted the guard-call instinctively before processing the tactical situation. This is Ludovic at baseline — impulse before assessment. I had positioned the janitor Jacque correctly, but I had not anticipated needing to physically demonstrate the futility of the call. I adjusted.\n\nThe punch was clean. He will be sore for two days. More importantly, it established the physical dynamic of the interaction before the verbal negotiation — he is smaller than me in that room now, regardless of his title.\n\nHis resistance collapsed in the expected sequence: denial, threat, calculation, acceptance.\n\nHe will sign the decrees at the afternoon session of the Small Council. I am confident of this not because he is compliant but because his alternative is worse. He knows what Orso will do with the Registry entry. The fear of Orso is more reliable than loyalty to me.\n\nWhat I did not account for: his eyes when I named Dante specifically.\n\nNot the expected response — fear, calculation, resentment. He filed Dante in a specific internal category that I have seen before in people who are preparing a counter-move rather than accepting defeat. He did not look trapped. He looked stored.\n\nWhen I left, he reached for the desk drawer.\n\nNot the drug box. The other drawer.\n\nI have a contact at the palace post. I will know what he sends within four hours.\n\nWe will see who is managing whom.`,
       ru:`Дворец пахнет гнилью под золотом.\n\nЭто не метафора. Система вентиляции Королевского Дворца в Альтеруме была разработана в четвёртом веке Третьей Династии архитектором приоритизировавшим визуальное великолепие над циркуляцией воздуха. За мрамором и позолотой, внутренние стены накапливали биологическую влажность четыреста лет. Плесень производит специфическое сладковатое соединение в воздухе которое постоянные обитатели дворца перестали замечать. Я заметила это в первый раз когда посещала в шесть лет и замечаю при каждом посещении с тех пор.\n\nЛюдовик ничего не замечал. Никогда не замечал.\n\nОн был в предсказуемом состоянии: вино с прошлой ночи, кристаллы «Мечты» на столе, специфический бледно-серый тон кожи кого-то кто использовал диссоциативные соединения достаточно долго чтобы метаболический эффект стал базовым. Кристаллы были работой Изабеллы — я узнала специфическую кристаллическую структуру соединения из торгового разведывательного отчёта Гильдии прошедшего через мою прокси-сеть два месяца назад. Данте не знает что его алхимик ведёт дворцовую дистрибуционную операцию. Я решила не говорить ему сегодня. Это полезная информация для удержания.\n\nПротивостояние проходило как я его моделировала, с одним отклонением: он попытался вызвать охрану инстинктивно до обработки тактической ситуации. Это Людовик в базовом режиме — импульс до оценки. Я правильно позиционировала лакея Жака, но не предвидела необходимости физически продемонстрировать тщетность вызова. Я скорректировала.\n\nУдар был чистым. Он будет болеть два дня. Важнее то что он установил физическую динамику взаимодействия до словесных переговоров — теперь он меньше меня в той комнате, независимо от его титула.\n\nЕго сопротивление рухнуло в ожидаемой последовательности: отрицание, угроза, расчёт, принятие.\n\nОн подпишет указы на дневном заседании Малого Совета. Я уверена в этом не потому что он послушен а потому что его альтернатива хуже. Он знает что Орсо сделает с записью в Реестре. Страх Орсо более надёжен чем лояльность ко мне.\n\nЧто я не учла: его глаза когда я назвала Данте конкретно.\n\nНе ожидаемый ответ — страх, расчёт, обида. Он занёс Данте в специфическую внутреннюю категорию которую я видела прежде у людей готовящих контрход а не принимающих поражение. Он не выглядел загнанным. Он выглядел хранящим.\n\nКогда я уходила, он потянулся к ящику стола.\n\nНе к шкатулке с наркотиками. К другому ящику.\n\nУ меня есть контакт на дворцовой почте. Я буду знать что он отправляет в течение четырёх часов.\n\nПосмотрим кто управляет кем.`
     },
     knows:{en:["The Dream crystals are Isabella's compound — she recognized the crystalline structure from a Guild trade intelligence report that came through her proxy network two months ago. Dante does not know Isabella is running palace distribution. She decided not to tell him today.","Ludovic's eyes when she named Dante — not fear, not resentment. He looked 'stored.' He reached for the other drawer when she left, not the drug box.","She has a contact at the palace post. She will know what he sends within four hours."],ru:["Кристаллы «Мечты» — соединение Изабеллы: она узнала кристаллическую структуру из разведывательного отчёта прошедшего через её прокси-сеть два месяца назад. Данте не знает что Изабелла ведёт дворцовую операцию. Она решила не говорить ему сегодня.","Глаза Людовика когда она назвала Данте — не страх, не обида. Он выглядел «хранящим». Когда она уходила он потянулся к другому ящику, не к шкатулке.","У неё есть контакт на дворцовой почте. Она будет знать что он отправляет в течение четырёх часов."]},
     misunderstands:{en:["She has identified that Ludovic is preparing a counter-move rather than accepting defeat. She has not identified the specific counter-move: his contact base before the Registry moment was the balance of institutional forces — Orso, the Church, the existing aristocratic compact. All of those have now been compromised or neutralized by the Registry's existence. He has only one remaining option that is outside the Registry's reach: an external power that does not operate within the Empire's institutional framework. She is looking for what he sends. She has not yet assessed what he has available to send it to."],ru:["Она определила что Людовик готовит контрход а не принимает поражение. Она не определила конкретный контрход: его контактная база до момента Реестра был баланс институциональных сил — Орсо, Церковь, существующий аристократический пакт. Все они теперь скомпрометированы или нейтрализованы существованием Реестра. У него есть только один оставшийся вариант находящийся вне досягаемости Реестра: внешняя держава не действующая в институциональной рамке Империи."]},
     hides:{en:["She held the information about Isabella's palace distribution operation and decided not to tell Dante. She framed this as 'a useful piece of information to hold.' She has been making independent information-retention decisions since before the meeting at the Citadel — she had intelligence on the Guild that she did not disclose during the negotiation. She is now building an information differential between herself and her partner. She is not deceiving him. She is developing leverage within the alliance."],ru:["Она удержала информацию об операции дворцовой дистрибуции Изабеллы и решила не говорить Данте. Она оформила это как «полезную информацию для удержания». Она принимала независимые решения об удержании информации ещё до встречи в Цитадели — у неё была разведка о Гильдии которую она не раскрывала во время переговоров. Она строит информационный дифференциал между собой и партнёром. Она не обманывает его. Она развивает рычаг внутри альянса."]},
     whisper:{en:"She knows about Isabella's palace distribution and is not telling Dante. She is building an information differential within the alliance. Ludovic reached for the other drawer. She will know in four hours.",ru:"Она знает о дворцовой операции Изабеллы и не говорит Данте. Она строит информационный дифференциал внутри альянса. Людовик потянулся к другому ящику. Она будет знать через четыре часа."}

   ludovic:{distortion:8,
     text:{
       en:`She hit me.\n\nMy sister, the convent girl, the bastard, the nobody — she hit me. In the solar plexus, like a trained fighter. My own body betrayed me, doubling over, unable to breathe for fifteen seconds while she stood there adjusting her glove.\n\nI am the Prince-Regent of the Empire.\n\nI am the Prince-Regent of the Empire, and my younger sister just hit me in my own bedroom and told me the terms of my own surrender.\n\nThe paper she threw on my table. Three hundred thousand gold. I remember every line of it because I remember every debt and this is only one of them — there are six more, stacked in different institutions, each with its own collateral that I have already spent. I have been spending money that doesn't exist for eleven years. The Bank was the only institution with enough of my paper to threaten me, and now my paper is in the hands of my sister, who is sleeping with a port criminal.\n\nShe said she won't hurt me if I sign.\n\nShe said Ludovic will live in comfortable exile.\n\nShe said this like I was a problem to be managed.\n\nThe crystals helped. They always help. The Dream takes the edges off — the fear, the shame, the specific quality of this morning's humiliation that I know I will not fully process until the compound clears tomorrow.\n\nBut even through the Dream, I could think clearly enough to remember what she doesn't know.\n\nShe doesn't know about Zhang.\n\nI met him at the Duchess of Merau's winter ball, three months ago. A small man with very precise diction, who said very little but meant everything he said. He mentioned, in passing, that his principals had interests in the Northern mineral deposits. He mentioned, also in passing, that his principals found the current political situation 'sub-optimal for their trade partners.' He left me a contact method. He said to use it if the situation became 'clarified.'\n\nThe situation is now clarified.\n\nLiliana thinks she has cornered the board. She thinks the Registry gives her control of every institutional actor in the Empire. She is right. Every institutional actor.\n\nZhang's principals are not institutional actors. They are external actors. They do not play on her board.\n\nI am not defeated. I am delayed.\n\nI will sign her decrees today. I will smile at the Small Council. I will give her the political theater she needs.\n\nAnd tonight, my letter will go east.`,
       ru:`Она ударила меня.\n\nМоя сестра, монастырская девушка, бастард, никто — она ударила меня. В солнечное сплетение, как обученный боец. Мое собственное тело предало меня, согнувшись пополам, неспособное дышать пятнадцать секунд пока она стояла там поправляя перчатку.\n\nЯ Принц-Регент Империи.\n\nЯ Принц-Регент Империи, и моя младшая сестра только что ударила меня в моей собственной спальне и объявила условия моей собственной капитуляции.\n\nБумага которую она бросила на мой стол. Триста тысяч золотых. Я помню каждую строку потому что помню каждый долг и это лишь один из них — есть ещё шесть, сложенных в разных институциях, каждый со своим обеспечением которое я уже потратил. Я трачу деньги которых не существует одиннадцать лет. Банк был единственной институцией с достаточным количеством моих бумаг чтобы угрожать мне, и теперь мои бумаги в руках моей сестры которая спит с портовым мафиози.\n\nОна сказала что не причинит мне вреда если подпишу.\n\nОна сказала что Людовик будет жить в комфортном изгнании.\n\nОна сказала это словно я проблема которой нужно управлять.\n\nКристаллы помогли. Они всегда помогают. «Мечта» снимает остроту — страх, стыд, специфическое качество сегодняшнего унижения которое, как я знаю, не полностью обработаю пока соединение не выйдет завтра.\n\nНо даже сквозь «Мечту» я мог думать достаточно ясно чтобы вспомнить то чего она не знает.\n\nОна не знает о Чжане.\n\nЯ встретил его на зимнем балу Герцогини Меро, три месяца назад. Маленький человек с очень точной дикцией, говоривший очень мало но имевший в виду каждое сказанное слово. Он упомянул, мимоходом, что его принципалы имеют интересы к северным минеральным депозитам. Он упомянул, также мимоходом, что его принципалы считают текущую политическую ситуацию «субоптимальной для их торговых партнёров». Он оставил мне контактный метод. Он сказал использовать его если ситуация «прояснится».\n\nСитуация теперь прояснилась.\n\nЛилиана думает что заперла доску. Она думает что Реестр даёт ей контроль над каждым институциональным актором Империи. Она права. Над каждым институциональным актором.\n\nПринципалы Чжана — не институциональные акторы. Они внешние акторы. Они не играют на её доске.\n\nЯ не побеждён. Я задержан.\n\nЯ подпишу её указы сегодня. Я улыбнусь на Малом Совете. Я дам ей политический театр который ей нужен.\n\nА сегодня ночью моё письмо отправится на восток.`
     },
     knows:{en:["Zhang met him at the Duchess of Merau's winter ball three months ago — precisely when the Eastern power began monitoring the Guild's northern operations. Zhang left a contact method for when the situation 'clarified.' It has clarified.","'Zhang's principals are not institutional actors. They do not play on her board.' He has correctly identified the one vector that the Registry cannot reach.","He will sign the decrees, smile at the Council, give her the political theater — and tonight, the letter goes east."],ru:["Чжан встретил его на зимнем балу Герцогини Меро три месяца назад — именно тогда когда Восточная держава начала мониторинг северных операций Гильдии. Чжан оставил контактный метод для когда ситуация «прояснится». Она прояснилась.","«Принципалы Чжана — не институциональные акторы. Они не играют на её доске». Он правильно определил единственный вектор недостижимый Реестром.","Он подпишет указы, улыбнётся Совету, даст ей политический театр — а сегодня ночью письмо отправится на восток."]},
     misunderstands:{en:["He thinks Liliana 'is sleeping with a port criminal' — he has categorized Dante as a criminal actor, which means he has not assessed the Gel's strategic significance or the Guild's actual operational capability. He is contacting Zhang's principals to disrupt a port operation, not a Covenant-infrastructure recovery program. The Eastern power's interest in 'Northern mineral deposits' is correctly identified as Gel-adjacent, but Ludovic does not know this. He is handing a connection to a sophisticated geopolitical actor who has been studying the Gel for three months, while believing he is simply finding an external ally to threaten his sister."],ru:["Он думает что Лилиана «спит с портовым мафиози» — он категоризировал Данте как криминального актора, что означает что он не оценил стратегического значения Геля или реальных операционных возможностей Гильдии. Он контактирует с принципалами Чжана чтобы нарушить портовую операцию, а не программу восстановления инфраструктуры Завета. Он передаёт связь сложному геополитическому актору три месяца изучающему Гель, считая что просто находит внешнего союзника угрожать сестре."]},
     hides:{en:["He said 'I am not defeated. I am delayed.' This is accurate as a self-assessment — he has correctly identified that the Registry does not cover external actors. He has not asked why Zhang appeared three months ago specifically, or why Zhang was interested in Northern mineral deposits specifically, or why Zhang's principals found the political situation 'sub-optimal for their trade partners' at precisely the moment when Dante was consolidating the Golden Circle acquisition. Zhang's approach was not coincidence. It was a prepared contact operation. He is not using Zhang. Zhang's principals have been waiting to use him."],ru:["Он сказал «я не побеждён. Я задержан». Это точно как самооценка — он правильно определил что Реестр не охватывает внешних акторов. Он не спросил почему Чжан появился три месяца назад именно, или почему Чжан интересовался северными минеральными депозитами именно, или почему принципалы Чжана находили политическую ситуацию «субоптимальной для торговых партнёров» в точный момент когда Данте консолидировал поглощение Золотого Круга. Подход Чжана не был совпадением. Это была подготовленная контактная операция."]},
     whisper:{en:"Zhang appeared three months ago when the Eastern power began monitoring the Guild. Ludovic thinks he is using Zhang. Zhang's principals have been waiting to use him. Tonight the letter goes east.",ru:"Чжан появился три месяца назад когда Восточная держава начала мониторинг Гильдии. Людовик думает что использует Чжана. Принципалы Чжана ждали чтобы использовать его. Сегодня ночью письмо отправится на восток."}
   }
 }
},

{id:"s2",
 title:{en:"The Creditor's Confession",ru:"Исповедь Кредитора"},
 subtitle:{en:"We perform similar functions. I simply have better accounting.",ru:"Мы выполняем похожие функции. Просто у меня лучше отчётность."},
 location:{en:"Cathedral of Eternal Flame — Cardinal's Reception",ru:"Цитадель Вечного Огня — Приёмная Кардинала"},
 timing:{en:"Same Morning",ru:"То же Утро"},
 flags:["social_combat","arc_close"],
 povData:{
   dante:{distortion:3,
     text:{
       en:`I came in the morning because morning is when institutions process the night's intelligence. By arriving at first light with Liliana's news, I gave Moriус no processing window — he receives the information that his resistance has failed at the moment when he has not yet adjusted his threat model to account for the night's developments.\n\nThe choice to use 'tithe' as the entry phrase was deliberate. It invokes the specific institutional category of voluntary contribution rather than demanded payment. When an institution expects coercion and receives the vocabulary of voluntary relationship, the cognitive dissonance produces a brief assessment gap. I used the gap to read the room.\n\nWhat I found: Lucius, positioned correctly for an assassination briefing rather than an intelligence meeting. His hand-to-sword posture on entry, his decision to leave it sheathed on Morius's instruction — he was restrained, not neutral. He has orders that he is holding back.\n\nThis matters. Lucius operates from a different institutional mandate than Morius. Morius calculates institutional power. Lucius calculates spiritual necessity. When these two calculations diverge, Lucius does not defer to Morius's institutional assessment. He defers to his own spiritual assessment.\n\nI gave Morius the Registry leverage because Morius's calculation can be satisfied. I did not use the Registry against Lucius because Lucius's calculation cannot be satisfied by material leverage. He does not care about the cardinal's nephews or the bordello investments. He cares about the composite in my leg and what it means for the Covenant's integrity.\n\nHe is holding back orders. When Morius complies and signals that the institutional response has been satisfied, Lucius's restraint will not be removed. His orders do not come from Morius.\n\nI settled the institutional problem today. I have not settled the Lucius problem.\n\nMoriус looked at his hands after I left. I know this because I turned back once in the corridor — old habit — and through the stained glass of the door I could see the shadow of his posture. Hands forward, looking down. The specific body-language signature of a person who has just recognized that the game has changed scale.\n\nHe wrote the order. It will reach the Bank within the hour.\n\nThe financial crisis is resolved.\n\nThe Lucius problem is deferred.\n\nNow: Object 7-B.\n\nThe signal that came through the crystal was not a human voice at the end. It was not a battle cry or a command. It was the specific register of low-frequency structural resonance that I have been cataloguing through the composite leg for twenty-nine chapters. The sound of Precursor-era material under activation load.\n\nTorin did not wake tribal shamans. He woke something that has been sleeping under that site.\n\nOne of the seventeen.\n\nI am boarding the armored train in forty minutes.\n\nBusiness continues.`,
       ru:`Я пришёл утром, потому что утром институции обрабатывают ночную разведку. Прибыв с новостями Лилианы на первом свету, я не дал Мориусу окна обработки — он получает информацию что его сопротивление провалилось в момент когда ещё не скорректировал модель угрозы учитывающую ночные события.\n\nВыбор «десятина» как фраза входа был намеренным. Она вызывает специфическую институциональную категорию добровольного взноса а не требуемого платежа. Когда институция ожидает принуждения и получает словарь добровольных отношений, когнитивный диссонанс производит краткий разрыв оценки. Я использовал разрыв чтобы прочесть комнату.\n\nЧто я обнаружил: Люций, позиционированный правильно для брифинга по убийству а не разведывательной встречи. Его рука-к-мечу при входе, его решение оставить его в ножнах по инструкции Мориуса — он был сдержан, не нейтрален. У него есть приказы которые он удерживает.\n\nЭто важно. Люций действует из другого институционального мандата чем Мориус. Мориус рассчитывает институциональную власть. Люций рассчитывает духовную необходимость. Когда эти два расчёта расходятся, Люций не уступает институциональной оценке Мориуса. Он уступает собственной духовной оценке.\n\nЯ использовал рычаг Реестра на Мориуса, потому что расчёт Мориуса можно удовлетворить. Я не использовал Реестр против Люция, потому что расчёт Люция нельзя удовлетворить материальным рычагом. Ему не важны племянники кардинала или инвестиции в бордели. Ему важен композит в моей ноге и что он означает для целостности Завета.\n\nОн удерживает приказы. Когда Мориус подчинится и сигнализирует что институциональный ответ удовлетворён, сдержанность Люция не будет снята. Его приказы не приходят от Мориуса.\n\nСегодня я урегулировал институциональную проблему. Я не урегулировал проблему Люция.\n\nМориус смотрел на свои руки после того как я ушёл. Я знаю это потому что повернулся однажды в коридоре — старая привычка — и через витражное стекло двери видел тень его позы. Руки вперёд, смотрит вниз. Специфическая подпись языка тела человека только что осознавшего что игра сменила масштаб.\n\nОн написал приказ. Он достигнет Банка в течение часа.\n\nФинансовый кризис разрешён.\n\nПроблема Люция отложена.\n\nТеперь: Объект 7-Б.\n\nСигнал пришедший через кристалл в конце был не человеческим голосом. Это не был боевой клич или команда. Это был специфический регистр низкочастотного структурного резонанса который я каталогизирую через ногу с композитом двадцать девять глав. Звук материала эпохи Предтечей под нагрузкой активации.\n\nТорин не разбудил племенных шаманов. Он разбудил нечто что дремало под этим объектом.\n\nОдин из семнадцати.\n\nЯ сажусь на бронепоезд через сорок минут.\n\nБизнес продолжается.`
     },
     knows:{en:["'Tithe' as entry vocabulary — deliberate cognitive dissonance producing an assessment gap. He read the room during the gap.","Lucius was positioned for an assassination briefing, not an intelligence meeting. He has orders he is holding back. Those orders do not come from Morius.","The signal through the crystal was Precursor-era structural resonance under activation load — not tribal shamans. One of the seventeen secondary sites. He is boarding the armored train."],ru:["«Десятина» как входной словарь — намеренный когнитивный диссонанс производящий разрыв оценки. Он прочитал комнату во время разрыва.","Люций был позиционирован для брифинга по убийству, не разведывательной встречи. У него есть приказы которые он удерживает. Эти приказы приходят не от Мориуса.","Сигнал через кристалл был структурным резонансом эпохи Предтечей под нагрузкой активации — не племенные шаманы. Один из семнадцати вторичных объектов. Он садится на бронепоезд."]},
     misunderstands:{en:["He has correctly identified that the signal is Precursor-era structural resonance. He has framed this as 'one of the seventeen' — a secondary site waking up. He has not fully assessed what an awakening secondary site means in operational terms. His prior Precursor-site interactions: the Island (destroyed), Object 7-B (operational). The secondary sites were designed as maintenance and distribution nodes. If the secondary site's dormancy layer has been disrupted by drilling, the site's automated maintenance response will have activated. This is not a combat scenario. It is an automated system responding to perceived threat to its boundary layer. The armored train and combat chimeras are the wrong tools for this interaction."],ru:["Он правильно определил что сигнал — структурный резонанс эпохи Предтечей. Он оформил это как «один из семнадцати» — вторичный объект просыпающийся. Он не полностью оценил что означает просыпающийся вторичный объект в операционных терминах. Вторичные объекты были разработаны как узлы обслуживания и дистрибуции. Если дремотный слой вторичного объекта был нарушен бурением, автоматизированный ответ обслуживания объекта активировался. Это не боевой сценарий. Это автоматизированная система реагирующая на воспринимаемую угрозу её пограничному слою. Бронепоезд и боевые химеры — неверные инструменты для этого взаимодействия."]},
     hides:{en:["He said 'I settled the institutional problem. I have not settled the Lucius problem.' He has named this correctly. He has not examined whether 'deferred' is the right category for the Lucius problem. Every previous problem Dante has deferred has either resolved itself (Valeria's dependency), grown more complex (the Ark's urgency), or remained precisely where he left it (Silas's analysis). The Lucius problem has Lucius preparing orders that do not come from Morius, which means they come from the Order of the Silent Archive's four-hundred-year preparation protocol. A deferred Lucius problem is not a reduced Lucius problem."],ru:["Он сказал «я урегулировал институциональную проблему. Я не урегулировал проблему Люция». Он правильно назвал. Он не исследовал является ли «отложено» верной категорией для проблемы Люция. Каждая предыдущая проблема которую Данте откладывал либо разрешилась сама (зависимость Валерии), либо стала более сложной (срочность Ковчега), либо осталась именно там где он её оставил (анализ Силаса). Проблема Люция имеет Люция готовящего приказы не от Мориуса, что означает они приходят от четырёхсотлетнего протокола подготовки Ордена Тихого Архива."]},
     whisper:{en:"He settled the Morius problem and deferred Lucius. Lucius's orders do not come from Morius. A deferred Lucius problem is not a reduced one. He is boarding the wrong transport for what is waiting at the northern site.",ru:"Он урегулировал проблему Мориуса и отложил Люция. Приказы Люция приходят не от Мориуса. Отложенная проблема Люция — не уменьшенная. Он садится на неверный транспорт для того что ждёт на северном объекте."}
   }
 }
},

{id:"s3",
 title:{en:"New Order and Old Fear",ru:"Новый Порядок и Старый Страх"},
 subtitle:{en:"You let the wolf into the sheepfold. This Dante will eat us all. — Perhaps. But for now he will eat our enemies.",ru:"Ты пустила волка в овчарню. Этот Данте сожрёт нас всех. — Возможно. Но пока он будет жрать наших врагов."},
 location:{en:"Small Council Hall / Port Margrave — The Citadel",ru:"Зал Малого Совета / Порт Маргрейв — Цитадель"},
 timing:{en:"Afternoon Then Evening",ru:"День, Затем Вечер"},
 flags:["arc_close","escalation","new_threat","foreshadowing"],
 povData:{
   liliana:{distortion:4,
     text:{
       en:`Orso took four minutes and twenty seconds to sign.\n\nI had modeled three minutes to five minutes based on his psychological profile — he is a man who has lived his entire life resolving problems through force, who finds any situation requiring strategic patience intolerable, and who will sign quickly once he accepts that the strategic situation does not favor him rather than waiting for a negotiated resolution. The signing speed confirms the model.\n\nHis parting statement: 'You let the wolf into the sheepfold. This Dante will eat us all.'\n\nCorrect assessment, wrong frame. Orso is thinking about the wolf in the sheepfold in terms of the traditional frame — the wolf wants the sheep. He does not understand that Dante does not want the sheep. He wants the pasture infrastructure. The sheep are a byproduct.\n\nMy response — 'Perhaps. But for now he will eat our enemies' — was operationally correct for the negotiation, not personally true. I am not certain Dante recognizes a meaningful distinction between enemies and partners. I am also not certain that distinction will matter to him when the infrastructure requires it.\n\nI have been thinking about this since I left the palace this morning.\n\nThe deal's structure gives me the political layer. It gives him the economic layer. In a normal political-commercial partnership, these two layers are genuinely separate — political actors can pursue political objectives without being constrained by the commercial actor's economic requirements, and vice versa.\n\nThis partnership is not a normal structure. The economic layer is Gel. Gel is a substance that cannot be replaced, cannot be recreated without Object 7-B, and is the foundation of every military, technological, and biological development the Guild is pursuing. The political layer is, in structural terms, entirely downstream of the economic layer.\n\nI gave him the economy. He gave me the crown.\n\nA crown that runs on his supply chain.\n\nOrso is wrong about the wolf eating us. He is right about the wolf.\n\nWhen Silas burst into the office with the triumph announcement, I was reviewing the palace post intercept from Ludovic. Zhang. Eastern contacts. A letter sent east.\n\nDante had already left for the north by the time I decoded it.\n\nI sent a message to my eastern proxy network.\n\nI need to know what Zhang's principals want before Dante finds out Ludovic wrote to them.\n\nWe will see who is managing whom.`,
       ru:`Орсо потратил четыре минуты двадцать секунд чтобы подписать.\n\nЯ моделировала три-пять минут основываясь на его психологическом профиле — это человек проживший всю жизнь разрешая проблемы силой, находящий любую ситуацию требующую стратегического терпения нестерпимой, и подписывающий быстро когда принимает что стратегическая ситуация не благоприятствует ему а не ожидая переговорного разрешения. Скорость подписания подтверждает модель.\n\nЕго прощальное заявление: «Ты пустила волка в овчарню. Этот Данте сожрёт нас всех».\n\nВерная оценка, неверная рамка. Орсо думает о волке в овчарне в терминах традиционной рамки — волк хочет овец. Он не понимает что Данте не хочет овец. Он хочет пастбищную инфраструктуру. Овцы — побочный продукт.\n\nМой ответ — «Возможно. Но пока он будет жрать наших врагов» — был операционно верным для переговоров, но не лично истинным. Я не уверена что Данте признаёт значимое различие между врагами и партнёрами. Я также не уверена что это различие будет иметь для него значение когда инфраструктура потребует.\n\nЯ думаю об этом с тех пор как покинула дворец сегодня утром.\n\nСтруктура сделки даёт мне политический слой. Ему — экономический. В нормальном политико-коммерческом партнёрстве эти два слоя действительно раздельны — политические акторы могут преследовать политические цели не ограничиваясь экономическими требованиями коммерческого актора, и наоборот.\n\nЭто партнёрство — не нормальная структура. Экономический слой — Гель. Гель — вещество которое нельзя заменить, нельзя воссоздать без Объекта 7-Б, и является основой каждого военного, технологического и биологического развития которое преследует Гильдия. Политический слой структурно полностью ниже по течению от экономического слоя.\n\nЯ дала ему экономику. Он дал мне корону.\n\nКорону работающую на его цепочке поставок.\n\nОрсо неправ насчёт того что волк сожрёт нас. Он прав насчёт волка.\n\nКогда Силас ворвался в офис с объявлением триумфа, я просматривала перехват дворцовой почты от Людовика. Чжан. Восточные контакты. Письмо отправленное на восток.\n\nДанте уже уехал на север к тому времени когда я это расшифровала.\n\nЯ отправила послание в мою восточную прокси-сеть.\n\nМне нужно знать что хотят принципалы Чжана прежде чем Данте узнает что Людовик написал им.\n\nПосмотрим кто управляет кем.`
     },
     knows:{en:["Orso: 4:20 to sign — within the modeled 3-5 minute window. His wolf assessment is correct framing, wrong target: Dante doesn't want the sheep, he wants the pasture infrastructure.","The crown runs on Dante's supply chain. 'I am not certain Dante recognizes a meaningful distinction between enemies and partners.'","She intercepted Ludovic's letter — Zhang, Eastern contacts. She activated her eastern proxy network before Dante found out. 'We will see who is managing whom.'"],ru:["Орсо: 4:20 до подписания — в пределах моделируемого окна 3-5 минут. Оценка волка — верная рамка, неверная цель: Данте не хочет овец, он хочет пастбищную инфраструктуру.","Корона работает на цепочке поставок Данте. «Я не уверена что Данте признаёт значимое различие между врагами и партнёрами».","Она перехватила письмо Людовика — Чжан, восточные контакты. Она активировала свою восточную прокси-сеть до того как Данте узнал. «Посмотрим кто управляет кем»."]},
     misunderstands:{en:["She has activated her eastern proxy network to get ahead of Dante on the Zhang information. She has not considered that Zhang's principals may have already anticipated this interception — the Eastern power has been running intelligence on the Guild for three months and knows the Guild has intelligence capabilities. If they prepared Ludovic as a contact point, they also prepared for the possibility that his communication would be monitored. The information Liliana receives from her eastern network may be what Zhang's principals want her to receive."],ru:["Она активировала свою восточную прокси-сеть чтобы опередить Данте с информацией о Чжане. Она не рассмотрела что принципалы Чжана могли уже предвидеть этот перехват — Восточная держава три месяца проводила разведку по Гильдии и знает что у Гильдии есть разведывательные возможности. Информация которую Лилиана получит от своей восточной сети может быть тем что принципалы Чжана хотят чтобы она получила."]},
     hides:{en:["'We will see who is managing whom' — she has said this phrase three times now, each time about the Dante partnership. The first time: after the Citadel meeting, about Dante specifically. The second time: after the palace confrontation, about Ludovic. This third time: about the Zhang situation and whether she or Dante will control the information first. The phrase has become her private marker for competitive situations within the alliance. She uses it when she is uncertain of the outcome. She is not certain about any of the three."],ru:["«Посмотрим кто управляет кем» — она говорила эту фразу три раза, каждый раз о партнёрстве с Данте. Первый раз: после встречи в Цитадели, о Данте конкретно. Второй раз: после столкновения во дворце, о Людовике. Этот третий раз: о ситуации с Чжаном и кто она или Данте первым контролирует информацию. Фраза стала её приватным маркером конкурентных ситуаций внутри альянса. Она использует её когда не уверена в исходе. Она не уверена ни в одном из трёх."]},
     whisper:{en:"She has said 'we will see who is managing whom' three times — each time she is uncertain. She is not certain about Dante, Ludovic, or Zhang. The crown runs on his supply chain.",ru:"Она три раза сказала «посмотрим кто управляет кем» — каждый раз когда не уверена. Она не уверена насчёт Данте, Людовика или Чжана. Корона работает на его цепочке поставок."}
   },
   dante:{distortion:4,
     text:{
       en:`The accounts unfroze at 10:47 in the morning.\n\nI know this because I was watching the financial telemetry from the Citadel's operations desk when the signal came through. The cascade: first the Bank's master account status changed, then the three subsidiary clearing accounts, then the regional satellite accounts in sequence as the defreeze protocol propagated through the network. Total propagation time: eleven minutes from Moriус's order to full Guild liquidity restoration.\n\nSilas was celebrating. I was calculating.\n\nThe composite leg began its resonance response to the communication crystal before Torino spoke. I felt the incoming signal through the floor — the specific frequency that the Precursor-era communication systems transmit on, which is distinct from all current-civilization transmission protocols and is recognizable because it resonates at the composite's base null-field frequency.\n\nWhen the crystal activated, I already knew what category of event was producing the signal. I did not know the specific operational details.\n\nCode Black. Perimeter lost. Machines stalling. Gel thickening in the pipes.\n\nGel thickening in the pipes.\n\nI have never heard of Gel thickening in its own distribution system. The Gel's molecular structure is self-stable under all temperature and pressure conditions within the facility's operational parameters. It does not thicken. It does not change state unless acted upon by an external energy source operating at the same resonance frequency as the facility's null-field baseline.\n\nThe only energy source operating at that frequency near Object 7-B is another Precursor-era system.\n\nThe low sound that transmitted through the crystal and shook the capital's windows: I have heard that frequency before. In the Island's maintenance bays, when the composite was first integrated. In the facility's intake system when it processed the first wyvern carcasses. The specific register of Precursor-era matter under activation load.\n\nTorin drilled through the dormancy boundary of a secondary site.\n\nI am bringing an armored train and combat biologicals to what is, operationally, an automated boundary-protection response from a system that has not had an authorized interaction in approximately two thousand years.\n\nThis is the wrong approach.\n\nI know this. I am going anyway. Because Torino's people are dying right now, and the correct approach requires preparation time I do not have, and the wrong approach at least has the composite — my authorized operator credential — on site, which may be sufficient to invoke a pause in the automated response.\n\nMay be.\n\nBusiness continues.\n\nThis time I know exactly what business it is.\n\nI am still not entirely certain that knowing is enough.`,
       ru:`Счета разморозились в 10:47 утра.\n\nЯ знаю это, потому что наблюдал финансовую телеметрию со стола операций Цитадели когда пришёл сигнал. Каскад: сначала изменился статус мастер-счёта Банка, затем три дочерних клиринговых счёта, затем региональные спутниковые счета в последовательности когда протокол разморозки распространился через сеть. Общее время распространения: одиннадцать минут от приказа Мориуса до полного восстановления ликвидности Гильдии.\n\nСилас праздновал. Я рассчитывал.\n\nНога с композитом начала резонансный ответ на коммуникационный кристалл до того как заговорил Торин. Я почувствовал входящий сигнал через пол — специфическую частоту на которой передают коммуникационные системы эпохи Предтечей, отличную от всех протоколов передачи нынешней цивилизации и узнаваемую потому что резонирует на базовой нулевой частоте композита.\n\nКогда кристалл активировался, я уже знал какую категорию события производит сигнал. Я не знал конкретных операционных деталей.\n\nКод Чёрный. Потеря периметра. Машины глохнут. Гель густеет в трубах.\n\nГель густеет в трубах.\n\nЯ никогда не слышал о Геле густеющем в собственной дистрибуционной системе. Молекулярная структура Геля самостабильна при всех условиях температуры и давления в операционных параметрах объекта. Он не густеет. Он не меняет состояние если на него не воздействует внешний источник энергии работающий на той же резонансной частоте что базовый нулевой уровень объекта.\n\nЕдинственный источник энергии работающий на этой частоте вблизи Объекта 7-Б — другая система эпохи Предтечей.\n\nНизкий звук переданный через кристалл и потрясший окна столицы: я слышал эту частоту прежде. В обслуживающих отсеках Острова когда впервые интегрировался композит. В системе забора объекта когда он перерабатывал первые туши виверн. Специфический регистр материи эпохи Предтечей под нагрузкой активации.\n\nТорин пробурил через пограничный дремотный слой вторичного объекта.\n\nЯ привожу бронепоезд и боевых биологических к тому что является операционно автоматизированным пограничным защитным ответом системы не имевшей авторизованного взаимодействия приблизительно две тысячи лет.\n\nЭто неверный подход.\n\nЯ знаю это. Я еду всё равно. Потому что люди Торина умирают прямо сейчас, и правильный подход требует времени подготовки которого у меня нет, и неверный подход по крайней мере имеет на месте композит — мои авторизованные операторские полномочия — что может быть достаточным для вызова паузы в автоматизированном ответе.\n\nМожет быть.\n\nБизнес продолжается.\n\nНа этот раз я точно знаю что это за бизнес.\n\nЯ всё ещё не совсем уверен что знания достаточно.`
     },
     knows:{en:["The Gel thickening in the pipes is definitively diagnostic: only a Precursor-era system at the same resonance frequency can produce this. Torin drilled through the dormancy boundary of a secondary site — one of the seventeen.","He is bringing the wrong tools. He knows this. He is going anyway because Torin's people are dying now. The composite's authorized operator credential may be enough to invoke a pause in the automated response.","'This time I know exactly what business it is. I am still not entirely certain that knowing is enough.' First time in the narrative he has expressed uncertainty about whether knowing is sufficient."],ru:["Загустение Геля в трубах диагностически однозначно: только система эпохи Предтечей на той же резонансной частоте может это производить. Торин пробурил через дремотный пограничный слой вторичного объекта — один из семнадцати.","Он везёт неверные инструменты. Он знает. Едет всё равно, потому что люди Торина умирают сейчас. Операторские полномочия композита могут быть достаточны для вызова паузы в автоматизированном ответе.","«На этот раз я точно знаю что это за бизнес. Я всё ещё не совсем уверен что знания достаточно». Первый раз в нарративе когда он выражает неуверенность достаточно ли знания."]},
     misunderstands:{en:["He has assessed that the authorized operator credential 'may be sufficient to invoke a pause in the automated response.' He has not fully modeled what happens if it is not sufficient — if the secondary site's automated response does not recognize the Series 404 Auditor credential because the dormancy disruption has produced a threat-response mode rather than an operator-interaction mode. Every previous Precursor-era interaction has involved a system that was in maintenance mode (Island, Object 7-B). A system in active threat-response mode may have a different interaction protocol with an approaching authorized operator. He may not be able to simply walk up and present his palm."],ru:["Он оценил что операторские полномочия «могут быть достаточны для вызова паузы в автоматизированном ответе». Он не полностью моделировал что происходит если они недостаточны — если автоматизированный ответ вторичного объекта не узнаёт полномочия Аудитора серии 404 потому что нарушение дремоты произвело режим ответа на угрозу а не режим взаимодействия с оператором. Каждое предыдущее взаимодействие с Предтечами включало систему в режиме обслуживания. Система в активном режиме ответа на угрозу может иметь другой протокол взаимодействия с приближающимся авторизованным оператором."]},
     hides:{en:["'This time I know exactly what business it is. I am still not entirely certain that knowing is enough.' He has said 'this time I know what business it is' three times now. First in Chapter 27's ledger entry. Second at the end of Chapter 29. Third here. Each time the formula closes a chapter. This time he added a second sentence: 'I am still not entirely certain that knowing is enough.' The addition is new. He has never before qualified the closing formula. The qualification represents the first time in thirty chapters that he has acknowledged, in the private narration, that his knowledge may be insufficient for what comes next. He has not examined what it means that he is now uncertain about his own competence."],ru:["«На этот раз я точно знаю что это за бизнес. Я всё ещё не совсем уверен что знания достаточно». Он говорил «на этот раз я знаю что это за бизнес» три раза. Первый в записи гроссбуха Главы 27. Второй в конце Главы 29. Третий здесь. Каждый раз формула закрывает главу. На этот раз он добавил второе предложение: «Я всё ещё не совсем уверен что знания достаточно». Добавление ново. Он никогда прежде не квалифицировал закрывающую формулу. Квалификация представляет первый раз за тридцать глав когда он признал в частном нарративе что его знания могут быть недостаточны для того что идёт следующим."]},
     whisper:{en:"He said 'knowing may not be enough' — first time in thirty chapters. He is going with the wrong tools because Torin's people are dying now. The secondary site has been sleeping for two thousand years. 'May be' is the operative phrase.",ru:"Он сказал «знания может быть недостаточно» — первый раз за тридцать глав. Он едет с неверными инструментами потому что люди Торина умирают сейчас. Вторичный объект дремал две тысячи лет. «Может быть» — оперативная фраза."}
   }
 }

const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');c.innerHTML=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}].map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
