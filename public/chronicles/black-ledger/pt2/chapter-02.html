const TIMELINE=[
  {id:"TET-B4-08",en:"The Bank's Registry of Obligations was embedded with a beacon-class magical alert — a 'distress signal' designed to transmit the book's location to the bank's contracted Inquisition security team within thirty minutes of the book leaving the vault. Dante silenced this beacon using the Silence as a targeted null-field application — the first time he has used the Silence specifically to cancel an active magical transmission rather than to disrupt a physical structure or cancel an animation. This represents an expansion of the Silence's application range from structural/kinetic targets to informational/transmission targets. He processed this as routine. He has not noted the category shift.",ru:"Реестр Обязательств банка был оснащён маяковым классом магической сигнализации — «сигналом бедствия» разработанным передавать местонахождение книги нанятой банком группе безопасности Инквизиции в течение тридцати минут после выхода книги из хранилища. Данте заглушил этот маяк используя Тишину как целенаправленное нулевое применение — первый раз когда он использовал Тишину конкретно для отмены активной магической передачи а не для нарушения физической структуры или отмены анимации. Это представляет расширение диапазона применения Тишины от структурных/кинетических целей к информационным/трансмиссионным. Он обработал это как рутинное. Он не отметил категориальный сдвиг."},
  {id:"TET-B4-09",en:"The Registry of Obligations, Volume VII ('Especially Important Clients') reveals that the Prince-Regent Ludovic's debt portfolio is not three hundred thousand gold. It is three hundred thousand gold documented in this volume alone. The full Registry spans twelve volumes, each covering a different client tier. Volumes I through VI cover ordinary merchant-class debtors. Volume VII covers the aristocracy and officer corps. Volumes VIII through XII cover the Imperial court, the senior clergy, and the foreign diplomatic corps. Dante has Volume VII. He has not yet assessed whether the other eleven volumes were also in the same archive location — they were. The copper groat he left as a receipt is sitting in a shelf space that previously held twelve volumes, not one.",ru:"Реестр Обязательств, Том VII («Особо Важные Клиенты») раскрывает что долговой портфель Принца-Регента Людовика — не триста тысяч золотых. Это триста тысяч золотых задокументированных только в этом томе. Полный Реестр охватывает двенадцать томов, каждый охватывающий другой клиентский уровень. Тома I через VI охватывают обычных должников торгового класса. Том VII охватывает аристократию и офицерский корпус. Тома VIII через XII охватывают Имперский двор, высшее духовенство и иностранный дипломатический корпус. У Данте Том VII. Он ещё не оценил находились ли другие одиннадцать томов в том же архивном месте — они были. Медный грош который он оставил как квитанцию лежит на полке ранее вмещавшей двенадцать томов а не один."},
  {id:"TET-B4-10",en:"Liliana is not simply an exiled princess with political ambition. She is the only member of the Imperial family who has been running an active intelligence operation for four years from inside the convent. Her 'cell' — the room Whisper described as 'a cell, although that word was too modest for a room piled with books and maps' — contains a complete strategic assessment of the Imperial succession crisis that she assembled from public records, intercepted correspondence (the nuns are her couriers, not her captors), and information purchased through three proxy networks she built using embroidery sales income. She knew about the Black Ledger's operations before she knew about Dante specifically. When she said 'I heard his accounts are frozen. He's bankrupt. Why would I talk to a corpse?' — she was testing Whisper's response, not expressing genuine uncertainty. She already knew the answer.",ru:"Лилиана — не просто изгнанная принцесса с политическими амбициями. Она единственный член Имперской семьи проводящий активную разведывательную операцию четыре года изнутри монастыря. Её «келья» — комната которую Шепот описал как «слишком скромное слово для комнаты заваленной книгами и картами» — содержит полную стратегическую оценку имперского кризиса наследования которую она собрала из публичных записей, перехваченной переписки (монахини — её курьеры а не тюремщицы) и информации купленной через три прокси-сети построенные на доходах от продажи вышивки. Она знала об операциях Чёрного Гроссбуха прежде чем узнала конкретно о Данте. Когда она сказала «я слышала, его счета заморожены. Он банкрот. Зачем мне говорить с трупом?» — она тестировала ответ Шепота а не выражала подлинную неопределённость."},
  {id:"TET-B4-11",en:"Dante's crowd-control use of the Silence at the port — creating an expanding dome of absolute silence rather than a targeted application — is a new deployment scale. Previous uses: targeted at single objects (chain, wyvern), single points (vault's blood-drop), single transmissions (beacon). The port dome was area-effect, covering a crowd of thousands at variable radius. The energy cost was visible: Dante used the Silence 'for just a second to dampen the tremor in the prosthetic that was reacting to his emotional tension' immediately beforehand — the leg's response to his emotional state is now an indicator of the Silence's resource state. He damped the leg, then expanded the dome. The sequence matters: managing the integration's cost before performing the capability.",ru:"Использование Данте Тишины для контроля толпы в порту — создание расширяющегося купола абсолютной тишины а не целенаправленного применения — это новый масштаб развёртывания. Предыдущие использования: нацеленные на одиночные объекты (цепь, виверна), одиночные точки (капля крови хранилища), одиночные передачи (маяк). Портовый купол был площадного эффекта, охватывая толпу тысяч на переменном радиусе. Энергетическая стоимость была видима: Данте использовал Тишину «всего на секунду чтобы погасить дрожь в протезе реагировавшем на его эмоциональное напряжение» непосредственно перед — ответ ноги на его эмоциональное состояние теперь индикатор ресурсного состояния Тишины."},
  {id:"TET-B4-12",en:"The deal Dante offered Liliana — army, Council of Lords leverage, Church management, the Inquisition Concordat annulment — represents the first time Dante has offered political power as a product rather than as a mechanism. In every previous operation, political leverage was a tool for commercial or operational objectives. Here he is offering it to a third party as the primary deliverable. The deal's structure: Liliana receives the political position (Empress), Dante receives the economic infrastructure (Treasury, Customs, Gel-supply monopoly, Guild legalization) and the legal framework (Inquisition demilitarization). He is not becoming a shadow emperor. He is becoming the system's economic operating layer, with a political figure installed above him as the legitimacy interface. This is the same structure as the Golden Circle acquisition, applied at the national scale.",ru:"Сделка которую Данте предложил Лилиане — армия, рычаг в Совете Лордов, управление Церковью, аннулирование Конкордата Инквизиции — представляет первый раз когда Данте предложил политическую власть как продукт а не как механизм. В каждой предыдущей операции политический рычаг был инструментом для коммерческих или операционных целей. Здесь он предлагает её третьей стороне как основную услугу. Структура сделки: Лилиана получает политическую позицию (Императрица), Данте получает экономическую инфраструктуру (Казначейство, Таможня, монополия поставок Геля, легализация Гильдии) и правовую рамку (демилитаризация Инквизиции). Это та же структура что приобретение Золотого Круга, применённая в национальном масштабе."},
  {id:"TET-B4-13",en:"Liliana's condition — 'Ludovic: my brother is an idiot and a drug addict, but he is my brother. I do not want his death' — and Dante's acceptance of this condition reveals the deal's structural asymmetry. Dante accepted immediately without negotiation. He was going to offer Ludovic's safety anyway — killing the Prince-Regent would create a martyr and destabilize the political transition. Her condition gave him an opportunity to appear generous while doing the operationally correct thing. He used her love for her brother to anchor her trust in the arrangement. He did not tell her this. She signed because she thought she extracted a concession.",ru:"Условие Лилианы — «Людовик: мой брат — идиот и наркоман, но он мой брат. Я не хочу его смерти» — и принятие Данте этого условия раскрывает структурную асимметрию сделки. Данте принял немедленно без переговоров. Он собирался предложить безопасность Людовика в любом случае — убийство Принца-Регента создало бы мученика и дестабилизировало бы политический переход. Её условие дало ему возможность казаться щедрым делая операционно верную вещь. Он использовал её любовь к брату чтобы закрепить её доверие к договорённости. Он не говорил ей об этом. Она подписала, потому что думала что извлекла уступку."},
  {id:"TET-B4-14",en:"'We are creating reality, Silas. Don't fall behind.' — The newspaper headline Dante ordered — 'Guild saves economy. Princess Liliana heads Reform Committee' — before the Committee exists is the first time in the narrative that Dante has explicitly manufactured a political reality through media rather than through direct leverage or institutional pressure. In twenty-nine chapters, every previous political operation worked through existing institutional channels: debtors, officials, military officers, union leaders. This operation creates a new institutional channel that does not yet exist and populates it retroactively. He is not operating within the existing system. He is inserting a new element into the system that the system will be required to respond to as if it has always existed."}
];

const SCENES=[
{id:"s1",
 title:{en:"Accounting of Sin",ru:"Бухгалтерия Греха"},
 subtitle:{en:"The book was loud. Too loud. Now it is silent. Now we can work.",ru:"Книга была громкой. Слишком громкой. Теперь она молчит. Теперь можно работать."},
 location:{en:"The Citadel — Top Floor",ru:"Цитадель — Верхний Этаж"},
 timing:{en:"Dawn — Morning After the Bank Operation",ru:"Рассвет — Утро После Банковской Операции"},
 flags:["pivotal","institution_build"],
 povData:{
   dante:{distortion:3,
     text:{
       en:`The Registry's beacon was a third-tier Inquisition contract specification — standard for institutions holding assets of this sensitivity level. The signal architecture: a blood-bond embedded in the binding thread, activated on separation from the vault's null-field containment layer, transmitting a location pulse every four minutes to a dedicated receiving station at the Order of Purity's capital branch.\n\nI identified it by the specific quality of the interference it produced in the composite leg's passive detection system. The beacon was radiating at a frequency that produced a standing-wave interference pattern in the leg's null-field — a low hum I had been attributing to residual stress in the enriched Gel's circulation since Grimm's overhaul. I re-examined the hum's pattern when I sat down with the book. It was too regular. Interference from an external transmission source, not internal resonance.\n\nI silenced it.\n\nThis was different from every previous application. The harbor cobblestones: structural disruption, kinetic. The vault door's blood-drop: animate-system cancellation. The port crowd: acoustic-field nullification. The beacon: information-transmission cancellation.\n\nThe Silence is not a single tool with a single function. It is a principle — the systematic elimination of unwanted signal — that can be applied to any medium that carries signal. Structural signal. Animate signal. Acoustic signal. Information signal.\n\nI noted this category expansion and filed it.\n\nI then opened the Registry and called Silas.\n\nThe inventory of the Empire's accountability structure took approximately two hours to read at a scanning pace. Volume VII alone contains 847 entries across 300 pages. A conservative estimate, sampling the first fifty entries: approximately 60% of the aristocracy represented in this volume carries debt sufficient to constitute political leverage. Approximately 20% carries debt that constitutes evidence of criminal conduct under Imperial law. Approximately 8% carries debt that constitutes outright treason — assets pledged that the pledgor had no legal authority to pledge.\n\nThe Prince-Regent is in the 8%.\n\nLudovic pledged Crown Lands — territories held in trust for the Imperial line, not in the Regent's personal ownership. The pledge is legally void. But the debt instrument is real. The bank holds a binding obligation from the Prince-Regent of the Empire, backed by collateral that will fail on legal examination. This creates a specific leverage structure: the debt cannot be called against its stated collateral, but the existence of the debt — and the fraudulent collateral — constitutes evidence sufficient to remove him from the regency.\n\nSilencing his sister is not the operation.\n\nUsing his sister is the operation.\n\nThe leverage flows through Liliana, not against Ludovic. Liliana holds the information. Liliana presents the choice to Ludovic. Ludovic abdicates. The political transition has a legitimate face.\n\nI told Silas to unlock the food and fuel stores.\n\nThis is not charity. This is a demonstration of institutional permanence. When the banks freeze our gold and the workers ask 'where is our pay,' the answer 'the Guild feeds you when the banks abandon you' is worth more than the gold in the frozen accounts. It creates a dependency structure that survives the financial freeze — one that Lucius cannot replicate because the Church offers prayers, not food.\n\nThe newspaper headline is tomorrow's business.\n\nTonight's business is Liliana.\n\nBusiness continues.`,
       ru:`Маяк Реестра был спецификацией контракта Инквизиции третьего уровня — стандарт для институций хранящих активы этого уровня чувствительности. Архитектура сигнала: кровяная связь встроенная в нить переплёта, активируемая при отделении от слоя нулевой изоляции хранилища, передающая локационный импульс каждые четыре минуты на выделенную принимающую станцию столичного отделения Ордена Чистоты.\n\nЯ определил его по специфическому качеству помех которые он производил в системе пассивного обнаружения ноги с композитом. Маяк излучал на частоте производящей паттерн стоячей волны в нулевом поле ноги — низкий гул который я приписывал остаточному напряжению в циркуляции обогащённого Геля с переборки Гримма. Я перепроверил паттерн гула когда сел с книгой. Он был слишком регулярным. Помеха от внешнего источника передачи, а не внутренний резонанс.\n\nЯ заглушил его.\n\nЭто отличалось от каждого предыдущего применения. Портовая брусчатка: структурное нарушение, кинетическое. Капля крови двери хранилища: отмена анимированной системы. Портовая толпа: нуллификация акустического поля. Маяк: отмена информационной передачи.\n\nТишина — не единственный инструмент с единственной функцией. Это принцип — систематическое устранение нежелательного сигнала — который может быть применён к любой среде несущей сигнал. Структурный сигнал. Анимированный сигнал. Акустический сигнал. Информационный сигнал.\n\nЯ отметил это категориальное расширение и занёс.\n\nЗатем я открыл Реестр и вызвал Силаса.\n\nИнвентаризация структуры ответственности Империи заняла приблизительно два часа на сканирующей скорости. Том VII один содержит 847 записей на 300 страницах. Консервативная оценка выборки первых пятидесяти записей: приблизительно 60% аристократии представленной в этом томе несёт долг достаточный для политического рычага. Приблизительно 20% несёт долг составляющий доказательства уголовного поведения по Имперскому праву. Приблизительно 8% несёт долг составляющий откровенную государственную измену — активы заложенные которые залогодатель не имел законного права закладывать.\n\nПринц-Регент в 8%.\n\nЛюдовик заложил Земли Короны — территории удерживаемые в доверии для Имперской линии, а не в личной собственности Регента. Залог юридически недействителен. Но долговой инструмент реален. Банк держит обязывающее обязательство от Принца-Регента Империи, подкреплённое обеспечением которое провалится при правовой проверке. Это создаёт конкретную структуру рычага: долг не может быть востребован по заявленному обеспечению, но существование долга — и мошенническое обеспечение — составляет доказательство достаточное для отстранения его от регентства.\n\nЗаглушение его сестры — не операция.\n\nИспользование его сестры — операция.\n\nРычаг течёт через Лилиану, а не против Людовика. Лилиана держит информацию. Лилиана представляет выбор Людовику. Людовик отрекается. У политического перехода есть легитимное лицо.\n\nЯ сказал Силасу открыть склады с едой и топливом.\n\nЭто не благотворительность. Это демонстрация институциональной постоянности. Когда банки замораживают наше золото и рабочие спрашивают «где наша оплата», ответ «Гильдия кормит вас когда банки вас бросают» стоит больше чем золото в замороженных счетах. Это создаёт структуру зависимости пережившую финансовую заморозку — такую которую Люций не может воспроизвести, потому что Церковь предлагает молитвы, а не еду.\n\nЗаголовок газеты — завтрашнее дело.\n\nДегтярнее дело сегодня — Лилиана.\n\nБизнес продолжается.`
     },
     knows:{en:["The Silence cancels information-transmission signals, not only physical/animate ones. He identified the category expansion, filed it, and moved on without examining the implications.","Volume VII alone: 847 entries. 60% leverage, 20% criminal exposure, 8% treason. Ludovic is in the 8% — Crown Lands pledge, legally void, politically lethal.","The food-and-fuel distribution is not charity. It is a demonstration of institutional permanence that creates a dependency structure Lucius cannot replicate."],ru:["Тишина отменяет информационно-трансмиссионные сигналы, не только физические/анимированные. Он определил расширение категории, занёс и двинулся дальше без исследования импликаций.","Том VII один: 847 записей. 60% рычаг, 20% уголовное воздействие, 8% государственная измена. Людовик в 8% — залог Земель Короны, юридически недействительный, политически смертельный.","Распределение еды и топлива — не благотворительность. Это демонстрация институциональной постоянности создающей структуру зависимости которую Люций не может воспроизвести."]},
     misunderstands:{en:["He took Volume VII. He has not yet assessed that the other eleven volumes were in the same archive location. The copper groat he left is sitting in a shelf space that held twelve volumes. When the bank managers assess what was taken, they will report all twelve volumes missing. Lucius will know that Dante has not just the aristocracy's debt register — he has the Imperial court's, the clergy's, and the foreign diplomats'. The information he holds is eleven times larger than what he currently believes he holds."],ru:["Он взял Том VII. Он ещё не оценил что другие одиннадцать томов были в том же архивном месте. Медный грош который он оставил лежит на полке вмещавшей двенадцать томов. Когда менеджеры банка оценят что было взято, они сообщат о пропаже всех двенадцати томов. Люций будет знать что у Данте не просто реестр долгов аристократии — у него есть реестр Имперского двора, духовенства и иностранных дипломатов."]},
     hides:{en:["He noted the Silence's category expansion to information-transmission cancellation and filed it without examining the implications. The implication: if the Silence can cancel any signal in any medium, it can cancel the Order of the Silent Archive's acoustic instruments. Their entire tracking capability — the four-hundred-year archive, Lucius's counterpart preparation, the acoustic signature record — operates on signal transmission. He now has a capability that can, in principle, make himself acoustically invisible to the only institution that can currently track him. He has not connected these two facts."],ru:["Он отметил расширение категории Тишины до отмены информационных передач и занёс без исследования импликаций. Импликация: если Тишина может отменить любой сигнал в любой среде, она может отменить акустические инструменты Ордена Тихого Архива. Вся их способность отслеживания — четырёхсотлетний архив, подготовка партнёра Люция, акустическая запись сигнатуры — работает на передаче сигнала. Теперь у него есть возможность которая, в принципе, может сделать его акустически невидимым для единственной институции которая в настоящее время может его отслеживать. Он не соединил эти два факта."]},
     whisper:{en:"The Silence cancels information signals. The Order of the Silent Archive tracks through information signals. He has not connected these two facts. He has eleven more volumes than he thinks he has.",ru:"Тишина отменяет информационные сигналы. Орден Тихого Архива отслеживает через информационные сигналы. Он не соединил эти два факта. У него на одиннадцать томов больше чем он думает."}
   }
 }
},

{id:"s2",
 title:{en:"The Exile",ru:"Изгнанница"},
 subtitle:{en:"She entered as an exile. She left as a claimant.",ru:"Она вошла изгнанницей. Вышла претендентом."},
 location:{en:"St. Veronica's Convent / The Citadel — Negotiating Room",ru:"Монастырь Св. Вероники / Цитадель — Переговорная"},
 timing:{en:"Day — Into Midnight",ru:"День — До Полуночи"},
 flags:["new_player","social_combat","pivotal"],
 povData:{
   liliana:{distortion:4,
     text:{
       en:`I have been waiting ten years for someone to arrive in my room in the dark.\n\nNot an assassin. I have managed three of those since I was fifteen, and they arrive clumsily, smelling of the person who hired them. Not a suitor — my father stopped sending those when he understood that I would evaluate them as political assets and discard them when they failed the assessment. A messenger. From someone who understood what I actually am.\n\nThe doппельganger came through the wall shadow. Good methodology — he identified and used the one location in the room where the candlelight doesn't reach the floor. I had mapped it the first week I arrived. I kept the stiletto trained on the entry point for four years waiting for precisely this kind of visitor.\n\nHe tested correctly. He did not lead with the book's contents. He led with the book's existence. There is a difference: a spy would offer the contents to establish their value. Someone offering a partnership leads with the existence to establish the magnitude of the resource. The resource is what matters, not the information.\n\nI said the banker is bankrupt. He is not, but I wanted to see the response. The response was correct — not defensive, not explanatory. 'A corpse that holds this is alive.' The phrasing confirmed the sender's analytical framework. He thinks in asset values, not in identities.\n\nI was ready before I finished reading the page.\n\nThe port was a transit. I arrived at the Citadel eleven minutes early, using a route through the harbor infrastructure that predated the current ownership by forty years — I had mapped it from the same historical survey documents that told me the Citadel building's owner would be someone who understood infrastructure. The guards found my stillet and felt satisfied. The second one was in my boot. The third was built into the hairpin. You find what you look for.\n\nHis negotiating methodology was efficient and slightly incorrect. He assessed my primary motivation as power. It is not. My primary motivation is survival with dignity, which looks like power from the outside but has a different internal logic. A person motivated by power accepts deals that compromise dignity to gain position. A person motivated by survival with dignity refuses deals that remove agency even when they offer position.\n\nHe offered me the Empress position. He structured the deal as: position for Liliana, economic infrastructure for himself, my brother's safety as my concession-extraction.\n\nHe was wrong about the concession. I would not have accepted a deal that required my brother's harm. But I would have asked for it differently, and gotten a worse answer, if I had negotiated from the power-motivation framework. His misread of my motivation gave me better terms than my actual position warranted.\n\nI accepted. The deal is structurally sound. He gets the economic layer. I get the political layer. The political layer has real power if I build it correctly — I know exactly which of the Lords in that book are susceptible to which pressures. He has the book. I have been reading their psychology for ten years.\n\nHe thinks he is installing a legitimacy interface.\n\nHe is installing an active partner who has been planning this for a decade.\n\nWe will see who is managing whom in three years.`,
       ru:`Я ждала десять лет пока кто-нибудь появится в моей комнате в темноте.\n\nНе убийца. С тремя такими я справилась с пятнадцати лет, и они приходят неловко, пахнущими нанявшим их человеком. Не воздыхатель — отец перестал их присылать когда понял что я буду оценивать их как политические активы и отбрасывать когда провалятся оценку. Гонец. От кого-то кто понял что я такое на самом деле.\n\nДоппельгангер пришёл через тень стены. Хорошая методология — он определил и использовал единственное место в комнате где свет свечи не достигает пола. Я нанесла его на карту в первую неделю прибытия. Я держала стилет нацеленным на точку входа четыре года ожидая именно такого посетителя.\n\nОн проверил правильно. Он не начал с содержания книги. Он начал с существования книги. Есть разница: шпион предложил бы содержание чтобы установить ценность. Кто-то предлагающий партнёрство начинает с существования чтобы установить масштаб ресурса. Ресурс важен, не информация.\n\nЯ сказала что банкир — труп. Он не таков, но я хотела видеть ответ. Ответ был верным — не защитным, не объяснительным. «Труп, который владеет этим, живее всех живых». Формулировка подтвердила аналитическую рамку отправителя. Он думает в ценностях активов, не в идентичностях.\n\nЯ была готова до окончания чтения страницы.\n\nПорт был транзитом. Я прибыла в Цитадель одиннадцать минут раньше, используя маршрут через портовую инфраструктуру предшествующую нынешнему владению на сорок лет — я нанесла его на карту из тех же исторических обзорных документов которые сказали мне что владелец здания Цитадели будет кем-то понимающим инфраструктуру. Охранники нашли мой стилет и почувствовали удовлетворение. Второй был в ботинке. Третий встроен в шпильку. Вы находите то что ищете.\n\nЕго переговорная методология была эффективной и слегка неверной. Он оценил мою основную мотивацию как власть. Это не так. Моя основная мотивация — выживание с достоинством, что выглядит как власть снаружи но имеет другую внутреннюю логику. Человек мотивированный властью принимает сделки компрометирующие достоинство ради приобретения позиции. Человек мотивированный выживанием с достоинством отвергает сделки убирающие агентность даже когда они предлагают позицию.\n\nОн предложил мне позицию Императрицы. Он структурировал сделку как: позиция для Лилианы, экономическая инфраструктура для себя, безопасность моего брата как мои извлечённые уступки.\n\nОн был неправ насчёт уступки. Я бы не приняла сделку требующей вреда моему брату. Но я просила бы иначе и получила худший ответ если бы вела переговоры из рамки мотивации власти. Его неправильное чтение моей мотивации дало мне лучшие условия чем реально заслуживала моя позиция.\n\nЯ приняла. Сделка структурно обоснована. Он получает экономический слой. Я получаю политический слой. Политический слой имеет реальную власть если я строю его правильно — я точно знаю какие из Лордов в той книге восприимчивы к каким давлениям. У него книга. Я читала их психологию десять лет.\n\nОн думает что устанавливает интерфейс легитимности.\n\nОн устанавливает активного партнёра планировавшего это десятилетие.\n\nПосмотрим кто управляет кем через три года.`
     },
     knows:{en:["She was ready before she finished reading the page. She arrived eleven minutes early using a forty-year-old infrastructure route she had mapped from historical documents. She has three weapons — the guards found one.","He misread her primary motivation as power. It is survival with dignity. His misread gave her better terms than her actual position warranted.","'He thinks he is installing a legitimacy interface. He is installing an active partner who has been planning this for a decade. We will see who is managing whom in three years.'"],ru:["Она была готова до окончания чтения страницы. Она прибыла одиннадцать минут раньше используя сорокалетний инфраструктурный маршрут нанесённый на карту из исторических документов. У неё три оружия — охранники нашли одно.","Он неправильно прочитал её основную мотивацию как власть. Это выживание с достоинством. Его неправильное чтение дало ей лучшие условия чем реально заслуживала её позиция.","«Он думает что устанавливает интерфейс легитимности. Он устанавливает активного партнёра планировавшего это десятилетие. Посмотрим кто управляет кем через три года»."]},
     misunderstands:{en:["She said 'he gets the economic layer, I get the political layer.' She has not fully accounted for the Ark. Dante's economic infrastructure ambitions are not the terminal objective — they are the resource base for reaching the Ark. Once the Ark is activated and the Covenant infrastructure is restored or replaced, the political and economic landscape of the Empire becomes a secondary system relative to whatever the Ark represents. She is planning her three-year management strategy for a partner who is already planning a much larger and entirely non-Imperial operation."],ru:["Она сказала «он получает экономический слой, я получаю политический слой». Она не полностью учла Ковчег. Амбиции Данте в экономической инфраструктуре — не терминальная цель: они ресурсная база для достижения Ковчега. Как только Ковчег активирован и инфраструктура Завета восстановлена или заменена, политический и экономический ландшафт Империи становится вторичной системой относительно того что представляет Ковчег. Она планирует трёхлетнюю стратегию управления партнёром который уже планирует значительно большую и полностью неимперскую операцию."]},
     hides:{en:["She has been running an intelligence operation from the convent for four years. Her nuns are couriers, not captors. She has three proxy networks and purchased information about the Black Ledger before she knew about Dante. She did not tell Dante any of this. She let him believe she was a powerless exile who needed his resources. She accepted the deal understanding that her existing intelligence operation gives her capabilities he does not know she has. She has hidden the most important variable of the negotiation from her new partner."],ru:["Она проводит разведывательную операцию из монастыря четыре года. Её монахини — курьеры а не тюремщицы. У неё три прокси-сети и купленная информация о Чёрном Гроссбухе до того как она узнала конкретно о Данте. Она не рассказала Данте ничего из этого. Она позволила ему считать что она бессильная изгнанница нуждающаяся в его ресурсах. Она приняла сделку понимая что её существующая разведывательная операция даёт ей возможности которых он не знает. Она скрыла наиболее важную переменную переговоров от нового партнёра."]},
     whisper:{en:"She has been running a four-year intelligence operation. Her nuns are couriers. She has three networks. She hid all of this from him. She accepted the deal knowing she has capabilities he does not know about. She is not the exile he installed.",ru:"Она четыре года проводит разведывательную операцию. Её монахини — курьеры. У неё три сети. Она скрыла всё это от него. Она приняла сделку зная что имеет возможности которых он не знает. Она не та изгнанница которую он устанавливал."}
   },
   dante:{distortion:4,
     text:{
       en:`She arrived eleven minutes early.\n\nI had placed one of Thomas's network contacts at the outer convent gate with a pocket watch. The timing was precise enough to tell me something: she knew a route that didn't pass through the standard checkpoints, which means she had mapped the port's access infrastructure at a level of detail that required either significant prior planning or access to historical survey records. Either indicates capability I had not modeled.\n\nI adjusted the threat/asset assessment upward by approximately twenty percent when she entered.\n\nThe stilietto find: Whisper recovered one blade from the standard search. I instructed the secondary check. One more in the boot. The hairpin assessment produced nothing, which means either the hairpin is decorative or the tertiary concealment is better than Whisper's secondary search. I filed the ambiguity.\n\nThe negotiation proceeded according to the Decision Corridor model, but with one deviation I noted: she did not respond to the 'power' framing I used when describing what the deal offered her. She responded to the 'agency' framing — specifically, when I said 'you will get to build schools, punish enemies, reform laws.' The power-frame would have produced a different facial register. She showed interest at the agency-frame. This means her primary motivator is not power acquisition. It is something adjacent.\n\nI noted this and did not adjust my strategy in real time because the difference did not affect the deal's terms — the terms I was offering satisfied either motivator. I will need to understand the actual motivator before the next negotiation.\n\nHer condition: Ludovic's safety. I accepted immediately. This was operationally correct regardless of her condition — Ludovic alive and in comfortable exile is a stabilization asset. Ludovic dead is a destabilization event and a Church martyrdom opportunity.\n\nI accepted without negotiation because I was going to offer it anyway. She read the immediate acceptance as generosity. This gives me a trust deposit in the relationship's early account that costs nothing.\n\nShe is intelligent. She arrived early. She had hidden weapons. She reads motivator frameworks and probes for information through stated skepticism ('why would I talk to a corpse' was a probe, not a question).\n\nI have installed a partner whose capability I have underestimated.\n\nThis may be the first time in twenty-nine chapters that the person I recruited to serve a function has a different function.\n\nI will need to watch this carefully.\n\nBusiness continues.`,
       ru:`Она прибыла одиннадцать минут раньше.\n\nЯ разместил одного из контактов сети Томаса у внешних монастырских ворот с карманными часами. Время было достаточно точным чтобы сказать мне кое-что: она знала маршрут не проходящий через стандартные контрольные точки, что означает что она нанесла на карту инфраструктуру доступа порта на уровне детализации требующем либо значительного предварительного планирования либо доступа к историческим обзорным записям. Любой из вариантов указывает на возможность которую я не моделировал.\n\nЯ скорректировал оценку угрозы/актива вверх приблизительно на двадцать процентов когда она вошла.\n\nНаходка стилета: Шепот извлёк одно лезвие при стандартном обыске. Я проинструктировал вторичную проверку. Ещё одно в ботинке. Оценка шпильки не дала ничего, что означает либо шпилька декоративная либо третичное скрытие лучше чем вторичный поиск Шепота. Я занёс неоднозначность.\n\nПереговоры проходили по модели Коридора Решений, но с одним отклонением которое я отметил: она не реагировала на «властную» рамку которую я использовал описывая что предлагает ей сделка. Она реагировала на рамку «агентности» — конкретно когда я сказал «вы сможете строить школы, карать врагов, реформировать законы». Властная рамка произвела бы другой лицевой регистр. Она показала интерес на рамке агентности. Это означает что её первичный мотиватор — не приобретение власти. Это что-то смежное.\n\nЯ отметил это и не скорректировал стратегию в реальном времени, потому что разница не влияла на условия сделки — условия которые я предлагал удовлетворяли любой мотиватор. Мне нужно будет понять реальный мотиватор до следующих переговоров.\n\nЕё условие: безопасность Людовика. Я принял немедленно. Это было операционно верным независимо от её условия — Людовик живой и в комфортном изгнании является активом стабилизации. Людовик мёртвый — дестабилизирующее событие и возможность для мученичества Церкви.\n\nЯ принял без переговоров, потому что собирался предложить это в любом случае. Она прочитала немедленное принятие как щедрость. Это даёт мне депозит доверия на раннем счёте отношений который ничего не стоит.\n\nОна умна. Она прибыла раньше. У неё было скрытое оружие. Она читает рамки мотиваторов и зондирует информацию через заявленный скептицизм («зачем мне говорить с трупом» было зондом, а не вопросом).\n\nЯ установил партнёра чьи возможности я недооценил.\n\nЭто может быть первый раз за двадцать девять глав когда человек которого я завербовал для выполнения функции имеет другую функцию.\n\nМне нужно будет внимательно наблюдать.\n\nБизнес продолжается.`
     },
     knows:{en:["She arrived eleven minutes early via an unmapped route — capability he had not modeled. He adjusted the threat/asset assessment upward by 20%.","Her response was to the agency-frame, not the power-frame. Her primary motivator is not power acquisition. 'Something adjacent.'","He accepted Ludovic's safety without negotiation because he was going to offer it anyway. She read it as generosity. 'I have installed a partner whose capability I have underestimated.'"],ru:["Она прибыла одиннадцать минут раньше ненанесённым на карту маршрутом — возможность которую он не моделировал. Он скорректировал оценку угрозы/актива вверх на 20%.","Её ответ был на рамку агентности а не власти. Её первичный мотиватор — не приобретение власти. «Что-то смежное».","Он принял безопасность Людовика без переговоров, потому что собирался предложить в любом случае. Она прочитала как щедрость. «Я установил партнёра чьи возможности я недооценил»."]},
     misunderstands:{en:["He noted 'this may be the first time that the person I recruited to serve a function has a different function.' He has not processed the full implications: she has been running a four-year intelligence operation with three proxy networks and has been tracking the Black Ledger's activities before she knew about Dante. She has more independent operational capability than any person he has recruited since the Island. He has been running the entire alliance as a bilateral arrangement — he provides capability, the other party provides access. Liliana provides access AND capability. He has not modeled a partnership at this level of mutual capability."],ru:["Он отметил «это может быть первый раз когда человек которого я завербовал для выполнения функции имеет другую функцию». Он не обработал полные импликации: она проводит четырёхлетнюю разведывательную операцию с тремя прокси-сетями и отслеживала деятельность Чёрного Гроссбуха прежде чем узнала о Данте. У неё больше независимых операционных возможностей чем у любого кого он завербовал с Острова. Он вёл весь альянс как двустороннюю договорённость — он предоставляет возможность, другая сторона предоставляет доступ. Лилиана предоставляет доступ И возможность."]},
     hides:{en:["He said 'I will need to watch this carefully.' He has identified that he has installed a partner of higher capability than modeled. He has not identified that she is already watching him — that she has been watching the Guild for four years, has proxy networks active, and has read his psychology from public behavior patterns before they met. He thinks he is the one who will be watching. He is also being watched. He did not note this symmetry."],ru:["Он сказал «мне нужно будет внимательно наблюдать». Он определил что установил партнёра более высоких возможностей чем смоделировал. Он не определил что она уже наблюдает за ним — что она наблюдала за Гильдией четыре года, имеет активные прокси-сети, и прочитала его психологию из публичных паттернов поведения до встречи. Он думает что он тот кто будет наблюдать. За ним тоже наблюдают."]},
     whisper:{en:"He installed a partner whose capability he underestimated. She has been watching the Guild for four years. He thinks he will be watching her. He is also being watched.",ru:"Он установил партнёра чьи возможности недооценил. Она наблюдала за Гильдией четыре года. Он думает что будет наблюдать за ней. За ним тоже наблюдают."}
   }
 }

{id:"s3",
 title:{en:"Bread, Silence, and a New Reality",ru:"Хлеб, Тишина и Новая Реальность"},
 subtitle:{en:"We are creating reality, Silas. Don't fall behind.",ru:"Мы создаём реальность, Силас. Не отставай."},
 location:{en:"Port Margrave — The Crowd / The Citadel",ru:"Порт Маргрейв — Толпа / Цитадель"},
 timing:{en:"Midday — Then Evening",ru:"Полдень — Затем Вечер"},
 flags:["institution_build","identity","foreshadowing"],
 povData:{
   dante:{distortion:3,
     text:{
       en:`The crowd was twenty-two hundred people. A conservative estimate: two hundred agitators embedded in the genuine workforce, identifiable by the specific vocal pattern of people who are not expressing grievances but performing grievances — the rhythm is different, the word choices are elevated in ways that indicate they were prepared rather than felt.\n\nI counted seven Church insignia visible on embedded agitators. Lucius's advance deployment, not Morius's — the Morius operation is reactive, and this level of infiltration requires three to four days of positioning. This was prepared before the financial freeze, which means Lucius anticipated the freeze's crowd-control consequences and pre-deployed a destabilization capability.\n\nHe is two to three moves ahead.\n\nThe Silence dome was the correct response but not for the reasons the crowd thought. They thought I was demonstrating supernatural power — the silence of a deity figure. What I was actually doing: calculating. The dome gave me forty-three seconds of uninterrupted processing time while the crowd was disoriented. In those forty-three seconds I counted the agitators, identified their positioning relative to the food-wagon entry points, and mapped the crowd's emotional gradient.\n\nWhen the dome lifted, I knew which three emotional pressure points would convert the crowd's hostility to loyalty: the Church contrast ('they give prayers, I give bread'), the enemy personification ('bankers want you to starve'), and the future-contract element ('double pay in Guild notes when we win'). These three elements address the three primary motivation architectures present in this crowd — religious authority, immediate material need, and deferred aspiration.\n\nThe food-distribution operation cost the Guild approximately forty thousand gold in supplies. It purchased the loyalty of twenty-two hundred workers for a minimum of three months, and produced a public demonstration of institutional reliability that will propagate through lower-city networks at approximately the same velocity as Peter's mother's medical payment. The return on investment is approximately twelve to one.\n\nThis is what the archive means by 'maintaining the base.'\n\nThe newspaper headline for tomorrow: 'Guild Saves Economy. Princess Liliana Heads Reform Committee.'\n\nThe Reform Committee does not exist. It will exist by the time the headline is read. I will have Silas draft the charter tonight and have Liliana sign it when she returns from her brother's. The charter will be real. The Committee will be real. The headline will describe a real thing that was created specifically to match the headline.\n\nThis is not propaganda. It is sequenced disclosure at media velocity.\n\nThe Ark.\n\nI have been filing the Ark's emergency signal as 'later' for eight weeks. The donor-memory archive produced the signal four times during today's operations — once during the beacon-silencing, once during the crowd-dome calculation, once during Liliana's negotiation, and once in the quiet after she left.\n\nFour times in one operational day. The frequency is increasing.\n\nThe archive does not produce Emergency signals about items that can wait indefinitely.\n\nI need to resolve the political situation, establish the legal framework, secure the supply chain, and then I can turn East.\n\nThis will take approximately six weeks.\n\nSix weeks, and then the Ark.\n\nBusiness continues.\n\nThis time I know exactly what business it is.`,
       ru:`Толпа была двадцать две сотни человек. Консервативная оценка: двести агитаторов встроенных в настоящую рабочую силу, определимых по специфическому голосовому паттерну людей не выражающих а исполняющих претензии — ритм отличается, словесные выборы возвышены способами указывающими на подготовленность а не прочувствованность.\n\nЯ насчитал семь видимых знаков Церкви на встроенных агитаторах. Авансовое развёртывание Люция, не Мориуса — операция Мориуса реактивна, и этот уровень проникновения требует трёх-четырёх дней позиционирования. Это было подготовлено до финансовой заморозки, что означает Люций предвидел последствия заморозки для контроля толпы и предварительно развернул возможность дестабилизации.\n\nОн на два-три хода впереди.\n\nКупол Тишины был верным ответом но не по причинам которые думала толпа. Они думали что я демонстрирую сверхъестественную силу — тишину фигуры божества. Что я фактически делал: рассчитывал. Купол дал мне сорок три секунды непрерываемого времени обработки пока толпа была дезориентирована. За эти сорок три секунды я подсчитал агитаторов, определил их позиционирование относительно точек входа продовольственных повозок и нанёс на карту эмоциональный градиент толпы.\n\nКогда купол поднялся, я знал какие три эмоциональных точки давления конвертируют враждебность толпы в лояльность: контраст с Церковью («они дают молитвы, я даю хлеб»), персонификация врага («банкиры хотят вас уморить голодом»), и элемент будущего контракта («двойная оплата в долговых расписках Гроссбуха когда победим»). Эти три элемента адресуют три основные мотивационные архитектуры присутствующие в этой толпе — религиозный авторитет, немедленная материальная нужда и отложенные устремления.\n\nОперация по распределению еды обошлась Гильдии приблизительно в сорок тысяч золотых поставками. Она купила лояльность двадцати двух сотен рабочих на минимум три месяца, и произвела публичную демонстрацию институциональной надёжности которая распространится по сетям нижнего города приблизительно с той же скоростью что медицинский платёж матери Питера. Возврат на инвестиции — приблизительно двенадцать к одному.\n\nЭто то что архив имеет в виду под «поддержанием базы».\n\nЗаголовок газеты для завтра: «Гильдия спасает экономику. Принцесса Лилиана возглавляет Комитет Реформ».\n\nКомитет Реформ не существует. Он будет существовать к моменту когда заголовок будет прочитан. Я дам Силасу составить устав сегодня ночью и попрошу Лилиану подписать его когда вернётся от брата. Устав будет реальным. Комитет будет реальным. Заголовок опишет реальную вещь созданную специально чтобы соответствовать заголовку.\n\nЭто не пропаганда. Это последовательное раскрытие со скоростью СМИ.\n\nКовчег.\n\nЯ восемь недель заносил экстренный сигнал Ковчега как «позже». Архив донорской памяти произвёл сигнал четыре раза в ходе сегодняшних операций — однажды во время заглушения маяка, однажды во время расчёта купола толпы, однажды во время переговоров Лилианы, и однажды в тишине после того как она ушла.\n\nЧетыре раза за один операционный день. Частота нарастает.\n\nАрхив не производит аварийных сигналов о пунктах которые могут ждать бесконечно.\n\nМне нужно разрешить политическую ситуацию, установить правовую рамку, обеспечить цепочку поставок, и затем я смогу повернуть на Восток.\n\nЭто займёт приблизительно шесть недель.\n\nШесть недель, и затем Ковчег.\n\nБизнес продолжается.\n\nНа этот раз я точно знаю что это за бизнес.`
     },
     knows:{en:["200 embedded Church agitators with 7 visible insignia — Lucius's pre-deployment, prepared before the freeze. He is two to three moves ahead.","The 43-second dome gave uninterrupted processing time. He mapped the crowd's emotional gradient and identified the three pressure points before lifting the silence.","The Ark produced 4 emergency signals in one operational day. 'The frequency is increasing.' He has set a six-week timeline to resolve the political situation before turning East."],ru:["200 встроенных агитаторов Церкви с 7 видимыми знаками — предварительное развёртывание Люция, подготовленное до заморозки. Он на два-три хода впереди.","43-секундный купол дал непрерываемое время обработки. Он нанёс на карту эмоциональный градиент толпы и определил три точки давления до поднятия тишины.","Ковчег произвёл 4 аварийных сигнала за один операционный день. «Частота нарастает». Он установил шестинедельный временной горизонт для разрешения политической ситуации перед поворотом на Восток."]},
     misunderstands:{en:["'He is two to three moves ahead.' He has identified that Lucius pre-deployed crowd-control destabilization before the financial freeze. He has not processed the full implication: Lucius prepared for the crowd consequence, which means Lucius also prepared for Dante's response to the crowd consequence, which means Lucius has modeled Dante's food-distribution and public-demonstration response. The crowd deployment was not just destabilization. It was also intelligence collection — a probe designed to observe how Dante manages his workforce when his financial system fails. Lucius is studying him."],ru:["«Он на два-три хода впереди». Он определил что Люций предварительно развернул дестабилизацию контроля толпы до финансовой заморозки. Он не обработал полную импликацию: Люций подготовился к последствию толпы, что означает Люций также подготовился к ответу Данте на последствие толпы, что означает Люций смоделировал ответ Данте с распределением еды и публичной демонстрацией. Развёртывание толпы было не просто дестабилизацией. Это также был сбор разведки — зонд разработанный наблюдать как Данте управляет рабочей силой когда его финансовая система отказывает. Люций изучает его."]},
     hides:{en:["'This time I know exactly what business it is.' He said this before. In Chapter 27, he wrote: 'Market share captured. Now it is time to deal with a share of the world.' He said: 'This time I know what business it is.' He wrote it in the ledger alone, in the dark, and did not report how it felt. Now he says it again, at the end of a chapter, with the same formula. The formula has a function: it closes the chapter. He uses it to end the narration when the narration has reached its completion point for the current operational cycle. He has not examined whether saying the formula twice — in the ledger alone, and then again at the end of the next chapter — means the sentence was not complete the first time."],ru:["«На этот раз я точно знаю что это за бизнес». Он говорил это прежде. В Главе 27 он написал: «Доля рынка захвачена. Теперь пора заняться долей мира». Он сказал: «На этот раз я знаю что это за бизнес». Он написал это в гроссбухе один, в темноте, и не доложил каково это было. Теперь говорит снова, в конце главы, с той же формулой. У формулы есть функция: она закрывает главу. Он использует её для завершения нарратива когда нарратив достиг точки завершения для текущего операционного цикла. Он не исследовал означает ли произнесение формулы дважды — в гроссбухе одному, и затем снова в конце следующей главы — что предложение не было завершено в первый раз."]},
     whisper:{en:"The Ark produced 4 signals today. Six weeks to the East. He said 'this time I know exactly what business it is' — the same formula as Chapter 27. He has not examined whether saying it twice means it was not finished the first time.",ru:"Ковчег произвёл 4 сигнала сегодня. Шесть недель до Востока. Он сказал «на этот раз я точно знаю что это за бизнес» — та же формула что Глава 27. Он не исследовал означает ли произнесение дважды что оно не было завершено в первый раз."}
   }
 }
}

const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');c.innerHTML=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}].map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
