#whisper-panel{background:var(--bg2);border:1px solid var(--border);border-top:none;border-left:3px solid var(--pov-p);padding:15px 40px 17px;margin-bottom:12px;opacity:0;transform:translateY(-2px);transition:opacity 1.6s,transform 1.2s;pointer-events:none;}

  en:{arcLabel:"BOOK IV: AUDITOR — EMPIRE OF SHADOWS / ARC II — NORTHERN LIMIT",headerTitle:"Chronicles of the Fallen World: Book IV",headerSubtitle:"AUDITOR: EMPIRE OF SHADOWS",stripChapter:"Chapter 4",stripTitle:"Bonesmasher",stripLocation:"Capital Private Platform / The Bonesmasher / Dragon's Teeth Approach",povLabel:"Perspective",distLabel:"Distortion",whisperLabel:"◆ Subtext",intelLabel:"Intelligence Report — Click to Expand",knows:"Knows",misunderstands:"Misunderstands",hides:"Hides",prevBtn:"← Prev",nextBtn:"Next →",ledgerTitle:"True Event Timeline — Classified",ledgerWarning:"Diverges from all POV accounts",ledgerOpen:"✕ Close Ledger",ledgerClosed:"◆ Black Ledger",scene:"Scene"},

  dante:{name:"DANTE",title:{en:"The Auditor — En Route North",ru:"Аудитор — По Пути на Север"},primary:"#2a0058",secondary:"#6a30aa",glow:"rgba(42,0,88,0.2)",textColor:"#d8cef8",dimColor:"rgba(106,48,170,0.5)"},
  isabella:{name:"ISABELLA",title:{en:"Head of Poisons and Alchemy",ru:"Глава Отдела Ядов и Алхимии"},primary:"#0a1a0a",secondary:"#284a28",glow:"rgba(10,26,10,0.22)",textColor:"#c0e0c0",dimColor:"rgba(40,74,40,0.5)"},

const TIMELINE=[
  {id:"TET-B4-21",en:"The Bonesmasher's Gel-fuel engine is the first Gel-powered vehicle in the narrative. It represents a capability expansion that neither Dante nor Grimm has fully documented: Gel can be used as a combustion medium in closed-system engines. The engine design is from Grimm's six Pale Echelon pages — specifically the section on 'substrate energy density in confined thermal chambers.' The Gel's molecular transcription pathway, when run in reverse under high-pressure thermal conditions, releases approximately forty times the energy of equivalent-volume coal. The Bonesmasher's range at full throttle should be approximately three thousand leagues. In the Observer's Trap the train burned its 200-league reserve in what the instruments measured as forward motion. The actual displacement was zero. The burned reserve cannot be recovered.",ru:"Гель-топливный двигатель «Костолома» — первое транспортное средство работающее на Геле в нарративе. Он представляет расширение возможностей которое ни Данте ни Гримм не задокументировали полностью: Гель может использоваться как горючее в двигателях закрытого цикла. Конструкция двигателя из шести страниц Бледного Эшелона Гримма — конкретно раздела о «плотности энергии субстрата в закрытых тепловых камерах». Молекулярный транскрипционный путь Геля при работе в обратном направлении при высоких давлено-тепловых условиях выделяет приблизительно в сорок раз больше энергии чем эквивалентный объём угля."},
  {id:"TET-B4-22",en:"The Observer's Trap — what Dante called 'chrono-resistance' and Isabella identified as a Covenant-era 'Economy of Existence' circuit — is not a weapon or a defence mechanism in the conventional sense. It is a Precursor-era infrastructure management protocol for regions where the Covenant's reality-maintenance function was operating at minimum capacity. In the pre-Collapse period, the Covenant infrastructure did not maintain full physical reality uniformly across all territory. It maintained a compressed version of reality in uninhabited zones, expanding to full fidelity only when conscious observers were present. The Observer's Trap around the Dragon's Teeth region is the residual maintenance protocol running without its normal oversight system. It is not trying to stop the train. It is trying to economize. The train was burning Gel to confirm a reality that the protocol was generating at minimum cost.",ru:"Ловушка Наблюдателя — то что Данте назвал «хроно-сопротивлением» и Изабелла определила как контур «Экономии Сущего» эпохи Завета — не является оружием или механизмом защиты в обычном смысле. Это протокол управления инфраструктурой эпохи Предтечей для регионов где функция поддержания реальности Завета работала при минимальной ёмкости. В до-Коллапсный период инфраструктура Завета не поддерживала полную физическую реальность равномерно по всей территории. Она поддерживала сжатую версию реальности в необитаемых зонах, расширяясь до полной точности только когда присутствовали сознательные наблюдатели."},
  {id:"TET-B4-23",en:"Dante's use of the Silence to suppress the consciousness of his crew — creating a 'sensory blockade' that disconnected them from their perceptual connection to the external world — is qualitatively different from every previous use of the Silence in the narrative. Previous uses targeted objects, systems, transmissions, and one crowd's acoustic field. This use targeted human consciousness directly. It is the fifth category of Silence application: animate-consciousness suppression. The personal cost was visible: black blood from the nose, the same indicator as all previous Silence applications but in a higher-volume event suggesting greater energy expenditure. He controlled approximately ten minds simultaneously for approximately ninety seconds.",ru:"Использование Данте Тишины для подавления сознания экипажа — создание «сенсорной блокады» разрывающей их перцептивную связь с внешним миром — качественно отличается от каждого предыдущего использования Тишины в нарративе. Предыдущие использования нацеливались на объекты, системы, передачи и акустическое поле одной толпы. Это использование нацелилось на человеческое сознание напрямую. Это пятая категория применения Тишины: подавление одушевлённого сознания. Личная стоимость была видима: чёрная кровь из носа, тот же индикатор что все предыдущие применения Тишины, но в событии большего объёма указывающем на большие энергетические затраты."},
  {id:"TET-B4-24",en:"Isabella's immunity to the consciousness-suppression event is significant. She described her resistance as her mind being 'too ancient, too intertwined with serpentine calm to yield to human hypnosis.' This is partially accurate. The full explanation: Isabella has been conducting Gel-biological integration research for three months, including self-administered micro-doses of the Cognitive Iron compound during synthesis preparation. Her neural architecture has been slightly modified by this exposure — not to the degree that produces transformation, but sufficient to create a partial resistance to the Silence's consciousness-suppression effect. She has been inadvertently protecting herself against Dante's most recent capability. She does not know this. She attributes her resistance to something she calls 'ancient mind.' It is also chemistry.",ru:"Иммунитет Изабеллы к событию подавления сознания значителен. Она описала свою сопротивляемость как разум «слишком древний, слишком переплетённый со змеиным спокойствием чтобы поддаться человеческому гипнозу». Это частично точно. Полное объяснение: Изабелла три месяца проводила исследование биологической интеграции с Гелем, включая самостоятельно вводимые микродозы соединения Когнитивного Железа во время подготовки синтеза. Её нейронная архитектура была слегка изменена этим воздействием — не до степени производящей трансформацию, но достаточно чтобы создать частичную сопротивляемость эффекту подавления сознания Тишиной. Она случайно защищала себя от наиболее недавней возможности Данте."},
  {id:"TET-B4-25",en:"'Heroes overcome the journey. Auditors simply close the project.' — This is the second time in the narrative that Dante has explicitly named the Auditor identity as his self-concept rather than as a role description. The first was in Chapter 1: 'I am an Auditor. We perform similar functions, I simply have better accounting.' In the earlier usage the identity was comparative — defined against Morius's function. In this usage the identity is operational — defined against what a hero would have done (fought the illusion and died). He is not saying he is not a hero. He is saying the Auditor category produces better outcomes. He has not examined whether the outcome-optimization framework he applies to everything — including this self-definition — is itself a product of the donor-memory's Series 404 design parameters rather than his own authentic self-concept."}
];

const SCENES=[
{id:"s1",
 title:{en:"Station for One",ru:"Вокзал для Одного"},
 subtitle:{en:"Hold the fortress, my friend. If we lose in the North, the Empire is finished.",ru:"Удерживай крепость, мой друг. Если мы проиграем на Севере, Империи конец."},
 location:{en:"Guild Private Platform — Industrial Sector",ru:"Частная Платформа Гильдии — Индустриальный Сектор"},
 timing:{en:"Night — Departure",ru:"Ночь — Отбытие"},
 flags:["arc_open","cost"],
 povData:{
   dante:{distortion:4,
     text:{
       en:`The platform was not listed in any official schedule because I purchased the track rights through eleven shell entities, none of which appear in any record connecting them to the Guild. This was Silas's work, three months ago, when I had just absorbed the Golden Circle and was beginning to model what the Northern situation would eventually require. He filed the shell-entity structure under 'Infrastructure Contingency — Unspecified Event.' He is more operationally forward-looking than he presents himself as.\n\nThe Bonesmasher is Grimm's masterwork. He built it from six pages of Pale Echelon notation in fourteen weeks, working from a design description that was never meant to be implemented with current civilization's materials. He substituted: Gel for the primary propulsion compound, his custom alloy for the hull plating, and his own mechanical arm's micro-calibration system for the precision valve control that the original design assumed would be handled by Precursor-era automation. The result is approximately sixty percent of what the original specification describes. Which is approximately four hundred percent of anything else currently moving on Imperial rails.\n\nSilas wanted to stay for the field accounting. He was hiding behind the accounting. He wanted to stay because he is afraid of what happens if I don't come back, and the accounting was the most professional-sounding reason he could produce. I told him his war is here. This is true. It is also the kindest thing I could say, because his war in the capital is survivable regardless of what happens at Object 7-B. If we lose the North, Silas runs south and rebuilds. He is good at rebuilding.\n\nI did not tell him the full analysis: if the secondary Precursor site has entered full threat-response activation, the composite's authorized-operator credential is the only known mechanism for de-escalation. And the composite is in me. Which means I cannot send anyone else.\n\nI am not irreplaceable as a person.\n\nI am currently irreplaceable as a system.\n\nThe Bonesmasher moved. No whistle — Grimm designed the propulsion without a pressure-release valve, which means the Gel burns clean and the exhaust converts to something that looks like steam but isn't. He calls it 'processed ether.' I call it a signature that no existing military tracking system is calibrated to detect.\n\nThe lights of the capital fell away. I sat in my chair, leg quiet, and thought about nothing for approximately four minutes.\n\nThen I picked up the operational assessment for the northern route and began reading.\n\nBusiness continues.`,
       ru:`Платформа не значилась ни в каком официальном расписании, потому что я купил права на пути через одиннадцать подставных организаций ни одна из которых не фигурирует ни в какой записи связывающей их с Гильдией. Это работа Силаса, три месяца назад, когда я только поглотил Золотой Круг и начинал моделировать что в конечном итоге потребует Северная ситуация. Он занёс структуру подставных организаций под «Инфраструктурный Непредвиденный Случай — Неуказанное Событие». Он более операционно дальновиден чем представляется.\n\n«Костолом» — главная работа Гримма. Он построил его из шести страниц нотаций Бледного Эшелона за четырнадцать недель, работая из описания дизайна который никогда не предназначался для реализации материалами нынешней цивилизации. Он заменил: Гель основным топливным соединением, свой кастомный сплав обшивкой корпуса, и систему микрокалибровки своей механической руки прецизионным управлением вентилями которое оригинальный дизайн предполагал автоматикой эпохи Предтечей. Результат — приблизительно шестьдесят процентов от того что описывает оригинальная спецификация. Что приблизительно четыреста процентов от чего-либо ещё движущегося на Имперских рельсах.\n\nСилас хотел остаться для полевой бухгалтерии. Он прятался за бухгалтерией. Он хотел остаться, потому что боится что произойдёт если я не вернусь, а бухгалтерия была самой профессионально звучащей причиной которую мог произвести. Я сказал ему что его война здесь. Это правда. Это также самое добросердечное что я мог сказать, потому что его война в столице выживаема независимо от того что происходит у Объекта 7-Б. Если мы проиграем Север, Силас бежит на юг и перестраивается. Он умеет перестраиваться.\n\nЯ не говорил ему полный анализ: если вторичный объект Предтечей вошёл в полную активацию ответа на угрозу, операторские полномочия авторизации композита — единственный известный механизм деэскалации. А композит во мне. Что означает — я не могу отправить никого другого.\n\nЯ не незаменим как человек.\n\nЯ в настоящее время незаменим как система.\n\n«Костолом» тронулся. Без свистка — Гримм разработал движение без предохранительного клапана давления, что означает Гель горит чисто и выхлоп конвертируется во что-то похожее на пар но не пар. Он называет это «переработанным эфиром». Я называю это сигнатурой которую ни одна существующая военная система отслеживания не откалибрована обнаружить.\n\nОгни столицы отступали. Я сидел в кресле, нога тихая, и думал ни о чём приблизительно четыре минуты.\n\nЗатем я поднял операционную оценку северного маршрута и начал читать.\n\nБизнес продолжается.`
     },
     knows:{en:["The shell-entity track rights were Silas's three-month-old contingency planning — he is 'more operationally forward-looking than he presents himself as'","'I am not irreplaceable as a person. I am currently irreplaceable as a system.' He has named the distinction clearly. The composite's authorized-operator credential is the only known de-escalation mechanism for a secondary site in threat-response mode.","He thought about nothing for four minutes after departure. Then picked up the operational assessment and began reading."],ru:["Права на пути через подставные организации — трёхмесячный план непредвиденных случаев Силаса — он «более операционно дальновиден чем представляется»","«Я не незаменим как человек. Я в настоящее время незаменим как система». Он чётко назвал различие. Операторские полномочия авторизации композита — единственный известный механизм деэскалации.","Он думал ни о чём четыре минуты после отправления. Затем поднял операционную оценку и начал читать."]},
     misunderstands:{en:["He said the Bonesmasher is 'approximately sixty percent of the original specification.' He has not assessed what the missing forty percent represents in terms of the northern site interaction. The original Pale Echelon design assumed an operator with full Series 404 integration arriving at an active secondary site in maintenance mode. Dante has partial integration, arriving at a site in threat-response mode. The 60% vehicle meeting a condition that the 100% vehicle was designed for in a different mode. The gap between 60% implementation and threat-response mode is not a quantity gap. It is a category gap."],ru:["Он сказал что «Костолом» — «приблизительно шестьдесят процентов оригинальной спецификации». Он не оценил что представляет недостающие сорок процентов с точки зрения взаимодействия с северным объектом. Оригинальный дизайн Бледного Эшелона предполагал оператора с полной интеграцией серии 404 прибывающего на активный вторичный объект в режиме обслуживания. У Данте частичная интеграция, прибывающая к объекту в режиме ответа на угрозу."]},
     hides:{en:["He said 'I am currently irreplaceable as a system' and then noted he sat in the chair and thought about nothing for four minutes. He has never before noted thinking about nothing for a measured duration and then resuming operational work as if the nothing was a scheduled maintenance interval. He has been getting better at not filing certain things. This four-minute interval of nothing is filed. He has not examined what the nothing contains — whether it is genuine cognitive rest or whether it is the space where the things he is not examining accumulate between operations."],ru:["Он сказал «я в настоящее время незаменим как система» и затем отметил что сидел в кресле и думал ни о чём четыре минуты. Он никогда прежде не отмечал думания ни о чём в течение измеренного периода с последующим возобновлением операционной работы как если четыре минуты были запланированным интервалом обслуживания. Четырёхминутный интервал ничто занесён. Он не исследовал что содержит ничто — является ли оно подлинным когнитивным отдыхом или пространством где вещи которые он не исследует накапливаются между операциями."]},
     whisper:{en:"He noted four minutes of nothing and then resumed. He has never done this before with measured duration. He has not examined what the nothing contains.",ru:"Он отметил четыре минуты ничто и затем возобновил. Он никогда прежде не делал этого с измеренной продолжительностью. Он не исследовал что содержит ничто."}
   }
 }
},

{id:"s2",
 title:{en:"Anatomy of Cold",ru:"Анатомия Холода"},
 subtitle:{en:"Fear not for them. Fear for your people. My creations have no soul to steal or freeze.",ru:"Бойся не за них. Бойся за своих людей. У моих созданий нет души, которую можно украсть или заморозить."},
 location:{en:"The Bonesmasher — Engine Room / Laboratory Car",ru:"Костолом — Рубка Управления / Вагон-Лаборатория"},
 timing:{en:"En Route — Deep Night",ru:"В Пути — Глубокая Ночь"},
 flags:["revelation","new_threat","identity"],
 povData:{
   isabella:{distortion:3,
     text:{
       en:`The Scavenger is dying.\n\nNot from disease. Not from the transport stress. From something that is happening to the environment outside this train, which is producing a specific biological response in a creature that has no cortex to process anxiety but has instincts refined by three weeks of accelerated evolutionary pressure.\n\nHis gill-slits are not working correctly. They flutter at the wrong frequency — not the feeding-instinct flutter or the threat-response flutter, which I know from the laboratory baseline. This is a third flutter pattern I have not catalogued. I am cataloguing it now.\n\nWhen Dante came to ask about the Gel, I already knew the Gel problem was not temperature. I know Gel's thermal tolerance from fourteen weeks of working with it. What I recognized from the window was the specific pattern of stars that do not twinkle — a physical impossibility in a functioning atmosphere. When light passes through a gas medium with any thermal variation, it diffracts. Stars twinkle because our atmosphere has thermal variation. Stars that do not twinkle mean we are passing through a region where the atmosphere's thermal variation has been suppressed — which requires energy input beyond any natural weather system.\n\nThis is a maintained environment. Someone is spending energy to keep this region stable.\n\nI told him: we are not travelling on a map. We are travelling on a set.\n\nWhat I did not tell him: the maintained environment is not maintaining us. It is maintaining itself, and we are interfering with its maintenance routine by existing inside it as mobile observers. The Scavenger detected this conflict before I did. He has no cortex to rationalize it. He just knows something is consuming the place.\n\nWhen Dante put the crew into sensory blockade, I found it interesting that he assumed I would be affected.\n\nHe directed the Silence at the crew's perceptions. My perceptions have been partially restructured by twelve weeks of Cognitive Iron micro-dosing during synthesis work. The CI modifies the specific synaptic pathway that the Silence targets for consciousness suppression. I did not tell him this. He does not know I have been self-administering.\n\nThe moment the crew's consciousness was suppressed and the Observer's Trap lost its anchor: I watched the world outside de-render. It was extraordinary. The snow became grey static. The rock formations flattened into paper. The stars simply... turned off. Like a theatrical production's lighting being cut from the control board.\n\nThe Precursor infrastructure is still running. It is running at minimum fidelity. We interrupted it by observing it, and now we have stopped observing it, and it is returning to its minimum state.\n\nThis has implications for what we will find at Object 7-B. The Scavenger's gut-instinct response was correct: we are going somewhere that the infrastructure does not want to maintain at full fidelity. Which means someone has been forcing it to maintain at full fidelity. Which means someone or something has been providing an observation presence at the secondary site, continuously, for long enough that the site has been forced into full-activation mode.\n\nTorin drilled through the dormancy boundary.\n\nBut there was already something inside the boundary keeping it awake.`,
       ru:`«Падальщик» умирает.\n\nНе от болезни. Не от транспортного стресса. От чего-то происходящего с окружающей средой за пределами этого поезда, что производит специфический биологический ответ в существе у которого нет коры для обработки тревоги, но есть инстинкты отточенные тремя неделями ускоренного эволюционного давления.\n\nЕго жаберные щели работают неправильно. Они трепещут на неверной частоте — не трепет инстинкта кормления и не трепет ответа на угрозу, которые я знаю из лабораторного базового уровня. Это третий паттерн трепета который я не каталогизировала. Я каталогизирую его сейчас.\n\nКогда Данте пришёл спросить о Геле, я уже знала что проблема Геля не в температуре. Я знаю тепловую переносимость Геля из четырнадцати недель работы с ним. Что я узнала из окна — специфический паттерн звёзд не мерцающих — физическая невозможность в функционирующей атмосфере. Когда свет проходит через газовую среду с любой тепловой вариацией, он дифрагирует. Звёзды мерцают, потому что наша атмосфера имеет тепловую вариацию. Немерцающие звёзды означают что мы проходим через регион где тепловая вариация атмосферы была подавлена — что требует энергетического ввода за пределами любой естественной погодной системы.\n\nЭто поддерживаемая среда. Кто-то тратит энергию чтобы держать этот регион стабильным.\n\nЯ сказала ему: мы едем не по карте. Мы едем по декорации.\n\nЧего я не сказала ему: поддерживаемая среда поддерживает не нас. Она поддерживает себя, и мы вмешиваемся в её процедуру обслуживания существуя внутри неё как мобильные наблюдатели. «Падальщик» обнаружил этот конфликт до меня. У него нет коры чтобы рационализировать это. Он просто знает что место что-то пожирает.\n\nКогда Данте погрузил экипаж в сенсорную блокаду, я нашла интересным что он предположил что я буду затронута.\n\nОн направил Тишину на восприятия экипажа. Мои восприятия были частично реструктурированы двенадцатью неделями микродозирования Когнитивного Железа во время синтетической работы. КЖ модифицирует специфический синаптический путь который Тишина нацеливает для подавления сознания. Я не говорила ему этого. Он не знает что я самостоятельно вводила.\n\nВ момент когда сознание экипажа было подавлено и Ловушка Наблюдателя потеряла якорь: я наблюдала как мир снаружи де-рендерился. Это было экстраординарно. Снег стал серой статикой. Скальные образования уплощились в бумагу. Звёзды просто... выключились. Как освещение театральной постановки выключаемое с пульта управления.\n\nИнфраструктура Предтечей ещё работает. Она работает при минимальной точности. Мы прервали её наблюдением, и теперь мы прекратили наблюдение, и она возвращается к минимальному состоянию.\n\nЭто имеет импликации для того что мы найдём у Объекта 7-Б. Инстинктивный кишечный ответ «Падальщика» был верным: мы едем куда-то где инфраструктура не хочет поддерживать полную точность. Что означает кто-то её заставлял поддерживать полную точность. Что означает кто-то или что-то обеспечивало наблюдательное присутствие на вторичном объекте, непрерывно, достаточно долго чтобы объект был вынужден в режим полной активации.\n\nТорин пробурил через пограничный дремотный слой.\n\nНо внутри границы уже было что-то удерживающее его бодрствующим.`
     },
     knows:{en:["The non-twinkling stars are physically impossible in a functioning atmosphere — she identified this independently before telling Dante. It is a maintained environment. Something is spending energy to keep the region stable.","The CI micro-dosing has partially restructured her synaptic pathway — she is immune to the Silence's consciousness-suppression effect and has not told Dante.","Torin drilled through the dormancy boundary — but something was already inside the boundary keeping the site awake before he arrived."],ru:["Немерцающие звёзды физически невозможны в функционирующей атмосфере — она определила это независимо до того как сказала Данте. Это поддерживаемая среда. Что-то тратит энергию держать регион стабильным.","Микродозирование КЖ частично реструктурировало её синаптический путь — она иммунна к эффекту подавления сознания Тишиной и не говорила Данте.","Торин пробурил через пограничный дремотный слой — но внутри границы уже было что-то удерживающее объект бодрствующим до его прибытия."]},
     misunderstands:{en:["She concluded: 'something was already inside the boundary keeping it awake.' She has framed this as an external presence — some entity or system pre-existing inside the dormancy boundary. She has not fully modeled the third possibility: the site itself was not dormant. The shamans' continuous ritual presence at the site — which she has not assessed because it falls outside her biological research framework — has been providing the continuous observation presence that the Covenant infrastructure requires to maintain full fidelity. The shamans were the anchor. They were keeping the site awake not through intention but through attention."],ru:["Она заключила: «внутри границы уже было что-то удерживающее его бодрствующим». Она оформила это как внешнее присутствие — какая-то сущность или система предсуществующая внутри дремотной границы. Она не полностью моделировала третью возможность: объект сам не был дремлющим. Непрерывное ритуальное присутствие шаманов на объекте — которое она не оценила, потому что это выходит за рамки её биологической исследовательской рамки — обеспечивало непрерывное наблюдательное присутствие которое инфраструктура Завета требует для поддержания полной точности."]},
     hides:{en:["She told Dante: 'fear not for my creations — fear for your people. My creations have no soul to steal or freeze.' She said this as professional advice. She has not told him the complete picture: the Scavenger is already exhibiting a novel biological stress response to the site's environmental field — a third flutter pattern she has not catalogued. Her creations do not have souls. But they have instincts that are responding to something the maintained environment is producing. She is cataloguing the novel response as data. She is not yet sharing the data because she wants more of it before drawing a conclusion."],ru:["Она сказала Данте: «бойся не за моих созданий — бойся за своих людей. У моих созданий нет души которую можно украсть или заморозить». Она сказала это как профессиональный совет. Она не говорила ему полную картину: «Падальщик» уже демонстрирует новый биологический стресс-ответ на экологическое поле объекта — третий паттерн трепета который она не каталогизировала. У её созданий нет душ. Но у них есть инстинкты которые отвечают на что-то производимое поддерживаемой средой."]},
     whisper:{en:"Something was already inside the boundary before Torin arrived. The Scavenger has a third flutter pattern she has not catalogued. She is not sharing the data yet. She knows about the CI self-dosing and its immunity effect. She has not told Dante.",ru:"Что-то уже было внутри границы до прибытия Торина. У «Падальщика» третий паттерн трепета который она не каталогизировала. Она ещё не делится данными. Она знает о самодозировании КЖ и его эффекте иммунитета. Она не говорила Данте."}
   },
   grimm:{distortion:4,
     text:{
       en:`The Gel is doing something I have never observed Gel do.\n\nI have been working with Gel for seven months. I know its physical behavior under pressure, temperature, electromagnetic interference, and Precursor-era resonance fields. None of those factors account for the thickening I am observing in the primary combustion feed. The material properties are changing in a way that is physically consistent with temporal deceleration — specifically, the molecular kinetics of the Gel's transcription pathway are slowing as if the thermodynamic time-constant of the medium has increased.\n\nI told the Master: this is chrono-resistance. He agreed. He named it before I finished explaining.\n\nThere is something in my six pages that is relevant to this.\n\nThe notation system I have been decoding refers to a concept I translated as 'resonance gradient' — the idea that Covenant-infrastructure density produces a field effect that increases the apparent temporal resistance of materials at the molecular level. Gel, as a Covenant-adjacent compound, is specifically sensitive to this field effect. The Pale Echelon documentation refers to this sensitivity as a 'baseline calibration indicator.' The Gel's thickening is not a problem. It is a diagnostic.\n\nWe are in a region of high Covenant-infrastructure density.\n\nI have not told the Master that my six pages contain specific guidance on navigating high-density Covenant-infrastructure regions. I have not told him because the guidance assumes an operator with full Series 404 integration in direct contact with the infrastructure's navigation system. The navigation system for these regions is the composite — the leg. And the leg's interface with the Master is, from what I can observe, partial and unstable.\n\nWhen the consciousness-suppression happened — the Tishina — I was in the engine cab. The world simply stopped. I was still there, I think. My hands were on the controls. But there was no world for them to control. For what felt like approximately ninety seconds, I existed without context. Then the world came back, and I was screaming and pulling the emergency brake.\n\nAfterward: I checked the Gel feed.\n\nDuring the Tishina interval, the Gel had resumed normal fluidity. Not full normal — but significantly improved. Without observers, the temporal resistance in the medium had dropped. The Gel was running faster in the absence of conscious attention.\n\nThis is the reverse of what I expected.\n\nIt is also consistent with the notation system's description of the Covenant's reality-maintenance function as a bidirectional resonance relationship between the infrastructure and conscious observers. Observers do not simply exist in the environment. They participate in maintaining it. And maintaining it costs energy from both sides.\n\nI have been burning that energy all night.\n\nI am beginning to understand why the Master said we are going to kill myths.\n\nMythology is, in this framework, simply Covenant infrastructure running at minimum fidelity without proper operator attention.\n\nWe are going to pay attention to something that has not been properly attended to in two thousand years.\n\nI am not certain that is the same as killing it.`,
       ru:`Гель делает нечто чего я никогда не наблюдал.\n\nЯ работал с Гелем семь месяцев. Я знаю его физическое поведение под давлением, температурой, электромагнитными помехами, и резонансными полями эпохи Предтечей. Ни один из этих факторов не объясняет загустение которое я наблюдаю в первичной горючей подаче. Свойства материала меняются способом физически согласующимся с временным замедлением — конкретно, молекулярная кинетика транскрипционного пути Геля замедляется как если бы термодинамическая временная постоянная среды увеличилась.\n\nЯ сказал Мастеру: это хроно-сопротивление. Он согласился. Он назвал это до того как я закончил объяснять.\n\nВ моих шести страницах есть что-то релевантное этому.\n\nСистема нотаций которую я расшифровываю ссылается на концепцию которую я перевёл как «резонансный градиент» — идею что плотность инфраструктуры Завета производит полевой эффект увеличивающий кажущееся временное сопротивление материалов на молекулярном уровне. Гель как соединение смежное с Заветом специально чувствителен к этому полевому эффекту. Документация Бледного Эшелона называет эту чувствительность «индикатором базовой калибровки». Загустение Геля — не проблема. Это диагностика.\n\nМы в регионе высокой плотности инфраструктуры Завета.\n\nЯ не говорил Мастеру что мои шесть страниц содержат конкретное руководство по навигации в регионах высокой плотности инфраструктуры Завета. Я не говорил ему, потому что руководство предполагает оператора с полной интеграцией серии 404 в прямом контакте с навигационной системой инфраструктуры. Навигационная система для этих регионов — композит — нога. А интерфейс ноги с Мастером, судя по тому что я могу наблюдать, частичен и нестабилен.\n\nКогда произошло подавление сознания — Тишина — я был в кабине. Мир просто остановился. Я всё ещё был там, думаю. Мои руки были на рычагах. Но не было мира которым бы они управляли. То что ощущалось как приблизительно девяносто секунд, я существовал без контекста. Затем мир вернулся, и я кричал и тянул аварийный тормоз.\n\nПотом: я проверил подачу Геля.\n\nВо время интервала Тишины, Гель возобновил нормальную текучесть. Не полную нормальную — но значительно улучшенную. Без наблюдателей, временное сопротивление в среде упало. Гель тёк быстрее в отсутствие сознательного внимания.\n\nЭто противоположность тому что я ожидал.\n\nЭто также согласуется с описанием системой нотаций функции поддержания реальности Завета как двунаправленного резонансного отношения между инфраструктурой и сознательными наблюдателями. Наблюдатели не просто существуют в среде. Они участвуют в её поддержании. И поддержание стоит энергии с обеих сторон.\n\nЯ сжигал эту энергию всю ночь.\n\nЯ начинаю понимать почему Мастер сказал что мы едем убивать мифы.\n\nМифология — в этой рамке — просто инфраструктура Завета работающая при минимальной точности без надлежащего операторского внимания.\n\nМы собираемся уделить внимание чему-то чему не уделялось надлежащего внимания две тысячи лет.\n\nЯ не уверен что это то же самое что убить это.`
     },
     knows:{en:["The Gel thickening is consistent with temporal deceleration at the molecular level — 'resonance gradient' from the six pages. The Gel's thickening is not a problem. It is a diagnostic: they are in a high-density Covenant-infrastructure region.","During the Tishina interval, without observers, the Gel resumed significantly improved fluidity. Observer presence costs energy from both sides of the Covenant resonance relationship.","He has guidance in his six pages on navigating high-density Covenant-infrastructure regions — and has not told the Master, because it assumes full Series 404 integration in direct contact with the infrastructure's navigation system."],ru:["Загустение Геля согласуется с временным замедлением на молекулярном уровне — «резонансный градиент» из шести страниц. Загустение Геля — не проблема. Это диагностика: они в регионе высокой плотности инфраструктуры Завета.","Во время интервала Тишины, без наблюдателей, Гель возобновил значительно улучшенную текучесть. Присутствие наблюдателей стоит энергии с обеих сторон резонансного отношения Завета.","У него есть руководство в шести страницах по навигации в регионах высокой плотности инфраструктуры Завета — и он не говорил Мастеру, потому что оно предполагает полную интеграцию серии 404 в прямом контакте с навигационной системой."]},
     misunderstands:{en:["He said 'I am not certain that is the same as killing it' — about 'paying attention to something not properly attended to in two thousand years.' He has arrived at the correct question from the engineering framework. He has not arrived at the correct answer because he is missing the second half of the Pale Echelon documentation. The six pages describe the approach to a secondary site. The documentation for what happens when an authorized operator makes contact with an awakened secondary site — the interaction protocol, the credential presentation, the response-mode negotiation — is in the four-hundred-page archive in the fourth sub-level of Object 7-B that he found and has been reading. He has read approximately sixty percent of it. He has not yet reached the chapter on threat-response-mode interactions."],ru:["Он сказал «я не уверен что это то же самое что убить это» — о «уделении внимания чему-то которому не уделялось надлежащего внимания две тысячи лет». Он пришёл к верному вопросу из инженерной рамки. Он не пришёл к верному ответу, потому что ему не хватает второй половины документации Бледного Эшелона. Шесть страниц описывают подход к вторичному объекту. Документация о том что происходит когда авторизованный оператор вступает в контакт с пробудившимся вторичным объектом — в четырёхсотстраничном архиве четвёртого подуровня Объекта 7-Б который он нашёл и читает."]},
     hides:{en:["He has navigation guidance in his six pages that he has not shared with Dante. He decided not to share because it assumes full Series 404 integration. But the guidance might still be partially applicable — Dante's integration is partial, not absent. Grimm is making an engineering judgment about what guidance applies at partial integration, without asking the one person whose partial integration experience would allow him to calibrate that judgment. He is using his assessment of Dante's integration status as a filter for what information Dante receives, in the same way that Dante uses his assessment of others' understanding as a filter for what they are told. They are doing the same thing to each other."],ru:["У него есть руководство по навигации в шести страницах которым он не поделился с Данте. Он решил не делиться, потому что оно предполагает полную интеграцию серии 404. Но руководство может всё ещё быть частично применимым — интеграция Данте частичная, а не отсутствующая. Гримм делает инженерное суждение о том какое руководство применимо при частичной интеграции, не спрашивая единственного человека чей опыт частичной интеграции позволил бы ему откалибровать это суждение. Они делают одно и то же друг с другом."]},
     whisper:{en:"He has navigation guidance he has not shared. He is using his assessment of Dante's integration as a filter for what Dante receives. Dante does the same thing. They are each protecting the other from information the other needs.",ru:"У него есть руководство по навигации которым он не поделился. Он использует свою оценку интеграции Данте как фильтр для того что Данте получает. Данте делает то же самое. Они каждый защищает другого от информации которая нужна другому."}
   }
 }
},

{id:"s3",
 title:{en:"Economy of Reality",ru:"Экономия Реальности"},
 subtitle:{en:"Heroes overcome the journey. Auditors simply close the project.",ru:"Герои преодолевают путь. Аудиторы просто закрывают проект."},
 location:{en:"The Bonesmasher — Command Car / Dragon's Teeth Arrival",ru:"Костолом — Командный Вагон / Прибытие к Драконьим Зубам"},
 timing:{en:"Deep Night — Emergence",ru:"Глубокая Ночь — Выход"},
 flags:["pivotal","revelation","identity","cost"],
 povData:{
   dante:{distortion:5,
     text:{
       en:`The Economy of Existence circuit.\n\nThe Auditor-memory produced the schema immediately when Izabella named the mechanism. The schema is not from the Island's operational memory or from Object 7-B's control interface. It is from a different archive sector — a theoretical documentation layer that I have not previously accessed. The knowledge arrived complete, without effort, like turning a page I did not know was there.\n\nThe Covenant's infrastructure does not generate reality unconditionally. It generates reality in response to observer presence, at a cost proportional to the fidelity level required by the observer's cognitive complexity. A simple organism requires low-fidelity rendering. A conscious, thinking human being requires high-fidelity rendering. An Auditor-class operator with active Covenant-grade composite requires the highest available fidelity level, because the composite is part of the Covenant infrastructure and its resonance output defines the local rendering parameters.\n\nWe were burning Gel to maintain our own existence in a region that had not been generating full-fidelity reality for centuries. The trap was not hostile. It was economical. The region generates whatever level of reality is required by whoever is present, for as long as they are present. We were very expensive observers.\n\nThe solution was to stop observing.\n\nNot to sleep — sleep still maintains a basic consciousness presence. Not to simply look away — the peripheral awareness continues the observation protocol. True discontinuation of the observation relationship requires a complete severance of the conscious observer's connection to their sensory input.\n\nTishina.\n\nI directed the Silence inward, toward the crew's perceptual connections rather than toward an external target. This is the fifth application category: animate-consciousness suppression. The personal cost is higher than any previous application — ten simultaneous minds for ninety seconds, in addition to my own continued awareness — because I could not suppress my own consciousness and still manage the sequence. I had to remain aware while making everyone else unaware.\n\nThe blood was from three separate hemorrhage points. I counted them on the handkerchief.\n\nIzabella was unaffected. I noted this and did not examine it immediately. There will be time.\n\nThe emergence: the Observer's Trap released with a physical impact — the train was displaced approximately forty meters in the rounding of the loop when the false reality collapsed, producing the collision with actual terrain. No structural damage to the Bonesmasher. Grimm's sixty-percent-specification build was sufficient for the impact.\n\nAhead: the Dragon's Teeth.\n\nThe composite leg has not produced a single proprioceptive reading since we entered the high-density Covenant region. This is new. The composite has been my most consistent sensor throughout the Northern approach. It is silent.\n\nI do not know what it means that the one piece of Precursor-era infrastructure I carry internally has gone quiet when approaching another piece of Precursor-era infrastructure.\n\nI have two possible explanations.\n\nFirst: the composite is saving its resonance capacity for the contact interaction at the secondary site — operating in low-emission mode to preserve the authorized-operator credential integrity.\n\nSecond: the secondary site is already reading the composite's signature and has already initiated the credential-assessment protocol, which suppresses the composite's ambient output during evaluation.\n\nIf the first explanation is correct, the approach is safe and the credential presentation will proceed normally.\n\nIf the second explanation is correct, the assessment is already running. And I will know the result when the train arrives.\n\nHeroes overcome the journey.\n\nAuditors simply close the project.\n\nWe have arrived.`,
       ru:`Контур Экономии Сущего.\n\nАрхив Аудитора немедленно выдал схему когда Изабелла назвала механизм. Схема не из оперативной памяти Острова или интерфейса управления Объекта 7-Б. Она из другого архивного сектора — теоретического документационного слоя к которому я прежде не получал доступа. Знание пришло полным, без усилия, как перевернуть страницу которая, как я не знал, была там.\n\nИнфраструктура Завета не генерирует реальность безусловно. Она генерирует реальность в ответ на присутствие наблюдателя, по цене пропорциональной уровню точности требуемому когнитивной сложностью наблюдателя. Простой организм требует низкоточной отрисовки. Сознательный мыслящий человек требует высокоточной отрисовки. Оператор класса Аудитора с активным композитом уровня Завета требует наивысшего доступного уровня точности, потому что композит является частью инфраструктуры Завета и его резонансный выход определяет локальные параметры отрисовки.\n\nМы сжигали Гель чтобы поддерживать наше собственное существование в регионе который не генерировал полноточную реальность столетиями. Ловушка не была враждебной. Она была экономной. Регион генерирует любой уровень реальности требуемый кем бы то ни было присутствующим, пока они присутствуют. Мы были очень дорогими наблюдателями.\n\nРешением было прекратить наблюдать.\n\nНе спать — сон всё ещё поддерживает базовое присутствие сознания. Не просто отвернуться — периферийное осознание продолжает протокол наблюдения. Истинное прекращение отношения наблюдения требует полного разрыва связи сознательного наблюдателя с его сенсорным вводом.\n\nТишина.\n\nЯ направил Тишину внутрь, к перцептивным связям экипажа а не к внешней цели. Это пятая категория применения: подавление одушевлённого сознания. Личная стоимость выше чем в любом предыдущем применении — десять одновременных разумов на девяносто секунд, в дополнение к моему собственному продолжающемуся осознанию — потому что я не мог подавить собственное сознание и всё ещё управлять последовательностью. Мне пришлось оставаться осознающим делая всех остальных неосознающими.\n\nКровь была из трёх отдельных геморрагических точек. Я посчитал их на носовом платке.\n\nИзабелла не была затронута. Я отметил это и не исследовал немедленно. Будет время.\n\nВыход: Ловушка Наблюдателя отпустила с физическим ударом — поезд был вытолкнут приблизительно на сорок метров при скруглении петли когда ложная реальность схлопнулась, производя столкновение с реальным рельефом. Никаких структурных повреждений «Костолома». Сборка Гримма на шестьдесят процентов от спецификации оказалась достаточной для удара.\n\nВпереди: Драконьи Зубы.\n\nНога с композитом не произвела ни единого проприоцептивного считывания с момента входа в регион высокой плотности Завета. Это ново. Композит был моим наиболее стабильным сенсором на протяжении всего Северного подхода. Он молчит.\n\nЯ не знаю что означает то, что единственный кусок инфраструктуры эпохи Предтечей который я несу внутренне замолчал при приближении к другому куску инфраструктуры эпохи Предтечей.\n\nУ меня два возможных объяснения.\n\nПервое: композит сохраняет резонансную ёмкость для контактного взаимодействия на вторичном объекте — работает в режиме низкой эмиссии для сохранения целостности операторских полномочий авторизации.\n\nВторое: вторичный объект уже считывает сигнатуру композита и уже инициировал протокол оценки полномочий, который подавляет фоновый выход композита во время оценки.\n\nЕсли первое объяснение верно, подход безопасен и представление полномочий пройдёт нормально.\n\nЕсли второе объяснение верно, оценка уже идёт. И я узнаю результат когда поезд прибудет.\n\nГерои преодолевают путь.\n\nАудиторы просто закрывают проект.\n\nМы прибыли.`
     },
     knows:{en:["The Economy of Existence schema: the infrastructure generates reality in response to observer presence at a cost proportional to cognitive complexity. An Auditor-class operator with active Covenant composite is the most expensive possible observer — they were burning Gel to maintain existence in a region that hasn't generated full-fidelity reality for centuries.","Three hemorrhage points on the handkerchief. He counted them. The fifth Silence category: animate-consciousness suppression. The most expensive single operation he has performed.","The composite leg is silent — two possible explanations: saving capacity for credential presentation, or the site is already running the credential-assessment protocol. He will know the result when the train arrives."],ru:["Схема Экономии Сущего: инфраструктура генерирует реальность в ответ на присутствие наблюдателя по цене пропорциональной когнитивной сложности. Оператор класса Аудитора с активным композитом Завета — наиболее дорогой возможный наблюдатель: они сжигали Гель чтобы поддерживать существование в регионе не генерировавшем полноточную реальность столетиями.","Три геморрагических точки на носовом платке. Он посчитал их. Пятая категория Тишины: подавление одушевлённого сознания. Наиболее дорогостоящая одиночная операция которую он выполнил.","Нога с композитом молчит — два возможных объяснения: сохранение ёмкости для представления полномочий, или объект уже выполняет протокол оценки полномочий. Он узнает результат когда поезд прибудет."]},
     misunderstands:{en:["'If the second explanation is correct, the assessment is already running.' He has arrived at this as a terminal analytical point — two possibilities, one safer than the other, will resolve on arrival. He has not examined the third possibility that Grimm's six pages contain but he does not know about: the credential-assessment protocol for a site in active threat-response mode is different from the credential-assessment protocol for a site in maintenance mode. If the second explanation is correct and the assessment is already running, the assessment may not be looking for an authorized operator. It may be looking for a threat to terminate."],ru:["«Если второе объяснение верно, оценка уже идёт». Он пришёл к этому как к терминальной аналитической точке — две возможности, одна безопаснее другой, разрешатся при прибытии. Он не исследовал третью возможность которую содержат шесть страниц Гримма но о которой он не знает: протокол оценки полномочий для объекта в активном режиме ответа на угрозу отличается от протокола оценки полномочий для объекта в режиме обслуживания."]},
     hides:{en:["He noted that Isabella was unaffected by the consciousness suppression and said 'there will be time' to examine it. He has been saying 'there will be time' or 'later' about an accelerating list of things across thirty-one chapters. He is now adding Isabella's immunity to the list. The list currently includes: the bio-mass vocabulary progression, the trajectory of the integration, what loyalty means applied to himself, what it means that he is increasingly good at not filing certain things, and now Isabella's immunity. He has named a future examination for each. None has been examined. 'There will be time' has become a filing category in the same way that 'later' became a filing category."],ru:["Он отметил что Изабелла не была затронута подавлением сознания и сказал «будет время» исследовать это. Он говорит «будет время» или «позже» об ускоряющемся списке вещей на протяжении тридцати одной главы. Он теперь добавляет иммунитет Изабеллы в список. Список в настоящее время включает: прогрессию словарного запаса биомассы, траекторию интеграции, что лояльность означает применительно к себе, что означает то что он всё лучше не заносит определённые вещи, и теперь иммунитет Изабеллы. Он назвал будущее исследование для каждого. Ни одно не было исследовано."]},
     whisper:{en:"Three hemorrhage points — the highest single-operation cost in the narrative. The composite is silent on approach. The assessment may already be running. 'There will be time' has become a filing category. The list grows.",ru:"Три геморрагических точки — наивысшая стоимость одиночной операции в нарративе. Композит молчит при подходе. Оценка может уже идти. «Будет время» стало категорией занесения. Список растёт."}

const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');c.innerHTML=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}].map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
