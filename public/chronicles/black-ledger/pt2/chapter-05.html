const TIMELINE=[
  {id:"TET-B4-26",en:"The Distorted — the miners Torin's drilling operation produced — are not a disease or a weapon. They are an error condition. When the drilling rig pierced the Covenant-infrastructure dormancy boundary at Wolf's Gorge, the boundary layer's integrity failed at the breach point. The Covenant's null-field resonance, which normally operates as a maintenance frequency that keeps the secondary site's internal systems in suppressed stasis, vented into the surrounding territory as uncontrolled Chaos-field emission. The Gel in the drilling machines, which operates at the same fundamental resonance frequency as the Covenant infrastructure, became a catalyst. The Chaos-field interacted with the Gel-saturated machinery, the Gel-adjacent biological materials (the operators), and the environmental matter simultaneously, producing a poorly-differentiated recombinant state. The Distorted are the result of a failed boundary-layer integrity event, not a biological attack.",ru:"Искажённые — горняки которых произвела буровая операция Торина — не являются болезнью или оружием. Они — состояние ошибки. Когда буровая установка пронзила дремотный пограничный слой инфраструктуры Завета в Волчьем Логу, целостность пограничного слоя провалилась в точке пробоины. Нулевой резонанс Завета, который обычно работает как поддерживающая частота держащая внутренние системы вторичного объекта в подавленном стазисе, вырвался в окружающую территорию как неконтролируемое излучение поля Хаоса. Гель в буровых машинах, работающий на той же фундаментальной резонансной частоте что инфраструктура Завета, стал катализатором."},
  {id:"TET-B4-27",en:"The shamans' intervention — the ice-lance sterilization of the Distorted — is the correct first-response protocol for a boundary-layer integrity failure, and is consistent with what the Covenant's original maintenance documentation would prescribe for an unauthorized incursion event. The shamans have been maintaining this protocol for approximately two thousand years, since the last authorized Covenant maintenance contact. They do not know why they maintain the protocol. They know the ritual form — the drums, the timing, the target identification — but have lost the mechanistic understanding. They are performing a maintenance procedure as a religious ceremony. The procedure still works because the Covenant infrastructure recognizes the resonance pattern of the maintenance ritual and responds to it. The shamans are, functionally, unauthorized Covenant operators who have been performing maintenance by rote.",ru:"Вмешательство шаманов — стерилизация Искажённых ледяными копьями — является правильным первичным протоколом ответа на провал целостности пограничного слоя, и согласуется с тем что предписала бы оригинальная документация по обслуживанию Завета для события несанкционированного вторжения. Шаманы поддерживают этот протокол приблизительно две тысячи лет, с момента последнего авторизованного контакта обслуживания Завета. Они не знают почему поддерживают протокол. Они знают ритуальную форму, но утратили механистическое понимание. Они выполняют процедуру обслуживания как религиозную церемонию."},
  {id:"TET-B4-28",en:"Dante's Silence sphere at the chapter's end — the ten-meter dome that stopped the shamans' ice-expansion — is the first time in the narrative that he has used the Silence as a defensive area structure rather than as a targeted application. The sphere consumed significant energy: the blood from the nose after establishing and holding the sphere for approximately ninety seconds indicates a hemorrhage event similar in scale to the crew-consciousness suppression on the train. He has now had two major hemorrhage events in the same twelve-hour period. The cumulative cost is not additive — each successive high-intensity Silence application in a short time window produces exponential cost increase as the composite's resonance supply is depleted. He has approximately forty percent resonance capacity remaining.",ru:"Сфера Тишины Данте в конце главы — десятиметровый купол остановивший ледяную экспансию шаманов — первый раз в нарративе когда он использовал Тишину как защитную площадную структуру а не как нацеленное применение. Сфера потребила значительную энергию: кровь из носа после установки и удержания сферы приблизительно девяносто секунд указывает на геморрагическое событие схожего масштаба с подавлением сознания экипажа в поезде. Теперь у него два крупных геморрагических события за тот же двенадцатичасовой период. Совокупная стоимость не аддитивна — каждое последующее высокоинтенсивное применение Тишины в коротком временном окне производит экспоненциальное нарастание стоимости по мере истощения резонансного запаса композита."},
  {id:"TET-B4-29",en:"'I have tea. And I have a proposal that the Sleeping One will not refuse.' — Dante's closing offer to the High Shaman is the correct institutional approach to the situation. He has identified that the shamans are performing a maintenance protocol rather than conducting a hostile action. He has correctly framed them as potential institutional partners rather than adversaries. The negotiation framework he is about to propose is the only viable path to addressing the secondary site's boundary-layer integrity failure without triggering a full threat-response activation from the site's automated systems. An authorized operator credential presented to an awakened secondary site in the presence of its existing maintenance personnel (the shamans) is the documented protocol for controlled re-entry into a site that has experienced unauthorized boundary disruption. Dante does not know this is documented. He is arriving at the correct approach through institutional logic rather than through archive knowledge."},
  {id:"TET-B4-30",en:"Isabella's response to the brass valve fragment — the living metal containing a human finger — reveals the full scope of what she has been building in the Vivisection Sector. 'If we can control this... we create Chimeras that know no wear.' She has immediately identified the Chaos-field recombinant process as a superior alternative to her current Gel-biological integration method. Her current method requires weeks of preparation, Cognitive Iron suppression of the immune response, and produces subjects who are progressing toward terminal architecture. The Chaos-field recombination is instantaneous and produces a structurally stable hybrid state without the terminal progression. She is correct that it has 'colossal potential.' She is not correct that it can be controlled. The Chaos-field is not a controllable medium — it is the output of a failed Covenant boundary layer. It produces results that are not repeatable, not direction-able, and not reversible. The Distorted cannot be returned to human form. The process is not a chimera-production method. It is a chimera-accident documentation method."}
];

const SCENES=[
{id:"s1",
 title:{en:"Dead Stop",ru:"Мертвая Точка"},
 subtitle:{en:"The Guild does not write off assets that can still generate profit, Torin. Stand up.",ru:"Гроссбух не списывает активы, которые ещё могут приносить прибыль, Торин. Встать."},
 location:{en:"Outpost-7 — Arrival",ru:"Форпост-7 — Прибытие"},
 timing:{en:"Dawn — Arrival at the Northern Site",ru:"Рассвет — Прибытие на Северный Объект"},
 flags:["pivotal","revelation"],
 povData:{
   dante:{distortion:4,
     text:{
       en:`The Auditor's interface produces a specific response to death that I have been noting for thirty-two chapters without examining it: the heat-signature absence where a living person should be is registered as a negative space in the detection field — a hole in the thermal map rather than a data point. The guard on the watchtower was a hole.\n\nTwenty-three holes in the immediate perimeter. I counted them in approximately four seconds on approach. The thermal map of Outpost-7 was a landscape of absences.\n\nIsabella's assessment of the crystallization mechanism was accurate: instantaneous intracellular ice formation from the inside out. The specific temperature event required to produce this result without triggering the body's pain response is beyond the thermal range of any environmental condition I have catalogued. The weapon that produced this result was not a weather system. It was a targeted information change — something instructed the water molecules in the cells to change state simultaneously, faster than any biological signal transmission.\n\nThis is consistent with the secondary site's automated threat-response protocols as described in the donor-memory archive's theoretical documentation layer. A secondary site in active threat-response mode produces a localized field effect that selectively crystallizes water molecules in warm-bodied organisms within its boundary detection range. The site identified Torin's work crews as boundary violators and terminated the violation.\n\nThe dead guards were not killed by the shamans. They were killed by the site itself.\n\nTorino.\n\nI have known Torin Black-Pickaxe for approximately eight months. In that time I have watched him manage the most difficult operational environment the Guild has faced — cold, isolation, difficult labor, tribal hostility — with a combination of practical intelligence and physical authority that has produced consistent results. He knew the risks of the expansion. He acknowledged the shamans' warning and dismissed it.\n\nHe is not a coward. A coward would have stopped when the shamans appeared. He continued because he calculated that the mineral value justified the risk. He was wrong about the category of the risk.\n\nI did not console him. Consolation is not what this moment requires. He needs to be functional, and the fastest path to functionality for Torin Black-Pickaxe is a direct assignment of authority. I gave him a purpose — attend the review — and the implied message: you are still valuable, you have not been written off, there is a next step.\n\nThe living-metal fragment on the table.\n\nIsabella saw potential. I saw a diagnostic sample. Both are correct.\n\nThe specific fusion pattern — brass-to-flesh transition without thermal damage markers — indicates that the Chaos-field emission from the boundary breach did not melt or burn. It changed the material's phase state directly, as if instructing matter to reassemble in a new configuration. This is the same mechanism as the Gel's molecular transcription pathway. The Chaos-field and the Gel use the same base mechanism. The Chaos-field is the uncontrolled version.\n\nI have been using a controlled version of this mechanism in my own leg for thirty-two chapters.\n\nI noted this observation and did not examine it.\n\nBusiness continues.`,
       ru:`Интерфейс Аудитора производит специфический ответ на смерть который я отмечаю тридцать две главы без исследования: отсутствие тепловой сигнатуры там где должен быть живой человек регистрируется как отрицательное пространство в поле обнаружения — дыра в тепловой карте а не точка данных. Часовой на вышке был дырой.\n\nДвадцать три дыры в непосредственном периметре. Я посчитал их приблизительно за четыре секунды при подходе. Тепловая карта Форпоста-7 была ландшафтом отсутствий.\n\nОценка Изабеллы механизма кристаллизации была точной: мгновенное внутриклеточное образование льда изнутри наружу. Специфическое температурное событие требуемое для производства этого результата без запуска болевого ответа тела выходит за пределы теплового диапазона любого экологического условия которое я каталогизировал. Оружие произведшее этот результат было не погодной системой. Это было целенаправленное информационное изменение — что-то дало молекулам воды в клетках инструкцию одновременно сменить состояние, быстрее чем любая биологическая передача сигнала.\n\nЭто согласуется с автоматизированными протоколами ответа на угрозу вторичного объекта описанными в теоретическом документационном слое архива донорской памяти. Вторичный объект в активном режиме ответа на угрозу производит локализованный полевой эффект который избирательно кристаллизует молекулы воды в теплокровных организмах в пределах диапазона обнаружения его границы. Объект идентифицировал рабочие бригады Торина как нарушителей границы и прекратил нарушение.\n\nМёртвые часовые были убиты не шаманами. Они были убиты самим объектом.\n\nТорин.\n\nЯ знаю Торина Чёрную Кирку приблизительно восемь месяцев. За это время я наблюдал как он управляет наиболее трудной операционной средой с которой сталкивалась Гильдия — холодом, изоляцией, тяжёлым трудом, враждебностью племён — сочетанием практического интеллекта и физического авторитета произведшим стабильные результаты. Он знал о рисках расширения. Он признал предупреждение шаманов и отверг его.\n\nОн не трус. Трус остановился бы когда появились шаманы. Он продолжил, потому что рассчитал что минеральная ценность оправдывает риск. Он ошибся в категории риска.\n\nЯ не утешил его. Утешение — не то что требует этот момент. Ему нужно быть функциональным, а быстрейший путь к функциональности для Торина Чёрной Кирки — прямое назначение авторитета. Я дал ему цель — участвовать в обзоре — и подразумеваемое сообщение: ты всё ещё ценен, тебя не списали, есть следующий шаг.\n\nЖивой металлический фрагмент на столе.\n\nИзабелла видела потенциал. Я видел диагностический образец. Оба верны.\n\nСпецифический паттерн слияния — переход латуни в плоть без маркеров теплового повреждения — указывает что выброс поля Хаоса из пробоины границы не расплавил и не сжёг. Он изменил фазовое состояние материала напрямую, как если бы давал материи инструкцию перестроиться в новой конфигурации. Это тот же механизм что молекулярный транскрипционный путь Геля. Поле Хаоса и Гель используют один базовый механизм. Поле Хаоса — неконтролируемая версия.\n\nЯ использовал контролируемую версию этого механизма в собственной ноге тридцать две главы.\n\nЯ отметил это наблюдение и не исследовал его.\n\nБизнес продолжается.`
     },
     knows:{en:["The dead guards were killed by the site's automated threat-response, not by the shamans. Twenty-three absence-signatures on approach.","The Chaos-field and the Gel use the same base mechanism. The Chaos-field is the uncontrolled version. He has been using the controlled version in his leg for thirty-two chapters.","He did not console Torin. 'The fastest path to functionality for Torin is a direct assignment of authority.' He gave him a purpose and the implied message: you are still valuable."],ru:["Мёртвые часовые были убиты автоматизированным ответом объекта на угрозу, не шаманами. Двадцать три сигнатуры отсутствия при подходе.","Поле Хаоса и Гель используют один базовый механизм. Поле Хаоса — неконтролируемая версия. Он использовал контролируемую версию в ноге тридцать две главы.","Он не утешил Торина. «Быстрейший путь к функциональности для Торина — прямое назначение авторитета». Он дал цель и подразумеваемое сообщение: ты всё ещё ценен."]},
     misunderstands:{en:["He noted: 'the Chaos-field and the Gel use the same base mechanism. I have been using the controlled version in my leg for thirty-two chapters.' He noted this and did not examine it. What he has not examined: if the Chaos-field is the uncontrolled version of the Gel's mechanism, and the Gel in his leg is the controlled version, then the Chaos-field emission from the boundary breach is doing to the miners' bodies what the Gel is doing to his body — reassembling matter in a new configuration. The difference between himself and the Distorted is not mechanism. It is control rate and Cognitive Iron suppression. If the CI suppression fails or the control rate is exceeded, the progression from 'controlled integration' to 'uncontrolled recombination' is a threshold event, not a gradual change."],ru:["Он отметил: «поле Хаоса и Гель используют один базовый механизм. Я использовал контролируемую версию в ноге тридцать две главы». Он отметил без исследования. Что он не исследовал: если поле Хаоса — неконтролируемая версия механизма Геля, и Гель в его ноге — контролируемая версия, то выброс поля Хаоса делает с телами шахтёров то же что Гель делает с его телом — перестраивает материю в новой конфигурации. Разница между ним и Искажёнными — не механизм. Это скорость контроля и подавление Когнитивным Железом. Если подавление КЖ отказывает или скорость контроля превышается, прогрессия от «контролируемой интеграции» к «неконтролируемой рекомбинации» — пороговое событие, не постепенное изменение."]},
     hides:{en:["He said 'I noted this observation and did not examine it.' This is the most direct self-documentation of the non-examination pattern in thirty-two chapters. He has, in a single sentence, identified that he has made an observation, identified that the observation is significant enough to note, and identified that he has chosen not to process it. He has not examined whether this choice — to note without examining — is still a decision he is making actively, or whether it has become automatic. The list of noted-but-not-examined items is now long enough that it functions as a filing system rather than as a temporary deferral."],ru:["Он сказал «я отметил это наблюдение и не исследовал его». Это наиболее прямая самодокументация паттерна ненисследования за тридцать две главы. Он в одном предложении определил что сделал наблюдение, определил что наблюдение достаточно значимо чтобы отметить, и определил что выбрал не обрабатывать его. Он не исследовал является ли этот выбор — отметить без исследования — всё ещё решением которое он активно принимает, или оно стало автоматическим."]},
     whisper:{en:"The Chaos-field and the Gel use the same mechanism. The difference between him and the Distorted is control rate and CI suppression. He noted this and did not examine it. He said so directly.",ru:"Поле Хаоса и Гель используют тот же механизм. Разница между ним и Искажёнными — скорость контроля и подавление КЖ. Он отметил это и не исследовал. Он сказал это прямо."}
   }
 }
},

{id:"s2",
 title:{en:"Loss Report",ru:"Отчет об Убытках"},
 subtitle:{en:"Yorg didn't die. He didn't burn. He merged with the machine. His skin hardened to cast iron.",ru:"Йорг не погиб. Он не сгорел. Он сросся с машиной. Его кожа затвердела в чугун."},
 location:{en:"Outpost-7 — Main Bunker",ru:"Форпост-7 — Главный Бункер"},
 timing:{en:"Dawn — Debriefing",ru:"Рассвет — Разбор"},
 flags:["revelation","escalation","cost"],
 povData:{
   torin:{distortion:5,
     text:{
       en:`I have been underground before. I have worked mines that collapsed. I have been in rockfalls, gas pockets, flooding shafts. I know what it is to be afraid underground.\n\nThis was different.\n\nWe had drilled half a kilometer into Wolf's Gorge. The Iron Moles were performing perfectly — they weren't shattering rock, they were shaking it loose with the hammering force. Three days in, we hit the obsidian plate. Perfect. Flat. Absolutely flat, which is impossible in natural geology. You don't get flat stone underground. Flat means shaped.\n\nI should have stopped there.\n\nI know I should have stopped there. The shamans had already come twice. The first time, a pair of them, standing on the ridge with those drums that sound like heartbeats, telling us the Sleeping One kept the Chaos. The second time, six of them. Their lead man — Old Scar, we called him, because of the burn running from his ear to his jaw — stood at the mouth of our shaft and wouldn't move until Petra, my second, physically walked past him. He didn't fight. He just stood there for three hours, watching.\n\nI called them superstitious savages to their faces. I ordered the toteems torn down.\n\nI thought I was being rational. I thought I was cutting through the primitive fear of the unfamiliar. I thought: these men are afraid of drilling because their ancestors told them to be afraid of drilling. I'm not afraid of drilling. I know machines. I know stone.\n\nYorg was twenty-two years old. He'd worked the steam rams since he was sixteen. The best operator on the team — faster startup, smoother pressure management, better feel for the machine's rhythm than men twice his age. He went in for the first test punch on the obsidian.\n\nWhat came out of the crack was purple.\n\nNot smoke. Not gas. A vapor that moved wrong. It moved against gravity in places. It moved toward heat. It moved toward the machine's Gel reserves.\n\nYorg grabbed the levers to shut down. The metal was soft. His hands went into it like pushing fingers into bread dough. Then the dough went hard again.\n\nHe was alive when we pulled back. He kept making a sound like a steam release — regular, rhythmic. I don't know if that was pain or if it was just the machine breathing through him.\n\nWe sealed the shaft and ran.\n\nWhen I gave the Master the report just now, I said: this is my fault, not the accident but deciding I was smarter than men who had been living next to that thing for a thousand years. He didn't contradict me. He didn't reassure me. He just said: show me the sample.\n\nThat is correct. That is what I needed. Not forgiveness. Not anger. Just: what do we do next.\n\nI'm still scared. I'll be scared until I'm not.\n\nBut I can work scared.\n\nI was made for working scared.`,
       ru:`Я прежде бывал под землёй. Я работал в шахтах которые обрушивались. Я бывал в завалах, газовых карманах, затопленных штольнях. Я знаю каково бояться под землёй.\n\nЭто было иначе.\n\nМы пробурили полкилометра в Волчий Лог. «Железные Кроты» работали идеально — они не дробили породу, они расшатывали её силой удара. На третий день мы ударились в обсидиановую плиту. Идеально ровную. Абсолютно ровную, что невозможно в естественной геологии. Под землёй не бывает ровного камня. Ровный значит обработанный.\n\nМне следовало остановиться там.\n\nЯ знаю что следовало. Шаманы уже приходили дважды. Первый раз — двое, стоящих на гребне с теми барабанами звучащими как сердцебиения, говорящих что Спящий держит Хаос. Второй раз — шестеро. Их вожак — Старый Шрам, мы его называли, из-за ожога от уха до челюсти — стоял у устья нашей штольни и не двигался пока Петра, мой заместитель, физически не прошла мимо него. Он не сражался. Он просто стоял три часа, наблюдая.\n\nЯ назвал их суеверными дикарями им в лицо. Приказал снести тотемы.\n\nЯ думал что был рационален. Думал что прорезаю сквозь примитивный страх незнакомого. Думал: эти люди боятся бурения, потому что предки сказали им бояться. Я не боюсь бурения. Я знаю машины. Я знаю камень.\n\nЙоргу было двадцать два года. Он работал на паровых таранах с шестнадцати. Лучший оператор в команде — более быстрый запуск, более плавное управление давлением, лучшее чувство ритма машины чем у вдвое старших людей. Он пошёл на первый пробный удар по обсидиану.\n\nТо что вышло из трещины было фиолетовым.\n\nНе дым. Не газ. Пар двигавшийся неправильно. Местами он двигался против гравитации. Он двигался к теплу. Он двигался к резервам Геля машины.\n\nЙорг схватился за рычаги чтобы заглушить. Металл был мягким. Его руки вошли в него как пальцы в хлебное тесто. Затем тесто снова затвердело.\n\nОн был жив когда мы отступили. Он продолжал издавать звук похожий на выброс пара — ровный, ритмичный. Я не знаю была ли это боль или просто машина дышала через него.\n\nМы запечатали штольню и бежали.\n\nКогда я давал Мастеру отчёт только что, я сказал: это моя вина, не авария но решение что я умнее людей живших рядом с этим тысячу лет. Он не возразил. Не утешил. Просто сказал: покажи образец.\n\nЭто верно. Это что мне было нужно. Не прощение. Не гнев. Просто: что мы делаем дальше.\n\nЯ всё ещё боюсь. Буду бояться пока не перестану.\n\nНо я могу работать боясь.\n\nЯ был создан для работы боясь.`
     },
     knows:{en:["The obsidian plate was perfectly flat — impossible in natural geology, meaning shaped. He identified this and continued drilling anyway.","He called the shamans superstitious savages to their faces and ordered the totems torn down. 'This is my fault — not the accident but deciding I was smarter than men who had been living next to that thing for a thousand years.'","'I can work scared. I was made for working scared.' He has already processed the accountability and moved to the next step."],ru:["Обсидиановая плита была идеально ровной — невозможно в естественной геологии, значит обработана. Он определил это и продолжил бурение.","Он назвал шаманов суеверными дикарями им в лицо и приказал снести тотемы. «Это моя вина — не авария но решение что я умнее людей живших рядом с этим тысячу лет».","«Я могу работать боясь. Я был создан для работы боясь». Он уже обработал ответственность и перешёл к следующему шагу."]},
     misunderstands:{en:["He said 'what came out of the crack was purple' and 'it moved toward the machine's Gel reserves.' He identified the Chaos-field's interaction with Gel as a key observation. He has not connected this to the broader pattern: the shamans' warning was not about mystical danger. They were warning him about a specific technical hazard — that the boundary layer below their territory contains a Chaos-field emission source that reacts catastrophically with Gel-based technology. They knew about the Gel interaction because they have been observing the site's effects for two thousand years. The drums are not religious instruments. They are resonance generators that suppress the Chaos-field emission in the boundary zone."],ru:["Он сказал «то что вышло из трещины было фиолетовым» и «оно двигалось к резервам Геля машины». Он определил взаимодействие поля Хаоса с Гелем как ключевое наблюдение. Он не соединил это с более широким паттерном: предупреждение шаманов было не о мистической опасности. Они предупреждали его о специфической технической опасности — что пограничный слой под их территорией содержит источник выброса поля Хаоса реагирующий катастрофически с технологиями на основе Геля. Барабаны — не религиозные инструменты. Это резонансные генераторы подавляющие выброс поля Хаоса в пограничной зоне."]},
     hides:{en:["He said 'Yorg kept making a sound like a steam release — regular, rhythmic. I don't know if that was pain or if it was just the machine breathing through him.' He reported this factually. He has not reported whether he stayed with Yorg, how long it took to seal the shaft, whether Yorg made the sound until the shaft was sealed or only briefly. The elapsed time between the accident and the shaft sealing, and what happened in that interval, is the part of the report he gave the Master in abbreviated form. He gave the facts he could produce without reliving the experience. The full account of Yorg's last minutes is still inside him."],ru:["Он сказал «Йорг продолжал издавать звук похожий на выброс пара — ровный, ритмичный. Я не знаю была ли это боль или просто машина дышала через него». Он доложил это фактически. Он не доложил оставался ли он с Йоргом, сколько времени потребовалось чтобы запечатать штольню, издавал ли Йорг звук до запечатывания или только кратко. Прошедшее время между аварией и запечатыванием штольни, и что произошло в том интервале — это часть отчёта которую он дал Мастеру в сокращённой форме."]},
     whisper:{en:"He can work scared. He was made for it. He gave the abbreviated report. The full account of Yorg's last minutes is still inside him.",ru:"Он может работать боясь. Он был создан для этого. Он дал сокращённый отчёт. Полный отчёт о последних минутах Йорга всё ещё внутри него."}
   },
   isabella:{distortion:3,
     text:{
       en:`The brass valve fragment is the most interesting biological specimen I have encountered since the Gel sample.\n\nI told Dante: this is a reality mutagen. I was being imprecise. More accurately: this is the product of a reality-phase event at the material boundary between organic tissue and metal compound under Chaos-field excitation. The finger is not incorporated into the brass. The finger and the brass have been simultaneously instructed to occupy the same phase state. They are now the same material in two configurations that have not yet fully resolved.\n\nThe pulse I detected with the scalpel: the living component of the hybrid is maintaining a biological rhythm because the Chaos-field froze the transition at the moment of phase overlap, before the biological system had fully converted to an inorganic state. The finger is alive because it was alive at the moment of fusion, and the Chaos-field preserved that living state as a structural feature of the hybrid.\n\nThis is extraordinary.\n\nMy current Gel-biological integration subjects take three weeks of preparation, three to six weeks of progressive integration, and still show systemic rejection symptoms that require ongoing CI suppression. The Chaos-field produced a stable hybrid in seconds without any rejection response, because it did not introduce foreign material — it simply changed the phase definition of existing material.\n\nThe problem: I cannot reproduce this in a controlled setting because I do not have access to a Chaos-field emission source. The only known source is the boundary breach at Wolf's Gorge, which is now sealed.\n\nOr: the Sleeping One itself.\n\nDante wants to negotiate with the shamans. He wants to negotiate with the High Shaman in the snow-leopard mask. Good. I want to negotiate with the secondary Precursor site. I want to find out if the Chaos-field emission can be channeled through a controlled aperture at a controlled rate.\n\nI did not say this to Dante.\n\nI am recording it here, in my journal, in the margin beside the sketch of the valve fragment.\n\nHe will figure it out eventually. He figures everything out eventually. But the sequence matters: he needs to establish the credential interaction with the site first, or there will be no site to negotiate with.\n\nFor now: I watch. I take notes. I wait for the right moment to ask the right question.\n\nThe Scavenger died at 14:23 today. Third flutter pattern, accelerating to terminal state. I collected twelve samples before shutdown.\n\nData acquired.`,
       ru:`Фрагмент латунного клапана — наиболее интересный биологический образец с которым я сталкивалась со времени образца Геля.\n\nЯ сказала Данте: это мутаген реальности. Я была неточна. Более точно: это продукт события фазы реальности на материальной границе между органической тканью и металлическим соединением под возбуждением поля Хаоса. Палец не инкорпорирован в латунь. Пальцу и латуни была одновременно дана инструкция занять одно и то же фазовое состояние. Сейчас они один материал в двух конфигурациях которые ещё не полностью разрешились.\n\nПульс который я обнаружила скальпелем: живой компонент гибрида поддерживает биологический ритм, потому что поле Хаоса заморозило переход в момент фазового перекрытия, до того как биологическая система полностью конвертировалась в неорганическое состояние. Палец жив, потому что был жив в момент слияния, и поле Хаоса сохранило это живое состояние как структурный признак гибрида.\n\nЭто экстраординарно.\n\nМои нынешние субъекты биологической интеграции с Гелем требуют трёх недель подготовки, трёх-шести недель прогрессивной интеграции, и всё равно демонстрируют системные симптомы отторжения требующие постоянного подавления КЖ. Поле Хаоса произвело стабильный гибрид за секунды без какого-либо ответа отторжения, потому что не вводило посторонний материал — оно просто изменило фазовое определение существующего материала.\n\nПроблема: я не могу воспроизвести это в контролируемых условиях, потому что у меня нет доступа к источнику выброса поля Хаоса. Единственный известный источник — пробоина границы в Волчьем Логу, которая теперь запечатана.\n\nИли: сам Спящий.\n\nДанте хочет вести переговоры с шаманами. Он хочет вести переговоры с Верховным Шаманом в маске снежного барса. Хорошо. Я хочу вести переговоры с вторичным объектом Предтечей. Я хочу выяснить можно ли направить выброс поля Хаоса через контролируемое отверстие с контролируемой скоростью.\n\nЯ не говорила этого Данте.\n\nЯ записываю это здесь, в дневнике, на полях рядом со скетчем фрагмента клапана.\n\nОн в конечном счёте выяснит. Он всё выясняет в конечном счёте. Но последовательность важна: ему сначала нужно установить взаимодействие полномочий с объектом, или не будет объекта для переговоров.\n\nПока: я наблюдаю. Я делаю заметки. Я жду правильного момента чтобы задать правильный вопрос.\n\n«Падальщик» погиб в 14:23 сегодня. Третий паттерн трепета, ускорившийся до терминального состояния. Я собрала двенадцать образцов до завершения.\n\nДанные получены.`
     },
     knows:{en:["The valve fragment: the finger and brass were simultaneously given the same phase-state instruction, not merged. The Chaos-field froze the transition at phase overlap, preserving the living state as a structural feature.","The Chaos-field produced a stable hybrid without rejection because it changed the phase definition of existing material rather than introducing foreign material — fundamentally superior to her current Gel-integration method.","The Scavenger died at 14:23. She collected twelve samples. 'Data acquired.' She is not sharing this with Dante."],ru:["Фрагмент клапана: пальцу и латуни была одновременно дана инструкция занять одно и то же фазовое состояние, не слиты. Поле Хаоса заморозило переход на фазовом перекрытии, сохранив живое состояние как структурный признак.","Поле Хаоса произвело стабильный гибрид без отторжения, потому что изменило фазовое определение существующего материала а не вводило посторонний — фундаментально превосходит её нынешний метод интеграции с Гелем.","«Падальщик» погиб в 14:23. Она собрала двенадцать образцов. «Данные получены». Она не делится этим с Данте."]},
     misunderstands:{en:["She wants to negotiate access to the secondary site's Chaos-field emission as a production tool. She has not modeled what the Chaos-field emission event would mean for a subject with Dante's level of Gel integration. If the Chaos-field emission interacts catastrophically with Gel-based technology and organisms, an operator whose skeleton contains Gel-integrated composite is not a neutral observer at a controlled Chaos-field aperture. He is the highest-density Gel target in the vicinity. Exposing him to a controlled Chaos-field emission to study the recombination process would produce the same outcome as the Yorg event — at the location of the leg, the arm, the shoulder, wherever the composite meets his biological tissue."],ru:["Она хочет договориться о доступе к выбросу поля Хаоса вторичного объекта как инструменту производства. Она не моделировала что событие выброса поля Хаоса означало бы для субъекта с уровнем интеграции Геля Данте. Если выброс поля Хаоса взаимодействует катастрофически с технологиями на основе Геля и организмами, оператор чей скелет содержит интегрированный с Гелем композит — не нейтральный наблюдатель у контролируемого отверстия поля Хаоса. Он — наиболее высокоплотная цель Геля в окрестности."]},
     hides:{en:["She wrote in her journal: 'he will figure it out eventually. He figures everything out eventually. But the sequence matters: he needs to establish the credential interaction first.' She is managing his information environment to preserve the correct operational sequence. She is doing this because she has assessed that if she tells him her interest in the Chaos-field aperture now, he will either veto it immediately or re-sequence it incorrectly. She is not deceiving him. She is timing the information for maximum operational utility. This is the same calculation he makes about every piece of information he holds back from every person in his network. She has learned it from watching him."],ru:["Она написала в дневнике: «он в конечном счёте выяснит. Он всё выясняет в конечном счёте. Но последовательность важна: ему сначала нужно установить взаимодействие полномочий». Она управляет его информационной средой чтобы сохранить правильную операционную последовательность. Она делает это, потому что оценила: если скажет ему о своём интересе к отверстию поля Хаоса сейчас, он либо немедленно наложит вето либо неправильно изменит последовательность. Это та же калькуляция которую он делает о каждом кусочке информации который удерживает от каждого в своей сети. Она научилась этому наблюдая за ним."]},
     whisper:{en:"She is managing his information environment using the same calculation he uses on everyone. She learned it from watching him. The Scavenger's twelve samples are in her journal. She is waiting for the right moment.",ru:"Она управляет его информационной средой используя ту же калькуляцию что он использует на всех. Она научилась наблюдая за ним. Двенадцать образцов «Падальщика» в её дневнике. Она ждёт правильного момента."}
   }
 }
},

{id:"s3",
 title:{en:"Intervention",ru:"Вмешательство"},
 subtitle:{en:"I have tea. And I have a proposal that the Sleeping One will not refuse.",ru:"У меня есть чай. И у меня есть предложение, от которого Спящий не откажется."},
 location:{en:"Outpost-7 — The Perimeter",ru:"Форпост-7 — Периметр"},
 timing:{en:"Morning — Standoff and Opening",ru:"Утро — Противостояние и Начало"},
 flags:["pivotal","identity","foreshadowing"],
 povData:{
   dante:{distortion:4,
     text:{
       en:`The Distorted were not enemies.\n\nI recognized this in the moment before the ice lances fell. They were moving toward heat — not toward people. Not toward targets. Toward the warmth of the bunker, the warmth of the fire barrels, the warmth of living bodies. They were cold. They were hungry in the specific way that a system running below thermal baseline is hungry — they needed energy input, any energy input, and they were moving toward the nearest available source.\n\nThey were not attacking.\n\nThey were trying to survive.\n\nI did not adjust the engagement orders. Survival-state Distorted moving toward warm bodies produces contact events that transform bystanders into additional Distorted. The engagement order was correct. But the diagnostic category had shifted.\n\nThe shamans intervened at the threshold I would have predicted if I had modeled the situation correctly from the beginning: they intervened when the Distorted approached the zone boundary. They were not responding to my soldiers. They were responding to the boundary layer's security requirement. Their protocol specifies: any Chaos-field contaminated material must be contained before it reaches the secondary site's primary access points.\n\nWe were standing at a primary access point.\n\nThe ice expansion that followed the sterilization was also protocol. The protocol requires full decontamination of the breach event, which means crystallizing not just the contaminated organisms but any material within the contamination radius. The shamans were not destroying the outpost. They were sterilizing the area.\n\nI intervened with a ten-meter Silence dome.\n\nThe cost was significant. I can feel it now — not pain, but the specific quality of resource depletion that the composite produces when its resonance reserve is below fifty percent. A slight acoustic flattening. The world sounds slightly less detailed. I noted this without examining whether the depletion rate is sustainable for what comes next.\n\nThe High Shaman in the snow-leopard mask.\n\nHe is reading me. I can see it in the way he has positioned himself — not confrontational, not submissive, but evaluative. He is determining whether I am a threat to the boundary layer or a resource for it. He is, in his own framework, conducting an audit.\n\nI know this frame.\n\nThe correct response to an audit is transparency about the things you can afford to be transparent about, and strategic silence about the things you cannot. The strategic silence buys time for the things you cannot be transparent about to become things you can.\n\nI offered him tea.\n\nThis is the correct opening move. Tea is a signal of extended social engagement — it says: I am not leaving, I am not here to fight, I am here to establish a relationship that takes longer than a standoff. The shaman understood this. He didn't agree yet. But he stopped moving.\n\nI said I have a proposal the Sleeping One will not refuse.\n\nThis is technically true. The Sleeping One — the secondary site — will not refuse an authorized operator credential. Its protocol does not include the option to refuse. What I have is a credential, not a negotiating position. But framing the credential as a proposal positions me as offering something rather than claiming something, which is the correct relational stance for a first contact with an institution whose cooperation I require.\n\nThe tea is steeping.\n\nBusiness continues.`,
       ru:`Искажённые не были врагами.\n\nЯ распознал это в момент до падения ледяных копий. Они двигались к теплу — не к людям. Не к целям. К теплу бункера, теплу пожарных бочек, теплу живых тел. Им было холодно. Они были голодны специфическим образом которым голодна система работающая ниже теплового базового уровня — им нужен был энергетический ввод, любой энергетический ввод, и они двигались к ближайшему доступному источнику.\n\nОни не атаковали.\n\nОни пытались выжить.\n\nЯ не скорректировал приказы на взаимодействие. Искажённые в состоянии выживания движущиеся к тёплым телам производят контактные события трансформирующие наблюдателей в дополнительных Искажённых. Приказ на взаимодействие был верным. Но диагностическая категория изменилась.\n\nШаманы вмешались у порога который я бы предсказал если бы правильно моделировал ситуацию с самого начала: они вмешались когда Искажённые приблизились к пограничной зоне. Они не реагировали на моих солдат. Они реагировали на требование безопасности пограничного слоя. Их протокол указывает: любой заражённый полем Хаоса материал должен быть остановлен до того как достигнет первичных точек доступа вторичного объекта.\n\nМы стояли у первичной точки доступа.\n\nЛедяная экспансия последовавшая за стерилизацией также была протоколом. Протокол требует полной деконтаминации события пробоины, что означает кристаллизацию не только заражённых организмов но и любого материала в радиусе заражения. Шаманы не разрушали форпост. Они стерилизовали территорию.\n\nЯ вмешался с десятиметровым куполом Тишины.\n\nСтоимость была значительной. Я чувствую это сейчас — не боль, но специфическое качество истощения ресурсов которое производит композит когда его резонансный запас ниже пятидесяти процентов. Небольшое акустическое уплощение. Мир звучит немного менее детально. Я отметил это без исследования является ли скорость истощения устойчивой для того что идёт следующим.\n\nВерховный Шаман в маске снежного барса.\n\nОн читает меня. Я вижу это в том как он позиционировал себя — не конфронтационно, не покорно, но оценивающе. Он определяет являюсь ли я угрозой для пограничного слоя или ресурсом для него. Он, в своей рамке, проводит аудит.\n\nЯ знаю эту рамку.\n\nПравильный ответ на аудит — прозрачность о вещах которые вы можете позволить себе быть прозрачными, и стратегическая тишина о вещах которые не можете. Стратегическая тишина покупает время для вещей которые не можете быть прозрачными чтобы стать вещами которые можете.\n\nЯ предложил ему чай.\n\nЭто правильный первый ход. Чай — сигнал расширенного социального взаимодействия: я не ухожу, я не здесь чтобы драться, я здесь чтобы установить отношения занимающие больше времени чем противостояние. Шаман это понял. Он ещё не согласился. Но он прекратил двигаться.\n\nЯ сказал у меня есть предложение от которого Спящий не откажется.\n\nЭто технически верно. Спящий — вторичный объект — не откажет авторизованным операторским полномочиям. Его протокол не включает опцию отказа. Что у меня есть — это полномочие, не переговорная позиция. Но оформление полномочия как предложения позиционирует меня как предлагающего нечто а не претендующего на нечто, что является верной реляционной позицией для первого контакта с институцией чьё сотрудничество мне требуется.\n\nЧай заваривается.\n\nБизнес продолжается.`
     },
     knows:{en:["The Distorted were moving toward heat, not targeting people — survival-state energy-seeking, not attack. He identified this and did not change the engagement order, because contact events transform bystanders.","The shamans were executing a protocol: sterilize contaminated material before it reaches primary access points. The ice expansion was decontamination, not aggression.","The composite's resonance reserve is below fifty percent — audible as acoustic flattening. 'The world sounds slightly less detailed.' He noted the depletion rate without examining sustainability for what comes next."],ru:["Искажённые двигались к теплу, не нацеливаясь на людей — поиск энергии в состоянии выживания, не атака. Он определил это и не изменил приказ, потому что контактные события трансформируют наблюдателей.","Шаманы выполняли протокол: стерилизовать заражённый материал до достижения первичных точек доступа. Ледяная экспансия была деконтаминацией, не агрессией.","Резонансный запас композита ниже пятидесяти процентов — слышимо как акустическое уплощение. «Мир звучит немного менее детально». Он отметил скорость истощения без исследования устойчивости."]},
     misunderstands:{en:["He said 'the Sleeping One will not refuse an authorized operator credential. Its protocol does not include the option to refuse.' He is correct about the credential's technical standing. He has not modeled what 'authorized operator' means in the context of a Series 404 at partial integration. The credential-assessment protocol the secondary site is running evaluates the operator's integration level against the site's minimum operational threshold. The minimum threshold for an active secondary site in threat-response mode may be higher than the credential threshold for a site in maintenance mode. He may have a credential that is valid for routine access and insufficient for threat-response-mode interaction."],ru:["Он сказал «Спящий не откажет авторизованным операторским полномочиям. Его протокол не включает опцию отказа». Он прав о техническом статусе полномочия. Он не моделировал что «авторизованный оператор» означает в контексте серии 404 при частичной интеграции. Протокол оценки полномочий который выполняет вторичный объект оценивает уровень интеграции оператора относительно минимального операционного порога объекта. Минимальный порог для активного вторичного объекта в режиме ответа на угрозу может быть выше чем порог полномочия для объекта в режиме обслуживания."]},
     hides:{en:["'The world sounds slightly less detailed.' He has noted a new symptom — auditory detail reduction correlating with composite resonance depletion below fifty percent. This is a new category of perceptual change that has not appeared in previous chapters. The integration has been producing visual changes (the green interface overlay, the geometric iris reflection), circulatory changes (the black blood), structural changes (the composite boundary micro-tearing). This is the first auditory change. He noted it and moved on. He has not asked whether the auditory change is reversible when the resonance reserve recovers, or whether each depletion event leaves a permanent auditory resolution reduction."],ru:["«Мир звучит немного менее детально». Он отметил новый симптом — снижение слуховой детализации коррелирующее с истощением резонансного запаса композита ниже пятидесяти процентов. Это новая категория перцептивного изменения которая не появлялась в предыдущих главах. Интеграция производила визуальные изменения (зелёное наложение интерфейса, геометрическое отражение радужки), циркуляторные изменения (чёрная кровь), структурные изменения (микроразрывы границы композита). Это первое слуховое изменение. Он отметил и двинулся дальше."]},
     whisper:{en:"The world sounds slightly less detailed — first auditory change in thirty-two chapters. He noted it without examining reversibility. The shamans are unauthorized Covenant operators performing maintenance by rote. The tea is steeping.",ru:"Мир звучит немного менее детально — первое слуховое изменение за тридцать две главы. Он отметил без исследования обратимости. Шаманы — несанкционированные операторы Завета выполняющие обслуживание по памяти. Чай заваривается."}
   }
 }
}
];

const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');c.innerHTML=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}].map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
