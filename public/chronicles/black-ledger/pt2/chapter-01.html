#whisper-panel{background:var(--bg2);border:1px solid var(--border);border-top:none;border-left:3px solid var(--pov-p);padding:15px 40px 17px;margin-bottom:12px;opacity:0;transform:translateY(-2px);transition:opacity 1.6s,transform 1.2s;pointer-events:none;}

const TIMELINE=[
  {id:"TET-B4-01",en:"Six months, two weeks, and three days have elapsed since the Golden Circle absorption. Dante has been bored. This is operationally significant: his boredom is not psychological restlessness but a signal from the Auditor archive's goal-state system, which has marked all current operational objectives as complete (port infrastructure, Golden Circle absorption, Thomas's network stabilization, Valeria's compound supply chain, Olin's labor compact) and is surfacing urgency toward the next outstanding item — the Ark. The donor-memory has been producing the Ark's emergency alert at increasing frequency over the past six weeks. Dante has been filing this as 'later.' The boredom is the archive's pressure for 'later' to end.",ru:"Прошло шесть месяцев, две недели и три дня с момента поглощения Золотого Круга. Данте скучал. Это операционно значимо: его скука — не психологическое беспокойство но сигнал от целевой системы архива Аудитора, которая отметила все текущие операционные цели завершёнными (портовая инфраструктура, поглощение Золотого Круга, стабилизация сети Томаса, цепочка поставок соединения Валерии, трудовой договор с Олиным) и проявляет срочность в отношении следующего незавершённого пункта — Ковчега. Донорская память производила экстренный сигнал Ковчега с нарастающей частотой последние шесть недель. Данте заносил это как «позже». Скука — давление архива на окончание «позже»."},
  {id:"TET-B4-02",en:"The Gel-enriched composite in the leg is producing a qualitatively new signal. Grimm's six-month overhaul circulated enriched Gel through the joint architecture, increasing the composite's active surface area and the range of its null-field resonance detection. The 'phantom itch' Dante describes — the desire to strike, to break — is the composite's active-capability system running at idle, seeking structural targets in the environment and finding none. The composite was designed for an operator in active Covenant maintenance, where structural targets (failing infrastructure, Herald-class entities, Ark failsafe components) were continuously present. In six months of administrative stability, the composite has been running its disruption capability at idle. This is analogous to an unused muscle atrophying, except in reverse: the capability is not weakening but building pressure.",ru:"Обогащённый Гелем композит в ноге производит качественно новый сигнал. Шестимесячная переборка Гримма циркулировала обогащённый Гель через суставную архитектуру, увеличивая активную площадь поверхности композита и дальность обнаружения его нулевого резонанса. «Фантомный зуд» который описывает Данте — желание ударить, сломать — это система активных возможностей композита работающая на холостом ходу, ищущая структурные цели в окружающей среде и не находящая ни одной. Композит был разработан для оператора в активном обслуживании Завета, где структурные цели (отказывающая инфраструктура, сущности класса Вестников, компоненты системы безопасного резервирования Ковчега) были непрерывно присутствующими. В шесть месяцев административной стабильности, композит работал своей разрушительной возможностью на холостом ходу."},
  {id:"TET-B4-03",en:"Lucius's financial operation — Inquisition Decree #404, freezing all Guild assets via the Iron Safe Bank on grounds of the Vane estate's 'impure origin' — was prepared over six months. He identified the mechanism: the Guild holds Vane's assets, which the Church declared tainted. The Iron Safe Bank's Inquisition compliance relationship meant a single decree was sufficient to freeze the entire Guild financial position without a single armed conflict. This is the same method Dante used on Vane's supply chain during the harbor standoff, applied at the institutional level. Lucius learned from the harbor operation. He identified the mechanism Dante used and applied it at the next scale up.",ru:"Финансовая операция Люция — Указ Инквизиции №404, заморозка всех активов Гильдии через Банк «Железный Сейф» на основании «нечистого происхождения» имения Вейна — готовилась шесть месяцев. Он определил механизм: Гильдия держит активы Вейна, которые Церковь объявила загрязнёнными. Соответствие Банка «Железный Сейф» Инквизиции означало что одного указа достаточно для заморозки всей финансовой позиции Гильдии без единого вооружённого конфликта. Это тот же метод который Данте использовал против цепочки поставок Вейна во время противостояния в гавани, применённый на институциональном уровне. Люций научился у операции в гавани."},
  {id:"TET-B4-04",en:"Morius's offer — 51% of the Factory, the Gel formula, cessation of Eastern contacts, in exchange for financial rescue and legal protection — is the most operationally rational offer Dante has received in thirty chapters. The terms are punitive but the survival calculus is clear: accept and lose control but keep the institution alive, or refuse and lose everything. Morius knows Dante will refuse. He is not offering rescue. He is offering a choice between two kinds of loss, knowing that the refusal of the worse option will drive Dante to take an action that Morius can then respond to. The Opera meeting is not a negotiation. It is a trap designed to produce Dante's next move.",ru:"Предложение Мориуса — 51% Завода, формула Геля, прекращение восточных контактов, в обмен на финансовое спасение и правовую защиту — наиболее операционно рациональное предложение которое Данте получал за тридцать глав. Условия карательные но расчёт выживания ясен: принять и потерять контроль но сохранить институт живым, или отказать и потерять всё. Мориус знает что Данте откажет. Он предлагает не спасение. Он предлагает выбор между двумя видами потери, зная что отказ от худшего варианта побудит Данте предпринять действие на которое Мориус сможет ответить. Встреча в Опере — не переговоры. Это ловушка разработанная произвести следующий ход Данте."},
  {id:"TET-B4-05",en:"The Black Book of the Iron Safe Bank — 'Registry of Obligations, Volume VII, Especially Important Clients' — contains the complete debt portfolio of the Empire's aristocracy, general officer corps, and senior clergy. This includes: the Prince-Regent's illegal land collateral (which invalidates the collateral and constitutes treason), Lady Vesper's political-vote-as-collateral (which violates the Charter of the Estates), and Duke Orso's war-trophy collateral (which pre-commits Imperial military action for private debt purposes). The Book does not simply give Dante leverage over individuals. It gives him a map of the Empire's actual debt structure — who owes what to whom, what was pledged, and what the exposure is if those obligations are called simultaneously. This is not political leverage. This is the architectural plan of the system."},
  {id:"TET-B4-06",en:"The Silence technique Dante used to open the vault door — 'I released it not as a wave but as a thin, sharp needle, directing my will directly into the heart of the magical circuit' — is qualitatively different from every previous use of the Silence in the narrative. Previous uses: a compression-wave at the harbor, a disruption at the chain, a focused pulse at the wyvern. This use: a targeted dissolution of a specific magical binding without collateral disruption. He describes directing the Silence at the blood-drop at the center of the protection system — the 'living metal' — and cancelling its animation. This is surgical application of the null-field resonance at unprecedented precision. The Gel enrichment that Grimm performed over six months has increased the composite's resonance control capability. He named this correctly as 'Silence' for the first time in the narrative.",ru:"Техника Тишины которую Данте использовал чтобы открыть дверь хранилища — «я выпустил её не как волну, а как тонкую, острую иглу, направляя свою волю прямо в сердце магического контура» — качественно отличается от каждого предыдущего использования Тишины в нарративе. Предыдущие использования: волна сжатия в гавани, нарушение на цепи, сфокусированный импульс на виверне. Это использование: целенаправленное растворение конкретного магического связывания без побочного нарушения. Он описывает направление Тишины на каплю крови в центре защитной системы — «живой металл» — и отмену её анимации. Это хирургическое применение нулевого резонанса с беспрецедентной точностью."},
  {id:"TET-B4-07",en:"Princess Liliana is a new actor Dante has identified in the Imperial succession dynamics — specifically, through the Black Book's entry for 'Prince-Regent Ludovic: Loan 300,000 gold, collateral: Crown Lands (illegal), Status: Overdue.' A prince-regent with an illegal overdue loan of this size has a structural liability that makes his hold on the regency unstable. Liliana is his political counterweight in whatever succession framework is currently active. Dante has purchased Ludovic's debt and is offering Liliana terms for 'the ransom of the throne' — not the physical throne, but the leverage dynamic. He is entering Imperial politics within one chapter of the bank operation, using the Black Book as the entry mechanism.",ru:"Принцесса Лилиана — новый актор которого Данте определил в имперской преемственной динамике — конкретно через запись Чёрной Книги «Принц-Регент Людовик: Займ 300000 золотых, Обеспечение: Земли Короны (незаконно), Статус: Просрочено». Принц-регент с незаконным просроченным займом такого размера имеет структурное обязательство делающее его удержание регентства нестабильным. Лилиана — его политический противовес в любой преемственной рамке которая сейчас активна. Данте купил долг Людовика и предлагает Лилиане условия «выкупа трона» — не физического трона, но динамики рычага."}
];

const SCENES=[
{id:"s1",
 title:{en:"The Golden Cage",ru:"Золотая Клетка"},
 subtitle:{en:"Liquidity: zero. Assets: fifty million. The most boring kind of bankruptcy.",ru:"Ликвидность: ноль. Активы: пятьдесят миллионов. Самый скучный вид банкротства."},
 location:{en:"The Citadel — Former Vane's Office",ru:"Цитадель — Бывший Кабинет Вейна"},
 timing:{en:"Six Months After Black Ledger Arc VII",ru:"Шесть Месяцев После Арки VII Чёрного Гроссбуха"},
 flags:["arc_open","new_threat","cost"],
 povData:{
   dante:{distortion:4,
     text:{
       en:`Six months, two weeks, and three days.\n\nI have been counting because there is nothing else to count. The port efficiency is at ninety-four percent. The White Fang supply chain produces consistent output. Torin's operations at Object 7-B have established a rhythm. The thirty-two lower-city contacts are stable. The Valeria compound supply is managed. The Golden Circle acquisition has been fully integrated.\n\nI have, for the first time in twenty-seven chapters of operational activity, run out of problems.\n\nThis is the most dangerous condition I have experienced.\n\nThe leg is the index of the problem. Grimm spent six months overhauling it — enriched Gel circulation, expanded joint architecture, increased resonance range. The modifications are excellent. The leg is faster, quieter, more capable. And it is bored. There is a specific quality of signal from the composite that I have been noting for approximately six weeks: a phantom itch, a pressure toward motion, a frustration-adjacent state when the active-disruption capability runs long periods without a structural target.\n\nThe composite was designed for a continuous-maintenance operating environment. I have been operating in an administrative stability environment. The gap between the design parameters and the current conditions produces the signal I am labeling 'bored.'\n\nI was staring at the harbor when Silas came in without knocking.\n\nThe asset freeze was Lucius's work. I recognized it in four seconds from the structure of Silas's panic: specific frozen accounts, specific decree number, specific legal ground (the Vane estate's impure origin). Not the Scarlet Fist's approach of physical pressure. The Inquisition's approach of institutional mechanism. He identified the correct lever.\n\nI spent approximately twenty seconds angry before returning to assessment.\n\nThe liquidity position: two hundred thousand gold in the vault. One week of operational minimum. The asset position: fifty million in infrastructure I cannot liquidate against the freeze.\n\nClassic hostile illiquidity trap. You own everything. You can buy nothing.\n\nLucius timed this well. Six months of letting us build, letting us feel secure, letting us expand. Then the pen comes out and the numbers change.\n\nI admire the patience. I do not admire what it requires me to do next.\n\nThe Opera. Moriус. The offer I am going to refuse.\n\nI need to refuse it in a way that produces the right next move. Not just a refusal — a refusal that signals what I intend to do, so that the other party understands the stakes without me stating them directly.\n\nI told Silas to unlock the bribery reserve.\n\nThis is not a bribe. It is a demonstration budget.\n\nBusiness continues.`,
       ru:`Шесть месяцев, две недели и три дня.\n\nЯ считал, потому что больше нечего считать. Эффективность порта на девяносто четыре процента. Цепочка поставок Белого Клыка производит стабильный выпуск. Операции Торина на Объекте 7-Б установили ритм. Тридцать два контакта нижнего города стабильны. Снабжение соединением Валерии управляется. Приобретение Золотого Круга полностью интегрировано.\n\nЯ, впервые за двадцать семь глав операционной деятельности, исчерпал проблемы.\n\nЭто наиболее опасное состояние которое я испытывал.\n\nНога — индикатор проблемы. Гримм потратил шесть месяцев на её переборку — циркуляция обогащённого Геля, расширенная суставная архитектура, увеличенный диапазон резонанса. Модификации превосходны. Нога быстрее, тише, более способна. И она скучает. Есть специфическое качество сигнала от композита которое я отмечаю приблизительно шесть недель: фантомный зуд, давление к движению, состояние смежное с фрустрацией когда возможность активного нарушения работает длительные периоды без структурной цели.\n\nКомпозит был разработан для среды непрерывного обслуживания. Я работал в среде административной стабильности. Разрыв между конструктивными параметрами и текущими условиями производит сигнал который я обозначаю как «скука».\n\nЯ смотрел на гавань когда Силас вошёл без стука.\n\nЗаморозка активов — работа Люция. Я распознал её за четыре секунды по структуре паники Силаса: конкретные замороженные счета, конкретный номер указа, конкретное правовое основание (нечистое происхождение имения Вейна). Не подход «Алого Кулака» с физическим давлением. Подход Инквизиции с институциональным механизмом. Он определил верный рычаг.\n\nЯ провёл приблизительно двадцать секунд в гневе до возвращения к оценке.\n\nПозиция ликвидности: двести тысяч золотых в хранилище. Одна неделя операционного минимума. Позиция активов: пятьдесят миллионов в инфраструктуре которую нельзя ликвидировать против заморозки.\n\nКлассическая ловушка враждебной неликвидности. Ты владеешь всем. Ты не можешь купить ничего.\n\nЛюций выбрал время хорошо. Шесть месяцев дать нам строить, чувствовать себя уверенно, расширяться. Потом выходит перо и цифры меняются.\n\nЯ восхищаюсь терпением. Я не восхищаюсь тем что оно требует от меня делать следующим.\n\nОпера. Мориус. Предложение которое я собираюсь отвергнуть.\n\nМне нужно отвергнуть его способом производящим верный следующий ход. Не просто отказ — отказ сигнализирующий что я намерен делать, чтобы другая сторона понимала ставки без прямого их изложения.\n\nЯ сказал Силасу разблокировать резерв на взятки.\n\nЭто не взятка. Это демонстрационный бюджет.\n\nБизнес продолжается.`
     },
     knows:{en:["The freeze is Lucius's work — identified in 4 seconds from the specific decree structure. Institutional mechanism, not physical pressure. He identified the correct lever and timed it after 6 months of stability.","The composite is bored: active-disruption capability running idle, seeking structural targets and finding none. The Ark's emergency alert has been increasing in frequency for six weeks. He has been filing it as 'later.'","The Opera meeting is a demonstration budget, not a bribe. He is going to refuse and he already knows what the refusal produces."],ru:["Заморозка — работа Люция: определена за 4 секунды по структуре указа. Институциональный механизм, не физическое давление. Он определил верный рычаг и рассчитал время после 6 месяцев стабильности.","Композит скучает: возможность активного нарушения работает на холостом ходу, ищет структурные цели и не находит. Экстренный сигнал Ковчега нарастал частотой шесть недель. Он заносил это как «позже».","Встреча в Опере — демонстрационный бюджет, не взятка. Он собирается отказать и уже знает что отказ производит."]},
     misunderstands:{en:["He said 'I ran out of problems' and 'this is the most dangerous condition I have experienced.' He has attributed the danger to external vulnerability (no new problems to solve means no new leverage to develop). He has not attributed part of the danger to the composite's idle-state pressure accumulation — the six weeks of increasing Ark urgency from the archive combined with the composite's structural-target-seeking behavior. The danger is not only that he is externally vulnerable. The danger is also that the system he carries is building pressure toward a direction he has been deferring."],ru:["Он сказал «я исчерпал проблемы» и «это наиболее опасное состояние». Он приписал опасность внешней уязвимости (нет новых проблем для решения означает нет нового рычага для развития). Он не приписал часть опасности накоплению давления простоя композита — шесть недель нарастающей срочности Ковчега из архива в сочетании с поведением поиска структурных целей композита. Опасность не только в том что он внешне уязвим. Опасность также в том что система которую он несёт накапливает давление в направлении которое он откладывал."]},
     hides:{en:["'I spent approximately twenty seconds angry.' He has noted and quantified the emotional response. He has not examined that twenty seconds of anger is the longest documented emotional response in his narration. Every previous emotional response — the Siren's death, Ignatius's martyrdom, the face-changing moment with Torin — was registered but not timed. He measured this one. He does not explain why this loss-of-financial-control produced a timed anger response when events of greater personal significance did not."],ru:["«Я провёл приблизительно двадцать секунд в гневе». Он отметил и количественно выразил эмоциональный ответ. Он не исследовал что двадцать секунд гнева — наиболее продолжительный задокументированный эмоциональный ответ в его нарративе. Каждый предыдущий эмоциональный ответ — смерть Сирены, мученичество Игнациуса, момент изменения лица с Торином — был зарегистрирован но не хронометрирован. Он измерил этот. Он не объясняет почему эта потеря финансового контроля произвела хронометрируемый гнев когда события большей личной значимости не произвели."]},
     whisper:{en:"He timed his anger at twenty seconds. He has never timed an emotional response before. He did not examine why. The Ark urgency has been building for six weeks. He has been filing it as 'later.' Business continues — but the archive is running out of patience.",ru:"Он хронометрировал гнев в двадцать секунд. Он никогда прежде не хронометрировал эмоциональный ответ. Он не исследовал почему. Срочность Ковчега нарастала шесть недель. Он заносил как «позже». Бизнес продолжается — но у архива заканчивается терпение."}
   },
   silas:{distortion:3,
     text:{
       en:`I have been the Guild's treasurer for eleven years and three months.\n\nIn that time I have managed forty-seven crises. I know what a crisis looks like from the inside: the specific quality of time compression, where decisions that should take weeks happen in hours, and the specific quality of data density, where more information arrives faster than it can be properly assessed.\n\nThis is a crisis.\n\nI found the freeze at nine in the morning. I spent three hours verifying before I brought it to the Master, because I needed to be certain of every number before delivering a finding this severe. A treasurer who delivers unverified catastrophe creates panic. A treasurer who delivers verified catastrophe gives the decision-maker a stable foundation to act from.\n\nI am delivering verified catastrophe.\n\nThe freeze mechanism is elegant. Decree #404 cites the Inquisition's right to suspend assets of 'spiritual origin taint' — a legal designation that has existed for three hundred years and been used approximately nine times in history, always against minor heretical sects with no institutional power. Applied to the Guild, it catches everything: the Vane assets we absorbed, the Golden Circle holdings, the port infrastructure purchased from frozen Golden Circle accounts. The entire financial architecture is downstream of an asset the Church has declared tainted.\n\nTwo hundred thousand gold in the vault. One week.\n\nI ran the numbers seventeen times.\n\nThe Master looked at me for approximately four seconds when I told him, then said: 'Lucius.'\n\nHe was right. I had spent three hours reaching the same conclusion through financial forensics. He reached it through pattern recognition in four seconds.\n\nI have been watching him for eleven years. I know he is capable of this. I still find it disorienting every time.\n\nI also found, in the course of verifying the freeze mechanism, something I should have found three weeks ago.\n\nThe Site Seven analysis.\n\nI have been carrying it for four months. Today I had occasion to re-examine it while tracing the payment routing that led to the freeze mechanism. The predecessor's payment network overlaps with the Iron Safe Bank's original establishment funding — the same banking infrastructure the predecessor used to route the Pale Echelon plan's financing now underlies the bank that just froze us.\n\nThe predecessor built the bank's founding infrastructure.\n\nI have been carrying the analysis for four months. Today I added a new page.\n\nI will deliver it when the crisis resolves.\n\nOr I will deliver it during the crisis, if the crisis requires it.\n\nI am still practicing the delivery.`,
       ru:`Я казначей Гильдии одиннадцать лет и три месяца.\n\nЗа это время я управлял сорока семью кризисами. Я знаю как кризис выглядит изнутри: специфическое качество сжатия времени, где решения которые должны занимать недели происходят за часы, и специфическое качество плотности данных, где больше информации поступает быстрее чем может быть должным образом оценена.\n\nЭто кризис.\n\nЯ обнаружил заморозку в девять утра. Я провёл три часа в верификации прежде чем принёс её Мастеру, потому что мне нужно было быть уверенным в каждой цифре до доставки такого серьёзного заключения. Казначей доставляющий непроверенную катастрофу создаёт панику. Казначей доставляющий проверенную катастрофу даёт принимающему решение стабильное основание для действия.\n\nЯ доставляю проверенную катастрофу.\n\nМеханизм заморозки элегантен. Указ №404 ссылается на право Инквизиции приостанавливать активы «духовного скверного происхождения» — правовое обозначение существующее триста лет и использованное приблизительно девять раз в истории, всегда против незначительных еретических сект без институциональной власти. Применённый к Гильдии, он захватывает всё: активы Вейна которые мы поглотили, владения Золотого Круга, портовую инфраструктуру купленную с замороженных счетов Золотого Круга. Вся финансовая архитектура находится ниже по течению от актива который Церковь объявила загрязнённым.\n\nДвести тысяч золотых в хранилище. Одна неделя.\n\nЯ прогонял цифры семнадцать раз.\n\nМастер смотрел на меня приблизительно четыре секунды когда я ему сказал, затем произнёс: «Люций».\n\nОн был прав. Я провёл три часа достигая того же вывода через финансовую криминалистику. Он достиг его через распознавание паттерна за четыре секунды.\n\nЯ наблюдаю его одиннадцать лет. Я знаю что он на это способен. Я всё равно нахожу это дезориентирующим каждый раз.\n\nЯ также нашёл, в процессе верификации механизма заморозки, кое-что что должен был найти три недели назад.\n\nАнализ «Объекта Семь».\n\nЯ несу его четыре месяца. Сегодня я имел повод перепроверить его отслеживая маршрутизацию платежей которая привела к механизму заморозки. Платёжная сеть предшественника пересекается с исходным учредительным финансированием Банка «Железный Сейф» — та же банковская инфраструктура которую предшественник использовал для маршрутизации финансирования плана Бледного Эшелона теперь лежит в основе банка который только что нас заморозил.\n\nПредшественник построил учредительную инфраструктуру банка.\n\nЯ несу анализ четыре месяца. Сегодня я добавил новую страницу.\n\nЯ доставлю его когда кризис разрешится.\n\nИли я доставлю его во время кризиса, если кризис потребует.\n\nЯ всё ещё репетирую доставку.`
     },
     knows:{en:["The predecessor's payment network overlaps with the Iron Safe Bank's founding infrastructure — the same routing used for the Pale Echelon plan now underlies the bank that just froze the Guild. He added a new page to the Site Seven analysis today.","He has been carrying the analysis for four months. He is still practicing the delivery.","He delivered the freeze as verified catastrophe, not panic. 'A treasurer who delivers verified catastrophe gives the decision-maker a stable foundation to act from.'"],ru:["Платёжная сеть предшественника пересекается с учредительной инфраструктурой Банка «Железный Сейф» — та же маршрутизация использованная для плана Бледного Эшелона теперь лежит в основе банка только что замо розившего Гильдию. Он добавил новую страницу к анализу «Объекта Семь» сегодня.","Он несёт анализ четыре месяца. Он всё ещё репетирует доставку.","Он доставил заморозку как проверенную катастрофу, не панику. «Казначей доставляющий проверенную катастрофу даёт принимающему решение стабильное основание»."]},
     misunderstands:{en:["'I will deliver it when the crisis resolves. Or during the crisis, if the crisis requires it.' He has added a new condition: the crisis might require it. He is now holding two delivery criteria — stable conditions, or crisis necessity — and neither has been met. The new page he added today — the predecessor built the Iron Safe Bank's founding infrastructure — is directly relevant to the current crisis. The bank that is freezing them was built on the same foundation as the plan they are executing. If the predecessor built both the plan and the bank, then the freeze may not be Lucius's move. It may be the predecessor's contingency."],ru:["«Я доставлю когда кризис разрешится. Или во время кризиса, если кризис потребует». Он добавил новое условие: кризис может потребовать. Он теперь держит два критерия доставки — стабильные условия, или необходимость кризиса — и ни один не был выполнен. Новая страница которую он добавил сегодня — предшественник построил учредительную инфраструктуру Банка «Железный Сейф» — прямо релевантна текущему кризису. Банк который их замораживает был построен на том же основании что план который они выполняют. Если предшественник построил как план так и банк, то заморозка может быть не ходом Люция. Это может быть непредвиденным обстоятельством предшественника."]},
     hides:{en:["He is still practicing the delivery. He has added a new page. The predecessor built the Iron Safe Bank. He has not delivered this finding even now, even when it is directly relevant to the crisis that makes delivering it urgent. He said: 'I will deliver it when the crisis requires it.' The crisis is here. He filed: 'I am still practicing the delivery.' He is waiting for a version of the crisis that requires it — and he may be defining 'requires' in a way that perpetually defers the delivery."],ru:["Он всё ещё репетирует доставку. Он добавил новую страницу. Предшественник построил Банк «Железный Сейф». Он не доставил это открытие даже сейчас, даже когда оно прямо релевантно кризису делающему доставку срочной. Он сказал: «я доставлю когда кризис потребует». Кризис здесь. Он занёс: «я всё ещё репетирую доставку». Он ждёт версии кризиса которая требует — и он может определять «требует» способом который бесконечно откладывает доставку."]},
     whisper:{en:"The predecessor built the Iron Safe Bank. He added a new page today. He is still practicing the delivery. The crisis is here. He has not delivered.",ru:"Предшественник построил Банк «Железный Сейф». Он добавил новую страницу сегодня. Он всё ещё репетирует доставку. Кризис здесь. Он не доставил."}
   }
 }

{id:"s2",
 title:{en:"An Aria for the Deaf",ru:"Ария для Глухих"},
 subtitle:{en:"The Opera is where marriages are made, wars declared, and secrets sold. Morius chose it deliberately.",ru:"В Опере заключаются браки, объявляются войны и продаются секреты. Мориус выбрал её намеренно."},
 location:{en:"Imperial Opera — Box Three",ru:"Императорская Опера — Ложа №3"},
 timing:{en:"Same Evening",ru:"Тот же Вечер"},
 flags:["pivotal","social_combat","new_threat"],
 povData:{
   dante:{distortion:4,
     text:{
       en:`The Opera's acoustic design is the most sophisticated information-processing architecture I have encountered in twenty-eight chapters of operational work. Every conversation in Box Three is inaudible to adjacent boxes due to the specific curvature of the ceiling panels — the Cardinal has used Box Three for eleven years because he identified this property during his first season. The orchestra covers the whisper register from the floor level. I checked both properties on entry.\n\nMoriус identified me as tense before the formalities. He was correct. I was managing the adrenaline response from the afternoon's information load while maintaining presentation. The performance cost was approximately twelve percent of my baseline composure reserve — higher than usual because the asset freeze is the first threat in twenty-eight chapters that I cannot immediately model a response to. The gap between 'problem identified' and 'response designed' is still open after four hours of processing.\n\nI do not leave gaps open this long. This concerned me.\n\nHis offer was complete: 51% of the Factory, the Gel formula, cessation of Eastern contacts. In exchange: financial rescue, legal protection, continued management position, Inquisition non-interference.\n\nI processed it.\n\nIt was rational. It was generous by any standard measurement. Any treasurer, any merchant, any general in a position of zero liquidity would take this deal and be correct to take it.\n\nThe defect: the deal terminates my ability to reach the Ark.\n\nMoriус said 'cease all Eastern contacts.' The Ark is East. He either knows about the Ark (in which case the Eastern contacts cessation is the real purpose of the offer, and the financial rescue is the delivery mechanism) or he does not know about the Ark (in which case his offer accidentally eliminates my primary outstanding objective).\n\nBoth possibilities produce the same outcome: if I accept, the Ark becomes inaccessible.\n\nThe donor-memory archive has been producing escalating urgency signals about the Ark for six weeks. Status: Emergency. The archive does not produce Emergency signals about non-urgent items.\n\nI cannot take the deal.\n\nI told him: there is an error in the calculations.\n\nHe asked: what error?\n\nI said: you think money is the only resource holding my organization.\n\nThis is what I gave him — the information that I am going to execute something that does not require the current financial system. I gave him this information because I need him to understand I will not comply, and I need him to not escalate immediately to Lucius's full extraction protocol while I execute the alternative.\n\nI need forty-eight hours.\n\nMoriус is experienced enough to understand that a refusal delivered at this level of calm indicates a prepared alternative. He will not call Lucius immediately. He will investigate. The investigation buys me forty-eight hours.\n\nI walked into the rain.\n\nI did not have a fully formed plan.\n\nThis is new. I have never walked into the field without a plan.\n\nBut I knew where the pieces were.\n\nThe Iron Safe Bank's Black Book.\n\nThe Black Book is not money. It is the architecture of who owes what. It is the Empire's real ledger. If my ledger is frozen, I will audit theirs.\n\nBusiness continues.`,
       ru:`Акустический дизайн Оперы — наиболее сложная архитектура обработки информации с которой я сталкивался за двадцать восемь глав операционной работы. Каждый разговор в Ложе №3 неслышим соседним ложам из-за специфической кривизны потолочных панелей — Кардинал использует Ложу №3 одиннадцать лет, потому что определил это свойство в первый сезон. Оркестр покрывает шёпотный регистр с уровня пола. Я проверил оба свойства при входе.\n\nМориус определил меня напряжённым до формальностей. Он был прав. Я управлял адреналиновым ответом от информационной нагрузки дня поддерживая презентацию. Стоимость исполнения составляла приблизительно двенадцать процентов моего базового резерва самообладания — выше обычного, потому что заморозка активов — первая угроза за двадцать восемь глав для которой я не могу немедленно смоделировать ответ. Разрыв между «проблема определена» и «ответ разработан» всё ещё открыт после четырёх часов обработки.\n\nЯ не оставляю разрывы открытыми так долго. Это меня беспокоило.\n\nЕго предложение было полным: 51% Завода, формула Геля, прекращение восточных контактов. Взамен: финансовое спасение, правовая защита, сохранение управленческой позиции, невмешательство Инквизиции.\n\nЯ обработал его.\n\nОно было рациональным. Щедрым по любому стандартному измерению. Любой казначей, любой торговец, любой генерал в позиции нулевой ликвидности взял бы эту сделку и был бы прав взяв её.\n\nДефект: сделка прекращает мою способность добраться до Ковчега.\n\nМориус сказал «прекратить все восточные контакты». Ковчег на Востоке. Либо он знает о Ковчеге (в таком случае прекращение восточных контактов — реальная цель предложения, а финансовое спасение — механизм доставки) либо не знает о Ковчеге (в таком случае его предложение случайно устраняет мою основную незавершённую цель).\n\nОбе возможности производят тот же исход: если я принимаю, Ковчег становится недоступен.\n\nАрхив донорской памяти производил нарастающие сигналы срочности о Ковчеге шесть недель. Статус: Аварийный. Архив не производит аварийных сигналов о несрочных пунктах.\n\nЯ не могу принять сделку.\n\nЯ сказал ему: в расчётах есть ошибка.\n\nОн спросил: какая ошибка?\n\nЯ сказал: вы думаете что деньги — единственный ресурс удерживающий мою организацию.\n\nЭто то что я дал ему — информацию что я собираюсь выполнить нечто не требующее нынешней финансовой системы. Я дал ему эту информацию, потому что мне нужно чтобы он понял что я не буду выполнять, и мне нужно чтобы он не эскалировал немедленно к полному протоколу извлечения Люция пока я выполняю альтернативу.\n\nМне нужно сорок восемь часов.\n\nМориус достаточно опытен чтобы понять что отказ доставленный на этом уровне спокойствия указывает на подготовленную альтернативу. Он не позвонит Люцию немедленно. Он будет расследовать. Расследование покупает мне сорок восемь часов.\n\nЯ вышел под дождь.\n\nУ меня не было полностью сформированного плана.\n\nЭто ново. Я никогда не выходил в поле без плана.\n\nНо я знал где были части.\n\nЧёрная Книга Банка «Железный Сейф».\n\nЧёрная Книга — не деньги. Это архитектура кто что должен. Это реальный гроссбух Империи. Если мой гроссбух заморожен, я проведу аудит их.\n\nБизнес продолжается.`
     },
     knows:{en:["The Opera's acoustic properties — Box Three is designed for private conversation, verified on entry. He has noted Morius uses it for eleven years because Morius identified the property first.","The defect in the offer: 'cease all Eastern contacts' terminates access to the Ark. Both explanations (Morius knows / does not know about the Ark) produce the same outcome. He cannot take the deal.","He did not have a fully formed plan when he walked into the rain. 'This is new. I have never walked into the field without a plan.' He knew where the pieces were."],ru:["Акустические свойства Оперы — Ложа №3 разработана для приватного разговора, проверено при входе. Он отметил что Мориус использует её одиннадцать лет, потому что Мориус первым определил свойство.","Дефект предложения: «прекратить все восточные контакты» прекращает доступ к Ковчегу. Оба объяснения (Мориус знает / не знает о Ковчеге) производят тот же исход. Он не может принять сделку.","У него не было полностью сформированного плана когда он вышел под дождь. «Это ново. Я никогда не выходил в поле без плана». Он знал где были части."]},
     misunderstands:{en:["He processed Morius's offer and found the defect in four minutes. He has attributed the defect to the Ark access cessation — which is correct. He has not considered the third possibility: that Morius knows about the Ark, knows Dante knows about the Ark, and structured the Eastern contacts cessation specifically to test whether Dante would refuse on those grounds. A refusal based on the Ark would confirm to Morius that the Ark is Dante's actual outstanding objective. The calm refusal Dante delivered — 'money is not the only resource' — did not reveal the specific reason. He may have protected himself."],ru:["Он обработал предложение Мориуса и нашёл дефект за четыре минуты. Он приписал дефект прекращению доступа к Ковчегу — что верно. Он не рассмотрел третью возможность: что Мориус знает о Ковчеге, знает что Данте знает о Ковчеге, и структурировал прекращение восточных контактов конкретно чтобы проверить откажет ли Данте на этих основаниях. Отказ основанный на Ковчеге подтвердил бы Мориусу что Ковчег — реальная незавершённая цель Данте. Спокойный отказ который доставил Данте — «деньги не единственный ресурс» — не раскрыл конкретную причину."]},
     hides:{en:["'The gap between problem identified and response designed is still open after four hours of processing. I do not leave gaps open this long. This concerned me.' He noted concern about the gap's duration without examining why this particular problem — financial freezing — produced a longer design gap than any previous problem. The reason: every previous problem had a precedent in the donor-memory archive's operational database. Financial illiquidity trap at the institutional scale is a problem the Precursor-era Auditor's operating context did not encounter. The archive has no template for this. He is operating without donor-memory support for the first time in twenty-eight chapters."],ru:["«Разрыв между определённой проблемой и разработанным ответом всё ещё открыт после четырёх часов обработки. Я не оставляю разрывы открытыми так долго. Это меня беспокоило». Он отметил озабоченность продолжительностью разрыва не исследуя почему именно эта проблема — финансовая заморозка — произвела более длительный разрыв разработки чем любая предыдущая проблема. Причина: каждая предыдущая проблема имела прецедент в операционной базе данных архива донорской памяти. Ловушка институциональной неликвидности в масштабе — проблема которую операционный контекст Аудитора эпохи Предтечей не встречал. У архива нет шаблона для этого. Он работает без поддержки донорской памяти впервые за двадцать восемь глав."]},
     whisper:{en:"The donor-memory archive has no template for institutional financial illiquidity. He is working without support for the first time. He walked into the rain without a plan. He knew where the pieces were. The Black Book.",ru:"У архива донорской памяти нет шаблона для институциональной финансовой неликвидности. Он работает без поддержки впервые. Он вышел под дождь без плана. Он знал где были части. Чёрная Книга."}
   },
   morius:{distortion:5,
     text:{
       en:`He came, as I knew he would.\n\nIn eleven years of watching the Auditor position — not Dante specifically, but the position, which I have been monitoring since the previous occupant set the Pale Echelon mechanism in motion — I have developed a reliable predictive model. The Auditor's decision architecture responds to constraint with acceleration rather than negotiation. Every time I have applied pressure to this position, it has produced movement rather than compliance.\n\nI applied financial pressure tonight.\n\nHe will move.\n\nWhat I needed from the Opera meeting was not his acceptance. I needed his refusal to confirm the operational parameter I have been uncertain about: whether the Eastern objective is active or dormant. If the Eastern objective is active, he will refuse any offer that includes Eastern contact cessation. If it is dormant, he will accept the financial rescue and manage the Eastern objective as a deferred matter.\n\nHe refused.\n\nThe Eastern objective is active.\n\nI have known about the Ark for twenty-three years. Not its location — the Dead Lands coordinate data is not in any archive I have access to. I know what the Ark is: the Covenant's failsafe. The contingency system designed for exactly the current situation — when the Covenant's maintenance protocols have failed at the foundational level and the primary maintenance infrastructure (the Island network) has been destroyed.\n\nThe Ark's activation requires an Auditor-class operator in active integration with Covenant-grade composite. Dante now meets this specification. He has been meeting it since he returned from the Island.\n\nI could not stop him from meeting the specification — the process was already underway when I became aware of it. What I can control is: whether he reaches the Ark under controlled conditions, or under uncontrolled conditions.\n\nThe offer was not a trap. It was a controlled-conditions framework.\n\nHe refused it.\n\nSo it will be uncontrolled conditions.\n\nI do not prefer uncontrolled conditions. But I have been managing uncontrolled conditions for fifty years.\n\nI finished my wine after he left.\n\nThe fall of the second act is coming. I have seen this opera eleven times.\n\nI know who survives.`,
       ru:`Он пришёл, как я и знал.\n\nЗа одиннадцать лет наблюдения за позицией Аудитора — не Данте конкретно, но позицией, которую я отслеживаю с момента когда предыдущий её занимавший запустил механизм Бледного Эшелона — я разработал надёжную прогностическую модель. Архитектура решений Аудитора реагирует на ограничение ускорением а не переговорами. Каждый раз когда я применял давление к этой позиции, это производило движение а не соответствие.\n\nЯ применил финансовое давление сегодня вечером.\n\nОн будет двигаться.\n\nЧто мне было нужно от встречи в Опере — не его принятие. Мне был нужен его отказ для подтверждения операционного параметра в котором я был неуверен: активна ли Восточная цель или дремлет. Если Восточная цель активна, он откажет от любого предложения включающего прекращение восточных контактов. Если она дремлет, он примет финансовое спасение и управит Восточной целью как отложенным вопросом.\n\nОн отказал.\n\nВосточная цель активна.\n\nЯ знаю о Ковчеге двадцать три года. Не его местоположение — координатные данные Мёртвых Земель недоступны ни в одном архиве к которому у меня есть доступ. Я знаю что такое Ковчег: резервная система Завета. Система непредвиденных обстоятельств разработанная именно для нынешней ситуации — когда протоколы обслуживания Завета отказали на фундаментальном уровне и основная инфраструктура обслуживания (сеть Острова) была уничтожена.\n\nАктивация Ковчега требует оператора класса Аудитора в активной интеграции с композитом уровня Завета. Данте сейчас соответствует этой спецификации. Он соответствует ей с момента возвращения с Острова.\n\nЯ не мог помешать ему соответствовать спецификации — процесс уже шёл когда я его осознал. Что я могу контролировать: добирается ли он до Ковчега в контролируемых условиях, или в неконтролируемых.\n\nПредложение не было ловушкой. Это была рамка контролируемых условий.\n\nОн отказал от неё.\n\nТак что будут неконтролируемые условия.\n\nЯ не предпочитаю неконтролируемые условия. Но я управлял неконтролируемыми условиями пятьдесят лет.\n\nЯ допил вино после того как он ушёл.\n\nПадение второго акта приближается. Я видел эту оперу одиннадцать раз.\n\nЯ знаю кто выживает.`
     },
     knows:{en:["He knows about the Ark — for twenty-three years. Not its coordinates (the Dead Lands data is not in any archive he has access to), but what it is: the Covenant's failsafe, requiring an Auditor-class operator in active Covenant-composite integration. Dante meets the specification.","The offer was not a trap. It was a controlled-conditions framework. 'He refused it. So it will be uncontrolled conditions.'","He has seen this opera eleven times. He knows who survives. He finished his wine."],ru:["Он знает о Ковчеге — двадцать три года. Не его координаты (данные Мёртвых Земель недоступны в любом доступном ему архиве), но что это такое: резервная система Завета, требующая оператора класса Аудитора в активной интеграции с композитом уровня Завета. Данте соответствует спецификации.","Предложение не было ловушкой. Это была рамка контролируемых условий. «Он отказал. Так что будут неконтролируемые условия».","Он видел эту оперу одиннадцать раз. Он знает кто выживает. Он допил вино."]},
     misunderstands:{en:["He believes he is managing uncontrolled conditions by containing the Auditor's movement. He has not accounted for Lucius. Lucius is not under Morius's operational management — Lucius operates from the Order of the Silent Archive independently and has his own four-hundred-year preparation for the Ark moment. Morius thinks he is the primary Church actor in the Ark scenario. He may be a secondary one."],ru:["Он считает что управляет неконтролируемыми условиями сдерживая движение Аудитора. Он не учёл Люция. Люций не находится под операционным управлением Мориуса — Люций действует из Ордена Тихого Архива независимо и имеет собственную четырёхсотлетнюю подготовку к моменту Ковчега. Мориус думает что является основным церковным актором в сценарии Ковчега. Он может быть вторичным."]},
     hides:{en:["'I know who survives.' He said this about the opera. He meant it about himself. He has been managing Auditor-class situations for fifty years. He has survived every one. He believes he will survive this one. He has not examined whether the Series 404 specification's completion — the moment Lucius is waiting for — changes the survival calculus in ways that fifty years of managing Auditor-class situations has not prepared him for."],ru:["«Я знаю кто выживает». Он сказал это об опере. Он имел в виду себя. Он управлял ситуациями класса Аудитора пятьдесят лет. Он пережил каждую. Он верит что переживёт эту. Он не исследовал изменяет ли завершение спецификации серии 404 — момент которого ждёт Люций — расчёт выживания способами к которым пятьдесят лет управления ситуациями класса Аудитора его не подготовило."]},
     whisper:{en:"He knows about the Ark. The offer was a controlled-conditions framework. He refused it. Morius knows Lucius is involved but may not know Lucius's four-hundred-year preparation is independent of Morius. 'I know who survives.' He has not examined whether that is still true.",ru:"Он знает о Ковчеге. Предложение было рамкой контролируемых условий. Он отказал. Мориус знает что Люций вовлечён но может не знать что четырёхсотлетняя подготовка Люция независима от Мориуса. «Я знаю кто выживает». Он не исследовал является ли это всё ещё верным."}
   }
 }
},

{id:"s3",
 title:{en:"Compulsory Audit",ru:"Принудительный Аудит"},
 subtitle:{en:"We are not stealing gold. Gold is heavy and easy to trace. We are stealing the soul of the bank.",ru:"Мы не берём золото. Золото тяжёлое и его легко отследить. Мы крадём душу банка."},
 location:{en:"Iron Safe Bank — Main Vault",ru:"Банк «Железный Сейф» — Главное Хранилище"},
 timing:{en:"Same Night — After Midnight",ru:"Та же Ночь — После Полуночи"},
 flags:["pivotal","institution_build","identity","foreshadowing"],
 povData:{
   dante:{distortion:3,
     text:{
       en:`The vault door was the most sophisticated non-Precursor security mechanism I have encountered. I want to be specific about this: not the most sophisticated mechanism I have encountered — the Island and Object 7-B both exceeded it in every technical category. But the most sophisticated mechanism produced by current civilization's engineering tradition, without Precursor-era substrate.\n\nThree meters of reinforced concrete, lead lining, third-tier magical binding. The blood-key requirement for the blood-magic circuit. In conventional terms: impenetrable.\n\nGrimm's 'Acid Storm' is not a Gel product. It is a Gel-derived product — a modification that uses the Gel's molecular transcription pathway in reverse, producing an enzymatic dissolution effect rather than a synthesis effect. He developed it from the Pale Echelon notation pages, not from the primary Gel formula. The six pages have now produced three deployable modifications. He has not told me how many pages remain in his unauthorized decoding.\n\nThe vault opened through three simultaneous applications:\n\nVariek's pressure at the specific load point. This identified and exploited a stress concentration in the door's mechanical architecture that existed because the designer assumed the blood-magic circuit would always compensate for mechanical stress — once the magic was neutralized, the mechanical architecture was insufficient.\n\nGrimm's vibration disruption at the center. This created a resonance frequency in the door's steel substrate that the magical binding was compensating against — draining the circuit's energy budget.\n\nMy Silence at the blood-circuit's core. This was not the Silence I used at the harbor, or the chain, or the wyvern, or the warehouse floor. This was the Silence used as a scalpel rather than a hammer — directed at a single point, the animated blood-drop, cancelling its animation without disrupting anything adjacent to it. Six months of the Gel enrichment and the composite's increased resonance range have produced a level of precision I did not have in Chapter 27.\n\nThe blade of Silence is sharper than it was.\n\nThe gold was irrelevant. Fifty million in bullion and coin. I walked past it.\n\nI have walked past significant resources before. I gave away the Tear of Leviathan sphere. I spent all thirty liters of Gel on the hull. I left the treasury at the manor untouched when I took the documents in the early Valeria operation. Each time I pass resources without taking them, it is because the resources I am taking are worth more.\n\nThe Registry of Obligations is worth more than everything in that vault.\n\nPrince-Regent Ludovic: 300,000 gold, Crown Lands collateral (illegal), overdue.\n\nI left a copper groat in the space where the books had been. Not as a joke. As a receipt — the same mechanism as the Tear of Leviathan to Vane. An object that communicates: we were here, we were precise, we took exactly what we came for, and we can come back.\n\nPrincess Liliana.\n\nThe Prince-Regent's debt is the leverage mechanism. But the debt alone is not sufficient — a debt purchased by an enemy can be disputed, invalidated, or superseded by a larger payment to a competing creditor. The debt is only useful if the debtor's counterparty — Liliana — is positioned to convert the debt into a political instrument. She has the standing. She has the motivation. She does not yet have the information.\n\nI am going to give her the information.\n\nThe message I am sending her: I have purchased your brother's debt. I am ready to discuss the terms of the throne's ransom.\n\n'Ransom of the throne' does not mean I am claiming the throne. It means: I have purchased the liability that makes his claim to the throne contingent on my cooperation. The throne is currently his. I have purchased the lever that determines whether it remains his.\n\nThis is a new kind of operation.\n\nI am not auditing a commercial institution. I am auditing an Empire.\n\nBusiness continues.`,
       ru:`Дверь хранилища была наиболее сложным механизмом безопасности не Предтечей с которым я сталкивался. Я хочу быть точным: не наиболее сложным механизмом который я встречал — Остров и Объект 7-Б оба превосходили его в каждой технической категории. Но наиболее сложным механизмом произведённым инженерной традицией нынешней цивилизации, без субстрата эпохи Предтечей.\n\nТри метра армированного бетона, свинцовая подкладка, магическое связывание третьего уровня. Требование кровяного ключа для кровавого магического контура. В обычных терминах: непроницаем.\n\n«Кислотный Шторм» Гримма — не продукт Геля. Это продукт производный от Геля — модификация использующая молекулярный транскрипционный путь Геля в обратном направлении, производящая эффект ферментативного растворения а не синтеза. Он разработал его из страниц нотаций Бледного Эшелона, а не из основной формулы Геля. Шесть страниц теперь произвели три развёртываемых модификации. Он не говорил мне сколько страниц остаётся в его несанкционированном дешифровании.\n\nХранилище открылось через три одновременных применения:\n\nДавление Варека в конкретной точке нагрузки. Это определило и использовало концентрацию напряжения в механической архитектуре двери существовавшую потому что конструктор предполагал что кровавый магический контур всегда компенсирует механическое напряжение — как только магия была нейтрализована, механическая архитектура была недостаточна.\n\nВибрационное нарушение Гримма в центре. Это создало резонансную частоту в стальном субстрате двери против которой компенсировало магическое связывание — истощая энергетический бюджет контура.\n\nМоя Тишина в ядре кровавого контура. Это была не Тишина которую я использовал в гавани, или на цепи, или на виверне, или на полу склада. Это была Тишина использованная как скальпель а не молоток — направленная в одну точку, анимированную каплю крови, отменяющая её анимацию без нарушения чего-либо рядом. Шесть месяцев обогащения Гелем и увеличенный диапазон резонанса композита произвели уровень точности которого у меня не было в Главе 27.\n\nЛезвие Тишины острее чем было.\n\nЗолото было нерелевантным. Пятьдесят миллионов в слитках и монетах. Я прошёл мимо.\n\nЯ прежде проходил мимо значительных ресурсов. Я отдал сферу Слезы Левиафана. Я потратил все тридцать литров Геля на корпус. Я оставил сокровищницу в особняке нетронутой когда брал документы в ранней операции Валерии. Каждый раз когда я прохожу мимо ресурсов не беря их, это потому что ресурсы которые беру стоят больше.\n\nРеестр Обязательств стоит больше чем всё в том хранилище.\n\nПринц-Регент Людовик: 300000 золотых, обеспечение Земли Короны (незаконно), просрочено.\n\nЯ оставил медный грош в пространстве где были книги. Не как шутку. Как квитанцию — тот же механизм что Слеза Левиафана Вейну. Объект коммуницирующий: мы были здесь, мы были точны, мы взяли именно то за чем пришли, и мы можем вернуться.\n\nПринцесса Лилиана.\n\nДолг Принца-Регента — механизм рычага. Но долга одного недостаточно — долг купленный врагом может быть оспорен, признан недействительным или превзойдён большим платежом конкурирующему кредитору. Долг полезен только если контрагент должника — Лилиана — позиционирована для конвертации долга в политический инструмент. У неё есть статус. У неё есть мотивация. У неё ещё нет информации.\n\nЯ собираюсь дать ей информацию.\n\nПослание которое я отправляю ей: я купил долг вашего брата. Я готов обсудить условия выкупа трона.\n\n«Выкуп трона» не означает что я претендую на трон. Это означает: я купил обязательство делающее его претензию на трон зависимой от моего сотрудничества. Трон сейчас его. Я купил рычаг определяющий останется ли он его.\n\nЭто новый вид операции.\n\nЯ провожу аудит не коммерческой институции. Я провожу аудит Империи.\n\nБизнес продолжается.`
     },
     knows:{en:["The Silence is sharper. Six months of Gel enrichment produced precision unavailable in Chapter 27 — surgical application at a single animated blood-drop without adjacent disruption. He named the capability correctly as 'Silence' for the first time.","Grimm's Acid Storm is derived from the Pale Echelon pages, not the primary Gel formula. The six pages have now produced three deployable modifications. He does not know how many pages remain in Grimm's unauthorized decoding.","The copper groat is a receipt — same mechanism as the Leviathan sphere to Vane. 'We were here, we were precise, we took exactly what we came for, and we can come back.'"],ru:["Тишина острее. Шесть месяцев обогащения Гелем произвели точность недоступную в Главе 27 — хирургическое применение в единой анимированной капле крови без соседнего нарушения. Он впервые правильно назвал возможность «Тишиной».","Кислотный Шторм Гримма производится из страниц Бледного Эшелона, а не из основной формулы Геля. Шесть страниц теперь произвели три развёртываемых модификации. Он не знает сколько страниц остаётся в несанкционированном дешифровании Гримма.","Медный грош — квитанция: тот же механизм что сфера Левиафана Вейну. «Мы были здесь, мы были точны, мы взяли именно то за чем пришли, и мы можем вернуться»."]},
     misunderstands:{en:["He said 'I am auditing an Empire.' He has framed this as a scale escalation — from commercial institution to sovereign structure. He has not examined whether 'auditing an Empire' is the correct category for what he is doing. An audit is an examination of accounts, a verification of stated positions against actual positions. What he is doing is acquiring the leverage over the Empire's account-holders that would allow him to direct the Empire's actual positions. This is not an audit. This is a hostile takeover. Of an Empire. He named it as an audit because that is the word he uses for everything."],ru:["Он сказал «я провожу аудит Империи». Он оформил это как эскалацию масштаба — от коммерческой институции к суверенной структуре. Он не исследовал является ли «аудит Империи» верной категорией для того что делает. Аудит — это проверка счетов, верификация заявленных позиций относительно реальных позиций. То что он делает: приобретение рычага над держателями счетов Империи позволяющего ему направлять реальные позиции Империи. Это не аудит. Это враждебное поглощение. Империи. Он назвал это аудитом, потому что это слово которое использует для всего."]},
     hides:{en:["He walked past fifty million in gold and named this as evidence that the Registry was worth more. He named three previous instances of passing resources without taking them — the sphere, the Gel, the manor treasury. He has not connected these four instances as a pattern: he consistently passes immediately available resources for less-immediately-available but higher-leverage alternatives. He does not accumulate for accumulation's sake. He converts available forms to leverage forms. The Registry is the purest leverage form he has encountered — it converts to influence rather than to anything material. He has not said: I prefer influence to gold. He has demonstrated it four times.","The message to Liliana: 'ransom of the throne.' He has framed this as a leveraged discussion. He has not examined what it means that he is now entering Imperial succession politics within twenty-four hours of a bank operation that began as a response to a financial freeze. The rate of scale escalation has accelerated across chapters: commercial, then capital city, then empire. The next step is implicit in the message to Liliana."],ru:["Он прошёл мимо пятидесяти миллионов золота и назвал это доказательством что Реестр стоит больше. Он назвал три предыдущих случая прохода мимо ресурсов без взятия — сфера, Гель, сокровищница особняка. Он не соединил эти четыре случая как паттерн: он последовательно проходит мимо немедленно доступных ресурсов ради менее немедленно доступных но более высоких рычаговых альтернатив. Он не накапливает ради накопления. Он конвертирует доступные формы в рычаговые формы. Реестр — наиболее чистая рычаговая форма с которой он сталкивался: она конвертируется во влияние а не во что-либо материальное.","Послание Лилиане: «выкуп трона». Он оформил это как рычаговую дискуссию. Он не исследовал что означает то, что он теперь входит в имперскую преемственную политику в течение двадцати четырёх часов от банковской операции начавшейся как ответ на финансовую заморозку. Скорость эскалации масштаба ускорилась по главам: коммерческий, затем столица, затем империя."]},
     whisper:{en:"He said 'I am auditing an Empire.' It is a hostile takeover. He names it audit because that is the word he uses for everything. He prefers influence to gold and has demonstrated it four times. The message to Liliana is the next step.",ru:"Он сказал «я провожу аудит Империи». Это враждебное поглощение. Он называет это аудитом, потому что это слово которое использует для всего. Он предпочитает влияние золоту и продемонстрировал это четыре раза. Послание Лилиане — следующий шаг."}
   }
 }
}
];

const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');c.innerHTML=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}].map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
