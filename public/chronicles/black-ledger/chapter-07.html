.d6,.d7{animation:flicker-mid 7s infinite;}
.d8,.d9{animation:flicker-hard 4s infinite,glitch-mid 16s infinite;}

@keyframes flicker-soft{0%,94%,100%{opacity:1;}96%{opacity:.88;}}
@keyframes flicker-mid{0%,88%,100%{opacity:1;}90%{opacity:.75;}92%{opacity:.9;}93%{opacity:.68;}94%{opacity:1;}}
@keyframes flicker-hard{0%,80%,100%{opacity:1;}82%{opacity:.6;}83%{opacity:.9;}84%{opacity:.55;}85%{opacity:.85;}86%{opacity:.7;}87%{opacity:1;}}
@keyframes glitch-mid{0%,92%,100%{transform:none;filter:none;}93%{transform:translate(-3px,0);filter:drop-shadow(3px 0 rgba(255,0,0,.3));}94%{transform:translate(3px,0);filter:drop-shadow(-3px 0 rgba(0,100,255,.2));}95%{transform:translate(-1px,1px);}96%{transform:none;}}

const TIMELINE=[
  {id:"TET-53",en:"Lot 13 was not randomly included in the auction. The Cult of Zero Hour placed it deliberately through a shell buyer six days before the auction, knowing the Guild's intelligence network would identify it as significant. The mechanical navigator inside the ship's log box is functional and already programmed with a route — not the route to Sector 13, but the route the entity wants Dante to believe leads to Sector 13. The actual coordinates of Sector 13 are on the reverse of the lead pages, written in a script that requires a Void-sensitivity enhancer to read. The Void-Blossom tea is the key. The box was addressed to Dante before the auction was announced.",ru:"Лот 13 не был включён в аукцион случайно. Культ Нулевого Часа разместил его через подставного покупателя за шесть дней до аукциона, зная, что разведывательная сеть Гильдии определит его как значимый. Механический навигатор внутри коробки судового журнала функционален и уже запрограммирован маршрутом — не маршрутом в Сектор 13, а тем, который сущность хочет, чтобы Данте считал ведущим в Сектор 13. Реальные координаты Сектора 13 — на обороте свинцовых страниц, написанные шрифтом, требующим усилителя чувствительности к Пустоте для чтения. Ключом является чай из Пустоцвета. Коробка была адресована Данте до объявления аукциона."},
  {id:"TET-54",en:"Cassius did not place Lot 13. He received it from an intermediary he knows as 'the Lamplighter' and was explicitly told not to examine its contents. He examined the contents. He immediately recognized the ship's log was from a vessel that disappeared in the fog bank north of Sector 13 eighteen months ago — a disappearance he had been paid to not report to any authority. He included Lot 13 in the auction to get it out of his possession without appearing to know what it was. He was terrified before Dante arrived. After Dante arrived, he was more terrified, but also somewhat relieved.",ru:"Кассиус не выставлял Лот 13. Он получил его от посредника, известного ему как «Фонарщик», и ему явно сказали не проверять содержимое. Он проверил содержимое. Он немедленно узнал, что судовой журнал принадлежал судну, исчезнувшему в туманной полосе к северу от Сектора 13 восемнадцать месяцев назад — исчезновении, за молчание о котором ему заплатили. Он включил Лот 13 в аукцион, чтобы избавиться от него, не показывая, что знает, что это такое. До прибытия Данте он был в ужасе. После прибытия Данте — в большем ужасе, но также в некотором облегчении."},
  {id:"TET-55",en:"The Cult of Zero Hour does not take years of life as payment. Cassius's description of their payment mechanism is garbled street-rumor. What they take is memory. Specifically: the memories the donor would most prefer to retain. The transaction is voluntary in the sense that the donor agrees. It is not voluntary in the sense that the Cult selects which memories are taken — the donor experiences what feels like a donation of something they can spare, and discovers over the following weeks that what was taken was the thing they most needed to keep.",ru:"Культ Нулевого Часа не берёт годы жизни в качестве оплаты. Описание Кассиуса их механизма оплаты — искажённые уличные слухи. Они берут воспоминания. Конкретно: воспоминания, которые даритель больше всего хотел бы сохранить. Транзакция добровольна в том смысле, что даритель соглашается. Она не добровольна в том смысле, что Культ выбирает, какие воспоминания брать — даритель испытывает то, что ощущается как пожертвование чего-то несущественного, и обнаруживает в течение следующих недель, что взятое было тем, что ему больше всего нужно было сохранить."},
  {id:"TET-56",en:"Isabella's sneezing agent in the auction hall was not the Paralysis Perfume she named. It was an airborne compound she synthesized specifically for this operation and has not named to anyone — it produces a forty-second window of involuntary truth-telling in the subject, combined with a physical response (sneezing) that provides cover for the subject's sudden candor. Cassius's agent did not sneeze because of allergies. He sneezed because Isabella wanted to know what his bid ceiling was, and the answer he gave involuntarily told her: 3,200 gold. Dante's 5,000 bid was not intuition. Isabella passed him a note.",ru:"Агент чихания Изабеллы в аукционном зале был не «Духами Паралича», которые она назвала. Это было воздушное соединение, которое она синтезировала специально для этой операции и не называла никому — оно производит сорокасекундное окно непроизвольного правдоговорения у субъекта в сочетании с физической реакцией (чихание), обеспечивающей прикрытие для внезапной откровенности субъекта. Агент Кассиуса чихал не из-за аллергии. Он чихал, потому что Изабелла хотела знать его потолок ставки, и ответ, который он дал непроизвольно, сказал ей: 3200 золотых. Ставка Данте в 5000 была не интуицией. Изабелла передала ему записку."},
  {id:"TET-57",en:"The ship's log coordinates that Dante read in the carriage are accurate but incomplete. They give the approach vector to Sector 13's outer boundary. The log does not include what Sector 13 actually is — because the ship's crew never reached it. The log's final entry, on the last lead page, reads: 'The fog has faces. They are all mine.' The entry is in the captain's handwriting. The captain's name, in the log's header, is the same name as the Precursor-era site Isabella found her Cognitive Iron sample near six years ago.",ru:"Координаты судового журнала, прочитанные Данте в карете, точны, но неполны. Они дают вектор подхода к внешней границе Сектора 13. Журнал не содержит информации о том, чем на самом деле является Сектор 13 — потому что экипаж корабля так и не добрался до него. Последняя запись журнала, на последней свинцовой странице, гласит: «У тумана есть лица. Все они — мои». Запись выполнена почерком капитана. Имя капитана в заголовке журнала совпадает с именем объекта эпохи Предтечей, рядом с которым Изабелла нашла свой образец Когнитивного Железа шесть лет назад."},
  {id:"TET-58",en:"'Pale Echelon' — the operation Dante ordered prepared — is a Guild deep-water interdiction protocol developed for use against submerged Void-contact sites. It has never been used. It was designed eleven years ago, in the first month of Dante's tenure as Auditor, for a scenario he was briefed on but that had not yet occurred. The scenario briefing document is classified above all current Guild clearance levels except Dante's. It describes, in technical detail, Sector 13.",ru:"«Бледный Эшелон» — операция, приготовить которую приказал Данте — это протокол глубоководного перехвата Гильдии, разработанный для использования против погружённых мест контакта с Пустотой. Он никогда не применялся. Он был разработан одиннадцать лет назад, в первый месяц службы Данте как Аудитора, для сценария, о котором его проинструктировали, но который ещё не произошёл. Документ брифинга по сценарию засекречен выше всех текущих уровней допуска Гильдии кроме допуска Данте. Он описывает Сектор 13 в технических деталях."},
  {id:"TET-59",en:"Dante gave Cassius 5,000 gold that he redirected to the widows' charity for hired mercenaries. This charity is partially funded by the Guild. Dante created it fourteen years ago, before he became Auditor. He has never mentioned its existence to anyone at the Guild. The donation Cassius will make will be the charity's largest single receipt in four years. Dante knew this before he put the cheque in Cassius's pocket.",ru:"Данте дал Кассиусу 5000 золотых, которые тот перенаправил в благотворительный фонд для вдов наёмников. Этот фонд частично финансируется Гильдией. Данте создал его четырнадцать лет назад, до того как стал Аудитором. Он никогда не упоминал о его существовании никому в Гильдии. Пожертвование, которое сделает Кассиус, станет крупнейшим единовременным поступлением в фонд за четыре года. Данте знал это до того, как вложил чек в карман Кассиуса."},
  {id:"TET-60",en:"'Contracts are written in blood, but some are written in oil and rust and they are much harder to wash off.' Dante said this to himself in the carriage. He has said some version of this sentence at the end of every operation for twenty-one years. The formulation changes slightly each time. The first time he said it, it was: 'Contracts are written in blood. The blood is the easy part.' He was twenty-three. The operation he had just completed was the one in which the third Twins containment subject died. He has been refining the sentence for twenty-one years. He has not arrived at a version that satisfies him.",ru:"«Контракты пишутся кровью, но некоторые пишутся маслом и ржавчиной, и их гораздо труднее отмыть». Данте сказал это себе в карете. Он говорил какую-либо версию этого предложения в конце каждой операции двадцать один год. Формулировка каждый раз незначительно меняется. Первый раз он сказал это так: «Контракты пишутся кровью. Кровь — лёгкая часть». Ему было двадцать три. Операция, которую он только что завершил, была той, в которой умер третий субъект удержания Близнецов. Он совершенствует предложение двадцать один год. Он ещё не пришёл к версии, которая его удовлетворяет."}
];

const SCENES=[

/* ─── SCENE 1: IMAGE DEPRECIATION ─── */
{id:"s1",
 title:{en:"Image Depreciation",ru:"Амортизация Имиджа"},
 subtitle:{en:"The suit costs what a garrison costs. It earns back double.",ru:"Костюм стоит столько, сколько гарнизон. Отбивается вдвойне."},
 location:{en:"Guild HQ — Preparation Rooms",ru:"Штаб-Квартира Гильдии — Комнаты Подготовки"},
 timing:{en:"Morning Before the Auction",ru:"Утро Перед Аукционом"},
 flags:["intelligence","field_operation"],
 povData:{
   dante:{distortion:1,
     text:{
       en:`The suit is a capital expenditure against projected return. The math is straightforward: Cassius operates on status perception. He will not negotiate seriously with someone who appears to need a negotiation. The suit communicates: I have already won this; we are currently in the formality phase. The suit is cheaper than the time it saves.\n\nI told Mort to log it as 'Intimidation Investment.' He will log it as 'Operational Appearance Costs, Category B.' Mort is correct and I am being precise for different reasons.\n\nIsabella's kit concerns me slightly. The Paralysis Perfume is documented and she has signed the liability forms for its use in civilian environments. The Silence Lipstick has had three accidental deployments in the last year, all of which required administrative cleanup. The 'New Confections' are not on any approved list. I told her no experiments on guests. She interpreted this as: no experiments on guests without a plausible cover story. I did not correct the interpretation. It is occasionally operationally convenient to have a colleague whose ethical framework has a wider error tolerance than my own.\n\nI have not briefed her on the full scope of what we are recovering today. She knows: auction, intelligence target, mechanical artifact potentially connected to Sector 13 provenance. She does not know I designed this operation three days ago when Whisper's preliminary analysis identified the lot as a match for the resonance signature of the objects in the desk drawer. She does not know the suit was purchased six weeks ago, when I projected that this specific operation would occur within the current quarter.\n\nI do not inform operational partners of decision timelines that would prompt questions about how I make decisions. The questions are not answerable in ways that are useful.`,
       ru:`Костюм — это капитальные вложения против проецируемой отдачи. Математика прямолинейна: Кассиус работает на восприятии статуса. Он не будет серьёзно вести переговоры с тем, кто выглядит нуждающимся в переговорах. Костюм сообщает: я уже победил в этом; сейчас мы в формальной фазе. Костюм дешевле времени, которое он экономит.\n\nЯ сказал Морту записать это как «Инвестиции в запугивание». Он запишет как «Операционные Расходы на Внешний Вид, Категория Б». Морт прав, и я проявляю точность по иным причинам.\n\nКомплект Изабеллы меня несколько беспокоит. «Духи Паралича» задокументированы, и она подписала формы ответственности за их использование в гражданских средах. «Помада Молчания» имела три случайных применения за последний год, все из которых потребовали административной очистки. «Новые Конфеты» не числятся ни в одном утверждённом списке. Я сказал ей никаких экспериментов на гостях. Она интерпретировала это как: никаких экспериментов на гостях без правдоподобного прикрытия. Я не исправил интерпретацию. Иногда операционно удобно иметь коллегу, чья этическая рамка имеет более широкий допуск ошибки, чем моя.\n\nЯ не проинструктировал её о полном масштабе того, что мы сегодня получаем. Она знает: аукцион, разведывательная цель, механический артефакт, потенциально связанный с происхождением Сектора 13. Она не знает, что я разработал эту операцию три дня назад, когда предварительный анализ Шепота определил лот как совпадение с резонансной сигнатурой предметов в ящике стола. Она не знает, что костюм был куплен шесть недель назад, когда я предсказал, что эта конкретная операция произойдёт в текущем квартале.\n\nЯ не информирую оперативных партнёров о временных рамках решений, которые вызвали бы вопросы о том, как я принимаю решения. Вопросы не поддаются ответам, которые были бы полезными.`
     },
     knows:{en:["The suit was purchased six weeks ago — he projected this specific operation within the quarter","Whisper's resonance analysis matched Lot 13 to the desk drawer objects three days ago. The operation predates the intel by a timeline he has not disclosed.","Isabella's new compound is not on any approved list — he has not stopped her because wide ethical error tolerance is occasionally operationally convenient"],ru:["Костюм куплен шесть недель назад — он предсказал эту конкретную операцию в квартале","Резонансный анализ Шепота сопоставил Лот 13 с предметами из ящика стола три дня назад. Операция предшествует разведданным в рамках временных рамок, которые он не раскрыл","Новое соединение Изабеллы не числится ни в одном утверждённом списке — он не остановил её, потому что широкий допуск этической ошибки иногда операционно удобен"]},
     misunderstands:{en:["'I do not inform operational partners of decision timelines that would prompt questions about how I make decisions.' The questions are not unanswerable. He does not want to answer them. There is a difference.","He believes he is managing Isabella's 'wider error tolerance' as an operational resource. She is managing his narrower tolerance as an operational resource. They are using each other in symmetrical ways that neither has fully articulated."],ru:["«Я не информирую оперативных партнёров о временных рамках решений, которые вызвали бы вопросы о том, как я принимаю решения». Вопросы не безответны. Он не хочет на них отвечать. Это разница.","Он считает что управляет «более широким допуском ошибки» Изабеллы как операционным ресурсом. Она управляет его более узким допуском как операционным ресурсом. Они используют друг друга симметричными способами, ни один из которых не артикулировал полностью."]},
     hides:{en:["The suit was purchased six weeks ago — before the Tarot card arrived, before Lot 13 was placed in the auction, before the operation had a named target. He projected the operation from pattern data. He has not told Whisper this.","The charity he will redirect Cassius's money to — he created it fourteen years ago. He has never mentioned it at the Guild. He knew before the auction that the donation would be the charity's largest in four years.","He said 'the questions are not answerable in ways that are useful.' This is not true. He does not want to be asked how he makes decisions because the honest answer involves the earring doing things he does not fully understand."],ru:["Костюм куплен шесть недель назад — до прихода карты Таро, до размещения Лота 13 на аукционе, до того как у операции была названная цель. Он предсказал операцию из данных паттерна. Он не сообщил об этом Шепоту.","Благотворительный фонд, в который он перенаправит деньги Кассиуса — он создал его четырнадцать лет назад. Он никогда не упоминал о нём в Гильдии. Он знал до аукциона что пожертвование будет крупнейшим в фонде за четыре года.","Он сказал «вопросы не поддаются ответам, которые были бы полезными». Это неправда. Он не хочет чтобы его спрашивали, как он принимает решения, потому что честный ответ включает серьгу, делающую вещи, которых он не понимает полностью."]},
     whisper:{en:"He purchased the suit six weeks ago. Before the card. Before the lot was placed. He had already projected this operation from pattern data. He has not told Whisper.",ru:"Он купил костюм шесть недель назад. До карты. До размещения лота. Он уже предсказал эту операцию из данных паттерна. Он не сказал Шепоту."}
   },
   isabella:{distortion:3,
     text:{
       en:`The Silence Lipstick incident reports are overstated. Two of the three 'accidents' were deliberate and solved problems that would have taken the Master three days to resolve through standard channels. The third one was an accident. I have not clarified this to anyone because the administrative record showing all three as accidents is more useful than an accurate record showing two as intentional.\n\nI brought three named compounds and one unnamed one. The unnamed one is the interesting one. Six weeks of synthesis for a forty-second truth window combined with a natural-looking physical response. I need the truth window because I need to know what Cassius's ceiling is before the bidding starts, which means I need the compound to activate in the first twenty seconds of exposure, which means I need to deploy it before the bidding, which means I need a cover for being near his agent before the bidding starts.\n\nThe cover was: browsing the preview. I brushed past his agent during the preview walk-through. Forty seconds later, during the bidding, the sneezes came. His ceiling was 3,200. I passed the Master a note.\n\nHe bid 5,000 without hesitation. He read the note and went 5,000. He did not ask why I was passing him notes during active bidding. He did not ask what the compound was. He bid 5,000 and adjusted his cufflinks.\n\nI have worked for four Auditors. The first three asked questions. Dante asks questions when he does not already know the answer. When he does not ask, it means he already knows, or he has decided that knowing would cost him something he is not prepared to pay.\n\nI do not know which this is. It is usually one or the other.\n\nThe snakes thought the agent's stress-chemistry was interesting. I took a small sample. For science.`,
       ru:`Отчёты об инцидентах с «Помадой Молчания» преувеличены. Два из трёх «несчастных случаев» были намеренными и решили проблемы, которые Мастеру потребовалось бы три дня решать стандартными каналами. Третий был несчастным случаем. Я не прояснила это никому, потому что административная запись, показывающая все три как несчастные случаи, полезнее, чем точная, показывающая два как намеренные.\n\nЯ взяла три названных соединения и одно безымянное. Безымянное — интересное. Шесть недель синтеза для сорокасекундного окна правды в сочетании с естественно выглядящей физической реакцией. Мне нужно окно правды, потому что мне нужно знать потолок Кассиуса до начала торгов, что означает: соединение должно активироваться в первые двадцать секунд воздействия, значит нужно развернуть его до торгов, значит нужно прикрытие для нахождения рядом с его агентом до торгов.\n\nПрикрытием был осмотр лотов перед аукционом. Я прошла мимо его агента во время предаукционного осмотра. Сорок секунд спустя, во время торгов, пришли чихи. Его потолок был 3200. Я передала Мастеру записку.\n\nОн ставил 5000 без колебаний. Прочитал записку и поставил 5000. Он не спросил, почему я передаю ему записки во время активных торгов. Не спросил, что за соединение. Поставил 5000 и поправил запонки.\n\nЯ работала на четырёх Аудиторов. Первые три задавали вопросы. Данте задаёт вопросы, когда ещё не знает ответа. Когда не спрашивает — значит, уже знает, или решил что знание обойдётся ему в то, что он не готов платить.\n\nЯ не знаю, что это. Обычно одно или другое.\n\nЗмеи нашли стресс-химию агента интересной. Я взяла небольшой образец. Для науки.`
     },
     knows:{en:["Two of the three Silence Lipstick 'accidents' were deliberate — she has not corrected the administrative record because the inaccurate record is more useful","The unnamed compound produces a 40-second truth window with physical cover — she synthesized it specifically for this operation over six weeks","Dante did not ask what the compound was after reading her note. She has worked for four Auditors and knows what this silence means."],ru:["Два из трёх «несчастных случаев» с «Помадой Молчания» были намеренными — она не исправила административную запись, потому что неточная запись полезнее","Безымянное соединение производит 40-секундное окно правды с физическим прикрытием — она синтезировала его специально для этой операции за шесть недель","Данте не спросил что за соединение после прочтения её записки. Она работала на четырёх Аудиторов и знает, что означает эта тишина."]},
     misunderstands:{en:["She believes Dante either already knows or has decided knowing would cost him something. The third option: Dante trusts her operational judgment and has decided not to inspect its mechanisms — not from incuriosity, but from a deliberate choice to maintain a relationship that functions better without full mutual transparency."],ru:["Она считает, что Данте либо уже знает, либо решил что знание обойдётся ему в нечто. Третий вариант: Данте доверяет её операционному суждению и решил не инспектировать его механизмы — не из отсутствия любопытства, а из намеренного выбора поддерживать отношения, которые функционируют лучше без полной взаимной прозрачности."]},
     hides:{en:["The sample she took from Cassius's agent 'for science' will become the basis for a compound that produces a much longer truth window — up to six hours. She has not filed a research proposal for this. She does not plan to.","The snakes recognized something in the agent's stress-chemistry that Isabella has not yet identified. They have been agitated since the auction hall. She has attributed this to the general ambient toxin load of the venue.","She has been working on the unnamed compound for six weeks — which means she began work on it before Whisper identified Lot 13, and before Dante purchased the suit. She received her own version of a pre-operational signal. She has not told Dante what that signal was."],ru:["Образец, взятый у агента Кассиуса «для науки», станет основой для соединения с гораздо более длинным окном правды — до шести часов. Она не подавала исследовательское предложение для этого. И не планирует.","Змеи узнали что-то в стресс-химии агента, что Изабелла ещё не идентифицировала. Они были взволнованы с аукционного зала. Она приписала это общей токсической нагрузке окружающей среды площадки.","Она работала над безымянным соединением шесть недель — что означает, что она начала работу до того, как Шепот идентифицировал Лот 13, и до того, как Данте купил костюм. Она получила собственную версию доопрационного сигнала. Она не сказала Данте, что это был за сигнал."]},
     whisper:{en:"She began the compound six weeks ago. Before Whisper found the lot. She had her own signal. She hasn't told Dante.",ru:"Она начала работу над соединением шесть недель назад. До того как Шепот нашёл лот. У неё был свой сигнал. Она не сказала Данте."}
   }
 }
},

/* ─── SCENE 2: THE AUCTION / QUIET BIDDING ─── */
{id:"s2",
 title:{en:"The Sanctuary of Greed",ru:"Святилище Алчности"},
 subtitle:{en:"Silence, correctly deployed, is the most expensive bid.",ru:"Молчание, правильно применённое, — самая дорогая ставка."},
 location:{en:"The Auction House — Main Hall & Cassius's Box",ru:"Аукционный Дом — Главный Зал и Ложа Кассиуса"},
 timing:{en:"Afternoon",ru:"Полдень"},
 flags:["social_combat","intelligence","pivotal"],
 povData:{
   dante:{distortion:1,
     text:{
       en:`I observed the room for twenty-two minutes before Lot 13 was called. I identified eleven parties of operational interest, three probable intelligence assets belonging to competing information brokers, and one individual I recognized from a contract file that predates my Auditor appointment. I noted this last one and will follow up through Whisper's office.\n\nThe room's economy of attention was consistent with the class profile: everyone watching everyone else to calibrate desire. Nothing is interesting here until something interests the right person. This is the social equivalent of a market in a frontier town — value is created by observed interest, not by the thing itself.\n\nLot 13 landed flat. Rust and mechanics. No glow, no magic, no visible value. The room's energy dropped the way energy drops when something is not what people expected. I noted this as confirmation: the artifact's significance is not visible to standard assessment. It is only visible to instruments that are not standard.\n\nI bid 1,000 first. Not because I expected competition. Because I needed Cassius to see my voice before he could determine whether to compete. The goal was not to win quietly. The goal was to make Cassius make a decision in public.\n\nIsabella's note arrived during the competing bid. I read it, pocketed it, and bid 5,000. The note told me the ceiling. The ceiling told me: they value this at 3,200, which means the market value of what I am buying is between 3,200 and whatever my ceiling is. My ceiling was the operational budget for this retrieval. The operational budget had no ceiling.\n\nCassius folded. I walked to his box.\n\nHe knows about the Cult. He knows about the ship. He knows about Sector 13. He does not know what any of it means. He is the best possible source: he has the data without the context that would make him dangerous.\n\nThe conversation lasted seven minutes. I extracted three operational parameters: Cult name, payment mechanism (life years — incorrect, but a useful starting point), and the ship's origin (fog bank north of Sector 13). I gave him five thousand gold, directed to a fund whose return timing I already knew. The interaction was clean.\n\nThe suit performed as projected. Expense: justified.`,
       ru:`Я наблюдал за залом двадцать две минуты до объявления Лота 13. Я определил одиннадцать сторон оперативного интереса, трёх вероятных разведывательных агентов конкурирующих информационных брокеров и одного человека, которого я узнал из контрактного файла, предшествующего моему назначению Аудитором. Последнего я отметил и прослежу через офис Шепота.\n\nЭкономика внимания в зале соответствовала профилю класса: все наблюдают за всеми, чтобы откалибровать желание. Здесь ничто не интересно, пока что-то не заинтересует нужного человека. Это социальный эквивалент рынка в пограничном городе — ценность создаётся наблюдаемым интересом, не самой вещью.\n\nЛот 13 приземлился плоско. Ржавчина и механика. Никакого свечения, магии, видимой ценности. Энергия зала упала так, как она падает, когда что-то оказывается не тем, что люди ожидали. Я отметил это как подтверждение: значимость артефакта не видна стандартной оценке. Она видна только инструментам, которые не являются стандартными.\n\nЯ первым предложил 1000. Не потому что ожидал конкуренции. Потому что мне нужно было, чтобы Кассиус услышал мой голос до того, как он определит, конкурировать ли. Цель была не выиграть тихо. Цель была заставить Кассиуса принять решение публично.\n\nЗаписка Изабеллы пришла во время конкурирующей ставки. Я прочитал её, убрал в карман и сделал ставку 5000. Записка сообщала потолок. Потолок сказал мне: они оценивают это в 3200, что означает: рыночная стоимость того, что я покупаю, находится между 3200 и каков бы ни был мой потолок. Мой потолок был операционный бюджет на это получение. У операционного бюджета не было потолка.\n\nКассиус сдался. Я пошёл в его ложу.\n\nОн знает о Культе. Знает о корабле. Знает о Секторе 13. Он не знает, что всё это означает. Он наилучший возможный источник: у него есть данные без контекста, который сделал бы его опасным.\n\nРазговор длился семь минут. Я извлёк три операционных параметра: название Культа, механизм оплаты (годы жизни — неверно, но полезная отправная точка) и происхождение корабля (туманная полоса к северу от Сектора 13). Я дал ему пять тысяч золотых, направленных в фонд, сроки возврата которого я уже знал. Взаимодействие было чистым.\n\nКостюм сработал в соответствии с прогнозом. Расходы: обоснованы.`
     },
     knows:{en:["Isabella's note gave him the ceiling (3,200) — his 5,000 bid was not intuition, it was informed by her unnamed compound's output","Cassius's 'years of life' payment description is incorrect — useful as a starting data point","He identified someone from a pre-Auditor contract file in the room — he has not told anyone about this contact"],ru:["Записка Изабеллы дала ему потолок (3200) — его ставка в 5000 была не интуицией, а результатом вывода её безымянного соединения","Описание Кассиуса об «годах жизни» как оплате неверно — полезно как отправная точка данных","Он определил в зале человека из контрактного файла до-Аудиторского периода — он не сообщил никому об этом контакте"]},
     misunderstands:{en:["He logs the payment mechanism as 'incorrect but a useful starting point.' The Cult's actual payment mechanism — specific memories, specifically the ones the donor most values — is a starting point he will find more operationally alarming than 'life years.'","'He has the data without the context that would make him dangerous.' This framing is operationally convenient. What it misses: Cassius also has the data that would make him useful to the entity, which is why the entity arranged for the lot to pass through Cassius's hands."],ru:["Он регистрирует механизм оплаты как «неверный, но полезная отправная точка». Реальный механизм оплаты Культа — конкретные воспоминания, именно те, которые даритель больше всего ценит — окажется операционно более тревожным, чем «годы жизни».","«У него есть данные без контекста, который сделал бы его опасным». Эта формулировка операционно удобна. Что она упускает: у Кассиуса также есть данные, которые сделали бы его полезным для сущности, именно поэтому сущность организовала прохождение лота через руки Кассиуса."]},
     hides:{en:["The pre-Auditor contact he spotted — he made a note and will 'follow up through Whisper's office.' He will not. He will follow up himself, through the channel he has used for nine years that Whisper does not know about.","He knew the donation timing before the auction. He has maintained this charity for fourteen years. He has never mentioned it. The five thousand he gave Cassius was the second time he has given Cassius money — the first was eleven years ago, for a different reason, and Cassius does not remember it because the Cult took that memory eight months ago."],ru:["Доопрационный контакт, которого он заметил — он сделал пометку и «прослежу через офис Шепота». Он не сделает этого. Он проследит самостоятельно через канал, которым пользуется девять лет и о котором Шепот не знает.","Он знал сроки пожертвования до аукциона. Он ведёт этот фонд четырнадцать лет. Никогда о нём не упоминал. Пять тысяч, которые он дал Кассиусу, — это второй раз когда он даёт Кассиусу деньги: первый был одиннадцать лет назад, по другой причине, и Кассиус не помнит этого, потому что Культ забрал это воспоминание восемь месяцев назад."]},
     whisper:{en:"He gave Cassius money eleven years ago. Cassius doesn't remember. The Cult took that memory eight months ago. Dante knows which memory was taken.",ru:"Он давал Кассиусу деньги одиннадцать лет назад. Кассиус не помнит. Культ взял это воспоминание восемь месяцев назад. Данте знает, какое воспоминание было взято."}
   },
   cassius:{distortion:6,
     text:{
       en:`Three days ago I put Lot 13 in the catalogue and immediately wanted to take it back out. I know what the Lamplighter sends me and I know what I'm not supposed to open and I know I always open it and I know this time I really should not have.\n\nThe ship's log. I recognized the vessel. The Amaranth, out of the northern anchorage. Disappeared eighteen months ago. I was paid — very well paid — to file a missing vessel report with the harbour authority and then lose the copy. Paid by a client whose courier wore grey and had the kind of eyes that make you think about the cost of asking follow-up questions.\n\nSo there's a log from a ship I was paid to make disappear, and it was found in a fog bank north of the place no one talks about, and the Lamplighter sent it to me personally, and the lead pages smell wrong — like the inside of a place where the ordinary rules stop applying — and I should have sent it back immediately and instead I put it in the auction because if someone else buys it then it's not my problem anymore.\n\nThen Dante of the Black Ledger walked in.\n\nI watched him from my box. I know what the Guild crest means. I know what calm means in a room full of people watching each other for weakness. The doorman tried to move him to the front. He declined. He wanted to watch the room. He was measuring things I wasn't measuring.\n\nHe bid on the lot. Of course he bid on the lot. Of course.\n\nWhen he walked into my box my security tried to stop him and failed and then I had to pretend this was social and not me quietly preparing to need new trousers.\n\nHe took my source, my secret, and my five thousand gold and redirected it to a charity. Like it was nothing. Like I had just donated to something voluntarily.\n\nThe worst part is that I'm relieved. Someone else knows about the ship. Someone competent. Someone whose job it is to deal with the things that make you need new trousers. I gave him what he wanted and now the log is someone else's problem and I'm going to have a very large glass of something and think very carefully about a quieter profession.\n\nAnd I am not — I am absolutely not — going to think about why I can't quite remember the face of the client who paid me about the Amaranth. I used to know. I remember paying my bills with it. I don't remember the face. This is fine.`,
       ru:`Три дня назад я внёс Лот 13 в каталог и сразу захотел его убрать. Я знаю, что присылает Фонарщик, и знаю, что мне не следует открывать, и знаю что всегда открываю, и знаю что на этот раз действительно не должен был.\n\nСудовой журнал. Я узнал судно. «Амарант» из северной стоянки. Исчез восемнадцать месяцев назад. Мне заплатили — очень хорошо заплатили — чтобы подать заявление о пропавшем судне в портовую администрацию, а потом потерять копию. Заплатил клиент, чей курьер был одет в серое и имел глаза, которые заставляют задуматься о цене уточняющих вопросов.\n\nИтак, есть журнал с корабля, за исчезновение которого мне заплатили, он был найден в туманной полосе к северу от места, о котором никто не говорит, Фонарщик прислал его мне лично, свинцовые страницы пахнут неправильно — как изнутри места, где обычные правила перестают применяться — и я должен был немедленно его вернуть, а вместо этого выставил на аукцион, потому что если кто-то другой купит его, то это больше не моя проблема.\n\nПотом вошёл Данте из Чёрного Гроссбуха.\n\nЯ наблюдал за ним из своей ложи. Я знаю что означает герб Гильдии. Я знаю что означает спокойствие в комнате, полной людей, наблюдающих друг за другом в поисках слабости. Швейцар попытался пропустить его без очереди. Он отказался. Он хотел наблюдать за залом. Он измерял вещи, которые я не измерял.\n\nОн ставил на лот. Конечно он ставил на лот. Конечно.\n\nКогда он вошёл в мою ложу моя охрана попыталась его остановить и потерпела неудачу, и тогда мне пришлось притворяться что это светское мероприятие, а не я тихо готовлюсь к необходимости в новых брюках.\n\nОн взял мой источник, мой секрет и мои пять тысяч золотых и перенаправил это в благотворительный фонд. Как будто ничего. Как будто я просто добровольно что-то пожертвовал.\n\nХуже всего что я чувствую облегчение. Кто-то другой теперь знает о корабле. Кто-то компетентный. Кто-то, чья работа — разбираться с вещами, от которых нужны новые брюки. Я дал ему что он хотел и теперь журнал — чужая проблема, и я выпью очень большой бокал чего-нибудь и очень тщательно подумаю о более спокойной профессии.\n\nИ я не буду — я абсолютно не буду — думать о том, почему я не могу вспомнить лицо клиента, который заплатил мне по делу «Амаранта». Раньше я знал. Я помню что оплатил этим счета. Я не помню лицо. Это нормально.`
     },
     knows:{en:["The Amaranth disappeared in the fog bank north of Sector 13 — he recognized the log immediately","The Lamplighter sent the lot personally to him, with instructions not to examine it — which he ignored","He cannot remember the face of the client who paid him about the Amaranth. He notices this gap. He is choosing not to examine it."],ru:["«Амарант» исчез в туманной полосе к северу от Сектора 13 — он немедленно узнал журнал","Фонарщик прислал лот лично ему с инструкцией не проверять — которую он проигнорировал","Он не может вспомнить лицо клиента, заплатившего ему по делу «Амаранта». Он замечает этот пробел. Он выбирает не исследовать его."]},
     misunderstands:{en:["'I don't remember the face. This is fine.' It is not fine. The Cult took that memory eight months ago. The fact that he paid his bills with the money and remembers the money but not the client is the characteristic signature of the Cult's transaction — what is taken is the memory that gives the retained data its context.","He believes giving Dante everything makes the log someone else's problem. The Cult specifically wanted Dante to have the log. Cassius has completed his role in the arrangement without knowing he had one."],ru:["«Я не помню лицо. Это нормально». Это не нормально. Культ взял это воспоминание восемь месяцев назад. То, что он оплатил счета деньгами и помнит деньги, но не клиента — характерная сигнатура транзакции Культа: берётся воспоминание, дающее сохранённым данным их контекст.","Он считает что, давая Данте всё, делает журнал чужой проблемой. Культ специально хотел чтобы у Данте был журнал. Кассиус завершил свою роль в договорённости, не зная что она у него была."]},
     hides:{en:["He noticed he can't remember the client's face and is choosing not to examine this. He is telling himself 'this is fine.' He has had this conversation with himself about six other memories over the past eight months. He has not connected them.","He is genuinely relieved that Dante took the log. The relief is strong enough that it has overridden his professional instinct to maintain leverage. This is not normal for him. He is not examining why."],ru:["Он заметил что не может вспомнить лицо клиента и выбирает не исследовать это. Он говорит себе «это нормально». Он вёл этот разговор с собой о шести других воспоминаниях за последние восемь месяцев. Он не установил между ними связь.","Он искренне облегчён что Данте взял журнал. Облегчение достаточно сильное чтобы перекрыть его профессиональный инстинкт сохранять рычаги. Это ненормально для него. Он не исследует почему."]},
     whisper:{en:"He can't remember the face. He keeps telling himself this is fine. He has said this about six memories in eight months. He hasn't connected them.",ru:"Он не может вспомнить лицо. Он продолжает говорить себе что всё нормально. Он говорил это о шести воспоминаниях за восемь месяцев. Он не установил между ними связь."}
   }
 }
},

/* ─── SCENE 3: THE CARRIAGE — LOG AND COURSE ─── */
{id:"s3",
 title:{en:"Course for the Fog",ru:"Курс на Туман"},
 subtitle:{en:"Oil. Rust. Harder to wash.",ru:"Масло. Ржавчина. Труднее отмыть."},
 location:{en:"Carriage, Night Road from the Auction House",ru:"Карета, Ночная Дорога от Аукционного Дома"},
 timing:{en:"Evening, After the Auction",ru:"Вечер, После Аукциона"},
 flags:["revelation","intelligence","foreshadowing"],
 povData:{
   dante:{distortion:2,
     text:{
       en:`The box was not locked. This is the first relevant data point. A container rated for Void-radiation transport that is not locked, in an auction house, for six days — is either extraordinarily careless or extraordinarily confident. The Cult is not careless.\n\nThe log is written in standard naval notation on lead pages approximately four millimeters thick. The lead is not commercially available alloy. The isotopic signature is consistent with the refined lead extracted from the region of the Sundering — the zone of maximum Void-contact from the founding catastrophe. Someone smelted and processed Sundering-site lead to make these pages. The cost in materials and expertise is consistent with a centuries-old operation with significant resource access.\n\nThe coordinates are precise and correctly formatted for the current nautical charts — which means someone updated them. The original log entries use a date notation from approximately three hundred years ago. The coordinates are current. Someone has been maintaining these charts for three centuries and left their correction in a lead-page log from a ship that materialized in our waters eight days ago from a route that should not be navigable.\n\nThe final entry on the last page. 'The fog has faces. They are all mine.' The captain's name.\n\nI have seen that name before. Not in active files. In the foundation documents of the Pale Echelon protocol — the scenario briefing I was given in my first month as Auditor, for a situation that had not yet occurred. The scenario briefing named a location. The location was Sector 13. The founding document was signed by my predecessor in this role.\n\nThe predecessor I was told died in the field. The predecessor whose operational files were classified above my clearance in the month I was appointed, then reclassified to my level three weeks later, then classified above my clearance again, in a cycle that I noted but did not pursue because the cycling was itself information.\n\nContracts are written in blood. But some are written in oil and rust and they are much harder to wash off.\n\nI give Pale Echelon to Silas. I give Isabella the preparation order. I look out at the night city.\n\nI have been holding this file for twenty-one years without knowing what it was.\n\nThe game did not begin with the Tarot card. The game began before I was the Auditor. The hourglass has been running since before I reached for it.`,
       ru:`Ящик не был заперт. Это первая релевантная точка данных. Контейнер, рассчитанный на транспортировку Пустотного излучения, незаперт, в аукционном доме, шесть дней — это либо исключительная небрежность, либо исключительная уверенность. Культ не небрежен.\n\nЖурнал написан стандартной морской нотацией на свинцовых страницах толщиной приблизительно четыре миллиметра. Свинец не является коммерчески доступным сплавом. Изотопная сигнатура соответствует рафинированному свинцу, добытому в зоне Раскола — зоне максимального контакта с Пустотой от основополагающей катастрофы. Кто-то выплавил и обработал свинец с места Раскола для изготовления этих страниц. Стоимость в материалах и экспертизе соответствует многовековой операции со значительным доступом к ресурсам.\n\nКоординаты точны и правильно отформатированы для текущих навигационных карт — что означает, что кто-то обновил их. Оригинальные записи журнала используют датировочную нотацию приблизительно трёхсотлетней давности. Координаты актуальны. Кто-то поддерживал эти карты три столетия и оставил свою коррекцию в свинцовостраничном журнале с корабля, материализовавшегося в наших водах восемь дней назад маршрутом, который не должен быть судоходным.\n\nПоследняя запись на последней странице. «У тумана есть лица. Все они — мои». Имя капитана.\n\nЯ видел это имя раньше. Не в активных файлах. В основополагающих документах протокола Бледного Эшелона — брифинге по сценарию, который мне дали в первый месяц работы Аудитором, для ситуации, которая ещё не наступила. Брифинг по сценарию называл место. Место — Сектор 13. Основополагающий документ подписан моим предшественником в этой роли.\n\nПредшественником, о котором мне сказали, что он погиб в поле. Чьи операционные файлы были засекречены выше моего допуска в месяц моего назначения, затем переклассифицированы до моего уровня три недели спустя, затем засекречены снова выше моего допуска, в цикле, который я отметил, но не стал прорабатывать, потому что само по себе цикличество было информацией.\n\nКонтракты пишутся кровью. Но некоторые пишутся маслом и ржавчиной, и их гораздо труднее отмыть.\n\nЯ передаю Бледный Эшелон Силасу. Передаю Изабелле приказ на подготовку. Смотрю в ночной город.\n\nЯ держал этот файл двадцать один год, не зная, что это было.\n\nИгра не началась с картой Таро. Игра началась до того, как я стал Аудитором. Песочные часы работают с тех пор, как я потянулся к ним.`
     },
     knows:{en:["The lead pages are refined from Sundering-site material — centuries-old operation with significant resource access","The log coordinates are current, updated from 300-year-old notation — someone has maintained nautical charts for three centuries","The captain's name matches the signature on the Pale Echelon founding document — signed by his predecessor"],ru:["Свинцовые страницы рафинированы из материала места Раскола — многовековая операция со значительным доступом к ресурсам","Координаты журнала актуальны, обновлены с 300-летней нотации — кто-то поддерживал навигационные карты три столетия","Имя капитана совпадает с подписью на основополагающем документе Бледного Эшелона — подписанном его предшественником"]},
     misunderstands:{en:["'The game began before I was the Auditor.' This is correct. He still believes he can identify when it began. He cannot. The hourglass was built before there was an Auditor to reach for it.","He reads the box being unlocked as 'extraordinary confidence.' It is confidence — but also an invitation. The log was not Void-radiation shielded because there was no Void radiation to shield. The real coordinates are written in a script that requires Void-Blossom tea to read. The box was left unlocked because the lock is not the box."],ru:["«Игра началась до того, как я стал Аудитором». Это верно. Он всё ещё считает что может определить когда она началась. Он не может. Песочные часы были построены до того, как появился Аудитор, чтобы потянуться к ним.","Он читает незапертый ящик как «исключительная уверенность». Это уверенность — но также приглашение. Журнал не был экранирован от Пустотного излучения, потому что не было излучения для экранирования. Реальные координаты написаны шрифтом, требующим чай из Пустоцвета для чтения. Ящик был оставлен незапертым, потому что замок — не сам ящик."]},
     hides:{en:["His predecessor's operational files — the cycling clearance levels. He noted this and did not pursue it 'because the cycling was itself information.' He has been managing this as background data for twenty-one years. He is not going to say what information the cycling contained, even in his internal narration.","'The game did not begin with the Tarot card.' He said this. He has extended his timeline estimate backward but has not extended it to its actual origin. He will not, yet. There is a file he needs to read first.","The sentence 'I have been holding this file for twenty-one years without knowing what it was' — he knows now. He has known for approximately eleven minutes. He has not said what he knows it is."],ru:["Операционные файлы предшественника — цикличные уровни допуска. Он отметил это и не стал прорабатывать «потому что само по себе цикличество было информацией». Он управлял этим как фоновыми данными двадцать один год. Он не собирается говорить какую информацию содержало цикличество, даже во внутреннем нарративе.","«Игра не началась с карты Таро». Он сказал это. Он расширил свою оценку временных рамок назад, но не до реального происхождения. Ещё не сделает этого. Сначала нужно прочитать один файл.","Предложение «Я держал этот файл двадцать один год, не зная, что это было» — теперь он знает. Он знает приблизительно одиннадцать минут. Он не сказал, что именно он знает."]},
     whisper:{en:"He has known for eleven minutes. He has not said what he knows. He said 'the game began before I was the Auditor.' He knows who began it.",ru:"Он знает одиннадцать минут. Он не сказал что именно. Он сказал «игра началась до того как я стал Аудитором». Он знает кто её начал."}
   }
 }
}

];

/* ═══ ENGINE ═══ */
const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');const secs=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}];c.innerHTML=secs.map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
