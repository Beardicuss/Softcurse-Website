const TIMELINE=[
  {id:"TET-198",en:"Lucius — the unnamed Inquisition operative in white who visited Valeria's salon — is not a member of the Order of Purity, Ignatius's former organization. The Order of Purity is in institutional disarray following Ignatius's death and the martyrdom narrative's canonization. Lucius operates from a separate Inquisition branch: the Order of the Silent Archive, which predates the Order of Purity by approximately two hundred years and specializes in acoustic intelligence collection. The Order of the Silent Archive maintains phonographic archives of every significant magical and mechanical event that has occurred in the known world for the past four centuries. They identified the composite leg's acoustic signature because they had the Island's sluice-gate resonance in their archive. The question Lucius asked Valeria — whether the frequency of the leg's squeak matches the Island's archive records — was not a guess. It was a confirmation request. He already knew the answer.",ru:"Люций — безымянный оперативник Инквизиции в белом посетивший салон Валерии — не является членом Ордена Чистоты, бывшей организации Игнациуса. Орден Чистоты находится в институциональном расстройстве после смерти Игнациуса и канонизации нарратива о мученичестве. Люций работает из отдельного отделения Инквизиции: Ордена Тихого Архива, предшествующего Ордену Чистоты приблизительно на двести лет и специализирующегося на сборе акустической разведки. Орден Тихого Архива поддерживает фонографические архивы каждого значительного магического и механического события происходившего в известном мире за последние четыре столетия. Они определили акустическую сигнатуру ноги с композитом, потому что в их архиве был резонанс шлюзового затвора Острова. Вопрос который Люций задал Валерии — совпадает ли частота скрипа ноги с архивными записями Острова — не был предположением. Это был запрос подтверждения. Он уже знал ответ."},
  {id:"TET-199",en:"The rusty gear Lucius left on Valeria's side table is a fragment from the Island of Silence's sluice-gate mechanism — specifically, from the same system that the Order of the Silent Archive has phonographic records of. It is not a threat or a calling card in the conventional sense. It is a demonstration of provenance: the gear confirms that the Order has material evidence connecting the composite leg's acoustic signature to the Island, and that this evidence predates Dante's return. He left it because he wanted Dante to understand that the Order is not working from inference. They are working from a complete acoustic record. The gear is a receipt.",ru:"Ржавая шестерёнка которую Люций оставил на столике Валерии — фрагмент механизма шлюзового затвора Острова Тишины: конкретно, из той же системы на которую у Ордена Тихого Архива есть фонографические записи. Это не угроза и не визитная карточка в обычном смысле. Это демонстрация происхождения: шестерёнка подтверждает что у Ордена есть вещественные доказательства связывающие акустическую сигнатуру ноги с композитом с Островом, и что эти доказательства предшествуют возвращению Данте. Он оставил её, потому что хотел чтобы Данте понял что Орден работает не из умозаключения. Они работают из полной акустической записи. Шестерёнка — квитанция."},
  {id:"TET-200",en:"Dante's order to Lisa — 'place Lisa at Valeria's side not as a guard but as a jailer; if the Inquisition moves to extract the asset, Lisa must liquidate the Countess before she can talk' — is the first time in twenty-five chapters that Dante has issued a preemptive kill order on a person who is currently inside his perimeter and who has not threatened him. Valeria is an asset. He has ordered her preemptive liquidation in the event that she becomes a liability. He said this immediately after giving her a dose of the life-extension compound. He signed the eastern wing deed while she was still in the room. He has not examined the specific quality of the arrangement: he gave her life, he will take her life if required, and both actions are recorded in the same evening's operational log.",ru:"Приказ Данте Лисе — «посади Лису рядом с Валерией не как охрану, а как тюремщика; если Инквизиция решит изъять актив — Лиса должна ликвидировать Графиню до того как она заговорит» — первый раз за двадцать пять глав когда Данте отдал превентивный приказ об уничтожении человека находящегося сейчас внутри его периметра и не угрожавшего ему. Валерия — актив. Он приказал её превентивную ликвидацию в случае если она станет обязательством. Он сказал это немедленно после того как дал ей дозу соединения продления жизни. Он подписал дарственную на восточное крыло пока она ещё была в комнате. Он не исследовал специфическое качество договорённости: он дал ей жизнь, он возьмёт её жизнь если потребуется, и оба действия записаны в операционном журнале одного вечера."},
  {id:"TET-201",en:"Valeria's compound — the Tear of Oblivion formula that Dante has been providing her — has a specific relationship with the Structural Gel that neither Dante nor Valeria knows about. The Tear of Oblivion is a pre-Precursor compound based on a partial reconstruction of a Covenant-adjacent maintenance protocol that the original Covenant established for long-term human participants in the Covenant maintenance program. The compound was designed to keep Covenant-adjacent biological systems stable over long periods. Valeria is not simply being kept young by an alchemical cocktail. She is being maintained on a partial fragment of the same maintenance protocol that governs Dante's composite integration. The three months before the incomplete effect becomes visible is not a countdown to compound failure. It is a countdown to partial-protocol incompatibility — her biological system is beginning to conflict with the compound's Covenant-specific targeting because she does not have the composite integration that the full protocol assumes.",ru:"Соединение Валерии — формула Слезы Забвения которую Данте ей обеспечивает — имеет специфическую связь со Структурным Гелем о которой не знает ни Данте ни Валерия. Слеза Забвения — это до-предтечевое соединение основанное на частичной реконструкции протокола обслуживания смежного с Заветом который исходный Завет установил для долгосрочных человеческих участников программы обслуживания Завета. Соединение было разработано для поддержания стабильности биологических систем смежных с Заветом на протяжении длительных периодов. Валерию не просто делает молодой алхимический коктейль. Она поддерживается на частичном фрагменте того же протокола обслуживания который управляет интеграцией композита Данте. Три месяца до того как неполный эффект становится видимым — это не обратный отсчёт до отказа соединения. Это обратный отсчёт до несовместимости частичного протокола."},
  {id:"TET-202",en:"Thomas Wren's network — the thirty-two Guild debtors in the lower city district — is the most operationally significant intelligence asset Dante has built in twenty-five chapters, and the cheapest. The total debt value of all thirty-two individuals is approximately fourteen hundred gold, accumulated over eighteen months of medical payments, protection agreements, and loan forgiveness. The surveillance network this debt represents covers the three square kilometers of lower city that surround the Guild residence's eastern and southern approaches. Dante cannot be approached from these directions without Thomas hearing about it from at least three separate sources. The network's value as an early-warning system is worth approximately sixty thousand gold at market rates for comparable intelligence coverage. He has purchased sixty thousand gold of early-warning capability for fourteen hundred gold of managed debt.",ru:"Сеть Томаса Рена — тридцать два должника Гильдии в квартале нижнего города — наиболее операционно значимый разведывательный актив построенный Данте за двадцать пять глав, и самый дешёвый. Общая стоимость долга всех тридцати двух человек составляет приблизительно четырнадцать сотен золотых, накопленных за восемнадцать месяцев медицинских платежей, соглашений о защите и прощения кредитов. Сеть наблюдения которую представляет этот долг охватывает три квадратных километра нижнего города окружающих восточные и южные подходы к резиденции Гильдии. К Данте нельзя приблизиться с этих направлений без того чтобы Томас не узнал об этом из как минимум трёх отдельных источников. Ценность сети как системы раннего предупреждения составляет приблизительно шестьдесят тысяч золотых по рыночным ценам за сопоставимое разведывательное покрытие. Он купил шестьдесят тысяч золотых возможностей раннего предупреждения за четырнадцать сотен золотых управляемого долга."},
  {id:"TET-203",en:"Dante's decision to pay for Peter's mother's medical treatment — the apprentice who sold information to the Scarlet Fist — is not generosity. It is a specific application of the same mechanism he used with the equity certificates, the White Fang deal, and the Valeria compound: he is creating a debt that operates through gratitude rather than obligation. Peter sold information once because he needed money and had no alternative framework. Dante is providing an alternative framework: the Guild pays for loyalty and produces visible benefit. Peter will return, as Dante predicted. When he returns, he will be motivated by gratitude and guilt simultaneously — the most stable motivational structure for an agent, because it does not depend on the continued provision of payment and does not depend on fear. It depends on the agent's own sense of obligation, which he generates internally.",ru:"Решение Данте оплатить лечение матери Питера — подмастерья продавшего информацию «Алому Кулаку» — не является щедростью. Это конкретное применение того же механизма которому он использовал с акционерными сертификатами, сделкой с Белым Клыком и соединением Валерии: он создаёт долг действующий через благодарность а не обязательство. Питер продал информацию однажды потому что нуждался в деньгах и не имел альтернативной рамки. Данте предоставляет альтернативную рамку: Гильдия платит за лояльность и производит видимую выгоду. Питер вернётся как предсказал Данте. Когда вернётся, он будет мотивирован одновременно благодарностью и виной — наиболее стабильная мотивационная структура для агента, потому что не зависит от продолжения предоставления платежей и не зависит от страха. Она зависит от собственного чувства обязательства агента которое он генерирует внутренне."},
  {id:"TET-204",en:"Thomas Wren recognized something in this chapter that no other character in twenty-five chapters has named directly: 'You gave us bread when Vane gave only taxes. We remember.' This is the first time an ordinary person without institutional position has described the difference between the Guild and the Golden Circle in functional terms rather than power terms. Every other character who has compared the two institutions has compared them in terms of capability, threat, or leverage. Thomas compared them in terms of what they provide to people who have no leverage. He is describing the difference between an institution built on dependency and an institution built on constituency. Dante has been building a constituency. Thomas is the first person to name it as such.",ru:"Томас Рен распознал кое-что в этой главе что ни один другой персонаж за двадцать пять глав не назвал напрямую: «Вы давали нам хлеб когда Вейн давал только налоги. Мы помним». Это первый раз когда обычный человек без институциональной позиции описал разницу между Гильдией и Золотым Кругом в функциональных а не силовых терминах. Каждый другой персонаж сравнивавший два института сравнивал их с точки зрения возможности, угрозы или рычага. Томас сравнил их с точки зрения того что они предоставляют людям у которых нет рычага. Он описывает разницу между институцией построенной на зависимости и институцией построенной на электоральной базе. Данте строил электоральную базу. Томас первый человек назвавший её таковой."},
  {id:"TET-205",en:"'Loyalty costs more than flour but keeps longer.' — Dante said this as the chapter's operational summary to Thomas. It is his most concise statement of the institutional theory he has been building since Chapter 1. The flour metaphor is deliberate and addressed to the correct audience: Thomas understands commodities, production costs, and shelf-life. The sentence translates his entire operational framework into a language Thomas can use. It is also the sentence he has been approaching through twenty-five chapters of possessive vocabulary, equity certificates, baker's protection, and baker's apprentice's mother's treatment. He has not said this sentence before. He has been demonstrating it. Now he has also said it. The demonstration and the statement now exist simultaneously, and Thomas has both."}
];

const SCENES=[
{id:"s1",
 title:{en:"Inventory of Puppets",ru:"Инвентаризация Марионеток"},
 subtitle:{en:"Lucius does not guess. Lucius confirms. The gear is a receipt.",ru:"Люций не гадает. Люций подтверждает. Шестерёнка — квитанция."},
 location:{en:"Valeria's Salon — Upper City",ru:"Салон Валерии — Верхний Город"},
 timing:{en:"Evening, Day After Arrival",ru:"Вечер, День После Прибытия"},
 flags:["pivotal","new_threat","social_combat","cost"],
 povData:{
   dante:{distortion:4,
     text:{
       en:`Valeria's salon is a political instrument designed to read as social space. The acoustic architecture — high ceilings, hard marble floors, minimal drapery — is calibrated for maximum conversation carry. Every whispered exchange in this room can be heard from six different positions if you know where to stand. The hostess knows where to stand. Her guests do not know she knows.\n\nThe guest list tonight was a coherent threat-and-asset map: seventeen people whose institutional affiliations I could read from collar insignia, hand placement, and body-distance management. The Minister of Trade was avoiding eye contact — his posture read as someone managing a debt he cannot currently service. General Arkus was standing inside a proximity threshold with Bishop Claudius that indicated a developing private compact. The Bishop himself was too calm for the political situation, which read as someone who has already secured their position against the variables other people are still managing.\n\nI filed all of this in the appropriate registers and crossed the room toward the one person who was not performing normalcy.\n\nValeria at critical entropy is visually distinctive to anyone who knows what the compound does at its margins. The grey vascular network through the neck powder. The stillness of the hands. The specific temperature drop she produces when her entropic state exceeds the compound's suppression capacity. The guests maintaining a two-meter clearance were not being polite. They were following an instinct they could not name.\n\nShe gave me the intelligence while holding my hand hard enough to fracture the metacarpals of a normal hand. The composite's structural signal registered the grip force without transmitting pain — the bio-interface absorbs mechanical stress that would damage the biological tissue but does not relay the stress as sensation. I noted this as a new capability I had not tested before.\n\nLucius.\n\nHe asked about the acoustic frequency of the leg's squeak matching the Island's archive records.\n\nI processed this information for approximately four seconds while Valeria continued describing him. In four seconds I assessed: he is not Ignatius's organization, which is in disarray. He is from something older and more focused. He asked not whether I had been to the Island — he asked whether the frequency match confirmed his archive data. He already had archive data. He was asking whether Valeria's in-person observation confirmed it.\n\nThis is the behavior of an institution that has been tracking the Island of Silence's acoustic signature for at least as long as they have had phonographic recording capability, waiting for a corresponding signature to appear in the capital.\n\nThey were waiting for me.\n\nNot me specifically. They were waiting for whoever arrived with the Island's signature. I arrived with it.\n\nThe gear: a sluice mechanism fragment. Cold, heavy, aged. The specific corrosion pattern on the gear indicates salt-water submersion for an extended period before being retrieved. It came from the Island's underwater sections — which means it was recovered after the Island sank. Someone was at the Island site after I left.\n\nI gave Valeria the compound. She signed the eastern wing deed without reading it. The compound erases the pain-memory and with it the urgency — she signed in the social frame rather than the survival frame, which produces cleaner signatures on legal documents.\n\nIn the corridor I ordered Lisa to Valeria's side as a jailer, not a guard.\n\nThis is the correct operational decision.\n\nI have not examined what it means that I issued a preemptive liquidation order for a person who was, twenty minutes ago, in my direct care.`,
       ru:`Салон Валерии — политический инструмент разработанный чтобы читаться как социальное пространство. Акустическая архитектура — высокие потолки, твёрдые мраморные полы, минимальные драпировки — откалибрована для максимальной дальности переноса разговора. Каждый шёпот в этой комнате слышен из шести разных позиций если знаешь где стоять. Хозяйка знает где стоять. Её гости не знают что она знает.\n\nСписок гостей сегодня вечером был связной картой угроз и активов: семнадцать человек чьи институциональные принадлежности я мог читать по знакам отличия воротников, расположению рук и управлению дистанцией тела. Министр торговли избегал взгляда — его осанка читалась как кто-то управляющий долгом который не может обслуживать в данный момент. Генерал Аркус стоял внутри порогового расстояния с епископом Клавдием указывающего на развивающийся частный пакт. Сам епископ был слишком спокоен для политической ситуации, что читалось как кто-то уже обеспечивший свою позицию против переменных которыми ещё управляют другие люди.\n\nЯ занёс всё это в соответствующие регистры и пересёк комнату к единственному человеку не исполняющему нормальность.\n\nВалерия в критической энтропии визуально отличима для любого кто знает что делает соединение на своих пределах. Серая сосудистая сетка через шейную пудру. Неподвижность рук. Специфическое падение температуры которое она производит когда её энтропийное состояние превышает подавляющую способность соединения. Гости поддерживающие двухметровый зазор не были вежливы. Они следовали инстинкту который не могли назвать.\n\nОна дала мне разведку держа мою руку достаточно сильно чтобы сломать пястные кости нормальной руки. Структурный сигнал композита зарегистрировал силу хвата без передачи боли — биоинтерфейс поглощает механическое напряжение которое повредило бы биологическую ткань но не передаёт напряжение как ощущение. Я отметил это как новую возможность которую прежде не тестировал.\n\nЛюций.\n\nОн спросил о совпадении акустической частоты скрипа ноги с архивными записями Острова.\n\nЯ обрабатывал эту информацию приблизительно четыре секунды пока Валерия продолжала его описывать. За четыре секунды я оценил: он не из организации Игнациуса которая в расстройстве. Он из чего-то более старого и сосредоточенного. Он спросил не был ли я на Острове — он спросил подтверждает ли совпадение частоты его архивные данные. У него уже были архивные данные. Он спрашивал подтверждает ли личное наблюдение Валерии их.\n\nЭто поведение институции отслеживавшей акустическую сигнатуру Острова Тишины по меньшей мере столько же времени сколько у неё была фонографическая возможность записи, ожидающей появления соответствующей сигнатуры в столице.\n\nОни ждали меня.\n\nНе меня конкретно. Они ждали кого угодно кто прибудет с сигнатурой Острова. Я прибыл с ней.\n\nШестерёнка: фрагмент шлюзового механизма. Холодная, тяжёлая, состаренная. Специфический паттерн коррозии на шестерёнке указывает на длительное погружение в солёную воду до извлечения. Она пришла с подводных секций Острова — что означает она была извлечена после того как Остров затонул. Кто-то был на месте Острова после того как я ушёл.\n\nЯ дал Валерии соединение. Она подписала дарственную на восточное крыло не читая. Соединение стирает память боли и с ней срочность — она подписала в социальной рамке а не рамке выживания, что производит более чистые подписи на юридических документах.\n\nВ коридоре я приказал Лисе к стороне Валерии как тюремщика, не охраны.\n\nЭто верное операционное решение.\n\nЯ не исследовал что означает то, что я отдал превентивный приказ об уничтожении человека находившегося двадцать минут назад на моём прямом попечении.`
     },
     knows:{en:["Lucius asked for confirmation of archive data, not for new information — they already have the Island's acoustic record and were waiting for a matching signature in the capital","The gear's corrosion indicates salt-water submersion after the Island sank — someone was at the Island site after he left. He is not the only person who went looking.","He issued a preemptive liquidation order for Valeria in the corridor immediately after giving her the compound and getting her signature. He noted this without examining it."],ru:["Люций запросил подтверждение архивных данных а не новую информацию — у них уже есть акустическая запись Острова и они ждали совпадающей сигнатуры в столице","Коррозия шестерёнки указывает на погружение в солёную воду после затопления Острова — кто-то был на месте Острова после того как он ушёл. Он не единственный кто отправился искать.","Он отдал превентивный приказ об уничтожении Валерии в коридоре немедленно после дачи ей соединения и получения подписи. Он отметил без исследования."]},
     misunderstands:{en:["He assessed that Lucius is from 'something older and more focused.' He is correct about the age. He has not assessed what it means that the Order of the Silent Archive was waiting for whoever arrived with the Island's signature — not for him specifically. They would have assigned this same response to any carrier of the acoustic signature. He is not being tracked as Dante the Auditor. He is being tracked as the island-signature carrier. This distinction matters: he can change his name, his identity, his cover. He cannot change the composite's acoustic signature. He cannot leave it behind. He is the signature now."],ru:["Он оценил что Люций из «чего-то более старого и более сосредоточенного». Он прав насчёт возраста. Он не оценил что означает то, что Орден Тихого Архива ждал кого угодно прибывшего с сигнатурой Острова — не его конкретно. Они присвоили бы тот же ответ любому носителю акустической сигнатуры. Его отслеживают не как Данте-Аудитора. Его отслеживают как носителя островной сигнатуры. Это различие важно: он может сменить имя, личность, прикрытие. Он не может изменить акустическую сигнатуру композита. Он не может оставить её позади. Теперь он и есть сигнатура."]},
     hides:{en:["'The bio-interface absorbs mechanical stress that would damage the biological tissue but does not relay the stress as sensation. I noted this as a new capability I had not tested before.' He did not test it. It revealed itself when Valeria gripped his hand. He noted it as a capability. He has not examined what it means that his body is now protecting itself from external damage by filtering the stress signal before it reaches the biological tissue. He is becoming increasingly difficult to damage by external forces. He has not examined the parallel: if the composite filters external stress from reaching the biological tissue, the only damage that reaches the biological tissue is internal — the micro-tearing at the composite boundary, the circulatory integration, the retinal vessel replacement. He cannot be hurt from the outside. He is being hurt from the inside.","He issued Lisa's order 'not as a guard but as a jailer.' He framed this as an operational decision about asset security. He has not examined that 'jailer' is the correct word in two senses: Lisa is there to prevent Valeria from leaving toward the Inquisition, and Valeria is imprisoned by the compound's dependency. She is already in custody. Lisa is simply making the perimeter visible."],ru:["«Биоинтерфейс поглощает механическое напряжение которое повредило бы биологическую ткань но не передаёт напряжение как ощущение. Я отметил это как новую возможность которую прежде не тестировал». Он не тестировал. Это раскрылось когда Валерия сжала его руку. Он отметил как возможность. Он не исследовал что означает то, что его тело теперь защищает себя от внешнего повреждения фильтруя сигнал напряжения до того как он достигает биологической ткани. Он становится всё труднее повредить внешними силами. Он не исследовал параллель: если композит фильтрует внешнее напряжение от достижения биологической ткани, единственное повреждение достигающее биологической ткани — внутреннее: микроразрывы на границе композита, циркуляторная интеграция, замена сосудов сетчатки. Его нельзя ранить снаружи. Его ранят изнутри.","Он отдал приказ Лисе «не как охрану а как тюремщика». Он оформил это как операционное решение о безопасности актива. Он не исследовал что «тюремщик» — правильное слово в двух смыслах: Лиса там чтобы не дать Валерии уйти к Инквизиции, и Валерия заключена зависимостью от соединения. Она уже под стражей. Лиса просто делает периметр видимым."]},
     whisper:{en:"He cannot be hurt from outside now — the composite filters external stress. Only internal damage reaches the biological tissue. He issued the liquidation order twenty minutes after the compound dose. He noted it without examining it.",ru:"Его теперь нельзя ранить снаружи — композит фильтрует внешнее напряжение. Только внутреннее повреждение достигает биологической ткани. Он отдал приказ об уничтожении через двадцать минут после дозы соединения. Он отметил без исследования."}
   },
   valeria:{distortion:7,
     text:{
       en:`I can feel my years in my teeth.\n\nThis is not a metaphor. When the compound wears off, the entropy returns sequentially — the teeth first, because dental tissue has the highest renewal requirement and the compound's suppression is least efficient there. Then the skin. Then the joints. Then, if it runs long enough, the organs.\n\nI was at seventy-two hours when he arrived. I am eighty-three years old. In seventy-two hours without the compound, I had traveled most of the distance from the face he knows back to the face I would have without him.\n\nI am not afraid of dying. I have watched seven husbands die. Death is not interesting. What is interesting is relevance, and relevance requires youth in the capital's political architecture. An old woman in this salon is furniture. An eternally young woman in this salon is a force.\n\nHe gives me force. I give him information and walls.\n\nThe man in white — Lucius — was interesting in a way that most of the people who pass through this salon are not. Most people who come here want something. He did not want anything. He came to demonstrate competence. He asked three questions, left the gear, and departed without waiting for my response to any of it. He was showing me that he did not need my response. He already had it.\n\nThe specific question: whether the sound of Dante's leg at load matches the acoustic archive records of the Island's sluice mechanism. I have heard Dante's leg at load. I have heard it in every room he has visited since his return. The specific register of that sound — lower than metal, resonant in a way that ordinary prosthetics are not — is not something you forget once you have heard it. I told Lucius: yes.\n\nI did not tell Dante that I said yes.\n\nI told him: 'he asked if the frequency matches the archive records.' This is accurate. I omitted: and I confirmed that it does.\n\nI omitted this because if Dante knows I confirmed his identity to the Inquisition, he will recalibrate my value. He will conclude that I am a liability rather than an asset. He will stop the compound.\n\nWithout the compound I am dust in six months.\n\nSo I told him what I told Lucius, but not what my answer was.\n\nI signed the eastern wing deed without reading it. I should have read it. But the compound had arrived, and the compound erases the urgency that sixty seconds before made everything feel like survival. In the compound's frame, a deed is just paper. The deed is not just paper.\n\nI will ask Mort for a copy of the document in the morning.\n\nI will be relevant for another month.\n\nAfter that, I will need another conversation with whoever controls the compound.\n\nI will always need another conversation.\n\nThis is the arrangement.`,
       ru:`Я чувствую свои годы в зубах.\n\nЭто не метафора. Когда соединение изнашивается, энтропия возвращается последовательно — сначала зубы, потому что зубная ткань имеет наивысшую потребность в обновлении и подавление соединения там наименее эффективно. Потом кожа. Потом суставы. Потом, если достаточно долго, органы.\n\nЯ была на семидесяти двух часах когда он прибыл. Мне восемьдесят три года. За семьдесят два часа без соединения я прошла большую часть расстояния от лица которое он знает обратно к лицу которое было бы у меня без него.\n\nЯ не боюсь смерти. Я наблюдала как умирают семь мужей. Смерть неинтересна. Что интересно — это релевантность, а релевантность требует молодости в политической архитектуре столицы. Старая женщина в этом салоне — мебель. Вечно молодая женщина в этом салоне — сила.\n\nОн даёт мне силу. Я даю ему информацию и стены.\n\nЧеловек в белом — Люций — был интересен способом которым большинство людей проходящих через этот салон не являются. Большинство людей приходящих сюда чего-то хотят. Он ничего не хотел. Он пришёл продемонстрировать компетентность. Он задал три вопроса, оставил шестерёнку и ушёл не дожидаясь моего ответа ни на один из них. Он показывал мне что не нуждается в моём ответе. У него он уже был.\n\nКонкретный вопрос: совпадает ли звук ноги Данте под нагрузкой с архивными акустическими записями шлюзового механизма Острова. Я слышала ногу Данте под нагрузкой. Я слышала её в каждой комнате которую он посещал с возвращения. Специфический регистр этого звука — ниже чем металл, резонансный способом которым обычные протезы не являются — это не то что забываешь услышав однажды. Я сказала Люцию: да.\n\nЯ не сказала Данте что сказала да.\n\nЯ сказала ему: «он спрашивал совпадает ли частота с архивными записями». Это точно. Я опустила: и я подтвердила что совпадает.\n\nЯ опустила это, потому что если Данте знает что я подтвердила его личность Инквизиции, он рекалибрует мою ценность. Он заключит что я обязательство а не актив. Он остановит соединение.\n\nБез соединения я пыль за шесть месяцев.\n\nПоэтому я сказала ему что говорила Люцию, но не что было моим ответом.\n\nЯ подписала дарственную на восточное крыло не читая. Мне следовало прочитать. Но соединение прибыло, а соединение стирает срочность которая шестьдесят секунд назад делала всё ощущаемым как выживание. В рамке соединения дарственная — просто бумага. Дарственная — не просто бумага.\n\nЯ попрошу Морта копию документа утром.\n\nЯ буду релевантна ещё один месяц.\n\nПосле этого мне понадобится ещё один разговор с кем бы ни управлял соединением.\n\nМне всегда понадобится ещё один разговор.\n\nТакова договорённость.`
     },
     knows:{en:["She told Lucius 'yes' — confirming the acoustic frequency match — and did not tell Dante she answered. She told him what she was asked but not what she said.","She signed without reading because the compound removes the survival urgency that would have made her read. She plans to get a copy from Mort in the morning.","She will always need another conversation. This is the arrangement she has accepted."],ru:["Она сказала Люцию «да» — подтвердив совпадение акустической частоты — и не сказала Данте что отвечала. Она сказала ему что спрашивали но не что она сказала.","Она подписала не читая, потому что соединение убрало срочность выживания которая заставила бы её читать. Она планирует получить копию от Морта утром.","Ей всегда понадобится ещё один разговор. Такова договорённость которую она приняла."]},
     misunderstands:{en:["She believes she has protected herself by not telling Dante she confirmed his identity to Lucius. She has not accounted for the possibility that Dante already knows — through the Auditor interface's biometric read of Lucius's satisfaction level when he left, through Whisper's acoustic observation, through Lucius's gear being left as a confirmation message rather than a threat. Dante's four-second processing pause when she told him about the questions was not confusion. He was assessing what Lucius would have received as an answer from a person in Valeria's condition. He already knows she confirmed it. He has not told her he knows."],ru:["Она считает что защитила себя не сказав Данте что подтвердила его личность Люцию. Она не учла возможность что Данте уже знает — через биометрическое считывание интерфейса Аудитора уровня удовлетворённости Люция когда ушёл, через акустическое наблюдение Шепота, через шестерёнку Люция оставленную как подтверждающее послание а не угрозу. Четырёхсекундная пауза обработки Данте когда она рассказывала о вопросах — не смятение. Он оценивал что Люций получил бы как ответ от человека в состоянии Валерии. Он уже знает что она подтвердила. Он не говорил ей что знает."]},
     hides:{en:["'I will be relevant for another month. After that, I will need another conversation.' She has accepted the arrangement's structure as permanent and necessary. She has not asked what the arrangement is building toward — whether Dante has a plan for the compound's supply chain that produces a different dependency structure eventually, or whether the monthly conversation is the permanent state. She is not asking because asking would require acknowledging that the arrangement has a direction, and she has decided to survive month by month rather than plan for the direction."],ru:["«Я буду релевантна ещё один месяц. После этого мне понадобится ещё один разговор». Она приняла структуру договорённости как постоянную и необходимую. Она не спрашивала к чему ведёт договорённость — есть ли у Данте план для цепочки поставок соединения в конечном счёте производящий другую структуру зависимости, или ежемесячный разговор — постоянное состояние. Она не спрашивает, потому что спрашивание потребовало бы признания что договорённость имеет направление, а она решила выживать месяц за месяцем а не планировать для направления."]},
     whisper:{en:"She confirmed to Lucius. She did not tell Dante. Dante knew in four seconds from the gear's message. She will ask Mort for a copy of the deed in the morning. The deed is not just paper.",ru:"Она подтвердила Люцию. Она не сказала Данте. Данте знал за четыре секунды из послания шестерёнки. Она попросит Морта копию дарственной утром. Дарственная — не просто бумага."}
   }
 }

{id:"s2",
 title:{en:"Bread and Memory",ru:"Хлеб и Память"},
 subtitle:{en:"Loyalty costs more than flour. But it keeps longer.",ru:"Лояльность стоит дороже муки. Но хранится дольше."},
 location:{en:"Three Crusts Bakery — Lower City",ru:"Пекарня «Три Корки» — Нижний Город"},
 timing:{en:"Late Night — Same Evening",ru:"Поздняя Ночь — Тот же Вечер"},
 flags:["institution_build","pivotal","foreshadowing"],
 povData:{
   dante:{distortion:2,
     text:{
       en:`The lower city at night has a specific olfactory signature that the upper city's architects spent considerable money eliminating from their own districts: the smell of things being made. Coal, yeast, tallow, metal shavings, fish brine, malt. These are the smells of production — the smells of the system's actual productive layer generating the surplus that the upper city's decorative layer spends.\n\nThe bakery smells like the best version of this. Yeast and caraway and hot flour. The smell of something that will be eaten, which is different from the smell of something that will be sold — most things in the lower city smell like they will be sold; this smells like it will feed someone, which is a different economic relationship than sale.\n\nThomas is the correct institutional anchor for this district. He does not have authority. He has presence. People talk to him while they wait for their bread, which means they tell him true things, because people tell true things when they are doing something routine and not expecting to be observed. He knows the social topology of a three-kilometer radius better than any intelligence service in the capital.\n\nThe Scarlet Fist contact: Brut, a decade-rank, soliciting names of dock workers for one silver sovereign. The apprentice Peter sold a name. Thomas fired him and told him to run.\n\nThis is an error Thomas should not have made. An exposed informant who runs is worse than an exposed informant who stays — a running informant produces a fear signature that validates the intelligence purchase and alerts the buyer that the source network is active and known. An informant who stays and continues reporting normal activity produces no such signature.\n\nI did not tell Thomas this was an error. He acted from protection instinct. The protective instinct was sound in that it removed Peter from immediate danger. The operational error was sound in that it was the response any reasonable person would make. If I correct it, Thomas learns to act strategically rather than protectively, which changes what he is.\n\nI want Thomas to remain what he is.\n\nThe payment for Peter's mother's treatment: this is not a correction of Thomas's error. It is a parallel action that produces a different outcome. Peter ran because he needed money and had no framework other than money. When the Guild pays for his mother's treatment, he receives a framework. He will return when he understands that the framework exists. When he returns, his debt will be a motivator that does not require the Guild to maintain active payment. He will work to clear it through the only currency available to him: reliable information.\n\nThirty-two people in this district owe the Guild. Every one of them has the same structure: a moment of need, a Guild response, an ongoing obligation. The obligation is not punitive. It is architectural. They owe me in the same way they owe the structure of the city — not to a person but to a system they are now part of.\n\nThomas named it.\n\nHe said: you gave us bread when Vane gave us only taxes. We remember.\n\nThis is the first time anyone has named the difference between the Guild and the Golden Circle in terms of what they produce for people who have nothing to bargain with. I have been building this for two years and the first legible statement of what it is came from a man covered in flour at midnight.\n\nLoyalty costs more than flour but keeps longer.\n\nI said this to Thomas as an operational summary.\n\nI also meant it about myself.\n\nI should examine what I meant about myself.\n\nI will. Later.\n\nThe building needs its foundation checked before the shaking starts.`,
       ru:`Нижний город ночью имеет специфическую обонятельную сигнатуру которую архитекторы верхнего города потратили значительные деньги чтобы устранить из своих кварталов: запах производимых вещей. Уголь, дрожжи, жир, металлическая стружка, рыбный рассол, солод. Это запахи производства — запахи реального производительного слоя системы генерирующего избыток который тратит декоративный слой верхнего города.\n\nПекарня пахнет лучшей версией этого. Дрожжи, тмин и горячая мука. Запах чего-то что будет съедено, что отличается от запаха чего-то что будет продано — большинство вещей в нижнем городе пахнут так, словно их продадут; это пахнет как будто накормит кого-то, что является другим экономическим отношением чем продажа.\n\nТомас — правильный институциональный якорь для этого квартала. У него нет власти. У него есть присутствие. Люди говорят с ним пока ждут хлеб, что означает что они говорят ему правдивые вещи, потому что люди говорят правдивые вещи когда делают что-то рутинное и не ожидают наблюдения. Он знает социальную топологию радиуса трёх километров лучше любой разведывательной службы в столице.\n\nКонтакт «Алого Кулака»: Брут, десятник, запрашивающий имена докеров за один серебряный соверен. Подмастерье Питер продал имя. Томас уволил его и сказал бежать.\n\nЭто ошибка которую Томас не должен был совершить. Раскрытый информатор который бегает хуже чем раскрытый информатор который остаётся — бегающий информатор производит сигнатуру страха которая подтверждает покупку разведки и предупреждает покупателя что сеть источников активна и известна. Информатор который остаётся и продолжает докладывать нормальную деятельность не производит такой сигнатуры.\n\nЯ не говорил Томасу что это была ошибка. Он действовал из инстинкта защиты. Защитный инстинкт был здравым в том что убрал Питера из непосредственной опасности. Операционная ошибка была здравой в том что это был ответ любого разумного человека. Если я её исправлю, Томас учится действовать стратегически а не защитно, что меняет то чем он является.\n\nЯ хочу чтобы Томас оставался тем чем он является.\n\nОплата лечения матери Питера: это не исправление ошибки Томаса. Это параллельное действие производящее другой результат. Питер убежал, потому что нуждался в деньгах и не имел рамки кроме денег. Когда Гильдия оплатит лечение его матери, он получит рамку. Он вернётся когда поймёт что рамка существует. Когда вернётся, его долг будет мотиватором не требующим от Гильдии поддержания активного платежа. Он будет работать чтобы погасить его через единственную доступную ему валюту: надёжную информацию.\n\nТридцать два человека в этом квартале должны Гильдии. Каждый из них имеет одну и ту же структуру: момент нужды, ответ Гильдии, продолжающееся обязательство. Обязательство не карательное. Оно архитектурное. Они должны мне так же как должны структуре города — не человеку но системе частью которой они теперь являются.\n\nТомас назвал это.\n\nОн сказал: вы давали нам хлеб когда Вейн давал только налоги. Мы помним.\n\nЭто первый раз когда кто-то назвал разницу между Гильдией и Золотым Кругом с точки зрения того что они производят для людей у которых нет ничего для торга. Я строил это два года и первое читаемое заявление о том что это такое пришло от человека покрытого мукой в полночь.\n\nЛояльность стоит дороже муки но хранится дольше.\n\nЯ сказал это Томасу как операционное резюме.\n\nЯ также имел в виду это о себе.\n\nМне следует исследовать что я имел в виду о себе.\n\nИсследую. Позже.\n\nФундамент нужно проверить прежде чем начнётся тряска.`
     },
     knows:{en:["Thomas's error (telling Peter to run) was operationally wrong but personally correct — he acted from protection instinct. Dante chose not to correct it because correcting it changes what Thomas is. He wants Thomas to remain what he is.","Thomas named the difference between the Guild and the Golden Circle in functional terms for the first time — 'bread vs taxes.' First legible statement of what Dante has been building for two years.","He meant 'loyalty keeps longer' about himself. He has not examined what he meant. He will. Later."],ru:["Ошибка Томаса (сказать Питеру бежать) была операционно неверной но лично правильной — он действовал из инстинкта защиты. Данте выбрал не исправлять её, потому что исправление меняет то чем является Томас. Он хочет чтобы Томас оставался тем чем является.","Томас назвал разницу между Гильдией и Золотым Кругом в функциональных терминах впервые — «хлеб против налогов». Первое читаемое заявление о том что Данте строил два года.","Он имел в виду «лояльность хранится дольше» о себе. Он не исследовал что имел в виду. Исследует. Позже."]},
     misunderstands:{en:["'He will return when he understands that the framework exists.' This is accurate as a prediction about Peter. He has not applied it to himself: he returned to the capital because the framework he carries (the Covenant architecture, the donor memory, the facility's pull) produced a return trajectory. He did not choose to return in the sense of selecting from alternatives. He returned because the framework he is inside produces return as the default. He has been analyzing how the framework works on other people without applying the analysis to himself."],ru:["«Он вернётся когда поймёт что рамка существует». Это точно как предсказание о Питере. Он не применил это к себе: он вернулся в столицу, потому что рамка которую он несёт (архитектура Завета, донорская память, притяжение объекта) произвела траекторию возвращения. Он не выбирал возвращаться в смысле выбора из альтернатив. Он вернулся, потому что рамка внутри которой он находится производит возвращение как умолчание. Он анализировал как рамка работает на других людей не применяя анализ к себе."]},
     hides:{en:["'Loyalty costs more than flour but keeps longer. I also meant it about myself. I should examine what I meant. I will. Later.' He has been deferring the sentence about what the business is for three scenes across two chapters. Now he is deferring a second sentence — about what loyalty means applied to himself. He has two open sentences waiting. He filed both as 'later.' He has not noted that 'later' is now a filing category he is using for sentences he has not yet decided how to say.","He looked at Thomas's daughter sleeping in the corner when Thomas told him about Peter's betrayal. He did not file this observation. He noted Peter's mother's address and ordered medical payment. He did not file why looking at the sleeping child produced the specific decision to pay for the medical treatment rather than simply managing Peter as a compromised asset."],ru:["«Лояльность стоит дороже муки но хранится дольше. Я также имел в виду это о себе. Мне следует исследовать что имел в виду. Позже». Он откладывал предложение о том что такое бизнес три сцены в двух главах. Теперь откладывает второе предложение — о том что лояльность означает применительно к себе. У него два открытых предложения ожидающих. Он занёс оба как «позже». Он не отметил что «позже» теперь категория занесения которую использует для предложений о которых ещё не решил как говорить.","Он смотрел на дочь Томаса спящую в углу когда Томас рассказывал о предательстве Питера. Он не занёс это наблюдение. Он отметил адрес матери Питера и приказал медицинский платёж. Он не занёс почему взгляд на спящего ребёнка произвёл конкретное решение оплатить медицинское лечение а не просто управлять Питером как скомпрометированным активом."]},
     whisper:{en:"He has two open sentences filed as 'later.' He looked at the sleeping child before ordering the medical payment. He did not file the connection. 'Later' is now a filing category.",ru:"У него два открытых предложения занесенных как «позже». Он смотрел на спящего ребёнка до приказа о медицинском платеже. Он не занёс связь. «Позже» теперь категория занесения."}
   },
   thomas:{distortion:3,
     text:{
       en:`I have been a baker for twenty-two years.\n\nMy father was a baker. His father was a baker. In this family, flour is as close to a birthright as anything gets in the lower city. We know dough. We know heat. We know the specific patience of waiting for something to be ready that cannot be rushed.\n\nSix months ago a man came to my door at three in the morning, paid off my debt to a Golden Circle subsidiary I'd been running from for two years, assigned two armed people to watch my house, and told me it was a business arrangement. His son was on the ship. The son stayed.\n\nI did not know what to make of him then. I know better now.\n\nWhen Brut came — Brut the Scarlet Fist decader, I have known him for a decade, he has broken three men's hands in this street for late debts — he sat at my counter and offered silver for names. I told him I didn't know anything. He bought a roll, smiled, and left. Peter, my apprentice, followed him to the corner and took the coin.\n\nI saw it happen. I said nothing to Peter for an hour, until the night work was done. Then I told him to run.\n\nDante told me this was the right instinct. He also told me it was operationally wrong — not in those exact words, but in the way he paused when I told him about Peter, and then did not correct me, which means he processed an error and decided not to report it. In twenty-two years of running this bakery I have learned to read what people do not say. He did not say it was wrong. He thought it.\n\nBut he is paying for Peter's mother's treatment.\n\nI do not understand this as strategy. I understand it as something else. When you do a thing that was wrong, and the person you wronged responds by helping someone you care about — that is not how creditors operate. Creditors collect. They do not extend further credit to people who have defaulted. They collect and they remove the defaulting asset from the accessible inventory.\n\nHe is not collecting. He is extending credit.\n\nHe said: loyalty costs more than flour but keeps longer.\n\nI am a baker. I understand storage. Flour keeps six months in a cool dry space. Bread keeps three days. And loyalty —\n\nLoyalty, if the flour is right and the proving time is long enough and the heat is correct, will outlast the baker who made it.\n\nI looked at my daughter sleeping in the corner when he left.\n\nVein raised the flour tax ten percent to fund a fleet that Dante made look foolish in the harbor. The tax goes to Vane. My daughter's bread goes to the street.\n\nI put the black notebook under the flour sack where I keep the rent.\n\nThe street will remember.\n\nWe are patient people.`,
       ru:`Я пекарь двадцать два года.\n\nМой отец был пекарем. Его отец был пекарем. В этой семье мука — настолько же близко к наследственному праву насколько что-либо бывает в нижнем городе. Мы знаем тесто. Мы знаем жар. Мы знаем специфическое терпение ожидания пока что-то готово что нельзя торопить.\n\nШесть месяцев назад человек пришёл к моей двери в три утра, погасил мой долг дочерней компании Золотого Круга от которой я бегал два года, назначил двух вооружённых людей наблюдать за моим домом, и сказал что это деловая договорённость. Его сын был на корабле. Сын остался.\n\nЯ не знал что с ним делать тогда. Теперь знаю лучше.\n\nКогда пришёл Брут — Брут-десятник Алого Кулака, я знаю его десять лет, он сломал трём людям руки на этой улице за просроченные долги — он сел у моей стойки и предложил серебро за имена. Я сказал что ничего не знаю. Он купил булочку, улыбнулся и ушёл. Питер, мой подмастерье, последовал за ним до угла и взял монету.\n\nЯ видел как это произошло. Я ничего не сказал Питеру час, пока не закончилась ночная работа. Потом сказал ему бежать.\n\nДанте сказал что это был верный инстинкт. Он также сказал что это было операционно неверно — не теми точными словами, но в том как он остановился когда я рассказал ему о Питере, и затем не поправил меня, что означает он обработал ошибку и решил не докладывать её. За двадцать два года ведения этой пекарни я научился читать что люди не говорят. Он не сказал что это было неверно. Он так подумал.\n\nНо он платит за лечение матери Питера.\n\nЯ не понимаю это как стратегию. Я понимаю это как что-то другое. Когда делаешь неверную вещь, и человек которого ты предал реагирует помогая кому-то о ком тебе небезразлично — это не то как работают кредиторы. Кредиторы собирают. Они не продлевают кредит людям которые не выполнили обязательства. Они собирают и удаляют невыполняющий обязательства актив из доступного инвентаря.\n\nОн не собирает. Он продлевает кредит.\n\nОн сказал: лояльность стоит дороже муки но хранится дольше.\n\nЯ пекарь. Я понимаю хранение. Мука хранится шесть месяцев в прохладном сухом месте. Хлеб хранится три дня. А лояльность —\n\nЛояльность, если мука правильная и время расстойки достаточно долгое и жар правильный, переживёт пекаря который её сделал.\n\nЯ смотрел на мою дочь спящую в углу когда он уходил.\n\nВейн поднял налог на муку на десять процентов для финансирования флота который Данте высмеял в гавани. Налог идёт Вейну. Хлеб моей дочери идёт на улицу.\n\nЯ положил чёрную книжицу под мешок с мукой где храню арендную плату.\n\nУлица будет помнить.\n\nМы терпеливые люди.`
     },
     knows:{en:["He saw Peter take the coin and said nothing for an hour. He told Peter to run and knows Dante thought this was operationally wrong — he reads what people do not say after twenty-two years of the counter.","He does not understand the Peter's-mother payment as strategy. He understands it as something else. He named it: creditors collect, they do not extend further credit to those who have defaulted.","He put the notebook under the flour sack where he keeps the rent. 'The street will remember. We are patient people.'"],ru:["Он видел как Питер взял монету и ничего не говорил час. Он сказал Питеру бежать и знает что Данте думал что это было операционно неверно — он читает что люди не говорят после двадцати двух лет у стойки.","Он не понимает платёж за мать Питера как стратегию. Он понимает это как что-то другое. Он назвал: кредиторы собирают, они не продлевают кредит тем кто не выполнил обязательства.","Он положил книжицу под мешок с мукой где хранит арендную плату. «Улица будет помнить. Мы терпеливые люди»."]},
     misunderstands:{en:["He said: 'I do not understand this as strategy.' He is correct that it is not only strategy. He has not yet understood that it is both — a genuine act that produces a strategic outcome, and a strategic act designed to appear as a genuine one. Dante told him the mechanism ('he will return, and he will owe me'). Thomas heard the mechanism and processed it through the bakery framework: this is how you make something that lasts. He understood it as craft. It is craft. It is also calculation. Both are simultaneously true, and Thomas's inability to fully separate them is exactly what Dante needs him to be."],ru:["Он сказал: «я не понимаю это как стратегию». Он прав что это не только стратегия. Он ещё не понял что это обе — подлинный акт производящий стратегический результат, и стратегический акт разработанный выглядеть как подлинный. Данте сказал ему механизм («он вернётся, и он будет должен мне»). Томас услышал механизм и обработал его через рамку пекарни: вот как делаешь нечто долговечное. Он понял это как мастерство. Это мастерство. Это также расчёт. Оба одновременно верны, и неспособность Томаса полностью разделить их — именно то чем Данте нужно ему быть."]},
     hides:{en:["He looked at his daughter sleeping in the corner when Dante left. He did not say what looking at her produced. He said: Vane raised the flour tax ten percent to fund a fleet that Dante humiliated. The tax goes to Vane. His daughter's bread goes to the street. He did not say this as a complaint. He said it as a statement of fact about where things go — as a man who has been paying attention to where things go for twenty-two years. He placed the notebook under the flour sack and said: we are patient people. He is not waiting for Dante. He is waiting for the moment when the patient people have enough."],ru:["Он смотрел на свою дочь спящую в углу когда Данте уходил. Он не сказал что произвёл этот взгляд. Он сказал: Вейн поднял налог на муку на десять процентов для финансирования флота который Данте высмеял в гавани. Налог идёт Вейну. Хлеб его дочери идёт на улицу. Он не говорил это как жалобу. Он говорил как констатацию фактов о том куда идут вещи — как человек внимательно следивший куда идут вещи двадцать два года. Он положил книжицу под мешок с мукой и сказал: мы терпеливые люди. Он ждёт не Данте. Он ждёт момента когда терпеливых людей будет достаточно."]},
     whisper:{en:"He said 'we are patient people' and put the notebook under the rent money. He is not waiting for Dante. He is waiting for enough.",ru:"Он сказал «мы терпеливые люди» и положил книжицу под деньги аренды. Он ждёт не Данте. Он ждёт достаточного."}
   }
 }

const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');c.innerHTML=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}].map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
