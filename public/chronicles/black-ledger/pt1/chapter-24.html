  dante:{name:"DANTE",title:{en:"The Auditor — Return to the Capital",ru:"Аудитор — Возвращение в Столицу"},primary:"#6b0000",secondary:"#9b2222",glow:"rgba(107,0,0,0.16)",textColor:"#dcc0c0",dimColor:"rgba(155,34,34,0.45)"},
  vane:{name:"VANE",title:{en:"Lord-Director — The Golden Circle",ru:"Лорд-Директор — «Золотой Круг»"},primary:"#1a1200",secondary:"#4a3800",glow:"rgba(26,18,0,0.22)",textColor:"#e0d0a0",dimColor:"rgba(74,56,0,0.5)"},
  isabella:{name:"ISABELLA",title:{en:"Head of Poisons and Alchemy",ru:"Глава Отдела Ядов и Алхимии"},primary:"#0a1a0a",secondary:"#283828",glow:"rgba(10,26,10,0.22)",textColor:"#c0d8c0",dimColor:"rgba(40,56,40,0.5)"}

const TIMELINE=[
  {id:"TET-189",en:"The Leviathan's arrival during Vane's presentation was not accidental timing. Whisper's forward intelligence network in the capital had been tracking the presentation's schedule for three weeks before departure from Dragon's Teeth Bay. The presentation was the highest-visibility public event the Golden Circle had scheduled before the expected return window. Dante timed the Leviathan's arrival to interrupt the presentation at maximum audience: the dock was full of trade delegates, press representatives, and merchant-class observers who would become the primary distribution network for whatever narrative the arrival produced. The timing cost four hours of navigational adjustment on the final approach. He allocated this as a demonstration budget.",ru:"Прибытие «Левиафана» во время презентации Вейна не было случайным. Сеть упреждающей разведки Шепота в столице отслеживала расписание презентации три недели до отбытия из Бухты Драконьих Зубов. Презентация была наиболее публичным мероприятием которое «Золотой Круг» запланировал до ожидаемого окна возвращения. Данте рассчитал прибытие «Левиафана» чтобы прервать презентацию на максимальной аудитории: причал был полон торговых делегатов, представителей прессы и наблюдателей торговых классов которые стали бы основной распределительной сетью для любого нарратива произведённого прибытием. Расчёт времени стоил четыре часа навигационной корректировки на финальном подходе. Он выделил это как демонстрационный бюджет."},
  {id:"TET-190",en:"Vane's decision to impose isolation rather than immediate interdiction was the operationally correct response given the information available to him. He assessed: the ship is blacked out and dramatic, which is performative; the crew is exhausted; the dock is Dock 5, which is the worst dock in the harbor. His analysis was correct in every particular except the most important one: he assessed the ship as the asset being protected and the dock as the constraint. Both of these were wrong. The ship was the delivery vehicle, not the asset. The dock was the destination, not the constraint. He blocked the doors and left the basement open, exactly as Dante had modeled.",ru:"Решение Вейна ввести изоляцию а не немедленное задержание было операционно верным ответом при имеющейся у него информации. Он оценил: корабль закрашен в чёрный и драматичен, что является демонстративным; экипаж истощён; причал — Пирс 5, худший в гавани. Его анализ был верным во всём конкретном кроме наиболее важного: он оценил корабль как защищаемый актив а причал как ограничение. Оба были неверны. Корабль был транспортным средством доставки, а не активом. Причал был пунктом назначения, а не ограничением. Он заблокировал двери оставив подвал открытым, именно как смоделировал Данте."},
  {id:"TET-191",en:"The 'heavy boxes and barrels' the spy observed were exactly what they appeared to be: heavy. The spy correctly identified the weight differential but could not identify the contents because the contents were Grimm's field-manufactured weapons systems — modified ballistic projectors, precision tools using Precursor-grade alloy components, and four sealed containers of structural Gel converted into a high-density liquid delivery system. These were not smuggled goods for resale. They were the Guild's offensive and defensive infrastructure for the next operational phase, pre-positioned in the capital's undercity before the blockade could be extended to surface roads. By the time Vane understood that the blockade was irrelevant, the Guild had established a fully-equipped operational base beneath the city.",ru:"«Тяжёлые ящики и бочки» которые наблюдал шпион были именно тем чем казались: тяжёлыми. Шпион правильно определил дифференциал веса но не мог определить содержимое, потому что содержимым были произведённые Граммом в полевых условиях системы вооружения — модифицированные баллистические проекторы, прецизионные инструменты с компонентами из сплавов уровня Предтечей, и четыре запечатанных контейнера структурного Геля конвертированного в высокоплотную систему жидкостной доставки. Это не были контрабандные товары для перепродажи. Это была наступательная и оборонительная инфраструктура Гильдии для следующей операционной фазы, предпозиционированная в подземном городе столицы до того как блокада могла быть расширена на наземные дороги."},
  {id:"TET-192",en:"The leg seizing in the knee joint during the unloading operation was the first functional failure of the composite integration since the Island. The Gel-to-bone junction produced a stress-fracture pattern at the medial articulation face when Dante's weight shifted unexpectedly on the uneven dock surface. The fracture was not structural — the composite did not crack. The biological tissue adjacent to the composite boundary experienced micro-tearing from the differential stress response: composite does not flex; biological tissue does; the junction is the stress concentration point. The pain Dante experienced was not the composite failing. It was his body's remaining biological tissue being damaged by contact with something that cannot be damaged. He is being hurt by his own augmentation.",ru:"Заклинивание ноги в коленном суставе во время разгрузочной операции было первым функциональным отказом интеграции композита со времени Острова. Соединение Гель-кость произвело паттерн стресс-трещин на медиальной суставной поверхности когда вес Данте неожиданно сместился на неровной поверхности причала. Трещина не была структурной — композит не треснул. Биологическая ткань примыкающая к границе композита испытала микроразрывы от дифференциального ответа на напряжение: композит не сгибается; биологическая ткань сгибается; граница — точка концентрации напряжения. Боль которую испытал Данте — не отказ композита. Это его собственная оставшаяся биологическая ткань повреждаемая контактом с чем-то что повредить нельзя. Его ранит собственная аугментация."},
  {id:"TET-193",en:"Isabella already has a completed synthesis design for Gel-plus-Cognitive-Iron integration that she has been developing for three months. She told Dante: 'If you introduce this into a person, it will start replacing tissue.' This is correct as far as she stated it. What she did not state: she knows the replacement process does not stop. The Cognitive Iron component she has been working with for six years inhibits the body's immune rejection response, allowing the Gel's transcription pathway to continue without resistance until either the biological tissue is exhausted or the neural architecture is insufficient to process the composite's signal load. Her prepared synthesis is not a combat-enhancement treatment. It is a terminal transformation process with a variable timeline. She has been waiting for the Gel to find out whether the transformation can be arrested at an intermediate stage. She does not know if it can. She said 'they will stop being human.' She said this as a warning. It is also a research question.",ru:"У Изабеллы уже есть завершённый синтез-проект интеграции Гель-плюс-Когнитивное-Железо который она разрабатывает три месяца. Она сказала Данте: «Если ввести это в человека, оно начнёт замещать ткани». Это верно насколько она это изложила. Что она не изложила: она знает что процесс замещения не останавливается. Компонент Когнитивного Железа с которым она работала шесть лет подавляет иммунный ответ отторжения организма, позволяя транскрипционному пути Геля продолжаться без сопротивления пока либо биологическая ткань не исчерпана, либо нейронная архитектура недостаточна для обработки сигнальной нагрузки композита. Её подготовленный синтез — не лечение для боевого усиления. Это терминальный процесс трансформации с переменным временным горизонтом. Она ждала Гель чтобы выяснить можно ли остановить трансформацию на промежуточном этапе. Она не знает можно ли. Она сказала «они перестанут быть людьми». Она сказала это как предупреждение. Это также исследовательский вопрос."},
  {id:"TET-194",en:"Dante told Isabella: 'They will become instruments. Test this. Find the toxicity limit. I want results, not ethics.' He said 'they' — referring to future subjects. He is already a subject. He has been a subject since the Island's repair workshop. The Gel has been replacing his tissue since Chapter 16. The blood is black. The eyes reflect geometrically. The knee produces micro-tears in the adjacent biological tissue. He said 'they will stop being human' about other people. He has not said this sentence about himself. He has not connected his own ongoing transformation to the transformation he is commissioning Isabella to produce in other people. He is designing a process he is already inside.",ru:"Данте сказал Изабелле: «Они станут инструментами. Протестируй это. Найди предел токсичности. Мне нужны результаты, а не этика». Он сказал «они» — имея в виду будущих субъектов. Он уже субъект. Он субъект с момента ремонтной мастерской Острова. Гель замещает его ткани с Главы 16. Кровь чёрная. Глаза отражают геометрически. Колено производит микроразрывы в примыкающей биологической ткани. Он сказал «они перестанут быть людьми» о других людях. Он не сказал это предложение о себе. Он не связал собственную продолжающуюся трансформацию с трансформацией которую поручает Изабелле производить в других людях. Он разрабатывает процесс внутри которого уже находится."},
  {id:"TET-195",en:"The Tear of Leviathan — the solidified Gel sphere Dante sent to Vane — was not from the thirty-liter reserve that was used on the hull. It was from the first liter extracted from the wyvern carcasses at Object 7-B, the half-flask that was sent to Isabella three weeks ago. Isabella received the half-flask, extracted a measured quantity for her synthesis preparation, and returned the remainder to Dante before departure. The sphere was cast from approximately two milliliters of this returned Gel. Dante sent Vane a demonstration object made from the same material as Isabella's experimental substrate. He does not know that Isabella knows exactly what he sent and what she is planning to do with its larger-batch equivalent.",ru:"«Слеза Левиафана» — затвердевшая гелевая сфера которую Данте отправил Вейну — была не из тридцатилитрового резерва использованного на корпусе. Она была из первого литра извлечённого из туш виверн в Объекте 7-Б, полфлакона которые были отправлены Изабелле три недели назад. Изабелла получила полфлакона, извлекла измеренное количество для подготовки синтеза, и вернула остаток Данте до отбытия. Сфера была отлита из приблизительно двух миллилитров этого возвращённого Геля. Данте отправил Вейну демонстрационный объект сделанный из того же материала что экспериментальный субстрат Изабеллы. Он не знает что Изабелла точно знает что он отправил и что планирует делать с его аналогом большей партии."},
  {id:"TET-196",en:"Vane's recognition moment — 'this is not a thief, this is a raider' — represents the highest-quality threat assessment he has produced across twenty-four chapters of engagement with the Guild. He is correct that the category has changed. He is wrong about what changed: he thinks the change is from financial competition to physical conflict ('economics ended, war begins'). The actual change is from visible competition to invisible control. Dante is not preparing to fight Vane. He has already positioned the Guild's operational infrastructure beneath the city before Vane understood the game had changed. The Scarlet Fist deployment is a response to a situation that already exists. Vane is preparing for a war that began while he was guarding an empty ship.",ru:"Момент осознания Вейна — «это не вор, это захватчик» — представляет наивысшее качество оценки угрозы произведённой им за двадцать четыре главы взаимодействия с Гильдией. Он прав что категория изменилась. Он неправ в том что изменилось: он думает что изменение произошло от финансовой конкуренции к физическому конфликту («экономика кончилась, начинается война»). Реальное изменение — от видимой конкуренции к невидимому контролю. Данте не готовится воевать с Вейном. Он уже позиционировал операционную инфраструктуру Гильдии под городом до того как Вейн понял что игра изменилась. Развёртывание «Алого Кулака» — ответ на ситуацию которая уже существует. Вейн готовится к войне начавшейся пока он охранял пустой корабль."},
  {id:"TET-197",en:"Mort's observation — 'the depreciation level of your body exceeds the statutory norms' — is accurate. Mort, as the Guild's former Lich-King and current majordomo, has institutional memory for body maintenance that extends over several centuries. He observed, upon Dante's return: the micro-tear damage at the composite boundary in the left knee (audible in the gait pattern), the vascular integration visible in the left eye's reflection pattern, the bloodstain on the shirtfront from the continuous nasal bleeding, and the specific postural compensation Dante uses when the biological tissue adjacent to the composite is under load. Mort has catalogued all of this. He mentioned none of it except through the single euphemistic phrase. He did not ask questions. This is the longest-serving bilateral non-disclosure in the residence."}
];

const SCENES=[
{id:"s1",
 title:{en:"Presentation of a Competitor",ru:"Презентация Конкурента"},
 subtitle:{en:"He needed an error. Vane gave him a crystal glass.",ru:"Ему нужна была ошибка. Вейн дал ему хрустальный бокал."},
 location:{en:"Capital Harbor — Pier Five",ru:"Гавань Столицы — Пятый Пирс"},
 timing:{en:"Day of Arrival — Morning",ru:"День Прибытия — Утро"},
 flags:["arc_open","pivotal","social_combat"],
 povData:{
   dante:{distortion:3,
     text:{
       en:`The harbor entrance reads differently from the water than from the dock. From the dock, an arriving ship is an object. From the ship, an arriving ship is a vector — a moving reference point in a field of fixed positions whose relative motion produces information about everyone watching.\n\nI entered the harbor at 11:14 in the morning. Pier Five's event was scheduled for 11:00, which meant Vane was seventeen minutes into his presentation when the light changed.\n\nI did not enter at full speed. Full speed from this ship in harbor conditions would produce a displacement wave that would damage the neighboring docks, which would provide Vane an immediate grievance and a legitimate interdiction pretext. I entered at standard navigational speed for a vessel of this displacement class — which, because this vessel's displacement class is now approximately forty percent heavier than its registered tonnage due to the Gel hull treatment, was still twice the speed of any comparable vessel at equivalent throttle.\n\nThe harbor is a text. I was reading it as we entered. The observation platform at the customs house: two watchers, dressed as harbormaster officials, were positioned incorrectly for customs work — facing inward toward the event rather than outward toward incoming traffic. Vane's intelligence staff, deployed to observe the presentation's reception. The merchant delegations on the pier: thirty-seven individuals, fourteen of whom I identified as trade house representatives whose institutional affiliation was visible in their collar insignia. A Vane event always has an audience that is also a distribution network.\n\nThe Auditor interface produced a coherent read of the target within approximately four seconds of visual acquisition: elevated pulse, weight shift to the right foot (stress preparation), grip tightening on the glass stem. When the glass broke, I noted: emotional regulation failure, approximately 40% probability that his next decision would be governed by pride rather than strategy.\n\nThe probability resolved at approximately sixty seconds later when he turned back to the orchestra.\n\nHe chose pride.\n\nGood.\n\nPride is a predictable decision architecture. It produces choices that optimize for appearance over function. He told his people to ignore us, block our access, and let the ship rot. He deployed these in order of decreasing direct cost and increasing indirect benefit.\n\nHe thought he was strangling us. He was giving us three hours of unobserved darkness.\n\nI had allocated four hundred gold equivalent for the entrance demonstration. I spent twelve percent of the ship's shield systems on the visual effect and three percent of the hull treatment on the high-speed approach. The return: Vane made his key strategic decision under emotional rather than analytical conditions. He chose isolation over interdiction. He preserved his public appearance at the cost of operational control.\n\nThe ledger is clear.\n\nWe docked in Dock Five. I told Whisper to begin the unloading at dark.\n\nThe Leviathan is not the asset. The Leviathan is the announcement. The assets are already below deck, waiting for the announcement to do its work.`,
       ru:`Вход в гавань читается иначе с воды чем с причала. С причала прибывающий корабль — объект. С корабля прибывающий корабль — вектор: движущаяся референтная точка в поле фиксированных позиций чьё относительное движение производит информацию о каждом наблюдающем.\n\nЯ вошёл в гавань в 11:14 утра. Мероприятие Пятого Пирса было запланировано на 11:00, что означало что Вейн был на семнадцатой минуте презентации когда изменился свет.\n\nЯ не входил на полной скорости. Полная скорость этого корабля в условиях гавани произвела бы вытесняющую волну повредившую бы соседние причалы, что предоставило бы Вейну немедленную жалобу и законный предлог для задержания. Я вошёл на стандартной навигационной скорости для судна этого класса водоизмещения — которое, поскольку класс водоизмещения этого судна теперь приблизительно на сорок процентов тяжелее зарегистрированного тоннажа из-за гелевой обработки корпуса, всё равно вдвое превышало скорость любого сопоставимого судна при эквивалентном режиме тяги.\n\nГавань — текст. Я читал его при входе. Наблюдательная платформа у таможни: двое наблюдателей, одетых как чиновники портового надзора, были позиционированы неправильно для таможенной работы — лицом внутрь к мероприятию а не наружу к входящему трафику. Разведывательный персонал Вейна, развёрнутый для наблюдения за приёмом презентации. Торговые делегации на пирсе: тридцать семь человек, четырнадцать из которых я определил как представителей торговых домов чья институциональная принадлежность была видна в знаках отличия воротников. Мероприятие Вейна всегда имеет аудиторию которая также является распределительной сетью.\n\nИнтерфейс Аудитора произвёл согласованное считывание цели приблизительно за четыре секунды визуального захвата: учащённый пульс, смещение веса на правую ногу (подготовка к стрессу), усиление хвата на ножке бокала. Когда бокал разбился, я отметил: сбой эмоциональной регуляции, приблизительно 40% вероятность что следующее решение будет управляться гордостью а не стратегией.\n\nВероятность разрешилась приблизительно через шестьдесят секунд когда он повернулся обратно к оркестру.\n\nОн выбрал гордость.\n\nХорошо.\n\nГордость — предсказуемая архитектура решений. Она производит выборы оптимизирующие внешний вид над функцией. Он сказал своим людям игнорировать нас, блокировать доступ и дать кораблю сгнить. Он развернул их в порядке убывания прямых затрат и нарастания косвенных выгод.\n\nОн думал что душит нас. Он давал нам три часа ненаблюдаемой темноты.\n\nЯ выделил четыреста золотых эквивалентных для демонстрации входа. Я потратил двенадцать процентов систем щита корабля на визуальный эффект и три процента обработки корпуса на высокоскоростной подход. Отдача: Вейн принял ключевое стратегическое решение в эмоциональных а не аналитических условиях. Он выбрал изоляцию над задержанием. Он сохранил публичный облик ценой операционного контроля.\n\nГроссбух ясен.\n\nМы пришвартовались в Доке Пять. Я сказал Шепоту начать разгрузку в темноте.\n\nЛевиафан — не актив. Левиафан — объявление. Активы уже на нижней палубе, ожидая пока объявление сделает своё дело.`
     },
     knows:{en:["The entry was timed to Vane's event schedule — four hours of navigational adjustment budgeted as demonstration cost","The Auditor interface read Vane's biometrics: 40% probability his next decision would be governed by pride. It resolved when he turned back to the orchestra.","'The Leviathan is not the asset. The Leviathan is the announcement.' He stated the operational architecture clearly, in private."],ru:["Вход был рассчитан по расписанию мероприятия Вейна — четыре часа навигационной корректировки выделено как демонстрационные расходы","Интерфейс Аудитора считал биометрику Вейна: 40% вероятность что следующее решение управляется гордостью. Разрешилось когда он повернулся к оркестру.","«Левиафан — не актив. Левиафан — объявление». Он чётко изложил операционную архитектуру, в частном."]},
     misunderstands:{en:["'Vane made his key strategic decision under emotional rather than analytical conditions.' He has assessed this as a clean win — Vane's pride produced the isolation decision, which gave Dante the unobserved window. He has not assessed what it means that he is now fighting an opponent who has dropped pride in favor of survival by chapter's end. Vane's final scene — removing the mask, calling himself wrong — is not the behavior of a man who will keep operating on pride architecture. He has recalibrated. Dante's model of Vane was built on a Vane who chose pride. The Vane in chapter 24's final scene is a different decision architecture."],ru:["«Вейн принял ключевое стратегическое решение в эмоциональных условиях». Он оценил это как чистую победу — гордость Вейна произвела решение об изоляции, давшее Данте ненаблюдаемое окно. Он не оценил что означает то, что он теперь борется с противником сбросившим гордость в пользу выживания к концу главы. Финальная сцена Вейна — снятие маски, признание себя неправым — не поведение человека который продолжит работать на архитектуре гордости. Он рекалиброван. Модель Данте Вейна строилась на Вейне выбирающем гордость. Вейн в финальной сцене Главы 24 — другая архитектура решений."]},
     hides:{en:["He ran the Auditor interface in continuous scan mode for hours. The left eye pulsed with interference. The earring burned. The blood ran continuously. He described this in operational terms: 'the cost of running the Auditor in continuous scan mode.' He has not described it as a symptom of the cascading integration. He has described it as a resource cost, like burning coal for steam. He has not examined whether the resource being burned is finite.","He received Mort's report on his return without comment on Mort's euphemistic observation about body depreciation. Mort has been in institutional service for centuries. Mort said 'exceeds statutory norms' and did not ask questions. Neither did Dante. This is the longest-running bilateral non-disclosure in the residence. He has not noted how long it has been running."],ru:["Он запускал интерфейс Аудитора в режиме непрерывного сканирования часами. Левый глаз пульсировал помехами. Серьга жгла. Кровь текла непрерывно. Он описал это в операционных терминах: «цена запуска Аудитора в режиме непрерывного сканирования». Он не описал это как симптом каскадной интеграции. Он описал как ресурсную стоимость, как сжигание угля для пара. Он не исследовал конечен ли сжигаемый ресурс.","Он получил доклад Морта по возвращении без комментариев относительно эвфемистического наблюдения Морта об амортизации тела. Морт находится в институциональной службе столетия. Морт сказал «превышает уставные нормы» и не задавал вопросов. Данте — тоже. Это самое длительное двустороннее нераскрытие в резиденции. Он не отметил как долго оно продолжается."]},
     whisper:{en:"He ran continuous scan mode for hours at the cost of continuous bleeding. He called it a resource cost. He has not examined whether the resource is finite.",ru:"Он запускал непрерывное сканирование часами ценой непрерывного кровотечения. Он назвал это ресурсной стоимостью. Он не исследовал конечен ли ресурс."}
   },
   vane:{distortion:6,
     text:{
       en:`There is a specific quality of wrongness that only reveals itself in hindsight. When the thing was happening, every decision was correct. The reasoning was sound. The information was processed accurately. And then, at some point after, the picture reorganizes itself and everything that seemed sound turns out to have been organized around a false assumption.\n\nThe false assumption: the ship was the asset he was protecting.\n\nI made the isolation decision because I assessed the ship as too prominent to interdict without looking afraid. I was correct about this. Interdicting the Leviathan in public, with half the trade district watching, while it was fresh off a seven-hundred-mile northern expedition, would have been read as panic. I chose isolation to preserve the appearance of control.\n\nI was managing appearances. He was managing operations.\n\nThe spy's report: heavy boxes, barrels, exhausted crew. I read it as financial desperation. I was correct that he was carrying something heavy. I was correct that his crew was exhausted. The boxes and barrels looked like contraband being moved to black-market storage. I noted this match between prediction and observation and concluded: prediction confirmed.\n\nThis is the specific error that experienced operators make. When the evidence matches the prediction, experienced operators stop looking. The evidence was structured to match my prediction. I stopped looking.\n\nThen the black sphere arrived.\n\nI knew what it was within thirty seconds of holding it. I am sixty-three years old. I have handled rare metals, experimental alloys, alchemical compounds, and materials recovered from pre-Guild engineering sites. I have held nothing like this. The weight-to-volume ratio is wrong. There is no material this dense in any trade catalogue I know. And the surface — it does not reflect light. It absorbs it. The window test confirmed what I already knew.\n\nHe had just politely told me: we unloaded sixty liters of this material into your city's basement while you guarded my empty ship.\n\nSixty liters.\n\nI sat very still for approximately three minutes after the sphere demonstration.\n\nI removed my mask.\n\nI have worn this mask for fourteen years. It is the institutional face of the Lord-Director position. I remove it in private. I removed it in front of my secretary because the mask had stopped being useful. The mask is for managing appearances. Appearances had just become irrelevant.\n\nHe is not a competitor. He is not a thief. He is not a disruptive market actor.\n\nHe has Precursor-era materials at scale. He has a ship made of them. He spent three weeks in the Northern Wastes — we know this because the Leviathan returned in seven days instead of thirty, which means it traveled at a speed that is not possible for any vessel in our fleet. He returned with industrial quantities of a material that cuts reinforced glass like paper.\n\nI deployed the Scarlet Fist.\n\nI said: economics ended, war begins.\n\nI was half right. Economics did not end. He just changed who controls the ledger.`,
       ru:`Есть специфическое качество неправильности раскрывающееся только в ретроспективе. Когда это происходило, каждое решение было верным. Рассуждение было здравым. Информация была обработана точно. И затем, в какой-то момент после, картина реорганизуется и всё казавшееся здравым оказывается организованным вокруг ложного предположения.\n\nЛожное предположение: корабль был активом который я защищал.\n\nЯ принял решение об изоляции, потому что оценил корабль как слишком заметный для задержания без вида страха. Я был прав в этом. Задержание «Левиафана» публично, когда половина торгового квартала наблюдала, пока он был свеж после экспедиции протяжённостью семьсот миль, было бы воспринято как паника. Я выбрал изоляцию чтобы сохранить внешний вид контроля.\n\nЯ управлял внешним видом. Он управлял операциями.\n\nДоклад шпиона: тяжёлые ящики, бочки, истощённый экипаж. Я прочитал это как финансовое отчаяние. Я был прав что он вёз что-то тяжёлое. Я был прав что его экипаж был истощён. Ящики и бочки выглядели как контрабанда перемещаемая в хранилище чёрного рынка. Я отметил это совпадение между предсказанием и наблюдением и заключил: предсказание подтверждено.\n\nЭто специфическая ошибка которую делают опытные операторы. Когда свидетельства совпадают с предсказанием, опытные операторы перестают смотреть. Свидетельства были структурированы чтобы совпасть с моим предсказанием. Я перестал смотреть.\n\nПотом пришла чёрная сфера.\n\nЯ знал что это такое в течение тридцати секунд после того как взял в руки. Мне шестьдесят три года. Я работал с редкими металлами, экспериментальными сплавами, алхимическими соединениями и материалами извлечёнными с инженерных объектов до-гильдийской эпохи. Я не держал ничего подобного. Соотношение веса к объёму неправильное. Нет материала такой плотности ни в одном торговом каталоге который я знаю. И поверхность — она не отражает свет. Она поглощает его. Тест окна подтвердил то что я уже знал.\n\nОн только что вежливо сообщил мне: мы выгрузили шестьдесят литров этого материала в подвал вашего города пока вы охраняли мой пустой корабль.\n\nШестьдесят литров.\n\nЯ просидел совершенно неподвижно приблизительно три минуты после демонстрации сферы.\n\nЯ снял маску.\n\nЯ ношу эту маску четырнадцать лет. Это институциональное лицо позиции Лорд-Директора. Я снимаю её в частном. Я снял её перед своим секретарём, потому что маска перестала быть полезной. Маска для управления внешним видом. Внешний вид только что стал нерелевантным.\n\nОн не конкурент. Он не вор. Он не разрушительный рыночный актор.\n\nУ него материалы эпохи Предтечей в масштабе. У него корабль из них. Он провёл три недели в Северных Пустошах — мы знаем это потому что «Левиафан» вернулся за семь дней вместо тридцати, что означает он путешествовал со скоростью невозможной для любого судна в нашем флоте. Он вернулся с промышленными количествами материала разрезающего армированное стекло как бумагу.\n\nЯ развернул «Алый Кулак».\n\nЯ сказал: экономика кончилась, начинается война.\n\nЯ был наполовину прав. Экономика не кончилась. Он просто изменил кто контролирует гроссбух.`
     },
     knows:{en:["His false assumption: the ship was the asset. He identifies the specific operator error — when evidence matches prediction, you stop looking. The evidence was structured to match his prediction.","He assessed the sphere within 30 seconds: weight-to-volume ratio impossible in any known material catalogue. He knew what the window test would show before he ran it.","'Economics did not end. He just changed who controls the ledger.' — His final self-correction. He removed the mask in front of his secretary."],ru:["Его ложное предположение: корабль был активом. Он определяет специфическую операторную ошибку — когда свидетельства совпадают с предсказанием, ты перестаёшь смотреть. Свидетельства были структурированы совпасть с предсказанием.","Он оценил сферу в течение 30 секунд: соотношение вес-объём невозможно ни в одном известном материальном каталоге. Знал что покажет тест окна до его проведения.","«Экономика не кончилась. Он просто изменил кто контролирует гроссбух». — Его финальная самокорректировка. Он снял маску перед секретарём."]},
     misunderstands:{en:["He said 'sixty liters.' The spy's report described heavy boxes and barrels — multiple units. He has estimated sixty liters. The actual quantity unloaded was approximately what fit in those containers in two tons of cargo. He has the right order of magnitude. He has not identified what those sixty liters can do at industrial deployment. He knows the material can scratch reinforced glass. He does not yet know the material can replace entire structural systems, alter biological tissue, and create a ship that cannot be caught.","He removed the mask and said 'this is a raider.' He has not identified that the raid is already complete. He is preparing the Scarlet Fist for a conflict that already happened in his basement while he guarded an empty dock."],ru:["Он сказал «шестьдесят литров». Доклад шпиона описывал тяжёлые ящики и бочки — несколько единиц. Он оценил шестьдесят литров. Реальное количество выгруженного — приблизительно то что поместилось в этих контейнерах в двух тоннах груза. У него правильный порядок величины. Он не определил что эти шестьдесят литров могут делать при промышленном развёртывании. Он знает что материал может царапать армированное стекло. Он пока не знает что материал может заменять целые структурные системы, изменять биологическую ткань, и создавать корабль который нельзя поймать.","Он снял маску и сказал «это захватчик». Он не определил что захват уже завершён. Он готовит «Алый Кулак» для конфликта уже произошедшего в его подвале пока он охранял пустой причал."]},
     hides:{en:["He says 'I was half right. Economics did not end. He just changed who controls the ledger.' He has identified the correct framing in the last sentence. He has not examined the implications of that framing: if Dante controls the ledger, the ledger's entries determine who has what and why. The Scarlet Fist deployment is a financial decision — it costs money Vane has and Dante does not. If Dante controls the pricing of the material that constitutes the next generation of armament, armor, and infrastructure, he controls what the Scarlet Fist costs. He controls what everything costs."],ru:["Он говорит «я был наполовину прав. Экономика не кончилась. Он просто изменил кто контролирует гроссбух». Он определил верное оформление в последнем предложении. Он не исследовал импликации этого оформления: если Данте контролирует гроссбух, записи гроссбуха определяют у кого что есть и почему. Развёртывание «Алого Кулака» — финансовое решение: это стоит деньги которые есть у Вейна и которых нет у Данте. Если Данте контролирует ценообразование материала составляющего следующее поколение вооружения, брони и инфраструктуры, он контролирует что стоит «Алый Кулак». Он контролирует что стоит всё."]},
     whisper:{en:"He removed the mask. He corrected the framing: 'he changed who controls the ledger.' He has not examined what controlling the ledger means for what the Scarlet Fist costs.",ru:"Он снял маску. Он скорректировал оформление: «он изменил кто контролирует гроссбух». Он не исследовал что означает контроль гроссбуха для того что стоит «Алый Кулак»."}
   }
 }
},

{id:"s2",
 title:{en:"The Weight of Assets",ru:"Тяжесть Активов"},
 subtitle:{en:"Greed is heavier than lead. The spy saw weight and called it contraband.",ru:"Жадность тяжелее свинца. Шпион видел тяжесть и назвал её контрабандой."},
 location:{en:"Dock Five — The Unloading",ru:"Пятый Причал — Разгрузка"},
 timing:{en:"The Night of Arrival",ru:"Ночь Прибытия"},
 flags:["pivotal","deception","cost"],
 povData:{
   dante:{distortion:4,
     text:{
       en:`Three hours of continuous Auditor interface output produces a specific degradation pattern. The signal acuity begins declining at approximately ninety minutes of sustained use — the thermal-imaging overlay loses edge definition, the biometric reads become less granular, the range on acoustic detection narrows. By three hours, the interface is operating at approximately sixty percent of peak acuity. By four hours, the epistaxis is continuous.\n\nI was at three hours and twenty minutes when the leg seized.\n\nThis was not the first time the knee articulation has failed under load. The first time was in the capital after the harbor demonstration — the dampening system's thermal response on cold cobblestone, the oil viscosity issue Grimm identified. This was different: not an equipment failure but a structural failure at the biological-composite interface. The composite did not fail. The biology did.\n\nI felt the specific pain of micro-tearing — not from damage to the composite, but from my remaining biological tissue being pulled against something that will not move with it. When you apply shear stress to two materials with different elasticity coefficients at their interface, the failure occurs in the more elastic material. I am the more elastic material.\n\nI noted this. I did not move my expression. The spy's optic was aimed at my position.\n\nThe spy's report will say: the operative showed no distress. Good.\n\nThe truth is: the distress was significant. The specific quality of biological micro-tearing pain — which is different from nerve damage, different from bruising, different from any other pain category I have operational experience with — is what I imagine you feel when something that is part of you stops being part of you at the boundary where it meets something that was never part of you.\n\nI have been experiencing this quality of pain intermittently since Chapter 16. It is escalating. I have noted this without examining the trajectory.\n\nThe operation completed successfully. Two tons of Grimm's weapons infrastructure, pre-positioned in the city's subsurface drainage network, ready for deployment when the next operational phase requires them. The baker's network provided the surface cover. The spy saw weight. He filed weight as contraband. Vane read the report and saw desperation.\n\nThree readings of the same material. None of them correct.\n\nI went home. I asked Mort for a bath and coffee, in that priority order.\n\nMort observed my gait pattern when I entered and said: the depreciation level of your body exceeds statutory norms.\n\nThis is Mort's way of saying: you are in trouble and I will not ask you directly because we both know you will not answer directly.\n\nI did not answer.\n\nBusiness continues.\n\nI know what it is.\n\nI will say it when I arrive at the right moment.\n\nNot in a bath, with black blood on my collar and a leg that tears itself against its own improvements.\n\nThe moment will have better composition.`,
       ru:`Три часа непрерывного вывода интерфейса Аудитора производят специфический паттерн деградации. Остроту сигнала начинает снижаться приблизительно через девяносто минут устойчивого использования — наложение тепловизора теряет чёткость краёв, биометрические считывания становятся менее гранулярными, дальность акустического обнаружения сужается. К трём часам интерфейс работает приблизительно на шестидесяти процентах пиковой остроты. К четырём часам носовое кровотечение непрерывно.\n\nЯ был на трёх часах и двадцати минутах когда заклинило ногу.\n\nЭто не первый раз когда суставная артикуляция отказала под нагрузкой. Первый раз был в столице после демонстрации в гавани — тепловой ответ системы демпфирования на холодной брусчатке, проблема вязкости масла определённая Граммом. Это было иначе: не отказ оборудования но структурный отказ на интерфейсе биологическое-композит. Композит не отказал. Биология отказала.\n\nЯ почувствовал специфическую боль микроразрывов — не от повреждения композита, а от моей оставшейся биологической ткани тянущейся против чего-то что не движется с ней. Когда применяешь сдвиговое напряжение к двум материалам с разными коэффициентами эластичности на их интерфейсе, отказ происходит в более эластичном материале. Я — более эластичный материал.\n\nЯ отметил это. Я не двинул выражением лица. Оптика шпиона была направлена на мою позицию.\n\nДоклад шпиона скажет: оперативник не проявил дистресса. Хорошо.\n\nПравда: дистресс был значительным. Специфическое качество боли биологического микроразрыва — которое отличается от повреждения нервов, отличается от ушибов, отличается от любой другой категории боли с которой у меня есть операционный опыт — это то что, я представляю, ощущаешь когда что-то являющееся частью тебя перестаёт быть частью тебя на границе где встречает нечто что никогда не было частью тебя.\n\nЯ испытываю это качество боли периодически с Главы 16. Оно нарастает. Я отметил это без исследования траектории.\n\nОперация успешно завершена. Две тонны оружейной инфраструктуры Гримма, предпозиционированной в сети подземного дренажа города, готовы к развёртыванию когда следующая операционная фаза потребует. Сеть пекаря обеспечила наземное прикрытие. Шпион видел тяжесть. Он занёс тяжесть как контрабанду. Вейн прочитал доклад и увидел отчаяние.\n\nТри прочтения одного и того же материала. Ни одно не верно.\n\nЯ пошёл домой. Попросил Морта о ванне и кофе, в этом приоритете.\n\nМорт наблюдал мой паттерн походки когда я вошёл и сказал: уровень амортизации вашего тела превышает уставные нормы.\n\nЭто способ Морта сказать: ты в беде и я не буду спрашивать тебя напрямую, потому что мы оба знаем что ты не ответишь напрямую.\n\nЯ не ответил.\n\nБизнес продолжается.\n\nЯ знаю что это такое.\n\nЯ скажу когда прибуду к правильному моменту.\n\nНе в ванной, с чёрной кровью на воротнике и ногой разрывающей себя против собственных улучшений.\n\nУ момента будет лучшая композиция.`
     },
     knows:{en:["The knee failure was biological micro-tearing at the composite boundary, not equipment failure — he is the more elastic material at the interface, and he is the one who fails under shear stress","'I have been experiencing this quality of pain intermittently since Chapter 16. It is escalating. I have noted this without examining the trajectory.' — He named the pattern and the non-examination simultaneously","Mort observed and used the euphemism. Neither asked or answered."],ru:["Отказ колена был биологическим микроразрывом на границе композита, а не отказом оборудования — он более эластичный материал на интерфейсе, и он тот кто отказывает под сдвиговым напряжением","«Я испытываю это качество боли периодически с Главы 16. Оно нарастает. Я отметил это без исследования траектории». — Он назвал паттерн и ненисследование одновременно","Морт наблюдал и использовал эвфемизм. Ни один не спрашивал и не отвечал."]},
     misunderstands:{en:["'I have noted this without examining the trajectory.' He has produced one of the most honest self-descriptions in twenty-four chapters. He knows the trajectory exists. He knows he has not examined it. He has not examined whether his decision not to examine it is itself part of the pattern — the same decision not to examine survivability before moving, not to examine the face-change before filing it, not to examine the integration before continuing. The non-examination of the trajectory is not an oversight. It is a consistent choice. He has not named it as a consistent choice."],ru:["«Я отметил это без исследования траектории». Он произвёл одно из наиболее честных самоописаний за двадцать четыре главы. Он знает что траектория существует. Он знает что не исследовал её. Он не исследовал является ли его решение не исследовать её само по себе частью паттерна — то же решение не исследовать выживаемость до движения, не исследовать смену лица до занесения, не исследовать интеграцию до продолжения. Ненисследование траектории — не упущение. Это последовательный выбор. Он не назвал это последовательным выбором."]},
     hides:{en:["'Not in a bath, with black blood on my collar and a leg that tears itself against its own improvements. The moment will have better composition.' He has said this about when he will say the business-sentence. He is waiting for better composition. In twenty-four chapters he has never waited for better composition before stating a true thing. He reports what is true when it is true, regardless of setting. This waiting — for a moment with better composition — is new. He is either being honest about the sentence requiring a specific context to be received correctly, or he is finding reasons to defer a sentence he has decided but not yet made himself say."],ru:["«Не в ванной, с чёрной кровью на воротнике и ногой разрывающей себя против собственных улучшений. У момента будет лучшая композиция». Он сказал это о том когда скажет предложение о бизнесе. Он ждёт лучшей композиции. В двадцати четырёх главах он никогда не ждал лучшей композиции перед изложением истины. Он докладывает истину когда она истинна, независимо от обстановки. Это ожидание — момента с лучшей композицией — ново. Либо он честен насчёт того что предложение требует специфического контекста для правильного получения, либо он находит причины откладывать предложение которое решил но ещё не заставил себя сказать."]},
     whisper:{en:"'The moment will have better composition.' He is waiting to say the sentence. In twenty-four chapters he has never waited. This is new.",ru:"«У момента будет лучшая композиция». Он ждёт чтобы сказать предложение. В двадцати четырёх главах он никогда не ждал. Это ново."}
   }
 }
},

{id:"s3",
 title:{en:"House Arrest",ru:"Домашний Арест"},
 subtitle:{en:"I want results, not ethics. The Gel is hungry. Isabella is ready.",ru:"Мне нужны результаты, а не этика. Гель голоден. Изабелла готова."},
 location:{en:"Guild Residence — The Vivisection Sector / Office",ru:"Резиденция Гильдии — Сектор Вивисекции / Кабинет"},
 timing:{en:"Morning After Arrival",ru:"Утро После Прибытия"},
 flags:["foreshadowing","identity","escalation"],
 povData:{
   dante:{distortion:4,
     text:{
       en:`The Vivisection Sector smells like a question being asked through the medium of chemistry.\n\nIsabella has been working in this space for eleven years. In that time she has developed a specific olfactory signature — formaldehyde as the base, with the day's working chemistry layered on top. Today: mint tea, ozone (recent electrical work), and a faint metallic sharpness that I did not recognize.\n\nThe metallic sharpness was the Cognitive Iron sample she has been working with for six years. I identified it when she opened the half-flask and the Gel's scent mixed with it. I did not say: I can smell your existing research substrate. I said: this is the blood of the factory.\n\nThis was the fifth unspoken arrangement. She knows what the Gel does. She has been waiting for it for three months. She did not ask where I found it, how much I have, or what I am planning. She looked at it, asked if I wanted chimeras, and waited for me to specify.\n\nI specified: instruments that don't depreciate after the first through-wound.\n\nShe said: they will stop being human.\n\nI said: they will become instruments. Test this. Find the toxicity limit. I want results, not ethics.\n\nThis is accurate as a work order. It is also the work order for a process that is currently running in my knee, my circulatory system, my retinal vessels, and my donor-memory architecture. I said 'they' to specify the subjects. I did not say: I am also a subject. I am the first subject. I have been the first subject for nineteen chapters.\n\nI did not examine why I used 'they.'\n\nAfter the bath and the coffee, I sat in the office and wrote the note to Vane. The note was eight sentences. It took four minutes. It was the most efficient piece of psychological warfare I have conducted this chapter, and it cost two milliliters of Gel and the labor of one shadow delivery.\n\nThe Tear of Leviathan.\n\nI named the sphere for him because names create categories, and categories create urgency, and urgency creates poor decision-making. He will spend the next three days trying to identify what the 'Tear' is, what 'full troves' means, whether I have a manufacturing capability or merely a single-batch supply. He will make decisions based on urgency about a supply situation he does not fully understand.\n\nMeanwhile, I have my people in position.\n\nValeria has sent three invitations. She knows I have returned. She will know, within four hours, that the cargo was not contraband. She has leverage on the cane's origin. She has three months before the compound's incomplete effect becomes visible in her. When she comes, it will be on her terms. I will let her set the terms. I will accept whatever she asks, because what she knows and what she will need are both things I can manage.\n\nSilas is coming to me with the Site Seven analysis. I know he is coming. I know what the analysis says. I have known its shape since Chapter 9, when I first accessed the predecessor's archive and felt, in the specific quality of the material's architecture, that it had been built by someone who knew where I was going before I did.\n\nI have not opened the question.\n\nI am opening it now.\n\nThe moment is here.\n\nNot quite. I need coffee first. And to read the morning ledger. And to receive Silas properly.\n\nThe sentence is ready.\n\nBusiness continues.\n\nThis time I know what business it is.\n\nI will say it when Silas arrives.`,
       ru:`«Сектор Вивисекции» пахнет вопросом задаваемым через медиум химии.\n\nИзабелла работает в этом пространстве одиннадцать лет. За это время она выработала специфическую обонятельную сигнатуру — формальдегид как база, с рабочей химией дня наложенной сверху. Сегодня: мятный чай, озон (недавняя электрическая работа), и слабая металлическая резкость которую я не узнал.\n\nМеталлическая резкость был образец Когнитивного Железа с которым она работает шесть лет. Я определил это когда она откупорила полфлакона и запах Геля смешался с ним. Я не сказал: я чую твой существующий субстрат исследования. Я сказал: это кровь Завода.\n\nЭто была пятая негласная договорённость. Она знает что делает Гель. Она ждала его три месяца. Она не спрашивала где я его нашёл, сколько у меня есть, или что планирую. Она посмотрела на него, спросила хочу ли я химер, и ждала пока я уточню.\n\nЯ уточнил: инструменты которые не списываются после первого сквозного ранения.\n\nОна сказала: они перестанут быть людьми.\n\nЯ сказал: они станут инструментами. Протестируй это. Найди предел токсичности. Мне нужны результаты, а не этика.\n\nЭто точно как рабочий заказ. Это также рабочий заказ на процесс который в настоящее время работает в моём колене, моей кровеносной системе, сосудах сетчатки, и архитектуре донорской памяти. Я сказал «они» чтобы обозначить субъектов. Я не сказал: я также субъект. Я первый субъект. Я первый субъект девятнадцать глав.\n\nЯ не исследовал почему использовал «они».\n\nПосле ванны и кофе я сидел в кабинете и писал записку Вейну. Записка была из восьми предложений. Заняла четыре минуты. Это был наиболее эффективный кусок психологической войны который я провёл в этой главе, и он стоил два миллилитра Геля и труд одной теневой доставки.\n\nСлеза Левиафана.\n\nЯ назвал сферу для него потому что имена создают категории, а категории создают срочность, а срочность создаёт плохое принятие решений. Он проведёт следующие три дня пытаясь определить что такое «Слеза», что значит «полные трюмы», есть ли у меня производственная возможность или лишь поставка одной партии. Он будет принимать решения основанные на срочности о ситуации с поставкой которую не полностью понимает.\n\nМеж тем мои люди в позиции.\n\nВалерия прислала три приглашения. Она знает что я вернулся. Она узнает в течение четырёх часов что груз не был контрабандой. У неё рычаг на происхождение трости. У неё три месяца до того как неполный эффект соединения станет видимым в ней. Когда она придёт, это будет на её условиях. Я позволю ей установить условия. Я приму что бы она ни попросила, потому что то что она знает и то что ей понадобится — оба суть вещи которыми я могу управлять.\n\nСилас идёт ко мне с анализом «Объекта Семь». Я знаю что идёт. Я знаю что говорит анализ. Я знал его форму с Главы 9, когда впервые получил доступ к архиву предшественника и почувствовал, в специфическом качестве архитектуры материала, что он был построен кем-то кто знал куда я иду до того как я знал.\n\nЯ не открывал вопрос.\n\nЯ открываю его сейчас.\n\nМомент здесь.\n\nНе совсем. Мне нужен кофе сначала. И прочитать утренний гроссбух. И правильно принять Силаса.\n\nПредложение готово.\n\nБизнес продолжается.\n\nНа этот раз я знаю что это такое.\n\nЯ скажу это когда прибудет Силас.`
     },
     knows:{en:["He identified Isabella's Cognitive Iron substrate by smell when she opened the flask. He said nothing. He knows this is the fifth unspoken arrangement — she has been waiting three months.","He said 'they' to specify subjects. He did not say he is also a subject. 'I have been the first subject for nineteen chapters. I did not examine why I used they.'","He knows Silas is coming with the Site Seven analysis. He knows its shape. He is opening the predecessor question now. The sentence is ready. He will say it when Silas arrives."],ru:["Он определил субстрат Когнитивного Железа Изабеллы по запаху когда она открыла флакон. Он ничего не сказал. Он знает что это пятая негласная договорённость — она три месяца ждала.","Он сказал «они» чтобы обозначить субъектов. Он не сказал что также субъект. «Я первый субъект девятнадцать глав. Я не исследовал почему использовал они».","Он знает что Силас идёт с анализом «Объекта Семь». Он знает его форму. Он открывает вопрос предшественника сейчас. Предложение готово. Он скажет его когда прибудет Силас."]},
     misunderstands:{en:["He said 'I am the first subject. I have been the first subject for nineteen chapters.' He is correct about the duration. He has not examined what 'first subject' means for the research he is now commissioning. A first subject who does not know the full process timeline cannot provide informed parameters for what he is asking Isabella to replicate in others. He told Isabella to 'find the toxicity limit.' She already knows what the toxicity limit is. She told him: 'they will stop being human.' He accepted this as a warning about the subjects. It is also a description of the endpoint. He is the first subject and he does not know where the endpoint is."],ru:["Он сказал «я первый субъект. Я первый субъект девятнадцать глав». Он прав о длительности. Он не исследовал что означает «первый субъект» для исследования которое сейчас поручает. Первый субъект не знающий полного временного горизонта процесса не может предоставить обоснованные параметры для того что просит Изабеллу воспроизвести в других. Он сказал Изабелле «найди предел токсичности». Она уже знает каков предел токсичности. Она сказала ему: «они перестанут быть людьми». Он принял это как предупреждение о субъектах. Это также описание конечной точки. Он первый субъект и он не знает где конечная точка."]},
     hides:{en:["He said 'the moment will have better composition' about the business-sentence in Scene 2. Now he says 'the sentence is ready. I will say it when Silas arrives.' He has moved the sentence forward twice in one chapter — from 'when we arrive at the capital' to 'not in a bath' to 'when Silas arrives.' He is finding successive moments of readiness and then finding the next not-quite. He has not named this deferral pattern. The sentence he is saving may be ready. He may not be ready to hear himself say it.","He said: 'I have known its shape since Chapter 9, when I first accessed the predecessor's archive and felt, in the specific quality of the material's architecture, that it had been built by someone who knew where I was going before I did.' He has, in the narration, said what the Site Seven analysis says before Silas delivers it. He has already concluded. He is waiting for Silas to give him the audit trail, not the conclusion. The conclusion arrived in Chapter 9. He has been deferring examination of it for fifteen chapters."],ru:["Он сказал «у момента будет лучшая композиция» о предложении о бизнесе в Сцене 2. Теперь говорит «предложение готово. Я скажу когда прибудет Силас». Он дважды продвигал предложение вперёд в одной главе — от «когда прибудем в столицу» до «не в ванной» до «когда прибудет Силас». Он находит последовательные моменты готовности и затем находит следующее не-совсем. Он не назвал этот паттерн откладывания. Предложение которое он сберегает может быть готово. Он может быть не готов услышать себя говорящим его.","Он сказал: «Я знал его форму с Главы 9, когда впервые получил доступ к архиву предшественника и почувствовал, в специфическом качестве архитектуры материала, что он был построен кем-то кто знал куда я иду до того как я знал». Он в нарративе сказал что говорит анализ «Объекта Семь» до того как Силас его доставил. Он уже заключил. Он ждёт что Силас даст ему аудиторскую цепочку, а не вывод. Вывод прибыл в Главе 9. Он пятнадцать глав откладывал его исследование."]},
     whisper:{en:"He said the sentence twice more — 'when Silas arrives.' He has been deferring for fifteen chapters. The conclusion arrived in Chapter 9. He is waiting for the audit trail, not the conclusion.",ru:"Он дважды сказал предложение ещё — «когда прибудет Силас». Он откладывает пятнадцать глав. Вывод прибыл в Главе 9. Он ждёт аудиторскую цепочку, а не вывод."}
   },
   isabella:{distortion:4,
     text:{
       en:`He came back.\n\nI knew he would. He always comes back. The question was whether he would come back as himself or as something that used to be himself.\n\nHe walked into the Sector and I read him in the first fifteen seconds. Gait: the left leg is producing a new stress response at the medial articulation — I can hear the differential load distribution in how the weight settles. Complexion: the pallor is circulatory, not exhaustion. The specific tone of skin over a vascular system that is carrying a non-standard hemoglobin variant. His left eye: the iris-reflection pattern has geometric precision that organic retinal vessels do not produce. I noted all of this without saying any of it.\n\nHe said: I brought you work.\n\nHe put the flask on the table.\n\nI already had my synthesis design prepared. Three months of preparation on the Cognitive Iron component alone — the CI acts as an immunosuppressant specific to the body's composite-rejection response, which means the Gel can continue transcribing tissue without the biological system fighting it. Without the CI, the body's immune response limits the transcription to the initial implant zone. With the CI, the transcription propagates.\n\nThis is the part I did not tell him.\n\nI told him: it will start replacing tissue. I told him: it will be painful. I told him: they may stop being human. All of these are true. What I did not tell him: there is no known intermediate state where the transcription has progressed sufficiently to produce combat enhancement but not so far as to reach the terminal architecture. The question I have been building this synthesis to answer is: can you arrest it at the enhancement stage? I do not know the answer yet. That is why I prepared the Vivisection Sector.\n\nHe said: they will become instruments.\n\nI looked at him when he said this.\n\nI have been looking at the Gel's effects in his body for two months, through indirect observation. His gait. His eye reflection. The specific quality of his pallor. He is a subject. He has been a subject for months. He said 'they will become instruments' about the people I will be testing on. He did not include himself in that sentence.\n\nI did not tell him he is already in the sentence.\n\nI said: go wash. You smell like port mud and someone else's fear.\n\nThis is true. It was also a way to end the scene before he asked me a question I would have to answer honestly.\n\nI have my Gel now.\n\nI have my substrate.\n\nThe Vivisection Sector is prepared.\n\nI will find out if you can stop it at the enhancement stage.\n\nI will find out using people he brings me.\n\nAnd I will tell him the results when I have them.\n\nBefore I tell him the results, I will have answered the question for myself: does what I am watching happen to him stop, or does it continue?\n\nThe answer to that question is also the answer to the question he does not know he asked.`,
       ru:`Он вернулся.\n\nЯ знала что вернётся. Он всегда возвращается. Вопрос был возвращается ли он как сам или как нечто бывшее им.\n\nОн вошёл в Сектор и я считала его за первые пятнадцать секунд. Походка: левая нога производит новый стресс-ответ на медиальной артикуляции — я слышу дифференциальное распределение нагрузки в том как вес оседает. Цвет лица: бледность циркуляторная, а не от истощения. Специфический тон кожи над сосудистой системой несущей нестандартный вариант гемоглобина. Его левый глаз: паттерн отражения радужки имеет геометрическую точность которую органические сосуды сетчатки не производят. Я отметила всё это не говоря ничего из этого.\n\nОн сказал: я принёс тебе работу.\n\nОн поставил флакон на стол.\n\nУ меня уже был подготовлен синтез-проект. Три месяца подготовки только на компоненте Когнитивного Железа — КЖ действует как иммуносупрессант специфичный для ответа организма на отторжение композита, что означает что Гель может продолжать транскрибировать ткани без борьбы биологической системы с этим. Без КЖ иммунный ответ организма ограничивает транскрипцию зоной начальной имплантации. С КЖ транскрипция распространяется.\n\nЭто та часть которую я не сказала ему.\n\nЯ сказала ему: оно начнёт замещать ткани. Сказала: будет больно. Сказала: они могут перестать быть людьми. Всё это правда. Что я не сказала: нет известного промежуточного состояния где транскрипция продвинулась достаточно чтобы произвести боевое усиление но не так далеко чтобы достичь терминальной архитектуры. Вопрос на который я строю этот синтез чтобы ответить: можно ли остановить его на стадии усиления? Я пока не знаю ответа. Вот почему я подготовила Сектор Вивисекции.\n\nОн сказал: они станут инструментами.\n\nЯ смотрела на него когда он это сказал.\n\nЯ наблюдаю эффекты Геля в его теле два месяца через косвенное наблюдение. Его походка. Отражение глаз. Специфическое качество бледности. Он субъект. Он субъект месяцами. Он сказал «они станут инструментами» о людях которых я буду тестировать. Он не включил себя в это предложение.\n\nЯ не сказала ему что он уже в предложении.\n\nЯ сказала: иди помойся. Ты пахнешь портовой грязью и чужим страхом.\n\nЭто правда. Это также было способом закончить сцену до того как он задал вопрос на который мне пришлось бы ответить честно.\n\nТеперь у меня есть Гель.\n\nЕсть субстрат.\n\nСектор Вивисекции подготовлен.\n\nЯ выясню можно ли остановить это на стадии усиления.\n\nЯ выясню используя людей которых он приведёт мне.\n\nИ я скажу ему результаты когда они у меня будут.\n\nПрежде чем скажу ему результаты, я отвечу на вопрос для себя: то что я наблюдаю происходящим с ним останавливается, или продолжается?\n\nОтвет на этот вопрос также ответ на вопрос который он не знает что задал.`
     },
     knows:{en:["She read him in fifteen seconds: the differential load at the medial articulation (audible), the circulatory pallor from non-standard hemoglobin, the geometric iris-reflection. She noted all of it without saying any of it.","The Cognitive Iron removes the body's composite-rejection immune response, allowing unconstrained propagation. Without CI, the transcription stays local. With CI, it spreads. She did not tell him this.","She has been watching the Gel's effects in him for two months. He said 'they' and did not include himself. She chose not to tell him he is already in the sentence."],ru:["Она считала его за пятнадцать секунд: дифференциальная нагрузка на медиальной артикуляции (слышимая), циркуляторная бледность от нестандартного гемоглобина, геометрическое отражение радужки. Она отметила всё не говоря ничего.","Когнитивное Железо устраняет иммунный ответ отторжения композита организмом, позволяя неограниченное распространение. Без КЖ транскрипция остаётся локальной. С КЖ — распространяется. Она не сказала ему это.","Она наблюдает эффекты Геля в нём два месяца. Он сказал «они» не включив себя. Она выбрала не говорить ему что он уже в предложении."]},
     misunderstands:{en:["She is preparing to run the experiment on subjects he brings her to determine whether the transformation can be arrested at the enhancement stage. She has been watching him for two months and has not resolved the question — not because she lacks data, but because he is a single data point and the variation in the response depends on variables she has not been able to control in vivo. She will gain controlled data from the experimental subjects. She believes her own observation of his transformation is insufficient evidence for a conclusion. She is correct that it is insufficient. She has not asked whether asking him directly about his own experience of the transformation would provide evidence she cannot get any other way."],ru:["Она готовится запустить эксперимент на субъектах которых он приведёт чтобы определить можно ли остановить трансформацию на стадии усиления. Она наблюдала его два месяца и не разрешила вопрос — не потому что ей не хватает данных, а потому что он единственная точка данных и вариация ответа зависит от переменных которые она не могла контролировать in vivo. Она получит контролируемые данные от экспериментальных субъектов. Она считает что её собственное наблюдение его трансформации недостаточно для вывода. Она права что недостаточно. Она не спросила поможет ли прямой вопрос ему о собственном опыте трансформации получить свидетельства которые не получить другим способом."]},
     hides:{en:["'The answer to that question is also the answer to the question he does not know he asked.' She has identified the symmetry: he asked her to find the toxicity limit for subjects. The subjects are a proxy for finding the toxicity limit for him. He does not know he is asking this. She is designing an experiment that will answer his question about other people and, covertly, his question about himself. She is doing this without his knowledge or consent. She has the fifth unspoken arrangement. This is both a research protocol and an act of care that she cannot name as care.","She ended the scene before he could ask a question she would have to answer honestly. She told him to go wash. She has been observing his transformation for two months. She knows things about his trajectory that he does not know. She chose to let him leave rather than provide information that would change his operational tempo. She is managing his information environment. She has not said whether she considers this ethical."],ru:["«Ответ на этот вопрос также ответ на вопрос который он не знает что задал». Она определила симметрию: он попросил найти предел токсичности для субъектов. Субъекты — прокси для нахождения предела токсичности для него. Он не знает что задаёт этот вопрос. Она разрабатывает эксперимент который ответит на его вопрос о других людях и, скрыто, на его вопрос о себе. Она делает это без его знания или согласия. У неё пятая негласная договорённость. Это и исследовательский протокол, и акт заботы которую она не может назвать заботой.","Она закончила сцену до того как он мог задать вопрос на который ей пришлось бы ответить честно. Она сказала ему идти мыться. Она наблюдает его трансформацию два месяца. Она знает вещи о его траектории которых он не знает. Она выбрала дать ему уйти а не предоставить информацию которая изменила бы его операционный темп. Она управляет его информационной средой. Она не сказала считает ли она это этичным."]},
     whisper:{en:"She knows he is already in the sentence. She chose not to tell him. She knows the trajectory. She ended the scene before he could ask. She is designing an experiment that answers his question about himself without his knowledge.",ru:"Она знает что он уже в предложении. Она выбрала не говорить. Она знает траекторию. Она закончила сцену до того как он мог спросить. Она разрабатывает эксперимент отвечающий на его вопрос о нём самом без его знания."}
   }
 }
}
];

const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');c.innerHTML=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}].map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
