.d3,.d4,.d5{animation:flicker-soft 14s infinite;}
.d6,.d7{animation:flicker-mid 7s infinite;}
.d8,.d9{animation:flicker-hard 4s infinite,glitch-mid 16s infinite;}

@keyframes flicker-soft{0%,94%,100%{opacity:1;}96%{opacity:.88;}}
@keyframes flicker-mid{0%,88%,100%{opacity:1;}90%{opacity:.75;}92%{opacity:.9;}93%{opacity:.68;}94%{opacity:1;}}
@keyframes flicker-hard{0%,80%,100%{opacity:1;}82%{opacity:.6;}83%{opacity:.9;}84%{opacity:.55;}85%{opacity:.85;}86%{opacity:.7;}87%{opacity:1;}}
@keyframes glitch-mid{0%,92%,100%{transform:none;filter:none;}93%{transform:translate(-3px,0);filter:drop-shadow(3px 0 rgba(255,0,0,.3));}94%{transform:translate(3px,0);filter:drop-shadow(-3px 0 rgba(0,100,255,.2));}95%{transform:translate(-1px,1px);}96%{transform:none;}}
@keyframes glitch-hard{0%,88%,100%{transform:none;filter:none;}89%{transform:translate(-4px,0) skewX(-1deg);filter:drop-shadow(4px 0 rgba(255,0,0,.4)) saturate(2);}90%{transform:translate(4px,-1px) skewX(1deg);filter:drop-shadow(-4px 0 rgba(0,150,255,.3));}91%{transform:translate(-2px,2px);filter:brightness(.7);}92%{transform:translate(1px,-1px);}93%{transform:none;filter:none;}}

const TIMELINE=[
  {id:"TET-45",en:"The Void-Blossom tea Dante drinks is not a luxury item. It is a mild Void-field sensitivity enhancer — it lowers the earring's detection threshold by approximately 12% for four to six hours after consumption. He has been drinking it daily for nine years. This is documented in the Guild's supply ledger as 'Operational Consumable: Sensitivity Enhancement, Class II.' Silas has been billing it to the operational budget at three times market cost and pocketing the difference.",ru:"Чай из Пустоцвета, который пьёт Данте, — не предмет роскоши. Это мягкий усилитель чувствительности к полю Пустоты — он снижает порог обнаружения серьги приблизительно на 12% в течение четырёх-шести часов после употребления. Он пьёт его ежедневно девять лет. Это задокументировано в книге поставок Гильдии как «Операционный Расходный Материал: Усиление Чувствительности, Класс II». Силас выставляет его счёт из операционного бюджета по тройной рыночной цене и присваивает разницу."},
  {id:"TET-46",en:"Mort was not always a lich. He was the last monarch of a dynasty that Dante's predecessor in the Auditor role arranged to collapse seventy years ago. The contract is in the Guild's sealed archive. Mort knows this. Dante knows Mort knows this. Neither has raised the subject in eleven years of employment. Mort's salary is paid from the interest on investments in the kingdom that replaced his dynasty. The arrangement is, by all operational metrics, stable.",ru:"Морт не всегда был личем. Он был последним монархом династии, крушение которой устроил предшественник Данте в роли Аудитора семьдесят лет назад. Контракт хранится в запечатанном архиве Гильдии. Морт знает об этом. Данте знает, что Морт знает. Ни один из них не поднимал этот вопрос за одиннадцать лет службы. Жалованье Морта выплачивается из процентов с инвестиций в королевство, заменившее его династию. Договорённость по всем операционным показателям стабильна."},
  {id:"TET-47",en:"Whisper is not a doppelganger who forgot their true face. Whisper chose to forget. They had a face, a name, a village, a mother. They remember all of these things. They remember them the way you remember a language you have decided to stop speaking: completely, and without use. The porcelain mask was not an operational modification. It was a personal decision made seventeen years ago at a location Whisper has not returned to since.",ru:"Шепот — не доппельгангер, забывший своё истинное лицо. Шепот выбрал забыть. У него было лицо, имя, деревня, мать. Он помнит всё это. Он помнит так, как помнят язык, на котором решили перестать говорить: полностью, и без использования. Фарфоровая маска не была оперативной модификацией. Это было личным решением, принятым семнадцать лет назад в месте, куда Шепот с тех пор не возвращался."},
  {id:"TET-48",en:"The Tarot card with the Spiral was not sent by an external party who learned of the Iron Peak operation. It was sent by the entity that the Breach connects to — which has known about the Iron Peak for thirteen months, has known about Dante's earring for longer, and has been observing the Guild's operations across three arcs of this book. The card is not a warning or a threat. It is an introduction. The entity has decided that Dante is ready to be addressed directly.",ru:"Карта Таро со Спиралью была отправлена не внешней стороной, узнавшей об операции в Железном Пике. Она была отправлена сущностью, с которой соединяется Брешь — которая знает о Железном Пике тринадцать месяцев, знает о серьге Данте дольше и наблюдает за операциями Гильдии на протяжении трёх арков этой книги. Карта — не предупреждение и не угроза. Это представление. Сущность решила, что Данте готов к прямому обращению."},
  {id:"TET-49",en:"Isabella's analysis of the Baron's armor alloy is correct: the metal remembers and responds to the wearer's thoughts. It is a Precursor-era material called in the suppressed technical literature 'Cognitive Iron' or, in older texts, 'The Obedient Substance.' There are eleven documented samples in the known world. Baron Caldor's constructs account for approximately eight hundred times that volume. Someone manufactured it at scale. The manufacturing process requires a Precursor-era forge and a specific sequence in the Covenant Objects archive — the same sub-section Cardinal Morius did not mention when offering Dante archive access.",ru:"Анализ Изабеллы сплава брони Барона верен: металл помнит и реагирует на мысли носителя. Это материал эпохи Предтечей, называемый в подавленной технической литературе «Когнитивным Железом» или в более старых текстах «Послушной Субстанцией». В известном мире задокументировано одиннадцать образцов. Конструкты барона Кальдора составляют приблизительно восемьсот таких объёмов. Кто-то производил это в масштабе. Производственный процесс требует кузницы эпохи Предтечей и специфической последовательности в архиве Объектов Завета — того же подраздела, который кардинал Мориус не упомянул, предлагая Данте доступ к архиву."},
  {id:"TET-50",en:"The crystal shard Dante took from Baron Caldor's control array is not a passive trophy. It is a functioning node of the Breach's distributed network — still active, still transmitting. Dante placed it in the desk drawer next to: a rusted gear (recovered from a Precursor site seven years ago, source of faint resonance he has not identified), a black angel feather (provenance unknown, acquired through a contract he does not discuss), and a vial of someone's breath (sealed at the moment of a specific death, the identity of the deceased not documented anywhere). All four objects are resonating with each other in the drawer at a frequency below the earring's standard detection threshold. The drawer has been warm for three hours.",ru:"Осколок кристалла, взятый Данте из пульта управления барона Кальдора, — не пассивный трофей. Это функционирующий узел распределённой сети Бреши — всё ещё активный, всё ещё передающий. Данте поместил его в ящик стола рядом с: ржавой шестерёнкой (обнаруженной на месте Предтечей семь лет назад, источник слабого резонанса, которого он не идентифицировал), чёрным пером ангела (происхождение неизвестно, приобретено через контракт, который он не обсуждает) и флаконом чьего-то дыхания (запечатанным в момент конкретной смерти, личность умершего нигде не задокументирована). Все четыре предмета резонируют друг с другом в ящике на частоте ниже стандартного порога обнаружения серьги. Ящик тёплый три часа."},
  {id:"TET-51",en:"Dante's formulation: 'someone who believes this world belongs to them by right of antiquity' — is the most precise description of the arc's primary antagonist available anywhere in the book. He arrived at this formulation through the pattern recognition he used throughout Arc II. He does not yet know the antagonist's name, their form, or the specific mechanism of their interest in the world. He knows the pattern. Pattern-recognition of this quality, applied to this class of entity, is the reason the earring exists.",ru:"Формулировка Данте: «тот, кто считает, что этот мир принадлежит ему по праву древности» — наиболее точное описание основного антагониста арка, доступное где-либо в книге. Он пришёл к этой формулировке через распознавание паттернов, использованное на протяжении Арка II. Он ещё не знает имени антагониста, его формы или конкретного механизма его интереса к миру. Он знает паттерн. Распознавание паттернов такого качества, применённое к этому классу сущностей, — причина существования серьги."},
  {id:"TET-52",en:"'The game has begun' — Dante's closing thought — is not accurate. The game began before Arc I. The Galahad operation in Aspherat, which appeared to be a straightforward client contract, was a probing move by the same entity: establishing whether the Guild's Auditor was capable of operating without the social scaffolding that supports most human decision-making. He passed the test. The Elara operation in the Green Frontier was a capability assessment: does the Auditor understand the difference between stopping a process and understanding what produced it? He passed this test too, though barely. The Iron Peak was the final qualification round. The Tarot card is the invitation to the actual game.",ru:"«Игра началась» — финальная мысль Данте — неточна. Игра началась до Арка I. Операция с Галахадом в Асферате, казавшаяся простым клиентским контрактом, была зондирующим ходом той же сущности: проверкой, способен ли Аудитор Гильдии работать без социальных строительных лесов, поддерживающих большинство человеческих решений. Он прошёл испытание. Операция с Эларой в Зелёном Пределе была оценкой возможностей: понимает ли Аудитор разницу между остановкой процесса и пониманием того, что его произвело? Он прошёл и это испытание, хотя едва. Железный Пик был финальным квалификационным раундом. Карта Таро — приглашение в настоящую игру."}
];

const SCENES=[

/* ─── SCENE 1: THE RETURN ─── */
{id:"s1",
 title:{en:"The Return",ru:"Возвращение"},
 subtitle:{en:"Every institution has a personality. The Guild's is dry.",ru:"У каждой институции есть характер. У Гильдии он сухой."},
 location:{en:"Road to Capital / Guild Courtyard",ru:"Дорога в Столицу / Двор Гильдии"},
 timing:{en:"Day After Iron Peak, Late Afternoon",ru:"День После Железного Пика, Вечер"},
 flags:["interlude","worldbuilding"],
 povData:{
   dante:{distortion:1,
     text:{
       en:`The return journey is operationally non-eventful. I use the time to draft three documents: the Morius invoice (final), the Iron Peak operational close-out report (summary version for institutional file, detailed version for my personal archive), and a preliminary threat-classification memo for what I am calling, internally, the Spiral.\n\nLisa is hanging upside down from the ceiling straps. She has been eating candied wyvern bones since the second coaching station. She offered me one. I declined. The nutritional profile is irrelevant to my decision.\n\nVarek occupies the opposite bench. His breathing has normalized. The Void-propagation that Lisa did not report to me — and which I identified from the rhythm shift at approximately the forty-minute mark of the gate assault — appears to have arrested. His skeletal architecture has done something I do not have a classification for. I will flag this for Isabella's attention before I file the operational summary.\n\nLisa asked about Caldor: whether he would be bored. The question is structurally interesting. She is asking whether a consciousness locked in a functional cycle retains the capacity for experience. The philosophical literature on this subject is extensive and unresolved. I told her he was busy.\n\nVarek asked what knocks on the door Caldor is holding. I told him: someone who doesn't pay their debts. He appeared satisfied by this. He is very good at not asking follow-up questions about things that would require answers he cannot use.\n\nThe Guild courtyard looked exactly as I left it. This is what a functional institution looks like. It does not change in proportion to the drama of your absence. It continues.\n\nMort was at the door. He has been at the door every time I have returned in eleven years. There is comfort in this that I have not examined.`,
       ru:`Обратный путь операционно не примечателен. Я использую время для составления трёх документов: счёта Мориусу (финальный), отчёта о закрытии операции в Железном Пике (краткая версия для институционального файла, детальная версия для личного архива) и предварительного меморандума о классификации угрозы для того, что я называю внутренне — Спиралью.\n\nЛиса висит вниз головой на потолочных ремнях. Она ест засахаренные кости виверны со второй почтовой станции. Она предложила мне одну. Я отказался. Питательный профиль не имеет отношения к моему решению.\n\nВарек занимает противоположную скамью. Его дыхание нормализовалось. Пустотное распространение, о котором Лиса не доложила мне — и которое я определил по смещению ритма приблизительно на сорок минутной отметке штурма ворот — по всей видимости, прекратилось. Его скелетная архитектура сделала что-то, для чего у меня нет классификации. Я выделю это для внимания Изабеллы до подачи операционного резюме.\n\nЛиса спросила о Кальдоре: будет ли ему скучно. Вопрос структурно интересный. Она спрашивает, сохраняет ли сознание, заблокированное в функциональном цикле, способность к переживанию. Философская литература по этому вопросу обширна и не разрешена. Я сказал ей, что он занят.\n\nВарек спросил, кто стучится в дверь, которую держит Кальдор. Я сказал ему: тот, кто не платит по долгам. Он казался удовлетворённым. Он очень хорошо не задаёт уточняющих вопросов о вещах, требующих ответов, которые он не может использовать.\n\nДвор Гильдии выглядел точно так же, как я его оставил. Вот как выглядит функциональная институция. Она не меняется пропорционально драматизму вашего отсутствия. Она продолжает работать.\n\nМорт был у двери. Он всегда у двери каждый раз, когда я возвращаюсь, одиннадцать лет. В этом есть комфорт, который я не исследовал.`
     },
     knows:{en:["He identified Lisa's non-report on Varek's propagation from the rhythm shift at minute forty — he did not confront her about it","Varek's arrested propagation is anomalous. He has flagged it for Isabella rather than closing it.","Mort has been at the door every return for eleven years. He has noted the comfort this produces and has not examined it."],ru:["Он определил недоклад Лисы о распространении Варека по смещению ритма на сорок минутной отметке — он не конфронтировал её","Арестованное распространение Варека аномально. Он выделил его для Изабеллы, а не закрыл.","Морт был у двери при каждом возвращении одиннадцать лет. Он отметил комфорт, который это производит, и не исследовал его."]},
     misunderstands:{en:["The Void-propagation in Varek did not arrest. It completed its integration into Varek's architecture. What Dante is reading as 'normalized breathing' is the result of a physiological change, not a return to baseline. Isabella will find this.","'There is comfort in this that I have not examined.' The examination would be straightforward. He has chosen not to perform it for the same reason he chose to tell the Twins about the collars."],ru:["Пустотное распространение в Вареке не прекратилось. Оно завершило интеграцию в архитектуру Варека. То, что Данте читает как «нормализованное дыхание», — результат физиологических изменений, а не возврат к базовому состоянию. Изабелла это обнаружит.","«В этом есть комфорт, который я не исследовал». Исследование было бы простым. Он выбрал не проводить его по той же причине, по которой выбрал рассказать Близнецам об ошейниках."]},
     hides:{en:["He knew Lisa did not report Varek's propagation. He has not raised this. The file notes 'rhythm shift identified at minute forty.' It does not say what he did with that identification during the operation.","He declined the wyvern bone for a reason he attributes to nutritional profile. The actual reason is that accepting it would have required him to look at Lisa, and he did not want to have the conversation her expression would have produced.","The Spiral memo: he has already classified this as a new contract category — 'Tier Unknown, Client: None, Threat: Existential, Billing: TBD.' He has never opened a file with billing TBD."],ru:["Он знал что Лиса не докладывала о распространении Варека. Он не поднял этот вопрос. Файл отмечает «смещение ритма определено на сорок минутной отметке». Не говорит, что он сделал с этим определением во время операции.","Он отказался от кости виверны по причине, которую приписывает питательному профилю. Реальная причина — принятие потребовало бы взгляда на Лису, а он не хотел разговора, который произвело бы её выражение.","Меморандум о Спирали: он уже классифицировал это как новую категорию контракта — «Уровень Неизвестен, Клиент: Нет, Угроза: Экзистенциальная, Выставление Счёта: ОУ». Он никогда не открывал файл с выставлением счёта ОУ."]},
     whisper:{en:"He has noted the comfort of Mort at the door. He has not examined it. This is a pattern in the book.",ru:"Он отметил комфорт от присутствия Морта у двери. Он не исследовал его. Это паттерн в книге."}
   },
   mort:{distortion:2,
     text:{
       en:`The Master returned at seventeen minutes past the fifth hour. This is within six minutes of my estimate, which was based on historical return-journey travel-time data across forty-three comparable operations.\n\nI have managed this household — which is a mild word for what the Guild's headquarters actually is — for eleven years. Before that I managed a somewhat larger household for three hundred and twelve years, until the arrangement became untenable. The Guild's arrangement is more tenable. The work is similar: logistics, personnel, procurement, the maintenance of operational continuity across situations that would unsettle lesser administrative frameworks.\n\nThe goose situation in the western wing had been resolved before the Master's arrival. I had considered resolving it myself, but the intervention of the large one (Varek) was structurally preferable: it provided him with a task calibrated to his current post-operation arousal level, and it produced an anecdote that Mistress Isabella will describe seventeen times in the next week, which is beneficial for her mood and therefore beneficial for laboratory productivity.\n\nI informed the Master of the goose upon his arrival because he would have noticed its absence from the kitchen and deduced an incident had occurred. Transparency maintained, operational intelligence intact.\n\nThe Master noticed something on his return that he did not notice on his departure: the small warmth emanating from the third desk drawer in the Emerald study. He noticed it. He did not comment on it. He placed the crystal fragment in the drawer and was still for two seconds before continuing.\n\nI have observed fifty-one operations in eleven years of service. I have never seen the Master be still for two seconds in proximity to a new piece of information without immediately processing it.\n\nI noted this in my household log under 'Anomalies — Behavioral.'\n\nThe tea was correct temperature. It is always the correct temperature.`,
       ru:`Мастер вернулся в семнадцать минут шестого часа. Это в пределах шести минут от моей оценки, основанной на исторических данных о времени обратного пути в сорока трёх сопоставимых операциях.\n\nЯ управляю этим домохозяйством — мягкое слово для того, чем на самом деле является штаб-квартира Гильдии — одиннадцать лет. До этого я управлял несколько большим домохозяйством триста двенадцать лет, пока договорённость не стала нежизнеспособной. Договорённость Гильдии более жизнеспособна. Работа аналогична: логистика, персонал, снабжение, поддержание операционной непрерывности в ситуациях, которые расшатали бы менее развитые административные рамки.\n\nСитуация с гусем в западном крыле была разрешена до возвращения Мастера. Я рассматривал собственное вмешательство, но вмешательство большого (Варека) структурно предпочтительнее: оно обеспечило ему задачу, откалиброванную под его текущий послеоперационный уровень возбуждения, и произвело анекдот, который Госпожа Изабелла будет описывать семнадцать раз на следующей неделе, что полезно для её настроения и следовательно для производительности лаборатории.\n\nЯ уведомил Мастера о гусе по прибытии, потому что он заметил бы его отсутствие на кухне и вывел бы что произошёл инцидент. Прозрачность сохранена, оперативная разведка цела.\n\nМастер заметил кое-что при возвращении, чего не заметил при отъезде: небольшое тепло, исходящее из третьего ящика стола в Изумрудном кабинете. Он заметил это. Он не комментировал. Он поместил осколок кристалла в ящик и оставался неподвижным две секунды прежде чем продолжить.\n\nЯ наблюдал пятьдесят одну операцию за одиннадцать лет службы. Я никогда не видел Мастера неподвижным две секунды в близости к новой информации без немедленной её обработки.\n\nЯ отметил это в журнале домохозяйства под «Аномалии — Поведенческие».\n\nЧай был правильной температуры. Он всегда правильной температуры.`
     },
     knows:{en:["The drawer was warm before the crystal was placed in it — meaning the other three objects were already resonating","The Master was still for two seconds. This is anomalous across fifty-one operations. He has filed it under Behavioral Anomalies.","The Varek intervention for the goose was optimal personnel management, not improvisation"],ru:["Ящик был тёплым до того, как в него поместили кристалл — значит, три других предмета уже резонировали","Мастер был неподвижен две секунды. Это аномально в пятидесяти одной операции. Он занёс это под Поведенческие Аномалии.","Вмешательство Варека в ситуацию с гусем было оптимальным управлением персоналом, а не импровизацией"]},
     misunderstands:{en:["He believes his position is equivalent to his previous one in scope, merely different in scale. It is not. He is not managing a kingdom. He is managing the institution that manages kingdoms. The scope inversion has not registered because the daily work is identical."],ru:["Он считает, что его нынешняя должность эквивалентна предыдущей по масштабу, просто отличается по размеру. Это не так. Он управляет не королевством. Он управляет институцией, управляющей королевствами. Инверсия масштаба не зарегистрировалась, потому что ежедневная работа идентична."]},
     hides:{en:["He has a household log that contains 'Anomalies — Behavioral' as a standing category. He has been maintaining this log for eleven years. He has never shown it to anyone. It contains observations that Veris's private chronicle does not contain — from a different angle, with different focus.","The Guild's contract that ended his dynasty is in his memory as precisely and completely as it is in the sealed archive. He replays one specific clause every morning before the Master wakes."],ru:["У него есть журнал домохозяйства с постоянной категорией «Аномалии — Поведенческие». Он ведёт этот журнал одиннадцать лет. Никому не показывал. Он содержит наблюдения, которых нет в частной летописи Вериса — под другим углом, с другим фокусом.","Контракт Гильдии, положивший конец его династии, хранится в его памяти так же точно и полно, как в запечатанном архиве. Он воспроизводит один конкретный пункт каждое утро до пробуждения Мастера."]},
     whisper:{en:"He replays one clause of the contract every morning. He has done this for eleven years. The tea is always the correct temperature.",ru:"Он воспроизводит один пункт контракта каждое утро. Он делает это одиннадцать лет. Чай всегда правильной температуры."}
   }
 }
},

/* ─── SCENE 2: BUREAUCRACY OF THE APOCALYPSE ─── */
{id:"s2",
 title:{en:"Bureaucracy of the Apocalypse",ru:"Бюрократия Апокалипсиса"},
 subtitle:{en:"The Emerald study. Two professionals report. One envelope.",ru:"Изумрудный кабинет. Два профессионала докладывают. Один конверт."},
 location:{en:"The Emerald Study, Guild HQ",ru:"Изумрудный Кабинет, Штаб-Квартира Гильдии"},
 timing:{en:"Evening, Same Day",ru:"Вечер, Тот же День"},
 flags:["pivotal","revelation","foreshadowing"],
 povData:{
   dante:{distortion:2,
     text:{
       en:`Morius's objection to the Caldor outcome was predicted and is not operationally significant. His contractual claim hinges on the word 'neutralize.' I will note in my response that neutralization was achieved at a level of operational completeness that execution would not have provided — a dead Caldor removes the Breach's dedicated containment and produces a cascading regional failure within six weeks. The Cardinal authorized the operation; he did not specify the technical approach. This is standard contract language and he knows it.\n\nThe five percent discount on the next heresy-suppression cycle is a concession that costs me nothing. He will take it. Men of principle always take discounts.\n\nI placed the crystal in the drawer while reviewing the Whisper's preliminary brief. The drawer was warmer than it should have been. I noted this without external acknowledgment. I have three other objects in that drawer. Their resonance profiles are not relevant to current operations. I will review the combined field interaction after closing the chapter.\n\nThe envelope.\n\nThe envelope was made of treated human skin — technically a craft material available from three Guild-adjacent suppliers, not unusual in itself. The paper inside was made from something that is not paper. The earring recognized it before I touched it: not deception, not Void-field in the conventional sense, not Precursor-era technology in any form I have catalogued. It was older than all of these categories and the earring's response was not its standard alert. It was something I have not had a word for in twenty-one years of operation, and I arrived at one in the moment the card was fully in my hand.\n\nFamiliarity.\n\nThe Spiral is a symbol I identified in pre-linguistic grave inscription archaeology during the research phase for my second major operation. It predates human writing by between twelve and forty thousand years depending on the site. It has always been associated with one concept: the moment before something that was absent returns.\n\nSomeone who knows where the Breach is and is glad we left it with active containment rather than sealed. Someone who wanted it contained, not closed. Someone for whom containment is the better option — which means someone who needs access to it to remain viable.\n\nThe game board just showed me a piece I did not know was in play.\n\nI will begin preliminary research tonight. The Void-Blossom tea will help.\n\nBusiness continues. The definition of business has just changed.`,
       ru:`Возражение Мориуса против исхода с Кальдором было предсказано и операционно не значимо. Его контрактное требование опирается на слово «нейтрализовать». Я отмечу в ответе, что нейтрализация была достигнута на уровне операционной полноты, которую ликвидация не обеспечила бы — мёртвый Кальдор устраняет выделенное сдерживание Бреши и производит каскадный региональный сбой в течение шести недель. Кардинал авторизовал операцию; он не указал технический подход. Это стандартный язык контракта, и он это знает.\n\nПятипроцентная скидка на следующий цикл подавления ереси — уступка, не стоящая мне ничего. Он примет её. Принципиальные люди всегда принимают скидки.\n\nЯ поместил кристалл в ящик при просмотре предварительного брифинга Шепота. Ящик был теплее, чем должен. Я отметил это без внешнего признания. В этом ящике у меня три других предмета. Их профили резонанса не релевантны текущим операциям. Я рассмотрю совокупное взаимодействие поля после закрытия главы.\n\nКонверт.\n\nКонверт был сделан из обработанной человеческой кожи — технически крафтовый материал, доступный у трёх поставщиков, смежных с Гильдией, само по себе не необычное. Бумага внутри была сделана из чего-то, что не является бумагой. Серьга узнала её прежде, чем я прикоснулся: не обман, не поле Пустоты в обычном смысле, не технология Предтечей в какой-либо форме, которую я каталогизировал. Это было старее всех этих категорий, и реакция серьги была не её стандартной тревогой. Это было то, для чего у меня не было слова двадцать один год операций, и я пришёл к нему в момент, когда карта была полностью в руке.\n\nУзнавание.\n\nСпираль — символ, который я определил в доисторической археологии захоронений в исследовательской фазе моей второй крупной операции. Она предшествует человеческой письменности на двенадцать-сорок тысяч лет в зависимости от места. Она всегда ассоциировалась с одной концепцией: моментом прежде чем что-то отсутствовавшее возвращается.\n\nКто-то, знающий где Брешь и рад, что мы оставили её с активным сдерживанием, а не запечатанной. Кто-то хотел сдерживания, а не закрытия. Кто-то, для кого сдерживание — лучший вариант — значит кто-то, кому нужен к ней доступ чтобы оставаться жизнеспособным.\n\nИгровая доска только что показала мне фигуру, о которой я не знал, что она в игре.\n\nЯ начну предварительное исследование сегодня вечером. Чай из Пустоцвета поможет.\n\nБизнес продолжается. Определение бизнеса только что изменилось.`
     },
     knows:{en:["The earring's response to the card was not its standard alert — he named the new response: 'familiarity.' First use of this category in twenty-one years.","The Spiral symbol predates human writing by 12-40k years, always associated with 'the moment before something absent returns' — this is his own archaeological research from his second operation","Someone wanted the Breach contained, not sealed — containment preserves access. He has identified this correctly."],ru:["Реакция серьги на карту была не стандартной тревогой — он назвал новую реакцию: «узнавание». Первое использование этой категории за двадцать один год.","Символ Спирали предшествует человеческой письменности на 12-40 тысяч лет, всегда связан с «моментом прежде чем что-то отсутствовавшее возвращается» — это его собственные археологические исследования со второй операции","Кто-то хотел сдерживания Бреши, а не закрытия — сдерживание сохраняет доступ. Он идентифицировал это верно."]},
     misunderstands:{en:["'The game board just showed me a piece I did not know was in play.' — The piece was shown to him at the start of Arc I. He operated three arcs as an observed subject before being addressed directly. He knows something began. He does not know when.","'The definition of business has just changed.' — The definition changed in the carriage after Iron Peak when he wrote 'It must be sufficient.' This is a refinement, not an origination."],ru:["«Игровая доска только что показала мне фигуру, о которой я не знал, что она в игре». — Фигуру ему показали в начале Арка I. Он провёл три арка как наблюдаемый субъект прежде чем к нему обратились напрямую. Он знает что что-то началось. Не знает когда.","«Определение бизнеса только что изменилось». — Определение изменилось в карете после Железного Пика когда он написал «Этого должно быть достаточно». Это уточнение, а не начало."]},
     hides:{en:["The word 'familiarity' — what the earring produced. He has not told Whisper what the earring's response was. He told Whisper the card 'fizzed.' He used a neutral operational term for an experience that has no operational category.","He said 'the Void-Blossom tea will help' — for the first time explicitly acknowledging a connection between the tea and his operational capability. He has been doing this for nine years. He named it tonight.","He will begin research tonight. He has already begun. He began during the Whisper briefing. Three new files were opened in the mental archive before Whisper finished speaking."],ru:["Слово «узнавание» — то, что производила серьга. Он не сказал Шепоту какой была реакция серьги. Он сказал Шепоту что карта «фонила». Он использовал нейтральный операционный термин для переживания, не имеющего операционной категории.","Он сказал «чай из Пустоцвета поможет» — впервые явно признав связь между чаем и своими операционными возможностями. Он делает это девять лет. Он назвал это сегодня вечером.","Он начнёт исследование сегодня вечером. Он уже начал. Он начал во время брифинга Шепота. Три новых файла были открыты в ментальном архиве до того, как Шепот закончил говорить."]},
     whisper:{en:"The earring said 'familiarity.' He told Whisper it 'fizzed.' He has been doing this work for twenty-one years. He still has things he does not tell his intelligence chief.",ru:"Серьга сказала «узнавание». Он сказал Шепоту что она «фонила». Он делает эту работу двадцать один год. У него всё ещё есть вещи, которые он не говорит своему главе разведки."}
   },
   whisper:{distortion:3,
     text:{
       en:`I delivered three items. The Morius political situation, the crystal analysis preliminary (pending full assay), and the envelope.\n\nFor the first two items the Master's processing was standard: intake, calculation, preliminary conclusion, instruction. I have observed this sequence across forty-seven briefings. The timing varies by approximately four percent between operations depending on complexity. Tonight's first two items were processed within the expected range.\n\nThe envelope was not.\n\nHe touched it and was still for one-point-six seconds before opening it. The Master is still between items when transitioning between cognitive tasks — a loading pause, essentially, while he reassigns processing resources. One-point-six seconds is not a loading pause. It is a response.\n\nHe described the card's emanation as 'fizzing.' I catalogued this word. In eleven years of intelligence briefings, the Master has used fourteen distinct descriptors for different kinds of anomalous field-emanation, ranging from 'cold' (standard Void-proximity) to 'pressure' (distributed consciousness fields) to 'static' (Precursor-era artifacts). 'Fizzing' is not on this list.\n\nHe is either describing a new category of emanation he has not encountered before, or he is using a word that is less precise than what he actually experienced, because the precise word is one he does not want to put into a briefing record.\n\nI know which of these is true. I do not collect information I cannot verify, but I do note which way the evidence points.\n\nHe connected the envelope to the Iron Peak operation immediately and precisely. The connection I had identified required four hours of archive research and three consultations with the historical cartography section. He made it in approximately ninety seconds.\n\nI noted this in the intelligence log as: 'Master's pattern-recognition exceeds available data support. Possible additional information source not disclosed to Intelligence.'\n\nI did not ask him what his information source was. He would have told me if he wanted me to know.`,
       ru:`Я доложил три пункта. Политическую ситуацию с Мориусом, предварительный анализ кристалла (ожидает полной оценки) и конверт.\n\nДля первых двух пунктов обработка Мастера была стандартной: приём, расчёт, предварительный вывод, инструкция. Я наблюдал эту последовательность в сорока семи брифингах. Время варьируется приблизительно на четыре процента между операциями в зависимости от сложности. Первые два пункта сегодня вечером были обработаны в ожидаемом диапазоне.\n\nКонверт — нет.\n\nОн прикоснулся к нему и оставался неподвижным одну целую шесть десятых секунды прежде чем открыть. Мастер неподвижен между пунктами при переходе между когнитивными задачами — пауза загрузки по сути, пока он перераспределяет вычислительные ресурсы. Одна целая шесть десятых секунды — не пауза загрузки. Это реакция.\n\nОн описал эманацию карты как «фонящую». Я каталогизировал это слово. За одиннадцать лет разведывательных брифингов Мастер использовал четырнадцать различных дескрипторов для разных видов аномальной эманации поля, от «холодный» (стандартная близость Пустоты) до «давление» (поля распределённого сознания) до «статичный» (артефакты эпохи Предтечей). «Фонящий» не в этом списке.\n\nОн либо описывает новую категорию эманации, с которой не сталкивался раньше, либо использует слово, менее точное чем то, что он на самом деле испытал, потому что точное слово — то, которое он не хочет вносить в запись брифинга.\n\nЯ знаю, которое из двух верно. Я не собираю информацию, которую не могу верифицировать, но отмечаю, в какую сторону указывают свидетельства.\n\nОн связал конверт с операцией в Железном Пике немедленно и точно. Связь, которую я определил, потребовала четырёх часов архивных исследований и трёх консультаций с разделом исторической картографии. Он сделал это приблизительно за девяносто секунд.\n\nЯ отметил это в журнале разведки как: «Распознавание паттернов Мастера превышает доступную информационную поддержку. Возможный дополнительный источник информации, не раскрытый Разведке».\n\nЯ не спросил его какой источник информации. Он сказал бы мне если бы хотел чтобы я знал.`
     },
     knows:{en:["The 1.6-second pause was a response, not a loading pause — he has timed all 47 briefings and knows the baseline to two decimal places","'Fizzing' is not in Dante's established 14-descriptor vocabulary for anomalous field emanation — he has catalogued all previous uses","The Master's connection speed on the Spiral exceeded available data support by approximately 3x — he has logged this as a possible undisclosed intelligence source"],ru:["Пауза в 1,6 секунды была реакцией, а не паузой загрузки — он рассчитал время всех 47 брифингов и знает базовый уровень до двух знаков после запятой","«Фонящий» — не в установленном словаре из 14 дескрипторов Данте для аномальной эманации поля — он каталогизировал все предыдущие случаи","Скорость соединения Мастера по Спирали превысила доступную информационную поддержку приблизительно в 3 раза — он зарегистрировал это как возможный нераскрытый источник разведки"]},
     misunderstands:{en:["'I did not ask him what his information source was. He would have told me if he wanted me to know.' — This framing protects the relationship. It also misses: the Master sometimes does not tell Whisper things not because he doesn't want Whisper to know, but because he doesn't yet know how to describe them."],ru:["«Я не спросил его какой источник информации. Он сказал бы мне если бы хотел чтобы я знал». — Эта формулировка защищает отношения. Она также упускает: Мастер иногда не говорит Шепоту вещи не потому что не хочет чтобы тот знал, а потому что ещё не знает как их описать."]},
     hides:{en:["Whisper knows the word 'fizzing' was not accurate. Whisper has decided not to press this because pressing it would require the Master to either lie more precisely or reveal something he is not ready to name. Whisper is protecting him from that choice.","The intelligence log entry — 'possible additional information source not disclosed to Intelligence' — is the most diplomatic notation in the log. What it actually means: he already has the source. It arrived with the earring."],ru:["Шепот знает что слово «фонящий» было неточным. Шепот решил не давить на это, потому что давление потребовало бы от Мастера либо лгать точнее, либо раскрыть что-то, к называнию чего он не готов. Шепот защищает его от этого выбора.","Запись в журнале разведки — «возможный дополнительный источник информации, не раскрытый Разведке» — наиболее дипломатичная нотация в журнале. Реальное значение: источник у него уже есть. Он пришёл вместе с серьгой."]},
     whisper:{en:"He knows 'fizzing' was wrong. He chose not to press it. He is protecting Dante from having to name something he cannot name yet.",ru:"Он знает что «фонящий» было неправильным. Он выбрал не давить. Он защищает Данте от необходимости называть то, что тот пока не может назвать."}
   }
 }
},

/* ─── SCENE 3: THE PATTERN ─── */
{id:"s3",
 title:{en:"The Pattern",ru:"Паттерн"},
 subtitle:{en:"Isabella finds the blueprint. Dante names the player.",ru:"Изабелла находит чертёж. Данте называет игрока."},
 location:{en:"The Emerald Study — Late Evening",ru:"Изумрудный Кабинет — Поздний Вечер"},
 timing:{en:"One Hour After Scene Two",ru:"Час После Второй Сцены"},
 flags:["revelation","arc_open"],
 povData:{
   dante:{distortion:2,
     text:{
       en:`Isabella's analysis closes the loop on the Caldor operation and opens something considerably larger.\n\nCognitive Iron. The Obedient Substance. I knew the material from a footnote in a technical annex to the Covenant Objects classification — a sub-section that Cardinal Morius specifically declined to mention when he offered me archive access. I did not know it could be manufactured at the scale Caldor's operation required. I did not know anyone had the Precursor-era forge infrastructure for this. I filed this gap eleven months ago after reviewing the classified annex independently. I had no client for the question and no mechanism to pursue it.\n\nI have a mechanism now.\n\nThe pattern:\n\nGalahad. Legitimate operation, legitimate problem — genuine liberation, genuine tyranny. But the economic cascade that followed was not a natural consequence of Galahad's governance failure. It was accelerated. Someone bought the orc clan's cooperation ahead of time, establishing the guarantee that the Aspherat situation would require a correction. The correction required the Guild. The Guild observed: Auditor can operate without institutional validation. File opened.\n\nElara. Legitimate artifact. Genuine druidess. But who moved the Seed of Changes to a catacomb accessible to a Circle of Life novice? Artifacts of that classification do not migrate. They are placed. Someone placed it within her reach and waited. The correction required the Guild. The Guild observed: Auditor understands the difference between stopping a process and understanding it. File updated.\n\nCaldor. Genuine Breach. Genuine engineering solution. But Cognitive Iron at scale requires Precursor-era manufacturing infrastructure that no currently documented power possesses. Someone gave Caldor the blueprints and the material. The correction required the Guild. The Guild observed: Auditor will operate against an entity whose deception he cannot detect. File updated.\n\nThree operations. Three setups. Three observations. Someone is building a profile of my capabilities and limits — using real crises, real consequences, real people as the experimental substrate.\n\nThe Tarot card is not a threat. It is a grade.\n\nI passed.\n\nThe question I am sitting with — the one I will carry into Arc III and which the Void-Blossom tea is not helping with — is this:\n\nIf someone went to this much trouble to verify what I can do, they want to hire me for something. And whatever requires this level of vetting cannot be billed at any rate I have a category for.\n\nSomeone very old has very big problems.\n\nBusiness continues.\n\nI close my eyes. In the darkness of my mind, at the edge of perception, I feel someone far away turn over the hourglass.\n\nThe game has begun.`,
       ru:`Анализ Изабеллы закрывает петлю на операции с Кальдором и открывает что-то значительно большее.\n\nКогнитивное Железо. Послушная Субстанция. Я знал материал из сноски в техническом приложении к классификации Объектов Завета — подраздел, который кардинал Мориус специально не упомянул, предлагая мне архивный доступ. Я не знал что его можно производить в масштабах, требуемых операцией Кальдора. Я не знал, есть ли у кого-то кузнечная инфраструктура эпохи Предтечей для этого. Я занёс этот разрыв одиннадцать месяцев назад после самостоятельного ознакомления с засекреченным приложением. У меня не было клиента для этого вопроса и механизма для его проработки.\n\nТеперь у меня есть механизм.\n\nПаттерн:\n\nГалахад. Законная операция, законная проблема — подлинное освобождение, подлинная тирания. Но экономический каскад, последовавший за этим, не был естественным следствием управленческого сбоя Галахада. Он был ускорен. Кто-то заранее купил сотрудничество клана орков, установив гарантию того, что ситуация в Асферате потребует коррекции. Коррекция потребовала Гильдии. Гильдия наблюдала: Аудитор может работать без институциональной валидации. Файл открыт.\n\nЭлара. Законный артефакт. Подлинная друидка. Но кто переместил Семя Изменений в катакомбу, доступную новичку Круга Жизни? Артефакты такой классификации не мигрируют. Их помещают. Кто-то поместил его в её досягаемость и ждал. Коррекция потребовала Гильдии. Гильдия наблюдала: Аудитор понимает разницу между остановкой процесса и его пониманием. Файл обновлён.\n\nКальдор. Подлинная Брешь. Подлинное инженерное решение. Но Когнитивное Железо в масштабе требует производственной инфраструктуры эпохи Предтечей, которой нет ни у одной из документально подтверждённых сил. Кто-то дал Кальдору чертежи и материал. Коррекция потребовала Гильдии. Гильдия наблюдала: Аудитор будет работать против сущности, обман которой он не может обнаружить. Файл обновлён.\n\nТри операции. Три подготовки. Три наблюдения. Кто-то строит профиль моих возможностей и пределов — используя реальные кризисы, реальные последствия, реальных людей как экспериментальный субстрат.\n\nКарта Таро — не угроза. Это оценка.\n\nЯ прошёл.\n\nВопрос, с которым я сижу — тот, с которым я войду в Арк III и которому чай из Пустоцвета не помогает — таков:\n\nЕсли кто-то затратил столько усилий на проверку того, что я умею, — он хочет нанять меня для чего-то. И то, что требует такого уровня проверки, не может быть выставлено по счёту ни по одной ставке, для которой у меня есть категория.\n\nКто-то очень древний имеет очень большие проблемы.\n\nБизнес продолжается.\n\nЯ закрываю глаза. В темноте моего сознания, на краю восприятия, я чувствую как кто-то вдалеке переворачивает песочные часы.\n\nИгра началась.`
     },
     knows:{en:["The Cognitive Iron sub-section in the Covenant Objects classification — he read this independently eleven months ago and filed the gap then. Morius's omission of it confirmed the connection.","Three-arc pattern analysis: Galahad (orc cooperation pre-purchased), Elara (Seed moved to accessible location), Caldor (blueprints and material provided). All three used the Guild as the correction mechanism. All three observed a specific capability.","The card is a grade, not a threat. He passed. Something is about to hire him for a contract he has no billing category for."],ru:["Подраздел Когнитивного Железа в классификации Объектов Завета — он прочитал это самостоятельно одиннадцать месяцев назад и занёс разрыв тогда. Упущение Мориуса подтвердило связь.","Паттерн-анализ трёх арков: Галахад (сотрудничество орков куплено заранее), Элара (Семя перемещено в доступное место), Кальдор (чертежи и материал предоставлены). Все три использовали Гильдию как механизм коррекции. Все три наблюдали конкретную возможность.","Карта — оценка, не угроза. Он прошёл. Что-то собирается нанять его по контракту, для которого у него нет категории выставления счёта."]},
     misunderstands:{en:["'The game has begun.' This is his conclusion and it is structurally wrong in one direction: the game did not begin when the card arrived. It began in Aspherat. He was already a player before he knew he was playing.","'Someone very old has very big problems.' He is correct about both attributes. He is incorrect about the category — 'problems' implies that the entity's situation is a deviation from a desired state. What the entity is managing is not a deviation. It is the return to the state it considers default. This distinction will matter in Arc III."],ru:["«Игра началась». Это его вывод, и он структурно неверен в одном направлении: игра не началась когда пришла карта. Она началась в Асферате. Он уже был игроком прежде чем знал что играет.","«Кто-то очень древний имеет очень большие проблемы». Он прав насчёт обоих атрибутов. Он неверен насчёт категории — «проблемы» подразумевает что ситуация сущности является отклонением от желаемого состояния. То, чем управляет сущность, — не отклонение. Это возвращение к состоянию, которое она считает по умолчанию. Это различие будет иметь значение в Арке III."]},
     hides:{en:["He said 'the game has begun' and he is keeping this framing. The alternative framing — 'I have been in the game since Arc I and the game has just acknowledged me' — is available to him and more accurate and more frightening. He chose the one that positions him as responding, not as having been moved.","The three-operation profile he has assembled is correct in its pattern and wrong in one detail: the entity did not only observe his capabilities. It also observed what he values. Galahad: will Dante leave someone who means well in the ruins of what they caused? Yes. Elara: will Dante stand at the edge of irreversible harm and not intervene? Yes. Caldor: will Dante leave a living person in permanent conscious imprisonment if it solves the larger problem? Yes. The entity is not hiring an operator. It is hiring a specific kind of person."],ru:["Он сказал «игра началась» и сохраняет эту формулировку. Альтернативная — «я был в игре с Арка I и игра только что признала меня» — доступна ему, более точна и более пугающа. Он выбрал ту, которая позиционирует его как реагирующего, а не как уже ходившего.","Профиль трёх операций, который он собрал, верен в паттерне и неверен в одной детали: сущность не только наблюдала его возможности. Она также наблюдала что он ценит. Галахад: оставит ли Данте того, кто желает добра, в руинах причинённого им? Да. Элара: встанет ли Данте на краю необратимого вреда и не вмешается? Да. Кальдор: оставит ли Данте живого человека в постоянном осознанном заключении если это решает большую проблему? Да. Сущность нанимает не оператора. Она нанимает человека определённого рода."]},
     whisper:{en:"He built the three-arc pattern correctly. He missed one detail: the entity was not only testing what he can do. It was testing what he will do.",ru:"Он правильно построил паттерн трёх арков. Он упустил одну деталь: сущность проверяла не только что он умеет. Она проверяла что он будет делать."}
   },
   isabella:{distortion:3,
     text:{
       en:`The alloy samples from the Baron's construct-knights have been the most interesting material I have encountered in fourteen years of alchemical practice, and I include in this the year I spent studying a living philosopher's stone that was also, inconveniently, sentient and opinionated about the tests I ran on it.\n\nStandard metallurgical analysis produced nothing. The alloy has no crystalline structure I recognize. Under the transmutation scope it shows something I can only describe as: the memory of intention. Not the object's history — metals have that, it is called resonance-residue and I can read it routinely. This is different. This is the metal responding to what I am thinking about it while I examine it. When I thought 'iron,' it shifted toward iron-behavior. When I thought 'what are you,' it — and I am noting this for the technical record — became briefly warm and organized itself into a finer grain.\n\nI went to the suppressed technical literature section. Mort helped me locate the relevant volumes — he is very good at finding things, which I suspect is because he has spent a great deal of time being the thing that things get found in relation to. The Obedient Substance. Cognitive Iron. Pre-Sundering Precursor manufacture, eleven documented samples, production process requiring a Class-Seven forge and a specific instruction sequence classified under Covenant Objects.\n\nEleven samples in the known world. I calculated the volume of material used in the Baron's operation.\n\nThe number I arrived at is not possible if you are working from the eleven samples.\n\nSomeone manufactured it. Not adapted it, not synthesized a similar compound — manufactured Cognitive Iron from the original process. That process is in the Covenant Objects archive. That archive has one person authorized to access its restricted sub-sections: the Master, via the Cardinal's offer, which he has not yet used.\n\nI told the Master the metal 'remembers.' I did not tell him the full implication, because I am a scientist and I only report what I can demonstrate. What I can demonstrate is the memory. What I can demonstrate implies: someone has been running Precursor-era manufacturing processes in a location we have not identified, at a scale we have not noticed, for a time period I estimate at between forty and one hundred and twenty years.\n\nThe snakes agreed with my analysis. They are usually right about these things.\n\nAlso: the goose was excellent. Varek did not leave any for me. This is a laboratory safety issue and I am logging it as such.`,
       ru:`Образцы сплава из рыцарей-конструктов Барона были наиболее интересным материалом, с которым я сталкивалась за четырнадцать лет алхимической практики, и я включаю в это год, проведённый за изучением живого философского камня, который был также, что неудобно, разумен и имел мнения о проводимых мной тестах.\n\nСтандартный металлургический анализ ничего не дал. Сплав не имеет кристаллической структуры, которую я узнаю. Под прицелом трансмутации он показывает что-то, что я могу описать только как: память намерения. Не историю объекта — металлы имеют её, это называется остаточный резонанс, и я читаю его рутинно. Это другое. Это металл, реагирующий на то, о чём я думаю во время его изучения. Когда я думала «железо», он смещался к железо-подобному поведению. Когда я думала «что ты такое», он — и я отмечаю это для технического протокола — стал ненадолго тёплым и организовался в более мелкое зерно.\n\nЯ обратилась к разделу подавленной технической литературы. Морт помог мне найти соответствующие тома — он очень хорошо находит вещи, что я подозреваю потому что он провёл много времени, будучи вещью, в связи с которой вещи находят. Послушная Субстанция. Когнитивное Железо. Производство Предтечей до-Раскольного периода, одиннадцать задокументированных образцов, производственный процесс требующий кузницы Класса Семь и специфической последовательности инструкций, классифицированной под Объектами Завета.\n\nОдиннадцать образцов в известном мире. Я рассчитала объём материала, использованного в операции Барона.\n\nЧисло, к которому я пришла, невозможно если работать с одиннадцатью образцами.\n\nКто-то его производил. Не адаптировал, не синтезировал аналогичное соединение — производил Когнитивное Железо из оригинального процесса. Этот процесс находится в архиве Объектов Завета. У этого архива есть один человек, уполномоченный для доступа к его закрытым подразделам: Мастер, через предложение Кардинала, которым он ещё не воспользовался.\n\nЯ сказала Мастеру что металл «помнит». Я не сказала ему полную импликацию, потому что я учёный и докладываю только то, что могу продемонстрировать. Что я могу продемонстрировать — это память. То, что я могу продемонстрировать, подразумевает: кто-то ведёт производственные процессы эпохи Предтечей в месте, которое мы не идентифицировали, в масштабе, который мы не заметили, в течение периода времени, который я оцениваю между сорока и ста двадцатью годами.\n\nЗмеи согласились с моим анализом. Обычно они правы в таких вещах.\n\nТакже: гусь был превосходным. Варек не оставил мне ничего. Это вопрос лабораторной безопасности, и я регистрирую его как таковой.`
     },
     knows:{en:["Cognitive Iron responds to the examiner's thoughts in real-time — she demonstrated this in her own analysis session","The volume used in Caldor's operation is impossible from the eleven documented samples — someone manufactured it at scale","The production process requires the Covenant Objects archive, which Dante can access via Morius's offer — which he has not yet used"],ru:["Когнитивное Железо реагирует на мысли исследователя в реальном времени — она продемонстрировала это в собственной аналитической сессии","Объём, использованный в операции Кальдора, невозможен из одиннадцати задокументированных образцов — кто-то производил его в масштабе","Производственный процесс требует архива Объектов Завета, к которому Данте может получить доступ через предложение Мориуса — которым он ещё не воспользовался"]},
     misunderstands:{en:["She reports the material 'memory of intention' as a purely physical phenomenon. It is also a communication mechanism — the metal becomes warm and fine-grained when asked 'what are you' because it is answering. She did not pursue this interpretation because it falls outside her analytical framework.","She estimates the manufacturing timeline at 40-120 years. The actual timeline is longer. The lower estimate assumes continuous operation. The operation has not been continuous."],ru:["Она докладывает «память намерения» материала как чисто физическое явление. Это также механизм коммуникации — металл становится тёплым и мелкозернистым когда его спрашивают «что ты такое», потому что отвечает. Она не продолжила эту интерпретацию потому что она выходит за пределы её аналитической рамки.","Она оценивает временной горизонт производства в 40-120 лет. Реальный горизонт длиннее. Нижняя оценка предполагает непрерывную работу. Операция не была непрерывной."]},
     hides:{en:["She did not tell the Master the full implication because she is 'a scientist who only reports what she can demonstrate.' The implication she did not report: the manufacturing location is not unknown to everyone. It is unknown to the Guild. The process requires infrastructure that only one known site could have hosted — a site that was mapped by Church cartographers and subsequently suppressed in the same file suppression that Morius used to hide the Iron Peak anomaly.","The snakes' agreement is not rhetorical. They respond to deep field-resonance. Their agreement means the material's signature matches something they have encountered before — in her laboratory, in a specific sample she acquired six years ago from a contact she has not named to anyone including Dante."],ru:["Она не сообщила Мастеру полную импликацию потому что она «учёный, докладывающий только то, что может продемонстрировать». Импликация, которую она не доложила: место производства неизвестно не всем. Оно неизвестно Гильдии. Процесс требует инфраструктуры, которую мог разместить только один известный объект — объект, нанесённый на карту церковными картографами и впоследствии подавленный в том же файловом подавлении, которое Мориус использовал для сокрытия аномалии Железного Пика.","Согласие змей не риторично. Они реагируют на глубокий резонанс поля. Их согласие означает что сигнатура материала совпадает с тем, с чем они сталкивались раньше — в её лаборатории, в конкретном образце, приобретённом ею шесть лет назад у контакта, которого она не назвала никому включая Данте."]},
     whisper:{en:"The snakes recognized the material. She has a sample in her laboratory. She has not told Dante. The snakes recognized it six years ago.",ru:"Змеи узнали материал. У неё есть образец в лаборатории. Она не сказала Данте. Змеи узнали его шесть лет назад."}
   }
 }
}

];

/* ═══ ENGINE ═══ */
const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');const secs=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}];c.innerHTML=secs.map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
