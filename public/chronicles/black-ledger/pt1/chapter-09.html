.d6,.d7{animation:flicker-mid 7s infinite;}
.d8,.d9{animation:flicker-hard 4s infinite,glitch-mid 16s infinite;}

@keyframes flicker-soft{0%,94%,100%{opacity:1;}96%{opacity:.88;}}
@keyframes flicker-mid{0%,88%,100%{opacity:1;}90%{opacity:.75;}92%{opacity:.9;}93%{opacity:.68;}94%{opacity:1;}}
@keyframes flicker-hard{0%,80%,100%{opacity:1;}82%{opacity:.6;}83%{opacity:.9;}84%{opacity:.55;}85%{opacity:.85;}86%{opacity:.7;}87%{opacity:1;}}
@keyframes glitch-mid{0%,92%,100%{transform:none;filter:none;}93%{transform:translate(-3px,0);filter:drop-shadow(3px 0 rgba(255,0,0,.3));}94%{transform:translate(3px,0);filter:drop-shadow(-3px 0 rgba(0,100,255,.2));}95%{transform:translate(-1px,1px);}96%{transform:none;}}
@keyframes glitch-hard{0%,88%,100%{transform:none;filter:none;}89%{transform:translate(-4px,0) skewX(-1deg);filter:drop-shadow(4px 0 rgba(255,0,0,.4)) saturate(2);}90%{transform:translate(4px,-1px) skewX(1deg);filter:drop-shadow(-4px 0 rgba(0,150,255,.3));}91%{transform:translate(-2px,2px);filter:brightness(.7);}92%{transform:translate(1px,-1px);}93%{transform:none;filter:none;}}

const TIMELINE=[
  {id:"TET-69",en:"Isabella will fit the cane's handle with a suppression-field emitter within three weeks of purchase. The emitter will strengthen the earring's active-field output by approximately 18% when the cane is held in the left hand — the same hand that holds the cane, the same hand near which the earring sits. Dante will notice the enhancement on the fourth day of use. He will attribute it to his body adapting to the new load-bearing configuration. He will not examine the attribution. Isabella has been planning this modification since before Sector 13.",ru:"Изабелла оснастит рукоятку трости эмиттером поля подавления в течение трёх недель после покупки. Эмиттер усилит вывод активного поля серьги приблизительно на 18%, когда трость держится в левой руке — той же руке, в которой держится трость, рядом с которой находится серьга. Данте заметит усиление на четвёртый день использования. Он припишет это адаптации тела к новой несущей конфигурации. Он не будет исследовать приписывание. Изабелла планировала эту модификацию до Сектора 13."},
  {id:"TET-70",en:"Dante's stated reason for refusing the Time Essence serum — 'the risk is unacceptable' — is accurate but incomplete. The complete reason includes: he does not want to owe his body's continued function to a commodity he has destroyed the supply of. This is not risk aversion. It is a specific kind of pride about remaining structurally independent of the systems he administers. The knee, accepted as permanent, maintains this independence. The knee is the price of not becoming a client.",ru:"Заявленная причина Данте для отказа от сыворотки из Эссенции Времени — «риск неприемлем» — точна, но неполна. Полная причина включает: он не хочет быть обязан продолжением функционирования своего тела товару, поставки которого он сам уничтожил. Это не неприятие риска. Это специфический вид гордости, связанный с сохранением структурной независимости от систем, которыми он управляет. Колено, принятое как постоянное, поддерживает эту независимость. Колено — цена того, чтобы не стать клиентом."},
  {id:"TET-71",en:"The 'tactical advantage' framing — 'let them think I'm weak, it gives us first-strike advantage' — is a post-hoc rationalization Dante constructed in Isabella's presence. He decided to keep the injury before he formulated the tactical reason. Isabella knows this. She did not say so. She filed it in the same category as the Silence Lipstick incident records — things that are more useful undisclosed.",ru:"Формулировка «тактического преимущества» — «пусть думают, что я слаб, это даст нам преимущество первого удара» — это ретроспективная рационализация, которую Данте построил в присутствии Изабеллы. Он решил оставить травму до того, как сформулировал тактическую причину. Изабелла знает это. Она не сказала об этом. Она внесла это в ту же категорию, что и записи об инцидентах с «Помадой Молчания» — вещи, которые полезнее нераскрытыми."},
  {id:"TET-72",en:"Countess Valeria has been 120 years old for the last eleven years. She stopped aging at 109, approximately three years into her relationship with the Chronmancer's distribution network. She has been a Sector 13 VIP client, but she is not simply a customer. She was one of three individuals who provided the financial infrastructure for the Third Repository's establishment — the initial capital investment that allowed the Chronmancer to build the dome. She is not a victim of the operation. She is a co-founder who has lost her infrastructure.",ru:"Графиня Валерия «сто двадцать лет» последние одиннадцать лет. Она перестала стареть при 109, приблизительно через три года своих отношений с дистрибьюторской сетью Хрономанта. Она была VIP-клиентом Сектора 13, но она не просто покупатель. Она была одной из трёх персон, предоставивших финансовую инфраструктуру для создания Третьего Хранилища — первоначальные капитальные вложения, позволившие Хрономанту построить купол. Она не жертва операции. Она сооснователь, потерявший свою инфраструктуру."},
  {id:"TET-73",en:"The letter's courier having no tongue is not a threat display. It is standard Valeria operational practice — couriers who deliver sensitive correspondence are operated under a pre-agreed mutilation arrangement that prevents interception intelligence. The courier volunteered. The mutilation is reversible via a restoration spell Valeria holds and will apply upon satisfactory completion of the delivery. Valeria considers this a standard professional services contract. She has used this arrangement for sixty years.",ru:"Отсутствие языка у курьера письма — не демонстрация угрозы. Это стандартная оперативная практика Валерии — курьеры, доставляющие деликатную корреспонденцию, работают по заранее согласованному соглашению об увечье, предотвращающему разведку при перехвате. Курьер добровольно согласился. Увечье обратимо с помощью заклинания восстановления, которым владеет Валерия и применит после удовлетворительного выполнения доставки. Валерия считает это стандартным договором об оказании профессиональных услуг. Она использует это соглашение шестьдесят лет."},
  {id:"TET-74",en:"The 'ghost port' coordinates in the ship's log point to the location of a Precursor-era submerged installation that predates the ocean itself — the ocean formed around it. The installation is not in a pocket of space. It exists in normal space but at a depth and pressure that should be fatal to any known material. It is not. The material it is built from is the same alloy as the ship's log's pages: Sundering-site refined lead mixed with a Cognitive Iron substrate. The installation has been continuously occupied. The current occupant is not the Cult. The Cult leases space there.",ru:"Координаты «города-призрака» в судовом журнале указывают на погружённую установку эпохи Предтечей, предшествующую самому океану — океан сформировался вокруг неё. Установка не в кармане пространства. Она существует в нормальном пространстве, но на глубине и давлении, которые должны быть смертельны для любого известного материала. Она не разрушается. Материал её постройки тот же сплав, что и страницы судового журнала: рафинированный свинец с места Раскола, смешанный с субстратом Когнитивного Железа. Установка непрерывно обитаема. Нынешний обитатель — не Культ. Культ арендует там место."},
  {id:"TET-75",en:"Dante's plan for Valeria — 'sell her deferral, not youth; hope is the most expensive drug in the world' — is structurally correct as a negotiating position. It is also what he has been doing across all four arcs: selling functional stability to clients who cannot afford to know the full cost of their situation. He is not examining the parallel. He has said 'this is hope, the most expensive drug in the world' with complete operational confidence. He has not asked what it means that he is the supplier.",ru:"План Данте в отношении Валерии — «продавать ей отсрочку, а не молодость; надежда — самый дорогой наркотик в мире» — структурно верен как переговорная позиция. Это также то, что он делает на протяжении всех четырёх арков: продаёт функциональную стабильность клиентам, которые не могут позволить себе знать полную цену своей ситуации. Он не исследует параллель. Он сказал «это надежда, самый дорогой наркотик в мире» с полной операционной уверенностью. Он не задал вопрос, что означает то, что он — поставщик."},
  {id:"TET-76",en:"'With this cane and limp I already look like a man who has too much past.' — Dante said this. It is the first time in the book that he has described himself in terms of what he looks like rather than what he can do. The cane is the first external object in the book that defines him rather than extends him. He purchased it as an operational tool. He described it as an identity. These are different categories and he used them interchangeably. Arc IV begins with Dante entering a social environment as a person with a visible history rather than as an instrument with a function. He has not noted this as a change.",ru:"«С этой тростью и хромотой я и так выгляжу как человек, у которого слишком много прошлого». — Данте сказал это. Это первый раз в книге, когда он описал себя в терминах того, как выглядит, а не того, что может делать. Трость — первый внешний предмет в книге, определяющий его, а не расширяющий. Он купил её как операционный инструмент. Он описал её как идентичность. Это разные категории, и он использовал их взаимозаменяемо. Арк IV начинается с Данте, входящего в социальную среду как человек с видимой историей, а не как инструмент с функцией. Он не отметил это как изменение."}
];

const SCENES=[

/* ─── SCENE 1: THE PRICE OF A STEP ─── */
{id:"s1",
 title:{en:"The Price of a Step",ru:"Цена Шага"},
 subtitle:{en:"The knee is not an expense. It is a cost.",ru:"Колено — не расход. Это издержка."},
 location:{en:"Guild Infirmary",ru:"Лазарет Гильдии"},
 timing:{en:"Morning After Sector 13",ru:"Утро После Сектора 13"},
 flags:["cost","arc_open"],
 povData:{
   dante:{distortion:2,
     text:{
       en:`The diagnosis is consistent with what I assessed on the pier. Biologically eighty years, functionally partial — the joint retains approximately forty percent of its original load-bearing capacity under slow movement, dropping to approximately fifteen percent under rapid movement. Running is no longer within operational parameters.\n\nI noted that Isabella subdued her usual register when she delivered the verdict. She has an extraordinary range of affect — her baseline is theatrical and the deviation was visible. She wanted me to know she was not enjoying this. I noted it without acknowledging it.\n\nThe cane is the correct engineering response. It is also something else and I am not going to name that something else in this filing.\n\nThe Essence serum: I could construct a risk-benefit argument for the trial dose. The joint degradation is already complete — there is no further damage the serum could accelerate. The risk variables are: unknown long-term systemic effects from non-standard temporal chemistry, dependency formation on a supply chain I have just destroyed, and the specific category of error that involves treating a permanent cost as a temporary problem.\n\nThe third variable is the operative one. The knee is not a problem to be solved. It is a condition to be accounted for. Every operation from this point includes a revised mobility parameter. This is not worse than before. It is different from before. The operational file updates.\n\nI told Isabella: we are not laboratory rats, we are administrators. This is accurate. It is also the version I say aloud.\n\nThe cane was already in the guild armory. I had requisitioned it before leaving for the pier. I did not mention this to Isabella or Mort.\n\nI stood with it and the tap of the wood on the stone floor sounded — I noted this — like something that had weight. Not like a tool. Like a presence.\n\nI will examine this observation later.\n\nI have not scheduled a time to examine it.`,
       ru:`Диагноз соответствует тому, что я оценил на пирсе. Биологически восемьдесят лет, функционально частичный — сустав сохраняет приблизительно сорок процентов первоначальной несущей способности при медленном движении, падая до приблизительно пятнадцати процентов при быстром. Бег больше не входит в операционные параметры.\n\nЯ отметил, что Изабелла сдержала свой обычный регистр при вынесении вердикта. У неё исключительный диапазон аффекта — её базовый уровень театрален, и отклонение было видимым. Она хотела, чтобы я знал: ей это не доставляет удовольствия. Я отметил это, не признавая.\n\nТрость — правильный инженерный ответ. Это также кое-что ещё, и я не собираюсь называть это кое-что ещё в этой записи.\n\nСыворотка Эссенции: я мог бы построить аргумент о соотношении риска и пользы для пробной дозы. Деградация сустава уже завершена — нет дальнейшего ущерба, который сыворотка могла бы ускорить. Переменные риска: неизвестные долгосрочные системные эффекты нестандартной темпоральной химии, формирование зависимости от цепочки поставок, которую я только что уничтожил, и специфическая категория ошибки, связанная с лечением постоянной издержки как временной проблемы.\n\nТретья переменная оперативная. Колено — не проблема, которую нужно решить. Это условие, которое нужно учесть. Каждая операция с этого момента включает пересмотренный параметр мобильности. Это не хуже, чем раньше. Это иначе, чем раньше. Операционный файл обновляется.\n\nЯ сказал Изабелле: мы не подопытные крысы, мы управляющие. Это точно. Это также версия, которую я произношу вслух.\n\nТрость уже была в оружейной гильдии. Я запросил её до отъезда на пирс. Я не упоминал этого Изабелле или Морту.\n\nЯ встал с ней, и стук дерева о каменный пол прозвучал — я отметил это — как что-то, что имеет вес. Не как инструмент. Как присутствие.\n\nЯ рассмотрю это наблюдение позже.\n\nЯ не запланировал время для его рассмотрения.`
     },
     knows:{en:["He requisitioned the cane before leaving for the pier — the decision to keep the injury was made before the diagnosis, before the tactical framing, before Isabella's offer","The serum refusal's third variable is the operative one: refusing to treat a permanent cost as a temporary problem. He knows this is the real reason but named risk as the primary framing.","The cane's tap on stone sounded like 'a presence, not a tool' — he noted this and has not scheduled time to examine it"],ru:["Он запросил трость до отъезда на пирс — решение оставить травму было принято до диагноза, до тактической формулировки, до предложения Изабеллы","Третья переменная отказа от сыворотки оперативная: отказ лечить постоянную издержку как временную проблему. Он знает что это настоящая причина, но назвал риск основной формулировкой.","Стук трости по камню прозвучал как «присутствие, а не инструмент» — он отметил это и не запланировал время для рассмотрения"]},
     misunderstands:{en:["'The cane is something else and I am not going to name that something else in this filing.' He has already named it once, in the scene's last operational observation: 'like a presence.' He will name it again, once, at the end of the chapter. He has not examined why he keeps arriving at this word.","He frames the serum refusal as risk management. The deeper frame — refusing to become dependent on a supply chain he controls — is itself a meta-level instance of the pattern Isabella identified: he maintains independence from systems he administers, including from comfort itself."],ru:["«Трость — это также кое-что ещё, и я не собираюсь называть это кое-что ещё в этой записи». Он уже назвал это один раз, в последнем операционном наблюдении сцены: «как присутствие». Он назовёт это ещё раз, один раз, в конце главы. Он не исследовал, почему постоянно приходит к этому слову.","Он формулирует отказ от сыворотки как управление рисками. Более глубокая рамка — отказ стать зависимым от цепочки поставок, которой он управляет — сама по себе является метауровневым экземпляром паттерна, определённого Изабеллой: он сохраняет независимость от систем, которыми управляет, включая от самого комфорта."]},
     hides:{en:["He requisitioned the cane before leaving for the pier. The decision to keep the injury preceded every justification he offered Isabella. He has not disclosed the requisition timing to anyone.","'I will examine this observation later. I have not scheduled a time to examine it.' This is not procrastination. This is the same mechanism as 'the file I maintain of things I do not record.' He is maintaining the observation without acting on it because acting on it would require a category he does not have.","The tactical framing — let them think I'm weak — was constructed after the decision. He knows this. He offered it to Isabella to give her something to work with rather than silence. It was a gift of comprehensible reasoning."],ru:["Он запросил трость до отъезда на пирс. Решение оставить травму предшествовало каждому обоснованию, предложенному Изабелле. Он не раскрыл сроки запроса никому.","«Я рассмотрю это наблюдение позже. Я не запланировал время для его рассмотрения». Это не промедление. Это тот же механизм, что «файл, который я веду с вещами, которые не записываю». Он поддерживает наблюдение без действия, потому что действие потребует категории, которой у него нет.","Тактическая формулировка — пусть думают что я слаб — была построена после решения. Он знает это. Он предложил её Изабелле чтобы дать ей что-то для работы, а не тишину. Это был подарок понятного рассуждения."]},
     whisper:{en:"He requisitioned the cane before the diagnosis. The decision preceded every justification. He hasn't told anyone the timing.",ru:"Он запросил трость до диагноза. Решение предшествовало каждому обоснованию. Он не сказал никому о сроках."}
   },
   isabella:{distortion:3,
     text:{
       en:`Degenerative arthrosis at eighty biological years in a joint that is thirty-something chronological years. The cellular aging from the Chronmancer's attack was precise — it targeted connective tissue specifically and left the surrounding musculature and vasculature at standard age. This is not a general temporal curse. This was a targeted strike on the most mechanically load-bearing tissue in the lower body.\n\nThe Chronmancer knew where to aim. Or whatever directed him knew where to aim.\n\nI offered the serum. I knew he would refuse. I offered it because not offering would have been a statement about what I thought he was capable of managing, and I do not make statements like that. I offer the option and I let him choose.\n\nHe refused with: risk, uncertainty, the supplier chain I destroyed, and — this one he said last, with the tone he uses when he is being most exact — the specific category of error involved in treating a permanent cost as a temporary problem.\n\nThe fourth reason is the real one. I have been working for him for six years. The first three reasons were operational framing. The fourth was the thing he actually thinks.\n\nHe said: we are not laboratory rats, we are administrators. This is how he talks when he has already made a decision and is providing the vocabulary for it.\n\nThe cane. He did not react to the cane the way people react to assistive devices — there was no moment of resistance or adjustment. He stood with it and I watched his posture change. Not compensating. Incorporating. He had already decided what the cane was before Mort brought it in.\n\nHe said the tactical framing — let them think he's weak — after a pause that was about two seconds longer than his standard formulation pauses. I timed it.\n\nI filed it in the same category as the Lipstick records.\n\nI will make the emitter for the handle tonight. He will notice on the fourth day. He will not say anything. This is our arrangement, even though neither of us has stated it.`,
       ru:`Дегенеративный артроз при восьмидесяти биологических годах в суставе с тридцатью с небольшим хронологическими. Клеточное старение от атаки Хрономанта было точным — оно конкретно нацелилось на соединительную ткань и оставило окружающую мускулатуру и сосудистую систему в стандартном возрасте. Это не общее временное проклятие. Это был прицельный удар по наиболее механически нагруженной ткани нижней части тела.\n\nХрономант знал куда целиться. Или то, что направляло его, знало куда целиться.\n\nЯ предложила сыворотку. Я знала что он откажется. Я предложила её, потому что не предлагать означало бы заявление о том, что я думаю о его способности справляться — а я не делаю таких заявлений. Я предлагаю вариант и позволяю ему выбрать.\n\nОн отказался, назвав: риск, неопределённость, цепочку поставок, которую он уничтожил, и — эту он произнёс последней, с тоном, который использует когда наиболее точен — специфическую категорию ошибки, связанную с лечением постоянной издержки как временной проблемы.\n\nЧетвёртая причина настоящая. Я работаю на него шесть лет. Первые три причины были операционной формулировкой. Четвёртая — то, что он на самом деле думает.\n\nОн сказал: мы не подопытные крысы, мы управляющие. Это то, как он говорит, когда уже принял решение и предоставляет для него словарь.\n\nТрость. Он не отреагировал на трость так, как люди реагируют на вспомогательные средства — не было момента сопротивления или приспособления. Он встал с ней, и я видела как изменилась его осанка. Не компенсируя. Встраивая. Он уже решил что такое трость до того, как Морт её принёс.\n\nОн произнёс тактическую формулировку — пусть думают что он слаб — после паузы на около двух секунд длиннее его стандартных пауз формулирования. Я её засекла.\n\nЯ занесла это в ту же категорию, что и записи о Помаде.\n\nЯ сделаю эмиттер для рукоятки сегодня ночью. Он заметит на четвёртый день. Он ничего не скажет. Такова наша договорённость, хотя ни один из нас её не заявлял.`
     },
     knows:{en:["The cellular aging was targeted specifically at load-bearing connective tissue — this was a precision strike, not a general curse. Something knew where to aim.","He refused for the fourth reason — treating permanent costs as temporary problems — not the first three. She timed the tactical framing pause: two seconds longer than standard.","She will make the emitter tonight. He will notice on day four. Neither will say anything. She has named this 'their arrangement.'"],ru:["Клеточное старение было нацелено конкретно на несущую соединительную ткань — это был прицельный удар, а не общее проклятие. Что-то знало куда целиться.","Он отказался из-за четвёртой причины — лечения постоянных издержек как временных проблем — а не первых трёх. Она засекла паузу тактической формулировки: на две секунды длиннее стандарта.","Она сделает эмиттер сегодня ночью. Он заметит на четвёртый день. Ни один не скажет ничего. Она назвала это «их договорённостью»."]},
     misunderstands:{en:["She plans the emitter modification as a gift — the same symmetrical pattern she noted in Scene 1 of Ch.7, where both are using each other's operational tolerance as a resource. She believes this is 'their arrangement.' He will not call it an arrangement. He will call it data."],ru:["Она планирует модификацию эмиттера как подарок — тот же симметричный паттерн, отмеченный в Сцене 1 Гл.7, где оба используют операционный допуск друг друга как ресурс. Она считает это «их договорённостью». Он не назовёт это договорённостью. Он назовёт это данными."]},
     hides:{en:["She noticed the cane was already being incorporated rather than compensated for — and that this means he had already decided, before Mort arrived, what the cane would be. She filed this with the tactical-pause observation. She has a growing file on decisions he makes before he states them.","'The Chronmancer knew where to aim. Or whatever directed him.' She said 'or whatever directed him' and then moved on. She has not followed this with research. She knows the Cognitive Iron sample in her laboratory recognized this kind of precision targeting six years ago. She has not connected these two observations in any filing."],ru:["Она заметила что трость уже встраивалась, а не компенсировалась — что означает, что он уже решил, до прихода Морта, чем будет трость. Она занесла это вместе с наблюдением о паузе тактической формулировки. У неё растущий файл решений, которые он принимает до того, как их заявляет.","«Хрономант знал куда целиться. Или то, что направляло его». Она сказала «или то, что направляло его» и двинулась дальше. Она не продолжила это исследованием. Она знает что образец Когнитивного Железа в её лаборатории узнал этот вид точечного наведения шесть лет назад. Она не соединила эти два наблюдения ни в одной записи."]},
     whisper:{en:"She noticed he had already incorporated the cane before Mort brought it. He decided before the diagnosis. She is filing the decisions he makes before he states them.",ru:"Она заметила что он уже встроил трость до того, как Морт её принёс. Он решил до диагноза. Она фиксирует решения, которые он принимает до того, как их заявляет."}
   }
 }
},

/* ─── SCENE 2: LABORATORY WORK ─── */
{id:"s2",
 title:{en:"Laboratory Work",ru:"Лабораторная Работа"},
 subtitle:{en:"Iron. Time. Components. Someone is building a mechanism.",ru:"Железо. Время. Компоненты. Кто-то собирает механизм."},
 location:{en:"Isabella's Laboratory, Guild HQ",ru:"Лаборатория Изабеллы, Штаб-Квартира Гильдии"},
 timing:{en:"One Hour After the Infirmary",ru:"Час После Лазарета"},
 flags:["intelligence","pivotal","foreshadowing"],
 povData:{
   dante:{distortion:2,
     text:{
       en:`The ship's log coordinates are a dead end in conventional navigation terms. No landmass, no port, three kilometers of open ocean above a clean bottom. This is either incorrect data or data that describes something that does not present to conventional instruments.\n\nWhisper's phrasing — 'it was nowhere' — is the operationally precise formulation. It does not mean the location is empty. It means the location does not register. There is a class of Precursor-era installation that does not register on any instrument designed after the Sundering, because the Sundering itself is what those instruments are calibrated around. Something that predates the calibration event will not appear in the instrument's baseline.\n\nThe City of Dead Ships was visible because it had been made visible — the dome's glass was ordinary glass, maintained by the Chronmancer for forty-one years. The dome was a window. Without the window, the city below is not absent; it is merely unlighted.\n\nThe Ghost Port is at depth. The Cult leases space there — confirmed by the log's 'Port of Registry' notation in pre-Sundering script. The lessor is older than the Cult. The lessor is older than the Sundering.\n\nCognitive Iron from Baron Caldor. Time Essence from the Chronmancer. Two of the seven commodity nodes. Whatever the mechanism requires: a structural component that responds to consciousness, and a temporal fuel source.\n\nComponents. Someone is assembling something. The scale implies centuries of planning. The approach — using human infrastructure as one-off manufacturing runs, each node isolated, each node deniable — implies a designer who expects each node to be identified and destroyed eventually and has built that expectation into the timeline.\n\nI have not told anyone yet that Sector 13 was one of seven.\n\nI will tell Whisper before the Valeria meeting. I will not tell Silas. The financial implications of a seven-node operation targeting the fundamental commodities of time, memory, identity, causality, possibility, grief, and the unnamed — I need to assess those implications before they enter the general briefing.\n\nThe seventh commodity has no name in any language. I have been thinking about what category of thing lacks a word in every language simultaneously. The answer I keep arriving at is: the thing that language itself depends on.`,
       ru:`Координаты судового журнала — тупик с точки зрения обычной навигации. Никакой суши, никакого порта, три километра открытого океана над чистым дном. Это либо неверные данные, либо данные, описывающие нечто, не проявляющееся в обычных инструментах.\n\nФормулировка Шепота — «ниоткуда не пришёл» — операционно точная. Это не означает что место пустое. Это означает что место не регистрируется. Существует класс установок эпохи Предтечей, которые не регистрируются ни одним инструментом, разработанным после Раскола, потому что именно Раскол является событием, относительно которого калиброваны эти инструменты. Нечто, предшествующее событию калибровки, не появится в базовом уровне инструмента.\n\nГород Мёртвых Кораблей был виден, потому что его сделали видимым — стекло купола было обычным стеклом, поддерживавшимся Хрономантом сорок один год. Купол был окном. Без окна город внизу не отсутствует; он просто не освещён.\n\nГород-Призрак находится на глубине. Культ арендует там место — подтверждено нотацией журнала «Порт Приписки» в до-Раскольном шрифте. Арендодатель старше Культа. Арендодатель старше Раскола.\n\nКогнитивное Железо от барона Кальдора. Эссенция Времени от Хрономанта. Два из семи товарных узлов. Что бы ни требовалось механизму: структурный компонент, реагирующий на сознание, и темпоральный источник топлива.\n\nКомпоненты. Кто-то собирает что-то. Масштаб подразумевает столетия планирования. Подход — использование человеческой инфраструктуры как разовых производственных циклов, каждый узел изолирован, каждый узел отрицаем — подразумевает проектировщика, ожидающего что каждый узел будет в конечном счёте определён и уничтожен, и встроившего это ожидание в временной горизонт.\n\nЯ ещё не говорил никому, что Сектор 13 был одним из семи.\n\nЯ скажу Шепоту до встречи с Валерией. Я не скажу Силасу. Финансовые импликации семиузловой операции, нацеленной на фундаментальные товары времени, памяти, идентичности, причинности, возможности, горя и безымянного — мне нужно оценить эти импликации до их включения в общий брифинг.\n\nСедьмой товар не имеет названия ни в одном языке. Я думал о том, к какой категории вещей одновременно нет слова ни в одном языке. Ответ, к которому я постоянно прихожу: то, от чего зависит сам язык.`
     },
     knows:{en:["The Ghost Port predates the ocean — its material is the same Sundering-site lead + Cognitive Iron substrate as the log pages. The Cult leases space from an entity older than the Sundering.","Sector 13 was one of seven nodes — he has not told anyone yet. He will tell Whisper before Valeria, will not tell Silas.","The seventh commodity has no name in any language. His current working hypothesis: it is the thing language itself depends on."],ru:["Город-Призрак предшествует океану — его материал тот же свинец с места Раскола + субстрат Когнитивного Железа, что и страницы журнала. Культ арендует место у сущности старше Раскола.","Сектор 13 был одним из семи узлов — он ещё никому не говорил. Скажет Шепоту до Валерии, не скажет Силасу.","Седьмой товар не имеет названия ни в одном языке. Его текущая рабочая гипотеза: это то, от чего зависит сам язык."]},
     misunderstands:{en:["He frames the seven-node designer as having 'built the expectation of each node's eventual destruction into the timeline.' This is accurate for the Cult's operational layer. It may not be accurate for the entity that owns the Ghost Port. The architect may not have expected the nodes to be destroyed. The architect may have expected the Auditor to destroy them.","His hypothesis about the seventh commodity — 'the thing language itself depends on' — is the correct category. The word in the pre-Sundering technical literature for this commodity is: Covenant. He has access to the archive that contains this word. He has not yet used the archive access Morius offered."],ru:["Он формулирует проектировщика семи узлов как «встроившего ожидание в конечном счёте уничтожения каждого узла в временной горизонт». Это точно для операционного слоя Культа. Это может быть неточно для сущности, владеющей Городом-Призраком. Архитектор мог не ожидать уничтожения узлов. Архитектор мог ожидать что их уничтожит Аудитор.","Его гипотеза о седьмом товаре — «то, от чего зависит сам язык» — правильная категория. Слово в до-Раскольной технической литературе для этого товара: Завет. У него есть доступ к архиву, содержащему это слово. Он ещё не использовал архивный доступ, предложенный Мориусом."]},
     hides:{en:["He has not used the archive access Morius offered — the Covenant Objects sub-section, specifically. He has had this access for months. The reason he has not used it is not time. He has made time for smaller research tasks throughout Arc III. He has not examined why the specific access Morius offered has not been used.","The seventh commodity hypothesis — 'the thing language depends on' — he keeps arriving at this and moving past it. He has arrived at it three times in the past two weeks. Each time he has noted it and moved to the next operational item. The note is not in any file.","He will tell Whisper about the seven nodes before the Valeria meeting. Not after. Before. He is choosing to give Whisper this information in a specific operational sequence that is also something else."],ru:["Он не использовал архивный доступ, предложенный Мориусом — конкретно подраздел Объектов Завета. У него есть этот доступ месяцами. Причина не в нехватке времени. Он находил время для меньших исследовательских задач на протяжении Арка III. Он не исследовал почему конкретный доступ, предложенный Мориусом, не использовался.","Гипотеза о седьмом товаре — «то, от чего зависит язык» — он постоянно приходит к этому и движется дальше. Он приходил к этому три раза за последние две недели. Каждый раз отмечал и переходил к следующему операционному пункту. Заметка не в каком-либо файле.","Он скажет Шепоту о семи узлах до встречи с Валерией. Не после. До. Он выбирает предоставить Шепоту эту информацию в конкретной операционной последовательности, которая также является чем-то ещё."]},
     whisper:{en:"He will tell Whisper before Valeria. The seven-node information is operationally urgent. He is choosing to give it to Whisper first, before any other party. He has not named why.",ru:"Он скажет Шепоту до Валерии. Информация о семи узлах операционно срочная. Он выбирает дать её Шепоту первому, до любой другой стороны. Он не назвал почему."}
   },
   silas:{distortion:3,
     text:{
       en:`I have been Guild Treasurer for eleven years. In that time I have managed four Crimson-level operation budgets, nineteen standard operational disbursements with classified line items, three pension settlements for operatives whose files I cannot access, and a recurring quarterly payment to an entity I cannot identify in a location I cannot locate, which appears in my approved budget under 'Operational Reserve: Site Seven.'\n\nI manage money. I am very good at managing money. I manage money the way an excellent locksmith manages locks — I understand the mechanism, I can make it do what is needed, and I have learned not to ask what is on the other side of the door.\n\nThis is the arrangement. It has worked for eleven years.\n\nToday the Master received what I can only describe, from a treasury perspective, as a permanent operational liability. His mobility parameter has been downgraded. His cane is now a line item — maintenance costs, probable eventual replacement — but more than that, a Master with a cane is a different actuarial profile than a Master without one. I have not raised this because the Master's actuarial profile is not a subject I raise.\n\nThe Black Market disruption from Sector 13: time-extension commodity prices have increased tenfold overnight. Our institutional exposure is: zero, as we have never traded in this market. Our indirect exposure is significant — three of our primary institutional clients have been Sector 13 consumers, and their economic behavior will change as their biological situation changes. I have begun modeling these adjustments.\n\nI gave him the Countess's letter. I noted his posture when he read it. I have been noting his posture for eleven years and I am good at reading it.\n\nHis posture when he read the letter was the same as his posture when he identified the crystal resonance in the desk drawer on his return from the Iron Peak. Which I logged.\n\nHe recognized something in that letter. Not just the Countess. Something about how the letter was written, or what it contained, or what it implied.\n\nI have added this to the Behavioral Anomalies log and am reviewing the quarterly Site Seven payment with new attention.`,
       ru:`Я работаю казначеем Гильдии одиннадцать лет. За это время я управлял четырьмя бюджетами операций уровня «Багряный», девятнадцатью стандартными оперативными выплатами с засекреченными статьями, тремя пенсионными расчётами для оперативников, чьи файлы я не могу получить, и регулярным квартальным платежом структуре, которую я не могу идентифицировать, в место, которое не могу найти — в моём утверждённом бюджете это значится как «Оперативный Резерв: Объект Семь».\n\nЯ управляю деньгами. Я очень хорошо управляю деньгами. Я управляю деньгами так, как отличный слесарь управляет замками — я понимаю механизм, я могу заставить его делать что нужно, и я научился не спрашивать, что находится по другую сторону двери.\n\nТакова договорённость. Она работала одиннадцать лет.\n\nСегодня Мастер получил то, что я могу описать только с точки зрения казначейства как постоянное операционное обязательство. Его параметр мобильности понижен. Его трость теперь является статьёй расходов — эксплуатационные расходы, вероятная замена — но более того, Мастер с тростью — другой актуарный профиль чем Мастер без неё. Я не поднимал этого, потому что актуарный профиль Мастера — не тема, которую я поднимаю.\n\nРыночные потрясения Чёрного Рынка от Сектора 13: цены на товары продления жизни за ночь выросли в десять раз. Наша институциональная экспозиция: нулевая, поскольку мы никогда не торговали на этом рынке. Наша косвенная экспозиция значительна — трое из наших основных институциональных клиентов были потребителями Сектора 13, и их экономическое поведение изменится по мере изменения их биологической ситуации.\n\nЯ дал ему письмо Графини. Я отметил его осанку, когда он читал. Я отмечаю его осанку одиннадцать лет и хорошо её читаю.\n\nЕго осанка при чтении письма была такой же, как при определении резонанса кристалла в ящике стола по возвращении из Железного Пика. Что я занёс в журнал.\n\nОн узнал что-то в этом письме. Не просто Графиню. Что-то в том, как было написано письмо, или что оно содержало, или что подразумевало.\n\nЯ добавил это в журнал Поведенческих Аномалий и пересматриваю квартальный платёж «Объекта Семь» с новым вниманием.`
     },
     knows:{en:["The Master's posture when reading Valeria's letter matched his posture at the desk drawer crystal resonance — Silas has both logged and is now correlating them","Site Seven quarterly payment: he cannot identify the recipient or location. He is reviewing it with new attention after this posture match.","He has been modeling economic adjustments for three VIP Sector 13 clients who will begin aging — he has not told Dante he knows who these clients are"],ru:["Осанка Мастера при чтении письма Валерии совпала с осанкой при резонансе кристалла в ящике — Силас занёс оба и теперь соотносит их","Квартальный платёж «Объекта Семь»: он не может идентифицировать получателя или место. Он пересматривает его с новым вниманием после этого совпадения осанки.","Он моделирует экономические корректировки для трёх VIP-клиентов Сектора 13, которые начнут стареть — он не говорил Данте что знает кто эти клиенты"]},
     misunderstands:{en:["He believes his behavioral anomalies log is a treasury management tool. It is also the most granular external observation of Dante's decision-making pattern in the Guild — more granular than even Whisper's, because Silas observes the financial signatures of decisions, not just the decisions themselves.","He is correlating the Valeria letter posture to the crystal posture. The connection he is approaching: the Site Seven payment recipient. He will arrive at this within two weeks. He has not yet connected it to his own six-year skimming operation, which means he has not yet asked what it means that the same entity whose payment he processes is the one the Master's behavioral anomalies seem to converge on."],ru:["Он считает свой журнал поведенческих аномалий инструментом управления казначейством. Это также наиболее детальное внешнее наблюдение паттерна принятия решений Данте в Гильдии — более детальное даже чем у Шепота, потому что Силас наблюдает финансовые сигнатуры решений, а не только сами решения.","Он соотносит осанку при письме Валерии с осанкой при кристалле. Связь, к которой он приближается: получатель платежа «Объекта Семь». Он придёт к этому в течение двух недель. Он ещё не соединил это с собственной шестилетней операцией по снятию средств — что означает, что он ещё не задал вопрос, что означает то, что та же сущность, платёж которой он обрабатывает, является той, на которую, по-видимому, сходятся поведенческие аномалии Мастера."]},
     hides:{en:["He has been skimming 0.3% for six years. He is reviewing Site Seven with new attention. Within the review he will find the Site Seven payment structure matches certain patterns in the skimming route he uses. He has not yet made this connection. When he does, he will have approximately four hours to decide what to do with it before Dante notices the review.","He identified three specific institutional clients who were Sector 13 consumers. He knows their names. One of them is someone whose file he has also been accessing without authorization for reasons he has not filed anywhere."],ru:["Он снимает 0,3% шесть лет. Он пересматривает «Объект Семь» с новым вниманием. В ходе проверки он обнаружит что структура платежа «Объекта Семь» совпадает с определёнными паттернами в маршруте снятия, который он использует. Он ещё не установил эту связь. Когда установит, у него будет приблизительно четыре часа чтобы решить что с этим делать, до того как Данте заметит проверку.","Он определил трёх конкретных институциональных клиентов, которые были потребителями Сектора 13. Он знает их имена. Один из них — тот, к чьему файлу он также получал несанкционированный доступ по причинам, которые он нигде не внёс."]},
     whisper:{en:"He is correlating two posture matches. Within two weeks he will find the Site Seven payment structure. He has four hours after that before Dante notices. He doesn't know this yet.",ru:"Он соотносит два совпадения осанки. В течение двух недель он найдёт структуру платежа «Объекта Семь». После этого у него четыре часа до того, как Данте заметит. Он ещё не знает этого."}
   }
 }
},

/* ─── SCENE 3: THE LETTER / ARC IV OPENS ─── */
{id:"s3",
 title:{en:"Hope, the Most Expensive Drug",ru:"Надежда — Самый Дорогой Наркотик"},
 subtitle:{en:"The Countess invites the Auditor to tea. Arc IV begins.",ru:"Графиня приглашает Аудитора на чай. Арк IV начинается."},
 location:{en:"Guild HQ — Transition to the City",ru:"Штаб-Квартира Гильдии — Переход к Городу"},
 timing:{en:"Afternoon, Same Day",ru:"Полдень, Тот же День"},
 flags:["new_player","arc_open","foreshadowing"],
 povData:{
   dante:{distortion:2,
     text:{
       en:`The letter's seal: a rose wrapped in barbed wire. The device is pre-Imperial — it predates the current heraldic registry by approximately eighty years. I recognized it from a file I reviewed as part of the pre-Auditor transition briefing. Valeria has been using the same seal for at least ninety years.\n\nThe letter's handwriting: italic with a backward-lean, which indicates left-handed origin adapted to right-handed execution, which means she taught herself to write right-handed at some point, which means there was a period in her formation when left-handedness was professionally disadvantageous. Ninety years ago, left-handedness in the Imperial court was considered a sign of corruption. She adapted her handwriting and kept the adapted version for ninety years after the prohibition was lifted.\n\nThe letter's tone: controlled aggravation. 'You broke my favorite vase. The shards cut me.' This is not complaint — it is notification of standing. She is telling me she has been injured and is not asking for sympathy. She is telling me the injury is the subject.\n\nThe courier's missing tongue: this is not new. She has used this arrangement for at least sixty years. It is a professional services contract, not a display.\n\nThe invitation: tea, alone, her garden. The garden is the variable. Valeria's garden is a documented intelligence installation — her private botanical collection includes seventeen species that produce compounds not in Isabella's catalogue. An invitation to the garden is an invitation into her operational advantage space.\n\nI will bring Isabella's gift: the modified lotus extract. Not a cure. A deferral. Something that holds the symptoms while the underlying situation is assessed. This is not fraud. Every client I have ever had has purchased deferral. They called it solutions. The word is a matter of billing structure.\n\nValeria has been alive for a hundred and twenty years. She built part of the Third Repository's founding infrastructure. She is not a customer who lost a supplier. She is a co-architect who has lost a structural element.\n\nShe will know things about the seven-node structure that I cannot find in any archive. She will not give them to me directly. She will negotiate. So will I.\n\nWith this cane and limp I already look like a man who has too much past. This may be the first time in twenty-one years that this specific presentation is an advantage rather than a liability.\n\nFor this particular meeting, looking like someone with a history is the correct approach.\n\nI have a history.\n\nWe go.`,
       ru:`Печать письма: роза, обвитая колючей проволокой. Геральдический знак до-Имперский — он предшествует нынешнему геральдическому реестру приблизительно на восемьдесят лет. Я узнал его из файла, просмотренного в рамках до-Аудиторского переходного брифинга. Валерия использует ту же печать не менее девяноста лет.\n\nПочерк письма: курсив с обратным наклоном, что указывает на леворукое происхождение, адаптированное к праворукому исполнению — что означает, что в какой-то момент она научила себя писать правой рукой, что означает, что в период её формирования леворукость была профессионально невыгодной. Девяносто лет назад леворукость при Императорском дворе считалась признаком порочности. Она адаптировала почерк и сохраняла адаптированную версию девяносто лет после отмены запрета.\n\nТон письма: контролируемое раздражение. «Вы разбили мою любимую вазу. Осколки ранили меня». Это не жалоба — это уведомление о статусе. Она говорит мне, что была ранена, и не просит сочувствия. Она говорит мне, что травма является предметом.\n\nОтсутствующий язык у курьера: это не нове. Она использует это соглашение не менее шестидесяти лет. Это договор о профессиональных услугах, а не демонстрация.\n\nПриглашение: чай, в одиночестве, её сад. Сад — переменная. Сад Валерии — задокументированная разведывательная установка — её частная ботаническая коллекция включает семнадцать видов, производящих соединения, которых нет в каталоге Изабеллы. Приглашение в сад — приглашение в её оперативное пространство преимущества.\n\nЯ принесу подарок Изабеллы: модифицированный экстракт лотоса. Не лечение. Отсрочка. Нечто, удерживающее симптомы, пока оценивается основная ситуация. Это не мошенничество. Каждый клиент, которого у меня когда-либо был, покупал отсрочку. Они называли это решениями. Слово — вопрос структуры выставления счёта.\n\nВалерия прожила сто двадцать лет. Она построила часть основополагающей инфраструктуры Третьего Хранилища. Она не клиент, потерявший поставщика. Она со-архитектор, потерявший структурный элемент.\n\nОна будет знать о семиузловой структуре вещи, которые я не найду ни в каком архиве. Она не даст их мне напрямую. Она будет вести переговоры. Я тоже.\n\nС этой тростью и хромотой я уже выгляжу как человек, у которого слишком много прошлого. Это, возможно, первый раз за двадцать один год, когда эта конкретная презентация является преимуществом, а не обязательством.\n\nДля этой конкретной встречи выглядеть как человек с историей — правильный подход.\n\nУ меня есть история.\n\nМы едем.`
     },
     knows:{en:["The Rose + Barbed Wire seal predates current heraldry by 80 years — he recognized it from the pre-Auditor transition briefing. He has been aware of Valeria since before his appointment.","Valeria is a co-founder of the Third Repository, not just a client — she provided the financial infrastructure for the dome's establishment","Valeria's garden contains 17 botanical species producing compounds not in Isabella's catalogue — the invitation is into her operational advantage space"],ru:["Печать «Роза + Колючая Проволока» предшествует нынешней геральдике на 80 лет — он узнал её из до-Аудиторского переходного брифинга. Он знал о Валерии до своего назначения.","Валерия — сооснователь Третьего Хранилища, а не просто клиент — она предоставила финансовую инфраструктуру для создания купола","Сад Валерии содержит 17 ботанических видов, производящих соединения, которых нет в каталоге Изабеллы — приглашение ведёт в её оперативное пространство преимущества"]},
     misunderstands:{en:["He frames his plan as: gift → negotiation → extract information she has about the seven nodes. He is correct that she has information. He does not yet know that she is a co-architect, not just an investor. A co-architect has information about the design, not just the product. The design information is what he needs and what she will negotiate most carefully.","'Every client I have ever had has purchased deferral. They called it solutions.' He says this while describing what he is about to sell Valeria. He has not noted that this sentence describes every operation in this book, including every time the Auditor himself has framed a situation as solved when it was deferred."],ru:["Он формулирует свой план как: подарок → переговоры → извлечь информацию о семи узлах. Он прав что у неё есть информация. Он ещё не знает что она со-архитектор, а не просто инвестор. У со-архитектора есть информация о проекте, а не только о продукте. Информация о проекте — это то, что ему нужно, и то, о чём она будет вести переговоры наиболее тщательно.","«Каждый клиент, которого у меня когда-либо был, покупал отсрочку. Они называли это решениями». Он говорит это, описывая то, что собирается продать Валерии. Он не отметил что это предложение описывает каждую операцию в этой книге, включая каждый раз, когда сам Аудитор формулировал ситуацию как решённую, когда она была отсрочена."]},
     hides:{en:["He recognized Valeria's seal from the pre-Auditor transition briefing. He knew about her before he became Auditor. He has not said what the transition briefing said about her or why it was included.","'I have a history.' He said this. It is the first time he has used this formulation. He has described his work as twenty-one years of operations. He has not previously described the operations as constituting a history. The distinction is between a series of closed files and a continuous narrative. He used the word that implies the second.","The cane as advantage: 'looking like someone with a history is the correct approach.' He has converted the cost into an asset in one sentence. He has not noted that this conversion is the same mechanism he used on every client he has ever had — take their liability and reframe it as the thing they need to sell."],ru:["Он узнал печать Валерии из до-Аудиторского переходного брифинга. Он знал о ней до того, как стал Аудитором. Он не сказал, что говорил брифинг о ней и почему она была включена.","«У меня есть история». Он сказал это. Это первый раз когда он использовал эту формулировку. Он описывал свою работу как двадцать один год операций. Ранее он не описывал операции как составляющие историю. Разница между серией закрытых файлов и непрерывным нарративом. Он использовал слово, подразумевающее второе.","Трость как преимущество: «выглядеть как человек с историей — правильный подход». Он конвертировал издержку в актив в одном предложении. Он не отметил что эта конвертация — тот же механизм, который он использовал на каждом клиенте, которого у него когда-либо был: взять их обязательство и переформулировать как то, что им нужно продать."]},
     whisper:{en:"'I have a history.' First time he has used this word for himself. He converted the cane into an asset the same way he has converted every client's liability. He has not noticed he used his own technique on himself.",ru:"«У меня есть история». Первый раз он использовал это слово о себе. Он конвертировал трость в актив так же, как конвертировал обязательство каждого клиента. Он не заметил что использовал собственную технику на себе."}
   },
   valeria:{distortion:4,
     text:{
       en:`The courier arrived back in twelve minutes, which means the Guild acknowledged the letter before the wax was fully dry. He was waiting for it.\n\nGood.\n\nI have been waiting for this specific conversation for nineteen years. Not this man specifically — I did not know who would be Auditor when the Third Repository closed. I knew the Repository would close. Everything built with that timing eventually closes, because the timing itself is designed around closure. I provided the founding capital because I needed a working model of the mechanism, and the Repository gave me eleven years of operational data before someone finally came to dismantle it.\n\nEleven years of excellent data.\n\nHe broke my vase. The shards cut me. This is accurate — my joint pain started forty-eight hours after the Repository's collapse. The biological regression is not rapid, but it is certain. I have experienced it twice before, both times briefly, during supply disruptions. This disruption is permanent.\n\nI have approximately three years at current regression rate before I return to my natural biological age, which is one hundred and twenty. A woman of one hundred and twenty in the physical condition of one hundred and twenty does not survive long.\n\nHe will bring a palliative. This is also something I knew — the Guild's alchemical capability has been catalogued for years, and palliatives are what the Guild does. They sell stability to people who cannot afford instability. It is a good business model. I have used it myself.\n\nWhat he does not know is that I am not coming to the tea to purchase stability. I am coming to the tea to purchase something I cannot source anywhere else: the complete picture of what the mechanism is, and what it is being built for, and by whom.\n\nBecause I provided the capital for Node Three, and Node One, and was approached about Node Four before the approach stopped coming — and I still do not know what the completed mechanism does. I know the components. I funded some of them. I do not know the purpose.\n\nI have been living an extremely long time on the premise that the purpose would eventually be disclosed to me.\n\nIt has not been disclosed.\n\nI would like to negotiate for disclosure before I die.`,
       ru:`Курьер вернулся через двенадцать минут, что означает что Гильдия подтвердила письмо до того, как воск полностью высох. Он ждал его.\n\nХорошо.\n\nЯ жду именно этого разговора девятнадцать лет. Не этого конкретного человека — я не знала кто будет Аудитором когда закроется Третье Хранилище. Я знала что Хранилище закроется. Всё, построенное с тем временным горизонтом, в конечном счёте закрывается, потому что сам временной горизонт спроектирован вокруг закрытия. Я предоставила основополагающий капитал, потому что мне нужна была работающая модель механизма, и Хранилище дало мне одиннадцать лет оперативных данных до того, как кто-то наконец пришёл его демонтировать.\n\nОдиннадцать лет превосходных данных.\n\nОн разбил мою вазу. Осколки ранили меня. Это точно — боль в суставах началась через сорок восемь часов после обрушения Хранилища. Биологический регресс не стремительный, но неизбежный. Я испытывала его дважды прежде, оба раза кратко, во время перебоев поставок. Этот перебой постоянный.\n\nУ меня приблизительно три года при нынешних темпах регресса, прежде чем я вернусь к своему естественному биологическому возрасту — ста двадцати. Женщина ста двадцати лет в физическом состоянии ста двадцати не выживает долго.\n\nОн принесёт паллиатив. Это тоже то, что я знала — алхимические возможности Гильдии каталогизированы годами, а паллиативы — это то, что делает Гильдия. Они продают стабильность людям, которые не могут позволить себе нестабильность. Это хорошая бизнес-модель. Я использовала её сама.\n\nЧего он не знает — что я прихожу на чай не для покупки стабильности. Я прихожу для покупки того, что не могу получить нигде в другом месте: полной картины того, что такое механизм, для чего он строится и кем.\n\nПотому что я предоставила капитал для Узла Третьего, и Узла Первого, и со мной велись переговоры о Четвёртом до того, как переговоры прекратились — и я до сих пор не знаю, что делает завершённый механизм. Я знаю компоненты. Я финансировала некоторые из них. Я не знаю цели.\n\nЯ прожила чрезвычайно долгую жизнь на предпосылке что цель в конечном счёте будет раскрыта мне.\n\nОна не была раскрыта.\n\nЯ хотела бы договориться о раскрытии до своей смерти.`
     },
     knows:{en:["She funded Node One, Node Three, and was in preliminary negotiation for Node Four before the contact stopped. She knows three of the seven nodes from the inside.","The mechanism's closure timeline was designed into it — she knew the Repository would eventually close. She provided capital for data access, not for permanence.","She has approximately three years at current regression rate. She is coming to the tea to negotiate for disclosure of the mechanism's purpose, not to purchase palliative."],ru:["Она финансировала Узел Первый, Узел Третий и вела предварительные переговоры о Четвёртом до прекращения контакта. Она знает три из семи узлов изнутри.","Временной горизонт закрытия механизма был встроен в него — она знала что Хранилище в конечном счёте закроется. Она предоставила капитал для доступа к данным, а не для постоянства.","У неё приблизительно три года при нынешних темпах регресса. Она идёт на чай чтобы договориться о раскрытии цели механизма, а не для покупки паллиатива."]},
     misunderstands:{en:["She believes Dante is coming to the tea to sell stability and extract information. He is also coming to the tea because Valeria is the first person he has encountered across four arcs who was present at the mechanism's construction — and the question she cannot answer (what the mechanism does) is the question he most needs answered. They are negotiating for the same information from opposite directions.","She funded nodes because she needed a working model and operational data. She has eleven years of data from Node Three. She does not know that what the data describes is the Auditor's own capability profile — she was funding the test chamber without knowing she was funding the test."],ru:["Она считает что Данте идёт на чай продать стабильность и извлечь информацию. Он также идёт на чай, потому что Валерия — первый человек, которого он встретил за четыре арка, присутствовавший при строительстве механизма — а вопрос, на который она не может ответить (что делает механизм), является вопросом, ответ на который ему больше всего нужен. Они ведут переговоры за одну и ту же информацию с противоположных направлений.","Она финансировала узлы, потому что ей нужна была работающая модель и оперативные данные. У неё одиннадцать лет данных из Узла Третьего. Она не знает что то, что описывают данные, является профилем возможностей самого Аудитора — она финансировала испытательную камеру, не зная что финансирует испытание."]},
     hides:{en:["She has been waiting for this conversation for nineteen years — since the previous Auditor's tenure ended. She was present when the Pale Echelon founding document was drafted. She recognized the predecessor's name when the last Chronmancer briefing was circulated. She knows who the predecessor is. She will negotiate with this knowledge.","She does not know what the mechanism does. This is genuinely true. She has funded components, harvested data, and been told that 'the full disclosure comes at completion.' She has been living on this promise for over a hundred years. She has begun to suspect the disclosure was never going to come through normal channels."],ru:["Она ждала этого разговора девятнадцать лет — с момента окончания срока предыдущего Аудитора. Она присутствовала при составлении основополагающего документа Бледного Эшелона. Она узнала имя предшественника когда был разослан последний брифинг Хрономанта. Она знает кто такой предшественник. Она будет вести переговоры с этим знанием.","Она не знает что делает механизм. Это искренняя правда. Она финансировала компоненты, собирала данные и ей говорили что «полное раскрытие придёт при завершении». Она живёт на этом обещании более ста лет. Она начала подозревать что раскрытие никогда не придёт через обычные каналы."]},
     whisper:{en:"She was present when the Pale Echelon document was drafted. She knows the predecessor. She doesn't know what the mechanism does. She has been waiting for disclosure for over a hundred years.",ru:"Она присутствовала при составлении документа Бледного Эшелона. Она знает предшественника. Она не знает что делает механизм. Она ждёт раскрытия более ста лет."}
   }
 }
}

];

/* ═══ ENGINE ═══ */
const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');const secs=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}];c.innerHTML=secs.map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
