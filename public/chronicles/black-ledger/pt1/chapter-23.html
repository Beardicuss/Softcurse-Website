const TIMELINE=[
  {id:"TET-181",en:"The Gel treatment of the Leviathan's hull produced a result that neither Grimm's calculations nor Dante's donor-memory anticipated: the Gel did not coat the wood. It replaced it at the cellular level, consuming the organic cellulose structure and reconstituting the molecular components into nano-composite using the same transcription pathway as the facility's primary production loop. The hull is no longer wood reinforced by composite. It is composite that was previously wood. The distinction matters structurally: the replacement produced a hull with zero internal stress concentrations, because the Gel's optimization pathway eliminates lattice irregularities. The ship has no weak points. Every section of the hull is now structurally identical — same density, same stress distribution, same load-bearing capacity from keel to gunwale. No current shipwright in the world can produce this. It cannot be replicated without access to the Gel.",ru:"Обработка Гелем корпуса «Левиафана» произвела результат который не предвидели ни расчёты Гримма, ни донорская память Данте: Гель не покрыл дерево. Он заменил его на клеточном уровне, поглощая органическую целлюлозную структуру и воссоздавая молекулярные компоненты в нанокомпозит через тот же транскрипционный путь что основной производственный контур объекта. Корпус больше не является деревом усиленным композитом. Это композит который был ранее деревом. Различие важно структурно: замена произвела корпус с нулевыми внутренними концентрациями напряжения, потому что оптимизационный путь Геля устраняет неправильности решётки. У корабля нет слабых мест. Каждая секция корпуса теперь структурно идентична — одинаковая плотность, одинаковое распределение напряжения, одинаковая несущая способность от киля до планшира. Ни один нынешний корабел в мире не может это произвести. Это не может быть воспроизведено без доступа к Гелю."},
  {id:"TET-182",en:"The Leviathan's new hull has a secondary property Dante has not yet detected: it conducts the composite's null-field micro-resonance through the hull material. Because the hull is now structurally identical to the material in Dante's knee, his proprioceptive connection to the ship — the ability to feel structural stress and wave load through the composite leg's contact with the deck — extends through the entire hull. He can, if he learns to read the signal, feel the structural state of every section of the ship through the composite in his left leg, the same way he detected the ice barrier's fault line. The ship has become, in a limited sense, an extension of his body's detection system. He does not know this yet. Torin will be the first to suspect it, when he notices that Dante navigates by feel rather than by instrument.",ru:"Новый корпус «Левиафана» имеет вторичное свойство которое Данте ещё не обнаружил: он проводит нулевой микрорезонанс композита через материал корпуса. Поскольку корпус теперь структурно идентичен материалу в колене Данте, его проприоцептивная связь с кораблём — способность чувствовать структурное напряжение и волновую нагрузку через контакт ноги с композитом с палубой — распространяется через весь корпус. Он может, если научится читать сигнал, чувствовать структурное состояние каждой секции корабля через композит в левой ноге, так же как обнаружил линию разлома ледяного барьера. Корабль стал, в ограниченном смысле, расширением системы обнаружения его тела. Он пока не знает этого. Торин будет первым кто заподозрит это, когда заметит что Данте навигирует по ощущению а не по инструменту."},
  {id:"TET-183",en:"The Leviathan's hull transformation consumed all thirty liters of Gel accumulated over three weeks. The Gel's application to the ship was not an investment of production output — it was a demonstration of what the product does at scale. Dante used the Guild's entire asset reserve to upgrade his primary operational vehicle. This was operationally correct: the Leviathan's capability upgrade (speed, stealth, structural resilience) is worth more than the Gel's monetary value on the open market, because the ship is the delivery mechanism for every subsequent Guild operation. He converted a financial asset into a capability asset. The conversion is irreversible. If the Guild needs liquid capital in the next four weeks before the facility produces another thirty liters of inventory, it will not have it.",ru:"Трансформация корпуса «Левиафана» потребила все тридцать литров Геля накопленных за три недели. Применение Геля к кораблю не было инвестицией производственного выпуска — это была демонстрация что продукт делает в масштабе. Данте использовал весь резерв активов Гильдии для улучшения своего основного операционного средства. Это было операционно верно: улучшение возможностей «Левиафана» (скорость, скрытность, структурная устойчивость) стоит больше чем денежная ценность Геля на открытом рынке, потому что корабль является механизмом доставки для каждой последующей операции Гильдии. Он конвертировал финансовый актив в актив возможностей. Конвертация необратима. Если Гильдии понадобится ликвидный капитал в ближайшие четыре недели до того как объект произведёт ещё тридцать литров, его не будет."},
  {id:"TET-184",en:"Torin's 5% stake in all Gel production output, at the facility's projected full production capacity, represents approximately 1,600 gold per day — more per day than most guild-level operators earn in a month. Dante did not tell Torin this number. He told him it was 'more than any lord.' This is accurate and understated by approximately a factor of eight. Torin will discover the actual value when the first payment arrives. Unlike the White Fang deal (where understatement is permanent) and the equity certificates (where understatement will be corrected upward), this understatement will self-correct when production begins and the payment numbers become legible. Dante built a self-correcting upward surprise into the arrangement for the one person he needs to stay at the facility with maximum motivation. He knows Torin's primary motivator is not gold but the composite's acoustic properties. The gold will reinforce the motivation that already exists.",ru:"Доля Торина в 5% от всего производственного выпуска Геля, при прогнозируемой полной производительности объекта, составляет приблизительно 1600 золотых в день — больше в день чем большинство операторов гильдейского уровня зарабатывают в месяц. Данте не говорил Торину эту цифру. Он сказал ему что это «больше чем у любого лорда». Это точно и занижено примерно в восемь раз. Торин обнаружит реальную ценность когда придёт первый платёж. В отличие от сделки с Белым Клыком (где занижение постоянно) и акционерных сертификатов (где занижение будет скорректировано вверх), это занижение самоскорректируется когда начнётся производство и цифры платежей станут читаемы. Данте встроил самокорректирующийся повышательный сюрприз в договорённость для единственного человека которому нужно оставаться на объекте с максимальной мотивацией. Он знает что основным мотиватором Торина являются не золото а акустические свойства композита. Золото усилит уже существующую мотивацию."},
  {id:"TET-185",en:"The Leviathan's transit through the reformed Ice Barrier was possible because the Gel-treated hull's null-field resonance interacts with the ice the same way the composite leg interacted with the ice barrier fault line: the null-field micro-resonance prevents ice from bonding to the hull surface, producing the zero-friction characteristic that Dante described as 'hydrodynamic.' The ship does not slide through ice. The ice cannot form a grip on the hull because the null-field cancels the crystalline bonding force at the contact surface. This is a fourth application of the composite's structural disruption capability that Dante has not named as such: the harbor cobblestones (accidental), Torin's chain (accidental), the wyvern (deliberate), and now the ice passage (inherent in the hull material, not deliberate on his part). The capability is expanding without him directing the expansion.",ru:"Транзит «Левиафана» через возобновившийся Ледяной Барьер стал возможен, потому что нулевой резонанс обработанного Гелем корпуса взаимодействует со льдом так же как нога с композитом взаимодействовала с линией разлома ледяного барьера: нулевой микрорезонанс предотвращает связывание льда с поверхностью корпуса, производя нулевую характеристику трения которую Данте описал как «гидродинамическую». Корабль не скользит сквозь лёд. Лёд не может образовать сцепление с корпусом, потому что нулевое поле отменяет кристаллическую связующую силу на контактной поверхности. Это четвёртое применение возможности структурного нарушения композита которое Данте не назвал таковым: портовая брусчатка (случайно), цепь Торина (случайно), виверна (намеренно), и теперь ледяной проход (присущий материалу корпуса, ненамеренный с его стороны). Возможность расширяется без его направления расширения."},
  {id:"TET-186",en:"'We will enter the main harbor in broad daylight. We will park in their most expensive dock. And we will show them what a real black market looks like.' — This is the plan Dante stated to Whisper. It is operationally sound as a psychological operation: announcing arrival rather than concealing it reverses the power dynamic from 'wanted fugitive returns' to 'victorious expedition completes objective and returns on its own terms.' The element of surprise he mentioned is not geographic secrecy but temporal advantage — the Golden Circle believes the expedition took one month minimum. The Leviathan will arrive in one week. They will not have prepared the appropriate response. He is using a week of temporal displacement as an operational asset.",ru:"«Мы войдём в главный порт среди бела дня. Мы припаркуемся в их самом дорогом доке. И мы покажем им, что такое настоящий чёрный рынок». — Это план который Данте изложил Шепоту. Он операционно обоснован как психологическая операция: объявление прибытия вместо его сокрытия обращает динамику власти от «разыскиваемый беглец возвращается» к «победоносная экспедиция завершает задачу и возвращается на собственных условиях». Элемент неожиданности который он упомянул — не географическая секретность а временное преимущество: «Золотой Круг» считает что экспедиция занимает минимум месяц. «Левиафан» прибудет через неделю. Они не подготовят надлежащий ответ. Он использует неделю временного смещения как операционный актив."},
  {id:"TET-187",en:"Silas has approximately six hours left before Dante's review system automatically flags his Site Seven analysis queries. He has reached his conclusion — the predecessor wrote the plan Dante is executing — and has decided to deliver it when they return to the capital rather than on the ship. His reasoning: on the ship, Dante has no access to independent verification and cannot cross-reference the conclusion against the Guild's primary archives. In the capital, he can show Dante the full audit trail. This is correct operational reasoning. It is also the reasoning of someone who has been practicing how to deliver information that changes everything, and who needs the conversation to happen in a place where the recipient has the most complete context available before receiving it.",ru:"У Силаса приблизительно шесть часов до того как система проверки Данте автоматически помечает его запросы по анализу «Объекта Семь». Он достиг своего вывода — предшественник написал план который выполняет Данте — и решил доложить его когда вернутся в столицу а не на корабле. Его рассуждение: на корабле у Данте нет доступа к независимой верификации и он не может перекрёстно сверить вывод с основными архивами Гильдии. В столице он может показать Данте полную аудиторскую цепочку. Это верное операционное рассуждение. Это также рассуждение кого-то кто репетировал как доставить информацию меняющую всё, и кто нуждается в том чтобы разговор состоялся в месте где у получателя есть наиболее полный доступный контекст до получения."},
  {id:"TET-188",en:"The Leviathan's speed of 25+ knots with zero hull friction makes it the fastest large vessel in the known world by a factor of approximately two. No warship in any current fleet can catch it once it is at speed. The Golden Circle's naval response capability — their primary tool for interdicting Guild operations at sea — is now effectively zero for anything the Leviathan carries. The hostile takeover has acquired a mobility advantage that cannot be countered by any existing naval doctrine. What can counter it: ambush in harbor (the ship must dock eventually), land-based operations targeting Guild infrastructure, and political operations that do not require naval force. The Brotherhood of the Faceless is a land-based operation. The Lord-Director's actual leadership understands this. They are not sending ships. They are sending people who move through cities the way Whisper moves through shadows."}
];

const SCENES=[
{id:"s1",
 title:{en:"The Smell of Money",ru:"Запах Денег"},
 subtitle:{en:"Thirty liters. Three weeks. The price of rarity.",ru:"Тридцать литров. Три недели. Цена редкости."},
 location:{en:"Object 7-B — Observation Deck / Dock",ru:"Объект 7-Б — Наблюдательная Площадка / Причал"},
 timing:{en:"Three Weeks After Arrival",ru:"Три Недели После Прибытия"},
 flags:["pivotal","institution_build"],
 povData:{
   dante:{distortion:3,
     text:{
       en:`Three weeks of operation. Thirty liters of Gel at full biological transcription efficiency with the White Fang's waste stream as primary substrate. The output rate is constrained not by the facility's processing capacity but by the substrate supply — the clan delivers approximately three tons of organic matter per day, and the facility processes this to yield 1.5 liters of Gel per day when the run is clean and 1.2 liters when the substrate is mixed-type. The White Fang's hunting season produces peak substrate in the current month; this rate will decline by approximately sixty percent through the winter months when the primary prey populations migrate south.\n\nI have not told Silas about the seasonal decline curve. I have not told him because the capital return is already scheduled and the seasonal variance will be visible in the production figures before it needs to be communicated as a strategic constraint. Some information is best delivered by the data rather than by the analyst.\n\nThe smell of the processing operation is specific and consistent: a sweetish, faintly nauseating compound of enzymatic activity and organic degradation products. I have become accustomed to it. The workforce has not. They work in the processing bays for six-hour rotations and emerge pale and silent. Torins' system of rotation was his own design — I did not specify it. He observed that sustained exposure to the smell produced diminishing productivity returns after six hours and implemented the rotation without being asked.\n\nHe is a better operations manager than I gave him credit for when I selected him.\n\nThirty liters. The facility accumulated this over twenty-one days of operation. I am using all of it. I am not selling it, I am not holding it, I am not using it as demonstration stock for future customers. I am applying the entire Guild reserve of the most valuable substance in the known world to the hull of my ship.\n\nSilas believes this is a strategic error. He has not said so directly. He has expressed the concern as a question about the wisdom of using 'all of it.' He is correct that the liquid capital value is significant. He is also correct that I am choosing capability over capital.\n\nHe is wrong about which is the strategic error.\n\nA ship that cannot be caught, cannot be sunk, and cannot be traced is not an asset that has a market price. It is an asset that has a multiplier on every other asset. The Leviathan treated is worth more than thirty liters of Gel sold. It is worth more than thirty liters of Gel sold plus the thirty subsequent liters of Gel accumulated over the next three weeks. It is worth more than any finite quantity of Gel sold, because the things I can do with the capability differential are worth more than any finite quantity of Gel.\n\nI did not explain this to Silas in full.\n\nI said: we are not trading shields. We use them.\n\nThis was sufficient.`,
       ru:`Три недели работы. Тридцать литров Геля при полной эффективности биологической транскрипции с потоком отходов Белого Клыка как основным субстратом. Скорость выпуска ограничена не перерабатывающей мощностью объекта а поставкой субстрата — клан поставляет приблизительно три тонны органического вещества в день, и объект перерабатывает это давая 1,5 литра Геля в день когда прогон чистый и 1,2 литра когда субстрат смешанного типа. Сезон охоты Белого Клыка производит пиковый субстрат в текущем месяце; эта скорость снизится приблизительно на шестьдесят процентов в зимние месяцы когда основные популяции добычи мигрируют на юг.\n\nЯ не говорил Силасу о сезонной кривой снижения. Я не говорил ему, потому что возврат в столицу уже запланирован и сезонная дисперсия будет видна в производственных показателях до того как её нужно будет сообщать как стратегическое ограничение. Некоторая информация лучше доставляется данными а не аналитиком.\n\nЗапах перерабатывающей операции специфичен и последователен: сладковатое, слегка тошнотворное соединение ферментативной активности и продуктов органической деградации. Я к нему привык. Рабочая сила — нет. Они работают в перерабатывающих отсеках шестичасовыми ротациями и выходят бледными и тихими. Система ротации Торина была его собственной разработкой — я её не указывал. Он наблюдал что устойчивое воздействие запаха производило снижение производительности после шести часов и внедрил ротацию без запроса.\n\nОн лучший операционный менеджер чем я ему приписывал при выборе.\n\nТридцать литров. Объект накапливал это двадцать один день работы. Я использую всё. Я не продаю, не держу, не использую как демонстрационный запас для будущих покупателей. Я применяю весь резерв Гильдии наиболее ценного вещества в известном мире к корпусу моего корабля.\n\nСилас считает это стратегической ошибкой. Он не сказал напрямую. Он выразил озабоченность как вопрос о мудрости использования «всего». Он прав что ценность ликвидного капитала значительна. Он также прав что я выбираю возможности над капиталом.\n\nОн ошибается насчёт того что является стратегической ошибкой.\n\nКорабль который нельзя поймать, нельзя потопить и нельзя отследить — не актив имеющий рыночную цену. Это актив имеющий мультипликатор для каждого другого актива. «Левиафан» обработанный стоит больше чем тридцать литров Геля проданных. Он стоит больше чем тридцать литров Геля проданных плюс тридцать последующих литров Геля накопленных в следующие три недели. Он стоит больше чем любое конечное количество Геля проданного, потому что вещи которые я могу делать с дифференциалом возможностей стоят больше чем любое конечное количество Геля.\n\nЯ не объяснял это Силасу полностью.\n\nЯ сказал: мы не торгуем щитами. Мы ими пользуемся.\n\nЭтого было достаточно.`
     },
     knows:{en:["The seasonal substrate decline: 60% reduction through winter. He has not told Silas — some information is best delivered by data rather than the analyst","Torin implemented the six-hour rotation without being asked, having observed the productivity decline himself. 'He is a better operations manager than I gave him credit for when I selected him.'","The full capability-over-capital argument: a ship that cannot be caught is worth more than any finite quantity of Gel sold, because the capability multiplies every other asset."],ru:["Сезонное снижение субстрата: 60% снижение в зимние месяцы. Он не говорил Силасу — некоторая информация лучше доставляется данными а не аналитиком","Торин внедрил шестичасовую ротацию без запроса, самостоятельно наблюдав снижение производительности. «Он лучший операционный менеджер чем я ему приписывал при выборе».","Полный аргумент возможности-над-капиталом: корабль который нельзя поймать стоит больше чем любое конечное количество Геля проданного, потому что возможность умножает каждый другой актив."]},
     misunderstands:{en:["'Some information is best delivered by the data rather than the analyst.' This is operationally correct for the seasonal decline. It is also a pattern he has been applying across twenty-three chapters: withholding information until the receiving party encounters it through their own experience, on the grounds that the encounter is more effective than the transmission. He has not examined whether this pattern, applied consistently across all relationships, produces the same effect as trust."],ru:["«Некоторая информация лучше доставляется данными а не аналитиком». Это операционно верно для сезонного снижения. Это также паттерн который он применяет двадцать три главы: удерживание информации до того как получающая сторона столкнётся с ней через собственный опыт, на основании что столкновение эффективнее передачи. Он не исследовал производит ли этот паттерн, применяемый последовательно ко всем отношениям, тот же эффект что доверие."]},
     hides:{en:["He said he used the Gel on the ship rather than selling it because capability multiplies every other asset. This is true. He has not filed the second reason: that using the Gel on the ship is a demonstration to himself that he is not hoarding the product he produces. He has been monitoring his own impulse to accumulate — the expanding possessive vocabulary, the acquisitions — and applying all thirty liters to the hull is a check on that impulse. He is using the Gel before he can become attached to having it. He has not said this anywhere."],ru:["Он сказал что использовал Гель на корабле а не продал его, потому что возможность умножает каждый другой актив. Это правда. Он не занёс вторую причину: что использование Геля на корабле — демонстрация себе самому что он не копит продукт который производит. Он отслеживал собственный импульс к накоплению — расширяющийся притяжательный словарный запас, приобретения — и применение всех тридцати литров к корпусу — сдержка этого импульса. Он использует Гель прежде чем может привязаться к его наличию. Он не говорил этого нигде."]},
     whisper:{en:"He used all thirty liters before he could become attached to having them. He has not said this. He is monitoring his own accumulation impulse. The check is in the action, not the record.",ru:"Он использовал все тридцать литров прежде чем мог привязаться к их наличию. Он не сказал этого. Он отслеживает собственный импульс к накоплению. Сдержка в действии, а не в записи."}
   },
   silas:{distortion:3,
     text:{
       en:`He used all of it.\n\nThirty liters. Twenty-one days of production. The Guild's entire Gel reserve.\n\nOn the ship.\n\nI have been the Guild's treasurer for eleven years. I have managed the financial architecture of operations I did not fully understand. I have processed payments to recipients I could not identify. I have watched the Master make decisions that seemed wrong and were right, and decisions that seemed right and were right, and decisions that seemed insane and were right.\n\nI have never watched him use the entirety of the Guild's liquid reserves on a single operational asset.\n\nThe hull looks extraordinary. It is the blackest thing I have ever seen — not black the way coal is black, or night is black, but black the way a concept is black: the complete absence of reflected light. When I put my hand on it, the surface is warm and wrong in a way I cannot describe technically. It repels nothing. It admits nothing. It simply is.\n\nVariek's hammer test: the impact produced no visible result except a brief luminescence at the contact point. I have seen Varek break six-inch iron bolts with that hammer. The ship did not notice.\n\nThe capability analysis is obvious. The economic analysis is also obvious, and it is what I was hired to provide.\n\nThirty liters of Gel on the open market — if such a market existed, which it does not, which is itself an economic fact — would fetch approximately two hundred thousand gold at the demonstrated properties. Two hundred thousand gold buys an army, funds a year-long campaign, purchases the loyalty of half the capital's institutional apparatus.\n\nThe Master spent it on a coat of paint for his ship.\n\nI have run the counter-argument. I have run it seventeen times since the decision was announced. The counter-argument is correct: the ship's capability at this performance level has a force multiplier on every subsequent operation. The correct comparison is not 'Gel sold vs ship upgraded' but 'Gel sold vs everything the upgraded ship enables over its operational life.' That comparison is not close. The ship wins.\n\nHe is right.\n\nI am still going to put a note in the ledger that says 'all Gel reserves committed to hull upgrade, zero liquid capital remaining.'\n\nI am also going to note the Site Seven analysis in the same ledger entry.\n\nI have six hours before the system flags my query pattern.\n\nWe will be in the capital in one week.\n\nI will deliver the analysis then. In person. With the full audit trail. In a room where he can examine it without running.\n\nUntil then I will sit on the information that his entire operational history may have been written by someone else, and I will watch him upgrade his ship, and I will try to remember that I have been the Guild's treasurer for eleven years without the sky falling.`,
       ru:`Он использовал всё.\n\nТридцать литров. Двадцать один день производства. Весь резерв Геля Гильдии.\n\nНа корабле.\n\nЯ одиннадцать лет казначей Гильдии. Я управлял финансовой архитектурой операций которые не полностью понимал. Обрабатывал платежи получателям которых не мог идентифицировать. Наблюдал как Мастер принимает решения казавшиеся неверными и оказывавшиеся верными, решения казавшиеся верными и оказывавшиеся верными, и решения казавшиеся безумными и оказывавшиеся верными.\n\nЯ никогда не наблюдал как он использует всю совокупность ликвидных резервов Гильдии на единственный операционный актив.\n\nКорпус выглядит экстраординарно. Это самая чёрная вещь которую я видел — не чёрная как уголь, или как ночь, а чёрная как концепция чёрна: полное отсутствие отражённого света. Когда я прикладываю руку, поверхность тёплая и неправильная способом который я не могу описать технически. Она ничего не отталкивает. Ничего не допускает. Она просто есть.\n\nТест молотом Варека: удар не произвёл видимого результата кроме краткой люминесценции в точке контакта. Я видел как Варек этим молотом ломает железные болты толщиной в шесть дюймов. Корабль не заметил.\n\nАнализ возможностей очевиден. Экономический анализ также очевиден, и это то для предоставления чего я был нанят.\n\nТридцать литров Геля на открытом рынке — если бы такой рынок существовал, чего нет, что само по себе экономический факт — принесли бы приблизительно двести тысяч золотых при продемонстрированных свойствах. Двести тысяч золотых покупают армию, финансируют годовую кампанию, приобретают лояльность половины институционального аппарата столицы.\n\nМастер потратил это на слой краски для своего корабля.\n\nЯ прогнал контраргумент. Прогнал его семнадцать раз с момента объявления решения. Контраргумент верен: возможности корабля на этом уровне производительности имеют множитель силы для каждой последующей операции. Правильное сравнение не «Гель проданный против корабля улучшенного» а «Гель проданный против всего что улучшенный корабль обеспечивает на протяжении операционной жизни». Это сравнение несравнимо. Корабль побеждает.\n\nОн прав.\n\nЯ всё равно сделаю пометку в гроссбухе «весь резерв Геля направлен на улучшение корпуса, ноль ликвидного капитала остаётся».\n\nЯ также сделаю пометку об анализе «Объекта Семь» в той же записи гроссбуха.\n\nУ меня шесть часов до того как система пометит мой паттерн запросов.\n\nМы будем в столице через неделю.\n\nЯ доставлю анализ тогда. Лично. С полной аудиторской цепочкой. В комнате где он может исследовать это не убегая.\n\nДо тех пор я буду сидеть с информацией что вся его операционная история может быть написана кем-то другим, и наблюдать как он улучшает свой корабль, и пытаться помнить что я одиннадцать лет казначей Гильдии без обрушения неба.`
     },
     knows:{en:["He has run the capability-vs-capital counter-argument seventeen times and concluded the ship wins. He knows the Master is right.","He has six hours before the system flags his Site Seven queries. He will deliver the analysis in the capital, in person, with the full audit trail, in a room where Dante can examine it without running.","'I will try to remember that I have been the Guild's treasurer for eleven years without the sky falling.' — He is managing his own anxiety about the Site Seven conclusion. He is not certain the sky will not fall."],ru:["Он прогнал контраргумент возможности-против-капитала семнадцать раз и заключил что корабль побеждает. Он знает что Мастер прав.","У него шесть часов до пометки. Он доставит анализ в столице, лично, с полной аудиторской цепочкой, в комнате где Данте может исследовать без бегства.","«Я буду пытаться помнить что одиннадцать лет казначей Гильдии без обрушения неба». — Он управляет собственной тревогой о выводе «Объекта Семь». Он не уверен что небо не упадёт."]},
     misunderstands:{en:["He plans to deliver the Site Seven analysis 'in a room where he can examine it without running.' He is correct that the capital provides better context. He has not modeled the possibility that Dante already knows — not the conclusion, but the shape of the conclusion — and has been running the same non-examination pattern with the predecessor question that he runs with everything else. Delivering the analysis may not produce surprise. It may produce confirmation of something Dante has been carrying for twenty-three chapters."],ru:["Он планирует доставить анализ «Объекта Семь» «в комнате где он может исследовать без бегства». Он прав что столица предоставляет лучший контекст. Он не моделировал возможность что Данте уже знает — не вывод, а форму вывода — и применял тот же паттерн ненисследования к вопросу предшественника что применяет ко всему остальному. Доставка анализа может не произвести удивления. Она может произвести подтверждение чего-то что Данте несёт двадцать три главы."]},
     hides:{en:["He is going to note the Site Seven analysis in the same ledger entry as the Gel reserve commitment. He is marking these two facts as adjacent — the Guild's complete liquid capital committed to a single asset on the same day he confirmed the asset's acquisition was written into a plan he did not write. He is not hiding this adjacency. He is marking it. He is the only person in the Guild who has both facts and can see their adjacency."],ru:["Он сделает пометку об анализе «Объекта Семь» в той же записи гроссбуха что обязательство по резерву Геля. Он помечает эти два факта как смежные — весь ликвидный капитал Гильдии направлен на единственный актив в тот же день когда он подтвердил что приобретение актива было вписано в план который он не писал. Он не скрывает эту смежность. Он её помечает. Он единственный человек в Гильдии имеющий оба факта и видящий их смежность."]},
     whisper:{en:"He will note Site Seven adjacent to the Gel commitment in the same ledger entry. He is the only person who has both facts and can see their adjacency. He will deliver the analysis in person, in the capital.",ru:"Он сделает пометку «Объекта Семь» рядом с обязательством по Гелю в той же записи. Он единственный человек имеющий оба факта и видящий смежность. Он доставит анализ лично, в столице."}
   }
 }
},

{id:"s2",
 title:{en:"Baptism by Gel",ru:"Крещение Нефтью"},
 subtitle:{en:"The ship is no longer built from boards. It is carved from a single piece of obsidian.",ru:"Корабль больше не построен из досок. Он выточен из единого куска обсидиана."},
 location:{en:"The Dock — Object 7-B Bay",ru:"Причал — Бухта Объекта 7-Б"},
 timing:{en:"Application Day",ru:"День Применения"},
 flags:["revelation","arc_close","identity"],
 povData:{
   dante:{distortion:4,
     text:{
       en:`The ship stoned.\n\nThis is the wrong word — 'stoned' is what happens to architectural materials under sustained geological pressure. What is happening to the Leviathan is the correct word's absence: a process for which the current world has no vocabulary because the current world has not produced this material before.\n\nGrimm's injection method was correct. The Gel's transport mechanism through wood's capillary architecture is analogous to its transport mechanism through bone's canalicular network — the same molecular gradient-following behavior that moved it through my knee joint is moving it through the ship's frame. The ship's cellular structure is being consumed from the inside out, the carbon lattice of the cellulose being transcribed into the composite's crystalline architecture, with the native molecular components reassembled into a denser, more uniform structure.\n\nI watched through the filter lens as the blue infection spread.\n\nI have watched this process before. From the inside.\n\nWhen I described what I was observing to Whisper, I did not say: this is the same process as what happened to my knee. I said: the ship is changing. Both sentences are accurate. The first sentence has a referent that I have not examined: the comparison requires me to acknowledge that I have felt this process from the inside, in my own tissue, and that watching it happen to the ship produces a specific quality of recognition that is different from professional observation.\n\nI did not examine this recognition. I continued observing.\n\nThe hull transformation produced two unexpected properties. First: the surface friction coefficient dropped to approximately zero. The mathematical limit of friction. Varek's hammer found no purchase. Ice did not bond. This is the hydrodynamic advantage I had projected. Second: when I placed my ungloved hand on the finished hull, I felt something I have not felt through the composite leg's surface contact with ship structures: a faint, continuous structural signal. Not vibration. A signal. The hull was telling me something about its own load state. About the water pressure against its lower sections. About the temperature differential between its submerged and exposed faces.\n\nThe ship is now part of the same detection system as my leg.\n\nI removed my hand from the hull after approximately three seconds.\n\nI told Varek to test the impact resistance.\n\nI did not examine the detection system observation for the rest of the day.\n\nLaunching: the ship settled into the water and the surface disturbance was nothing. No bow wave. No turbulence. The hull's null-field micro-resonance prevents the water from forming the adhesion layer that produces drag. We did not test speed in the bay — the bay's confined geometry produces reflection interference. We will test speed in open water.\n\nIn the dark, the ship is invisible. Absolutely. Morison, the rower who brought us from the bay to the deck, spent forty seconds looking for the ship in conditions where I was standing on it. The hull absorbs all ambient light. It produces no reflections.\n\nI said: instrument of audit.\n\nThis is the correct name. An audit instrument does not announce itself. It arrives at the truth through presence, not through announcement. The ship does not need to be seen to be present. It will be present in the capital's harbor, in the most expensive dock, in broad daylight. The Guild will announce its presence loudly enough that the ship's silence will be the contrast.\n\nAudit conducted in silence, announced by everything else.\n\nBusiness continues.\n\nThis time I know what business it is.`,
       ru:`Корабль стал каменным.\n\nЭто неверное слово — «стал каменным» это то что происходит с архитектурными материалами под устойчивым геологическим давлением. То что происходит с «Левиафаном» — отсутствие верного слова: процесс для которого у нынешнего мира нет словарного запаса, потому что нынешний мир не производил этот материал прежде.\n\nМетод инъекции Гримма был верным. Транспортный механизм Геля через капиллярную архитектуру дерева аналогичен его транспортному механизму через каналикулярную сеть кости — то же поведение следования молекулярному градиенту которое перемещало его через мой коленный сустав перемещает его через каркас корабля. Клеточная структура корабля поглощается изнутри наружу, углеродная решётка целлюлозы транскрибируется в кристаллическую архитектуру композита, с родными молекулярными компонентами пересобираемыми в более плотную, более равномерную структуру.\n\nЯ наблюдал через линзу-фильтр как распространяется синяя инфекция.\n\nЯ наблюдал этот процесс прежде. Изнутри.\n\nКогда я описывал Шепоту что наблюдал, я не сказал: это тот же процесс что произошёл с моим коленом. Я сказал: корабль меняется. Оба предложения точны. Первое предложение имеет референт который я не исследовал: сравнение требует от меня признать что я чувствовал этот процесс изнутри, в собственной ткани, и что наблюдение за его происходящим с кораблём производит специфическое качество узнавания отличное от профессионального наблюдения.\n\nЯ не исследовал это узнавание. Продолжил наблюдать.\n\nТрансформация корпуса произвела два неожиданных свойства. Первое: коэффициент трения поверхности снизился до приблизительно нуля. Математический предел трения. Молот Варека не нашёл зацепки. Лёд не связался. Это гидродинамическое преимущество которое я проецировал. Второе: когда я приложил незащищённую руку к готовому корпусу, я почувствовал нечто чего не чувствовал через контакт поверхности ноги с композитом со структурами корабля: слабый, непрерывный структурный сигнал. Не вибрация. Сигнал. Корпус рассказывал мне что-то о собственном нагрузочном состоянии. О водном давлении против нижних секций. О температурном дифференциале между погружёнными и открытыми гранями.\n\nКорабль теперь является частью той же системы обнаружения что моя нога.\n\nЯ убрал руку с корпуса приблизительно через три секунды.\n\nЯ приказал Вареку проверить ударную прочность.\n\nЯ не исследовал наблюдение системы обнаружения остаток дня.\n\nСпуск: корабль осел в воду и поверхностное возмущение было ничтожным. Нет носовой волны. Нет турбулентности. Нулевой микрорезонанс корпуса предотвращает образование водой адгезионного слоя производящего сопротивление. Мы не тестировали скорость в бухте — замкнутая геометрия бухты производит интерференцию отражения. Мы протестируем скорость на открытой воде.\n\nВ темноте корабль невидим. Абсолютно. Морисон, гребец принёсший нас из бухты на палубу, провёл сорок секунд ища корабль в условиях где я стоял на нём. Корпус поглощает весь окружающий свет. Он не производит отражений.\n\nЯ сказал: инструмент аудита.\n\nЭто верное имя. Аудиторский инструмент не объявляет себя. Он достигает истины через присутствие, а не через объявление. Кораблю не нужно быть видимым чтобы присутствовать. Он будет присутствовать в гавани столицы, в самом дорогом доке, среди бела дня. Гильдия объявит о своём присутствии достаточно громко чтобы тишина корабля была контрастом.\n\nАудит проведённый в тишине, объявленный всем остальным.\n\nБизнес продолжается.\n\nНа этот раз я знаю что это за бизнес.`
     },
     knows:{en:["The hull is now part of the same detection system as his leg — he felt the structural load signal through bare-hand contact. He removed his hand after three seconds. He did not examine the detection observation for the rest of the day.","'I have watched this process before. From the inside.' He noted the referent without examining it.","'Business continues. This time I know what business it is.' — First time he has said he knows what the business is, without saying what it is."],ru:["Корпус теперь часть той же системы обнаружения что нога — он почувствовал структурный нагрузочный сигнал через контакт голой рукой. Он убрал руку через три секунды. Он не исследовал наблюдение системы обнаружения остаток дня.","«Я наблюдал этот процесс прежде. Изнутри». Он отметил референт без исследования.","«Бизнес продолжается. На этот раз я знаю что это за бизнес». — Первый раз когда он сказал что знает что такое бизнес, не говоря что это такое."]},
     misunderstands:{en:["'Business continues. This time I know what business it is.' He has said he knows. He has not said what it is. He has said this in the narration — the space where he says things he does not say aloud. The narration is the record of the things he knows but has not yet said. If he knows what the business is and has not said it, the narration is accumulating a debt to a sentence it has not written yet."],ru:["«Бизнес продолжается. На этот раз я знаю что это за бизнес». Он сказал что знает. Он не сказал что это такое. Он сказал это в нарративе — пространстве где говорит вещи которые не произносит вслух. Нарратив — запись вещей которые он знает но ещё не сказал. Если он знает что такое бизнес и не сказал, нарратив накапливает долг предложению которое ещё не написал."]},
     hides:{en:["He removed his hand from the hull after three seconds and did not examine the detection system observation for the rest of the day. He has now established a pattern of three-second contacts with new integrated detection capabilities followed by immediate disengagement: the Island composite on the shoreline, the control panel, the hull. Each time he contacts something that reveals a new integration capability, he breaks contact and moves on. He is managing the rate at which new integrations announce themselves by limiting contact duration.","'This time I know what business it is.' He has not written the sentence about what the business is. He is saving it. He may be saving it for the capital. He may be saving it for the moment when the meaning finishes arriving. He has not said when that will be."],ru:["Он убрал руку с корпуса через три секунды и не исследовал наблюдение системы обнаружения остаток дня. Он установил паттерн трёхсекундных контактов с новыми интегрированными возможностями обнаружения с последующим немедленным разъединением: островной композит на берегу, панель управления, корпус. Каждый раз когда контактирует с чем-то раскрывающим новую возможность интеграции, он разрывает контакт и движется дальше. Он управляет скоростью с которой новые интеграции объявляют себя ограничивая длительность контакта.","«На этот раз я знаю что это за бизнес». Он не написал предложение о том что такое бизнес. Он его сберегает. Возможно сберегает для столицы. Возможно сберегает для момента когда смысл закончит прибывать. Он не сказал когда это будет."]},
     whisper:{en:"He said 'this time I know what business it is' without saying what it is. He is saving the sentence. He limits contact with new integrations to three seconds. He is managing the rate at which his own capabilities announce themselves.",ru:"Он сказал «на этот раз я знаю что это за бизнес» не говоря что это такое. Он сберегает предложение. Он ограничивает контакт с новыми интеграциями тремя секундами. Он управляет скоростью с которой собственные возможности объявляют себя."}
   }
 }
},

{id:"s3",
 title:{en:"Division of Assets",ru:"Разделение Активов"},
 subtitle:{en:"Greed is a better guardian than loyalty. The black ghost goes south.",ru:"Жадность — лучший страж чем верность. Чёрный призрак идёт на юг."},
 location:{en:"The Beach / The Leviathan — Departure",ru:"Берег / «Левиафан» — Отплытие"},
 timing:{en:"Morning — Day of Departure",ru:"Утро — День Отплытия"},
 flags:["institution_build","threshold","foreshadowing"],
 povData:{
   dante:{distortion:3,
     text:{
       en:`Two hundred people stood in formation on the beach. This is not a metaphor for organization. They were literally in formation — rows, approximately even spacing, facing me. Torin organized it. I had not asked for it. He organized it because he understood that I was about to make a personnel announcement that would affect all of them, and that personnel announcements of this kind are more legible when the audience is ordered.\n\nHe continues to demonstrate operational competence I had not predicted. This is a positive surprise and also an operational concern: people who exceed the predicted performance ceiling become harder to contain within the designed parameters of their role. I will need to revise his mandate scope when the production establishes its steady-state rhythm.\n\nThe appointment: I told Torin he was staying as Managing Director of the Northern Branch. I told him his stake was five percent of Gel production output. I told him his task was supply chain, equipment maintenance, and perimeter defense.\n\nWhat I told him that is understated: the five percent figure. At full production capacity, this yields approximately 1,600 gold per day. I told him it was 'more than any lord.' It is considerably more than any lord. I will not correct this upward — the correction will arrive when the payment numbers become legible, and the upward revision will be more valuable to the relationship at that point than it would be now. Now it is a number he cannot verify. Then it will be a number that is verified and exceeded every day.\n\nThe key: I gave him the magnetic key-card to the facility's command room. He held it like an artifact of a dead civilization — which it is, technically. For him it is a symbol. For the system, it is an authorization credential. I have given a person authorization credentials to a Precursor-era facility. This is a decision I cannot easily reverse.\n\nGrimmery is in the basement with access to the Pale Echelon archive he found. He is reading. I have not told him I know about the archive hatch. I am choosing to let him find what he finds and bring it to me when he is ready. This is the sequencing principle applied to information I cannot yet verify. If I tell him I know about the hatch, I lose the opportunity to observe what he finds uninfluenced by what I expect.\n\nThe departure.\n\nThe Leviathan sits in the water like something that has decided not to be moved. The Gel-treated hull does not respond to wave action. In the bay's small swells, the ship is perfectly still while everything around it moves. This is a specific quality of wrong: things that are perfectly still in environments that move read as not-alive. The ship reads as not-alive.\n\nThis bothers me.\n\nI noted that it bothers me and got on the ship.\n\nWhen we hit the reformed ice field in open water, I was at the bow. The Leviathan touched the ice, and the ice moved away. Not broke, not crushed — moved. The hull's null-field resonance was cancelling the surface bonding at the contact point, and the ice, unable to grip, simply redistributed. We passed through at increasing speed. 15 knots. 20. 25.\n\nAt 25 knots the wind was considerable. I held the bow rail. The composite leg against the deck produced the structural signal I first felt with my hand on the hull — the load map, the water pressure, the temperature differential. I was reading the ship's structural state through my leg.\n\nI did not remove my leg from the deck.\n\nI let the signal run for the duration of the ice transit.\n\nI read the ship the way the ship reads the water.\n\nWe are going south. We will be in the capital in seven days. I have a plan that begins with a public arrival in the most expensive dock.\n\nAfter that, the plan opens into territory I have not yet mapped.\n\nThis is new. I have always mapped the territory before moving through it.\n\nBusiness continues. I know what it is now. I am ready to say it.\n\nNot yet. When we arrive.`,
       ru:`Двести человек стояли в строю на берегу. Это не метафора для организованности. Они буквально стояли в строю — ряды, приблизительно равные интервалы, лицом ко мне. Торин организовал. Я не просил об этом. Он организовал, потому что понял что я собираюсь сделать кадровое объявление которое затронет всех их, и что кадровые объявления этого рода более читаемы когда аудитория упорядочена.\n\nОн продолжает демонстрировать операционную компетентность которую я не предсказывал. Это позитивный сюрприз и также операционная проблема: люди превышающие прогнозируемый потолок производительности становятся труднее содержать в рамках разработанных параметров их роли. Мне нужно будет пересмотреть объём его мандата когда производство установит стационарный ритм.\n\nНазначение: я сказал Торину что он остаётся Управляющим Директором Северного Филиала. Сказал ему что его доля — пять процентов от выпуска Геля. Сказал ему что его задача — цепочка поставок, техническое обслуживание и защита периметра.\n\nЧто я сказал ему что занижено: цифра пяти процентов. При полной производительности это даёт приблизительно 1600 золотых в день. Я сказал ему что это «больше чем у любого лорда». Это значительно больше чем у любого лорда. Я не буду корректировать вверх — корректировка придёт когда цифры платежей станут читаемы, и повышательный пересмотр будет более ценным для отношений в тот момент чем сейчас. Сейчас это цифра которую он не может верифицировать. Тогда это будет цифра ежедневно верифицируемая и превышаемая.\n\nКлюч: я дал ему магнитную ключ-карту к командной рубке объекта. Он держал её как артефакт мёртвой цивилизации — что технически верно. Для него это символ. Для системы это мандат авторизации. Я дал человеку мандаты авторизации к объекту эпохи Предтечей. Это решение которое я не могу легко отменить.\n\nГримм в подвале с доступом к найденному им архиву Бледного Эшелона. Он читает. Я не говорил ему что знаю о люке архива. Я выбираю позволить ему найти что найдёт и принести мне когда будет готов. Это принцип последовательности применённый к информации которую я пока не могу верифицировать. Если я скажу ему что знаю о люке, я потеряю возможность наблюдать что он находит неповлияннее на то что я ожидаю.\n\nОтплытие.\n\n«Левиафан» лежит в воде как нечто решившее не двигаться. Обработанный Гелем корпус не реагирует на действие волн. В небольшой зыби бухты корабль абсолютно неподвижен пока всё вокруг движется. Это специфическое качество неправильного: вещи абсолютно неподвижные в средах которые движутся читаются как не-живые. Корабль читается как не-живой.\n\nЭто меня беспокоит.\n\nЯ отметил что это меня беспокоит и поднялся на корабль.\n\nКогда мы достигли восстановившегося ледяного поля на открытой воде, я был на носу. «Левиафан» коснулся льда, и лёд отошёл. Не сломался, не раздробился — отошёл. Нулевой резонанс корпуса отменял поверхностное связывание в точке контакта, и лёд, не способный зацепиться, просто перераспределялся. Мы проходили с нарастающей скоростью. 15 узлов. 20. 25.\n\nПри 25 узлах ветер был значительным. Я держался за нос. Нога с композитом против палубы производила структурный сигнал который я впервые почувствовал рукой на корпусе — карту нагрузки, водное давление, температурный дифференциал. Я считывал структурное состояние корабля через свою ногу.\n\nЯ не убирал ногу с палубы.\n\nЯ позволил сигналу работать на протяжении ледового транзита.\n\nЯ читаю корабль так, как корабль читает воду.\n\nМы идём на юг. Мы будем в столице через семь дней. У меня есть план начинающийся с публичного прибытия в самый дорогой причал.\n\nПосле этого план открывается в территорию которую я ещё не нанёс на карту.\n\nЭто ново. Я всегда наносил территорию на карту до движения через неё.\n\nБизнес продолжается. Теперь я знаю что это такое. Я готов сказать это.\n\nЕщё нет. Когда прибудем.`
     },
     knows:{en:["He knows Grimm found the archive hatch and is reading. He is choosing not to tell Grimm he knows — to observe what Grimm finds uninfluenced.","At the ice transit he let the composite-hull structural signal run for the full duration — he did not remove his leg from the deck. He read the ship. This is the first time he has held a new integration capability contact for more than three seconds.","'Business continues. This time I know what it is. I am ready to say it. Not yet. When we arrive.' — He is saving the sentence for the capital."],ru:["Он знает что Гримм нашёл люк архива и читает. Он выбирает не говорить Гримму что знает — наблюдать что Гримм найдёт неповлияннее.","На ледовом транзите он позволил структурному сигналу корпуса-с-композитом работать всё время — он не убирал ногу с палубы. Он читал корабль. Это первый раз когда он удерживал новый контакт возможности интеграции дольше трёх секунд.","«Бизнес продолжается. Теперь я знаю что это такое. Я готов сказать это. Ещё нет. Когда прибудем». — Он сберегает предложение для столицы."]},
     misunderstands:{en:["'The plan opens into territory I have not yet mapped. This is new.' He has been moving into unmapped territory since Chapter 11 — every chapter beyond the stated operational objective has been unmapped. What is new is that he is acknowledging the unmapped territory rather than producing a map retroactively. He is, for the first time, choosing to arrive somewhere before he has decided what it is. This is a significant behavioral change that he has not noted as such."],ru:["«План открывается в территорию которую я ещё не нанёс на карту. Это ново». Он движется в ненанесённую территорию с Главы 11 — каждая глава за пределами заявленного операционного объекта была ненанесённой. Что ново — он признаёт ненанесённую территорию вместо производства карты ретроспективно. Он впервые выбирает прибыть куда-то до того как решил что это такое. Это значительное поведенческое изменение которое он не отметил как таковое."]},
     hides:{en:["He did not remove his leg from the deck during the ice transit. He let the hull-composite signal run. He is reading the ship. He has not noted that this is the first time he has sustained contact with a new integration capability rather than breaking it at three seconds. The pattern of three-second contacts that he established in scenes 1 and 2 broke in scene 3. He has not noted the break.","'I am ready to say it. Not yet. When we arrive.' He has committed to saying the sentence in the capital. He has not examined what happens if the sentence is not what he thinks it is when he arrives — if the meaning is still arriving at the capital's dock and the sentence requires the arrival to complete it."],ru:["Он не убирал ногу с палубы во время ледового транзита. Он позволил сигналу корпус-композит работать. Он читает корабль. Он не отметил что это первый раз когда он поддерживает контакт с новой возможностью интеграции а не разрывает при трёх секундах. Паттерн трёхсекундных контактов установленный в сценах 1 и 2 сломался в сцене 3. Он не отметил разрыв.","«Я готов сказать это. Ещё нет. Когда прибудем». Он взял на себя обязательство сказать предложение в столице. Он не исследовал что происходит если предложение окажется не тем что он думает когда прибудет — если смысл всё ещё прибывает у причала столицы и предложение требует прибытия чтобы завершить его."]},
     whisper:{en:"He did not break the hull-composite contact at three seconds. The pattern broke. He is ready to say the sentence in the capital. He has not examined what happens if the sentence is not complete when he arrives.",ru:"Он не разорвал контакт корпус-композит при трёх секундах. Паттерн сломался. Он готов сказать предложение в столице. Он не исследовал что происходит если предложение не завершено когда прибудет."}
   }
 }
}
];

const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');c.innerHTML=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}].map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
