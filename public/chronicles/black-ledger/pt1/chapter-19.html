@keyframes flicker-mid{0%,88%,100%{opacity:1;}90%{opacity:.75;}92%{opacity:.9;}93%{opacity:.68;}94%{opacity:1;}}

const TIMELINE=[
  {id:"TET-149",en:"Grimm's damping system — leather from a cave-worm, oil dampeners, acoustic insulation casing — absorbed approximately 90% of the composite's integrity signal. The 10% remainder is now sub-threshold for standard detection at conversational distance. However, the dampening system has introduced a new signal: the specific sub-bass resonance of acoustic insulation under load, which operates at a frequency detectable by Void-adjacent perception at close range. Ignatius is dead. There is currently no one in the capital with Void-adjacent perception capable of detecting this sub-bass resonance. This may change.",ru:"Система демпфирования Гримма — кожа пещерного червя, масляные демпферы, акустическая изоляционная обшивка — поглотила приблизительно 90% сигнала целостности композита. Оставшиеся 10% теперь ниже порога стандартного обнаружения на расстоянии разговора. Однако система демпфирования ввела новый сигнал: специфический суббасовый резонанс акустической изоляции под нагрузкой, работающий на частоте обнаруживаемой Пустотно-смежным восприятием на близком расстоянии. Игнациус мёртв. В настоящее время в столице нет никого с Пустотно-смежным восприятием способного обнаружить этот суббасовый резонанс. Это может измениться."},
  {id:"TET-150",en:"The blade in Grimm's hidden heel modification is not a standard installation. Grimm based the mechanism on his knowledge of Precursor-era kinetic enhancement systems — specifically, the load-release-trigger design used in Precursor power-armour heel plates. He reverse-engineered the principle from six pages of technical notation in a manuscript he acquired illegally twenty years ago. Those six pages were part of the same Pale Echelon document series as the capsule schematics Dante's predecessor designed. Grimm has been holding fragments of the predecessor's technical library for twenty years without knowing what they were.",ru:"Лезвие в скрытой модификации пятки Гримма — не стандартная установка. Гримм основал механизм на своём знании систем кинетического усиления эпохи Предтечей — конкретно, конструкции пускового механизма высвобождения нагрузки использованной в пяточных пластинах силовой брони Предтечей. Он обратно разработал принцип из шести страниц технических нотаций в рукописи приобретённой незаконно двадцать лет назад. Эти шесть страниц были частью той же серии документов Бледного Эшелона что схемы капсулы спроектированной предшественником Данте. Гримм двадцать лет держал фрагменты технической библиотеки предшественника не зная что это такое."},
  {id:"TET-151",en:"Dante's Ignatius narrative to Morius — that Ignatius died heroically by throwing himself into the Island's reactor to seal a demon — is a construction of five true facts in an order that implies a sixth false one. The true facts: there was a combat entity; Ignatius used Holy Flame against it; Ignatius died; the Island's reactor was involved; the Island is gone. The implied false conclusion: Ignatius made a choice to die in a specific way for a specific purpose. The actual sequence: Ignatius was processed by the Herald's contamination-response protocol as a result of continuing to cast Holy Flame after being told not to. He did not choose to enter the reactor. The contamination-response sequence dissolved him where he stood. Dante has constructed a martyrdom from a failure to follow instructions.",ru:"Нарратив Данте о Игнациусе для Мориуса — что Игнациус героически погиб бросившись в реактор Острова чтобы запечатать демона — это конструкция из пяти истинных фактов в порядке подразумевающем шестой ложный. Истинные факты: была боевая сущность; Игнациус использовал Святое Пламя против неё; Игнациус умер; был задействован реактор Острова; Остров исчез. Подразумеваемый ложный вывод: Игнациус сделал выбор умереть определённым способом с определённой целью. Реальная последовательность: Игнациус был обработан протоколом ответа Вестника на загрязнение в результате продолжения применения Святого Пламени после указания не делать этого. Он не выбирал входить в реактор. Последовательность ответа на загрязнение растворила его там где он стоял. Данте построил мученичество из неумения следовать инструкциям."},
  {id:"TET-152",en:"Morius accepted the Ignatius martyrdom narrative not because he was deceived but because the narrative was useful. He understood within approximately ninety seconds of hearing it that it was a construction — Ignatius's temperament was consistent with the described sacrifice, but the specific details (entering the reactor personally, using life-force to overload the system) were too cinematically correct, too designed to produce a martyr's dossier. Morius has been managing manufactured narratives for fifty years. He recognized the craft. He accepted the cross and the story because the Church gains a Saint, the Inquisition gains a martyr, and Dante gains time. This is a fair trade from Morius's perspective. He told Dante: the Inquisition will not ask questions. He meant: we are both now committed to this story.",ru:"Мориус принял нарратив о мученичестве Игнациуса не потому что был обманут, а потому что нарратив был полезен. Он понял приблизительно через девяносто секунд после услышанного что это конструкция — темперамент Игнациуса соответствовал описанной жертве, но конкретные детали (личный вход в реактор, использование жизненной силы для перегрузки системы) были слишком кинематографически правильными, слишком разработанными для создания досье мученика. Мориус пятьдесят лет управляет сфабрикованными нарративами. Он распознал мастерство. Он принял крест и историю, потому что Церковь получает Святого, Инквизиция получает мученика, а Данте получает время. Это справедливый обмен с точки зрения Мориуса. Он сказал Данте: Инквизиция не будет задавать вопросов. Он имел в виду: мы оба теперь привязаны к этой истории."},
  {id:"TET-153",en:"The blood on Dante's handkerchief in the archive session was black. This is the second time in the book that his blood has been documented as non-standard color — the first was the nosebleed on the Island's shoreline when the recognition system interfaced with his blood chemistry. The blackening is a side-effect of the composite's nano-composite material migrating through the vascular system from the injection site. It is not toxic. It is re-engineering his circulatory chemistry to be compatible with the composite's maintenance requirements. His blood is, in trace amounts, becoming functionally analogous to the structural gel. The eyes that 'glowed with geometrically correct light' in the firelight were the composite's nano-composite reflecting the light source — the retinal vessels are beginning to integrate. He is changing, incrementally, in ways he cannot observe directly.",ru:"Кровь на носовом платке Данте во время сессии с архивом была чёрной. Это второй раз в книге когда его кровь документируется как нестандартного цвета — первым было носовое кровотечение на берегу Острова когда система распознавания интерфейсировала с биохимией его крови. Потемнение — побочный эффект нанокомпозитного материала мигрирующего через сосудистую систему от места инъекции. Это нетоксично. Это перестраивает его кровеносную химию для совместимости с требованиями технического обслуживания композита. Его кровь в следовых количествах становится функционально аналогичной структурному гелю. Глаза которые «блестели неестественным геометрически правильным светом» в свете камина — нанокомпозит отражающий источник света: сосуды сетчатки начинают интегрироваться. Он меняется постепенно способами которые не может наблюдать напрямую."},
  {id:"TET-154",en:"Object 7-B — 'Bio-mass processing and structural gel production facility, Dragon's Teeth range, Northern Wastes. Status: Conservation. Autonomy: 40%' — is operational at reduced capacity because it has been in self-maintenance mode since the Island network went dormant. The 40% autonomy figure means: it is running on its own, without external management, at 40% of full production capacity. When Dante arrives with personnel and activates the management-layer systems, it will scale to full production. Full production of structural gel would allow the Guild to repair, rebuild, and upgrade physical infrastructure at a rate that no current civilization has access to. The 'fuel station' framing is correct but dramatically understates the facility's capabilities.",ru:"Объект 7-Б — «Завод по переработке биомассы и производству структурного геля, хребет Драконьих Зубов, Северные Пустоши. Статус: Консервация. Автономность: 40%» — работает на пониженной мощности, потому что находится в режиме самообслуживания с момента перехода сети Острова в дремание. Цифра 40% автономности означает: он работает самостоятельно, без внешнего управления, на 40% полной производственной мощности. Когда Данте прибудет с персоналом и активирует системы управляющего слоя, он масштабируется до полного производства. Полное производство структурного геля позволит Гильдии ремонтировать, перестраивать и модернизировать физическую инфраструктуру темпами к которым ни одна нынешняя цивилизация не имеет доступа. Формулировка «заправочная станция» верна, но значительно занижает возможности объекта."},
  {id:"TET-155",en:"The Lord-Director of the Golden Circle in the epilogue is not the organization's actual leader. The Lord-Director title is a rotating figurehead position held by the senior Trade House representative for each quarter. The actual decision to deploy the Brotherhood of the Faceless was made by the three Trade House leaders who are Node One Cult clients — the same individuals who cleared the Node Three obstacle (Sector 13) deliberately to create the approach vector to the Island. They are not responding to the theft of a ship. They are responding to the discovery that someone else has reached the Island and emerged with something. They do not know what Dante brought back. They know he brought something back. They are correct.",ru:"Лорд-Директор «Золотого Круга» в эпилоге — не фактический лидер организации. Титул Лорд-Директора — ротируемая номинальная позиция занимаемая старшим представителем Торгового Дома каждый квартал. Реальное решение развернуть Братство Безликих было принято тремя лидерами Торговых Домов являющимися клиентами Узла Первого Культа — теми же людьми которые намеренно убрали препятствие Узла Третьего (Сектор 13) для создания вектора подхода к Острову. Они реагируют не на угон корабля. Они реагируют на открытие что кто-то другой достиг Острова и вышел с чем-то. Они не знают что Данте принёс обратно. Они знают что он что-то принёс. Они правы."},
  {id:"TET-156",en:"Grimm's payment request — 'no money, only access to study the leg occasionally' — is the most operationally dangerous payment structure Dante has accepted in nineteen chapters. Every previous payment involved conventional currencies (gold, political protection, information, institutional loyalty) that Dante could monitor and manage. Grimm's payment is: unrestricted proximity to the composite leg, on an ongoing basis, with no defined limit on the depth of study. Grimm has six pages of Pale Echelon technical notation that he does not know are from the predecessor's library. If Grimm continues studying the composite and encounters a reference that matches his six pages, he will identify the connection. He is two study sessions away from this, based on the rate at which his understanding of the composite's architecture is advancing.",ru:"Запрос оплаты Гримма — «не деньги, только доступ к периодическому изучению ноги» — наиболее операционно опасная структура оплаты принятая Данте за девятнадцать глав. Каждая предыдущая оплата включала обычные валюты (золото, политическая защита, информация, институциональная лояльность) которые Данте мог отслеживать и управлять. Оплата Гримма: неограниченная близость к ноге с композитом, на постоянной основе, без определённого предела глубины изучения. У Гримма есть шесть страниц технических нотаций Бледного Эшелона которые он не знает что из библиотеки предшественника. Если Гримм продолжит изучать композит и встретит ссылку совпадающую с его шестью страницами, он определит связь. Он в двух учебных сессиях от этого, исходя из скорости продвижения его понимания архитектуры композита."}
];

const SCENES=[
{id:"s1",
 title:{en:"The Confessional for Machines",ru:"Исповедальня для Машин"},
 subtitle:{en:"An engineer who was expelled for crossing steam engines with necromancy. Perfect.",ru:"Инженер которого выгнали за скрещивание паровых двигателей с некромантией. Идеально."},
 location:{en:"Lower City — Grimm's Workshop",ru:"Нижний Город — Мастерская Гримма"},
 timing:{en:"Evening, Day After Return",ru:"Вечер, День После Возвращения"},
 flags:["pivotal","new_player"],
 povData:{
   dante:{distortion:3,
     text:{
       en:`The lower city at night has a specific quality of silence: the silence of things that should not be happening, happening very quietly. Every workshop, backroom operation, and hidden atelier in the district is producing something that cannot be produced in the permitted areas. The noise of transgression is muffled and specific and everywhere.\n\nThe composite leg was not muffled. Every step produced the specific harmonic that I had documented across twenty-three surface types during the return voyage. The acoustic profile has not changed. Only my tolerance for it has changed, which is not an improvement — it means I have begun to accept a limitation rather than resolve it.\n\nWhisper's contact was correct. The workshop smelled like a theology of engineering — the specific reverence of someone who had been excommunicated from an institution for believing in something the institution said was impossible, and who had spent twenty years proving they were right in a space small enough that no one would notice. I understand this arrangement.\n\nGrimm's response to the composite was the response of someone who has never seen the technology but has been thinking about it for decades. Not surprise — recognition. The kind of recognition that arrives when a theory you have been holding finally gets a physical example to attach itself to. He called it 'the Great Machine.' He went to his knees. I gave him thirty seconds for reverence and then redirected him to the operational objective.\n\nThree hours of work. I declined analgesia because I needed full proprioceptive feedback during the modification — if the dampening system altered the load distribution in the joint, I needed to detect this in real time. It did not alter the distribution. The dampeners operate at the surface acoustic layer without touching the structural function. The bone-map I can feel through the composite remained accurate throughout.\n\nHe added the blade.\n\nI had not asked for this. He observed my movement patterns during the session and identified the weight-transfer habit — the specific shift that places the left leg in a clearance position for a strike — and he solved a problem I had not identified to him. The blade is from a different design lineage than the composite. He cannot have derived it from the Island's material. He derived it from something else he already knew.\n\nI filed this without examining it.\n\nThe cost: access to study the leg. No monetary figure. No time limit.\n\nThis is a worse deal than it appears. I accepted it because I needed the work done and because an engineer who will not take money for the right kind of knowledge is an engineer who will not sell that knowledge for money. The logic holds as far as I stated it.\n\nThe logic I did not state: an engineer who will not take money for knowledge will eventually want something other than money. I do not know what Grimm will want.\n\nHe is in the Guild now. His tools are in the Guild's basement. His payment is ongoing access.\n\nI have accepted an open-ended liability into the institution.\n\nFamily, I called it.\n\nI meant: you are now inside the perimeter where I can see you.`,
       ru:`Нижний город ночью имеет специфическое качество тишины: тишина вещей которых не должно происходить, происходящих очень тихо. Каждая мастерская, подсобная операция и тайное ателье в квартале производит что-то что не может производиться в разрешённых зонах. Шум нарушения приглушённый и специфический и повсюду.\n\nНога с композитом не была приглушённой. Каждый шаг производил специфическую гармонику которую я задокументировал по двадцати трём типам поверхностей в обратном плавании. Акустический профиль не изменился. Изменилась только моя терпимость к нему, что не является улучшением — это означает что я начал принимать ограничение вместо его разрешения.\n\nКонтакт Шепота был верным. Мастерская пахла теологией инженерии — специфическим благоговением кого-то кто был отлучён от институции за веру в нечто которое институция называла невозможным, и кто провёл двадцать лет доказывая свою правоту в пространстве достаточно малом чтобы никто не заметил. Я понимаю эту договорённость.\n\nРеакция Гримма на композит была реакцией кого-то никогда не видевшего эту технологию но думавшего о ней десятилетиями. Не удивление — узнавание. Вид узнавания приходящего когда теория которую ты держишь наконец получает физический пример к которому может прикрепиться. Он назвал это «Великой Машиной». Он встал на колени. Я дал ему тридцать секунд на благоговение и затем перенаправил к операционной цели.\n\nТри часа работы. Я отказался от обезболивания, потому что мне нужна была полная проприоцептивная обратная связь во время модификации — если система демпфирования изменит распределение нагрузки в суставе, мне нужно было обнаружить это в реальном времени. Она не изменила распределение. Демпферы работают на поверхностном акустическом слое не касаясь структурной функции. Костная карта которую я чувствую через композит оставалась точной на протяжении всего.\n\nОн добавил лезвие.\n\nЯ не просил об этом. Он наблюдал мои двигательные паттерны во время сессии и определил привычку переноса веса — специфический сдвиг помещающий левую ногу в позицию свободную для удара — и решил проблему которую я ему не называл. Лезвие из другой линии дизайна чем композит. Он не мог вывести его из материала Острова. Он вывел его из чего-то другого что уже знал.\n\nЯ занёс это без исследования.\n\nЦена: доступ к изучению ноги. Без денежной суммы. Без временного предела.\n\nЭто более плохая сделка чем кажется. Я принял её потому что мне нужна была работа и потому что инженер который не возьмёт деньги за правильный вид знания — инженер который не продаст это знание за деньги. Логика держится настолько насколько я её изложил.\n\nЛогика которую я не изложил: инженер который не возьмёт деньги за знание в конечном счёте захочет что-то иное чем деньги. Я не знаю что Гримм захочет.\n\nОн теперь в Гильдии. Его инструменты в подвале Гильдии. Его оплата — продолжающийся доступ.\n\nЯ принял открытое обязательство в институцию.\n\nСемья, я назвал это.\n\nЯ имел в виду: ты теперь внутри периметра где я могу тебя видеть.`
     },
     knows:{en:["The dampeners work at the surface acoustic layer without touching structural function — the bone-map through the composite remained accurate during the full three-hour session","The blade is from a different design lineage than the composite — Grimm derived it from something he already knew. He filed this without examining it.","'Family, I called it. I meant: you are now inside the perimeter where I can see you.' He stated both versions simultaneously — the first time he has done this in public-facing narration."],ru:["Демпферы работают на поверхностном акустическом слое не касаясь структурной функции — костная карта через композит оставалась точной на протяжении трёхчасовой сессии","Лезвие из другой линии дизайна чем композит — Гримм вывел его из чего-то что уже знал. Он занёс без исследования.","«Семья, я назвал это. Я имел в виду: ты теперь внутри периметра где я могу тебя видеть». Он изложил обе версии одновременно — первый раз когда сделал это в публично-ориентированном нарративе."]},
     misunderstands:{en:["'An engineer who will not take money for knowledge will not sell it for money.' This logic is correct as stated. The missing extension: an engineer who will not take money is already pursuing something that money cannot buy. Grimm spent twenty years being right about something in a workshop too small for anyone to notice. He wants to be right where someone can see it. The Guild is the largest audience he has had. This is more motivating than gold, and less predictable.","He filed 'the blade is from a different design lineage — he derived it from something he already knew' without examining it. The thing Grimm already knew is six pages of Pale Echelon technical notation from the predecessor's library. Dante has not connected Grimm's existing technical knowledge to the predecessor's distributed documentation."],ru:["«Инженер который не возьмёт деньги за знание не продаст его за деньги». Эта логика верна как изложена. Отсутствующее расширение: инженер который не берёт деньги уже преследует нечто что деньги не могут купить. Гримм провёл двадцать лет будучи прав о чём-то в мастерской слишком малой чтобы кто-то заметил. Он хочет быть правым там где кто-то может видеть. Гильдия — самая большая аудитория которая у него была. Это более мотивирующе чем золото, и менее предсказуемо.","Он занёс «лезвие из другой линии дизайна — он вывел из чего-то что уже знал» без исследования. То что Гримм уже знал — шесть страниц технических нотаций Бледного Эшелона из библиотеки предшественника. Данте не соединил существующие технические знания Гримма с распределённой документацией предшественника."]},
     hides:{en:["He accepted the analgesia refusal framing as operational necessity — needing proprioceptive feedback during modification. This is accurate. It is also the same choice as every other choice in this book that he made before he had a reason: the knee gel injection without ceremony, the vial delivery without hesitation, the cover identity acceptance without asking. He does not take analgesia when something is being done to his body because analgesia is a form of not-knowing, and he has spent nineteen chapters on the border between knowing and not-knowing, and this is the border he will not cross voluntarily.","He said 'I have accepted an open-ended liability into the institution' immediately after saying 'I called it family.' He translated the word. In nineteen chapters he has never translated a word he used for someone else into its operational meaning immediately after using it. He is explaining himself to himself. He has not noted that this is new."],ru:["Он принял формулировку отказа от обезболивания как операционную необходимость — потребность в проприоцептивной обратной связи во время модификации. Это точно. Это также тот же выбор что и каждый другой в этой книге который он сделал до того как имел причину: инъекция геля в колено без церемоний, доставка флакона без колебаний, принятие личности прикрытия без вопросов. Он не берёт обезболивающее когда с его телом что-то делается, потому что обезболивающее — форма незнания, а он провёл девятнадцать глав на границе между знанием и незнанием, и это граница которую он добровольно не пересечёт.","Он сказал «я принял открытое обязательство в институцию» немедленно после «я назвал это семьёй». Он перевёл слово. В девятнадцати главах он никогда не переводил слово используемое для кого-то другого в его операционное значение немедленно после использования. Он объясняет себя самому себе. Он не отметил что это ново."]},
     whisper:{en:"He called it family. He immediately translated: inside the perimeter where I can see you. He is explaining himself to himself. He has not noted that this is the first time he has done this.",ru:"Он назвал это семьёй. Немедленно перевёл: внутри периметра где я могу тебя видеть. Он объясняет себя самому себе. Он не отметил что это первый раз когда он делает это."}
   },
   grimm:{distortion:4,
     text:{
       en:`Twenty years ago they expelled me from the Guild of Mechanics for submitting a theoretical paper on necromantic-thermal integration. The paper argued that death-energy and steam-energy are both forms of phase transition and should be compatible as mechanical inputs. The Guild said this was blasphemy. I said it was thermodynamics.\n\nI have been right for twenty years in a basement.\n\nThen someone knocked on the door using a contact protocol I designed for the lower city network six years ago, which means they know people who trust me, which means they know what I actually do down here. And they brought me a leg.\n\nNot a prosthetic. Not an artifact. A leg. A biological-mechanical integration running on principles I have been theorizing in isolation for the better part of two decades. Magnetic levitation at the cellular level. Self-regulating load distribution. The material remembers its function and executes it continuously without external input.\n\nThis is what I wrote about. This is the theoretical endpoint of everything I have been working toward.\n\nI did not ask how he got it. He was clearly not going to tell me and I was clearly going to work on it regardless.\n\nI worked on the acoustic problem. Cave-worm leather is the correct choice — it absorbs at the resonance frequency of the signal without introducing structural rigidity. The oil dampeners are crude but they work. The casing will hold the profile within acceptable parameters for approximately eighteen months before the leather begins to fatigue under the composite's load-bearing micro-resonance. He will need to return.\n\nHe will return.\n\nThe blade was not in the original scope. But I watched him move during the session and I saw the weight-transfer habit, and I have a page in one of my notebooks that describes exactly this kinetic configuration — a footnote in a technical notation series I bought from a fence twenty years ago, which I have never been able to fully decode. The page shows a heel-plate trigger mechanism for what the notation calls 'standard auditor-class deployment configuration.'\n\nI did not tell him about the page.\n\nI have not told anyone about the page. The fence said the notation was from a pre-Guild engineering archive. I have been trying to decode the rest of the series for twenty years.\n\nHe took the leg and said: you are family now.\n\nI believe him. Not because he is kind — he is not kind, kindness requires warmth and he has the warmth of a well-maintained instrument. I believe him because he is the first person in twenty years who has looked at the thing I made and understood what it was for.\n\nThe basement is a Guild basement now.\n\nI have access to the leg.\n\nI am going to decode the rest of the series.`,
       ru:`Двадцать лет назад они изгнали меня из Гильдии Механиков за представление теоретической работы по некромантически-тепловой интеграции. Работа утверждала что энергия смерти и энергия пара — обе формы фазового перехода и должны быть совместимы как механические входные данные. Гильдия сказала что это богохульство. Я сказал что это термодинамика.\n\nЯ был прав двадцать лет в подвале.\n\nПотом кто-то постучал в дверь используя протокол контакта который я разработал для сети нижнего города шесть лет назад, что означает они знают людей доверяющих мне, что означает они знают что я реально делаю здесь. И они принесли мне ногу.\n\nНе протез. Не артефакт. Ногу. Биологически-механическую интеграцию работающую на принципах которые я теоретизировал в изоляции лучшую часть двух десятилетий. Магнитная левитация на клеточном уровне. Саморегулируемое распределение нагрузки. Материал помнит свою функцию и выполняет её непрерывно без внешнего ввода.\n\nЭто то о чём я писал. Это теоретическая конечная точка всего к чему я работал.\n\nЯ не спрашивал как он это получил. Он явно не собирался говорить и я явно всё равно собирался работать над этим.\n\nЯ работал над акустической проблемой. Кожа пещерного червя — правильный выбор: она поглощает на резонансной частоте сигнала без введения структурной жёсткости. Масляные демпферы грубые но работают. Обшивка удержит профиль в приемлемых параметрах приблизительно восемнадцать месяцев до того как кожа начнёт деградировать под несущим микрорезонансом композита. Ему нужно будет вернуться.\n\nОн вернётся.\n\nЛезвие не было в исходном объёме. Но я наблюдал как он двигается во время сессии и увидел привычку переноса веса, и у меня есть страница в одном из блокнотов описывающая именно эту кинетическую конфигурацию — сноска в серии технических нотаций купленной у перекупщика двадцать лет назад которую я так и не смог полностью расшифровать. Страница показывает механизм пускового устройства пяточной пластины для того что нотация называет «стандартная конфигурация развёртывания класса аудитор».\n\nЯ не сказал ему о странице.\n\nЯ никому не говорил о странице. Перекупщик сказал что нотация из до-гильдийского инженерного архива. Я двадцать лет пытаюсь расшифровать остаток серии.\n\nОн взял ногу и сказал: ты теперь семья.\n\nЯ ему верю. Не потому что он добр — он недобрый, доброта требует тепла, а у него тепло хорошо обслуживаемого инструмента. Я верю ему, потому что он первый человек за двадцать лет который посмотрел на то что я сделал и понял для чего это.\n\nПодвал теперь подвал Гильдии.\n\nУ меня есть доступ к ноге.\n\nЯ собираюсь расшифровать остаток серии.`
     },
     knows:{en:["The cave-worm leather will fatigue in approximately eighteen months under the composite's micro-resonance. He will need to return. Grimm knows this and has not told him.","He has a page describing 'standard auditor-class deployment configuration' — the heel-plate trigger mechanism — in a notation series he cannot fully decode. He did not tell Dante about the page.","He believes Dante because Dante is the first person in twenty years to look at what he made and understand what it was for. This belief is accurate about Dante's comprehension capacity and does not require Dante to be good."],ru:["Кожа пещерного червя деградирует приблизительно через восемнадцать месяцев под микрорезонансом композита. Ему нужно будет вернуться. Гримм знает это и не сказал ему.","У него есть страница описывающая «стандартная конфигурация развёртывания класса аудитор» — механизм пускового устройства пяточной пластины — в серии нотаций которую он не может полностью расшифровать. Он не сказал Данте о странице.","Он верит Данте потому что Данте первый человек за двадцать лет посмотревший на то что он сделал и понявший для чего это. Это убеждение точно насчёт вместимости понимания Данте и не требует чтобы Данте был добрым."]},
     misunderstands:{en:["'He took the leg and said: you are family now.' He believes this. He has not asked what the family is, what membership involves, or what it costs. He has spent twenty years in a basement being right about something. The Guild offered him: a basement, an audience, and access to the most advanced mechanical artifact he has ever encountered. He accepted all three without asking what the implicit obligations are.","He has a page saying 'standard auditor-class deployment configuration.' He connected this to the heel-plate mechanism Dante uses. He has not connected it to the fact that the notation series it came from is older than the Guild — which means 'auditor-class' predates the Guild's Auditor position, which means the position was designed around a technical specification that existed before the institution did."],ru:["«Он взял ногу и сказал: ты теперь семья». Он верит этому. Он не спрашивал что такое семья, что включает членство, или чего стоит. Он провёл двадцать лет в подвале будучи прав о чём-то. Гильдия предложила ему: подвал, аудиторию и доступ к наиболее продвинутому механическому артефакту который он когда-либо встречал. Он принял все три не спрашивая каковы подразумеваемые обязательства.","У него есть страница говорящая «стандартная конфигурация развёртывания класса аудитор». Он соединил это с механизмом пяточной пластины который использует Данте. Он не соединил это с фактом что серия нотаций из которой это пришло старше Гильдии — что означает «класс аудитор» предшествует позиции Аудитора Гильдии, что означает позиция была спроектирована вокруг технической спецификации существовавшей до того как существовала институция."]},
     hides:{en:["He has not told Dante about the page. He plans to decode the rest of the series with access to the leg. He has a practical motivation that is separate from his stated motivation (admiration, belonging). He is withholding information that is operationally relevant to Dante's heritage and providing access to the composite in exchange for the ability to acquire more of it. The arrangement is symmetrical: both parties are withholding from each other and accessing each other's resources. Dante knows his side. He does not know Grimm's."],ru:["Он не сказал Данте о странице. Он планирует расшифровать остаток серии с доступом к ноге. У него есть практическая мотивация отдельная от заявленной (восхищение, принадлежность). Он скрывает информацию операционно релевантную для наследия Данте и предоставляет доступ к композиту в обмен на возможность приобрести больше. Договорённость симметрична: обе стороны скрывают друг от друга и получают доступ к ресурсам друг друга. Данте знает свою сторону. Он не знает сторону Гримма."]},
     whisper:{en:"He has a page saying 'standard auditor-class deployment configuration.' He plans to decode the rest of the series. He did not tell Dante. The arrangement is symmetrical: both are withholding. Dante knows his side.",ru:"У него есть страница говорящая «стандартная конфигурация развёртывания класса аудитор». Он планирует расшифровать остаток серии. Он не сказал Данте. Договорённость симметрична: оба скрывают. Данте знает свою сторону."}
   }
 }
},

{id:"s2",
 title:{en:"Saint Ignatius the Martyr",ru:"Святой Мученик Игнациус"},
 subtitle:{en:"A martyrdom constructed from a failure to follow instructions.",ru:"Мученичество построенное из неумения следовать инструкциям."},
 location:{en:"Cardinal Morius's Private Chapel",ru:"Приватная Часовня Кардинала Мориуса"},
 timing:{en:"The Following Morning",ru:"Следующее Утро"},
 flags:["deception","pivotal"],
 povData:{
   dante:{distortion:3,
     text:{
       en:`The chapel smells of myrrh and the specific quality of silence that institutions maintain when they want you to feel that something greater than you is present. The technique is architectural: the acoustics are calibrated so that ambient sounds — breath, footstep, clothing — are amplified slightly relative to voice, creating the impression that the room itself is listening. It is very effective on people who believe the room is listening. I noted it and adjusted my delivery accordingly.\n\nMorius did not turn around when I entered. This is a power-position display that I have seen him use twice before: allowing the visitor to walk into his awareness rather than announcing their presence by turning to acknowledge them. It works on people who feel they require acknowledgment. I sat down in the second pew and waited.\n\nHe asked about the pier. I gave him: trauma, radical prosthetics, heavy alloys, inconvenient but effective. He accepted this because the cover matches the visible evidence — the gait change, the weight impact, the floor damage — and because querying further would require him to concede that he had heard the account from secondary sources, which would mean acknowledging that he monitors my movements, which is a concession he would not make in this chapel.\n\nThen he asked about Ignatius.\n\nI had prepared three versions of the Ignatius account. The first was entirely false. The second was entirely true. The third was the correct one for Morius: five true facts assembled to imply one false conclusion.\n\nIgnatius died in the Main Hall of the Island of Silence as a direct result of his own actions — specifically, the continued application of Holy Flame against a system designed to absorb organized magical energy, after being warned not to do so. The warning was mine. He heard it and continued. The resulting dissolution was the contamination-response protocol of the Herald-class entity he had just fed a significant quantity of magical energy to.\n\nThis is accurate.\n\nWhat I told Morius: there was a demon. Ignatius fought it with everything he had. When he understood that conventional weapons were useless, he made the choice to enter the reactor core and use his life-force to overload the system, sealing the demon and destroying the Island.\n\nThis is five true facts: there was an entity, Ignatius used everything he had against it, conventional weapons were useless, a reactor was involved, the Island was destroyed.\n\nThe false conclusion they imply: Ignatius made a deliberate heroic choice.\n\nWhisper had found the cross in the ash pile on the platform. I do not know if the cross survived the dissolution or if the cross was on the platform before the dissolution and survived separately. I chose not to examine this question.\n\nMorius's fingers did not quite tremble when he took the cross. But they moved differently than they move when he handles documents. I noted this as evidence of genuine emotional processing rather than performed response.\n\nHe told me the Golden Circle had issued an Aleph-class bounty. Ten thousand gold. Professional killers. He offered me time — Inquisition non-interference, for the moment.\n\nI bowed and left.\n\nIn the corridor I noted: I have just made Ignatius into a Saint. An Inquisitor who died because he would not follow a specific operational instruction has been canonized by the person who gave the instruction he refused.\n\nI have filed this in the third location.`,
       ru:`Часовня пахнет миррой и специфическим качеством тишины которую поддерживают институции когда хотят чтобы вы ощутили присутствие чего-то превосходящего вас. Техника архитектурная: акустика откалибрована так что окружающие звуки — дыхание, шаг, одежда — немного усилены относительно голоса, создавая впечатление что сама комната слушает. Это очень эффективно на людях которые верят что комната слушает. Я отметил это и соответственно откорректировал подачу.\n\nМориус не обернулся когда я вошёл. Это демонстрация позиции силы которую я видел от него дважды прежде: позволяя посетителю войти в его осознание вместо объявления их присутствия поворотом для признания. Это работает на людях чувствующих что требуют признания. Я сел во второй ряд скамей и ждал.\n\nОн спросил о причале. Я дал ему: травма, радикальное протезирование, тяжёлые сплавы, неудобно но эффективно. Он принял это, потому что прикрытие соответствует видимым свидетельствам — изменение походки, ударная нагрузка, повреждение пола — и потому что дальнейшие запросы потребовали бы от него признания что он слышал отчёт из вторичных источников, что означало бы признание что он отслеживает мои передвижения, что является уступкой которую он не сделал бы в этой часовне.\n\nПотом он спросил об Игнациусе.\n\nЯ подготовил три версии отчёта об Игнациусе. Первая была полностью ложной. Вторая была полностью правдивой. Третья была верной для Мориуса: пять истинных фактов собранных чтобы подразумевать один ложный вывод.\n\nИгнациус умер в Главном Зале Острова Тишины как прямое следствие своих собственных действий — конкретно, продолжения применения Святого Пламени против системы разработанной поглощать организованную магическую энергию, после предупреждения не делать этого. Предупреждение было моим. Он услышал его и продолжил. Результирующее растворение было протоколом ответа на загрязнение сущности класса Вестника которую он только что накормил значительным количеством магической энергии.\n\nЭто точно.\n\nЧто я сказал Мориусу: был демон. Игнациус боролся с ним всем что имел. Когда он понял что обычное оружие бесполезно, он сделал выбор войти в реакторное ядро и использовать свою жизненную силу для перегрузки системы, запечатав демона и уничтожив Остров.\n\nЭто пять истинных фактов: была сущность, Игнациус использовал всё что имел против неё, обычное оружие было бесполезно, был задействован реактор, Остров был уничтожен.\n\nЛожный вывод который они подразумевают: Игнациус сделал намеренный героический выбор.\n\nШепот нашёл крест в груде пепла на платформе. Я не знаю пережил ли крест растворение или был ли крест на платформе до растворения и пережил отдельно. Я выбрал не исследовать этот вопрос.\n\nПальцы Мориуса не совсем дрожали когда он взял крест. Но они двигались иначе чем когда он работает с документами. Я отметил это как свидетельство подлинной эмоциональной обработки а не выполненного ответа.\n\nОн сказал мне «Золотой Круг» выдал награду класса Алеф. Десять тысяч золота. Профессиональные убийцы. Он предложил мне время — невмешательство Инквизиции, на данный момент.\n\nЯ поклонился и ушёл.\n\nВ коридоре я отметил: я только что сделал Игнациуса Святым. Инквизитор умерший потому что не стал следовать конкретной операционной инструкции был канонизирован человеком давшим инструкцию которую он отверг.\n\nЯ занёс это в третье место.`
     },
     knows:{en:["The Ignatius narrative is five true facts implying one false conclusion. He prepared three versions — entirely false, entirely true, and the correct one for Morius.","Morius's fingers moved differently taking the cross than they move with documents — genuine emotional processing, not performed response.","'I have just made Ignatius into a Saint.' He noted this in the corridor. He filed it in the third location. This is the third item in the third location: the Siren's last words, the Cord name, and now this."],ru:["Нарратив об Игнациусе — пять истинных фактов подразумевающих один ложный вывод. Он подготовил три версии — полностью ложную, полностью правдивую, и верную для Мориуса.","Пальцы Мориуса двигались иначе беря крест чем с документами — подлинная эмоциональная обработка, не выполненный ответ.","«Я только что сделал Игнациуса Святым». Он отметил это в коридоре. Занёс в третье место. Это третий пункт в третьем месте: последние слова Сирены, имя Корда, и теперь это."]},
     misunderstands:{en:["He has noted that Morius's fingers moved differently — genuine emotional processing. He has interpreted this as information about Morius's relationship to Ignatius. He has not interpreted it as information about his own: he constructed a martyrdom for someone he watched die as a result of operational error, and gave it to the person who knew that person, and the person's fingers moved differently taking the cross. He noted the receiver's genuine response without noting his own.","The third version was correct for Morius because Morius would accept a construction that was useful. He assessed this correctly. He did not note that he prepared a version for Morius specifically — that before entering the chapel he made a decision about what Morius deserved to know about Ignatius's death. He has been doing this across nineteen chapters: calibrating disclosure based on what each person is equipped to receive. He has not named this as a form of care."],ru:["Он отметил что пальцы Мориуса двигались иначе — подлинная эмоциональная обработка. Он интерпретировал это как информацию об отношениях Мориуса к Игнациусу. Он не интерпретировал как информацию о собственных: он построил мученичество для кого-то кого наблюдал умирающим вследствие операционной ошибки, и передал это человеку знавшему того человека, и пальцы человека двигались иначе беря крест. Он отметил подлинный ответ получателя не отметив своего собственного.","Третья версия была верной для Мориуса потому что Мориус принял бы конструкцию которая была полезна. Он правильно оценил это. Он не отметил что подготовил версию специально для Мориуса — что перед входом в часовню он принял решение о том что Мориус заслуживает знать о смерти Игнациуса. Он делает это девятнадцать глав: калибрует раскрытие основываясь на том что каждый человек готов получить. Он не назвал это формой заботы."]},
     hides:{en:["He chose not to examine whether the cross survived the dissolution separately from Ignatius or was on the platform before. He chose not to examine this because the answer is operationally irrelevant — the cross is the artifact that makes the martyrdom work — and because examining it would require him to examine what it means that the cross might have survived when Ignatius did not, and what it means that he gave that cross to Morius without knowing what it is.","He filed 'I have just made Ignatius into a Saint' in the third location. The third location now has three items: the Siren's last words, Cord's name, and the Ignatius martyrdom. Three things he received and cannot examine because the examination requires categories he has not yet built. The category that connects all three: the cost of the things that happened because of decisions he made, borne by people who did not choose them."],ru:["Он выбрал не исследовать пережил ли крест растворение отдельно от Игнациуса или был на платформе до. Он выбрал не исследовать потому что ответ операционно нерелевантен — крест артефакт делающий мученичество работающим — и потому что исследование потребовало бы от него исследования что означает то, что крест мог пережить когда Игнациус не пережил, и что означает то, что он дал этот крест Мориусу не зная что это такое.","Он занёс «я только что сделал Игнациуса Святым» в третье место. В третьем месте теперь три пункта: последние слова Сирены, имя Корда, и мученичество Игнациуса. Три вещи которые он получил и не может исследовать, потому что исследование требует категорий которые он ещё не построил. Категория соединяющая все три: цена вещей случившихся вследствие решений которые он принял, несомая людьми которые их не выбирали."]},
     whisper:{en:"Three items in the third location now: the Siren's last words, Cord's name, and the Ignatius martyrdom. The category connecting all three: the cost of decisions he made, borne by people who did not choose them. He has not built this category yet.",ru:"Три пункта в третьем месте теперь: последние слова Сирены, имя Корда, и мученичество Игнациуса. Категория соединяющая все три: цена решений которые он принял, несомая людьми которые их не выбирали. Он ещё не построил эту категорию."}
   },
   morius:{distortion:5,
     text:{
       en:`He walked in without announcing himself, sat in the second pew, and waited.\n\nI have had forty-nine years of experience determining when a person who can wait is more powerful than a person who cannot wait. He can wait. He has always been able to wait. This is partly temperament and partly something else — a quality I identified in the archive nine months ago and have been watching develop across the subsequent operations. He waits the way someone waits who knows the outcome has already been determined and is merely being processed by the sequence of events.\n\nThe leg.\n\nI heard it before I turned. The acoustic profile of his new gait is: heavier on the left side, with a secondary resonance in the sub-bass register that leather and oil dampeners have reduced but not eliminated. He knew I was going to hear it. He gave me the prosthetics explanation before I asked, which means he had prepared it, which means he had anticipated that I would notice.\n\nThe Ignatius account.\n\nI know what Ignatius sounded like when he described his own combat operations. I have spent decades in the Inquisition's institutional structure. I know the vocabulary, the architecture, the specific way that institutional courage presents itself in narrative. The account I received was crafted — the rhythm was too clean, the causality too legible, the sacrifice too cinematically available. A real account has noise. This one did not.\n\nI took the cross.\n\nIgnatius was a difficult man. He was brilliant, inflexible, and convinced that his protocol was the correct protocol in all circumstances. He was usually right about the first. He was sometimes wrong about the second. The cross in my hand is warm from — something. I do not know what. I chose not to examine what.\n\nThe account Dante gave me is a construction. I know this. I am choosing to accept it because the Church gains a Saint and Dante gains time and both of us gain a shared story that neither can revise unilaterally. This is called an institutional compact. I have made forty-seven of them.\n\nI told him about the bounty. I told him the Inquisition would not interfere. I meant: we are both committed to the story now. If the story unravels, we unravel together. This is the arrangement.\n\nHe bowed and left.\n\nI am holding the cross.\n\nI have been waiting for this Auditor for twenty-three years. I identified him in year two of his tenure. I have been arranging operations — the Galahad contract, the Caldor commission, the archive access, the expedition, the martyrdom — to produce the outcome I needed.\n\nThe outcome I needed was: the Auditor reaches the Island and returns. He has done this. The secondary objectives — that he returns with the information and infrastructure necessary to complete the work the predecessor began — I cannot yet confirm.\n\nWhat I can confirm: he returned. He is changed. Whatever he found there, it is operating in him.\n\nThe cross is cool now.\n\nI did not know Ignatius well enough. He was a tool I miscalibrated. I sent a person who believed absolutely into a space that required relative judgment. He died for it.\n\nI have filed this in the same category as thirty-seven other calibration errors over fifty years.\n\nThe category is: the cost of the work.\n\nI pray for Ignatius tonight.\n\nI will not pray for myself. I am not finished.`,
       ru:`Он вошёл не объявляя себя, сел во второй ряд скамей и ждал.\n\nУ меня сорок девять лет опыта определения когда человек умеющий ждать более могущественен чем человек неумеющий. Он умеет ждать. Он всегда умел ждать. Это частично темперамент и частично что-то ещё — качество которое я определил в архиве девять месяцев назад и наблюдаю развивающимся в последующих операциях. Он ждёт так как ждёт кто-то знающий что исход уже был определён и только обрабатывается последовательностью событий.\n\nНога.\n\nЯ услышал её до того как обернулся. Акустический профиль новой походки: тяжелее слева, с вторичным резонансом в суббасовом регистре которые кожа и масляные демпферы снизили но не устранили. Он знал что я услышу. Он дал мне объяснение о протезах до того как я спросил, что означает он подготовил его, что означает он предвидел что я замечу.\n\nОтчёт об Игнациусе.\n\nЯ знаю как звучал Игнациус описывая собственные боевые операции. Я провёл десятилетия в институциональной структуре Инквизиции. Я знаю словарный запас, архитектуру, специфический способ которым институциональная храбрость представляет себя в нарративе. Полученный отчёт был сработан — ритм был слишком чистым, причинно-следственная связь слишком читаемой, жертва слишком кинематографически доступной. Настоящий отчёт имеет шум. Этот не имел.\n\nЯ взял крест.\n\nИгнациус был трудным человеком. Он был блестящим, негибким и убеждённым что его протокол является правильным протоколом при всех обстоятельствах. Обычно он был прав насчёт первого. Иногда ошибался насчёт второго. Крест в руке тёплый от — чего-то. Я не знаю чего. Я выбрал не исследовать чего.\n\nОтчёт который дал мне Данте — конструкция. Я знаю это. Я выбираю принять его, потому что Церковь получает Святого а Данте получает время и мы оба получаем общую историю которую ни один не может пересмотреть в одностороннем порядке. Это называется институциональным пактом. Я заключил сорок семь таких.\n\nЯ сказал ему о награде. Сказал что Инквизиция не будет вмешиваться. Я имел в виду: мы оба теперь привязаны к истории. Если история разворачивается, мы разворачиваемся вместе. Такова договорённость.\n\nОн поклонился и ушёл.\n\nЯ держу крест.\n\nЯ ждал этого Аудитора двадцать три года. Я определил его на втором году его службы. Я устраивал операции — контракт с Галахадом, комиссия Кальдора, архивный доступ, экспедиция, мученичество — чтобы произвести нужный мне исход.\n\nНужный мне исход был: Аудитор достигает Острова и возвращается. Он сделал это. Вторичные цели — что он возвращается с информацией и инфраструктурой необходимой для завершения работы начатой предшественником — я пока не могу подтвердить.\n\nЧто я могу подтвердить: он вернулся. Он изменился. Что бы он ни нашёл там, это работает в нём.\n\nКрест теперь холодный.\n\nЯ недостаточно хорошо знал Игнациуса. Он был инструментом который я неверно откалибровал. Я послал человека верившего абсолютно в пространство требовавшее относительного суждения. Он умер за это.\n\nЯ занёс это в ту же категорию что тридцать семь других ошибок калибровки за пятьдесят лет.\n\nКатегория: цена работы.\n\nЯ молюсь за Игнациуса сегодня ночью.\n\nЯ не буду молиться за себя. Я не закончен.`
     },
     knows:{en:["The Ignatius account was crafted — too clean, no noise. He accepted it because it was useful, not because he was deceived.","'He is changed. Whatever he found there, it is operating in him.' He observed this from the leg, the gait, and the quality of the wait.","He filed Ignatius under 'calibration errors — the cost of the work.' Thirty-seven over fifty years. Ignatius is thirty-eight."],ru:["Отчёт об Игнациусе был сработан — слишком чист, нет шума. Он принял его потому что был полезен, а не потому что был обманут.","«Он изменился. Что бы он ни нашёл там, это работает в нём». Он наблюдал это из ноги, походки и качества ожидания.","Он занёс Игнациуса под «ошибки калибровки — цена работы». Тридцать семь за пятьдесят лет. Игнациус — тридцать восьмой."]},
     misunderstands:{en:["'I sent a person who believed absolutely into a space that required relative judgment.' He has correctly diagnosed the calibration error. He has not examined whether the error was in sending Ignatius specifically or in building an expedition that required someone with Void-adjacent perception and providing that person to the Golden Circle while retaining no ability to adjust their behavior once deployed. The error is upstream of the Ignatius selection."],ru:["«Я послал человека верившего абсолютно в пространство требовавшее относительного суждения». Он правильно диагностировал ошибку калибровки. Он не исследовал была ли ошибка в посылке именно Игнациуса или в построении экспедиции требовавшей кого-то с Пустотно-смежным восприятием и предоставлении этого человека «Золотому Кругу» при сохранении нулевой способности корректировать их поведение после развёртывания. Ошибка выше по цепи чем выбор Игнациуса."]},
     hides:{en:["'The cross is warm from — something. I chose not to examine what.' He is the most experienced narrative manager in the book. He chose not to examine a piece of evidence in his own hands. The something is the composite's residual thermal signature: the cross was on the platform where the Herald's reactor detonation occurred, and the black particulate from that event transferred a trace of the composite's nano-resonance to the cross's surface. He is holding a cross that has Island material on it. He chose not to investigate this.","He says 'I have been waiting twenty-three years. I arranged this.' He is describing himself as the architect of the outcome. He has not examined whether the outcome he arranged is the outcome that arrived — whether what came back from the Island is the Auditor he arranged to send, or something else using the Auditor's infrastructure."],ru:["«Крест тёплый от — чего-то. Я выбрал не исследовать чего». Он наиболее опытный менеджер нарративов в книге. Он выбрал не исследовать кусок свидетельства в собственных руках. Что-то — остаточная тепловая сигнатура композита: крест был на платформе где произошла детонация реактора Вестника, и чёрный порошок из того события перенёс след нанорезонанса композита на поверхность креста. Он держит крест с материалом Острова на нём. Он выбрал не исследовать это.","Он говорит «я ждал двадцать три года. Я устроил это». Он описывает себя как архитектора исхода. Он не исследовал является ли устроенный им исход прибывшим исходом — является ли то что вернулось с Острова Аудитором которого он устроил отправить, или чем-то другим использующим инфраструктуру Аудитора."]},
     whisper:{en:"He holds a cross that has Island material on it. He chose not to examine what made it warm. He has not examined whether what came back from the Island is the Auditor he sent.",ru:"Он держит крест с материалом Острова на нём. Он выбрал не исследовать что сделало его тёплым. Он не исследовал является ли то что вернулось с Острова тем Аудитором которого он отправил."}
   }
 }
},

{id:"s3",
 title:{en:"The Architecture of Memory",ru:"Архитектура Разума"},
 subtitle:{en:"Object 7-B. Status: Conservation. Autonomy: 40%. They think I stole a ship.",ru:"Объект 7-Б. Статус: Консервация. Автономность: 40%. Они думают что я украл корабль."},
 location:{en:"Guild Headquarters — Dante's Office",ru:"Штаб-Квартира Гильдии — Кабинет Данте"},
 timing:{en:"Late Evening",ru:"Поздний Вечер"},
 flags:["revelation","identity","foreshadowing"],
 povData:{
   dante:{distortion:4,
     text:{
       en:`The office was quiet in the specific way that my instructions to Mort produce: not empty, but defended. The door would not open for fire, flood, or theological visitation until I opened it from the inside.\n\nI sat in the chair. The composite leg produces a different sound settling into furniture than settling into stone — a lower register, less disruptive, more personal. I put the foot on the ottoman and looked at the leather casing Grimm had fitted. It looked like an expensive orthopedic appliance. It looked like a machine that had been made to look like a body part. It looked right.\n\nI closed my eyes.\n\nThe donor-memory archive is not a database I can search. It is more like a city I have been dropped into whose streets I am learning by walking them. Each access session develops familiarity. The streets that were panic and noise on the Island's shoreline are becoming — not quiet, but navigated. I can move through them without losing orientation.\n\nI asked for logistics. I asked for local sector. The architecture of the donor-memory responded with what it had.\n\nObject 7-B. Dragon's Teeth range. Bio-mass processing and structural gel production. Status: Conservation. Autonomy: 40%.\n\nThe gel in my knee is produced at this facility. The material in my circulatory system is produced at this facility. If the facility produces at full capacity, the Guild would have access to a construction and repair material that makes everything else in the known world's maintenance technology look like carved stone.\n\nI opened my eyes. The handkerchief in my pocket was black.\n\nI noted this without registering it as alarming. The blood blackening began on the Island and has been progressing. It is not painful. It is not debilitating. It is a change in my body's chemistry that is proceeding at a rate consistent with a managed transition rather than a pathological one. My body is accommodating the composite's requirements. My body is becoming more like the composite, incrementally.\n\nIn the firelight my eyes reflected the light source with geometric precision. I noted this in the reflection in the dark window glass and then returned to operational planning.\n\nWhisper appeared when I rang.\n\nI told him: northern expedition. Dragon's Teeth. Not miners for gold — miners for depth. Engineers who understand systems they cannot explain. People who will work without asking what for.\n\nI pushed the stiletto into the northern point on the map.\n\nThey think I stole a ship. They have issued a contract for my head. They are preparing assassins.\n\nThey do not know what I stole.\n\nI stole the future.\n\nThe hostile takeover continues.`,
       ru:`Кабинет был тих специфическим образом который производят мои инструкции Морту: не пустой, но защищённый. Дверь не откроется для пожара, наводнения или теологического визита пока я не открою её изнутри.\n\nЯ сел в кресло. Нога с композитом производит другой звук при посадке в мебель чем при посадке в камень — более низкий регистр, менее разрушительный, более личный. Я положил ногу на пуфик и посмотрел на кожаную обшивку которую установил Гримм. Это выглядело как дорогое ортопедическое приспособление. Это выглядело как машина которую сделали похожей на часть тела. Это выглядело правильно.\n\nЯ закрыл глаза.\n\nАрхив донорской памяти — не база данных которую я могу искать. Это больше похоже на город в который меня бросили и улицы которого я изучаю ходя по ним. Каждая сессия доступа развивает знакомость. Улицы которые были паникой и шумом на берегу Острова становятся — не тихими, но навигируемыми. Я могу двигаться через них не теряя ориентации.\n\nЯ попросил логистику. Я попросил местный сектор. Архитектура донорской памяти ответила тем что имела.\n\nОбъект 7-Б. Хребет Драконьих Зубов. Переработка биомассы и производство структурного геля. Статус: Консервация. Автономность: 40%.\n\nГель в моём колене производится на этом объекте. Материал в моей кровеносной системе производится на этом объекте. Если объект производит на полной мощности, у Гильдии будет доступ к строительному и ремонтному материалу который делает всё остальное в технологии обслуживания известного мира похожим на вырезанный камень.\n\nЯ открыл глаза. Носовой платок в кармане был чёрным.\n\nЯ отметил это не регистрируя как тревожное. Потемнение крови началось на Острове и прогрессирует. Это не болезненно. Это не изнуряет. Это изменение химии моего тела происходящее со скоростью согласующейся с управляемым переходом а не патологическим. Моё тело приспосабливает требования композита. Моё тело становится более похожим на композит, постепенно.\n\nВ свете камина мои глаза отражали источник света с геометрической точностью. Я отметил это в отражении в тёмном оконном стекле и затем вернулся к операционному планированию.\n\nШепот появился когда я позвонил.\n\nЯ сказал ему: северная экспедиция. Драконьи Зубы. Не шахтёры для золота — шахтёры для глубины. Инженеры понимающие системы которые не могут объяснить. Люди которые будут работать не спрашивая зачем.\n\nЯ вонзил стилет в северную точку на карте.\n\nОни думают что я украл корабль. Они выдали контракт на мою голову. Они готовят ассасинов.\n\nОни не знают что я украл.\n\nЯ украл будущее.\n\nРейдерский захват продолжается.`
     },
     knows:{en:["Object 7-B is at 40% autonomous production — when he arrives and activates the management layer, it scales to full capacity. Full production of structural gel changes the Guild's capabilities entirely.","The blood blackening is a managed transition, not pathological — his body is accommodating the composite's requirements incrementally. His eyes reflected the firelight with geometric precision.","He is navigating the donor-memory archive — panic becoming navigable streets. Nine confirmed sites so far. Two with active energy signatures."],ru:["Объект 7-Б работает на 40% автономного производства — когда он прибудет и активирует управляющий слой, масштабируется до полной мощности. Полное производство структурного геля полностью меняет возможности Гильдии.","Потемнение крови — управляемый переход, а не патологический: его тело постепенно приспосабливает требования композита. Его глаза отражали свет камина с геометрической точностью.","Он навигирует архив донорской памяти — паника становится навигируемыми улицами. Девять подтверждённых мест пока. Два с активными сигнатурами энергии."]},
     misunderstands:{en:["'They think I stole a ship. They don't know what I stole. I stole the future.' — He has framed the Object 7-B discovery as a theft from the Golden Circle. It is not a theft. The Golden Circle never had access to it. He did not steal the future from them. He inherited it. He has been doing this for the entire operation: framing inheritance as acquisition, because acquisition is a category he has been operating in for twenty-one years and inheritance is a category he does not yet have a name for.","'My body is becoming more like the composite.' He has noted this as a transition proceeding at a managed rate. He has not examined where the transition ends. The composite is Island maintenance material. If his body is accommodating the composite's requirements, and the composite's requirements are designed for an entity that maintains the Covenant, then his body is becoming calibrated for a function he has not yet named."],ru:["«Они думают что я украл корабль. Они не знают что я украл. Я украл будущее». — Он сформулировал открытие Объекта 7-Б как кражу у «Золотого Круга». Это не кража. У «Золотого Круга» никогда не было к нему доступа. Он не украл у них будущее. Он унаследовал его. Он делал это на протяжении всей операции: формулируя наследование как приобретение, потому что приобретение — категория в которой он работал двадцать один год, а наследование — категория для которой у него ещё нет имени.","«Моё тело становится более похожим на композит». Он отметил это как переход происходящий в управляемом темпе. Он не исследовал где переход заканчивается. Композит — технический материал Острова. Если его тело приспосабливает требования композита, а требования композита разработаны для сущности обслуживающей Завет, то его тело калибруется для функции которую он ещё не назвал."]},
     hides:{en:["He noted the eyes reflecting the firelight with geometric precision and then 'returned to operational planning.' This is the fifth time in three chapters he has noted a physiological change and immediately returned to operational content without examining it. The pattern of noting-and-continuing is accelerating. He noted: the black blood, the geometric eye reflection, and the architectural change in the acoustic catalogue (the duet). He has not connected these three observations into a single sentence. They are the same process.","'I stole the future.' This is the most operationally confident statement in nineteen chapters. He does not know yet that the Golden Circle's actual leadership (the three Node One Cult clients) know something came back from the Island. They are not reacting to the ship. They know he has something. The future he stole may be contested in ways he has not modeled."],ru:["Он отметил что глаза отражали свет камина с геометрической точностью и затем «вернулся к операционному планированию». Это пятый раз за три главы когда он отмечает физиологическое изменение и немедленно возвращается к операционному содержанию без исследования. Паттерн отметки-и-продолжения ускоряется. Он отметил: чёрную кровь, геометрическое отражение глаз, архитектурное изменение в акустическом каталоге (дуэт). Он не соединил эти три наблюдения в одно предложение. Это один и тот же процесс.","«Я украл будущее». Это наиболее операционно уверенное заявление в девятнадцати главах. Он ещё не знает что фактическое руководство «Золотого Круга» (три клиента Узла Первого Культа) знают что что-то вернулось с Острова. Они реагируют не на корабль. Они знают что у него что-то есть. Будущее которое он украл может быть оспорено способами которые он не моделировал."]},
     whisper:{en:"He noted black blood, geometric eye-reflection, the duet in the acoustic catalogue. He has not connected them. They are the same process. He stole the future. The Golden Circle knows something came back. They are not reacting to the ship.",ru:"Он отметил чёрную кровь, геометрическое отражение глаз, дуэт в акустическом каталоге. Он не соединил их. Это один и тот же процесс. Он украл будущее. «Золотой Круг» знает что что-то вернулось. Они реагируют не на корабль."}
   }
 }
}
];

const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');c.innerHTML=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}].map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
