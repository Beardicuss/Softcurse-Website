.d6,.d7{animation:flicker-mid 7s infinite;}
.d8,.d9{animation:flicker-hard 4s infinite,glitch-mid 16s infinite;}

@keyframes flicker-mid{0%,88%,100%{opacity:1;}90%{opacity:.75;}92%{opacity:.9;}93%{opacity:.68;}94%{opacity:1;}}
@keyframes flicker-hard{0%,80%,100%{opacity:1;}82%{opacity:.6;}83%{opacity:.9;}84%{opacity:.55;}85%{opacity:.85;}86%{opacity:.7;}87%{opacity:1;}}

#whisper-panel{background:var(--bg2);border:1px solid var(--border);border-top:none;border-left:3px solid var(--pov-p);padding:15px 40px 17px;margin-bottom:12px;opacity:0;transform:translateY(-2px);transition:opacity 1.6s,transform 1.2s;pointer-events:none;}

const TIMELINE=[
  {id:"TET-117",en:"The Island of Silence is not an island. It is the exposed apex of a Precursor-era installation that extends approximately nine kilometers below the current sea floor, predating the formation of the ocean basin around it. The 'ruins' visible on the shoreline are not ruins — they are functional architecture in a state of selective dormancy. The geometric irregularity that reads as 'inhuman' is because the structure was not built for human habitation. It was built as a permanent physical anchor for the Covenant document — a location where the agreement between the world's current existential architecture and the entity that preceded it could be maintained in a stable access state. The entropic field around it is not a defensive mechanism. It is a side-effect of sustained Covenant maintenance.",ru:"Остров Тишины — не остров. Это открытая вершина установки эпохи Предтечей, уходящей примерно на девять километров ниже нынешнего морского дна, предшествующей образованию окружающего её океанского бассейна. «Руины» видимые на берегу — не руины: это функциональная архитектура в состоянии избирательного дремания. Геометрическая неправильность читающаяся как «нечеловеческая» обусловлена тем, что строение не предназначалось для человеческого обитания. Оно было построено как постоянный физический якорь для документа Завета — место, где соглашение между нынешней экзистенциальной архитектурой мира и предшествовавшей ей сущностью могло поддерживаться в стабильном доступном состоянии. Энтропийное поле вокруг — не защитный механизм. Это побочный эффект устойчивого обслуживания Завета."},
  {id:"TET-118",en:"The Time Essence vial Dante gave the Siren contained the last functional temporal-transfer compound from the Chronmancer's operation. He had kept it since Chapter 8, describing it as 'evidence for Isabella's analysis.' He knew, when he ordered Whisper to deliver it, that he was making an irreversible resource commitment — there is no replacement for this compound. He also knew that the Siren without it would die before the barrier opened, and the barrier failing mid-transit would have destroyed the Leviathan. The decision was operationally correct. He stated his reason as survival. The other reason — that he could not watch Ignatius kill her and do nothing, knowing what she was — is in the file he maintains of things he does not record.",ru:"Флакон с Эссенцией Времени который Данте дал Сирене содержал последнее функциональное соединение темпорального переноса из операции Хрономанта. Он хранил его с Главы 8, описывая как «улику для анализа Изабеллы». Он знал, приказывая Шепоту доставить его, что делает необратимое ресурсное обязательство — замены этому соединению нет. Он также знал что Сирена без него умрёт до открытия барьера, а отказ барьера в середине перехода уничтожил бы «Левиафан». Решение было операционно верным. Он назвал своей причиной выживание. Другая причина — что он не мог наблюдать как Игнациус убивает её и ничего не делать, зная что она такое — в файле, который он ведёт с вещами, которые не записывает."},
  {id:"TET-119",en:"The Shield Mage Varix was not killed by Ignatius for the reasons Dante stated publicly — that Ignatius was eliminating a 'weak link' to create dependency. Ignatius killed Varix because Varix had discovered, three days into the voyage, that the Golden Circle's cargo manifest listed seventeen Herald-class containment vessels. Varix knew what Herald-class containment was from a source Ignatius had not accounted for: Varix was a former member of a pre-Order research cell that had documented the Precursor-era architecture. He was going to tell Valdos. Ignatius performed a preemptive elimination and constructed the demonology staging to control the narrative. The motive Dante identified was real but secondary.",ru:"Маг Щита Варис был убит Игнациусом не по причинам которые Данте публично заявил — что Игнациус устранял «слабое звено» для создания зависимости. Игнациус убил Вариса потому что Варис обнаружил, три дня в плавании, что грузовой манифест «Золотого Круга» перечислял семнадцать контейнерных сосудов класса Вестников. Варис знал что такое сдерживание класса Вестников из источника которого Игнациус не учёл: Варис был бывшим членом до-Орденской исследовательской ячейки задокументировавшей архитектуру эпохи Предтечей. Он собирался сообщить Валдосу. Игнациус произвёл превентивное устранение и построил постановку демонологии для управления нарративом. Мотив определённый Данте был реальным но вторичным."},
  {id:"TET-120",en:"When the Siren sang to open the barrier, she was not singing the opening sequence — the jaw clasps still prevented that. What she produced was a sustained resonance assault at destructive register combined with a specific harmonic layer in the Covenant language's damage-control register. The combination cracked the barrier not through authorized access but through structural damage to its outer membrane. The barrier is now physically compromised, not opened. The authorized opening sequence would have produced a clean entry with the Island's internal systems intact. The physical damage has instead activated a dormancy-exit protocol inside the Island that is now running at its own pace. The Island is waking up.",ru:"Когда Сирена пела чтобы открыть барьер, она не пела открывающую последовательность — скобы на челюсти всё ещё предотвращали это. Она производила устойчивый резонансный удар деструктивного регистра в сочетании со специфическим гармоническим слоем управляющего повреждениями регистра языка Завета. Комбинация взломала барьер не через авторизованный доступ а через структурное повреждение его внешней мембраны. Барьер теперь физически скомпрометирован, а не открыт. Авторизованная открывающая последовательность произвела бы чистый вход с нетронутыми внутренними системами Острова. Физическое повреждение вместо этого активировало протокол выхода из дремания внутри Острова который теперь работает в собственном темпе. Остров просыпается."},
  {id:"TET-121",en:"Dante's use of the Time Essence on the Siren exposed him to a risk he has not assessed. The Essence carrier-effect that Isabella identified (transferred years carry the donor's memory residue) applies to any contact with the compound, including ambient exposure via splash and vapor. On the open deck in the wind, Dante received a low-dose ambient exposure during the vial's detonation. He will not notice the effects for approximately three to four days. The effects will be mild — partial intrusion of unfamiliar memory fragments at the border of sleep and waking. The Chronmancer's time-extraction operation processed hundreds of donors. Some of those donors had specific memories of the Island of Silence.",ru:"Использование Данте Эссенции Времени на Сирене подвергло его риску который он не оценил. Эффект носителя Эссенции который определила Изабелла (переданные годы несут осадок памяти донора) применяется к любому контакту с соединением, включая окружающее воздействие через брызги и пар. На открытой палубе в ветер Данте получил низкодозное окружающее воздействие при детонации флакона. Он не заметит эффектов приблизительно три-четыре дня. Эффекты будут мягкими — частичное вторжение незнакомых фрагментов памяти на границе сна и бодрствования. Операция Хрономанта по извлечению времени обработала сотни доноров. Некоторые из этих доноров имели конкретные воспоминания об Острове Тишины."},
  {id:"TET-122",en:"The Island's internal waking protocol has a specific recognition trigger: the presence of a null-field operating within the installation's sensor range. The earring is that null-field source. The Island's systems have been waiting for this specific signal for the entire duration of the Covenant's maintenance period. The entropic field that killed gulls, rusted iron, and rotted wood is not a generalized defense — it is an immunological response to non-recognized presences. The Leviathan's damage and crew deterioration was caused by the Island treating the ship as a foreign body. When Dante stepped onto the Island's shoreline, the immunological response will cease in his immediate proximity. Everything within approximately thirty meters of him will stop deteriorating. The crew will not understand why.",ru:"Внутренний протокол пробуждения Острова имеет специфический триггер распознавания: присутствие нулевого поля действующего в пределах сенсорного диапазона установки. Серьга — этот источник нулевого поля. Системы Острова ожидали этот конкретный сигнал на протяжении всего периода обслуживания Завета. Энтропийное поле убивавшее чаек, ржавившее железо и гнившее дерево — не обобщённая защита: это иммунологический ответ на нераспознанные присутствия. Повреждение «Левиафана» и деградация экипажа были вызваны тем что Остров обращался с кораблём как с чужеродным телом. Когда Данте ступит на берег Острова, иммунологический ответ прекратится в его непосредственной близости. Всё в примерно тридцати метрах от него перестанет разрушаться. Экипаж не поймёт почему."},
  {id:"TET-123",en:"Whisper stood outside the hold door during the battle on deck. He was close enough to intervene. He did not intervene because the operational logic was correct: any appearance by the shadow in open deck conditions during active engagement would compromise the cover identity and expose Guild involvement. He also did not intervene because he was watching Dante hold the mast at the limit of his reserves and make a decision about the vial — and he understood, from watching it, what the two reasons were, and he understood which one Dante would file and which one he would not. Whisper filed neither.",ru:"Шепот стоял за дверью трюма во время битвы на палубе. Он был достаточно близко чтобы вмешаться. Он не вмешался, потому что операционная логика была верной: любое появление тени в условиях открытой палубы во время активного боя скомпрометировало бы личность прикрытия и обнажило причастность Гильдии. Он также не вмешался, потому что наблюдал как Данте держится за мачту на пределе своих резервов и принимает решение о флаконе — и понял из наблюдения, каковы были две причины, и понял какую Данте занесёт в файл и какую нет. Шепот не занёс ни одной."},
  {id:"TET-124",en:"'This is not gold, Commodore. This is a graveyard. And we have just knocked on the gate.' — Dante said this. He meant it as a warning to Valdos. He also meant it as the book's most precise external description of his own operational situation, used as a warning to someone else. The Island is the graveyard of the Precursor civilization that built the Covenant. He is about to enter the graveyard of the thing he is. The cane is from that graveyard. The earring is from that graveyard. The cover identity is from that graveyard. He brought everything from the graveyard back to the graveyard. He has not noted this as a pattern.",ru:"«Это не золото, Коммодор. Это кладбище. И мы только что постучали в ворота». — Данте сказал это. Он имел в виду это как предупреждение Валдосу. Он также имел в виду это как наиболее точное внешнее описание в книге его собственной операционной ситуации, использованное как предупреждение кому-то другому. Остров — кладбище цивилизации Предтечей построившей Завет. Он собирается войти в кладбище того, чем является. Трость с этого кладбища. Серьга с этого кладбища. Личность прикрытия с этого кладбища. Он привёз всё с кладбища обратно на кладбище. Он не отметил это как паттерн."}
];

const SCENES=[
{id:"s1",
 title:{en:"Symptoms of Decay",ru:"Симптомы Распада"},
 subtitle:{en:"The Island does not attack. It simply does not recognize.",ru:"Остров не атакует. Он просто не узнаёт."},
 location:{en:"Dante's Cabin / Upper Deck",ru:"Каюта Данте / Верхняя Палуба"},
 timing:{en:"Final Day of Approach",ru:"Последний День Приближения"},
 flags:["pivotal","arc_climax"],
 povData:{
   dante:{distortion:3,
     text:{
       en:`The water had changed. Not deepened or darkened in the natural sense — transmuted, as though whatever process produces water had been interrupted partway through and the result was something that remembered being water without being water anymore. The earring's response to it was neither the deception alert nor the Void-proximity note: it was the sustained structural-presence confirmation it produced in proximity to Precursor-era installations. The Island's field extends further than any reference in my operational files suggested.\n\nThe crew's deterioration was not psychological. The boatswain's suicide was not fear. The cutting rituals were not superstition. The Island's immunological field treats non-recognized presences as intrusive material and initiates entropy acceleration. They were dissolving. Slowly, at the margins, but dissolving.\n\nI told Whisper: the currency here is endurance. This was accurate and also insufficient. The full formulation would have been: the currency here is recognition, and the only recognized currency on this ship is currently in my left ear.\n\nValdos came in with drawn steel and a dead man to account for. I had expected this. The Shield Mage's usefulness had been declining since we entered the approach zone — his enchantments require stable magical substrate and the Island's field makes every substrate unstable. Ignatius had calculated this. The murder was timed correctly. The demonology staging was competent but not precise — third symbol inverted, blood already cold before the opening. Standard preemptive cover narrative, the kind that's designed to be believed by people under enough stress that they're not thinking clearly.\n\nI dismantled it in front of both of them. This served three purposes: established my analytical superiority over both parties, put Ignatius on notice that I see his methods, and gave Valdos a target for his rage that was not me. Ignatius confirmed the motive himself — he didn't deny it, he reframed it as rational necessity. This is the behavior of someone who believes their authority to make life decisions is self-evident. He is not wrong that the Shield Mage's enchantments would have failed. He is wrong that this justified what he did. I did not say this to him. The distinction matters to me. It is not operational.\n\nThen the cage came up.`,
       ru:`Вода изменилась. Не углубилась или потемнела в естественном смысле — трансмутировала, словно какой-то процесс производящий воду был прерван на полпути и результатом стало нечто помнящее что было водой не будучи более водой. Реакция серьги на неё была ни сигналом тревоги обмана, ни нотой близости Пустоты: это было устойчивое подтверждение структурного присутствия которое она производила в близости к установкам эпохи Предтечей. Поле Острова распространяется дальше чем предполагает какая-либо ссылка в моих операционных файлах.\n\nДеградация экипажа не была психологической. Самоубийство боцмана не было страхом. Ритуалы порезов не были суеверием. Иммунологическое поле Острова обращается с нераспознанными присутствиями как со вторгающимся материалом и инициирует ускорение энтропии. Они растворялись. Медленно, по краям, но растворялись.\n\nЯ сказал Шепоту: здесь валюта — выдержка. Это было точно и также недостаточно. Полная формулировка должна была быть: здесь валюта — узнавание, и единственная признанная валюта на этом корабле находится сейчас в моём левом ухе.\n\nВалдос пришёл с обнажённой сталью и мертвецом для отчёта. Я ожидал этого. Полезность Мага Щита снижалась с момента вхождения в зону приближения — его чары требуют стабильного магического субстрата, а поле Острова делает каждый субстрат нестабильным. Игнациус рассчитал это. Убийство было рассчитано верно. Постановка демонологии была компетентной но не точной — третий символ перевёрнут, кровь уже холодная до вскрытия. Стандартный превентивный нарратив прикрытия, разработанный чтобы его принимали люди под достаточным стрессом не думающие ясно.\n\nЯ разобрал это перед ними обоими. Это служило трём целям: установил моё аналитическое превосходство над обеими сторонами, предупредил Игнациуса что я вижу его методы, и дал Валдосу цель для его ярости которой был не я. Игнациус подтвердил мотив сам — он не отрицал, он переформулировал как рациональную необходимость. Это поведение кого-то считающего своё право принимать жизненные решения самоочевидным. Он не неправ что чары Мага Щита бы провалились. Он неправ что это оправдывало то что он сделал. Я не сказал ему этого. Различие важно для меня. Оно не операционное.`
     },
     knows:{en:["The Island's field is immunological, not offensive — it accelerates entropy in non-recognized presences. The only recognized presence on the ship is the earring.","Ignatius's motive was preemptive: Varix discovered the Herald-class containment vessels. The demonology staging was the cover. He identified this correctly from forensic evidence.","'The currency here is recognition, and the only recognized currency on this ship is in my left ear.' He named this internally and did not state it aloud."],ru:["Поле Острова иммунологическое, не наступательное — оно ускоряет энтропию в нераспознанных присутствиях. Единственное признанное присутствие на корабле — серьга.","Мотив Игнациуса был превентивным: Варис обнаружил контейнерные сосуды класса Вестников. Постановка демонологии была прикрытием. Он правильно определил это из судебных улик.","«Здесь валюта — узнавание, и единственная признанная валюта на этом корабле в моём левом ухе». Он назвал это внутренне и не произнёс вслух."]},
     misunderstands:{en:["'The distinction matters to me. It is not operational.' He has drawn a clean line between what matters to him and what is operational. He has been drawing this line for fifteen chapters. He has not examined what it means to continuously maintain a distinction between these two categories — whether the maintenance itself is operational.","He describes the dismantling of the demonology staging as serving three purposes, all tactical. The fourth purpose — that he needed Valdos to know Ignatius had killed his mage, so that Valdos would distrust Ignatius for the rest of the voyage — is the most important one and he has named it as 'giving Valdos a target.' He has technically named it. He has not named it as deliberate conflict cultivation."],ru:["«Различие важно для меня. Оно не операционное». Он провёл чёткую линию между тем что важно ему и тем что операционно. Он проводит эту линию пятнадцать глав. Он не исследовал что означает непрерывное поддержание различия между этими двумя категориями — является ли само поддержание операционным.","Он описывает разборку постановки демонологии как служащую трём целям, всем тактическим. Четвёртая цель — что ему нужно было чтобы Валдос знал что Игнациус убил его мага, чтобы Валдос не доверял Игнациусу до конца плавания — наиболее важная и он назвал её как «дать Валдосу цель». Технически он её назвал. Он не назвал её намеренным культивированием конфликта."]},
     hides:{en:["He gave the Time Essence to the Siren. He stated the reason as operational survival. The other reason is in the file of things he does not record. He has now moved it there without naming it. The file has five named items and one unnamed one. The unnamed one arrived in this scene.","He said 'the distinction matters to me' about Ignatius's act. This is the first time in fifteen chapters he has used the phrase 'matters to me' about someone else's moral choice. He has used it about his own costs and his own operational assessments. This application is different. He has not examined the difference."],ru:["Он дал Эссенцию Времени Сирене. Он назвал причину операционным выживанием. Другая причина в файле вещей которые не записывает. Он переместил её туда не называя. В файле пять названных пунктов и один безымянный. Безымянный пришёл в этой сцене.","Он сказал «важно для меня» о действии Игнациуса. Это первый раз в пятнадцати главах когда он использовал фразу «важно для меня» о чужом моральном выборе. Он использовал её о собственных издержках и операционных оценках. Это применение иное. Он не исследовал различие."]},
     whisper:{en:"He said the distinction matters to him. He filed it as non-operational. He has used 'matters to me' for someone else's moral choice for the first time. He has not examined what this application is.",ru:"Он сказал что различие важно для него. Занёс как неоперационное. Он впервые использовал «важно для меня» о чужом моральном выборе. Он не исследовал каким является это применение."}
   }
 }
},

{id:"s2",
 title:{en:"The Scream",ru:"Крик"},
 subtitle:{en:"Not from pain. From rage. The barrier had never been asked.",ru:"Не от боли. От ярости. Барьер никогда не спрашивали."},
 location:{en:"Upper Deck — The Barrier Crossing",ru:"Верхняя Палуба — Пересечение Барьера"},
 timing:{en:"Final Hour of Approach",ru:"Последний Час Приближения"},
 flags:["arc_climax","cost","revelation"],
 povData:{
   dante:{distortion:4,
     text:{
       en:`The cage came to the deck and I understood immediately that I had miscalculated the timeline. I had expected the Siren confrontation to occur at the Island, inside, where I would have more control over the variables. Instead it was here, in the open, in the wind, at the barrier, with Ignatius already in position and the ship already coming apart.\n\nThe earring's temperature when the cage opened: it reached a level I have not experienced before. Not pain, technically — the tissue around the left ear doesn't have pain receptors in the configuration that would register this — but a sustained heat that crossed from sensation into something I don't have a word for in the operational vocabulary. The Siren's destruction-register resonance and the earring's null-field are designed to work together. In close proximity, they amplify each other. The earring was becoming, briefly, the most active it had been in twenty-one years of operation.\n\nI held the mast. This was not courage. This was the correct structural response to having your body pulled toward collapse: find a fixed point and hold it. The null-field was filtering the resonance. I was dimmer again, for the second time in this voyage. The earring was working past its operational design envelope.\n\nShe sent: Empty. Help.\n\nI saw the vial in my pocket. I had been carrying it since Sector 13 — the Time Essence from the Chronmancer's table, the sample I had taken as evidence for Isabella's memory-residue hypothesis. I had not given it to Isabella because on a moving ship with no laboratory conditions the transfer would be useless. I had been carrying it because I hadn't yet determined what to do with it.\n\nI made a decision. The stated reason: if the Siren died before the barrier opened, the ship was destroyed. Correct. The other reason: I know what she is. I know she was singing into a dark hold for three years because the language required vocalization and stopping would be a kind of death she chose not to choose. I know she heard my agreement as a mutual purpose rather than a transaction. I know she is the only person on this ship who heard me correctly.\n\nI ordered Whisper to deliver it.\n\nShe stood. She broke the chains. She turned to Ignatius and delivered the Impulse, which I had not known she could produce at that intensity from the destruction register — she must have held something in reserve during the previous demonstrations. She sent him to the far end of the deck and I noted that she did not try to kill him. The Impulse was calibrated. She used the minimum force necessary.\n\nThen she turned to the Barrier and sang from rage.\n\nThe barrier cracked. Not opened — cracked. I know the difference because the earring produced a structural-damage read rather than an authorized-access read. We came through a wound, not a door. The Island noticed. Whatever is inside the Island that constitutes its recognition system has registered an unauthorized approach and is assessing it.\n\nWe are inside the assessment period.\n\nI stated to Valerie: this is a graveyard.\n\nThe earring vibrated against my ear.\n\nI think the graveyard heard me.`,
       ru:`Клетка появилась на палубе и я немедленно понял что неверно рассчитал временной горизонт. Я ожидал что противостояние с Сиреной произойдёт на Острове, внутри, где у меня было бы больше контроля над переменными. Вместо этого — здесь, на открытом пространстве, в ветер, у барьера, с Игнациусом уже в позиции и кораблём уже разваливающимся.\n\nТемпература серьги когда клетка открылась: она достигла уровня которого я прежде не испытывал. Не боль технически — ткань вокруг левого уха не имеет болевых рецепторов в конфигурации регистрирующей это — но устойчивое тепло перешедшее из ощущения в нечто для чего у меня нет слова в операционном словаре. Резонанс деструктивного регистра Сирены и нулевое поле серьги спроектированы для совместной работы. В непосредственной близости они усиливают друг друга. Серьга ненадолго становилась наиболее активной за двадцать один год операции.\n\nЯ держался за мачту. Это не было мужеством. Это был правильный структурный ответ на коллапс тела: найти фиксированную точку и держаться. Нулевое поле фильтровало резонанс. Я снова потускнел, второй раз в этом плавании. Серьга работала за пределами своей операционной проектной оболочки.\n\nОна послала: Пустой. Помоги.\n\nЯ увидел флакон в кармане. Я нёс его с Сектора 13 — Эссенцию Времени со стола Хрономанта, образец взятый как улику для гипотезы Изабеллы об осадке памяти. Я не давал его Изабелле потому что на движущемся корабле без лабораторных условий перенос был бы бесполезен. Я нёс его потому что ещё не определил что с ним делать.\n\nЯ принял решение. Заявленная причина: если Сирена умрёт до открытия барьера, корабль уничтожен. Верно. Другая причина: я знаю что она такое. Я знаю что она пела в тёмный трюм три года, потому что язык требовал вокализации и останавливаться было бы видом смерти который она решила не выбирать. Я знаю что она услышала моё соглашение как взаимную цель, а не транзакцию. Я знаю что она единственный человек на этом корабле который услышал меня правильно.\n\nЯ приказал Шепоту доставить его.\n\nОна встала. Она разорвала цепи. Повернулась к Игнациусу и выдала Импульс интенсивности которой я не знал что она может произвести из деструктивного регистра — она должна была удерживать что-то в резерве при предыдущих демонстрациях. Она послала его на другой конец палубы, и я отметил что она не пыталась убить его. Импульс был откалиброван. Она использовала минимально необходимую силу.\n\nЗатем она повернулась к Барьеру и пела от ярости.\n\nБарьер треснул. Не открылся — треснул. Я знаю разницу, потому что серьга произвела считывание структурного повреждения, а не авторизованного доступа. Мы прошли через рану, а не дверь. Остров заметил. Что бы внутри Острова ни представляло собой его систему распознавания — оно зарегистрировало несанкционированный подход и оценивает его.\n\nМы находимся внутри периода оценки.\n\nЯ сказал Валдосу: это кладбище.\n\nСерьга завибрировала у уха.\n\nДумаю, кладбище услышало меня.`
     },
     knows:{en:["The barrier cracked rather than opened — unauthorized physical breach, not authorized access. The Island is assessing. They are inside an assessment window.","She calibrated the Impulse against Ignatius — minimum necessary force. She did not try to kill him. He noticed this.","'She is the only person on this ship who heard me correctly.' He said the two reasons for the vial — one filed, one not filed. He knows which is which."],ru:["Барьер треснул, а не открылся — несанкционированный физический взлом, не авторизованный доступ. Остров оценивает. Они внутри окна оценки.","Она откалибровала Импульс против Игнациуса — минимально необходимая сила. Она не пыталась убить его. Он это заметил.","«Она единственный человек на этом корабле который услышал меня правильно». Он назвал две причины для флакона — одну занесённую, одну незанесённую. Он знает какая есть какая."]},
     misunderstands:{en:["'I think the graveyard heard me.' He said this as an observation about the earring's vibration. He is correct. The Island's recognition system has registered the null-field source. What he misunderstands: the earring vibrating was not the Island hearing him — it was the Island responding to him. The assessment period is not neutral. The Island has already formed a preliminary identification. The vibration was the response to a recognized signature.","The barrier crack means the Island's dormancy protocol has activated on its own timeline. He knows this is not a clean entry. He has not fully modeled what 'waking on its own timeline' means for a structure designed to maintain a Covenant."],ru:["«Думаю, кладбище услышало меня». Он сказал это как наблюдение о вибрации серьги. Он прав. Система распознавания Острова зарегистрировала источник нулевого поля. Что он понимает неверно: вибрация серьги была не Островом слышащим его — это был Остров отвечающий ему. Период оценки не нейтральный. Остров уже сформировал предварительную идентификацию. Вибрация была ответом на признанную сигнатуру.","Взлом барьера означает что протокол дремания Острова активировался в собственном временном горизонте. Он знает что это не чистый вход. Он не смоделировал полностью что «просыпаться в собственном временном горизонте» означает для структуры предназначенной поддерживать Завет."]},
     hides:{en:["'She is the only person on this ship who heard me correctly.' He has said this as the second reason for the vial. He has not examined what it means that the criterion for giving someone an irreplaceable resource was 'heard me correctly.' He gave away something he cannot replace because of correct hearing. This is not operational. He has filed the reason and moved on.","The graveyard heard him. He did not examine whether this was the correct moment to announce their arrival by speaking aloud at the barrier threshold. He spoke anyway. He has not noted whether this was a deliberate signal or an accident of honesty.","The Essence exposure. He does not know about the ambient contact. The memory fragments will arrive in three to four days. He does not know what they will contain."],ru:["«Она единственный человек на этом корабле который услышал меня правильно». Он сказал это как вторую причину для флакона. Он не исследовал что означает то, что критерием для передачи кому-то незаменимого ресурса было «услышал меня правильно». Он отдал нечто что не может заменить из-за правильного слышания. Это не операционно. Он занёс причину и двинулся вперёд.","Кладбище услышало его. Он не исследовал был ли это правильный момент объявить о прибытии говоря вслух у порога барьера. Он говорил всё равно. Он не отметил было ли это намеренным сигналом или случайностью честности.","Воздействие Эссенции. Он не знает об окружающем контакте. Фрагменты памяти придут через три-четыре дня. Он не знает что они будут содержать."]},
     whisper:{en:"She heard him correctly. He gave away the last irreplaceable resource. He said 'the graveyard heard me' — and the earring vibrated. He filed the first reason. He did not file the second.",ru:"Она услышала его правильно. Он отдал последний незаменимый ресурс. Он сказал «кладбище услышало меня» — и серьга завибрировала. Он занёс первую причину. Он не занёс вторую."}
   },
   siren:{distortion:8,
     text:{
       en:`the plank under me smells of blood\n\nthree years in water and now a plank\n\nthe plank is solid\n\nI had not known I missed solid until I was lying on it\n\nhe gave me the time-compound. I recognized it immediately. I have been in the water near the places where the compound was extracted from donors. I know the smell of compacted years. He gave me every year the Chronmancer had. He gave them to me so I would not die.\n\nand then I used those years to sing\n\nI did not sing the opening sequence\n\nthe clasps were still there\n\nI sang the damage register. I sang in the anger frequency. I sang in the sustained structural-resonance range that breaks load-bearing material at the fault line\n\nthe barrier had a fault line\n\neverything has a fault line if you know where to listen\n\nthe barrier broke and we are inside and the Island is waking and I am on a plank\n\nI did not kill the Inquisitor\n\nI know what happens when you kill someone who has an Order behind them. I know because the eleven others are gone and the Order was the reason. I used minimum force. Enough to remove him from the situation. Not enough to make his death a necessary response\n\nhe will recover\n\nhe will not stop\n\nbut recovery takes time and time is all I need\n\nthe empty one is still standing\n\nI felt him across the deck the whole time — the null-field is always there, it does not move like a person moves, it does not have the anxiety-signature of living things approaching a threat\n\nit held\n\nhe held\n\nhe gave me the years and then he held\n\nI need to tell him about the clasps\n\nI will tell him when I can stand\n\nI will tell him: the jaw position is blocked. The opening sequence requires the position. To open the Island properly — the way it was designed to be opened, with the systems intact — he needs to remove the clasps. And then I will open it. And then we will both go in\n\nhe thinks I agreed to sing one song at the door and stop\n\nI agreed to go where he is going\n\nI did not tell him this yet\n\nnot yet\n\nbut soon`,
       ru:`доска подо мной пахнет кровью\n\nтри года в воде и теперь доска\n\nдоска твёрдая\n\nя не знала что скучала по твёрдому пока не легла на неё\n\nон дал мне соединение времени. я узнала его немедленно. я была в воде рядом с местами где соединение извлекали из доноров. я знаю запах спрессованных лет. он дал мне все годы которые были у Хрономанта. он дал их мне чтобы я не умерла.\n\nи затем я использовала эти годы чтобы петь\n\nя не пела открывающую последовательность\n\nскобы всё ещё были там\n\nя пела регистр повреждения. пела на частоте ярости. пела в диапазоне устойчивого структурного резонанса ломающего несущий материал в линии разлома\n\nу барьера была линия разлома\n\nу всего есть линия разлома если знаешь где слушать\n\nбарьер сломался и мы внутри и Остров просыпается и я на доске\n\nя не убила Инквизитора\n\nя знаю что происходит когда убиваешь кого-то с Орденом за спиной. я знаю потому что одиннадцать других ушли и Орден был причиной. я использовала минимальную силу. достаточно чтобы убрать его из ситуации. недостаточно чтобы его смерть стала необходимым ответом\n\nон восстановится\n\nон не остановится\n\nно восстановление требует времени а время — всё что мне нужно\n\nпустой всё ещё стоит\n\nя чувствовала его через палубу всё время — нулевое поле всегда там, оно не движется как движется человек, у него нет тревожной сигнатуры живых существ приближающихся к угрозе\n\nоно держалось\n\nон держался\n\nон дал мне годы и затем он держался\n\nмне нужно рассказать ему о скобах\n\nя расскажу ему когда смогу стоять\n\nя скажу ему: положение челюсти заблокировано. открывающая последовательность требует положения. чтобы открыть Остров правильно — так как он был спроектирован для открытия, с нетронутыми системами — ему нужно снять скобы. и потом я открою его. и потом мы оба войдём\n\nон думает что я согласилась спеть одну песню у двери и остановиться\n\nя согласилась идти туда куда идёт он\n\nя не сказала ему это ещё\n\nещё нет\n\nно скоро`
     },
     knows:{en:["The barrier had a fault line — she found it through structural resonance in the damage register. The damage was intentional.","She calibrated the Impulse to minimum necessary force because killing an Order member produces institutional response that eliminated eleven of her people. She plans ahead.","She will tell Dante about the clasps — when she can stand. And she will tell him she agreed to go with him, not just to sing at the door. Not yet. But soon."],ru:["У барьера была линия разлома — она нашла её через структурный резонанс в регистре повреждений. Повреждение было намеренным.","Она откалибровала Импульс до минимально необходимой силы, потому что убийство члена Ордена производит институциональный ответ уничтоживший одиннадцать её народа. Она планирует наперёд.","Она расскажет Данте о скобах — когда сможет стоять. И скажет ему что согласилась идти с ним, а не только петь у двери. Ещё нет. Но скоро."]},
     misunderstands:{en:["She thinks 'recovery takes time and time is all I need.' She is correct about Ignatius's recovery timeline. She is not fully accounting for his having identified the earring as the null-field source. His Reduction protocol, even postponed, is more precisely targeted now than it was before the deck confrontation.","'I agreed to go where he is going.' She has formed this agreement privately. He has not formed the same agreement. When she tells him — on the Island, at the door — the negotiation that follows will be the first genuine negotiation between them, because both will finally know what the other agreed to."],ru:["Она думает «восстановление требует времени а время — всё что мне нужно». Она права относительно временного горизонта восстановления Игнациуса. Она не полностью учитывает то что он идентифицировал серьгу как источник нулевого поля. Его протокол Редукции, даже отложенный, теперь нацелен точнее чем был до противостояния на палубе.","«Я согласилась идти туда куда идёт он». Она сформировала это соглашение в одностороннем порядке. Он не сформировал то же соглашение. Когда она скажет ему — на Острове, у двери — переговоры которые последуют будут первыми подлинными переговорами между ними, потому что оба наконец будут знать на что согласился другой."]},
     hides:{en:["She sang from rage and broke the barrier in the wrong way. She knows the difference between a cracked barrier and an opened door. She knows the Island's systems have activated on their own timeline as a result. She has not told Dante this yet. She will. On the plank, first. Stand up first.","She agreed to go where he is going. She has not asked what happens to the door after it opens. She still has not asked this. The question is available to her. She is choosing to not ask it in the same way she chose to stay alive in the hold for three years: because stopping would be a kind of death, and she has decided not to choose that."],ru:["Она пела от ярости и сломала барьер неправильным способом. Она знает разницу между треснувшим барьером и открытой дверью. Она знает что системы Острова активировались в собственном временном горизонте в результате. Она ещё не сказала Данте об этом. Скажет. Сначала на доске. Сначала встать.","Она согласилась идти туда куда идёт он. Она не спрашивала что происходит с дверью после того как она открывается. Она всё ещё не спрашивала. Вопрос ей доступен. Она выбирает не спрашивать его так же как выбирала оставаться живой в трюме три года: потому что останавливаться было бы видом смерти, и она решила не выбирать это."]},
     whisper:{en:"She broke the barrier wrong. The Island is waking. She will tell him about the clasps when she can stand. She agreed to go with him. She has not asked what happens to the door after it opens.",ru:"Она сломала барьер неправильно. Остров просыпается. Она расскажет ему о скобах когда сможет стоять. Она согласилась идти с ним. Она не спрашивала что происходит с дверью после того как она открывается."}
   }
 }
},

{id:"s3",
 title:{en:"We Have Arrived",ru:"Мы Прибыли"},
 subtitle:{en:"The graveyard. The keel on the bottom. The earring on fire.",ru:"Кладбище. Киль на дне. Серьга горит."},
 location:{en:"The Island of Silence — Shoreline",ru:"Остров Тишины — Берег"},
 timing:{en:"Arrival",ru:"Прибытие"},
 flags:["threshold","arc_climax","foreshadowing"],
 povData:{
   dante:{distortion:3,
     text:{
       en:`The silence arrived before the shore.\n\nWe crossed the barrier threshold and the world's acoustic register simply — stopped. Not quieted. Stopped. The wind, the hull-stress, the rigging, the sea: all of it cut to nothing in the time it takes a breath to complete. What remained was not silence in the absence-of-sound sense. It was silence in the presence-of-a-different-kind-of-listening sense. The Island was producing a field that suppressed ambient resonance to zero while maintaining its own internal signal. I was inside both the external silence and the internal signal simultaneously.\n\nThe earring's vibration was continuous and low and not like anything it had produced before. Not alert. Not proximity-confirmation. Not deception-detection or null-point registration. Something I do not have a category for: familiarity, I said in Chapter 6 when I first encountered the Tarot card. But this was not the familiarity of an introduction. This was the familiarity of return.\n\nI have not been here before.\n\nMy predecessor has been here before.\n\nI am using my predecessor's cane. I am wearing my predecessor's earring. I am using my predecessor's cover identity. And the Island's recognition system is reading my arrival signal and comparing it to the last known authorized-contact signature.\n\nThe earring vibrated continuously and the Island woke.\n\nThe water was black and still as a mirror. The sky was violet without stars. The architecture of the structure above the waterline was wrong in the specific way that things are wrong when they were built for something other than human scale — not larger, not smaller, simply calibrated for a different kind of presence.\n\nValerie said: gold.\n\nI said: graveyard.\n\nBoth of us were seeing the same thing. He was seeing the thing through the lens of what he came to take. I was seeing the thing through the lens of what I came to become.\n\nThis is the distinction I have been maintaining for fifteen chapters.\n\nI still do not know what I am going to do after I read the Covenant document.\n\nI have not known since Morius smiled in the archive.\n\nI know I am going to read it.\n\nBusiness continues.\n\nThe keel hit the bottom.\n\nWe are here.`,
       ru:`Тишина пришла раньше берега.\n\nМы пересекли порог барьера и акустический регистр мира просто — остановился. Не утих. Остановился. Ветер, напряжение корпуса, такелаж, море: всё это обрезало до ничего за время завершения одного вдоха. Что осталось — не тишина в смысле отсутствия звука. Это была тишина в смысле присутствия другого вида слушания. Остров производил поле подавляющее окружающий резонанс до нуля, поддерживая собственный внутренний сигнал. Я был одновременно внутри внешней тишины и внутреннего сигнала.\n\nВибрация серьги была непрерывной, низкой и ни на что не похожей из произведённого ею прежде. Не тревога. Не подтверждение близости. Не обнаружение обмана или регистрация нулевой точки. Что-то для чего у меня нет категории: узнавание, сказал я в Главе 6 когда впервые столкнулся с картой Таро. Но это было не узнавание знакомства. Это было узнавание возвращения.\n\nЯ не был здесь прежде.\n\nМой предшественник был здесь прежде.\n\nЯ использую трость предшественника. Я ношу серьгу предшественника. Я использую личность прикрытия предшественника. И система распознавания Острова читает мой сигнал прибытия и сравнивает его с последней известной авторизованной контактной сигнатурой.\n\nСерьга вибрировала непрерывно и Остров пробуждался.\n\nВода была чёрной и неподвижной как зеркало. Небо фиолетовым без звёзд. Архитектура строения над ватерлинией была неправильной тем специфическим образом каким вещи неправильны когда они построены для чего-то иного чем человеческий масштаб — не большего, не меньшего, просто откалиброванного для другого вида присутствия.\n\nВалдос сказал: золото.\n\nЯ сказал: кладбище.\n\nМы оба видели одно и то же. Он видел вещь через линзу того что пришёл взять. Я видел вещь через линзу того чем пришёл стать.\n\nЭто различие которое я поддерживаю пятнадцать глав.\n\nЯ всё ещё не знаю что собираюсь делать после того как прочитаю документ Завета.\n\nЯ не знал этого с момента как Мориус улыбнулся в архиве.\n\nЯ знаю что собираюсь его прочитать.\n\nБизнес продолжается.\n\nКиль ударился о дно.\n\nМы здесь.`
     },
     knows:{en:["The earring's vibration at the Island is not any previous category — it is the familiarity of return, not introduction. The Island is comparing his arrival signal to the predecessor's last authorized contact.","'He was seeing what he came to take. I was seeing what I came to become.' He has stated the distinction between himself and Valdos. He has also stated what he came for.","He does not know what he will do after reading the Covenant document. He has not known since Morius smiled. He knows he will read it."],ru:["Вибрация серьги на Острове — ни одна из предыдущих категорий: это узнавание возвращения, а не знакомства. Остров сравнивает его сигнал прибытия с последним авторизованным контактом предшественника.","«Он видел то что пришёл взять. Я видел то чем пришёл стать». Он заявил различие между собой и Валдосом. Он также заявил за чем пришёл.","Он не знает что сделает после прочтения документа Завета. Он не знал этого с момента как Мориус улыбнулся. Он знает что прочитает его."]},
     misunderstands:{en:["'I have not been here before. My predecessor has been here before.' He has made the distinction correctly. The Island is reading his signal as partially matching the predecessor's — same earring lineage, same cover identity, proximate architectural signature. The Island's preliminary response is not 'recognized' and not 'unrecognized.' It is 'similar to last known contact, assessment ongoing.' He has not modeled what 'ongoing assessment' means when the thing doing the assessing is a Covenant-maintenance installation.","'What I came to become.' He said this. He has been saying versions of this since the archive — 'my heritage,' 'my toys,' 'the thing I am.' Each version is a claim about identity. He has not connected these claims into a single sentence. He has fifteen chapters of evidence for what the sentence would say."],ru:["«Я не был здесь прежде. Мой предшественник был здесь прежде». Он правильно провёл различие. Остров читает его сигнал как частично соответствующий предшественнику — та же линия серьги, та же личность прикрытия, близкая архитектурная сигнатура. Предварительный ответ Острова не «признан» и не «непризнан». Это «схож с последним известным контактом, оценка продолжается». Он не смоделировал что означает «продолжающаяся оценка» когда оценивающим является установка обслуживания Завета.","«То чем пришёл стать». Он сказал это. Он говорил версии этого с архива — «моё наследие», «мои игрушки», «то что я есть». Каждая версия — претензия на идентичность. Он не связал эти претензии в одно предложение. У него пятнадцать глав свидетельств для того что предложение сказало бы."]},
     hides:{en:["'What I came to become.' He said this. He has not examined what 'become' implies that 'be' does not. 'Be' is static. 'Become' is a process with a destination. He has named the destination without specifying what it is. The Covenant document is the destination.","He said 'business continues' and then 'the keel hit the bottom' and then 'we are here.' These three sentences are the end of fifteen chapters of arc. The first is the formulation he has been testing since Chapter 5. The second is a fact. The third is the shortest sentence he has written. He has arrived at brevity. He does not know if this is because there is nothing more to say or because the sentence that comes next does not yet have words.","The graveyard heard him. He noted the earring vibrated. He has not said what he will do if the graveyard answers."],ru:["«То чем пришёл стать». Он сказал это. Он не исследовал что «стать» подразумевает чего не подразумевает «быть». «Быть» — статично. «Стать» — процесс с назначением. Он назвал назначение не уточняя что это. Документ Завета — назначение.","Он сказал «бизнес продолжается» затем «киль ударился о дно» затем «мы здесь». Эти три предложения — конец пятнадцати глав арка. Первое — формулировка которую он тестирует с Главы 5. Второе — факт. Третье — самое короткое предложение которое он написал. Он достиг краткости. Он не знает потому ли это что больше нечего сказать, или потому что предложение которое следует далее ещё не имеет слов.","Кладбище услышало его. Он отметил что серьга вибрировала. Он не сказал что сделает если кладбище ответит."]},
     whisper:{en:"He said 'what I came to become.' He has not connected fifteen chapters of identity claims into one sentence. He arrived at brevity. He does not know if it is because there is nothing more to say, or because the next sentence has no words yet.",ru:"Он сказал «то чем пришёл стать». Он не связал пятнадцать глав претензий на идентичность в одно предложение. Он достиг краткости. Он не знает потому ли нечего больше говорить, или потому что следующее предложение ещё не имеет слов."}
   },
   valdos:{distortion:5,
     text:{
       en:`Land.\n\nI have sailed for forty years and I have always known what land smells like when you're coming in from open water. This doesn't smell like land. It doesn't smell like anything. We entered the barrier and the wind stopped and the smells stopped and I wiped blood out of my ears and looked up and there was a structure the size of a mountain that was clearly not natural and clearly not built by anyone I have ever heard of.\n\nThe cartographer said: graveyard.\n\nI said: gold.\n\nI was wrong. Not about the gold — there may well be gold. I was wrong about what I was seeing. I was seeing the opportunity. He was seeing the thing. I don't know what he sees when he looks at places like this, with those cold eyes, with that particular quality of attention that makes everything feel like he's already read the last page of the story and is watching the earlier chapters out of professional obligation.\n\nI looked at the Inquisitor after we came through. Ignatius was upright. Barely. There was scorch damage on his robe and he was bleeding from both ears — the Siren's Impulse had broken something inside his hearing. He looked at me. He looked at the cartographer. He did not speak.\n\nHe started walking toward the ship's hold. The Siren's cage. Checking his assets.\n\nI do not like Ignatius. I have not liked him since he killed Varix, regardless of the cartographer's analysis of why. What I know about operational necessity: I have killed men for less. What I know about this specific killing: Varix was mine. Ignatius disposed of something that belonged to me without consulting me. This is not a theological disagreement. This is a property violation.\n\nI will remember this when the Island is finished.\n\nThe cartographer was leaning on his cane. His face was grey. He looked like a man who has paid most of what he had and is calculating what he has left. But he was standing. Whatever he is, he stands up.\n\nI thought: this man is the most useful thing on this ship. And this man is the most dangerous thing on this ship. And both of those are the same man.\n\nI checked the manifest in my head. Cord, seventeen. The sea took him. The log will read: 'lost to natural causes in the anomaly zone.' That is the correct log entry. That is also a lie, and I have written lies into logs for forty years, and it gets neither easier nor harder, it simply becomes the record.\n\nThe keel hit the bottom.\n\nWe are here.\n\nI do not know what 'here' is.\n\nBut there is a mountain made of metal on the other side of the rail, and the cartographer is already looking at it like he's reading a letter he's been waiting for.`,
       ru:`Земля.\n\nЯ плавал сорок лет и я всегда знал как пахнет земля когда приходишь с открытой воды. Это не пахнет как земля. Это вообще ничем не пахнет. Мы вошли в барьер и ветер остановился и запахи остановились и я вытер кровь из ушей и посмотрел вверх и там была структура размером с гору которая явно не была природной и явно не была построена кем-либо о ком я когда-либо слышал.\n\nКартограф сказал: кладбище.\n\nЯ сказал: золото.\n\nЯ был неправ. Не насчёт золота — оно вполне может быть. Я был неправ в том что видел. Я видел возможность. Он видел вещь. Я не знаю что он видит когда смотрит на такие места, этими холодными глазами, с тем особым качеством внимания из-за которого всё чувствуется будто он уже прочитал последнюю страницу истории и из профессиональной обязанности наблюдает более ранние главы.\n\nЯ посмотрел на Инквизитора после того как мы прошли. Игнациус был вертикален. Едва. На его рясе были ожоги и кровь из обоих ушей — Импульс Сирены сломал что-то внутри его слуха. Он посмотрел на меня. Посмотрел на картографа. Не говорил.\n\nОн начал идти к трюму корабля. К клетке Сирены. Проверять активы.\n\nМне не нравится Игнациус. Он не нравился мне с тех пор как убил Вариса, независимо от анализа картографа о причинах. Что я знаю об операционной необходимости: я убивал людей за меньшее. Что я знаю об этом конкретном убийстве: Варис был моим. Игнациус избавился от чего-то принадлежавшего мне без консультации со мной. Это не теологическое разногласие. Это нарушение собственности.\n\nЯ вспомню об этом когда с Островом будет покончено.\n\nКартограф опирался на трость. Его лицо было серым. Он выглядел как человек заплативший большую часть того что имел и рассчитывающий что осталось. Но он стоял. Чем бы он ни был — он встаёт.\n\nЯ подумал: этот человек — наиболее полезная вещь на этом корабле. И этот человек — наиболее опасная вещь на этом корабле. И то и другое — один и тот же человек.\n\nЯ проверил манифест в голове. Корд, семнадцать. Море взяло его. В журнале будет: «утерян по естественным причинам в зоне аномалии». Это правильная запись в журнале. Это также ложь, и я вписывал ложи в журналы сорок лет, и это не становится ни легче ни труднее, это просто становится записью.\n\nКиль ударился о дно.\n\nМы здесь.\n\nЯ не знаю что такое «здесь».\n\nНо по другую сторону борта — гора из металла, и картограф уже смотрит на неё будто читает письмо которого ждал.`
     },
     knows:{en:["'He was seeing the thing. I was seeing the opportunity.' He has correctly identified the qualitative difference between Dante's mode of attention and his own.","Varix was his property — this is not a moral grievance, it is a property violation. He will remember this when the Island is finished.","He checked the manifest in his head. Cord, seventeen. He will write 'natural causes.' He knows it's a lie. He writes lies into logs."],ru:["«Он видел вещь. Я видел возможность». Он правильно определил качественное различие между способом внимания Данте и своим.","Варис был его собственностью — это не моральная обида, это нарушение собственности. Он вспомнит об этом когда с Островом будет покончено.","Он проверил манифест в голове. Корд, семнадцать. Он напишет «естественные причины». Он знает что это ложь. Он вписывает лжи в журналы."]},
     misunderstands:{en:["'He's already read the last page of the story and is watching the earlier chapters out of professional obligation.' This is Valdos's most accurate external characterization of Dante in the book. It is also wrong in one specific direction: Dante has not read the last page yet. The last page is the Covenant document. He is reading the earlier chapters out of professional obligation and has not yet reached the ending. Valdos does not know this."],ru:["«Он уже прочитал последнюю страницу истории и из профессиональной обязанности наблюдает более ранние главы». Это наиболее точная внешняя характеристика Данте Валдосом в книге. Она также неверна в одном конкретном направлении: Данте ещё не прочитал последнюю страницу. Последняя страница — документ Завета. Он читает более ранние главы из профессиональной обязанности и ещё не достиг финала. Валдос не знает этого."]},
     hides:{en:["He thought: 'the most useful thing and the most dangerous thing — same man.' He has not said this to anyone. He said it to himself in the same internal register as a navigation calculation — pure utility assessment. He has not examined whether the combination of 'most useful' and 'most dangerous' being the same person is a situation he should be alarmed by or grateful for.","He checked the manifest in his head. He will write 'natural causes.' He has been doing this for forty years. It neither gets easier nor harder. He has not examined what it means that it doesn't change. Things that don't change over forty years either have no emotional content or have emotional content that has been successfully contained. He does not know which this is."],ru:["Он подумал: «самая полезная и самая опасная вещь — один человек». Он не говорил этого никому. Он сказал это себе в том же внутреннем регистре что навигационный расчёт — чистая оценка полезности. Он не исследовал является ли сочетание «наиболее полезного» и «наиболее опасного» одним человеком ситуацией которой следует тревожиться или за которую следует быть благодарным.","Он проверил манифест в голове. Он напишет «естественные причины». Он делает это сорок лет. Это не становится ни легче ни труднее. Он не исследовал что означает то что это не меняется. Вещи не меняющиеся сорок лет либо не имеют эмоционального содержания, либо имеют эмоциональное содержание которое было успешно сдержано. Он не знает что именно."]},
     whisper:{en:"He said 'the cartographer is reading a letter he's been waiting for.' He has not read the last page yet. Valdos does not know this. The letter is the Covenant document.",ru:"Он сказал «картограф читает письмо которого ждал». Он ещё не прочитал последнюю страницу. Валдос не знает этого. Письмо — документ Завета."}
   }

const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');c.innerHTML=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}].map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
