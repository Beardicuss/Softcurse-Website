.d3,.d4,.d5{animation:flicker-soft 14s infinite;}
.d6,.d7{animation:flicker-mid 7s infinite;}
.d8,.d9{animation:flicker-hard 4s infinite,glitch-mid 16s infinite;}

@keyframes flicker-soft{0%,94%,100%{opacity:1;}96%{opacity:.88;}}
@keyframes flicker-mid{0%,88%,100%{opacity:1;}90%{opacity:.75;}92%{opacity:.9;}93%{opacity:.68;}94%{opacity:1;}}
@keyframes flicker-hard{0%,80%,100%{opacity:1;}82%{opacity:.6;}83%{opacity:.9;}84%{opacity:.55;}85%{opacity:.85;}86%{opacity:.7;}87%{opacity:1;}}

const TIMELINE=[
  {id:"TET-77",en:"The 'Tear of Oblivion' is not what Dante described to Valeria. It does not stop aging. It is Isabella's most sophisticated compound: basilisk venom microdose (slows cellular metabolic rate to approximately 60% of baseline), powerful alchemical stabilizers, and opiate derivatives. It suppresses the biological feedback that produces the sensation of aging — the joint pain, the cognitive clarity loss — while the underlying aging continues at reduced rate. Dante's description was precise enough that nothing he said was technically false. It was imprecise enough that everything Valeria heard was what she needed to believe. The difference will become detectable in approximately eight months.",ru:"«Слеза Забвения» — не то, что Данте описал Валерии. Она не останавливает старение. Это самое сложное соединение Изабеллы: микродоза яда василиска (замедляет клеточный метаболизм до приблизительно 60% базового уровня), мощные алхимические стабилизаторы и производные опиатов. Оно подавляет биологическую обратную связь, производящую ощущение старения — боль в суставах, потерю когнитивной ясности — пока само старение продолжается с пониженной скоростью. Описание Данте было достаточно точным, что ничто технически не было ложью. Достаточно неточным, чтобы всё, что услышала Валерия, было тем, во что ей нужно было верить. Разница станет обнаружимой приблизительно через восемь месяцев."},
  {id:"TET-78",en:"Valeria's nightmares, the voices, the trembling hands — these are the memory residue of the Time Essence. Dante's hypothesis from Chapter 8 was correct: transferred life-years carry the emotional and mnemonic residue of the donor's experience. Valeria has absorbed decades of other people's final years — their dying hours, their terror, their grief — layered under her conscious awareness. The opiate component of Isabella's compound suppresses these residual perceptions. The people are still in her. The compound makes her unable to hear them. She experiences this as 'silence in my head at last.' The silence is not peace. It is anesthesia applied to something that is not a wound.",ru:"Кошмары Валерии, голоса, дрожащие руки — это осадок памяти Эссенции Времени. Гипотеза Данте из Главы 8 была верна: переданные годы жизни несут эмоциональный и мнемонический осадок опыта донора. Валерия поглотила десятилетия последних лет других людей — их предсмертные часы, их ужас, их горе — наслоенные под её сознательным осознанием. Опиатный компонент соединения Изабеллы подавляет эти остаточные восприятия. Эти люди всё ещё в ней. Соединение делает её неспособной слышать их. Она воспринимает это как «тишина в голове наконец». Тишина — не покой. Это анестезия, применённая к чему-то, что не является раной."},
  {id:"TET-79",en:"Isabella was not under the carriage seat for protection. She was there to observe Valeria's physiological response to the compound in real-time through a small optical device she had installed in the tea pavilion during the preparatory visit she made three days earlier, under a cover identity. The crossbow was real — she carries it as a standard precaution in field deployments. The observation was the primary function. She was recording baseline physiological data on a 120-year-old subject experiencing Time Essence withdrawal followed by compound administration. She will not publish this research.",ru:"Изабелла была не под сиденьем кареты ради защиты. Она была там, чтобы наблюдать за физиологической реакцией Валерии на соединение в реальном времени через небольшое оптическое устройство, установленное в чайном павильоне во время подготовительного визита за три дня до этого, под прикрытием. Арбалет был настоящим — она носит его как стандартную предосторожность при полевых развёртываниях. Наблюдение было основной функцией. Она записывала базовые физиологические данные 120-летнего субъекта, переживающего отмену Эссенции Времени с последующим введением соединения. Она не опубликует это исследование."},
  {id:"TET-80",en:"'Plan B' — publication of Valeria's love letters from the past eighty years — is not a bluff. Whisper obtained these letters over four years of ongoing intelligence collection. The letters are in a secure Guild archive. They were obtained legally, through sources who had legitimate access, and would produce a political scandal calibrated to destroy Valeria's Court position without exposing Guild methods. Dante has had this leverage for at least two years. He chose to mention it to the coachman (a ghoul guard) as an exit strategy, knowing it would be relayed to Whisper before the carriage reached the gates. Whisper filed it. This was not an accidental disclosure.",ru:"«План Б» — публикация любовных писем Валерии за последние восемьдесят лет — не блеф. Шепот получил эти письма за четыре года текущего разведывательного сбора. Письма находятся в защищённом архиве Гильдии. Они были получены законно, через источники, имевшие законный доступ, и произвели бы политический скандал, откалиброванный для разрушения придворного положения Валерии без раскрытия методов Гильдии. Данте имеет этот рычаг как минимум два года. Он выбрал упомянуть об этом кучеру (замаскированному гулю из охраны) как запасной стратегии, зная что это будет передано Шепоту до достижения каретой ворот. Шепот занёс это. Это не было случайным раскрытием."},
  {id:"TET-81",en:"Valeria's political protection offer — tax exemptions, Inquisition cover, Crown archive access — is more valuable than Dante indicated to Isabella in the carriage. The Crown archive access specifically includes a sub-section cross-referenced with the Covenant Objects classification under the heading 'Antediluvian Diplomatic Records.' This is a different access path to the same information Morius offered through the Church archive. Dante did not mention this overlap to Isabella. He has not mentioned it to anyone. He identified it from Valeria's description of the archive's contents during the negotiation. She did not know what she was describing.",ru:"Предложение политической защиты Валерии — налоговые льготы, прикрытие от Инквизиции, доступ к архивам Короны — более ценно, чем Данте указал Изабелле в карете. Доступ к архивам Короны конкретно включает подраздел, перекрёстно индексированный с классификацией Объектов Завета под заголовком «Допотопные Дипломатические Записи». Это другой путь доступа к той же информации, которую Мориус предложил через церковный архив. Данте не упоминал об этом пересечении Изабелле. Он не упоминал никому. Он определил это из описания Валерией содержания архива во время переговоров. Она не знала, что описывает."},
  {id:"TET-82",en:"The silver raven on the cane's handle did not wink at Dante. The earring vibrated for 0.2 seconds as he looked at it in the carriage. The raven's eyes are set with a material he has not yet classified — not standard gemstone, not any alloy in his reference set. It produces a faint resonance that the earring registers as neither deception nor Void-contact, but as a third category the earring has never before produced. The cane was in the Guild armory for eleven years before Dante requisitioned it. The armory intake record lists its donor as: 'Predecessor, Auditor — personal effects, donated on departure.' His predecessor carried this cane. Dante is using his predecessor's cane.",ru:"Серебряный ворон на рукояти трости не подмигнул Данте. Серьга вибрировала 0,2 секунды когда он посмотрел на него в карете. Глаза ворона инкрустированы материалом, который он ещё не классифицировал — не стандартный драгоценный камень, не какой-либо сплав из его справочного набора. Он производит слабый резонанс, который серьга регистрирует ни как обман, ни как контакт Пустоты, но как третью категорию, которую серьга прежде никогда не производила. Трость находилась в оружейной Гильдии одиннадцать лет до реквизиции Данте. Запись о поступлении в оружейную перечисляет дарителя как: «Предшественник, Аудитор — личные вещи, переданы при отбытии». Его предшественник носил эту трость. Данте использует трость своего предшественника."},
  {id:"TET-83",en:"Dante's sweat-soaked shirt in the carriage is the only physical evidence in the book that the Valeria meeting was not as controlled as his operational narration suggests. He was afraid in the Tea Pavilion. Not of Valeria's guards or her capacity for retaliation. Of the moment when she asked 'how do you know?' and he answered 'because I saw their factory.' He was afraid of what she would do with the knowledge that he had seen the faces of the people whose years she consumed — that he had watched the process from above and had not stopped it. He does not report this in any file. The wet shirt is in the laundry. It will be cleaned and returned without annotation.",ru:"Мокрая от пота рубашка Данте в карете — единственное физическое свидетельство в книге того, что встреча с Валерией была не так контролируема, как подразумевает его операционный нарратив. Он боялся в Чайном Павильоне. Не гвардейцев Валерии или её способности к возмездию. Момента, когда она спросила «откуда вы знаете?» и он ответил «потому что я видел их фабрику». Он боялся того, что она сделает со знанием о том, что он видел лица людей, чьи годы она поглощала — что наблюдал процесс сверху и не остановил его. Он не докладывает об этом ни в каком файле. Мокрая рубашка в прачечной. Она будет постирана и возвращена без аннотации."},
  {id:"TET-84",en:"'We've become the Empire's drug dealers.' Dante said this and immediately pivoted to the next operational objective. In Chapter 1 he said: the only peace that lasts is peace built on bribes, fear, and compromise. In Chapter 5 he said: sometimes you have to leave monsters alive. In Chapter 8 he said: business continues, it must be sufficient. Each time he names the thing accurately and moves forward. The naming is not avoidance. The moving forward is not avoidance either. He is doing something that does not have a clean category: carrying the accurate name of what he does and continuing to do it, in a space between denial and acceptance that the book has not yet given a word to.",ru:"«Мы стали дилерами Империи». Данте сказал это и немедленно перешёл к следующему операционному объекту. В Главе 1 он сказал: единственный мир, который держится — это мир, построенный на взятках, страхе и компромиссах. В Главе 5: иногда приходится оставлять чудовищ живыми. В Главе 8: бизнес продолжается, этого должно быть достаточно. Каждый раз он точно называет вещь и движется вперёд. Называние — не избегание. Движение вперёд тоже не избегание. Он делает нечто, для чего нет чёткой категории: несёт точное название того, что делает, и продолжает делать это — в пространстве между отрицанием и принятием, которому книга ещё не дала слова."}
];

const SCENES=[

/* ─── SCENE 1: THE GARDEN WHERE BIRDS DO NOT SING ─── */
{id:"s1",
 title:{en:"The Garden Where Birds Do Not Sing",ru:"Сад, где не поют птицы"},
 subtitle:{en:"Every step measured. Every detail read. The cane on stone.",ru:"Каждый шаг взвешен. Каждая деталь прочитана. Трость по камню."},
 location:{en:"Countess Valeria's Estate — Approach",ru:"Поместье Графини Валерии — Подход"},
 timing:{en:"Afternoon, Day of the Meeting",ru:"Полдень, День Встречи"},
 flags:["social_combat","foreshadowing"],
 povData:{
   dante:{distortion:2,
     text:{
       en:`The estate is designed as a threat statement. The island placement — access by single bridge, guards at chokepoint, black water on all sides — communicates: you chose to come here, and departure is at our discretion. The grey roses are a secondary message: beauty maintained through unnatural intervention, displayed without apology. Valeria has been making this statement for approximately ninety years and has never updated it, which means either the statement is accurate to who she is or she has stopped questioning whether it is.\n\nThe guard uniforms: polished silver masks. Silver reflects. Visitors see themselves approaching, not the guards. This is a psychological compression technique — it puts the visitor in the position of subject rather than observer. I noted it and did not adjust my pace. Slowing down in response to a compression technique signals that the technique worked.\n\nThe garden. Grey roses, geometric topiary, no birdsong. This is an intelligence installation in plain sight. Seventeen species of botanical compounds not in Guild catalogue, growing in beds that are organized not aesthetically but in a pattern consistent with a functional processing layout. She has a laboratory. The garden is it. I walked through it reading the layout and confirmed: the pavilion is at the center of the processing flow, positioned to receive output from four converging planting sections.\n\nThe butler. Human, approximately ninety years old by the texture of his skin. He has been here approximately as long as Valeria has been using Essence. He did not come from her Essence — he was either already old when she began, or he refused the offer. His hands were steady. His voice was even. He said: Her Ladyship has a migraine.\n\nI heard: withdrawal is in progress. The migraine is the vascular component of temporal essence deprivation.\n\nI adjusted the compound's deployment sequence in my mind as I walked to the pavilion. The vasodilatory component should be released first, before the stabilizers. The opiate derivative should follow at the thirty-second mark to catch the peak of vasodilation before the subject registers the relief as pleasure-seeking rather than pain-relief.\n\nTick. Tick. Tick.\n\nThe cane on the stone path. Unhurried. Measured. Present.\n\nPlan B is already in motion if I do not exit the gate within ninety minutes. I do not expect to need Plan B. But its existence changes the weight of everything I am about to do.`,
       ru:`Поместье спроектировано как заявление угрозы. Расположение на острове — доступ по одному мосту, охранники в узком месте, чёрная вода со всех сторон — говорит: вы выбрали прийти сюда, и выход — по нашему усмотрению. Серые розы — вторичное сообщение: красота, поддерживаемая неестественным вмешательством, демонстрируемая без извинений. Валерия делает это заявление приблизительно девяносто лет и никогда его не обновляла — что означает либо что заявление точно отражает то, кем она является, либо что она перестала задаваться вопросом, так ли это.\n\nФорма гвардейцев: полированные серебряные маски. Серебро отражает. Посетители видят себя приближающимися, а не охранников. Это техника психологического сжатия — она ставит посетителя в положение субъекта, а не наблюдателя. Я отметил это и не изменил темпа. Замедление в ответ на технику сжатия сигнализирует что техника сработала.\n\nСад. Серые розы, геометрические топиари, ни одной птицы. Это разведывательная установка у всех на виду. Семнадцать видов ботанических соединений, которых нет в каталоге Гильдии, растущих в клумбах, организованных не эстетически, а в паттерне, согласующемся с функциональной схемой переработки. У неё есть лаборатория. Сад — это и есть она. Я шёл через него, читая схему, и подтвердил: павильон в центре потока переработки, расположен для получения вывода из четырёх сходящихся секций посадок.\n\nДворецкий. Человек, приблизительно девяносто лет по текстуре кожи. Он здесь приблизительно столько же, сколько Валерия использует Эссенцию. Он не получил её от неё — он либо уже был стар когда она начала, либо отказался от предложения. Его руки были тверды. Голос ровен. Он сказал: у Её Сиятельства мигрень.\n\nЯ услышал: ломка в процессе. Мигрень — сосудистый компонент депривации темпоральной Эссенции.\n\nЯ скорректировал последовательность введения соединения в уме по пути к павильону. Сосудорасширяющий компонент должен высвобождаться первым, до стабилизаторов. Производное опиата должно следовать на тридцатой секунде, чтобы поймать пик вазодилатации до того, как субъект зарегистрирует облегчение как поиск удовольствия, а не снятие боли.\n\nТук. Тук. Тук.\n\nТрость на каменной дорожке. Неторопливо. Размеренно. Присутствие.\n\nПлан Б уже запущен, если я не выйду из ворот в течение девяноста минут. Я не ожидаю необходимости в Плане Б. Но его существование меняет вес всего, что я собираюсь сделать.`
     },
     knows:{en:["The garden is a botanical processing laboratory — the planting layout is functional, not aesthetic. He mapped it while walking.","The butler refused Valeria's Essence offer, or was already old when she began — his steady hands are the tell","Plan B is already activated — the coachman (ghoul guard) will relay to Whisper at 90 minutes, triggering the letters release"],ru:["Сад — ботаническая лаборатория переработки — схема посадок функциональная, а не эстетическая. Он нанёс её на карту пока шёл.","Дворецкий отказался от Эссенции Валерии или уже был стар когда она начала — твёрдые руки — сигнал","План Б уже активирован — кучер (гуль из охраны) передаст Шепоту через 90 минут, запустив публикацию писем"]},
     misunderstands:{en:["He has already adjusted the compound's deployment sequence in his mind — vasodilatory first, stabilizer second, opiate at thirty seconds. This is correct pharmacological sequencing. What he has not adjusted for: Valeria's neurological architecture after 120 years of temporal Essence use may respond to the opiate component differently than a standard-age subject. Isabella's compound was calibrated on standard-age subjects. The thirty-second mark may be off.","He read the estate's threat statement as architectural communication. It is also a genuine expression of what Valeria has become — a person who has been waiting for a specific conversation for nineteen years in a space she designed for waiting. The threat is real. The waiting is what the architecture is actually about."],ru:["Он уже скорректировал в уме последовательность введения соединения — сначала сосудорасширяющее, затем стабилизатор, опиат на тридцатой секунде. Это правильная фармакологическая последовательность. Что он не учёл: нейрологическая архитектура Валерии после 120 лет использования темпоральной Эссенции может реагировать на опиатный компонент иначе, чем субъект стандартного возраста. Соединение Изабеллы откалибровано на субъектах стандартного возраста. Тридцатисекундная отметка может быть неверной.","Он прочитал угрозное заявление поместья как архитектурную коммуникацию. Это также искреннее выражение того, кем стала Валерия — человека, ждавшего конкретного разговора девятнадцать лет в пространстве, которое она спроектировала для ожидания. Угроза реальна. Ожидание — вот о чём на самом деле эта архитектура."]},
     hides:{en:["Plan B was mentioned to the coachman deliberately, knowing it would be relayed. This is not a backup plan. It is a calibrated disclosure that changes the negotiation's weight without being stated at the table. He has used this technique twice before.","The cane's tap on the stone path: 'unhurried, measured, present.' He described the sound with three words. He does not describe the compound's delivery sequence with three words. He does not describe the guards' formation with three words. He used three words for the sound of a stick on stone. He has not examined why that sound required more precision than a tactical briefing."],ru:["Упоминание Плана Б кучеру было намеренным, зная что будет передано. Это не запасной план. Это откалиброванное раскрытие, меняющее вес переговоров без произнесения за столом. Он использовал эту технику дважды прежде.","Стук трости по каменной дорожке: «неторопливо, размеренно, присутствие». Он описал звук тремя словами. Он не описывает последовательность введения соединения тремя словами. Не описывает построение охраны тремя словами. Он использовал три слова для звука палки по камню. Он не исследовал почему этот звук потребовал большей точности, чем тактический брифинг."]},
     whisper:{en:"He described the cane on stone with three words: unhurried, measured, present. He did not give three words to anything else in this approach. He has not noticed this.",ru:"Он описал трость по камню тремя словами: неторопливо, размеренно, присутствие. Он не дал трёх слов ничему другому в этом подходе. Он не заметил этого."}
   },
   isabella:{distortion:3,
     text:{
       en:`Three days ago I visited the estate as a botanical consultant assessing the Countess's private garden for a fictional academy journal. The access was arranged through one of Whisper's cover networks. I spent four hours in the garden and forty minutes in the tea pavilion under the pretense of examining the glass structures for humidity damage.\n\nThe optical device is in the third panel from the left on the north wall, behind a decorative brass fitting. It provides a forty-degree visual field covering the primary seating arrangement and the approach corridor. The acoustic coupling is in the pot of the grey orchid on the center table, which I rearranged during my visit under the guise of inspecting its condition.\n\nI did not tell the Master any of this. He told me the meeting parameters and I provided the compound. He did not ask how I prepared. He does not ask how I prepare, because asking would require him to either endorse methods he has not assessed or to assess methods that would produce an uncomfortable briefing. We have been doing this for six years.\n\nThe compound sequence: I adjusted the deployment for a 120-year neurological baseline during the transit. Standard calibration assumes fifty-to-seventy-year subject architecture. The opiate derivative at thirty seconds would overshoot for Valeria's receptor sensitivity — I recalibrated to forty-five seconds in the flask. The Master does not know I did this.\n\nThe observation data: physiological response was consistent with severe temporal Essence deprivation and secondary memory-residue manifestation — the voices, the nightmares — consistent with the hypothesis about donor memory content. The compound worked correctly. The vasodilatory wave peaked at twenty-two seconds, the stabilizer integration was clean, the opiate catch was at forty-three seconds, two seconds behind my recalibrated mark but within acceptable variance.\n\nShe said: silence, at last silence in my head.\n\nI have been doing this work for fourteen years. I have administered approximately three hundred compounds to approximately two hundred and sixty subjects. Sixty of those compounds were designed to suppress symptoms of something that was not a malfunction. This is the first one where what I was suppressing was other people.\n\nI filed this observation in my personal research log.\n\nI did not write the word I used for it in the filing. I wrote the word next to the filing, in the margin, in a script only I can read. The word is not in the research vocabulary. I borrowed it from a language I studied when I was twelve and have not used since.`,
       ru:`Три дня назад я посетила поместье как ботанический консультант, оценивающий частный сад Графини для вымышленного академического журнала. Доступ был организован через одну из прикрытий Шепота. Я провела четыре часа в саду и сорок минут в чайном павильоне под предлогом осмотра стеклянных конструкций на предмет влажных повреждений.\n\nОптическое устройство находится в третьей панели слева на северной стене, за декоративным латунным крепежом. Оно обеспечивает 40-градусное поле зрения, охватывающее основную зону сидения и подходной коридор. Акустическое сопряжение — в горшке с серой орхидеей на центральном столе, которую я переставила во время визита под предлогом осмотра её состояния.\n\nЯ ничего из этого не говорила Мастеру. Он изложил мне параметры встречи, и я предоставила соединение. Он не спрашивал как я готовилась. Он никогда не спрашивает как я готовлюсь, потому что вопрос потребовал бы от него либо одобрения методов, которые он не оценивал, либо оценки методов, которая произвела бы неудобный брифинг. Мы делаем это шесть лет.\n\nПоследовательность соединения: я скорректировала введение для 120-летнего нейрологического базового уровня в пути. Стандартная калибровка предполагает архитектуру субъекта пятидесяти-семидесяти лет. Производное опиата на тридцати секундах перебросит для чувствительности рецепторов Валерии — я перекалибровала до сорока пяти секунд во флаконе. Мастер не знает что я это делала.\n\nДанные наблюдения: физиологическая реакция соответствовала тяжёлой депривации темпоральной Эссенции и вторичной манифестации осадка памяти — голоса, кошмары — согласующейся с гипотезой о содержании памяти донора. Соединение сработало правильно. Сосудорасширяющая волна достигла пика на двадцать второй секунде, интеграция стабилизатора была чистой, перехват опиата — на сорок третьей секунде, на две секунды позади перекалиброванной отметки, но в допустимой дисперсии.\n\nОна сказала: тишина, наконец тишина в голове.\n\nЯ занимаюсь этой работой четырнадцать лет. Я вводила приблизительно триста соединений приблизительно двумстам шестидесяти субъектам. Шестьдесят из этих соединений были разработаны для подавления симптомов чего-то, что не было нарушением. Это первое, где то, что я подавляла, было другими людьми.\n\nЯ занесла это наблюдение в свой личный исследовательский журнал.\n\nЯ не написала слово, которое использовала для него в записи. Я написала слово рядом с записью, на полях, шрифтом, который могу читать только я. Слово не из исследовательского словаря. Я заимствовала его из языка, который изучала в двенадцать лет и с тех пор не использовала.`
     },
     knows:{en:["She installed the optical device and acoustic coupling three days ago — she was in the pavilion under cover, observing in real-time","She recalibrated the opiate timing from 30 to 45 seconds for Valeria's 120-year neurological baseline — Dante does not know this","The compound worked: the voices are suppressed because the donor memory residue is suppressed. The people are still in Valeria. The compound makes her unable to hear them."],ru:["Она установила оптическое устройство и акустическое сопряжение три дня назад — была в павильоне под прикрытием, наблюдала в реальном времени","Она перекалибровала время опиата с 30 до 45 секунд для 120-летнего нейрологического базового уровня Валерии — Данте не знает","Соединение сработало: голоса подавлены, потому что подавлен осадок памяти донора. Эти люди всё ещё в Валерии. Соединение делает её неспособной их слышать."]},
     misunderstands:{en:["She wrote a word in the margin of her research log in a language she has not used since she was twelve. She borrowed the word. She has not yet asked herself why she had to borrow a word — why the research vocabulary did not contain what she needed. The answer is that research vocabulary describes phenomena from outside. The word she needed describes what it is like to be the person who administered the compound. There is no research word for this. There is a word in the language she knew at twelve, before she knew that she would spend her life administering compounds to people. She used that word."],ru:["Она написала слово на полях своего исследовательского журнала на языке, который не использовала с двенадцати лет. Она заимствовала слово. Она ещё не задалась вопросом почему ей пришлось заимствовать слово — почему исследовательский словарь не содержал то, что ей было нужно. Ответ: исследовательский словарь описывает явления снаружи. Слово, которое ей нужно, описывает каково быть человеком, который ввёл соединение. Для этого нет исследовательского слова. Есть слово на языке, который она знала в двенадцать лет, до того как узнала, что проведёт жизнь вводя соединения людям. Она использовала то слово."]},
     hides:{en:["She wrote a word in a language she has not used since twelve. She has not written what the word is. It is not in any filing. It is on the margin of a physical page in a physical notebook she keeps in a place that is not catalogued.","She recalibrated the opiate timing in the flask without telling Dante. This is the third time she has made a real-time compound adjustment without disclosure. The first two produced better outcomes than the filed parameters would have produced. This one produced a clean result. She has not examined what it means that she has developed a parallel protocol she does not share with the person who commissioned the compounds."],ru:["Она написала слово на языке, которым не пользовалась с двенадцати лет. Она не написала каким было слово. Его нет ни в одной записи. Оно на полях физической страницы в физическом блокноте, который она хранит в некаталогизированном месте.","Она перекалибровала время опиата во флаконе без уведомления Данте. Это третий раз, когда она делает корректировку соединения в реальном времени без раскрытия. Первые два дали лучшие результаты чем давали бы заявленные параметры. Этот дал чистый результат. Она не исследовала что означает то, что она разработала параллельный протокол, которым не делится с лицом, заказавшим соединения."]},
     whisper:{en:"She wrote a word she hasn't used since twelve. It's on a margin in a notebook that isn't catalogued. She has not written what the word is anywhere that can be found.",ru:"Она написала слово, которое не использовала с двенадцати лет. Оно на полях в блокноте, который не каталогизирован. Она не написала каким было слово нигде, где это можно найти."}
   }
 }
},

/* ─── SCENE 2: THE WIDOW OF ETERNITY / THE DEAL ─── */
{id:"s2",
 title:{en:"The Widow of Eternity",ru:"Вдова Вечности"},
 subtitle:{en:"You drank not youth. You drank agony.",ru:"Вы пили не молодость. Вы пили агонию."},
 location:{en:"The Tea Pavilion, Valeria's Estate",ru:"Чайный Павильон, Поместье Валерии"},
 timing:{en:"Continuous with Scene One",ru:"Непрерывно с Первой Сценой"},
 flags:["pivotal","social_combat","negotiation","moral_pivot"],
 povData:{
   dante:{distortion:3,
     text:{
       en:`She is twenty-five years old on the surface. She is a hundred and twenty underneath it. I have encountered this disjunction before — individuals who have used significant magical resources to maintain a presentation that does not match their actual biological or chronological age. The tells are usually in the hands. Hers confirmed what I already knew: fine tremor, lace gloves to conceal it, the specific skin texture of a person whose cellular turnover has been artificially suppressed for long enough that it has lost elasticity at the microscopic level. The decay scent beneath the lavender was secondary confirmation.\n\nShe opened with social aggression — 'you limp' — which is usually a vulnerability probe. I deflected with the time-can't-be-bought observation, which positioned the conversation as one between equals rather than as supplicant-to-patron. She registered this and escalated: the Essence supply is disrupted, I can destroy you. This is negotiating from fear, not strength. Fear-based negotiation escalates sharply and then collapses when the threatening party realizes they have nothing to offer, only threats. I waited for the collapse point.\n\nThe glass breaking in her hand. No blood. Dry powder where blood should be. Her body's calcium metabolism is compromised — the temporal chemistry she consumed for eleven years has been leaching her bone mineral density. She is coming apart structurally. This will accelerate without intervention.\n\nI told her what she had been drinking. This was a risk. The truth about the Essence's donor content could have produced grief, rage, or complete psychological destabilization in a person who had been living with the residue for years without understanding it. I calculated the risk as acceptable because the alternative — selling her a palliative without disclosure — would have produced a client who later discovered what she had been consuming and would then be furious at the Guild for knowing and not saying. I gave her the worst information first.\n\nHer question: 'How do you know?'\n\nMy answer: 'Because I saw their factory.'\n\nThis was accurate. I watched from the gallery. The Chronmancer's operation was functional and I chose not to intervene in the cages because the cage system was already too far advanced for any individual rescue to matter and my operational objective was the artifact node, not the extraction of specific individuals from — I am noting that I am returning to this formulation. I have returned to it twice in internal narration. I will not return to it a third time. The operational decision was correct. I have not examined the sentence I cannot complete.\n\nShe took the deal. The compound worked as Isabella designed.\n\nShe said: silence. At last silence in my head.\n\nI took my cane and stood. My shirt was wet with sweat.\n\nThis is noted for physiological records. It is not noted as anything else.`,
       ru:`Она двадцатипятилетняя на поверхности. Ей сто двадцать под ней. Я сталкивался с этим несоответствием прежде — люди, использующие значительные магические ресурсы для поддержания внешности, не соответствующей их реальному биологическому или хронологическому возрасту. Признаки обычно в руках. Её подтвердили то, что я уже знал: мелкое дрожание, кружевные перчатки для его сокрытия, специфическая текстура кожи человека, чей клеточный оборот был искусственно подавлен достаточно долго, что потерял эластичность на микроскопическом уровне. Запах тлена под лавандой — вторичное подтверждение.\n\nОна открылась социальной агрессией — «вы хромаете» — что обычно является зондированием уязвимости. Я отклонил наблюдением о невозможности купить время, что позиционировало разговор как равных, а не проситель-к-покровителю. Она зарегистрировала это и эскалировала: поставки Эссенции прерваны, я могу уничтожить вас. Это переговоры со страха, а не силы. Переговоры со страха эскалируют резко и затем рушатся, когда угрожающая сторона понимает что ей нечего предложить — только угрозы. Я ждал точки обрушения.\n\nСтекло лопнуло в её руке. Нет крови. Сухой порошок там, где должна быть кровь. Кальциевый метаболизм её тела нарушен — темпоральная химия, которую она потребляла одиннадцать лет, вымывала минеральную плотность её костей. Она структурно разрушается. Это ускорится без вмешательства.\n\nЯ сказал ей, что она пила. Это был риск. Правда о содержании доноров Эссенции могла вызвать горе, ярость или полную психологическую дестабилизацию у человека, жившего с осадком годами без понимания. Я рассчитал риск как приемлемый, потому что альтернатива — продажа паллиатива без раскрытия — произвела бы клиента, впоследствии обнаружившего что она потребляла, и тогда разъярённого на Гильдию за знание и молчание. Я дал ей худшую информацию первой.\n\nЕё вопрос: «Откуда вы знаете?»\n\nМой ответ: «Потому что я видел их фабрику».\n\nЭто было точно. Я наблюдал с галереи. Операция Хрономанта функционировала, и я выбрал не вмешиваться в клетки, потому что система клеток уже продвинулась слишком далеко для того чтобы какое-либо индивидуальное спасение имело значение, и мой операционный объект был артефактным узлом, а не извлечением конкретных людей из — я отмечаю что возвращаюсь к этой формулировке. Я возвращался к ней дважды во внутреннем нарративе. Я не вернусь к ней третий раз. Операционное решение было верным. Я не исследовал предложение, которое не могу завершить.\n\nОна приняла сделку. Соединение сработало так, как разработала Изабелла.\n\nОна сказала: тишина. Наконец тишина в голове.\n\nЯ взял трость и поднялся. Моя рубашка была мокрой от пота.\n\nЭто отмечено для физиологических записей. Это не отмечается ни чем иным.`
     },
     knows:{en:["The glass breaking with no blood — calcium metabolism failure from eleven years of temporal chemistry leaching bone mineral density. She is structurally coming apart.","The Crown archive access Valeria offered includes 'Antediluvian Diplomatic Records' — which cross-references the Covenant Objects classification. He identified this during negotiation. He has not told anyone.","He noticed his shirt was wet with sweat. He noted it for physiological records. He did not note it as anything else."],ru:["Стекло лопнуло без крови — нарушение кальциевого метаболизма от одиннадцати лет вымывания темпоральной химией минеральной плотности костей. Она структурно разрушается.","Доступ к архивам Короны, предложенный Валерией, включает «Допотопные Дипломатические Записи» — перекрёстно индексированные с классификацией Объектов Завета. Он определил это в ходе переговоров. Никому не говорил.","Он заметил что его рубашка была мокрой от пота. Он отметил это для физиологических записей. Не отметил ни чем иным."]},
     misunderstands:{en:["'I have not examined the sentence I cannot complete.' He has now said this in his internal narration — the sentence about why he did not intervene in the cages. He has arrived at it three times. Each time he has noted it and moved forward. This is the same mechanism as the seventh commodity hypothesis (arrived at three times, moved forward) and the file of things he does not record (noted, not opened). These are three instances of the same operation. He has not connected them.","He calculated that disclosure would prevent a later angry client discovering what she had consumed. This is correct. It is also the most generous possible reading of why he told her. The other reading — that he told her because she asked, and something in the asking required an honest answer regardless of calculation — does not appear in his narration."],ru:["«Я не исследовал предложение, которое не могу завершить». Он теперь сказал это во внутреннем нарративе — предложение о том, почему он не вмешался в клетки. Он пришёл к нему трижды. Каждый раз отмечал и двигался вперёд. Это тот же механизм что гипотеза о седьмом товаре (пришёл трижды, двигался вперёд) и файл вещей, которые не записывает (отмечен, не открыт). Это три экземпляра одной операции. Он не соединил их.","Он рассчитал что раскрытие предотвратит позднейшего разгневанного клиента, обнаружившего что она потребляла. Это верно. Это также наиболее щедрое возможное прочтение того, почему он ей сказал. Другое прочтение — что он сказал потому что она спросила, и что-то в вопрошании потребовало честного ответа вне зависимости от расчёта — не появляется в его нарративе."]},
     hides:{en:["His shirt was wet. This is the chapter's only physical evidence of the meeting's cost. He logged it as a physiological observation. The operational narration is not wet. Only the shirt is.","'The sentence I cannot complete' — he has now named it. He has named it and immediately said he will not return to it. He returned to it anyway two sentences later, in the act of noting that he had returned to it twice. The returning is happening faster than the noting.","He told Valeria what she had been drinking because she asked 'how do you know.' He has framed this as strategic disclosure. The shirt suggests there was something else in the room when she asked that question and he answered it."],ru:["Его рубашка была мокрой. Это единственное физическое свидетельство этой главы о цене встречи. Он занёс это как физиологическое наблюдение. Операционный нарратив не мокрый. Мокра только рубашка.","«Предложение, которое не могу завершить» — он теперь его назвал. Назвал и немедленно сказал что не вернётся к нему. Он всё равно вернулся через два предложения, отмечая что возвращался к нему дважды. Возвращение происходит быстрее чем отметка.","Он сказал Валерии что она пила, потому что она спросила «откуда вы знаете». Он сформулировал это как стратегическое раскрытие. Рубашка предполагает что в комнате было что-то ещё когда она задала этот вопрос и он ответил."]},
     whisper:{en:"He cannot complete one sentence. He has returned to it three times in one chapter. He noted that he returned to it twice, then returned a third time in the noting. The shirt was wet.",ru:"Он не может завершить одно предложение. Он возвращался к нему трижды в одной главе. Отметил что возвращался дважды — и вернулся третий раз в самой отметке. Рубашка была мокрой."}
   },
   valeria:{distortion:6,
     text:{
       en:`He limps.\n\nI had been told to expect a precise man. They did not mention the cane, or the way he carries it — not as an accessory, as a part. The way very old people carry the particular object that has become inseparable from how they move through the world. He has had that cane for twelve minutes and it is already part of how he moves.\n\nI was prepared to dominate this room. I have been dominating rooms for ninety years. He entered and the room became not mine.\n\nHe did not take my power away. He simply did not acknowledge it, which is more effective than resistance. You cannot fight against someone who declines to treat your threat as a threat.\n\nI told him about the Essence. I told him my bones were going dry. I told him he had destroyed my source. I said: I can order the Guard to reduce your Guild to powder.\n\nHe said: yes, but that will take a week, and you will crumble in three days.\n\nI wanted to be furious. I was furious. And then he said the thing about what I had been drinking — the agony, the people, the factory — and the fury went somewhere else, somewhere I did not have access to in that moment, and what was left was a very old woman in a room with a man who had just told her what she had been eating for eleven years.\n\nHe said it quietly. Not cruelly — he doesn't have a cruel register, I could hear it, his voice doesn't modulate toward cruelty, it modulates toward precision. The precision was the thing. I would have preferred cruelty. Cruelty I could have met. The precision went all the way through.\n\nI asked: how do you know? He said: because I saw their factory.\n\nI heard: he was there. He was at the place where they made what I consumed. He watched it. He knows what he is looking at when he looks at me.\n\nThe compound he gave me: it works. The silence is — I had forgotten what silence was. Eleven years of voices and then silence.\n\nI signed what he asked for. Tax exemptions. Archive access. Inquisition cover. He asked for tools, not titles. A man who asks for tools is planning to use them.\n\nHe stood with his cane and was about to leave. He looked at the raven on the handle for one moment before he moved.\n\nI recognized the raven. I recognized the material in the eyes. I know where that cane came from.\n\nI said nothing.\n\nSome information is not disclosed until the price is known.`,
       ru:`Он хромает.\n\nМне говорили ожидать точного человека. Не упоминали трость или то, как он её несёт — не как аксессуар, как часть. Так, как очень старые люди несут конкретный предмет, ставший неотделимым от того, как они движутся по миру. Он носит эту трость двенадцать минут, и она уже часть его движения.\n\nЯ была готова доминировать в этой комнате. Я доминирую в комнатах девяносто лет. Он вошёл — и комната перестала быть моей.\n\nОн не забрал мою власть. Он просто не признал её, что эффективнее сопротивления. Нельзя бороться против кого-то, кто отказывается воспринимать твою угрозу как угрозу.\n\nЯ сказала ему об Эссенции. Сказала что мои кости пересыхают. Сказала что он уничтожил мой источник. Я сказала: я могу приказать Гвардии стереть вашу Гильдию в порошок.\n\nОн сказал: да, но это займёт неделю, а рассыплетесь вы через три дня.\n\nЯ хотела быть в ярости. Я была в ярости. И затем он сказал то об агонии — людях, фабрике — и ярость ушла куда-то, куда у меня не было доступа в тот момент, и осталась очень старая женщина в комнате с мужчиной, только что рассказавшим ей что она ела одиннадцать лет.\n\nОн сказал это тихо. Не жестоко — у него нет жестокого регистра, я слышала это, его голос не модулирует к жестокости, он модулирует к точности. Именно точность. Я бы предпочла жестокость. Жестокости я могла бы противостоять. Точность прошла насквозь.\n\nЯ спросила: откуда вы знаете? Он сказал: потому что я видел их фабрику.\n\nЯ услышала: он был там. Он был в месте, где делали то, что я потребляла. Он наблюдал за этим. Он знает на что смотрит, когда смотрит на меня.\n\nСоединение, которое он дал мне: оно работает. Тишина — я забыла что такое тишина. Одиннадцать лет голосов, и потом тишина.\n\nЯ подписала то, о чём он просил. Налоговые льготы. Доступ к архиву. Прикрытие от Инквизиции. Он просил инструменты, а не титулы. Человек, просящий инструменты, планирует ими воспользоваться.\n\nОн встал с тростью и собирался уходить. Он посмотрел на ворона на рукояти на одно мгновение прежде чем двинуться.\n\nЯ узнала ворона. Узнала материал в глазах. Я знаю откуда эта трость.\n\nЯ ничего не сказала.\n\nНекоторая информация не раскрывается пока не известна цена.`
     },
     knows:{en:["She recognized the raven on the cane's handle — and the material in the eyes. She knows where the cane came from. She said nothing.","His voice modulates toward precision, not cruelty — she identified this correctly and correctly identified that precision is what penetrated where cruelty would not have","He asked for tools, not titles — she registered this as a man who is planning to use what he receives"],ru:["Она узнала ворона на рукояти трости — и материал в глазах. Она знает откуда эта трость. Она ничего не сказала.","Его голос модулирует к точности, а не жестокости — она правильно определила это и правильно определила что точность проникла туда, куда жестокость не проникла бы","Он просил инструменты, а не титулы — она зарегистрировала это как человека, планирующего использовать то, что получает"]},
     misunderstands:{en:["'He was there. He watched it. He knows what he is looking at when he looks at me.' — She interpreted his factory disclosure as: he has full knowledge of what she consumed. She is correct. She did not also interpret: he chose not to stop the cage system during the operation, which is in the same sentence as his knowledge. She received the knowledge half without the adjacent fact.","She said nothing about the raven because she wants to know the price first. This is correct negotiating instinct. The price of that information may be more than she can pay at this meeting, and she is ninety years into knowing when to wait."],ru:["«Он был там. Он наблюдал. Он знает на что смотрит, когда смотрит на меня». — Она интерпретировала раскрытие фабрики как: у него полные знания о том, что она потребляла. Она права. Она также не интерпретировала: он выбрал не останавливать систему клеток во время операции — что находится в том же предложении что и его знание. Она получила половину знания без соседнего факта.","Она ничего не сказала о вороне, потому что сначала хочет знать цену. Это верный переговорный инстинкт. Цена этой информации может быть больше чем она может заплатить на этой встрече, и у неё девяносто лет опыта знать когда ждать."]},
     hides:{en:["She recognized the raven and the material in the eyes — and knows where the cane came from, and what this means about Dante's relationship to the predecessor, and what the predecessor's role was in the mechanism's design. This is the most significant piece of information held by any character in the book at this point. She held it silently and smiled.","She has been waiting for this conversation for nineteen years. The conversation did not produce the information she was actually seeking — the purpose of the mechanism. She got a palliative, a political deal, and partial confirmation of what she already suspected about the seven nodes. She will have to return to the negotiation. She will schedule it for three months from now, when the compound's incomplete effect begins to become visible. That timing will be her leverage."],ru:["Она узнала ворона и материал в глазах — и знает откуда эта трость, и что это означает об отношениях Данте с предшественником, и какой была роль предшественника в проекте механизма. Это наиболее значимая информация, которой владеет какой-либо персонаж в книге на данный момент. Она удержала её молча и улыбнулась.","Она ждала этого разговора девятнадцать лет. Разговор не дал информации, которую она на самом деле искала — цели механизма. Она получила паллиатив, политическую сделку и частичное подтверждение того, что уже подозревала о семи узлах. Ей придётся вернуться к переговорам. Она запланирует это через три месяца, когда неполный эффект соединения начнёт становиться заметным. Это время будет её рычагом."]},
     whisper:{en:"She recognized the raven. She knows where the cane came from. She said nothing. She is waiting to know the price. She has been waiting for nineteen years — three more months costs her nothing.",ru:"Она узнала ворона. Она знает откуда эта трость. Она ничего не сказала. Она ждёт, чтобы узнать цену. Она ждала девятнадцать лет — ещё три месяца ей ничего не стоят."}
   }
 }

/* ─── SCENE 3: THE TASTE OF VICTORY ─── */
{id:"s3",
 title:{en:"The Taste of Victory",ru:"Вкус Победы"},
 subtitle:{en:"We've become the Empire's drug dealers. The raven's eye was wrong.",ru:"Мы стали дилерами Империи. Глаз ворона был не тот."},
 location:{en:"Carriage, Leaving the Estate",ru:"Карета, Выезд из Поместья"},
 timing:{en:"Evening, After the Meeting",ru:"Вечер, После Встречи"},
 flags:["resolution","foreshadowing","moral_pivot"],
 povData:{
   dante:{distortion:2,
     text:{
       en:`The political security package is structurally sound. Tax exemption by Crown warrant, Inquisition oversight suspended for Guild operations by Cardinal-class authority, and the archive access — specifically, the antediluvian diplomatic records sub-section, which I identified from her description as cross-referencing the Covenant Objects classification through a different institutional path than Morius's offer. I now have two routes to the same information. I will use neither until I have assessed which route is the less observed one.\n\nIsabella emerged from beneath the seat with, I noted, the data recorder she had not disclosed to me. I did not ask what data she had recorded. She did not explain. This is the arrangement, although neither of us has stated it.\n\nShe said the compound worked. I confirmed. We extracted the political protection we needed. The compound will sustain Valeria's stability for approximately one month, at which point she will require another dose. Monthly contact with an Imperial Court insider at the VIP client level — this is an intelligence asset of the first order, positioned inside the Imperial household, with ongoing access leverage built into the service structure. This is not a sale. It is a managed source.\n\nI said: we've become the Empire's drug dealers.\n\nIsabella asked: is that bad?\n\nI did not answer. I looked out the window at the night city.\n\nIn the carriage I reached for my cane and looked at the silver raven on the handle. The earring vibrated for 0.2 seconds. Not deception. Not Void-contact. The third category the earring has never produced before — and this time I held the raven's gaze long enough to verify: the material in the eyes is not in my reference set. It is not in any mineral or alchemical catalogue I have reviewed. It is close, in resonance signature, to the Sundering-site refined lead in the ship's log pages. Close but not identical — the same family of material, a different refinement.\n\nI looked up the armory intake record in my memory. The cane's donor entry: 'Predecessor, Auditor — personal effects, donated on departure.'\n\nMy predecessor carried this cane.\n\nI have been walking on my predecessor's cane for eleven hours.\n\nI put the question in the file I maintain of things I do not record and looked out the window.\n\nThe city was dark and bright simultaneously, the way cities are at night.\n\nWe are drug dealers and we are going home and the raven's eye is a material I cannot classify and I have been using my predecessor's cane and we hold Valeria's letters and we are one route to the archive away from the Covenant Objects sub-section.\n\nBusiness continues.\n\nI want tea. And for no one to try to kill me at least until dinner.`,
       ru:`Пакет политической безопасности структурно обоснован. Налоговое освобождение по королевскому ордеру, надзор Инквизиции приостановлен для операций Гильдии авторитетом уровня Кардинала, и доступ к архиву — конкретно, подраздел допотопных дипломатических записей, который я определил из её описания как перекрёстно индексированный с классификацией Объектов Завета через другой институциональный путь чем предложение Мориуса. Теперь у меня два маршрута к одной информации. Я не буду использовать ни один, пока не оценю, который маршрут менее наблюдаемый.\n\nИзабелла вылезла из-под сиденья с — я отметил — записывающим устройством, которое она мне не раскрыла. Я не спросил какие данные она записала. Она не объяснила. Такова договорённость, хотя ни один из нас её не заявлял.\n\nОна сказала что соединение сработало. Я подтвердил. Мы извлекли необходимую политическую защиту. Соединение будет поддерживать стабильность Валерии приблизительно месяц, после чего ей потребуется ещё одна доза. Ежемесячный контакт с инсайдером Имперского двора на уровне VIP-клиента — это разведывательный актив первого порядка, расположенный внутри Имперского двора, с продолжающимся доступным рычагом, встроенным в структуру обслуживания. Это не продажа. Это управляемый источник.\n\nЯ сказал: мы стали дилерами Империи.\n\nИзабелла спросила: это плохо?\n\nЯ не ответил. Я смотрел в окно на ночной город.\n\nВ карете я потянулся к трости и посмотрел на серебряного ворона на рукояти. Серьга вибрировала 0,2 секунды. Не обман. Не контакт Пустоты. Третья категория, которую серьга никогда прежде не производила — и на этот раз я удерживал взгляд ворона достаточно долго чтобы верифицировать: материал в глазах отсутствует в моём справочном наборе. Его нет ни в каком минеральном или алхимическом каталоге, который я просматривал. Он близок по резонансной сигнатуре к рафинированному свинцу с места Раскола в страницах судового журнала. Близок но не идентичен — то же семейство материала, другая очистка.\n\nЯ поднял запись о поступлении в оружейную в памяти. Запись дарителя трости: «Предшественник, Аудитор — личные вещи, переданы при отбытии».\n\nМой предшественник носил эту трость.\n\nЯ хожу с тростью моего предшественника одиннадцать часов.\n\nЯ поместил вопрос в файл, который веду с вещами, которые не записываю, и посмотрел в окно.\n\nГород был тёмным и ярким одновременно — так, как бывают города ночью.\n\nМы дилеры, и мы едем домой, и глаз ворона — материал, который я не могу классифицировать, и я хожу с тростью своего предшественника, и у нас есть письма Валерии, и мы в одном архивном маршруте от подраздела Объектов Завета.\n\nБизнес продолжается.\n\nЯ хочу чаю. И чтобы никто не пытался меня убить хотя бы до ужина.`
     },
     knows:{en:["He now has two independent routes to the Covenant Objects sub-section — Morius's Church archive and Valeria's Crown archive. He will use neither until he has assessed which is less observed.","The raven's eye material: same family as Sundering-site refined lead but different refinement — not in any catalogue. The earring produced the third never-before-seen category.","The armory intake record: 'Predecessor, Auditor — personal effects, donated on departure.' He has been using his predecessor's cane for eleven hours."],ru:["Теперь у него два независимых маршрута к подразделу Объектов Завета — церковный архив Мориуса и архив Короны Валерии. Он не будет использовать ни один, пока не оценит какой менее наблюдаемый.","Материал глаза ворона: то же семейство что рафинированный свинец с места Раскола, но другая очистка — ни в одном каталоге. Серьга произвела третью никогда прежде не виданную категорию.","Запись о поступлении в оружейную: «Предшественник, Аудитор — личные вещи, переданы при отбытии». Он ходит с тростью своего предшественника одиннадцать часов."]},
     misunderstands:{en:["He placed the raven-eye question in the file of things he does not record. This is the fourth item in that file: the seven-node truth, the sentence he cannot complete about the cages, the seventh-commodity hypothesis (visited three times), and now the cane. He has named this as a file. He has not noticed that naming it as a file gives the things inside it a shared container — and containers imply eventual opening.","Isabella asked 'is that bad?' He did not answer. He looked out the window. This is the first question in the book that he has not answered at all — not with deflection, not with a counter-frame, not with silence that contained an implied answer. He looked out the window. The city was dark and bright simultaneously. He named the contradiction and did not resolve it."],ru:["Он поместил вопрос о глазе ворона в файл вещей, которые не записывает. Это четвёртый пункт в этом файле: правда о семи узлах, предложение которое не может завершить о клетках, гипотеза о седьмом товаре (посещалась трижды), и теперь трость. Он назвал это файлом. Он не заметил что называние его файлом даёт вещам внутри общий контейнер — а контейнеры подразумевают в конечном счёте открытие.","Изабелла спросила «это плохо?» Он не ответил. Смотрел в окно. Это первый вопрос в книге, на который он не ответил совсем — ни уклонением, ни контрфреймом, ни молчанием, содержащим подразумеваемый ответ. Он смотрел в окно. Город был тёмным и ярким одновременно. Он назвал противоречие и не разрешил его."]},
     hides:{en:["He said 'business continues' and then immediately said 'I want tea and for no one to try to kill me until dinner.' These are not the same sentence. The first is the close of every arc in the book. The second is something he has not said before. He said both in the same breath. He has not examined the gap between them.","The armory intake data is in his memory. He checked it immediately. He placed the result in the file and did not spend another sentence on it. The predecessor designed the capsule for Sector 13. The predecessor signed the Pale Echelon document. The predecessor's name is the captain's name in the Amaranth's log. The predecessor carried the cane. The predecessor donated the cane to the Guild armory on departure. Dante has all of these facts. He has not assembled them in a consecutive sentence in any narration."],ru:["Он сказал «бизнес продолжается», а затем немедленно: «я хочу чаю и чтобы никто не пытался меня убить до ужина». Это не одно предложение. Первое — закрытие каждого арка в книге. Второе — то, чего он прежде не говорил. Он сказал оба в одном дыхании. Он не исследовал разрыв между ними.","Данные о поступлении в оружейную в его памяти. Он проверил немедленно. Поместил результат в файл и не потратил ещё одного предложения на него. Предшественник разработал капсулу для Сектора 13. Предшественник подписал документ Бледного Эшелона. Имя предшественника — имя капитана в журнале «Амаранта». Предшественник носил трость. Предшественник передал трость в оружейную Гильдии при отбытии. У Данте все эти факты. Он не собрал их в последовательное предложение ни в одном нарративе."]},
     whisper:{en:"Isabella asked 'is that bad?' He did not answer. He looked out the window. He has never not answered before. The city was dark and bright simultaneously. He named the contradiction. He did not resolve it.",ru:"Изабелла спросила «это плохо?» Он не ответил. Смотрел в окно. Он никогда прежде не оставлял вопрос без ответа. Город был тёмным и ярким одновременно. Он назвал противоречие. Не разрешил его."}
   }
 }
}

const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');const secs=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}];c.innerHTML=secs.map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
