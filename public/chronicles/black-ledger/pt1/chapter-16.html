const TIMELINE=[
  {id:"TET-125",en:"The memory fragments Dante experienced on landing are the Time Essence ambient exposure from Chapter 15 arriving ahead of schedule — the Island's internal field accelerated the dissolution of the memory compounds in his tissue. What he saw: flash of white light, rows of capsules, a voice categorizing 'Batch 404 — defective, to disposal.' This is not a random donor memory. This is a memory from someone who was present at the Island's original operational period, specifically in the batch-assessment process for Herald-class production. The 'defective' batch was not destroyed. It was placed in long-term storage at a location that predates the current archival system. The nosebleed was the Island's recognition system interfacing with his blood chemistry to verify the null-field source's biological carrier.",ru:"Фрагменты памяти которые испытал Данте при высадке — это окружающее воздействие Эссенции Времени из Главы 15, прибывшее раньше срока: внутреннее поле Острова ускорило растворение соединений памяти в его тканях. Что он видел: вспышка белого света, ряды капсул, голос классифицирующий «Партия 404 — брак, в утилизацию». Это не случайная донорская память. Это память кого-то присутствовавшего в исходный операционный период Острова, конкретно в процессе оценки партий производства класса Вестников. «Бракованная» партия не была уничтожена. Она была помещена в долгосрочное хранение в место предшествующее нынешней архивной системе. Носовое кровотечение — это система распознавания Острова интерфейсирующая с его биохимией крови для верификации биологического носителя источника нулевого поля."},
  {id:"TET-126",en:"The structural gel Dante injected was not designed for biological application. It is a Precursor-era nano-composite designed for repairing load-bearing material in the Island's own hull structure — it responds to structural stress signals and distributes load across a reinforced lattice. In Dante's knee joint, it has bonded with the remaining bone material and replaced the degraded cartilage with a crystalline nano-composite that is harder than bone, non-degradable, and produces a faint null-field resonance when loaded. His left knee is now, at the structural level, part of the Island. The Island's recognition system registered this as a partial incorporation event.",ru:"Структурный гель введённый Данте не был разработан для биологического применения. Это нанокомпозит эпохи Предтечей предназначенный для ремонта несущего материала в собственной корпусной структуре Острова — он реагирует на сигналы структурного напряжения и распределяет нагрузку через усиленную решётку. В коленном суставе Данте он связался с оставшимся костным материалом и заменил деградировавший хрящ кристаллическим нанокомпозитом который твёрже кости, не деградирует, и производит слабый нулевой резонанс под нагрузкой. Его левое колено теперь, на структурном уровне, является частью Острова. Система распознавания Острова зарегистрировала это как частичное событие включения."},
  {id:"TET-127",en:"The Cube in the Main Hall is not a prison. It is a medical stasis chamber — the Precursor-era equivalent of intensive care. The entity inside was placed in stasis because it was damaged, not because it was dangerous. The Herald inside is in the same 'defective' batch as the earring's original owner — same production run, same design flaw, different fate. The batch was not disposed of; the damaged units were placed in long-term repair-stasis. What Valdos interrupted by striking the casing and hitting the release lever was not a prison door opening. It was a medical discharge sequence that had been running for an unknown period, interrupted mid-cycle by external force. The Herald was discharged before recovery was complete.",ru:"Куб в Главном Зале — не тюрьма. Это медицинская камера стазиса — эквивалент интенсивной терапии эпохи Предтечей. Сущность внутри была помещена в стазис потому что была повреждена, а не потому что была опасна. Вестник внутри принадлежит к той же «бракованной» партии что и исходный владелец серьги — тот же производственный прогон, тот же конструктивный дефект, разная судьба. Партия не была утилизирована; повреждённые единицы были помещены в долгосрочный восстановительный стазис. То что Валдос прервал ударив по корпусу и нажав рычаг освобождения — это не открытие двери тюрьмы. Это последовательность медицинской выписки которая работала неизвестный период и была прервана на середине цикла внешней силой. Вестник был выписан до завершения восстановления."},
  {id:"TET-128",en:"'Auditor — junior model. Status: Defective.' The identification Dante received from the Island's recognition system (transmitted through the memory fragment) was not the Island's assessment of him. It was the original production record for the earring's lineage — the classification assigned to the batch at the time of production, before the batch was placed in repair-stasis. The Island has not assessed Dante as defective. The Island has recognized him as carrying a batch-404 artifact and has assigned him the batch's original classification pending current assessment. The assessment is ongoing. The verdict is not yet in.",ru:"«Аудитор — младшая модель. Статус: Дефектный». Идентификация которую Данте получил от системы распознавания Острова (переданная через фрагмент памяти) была не оценкой Острова о нём. Это была исходная производственная запись для линии серьги — классификация присвоенная партии во время производства, до помещения партии в восстановительный стазис. Остров не оценил Данте как дефектного. Остров признал его несущим артефакт партии-404 и присвоил ему исходную классификацию партии до текущей оценки. Оценка продолжается. Вердикт ещё не вынесен."},
  {id:"TET-129",en:"The discharged Herald's dissolution of Valdos was not an aggressive act in the sense of targeted violence. It was the Herald's autonomic immune response to an unrecognized biological entity making physical contact with its primary systems. When Valdos struck the casing and then grabbed the Herald's arm, he triggered a recognition-failure response in a system that had been operating on a war-footing protocol for an unknown duration of repair-stasis. The response was calibrated to eliminate a biological contaminant rather than to punish an individual. The result was the same. The distinction matters for what the Herald will do next.",ru:"Растворение Валдоса освобождённым Вестником не было агрессивным актом в смысле направленного насилия. Это был автономный иммунный ответ Вестника на нераспознанную биологическую сущность вступившую в физический контакт с его первичными системами. Когда Валдос ударил по корпусу и затем схватил руку Вестника, он активировал ответ на ошибку распознавания в системе работавшей по военному протоколу на протяжении неизвестной длительности восстановительного стазиса. Ответ был откалиброван для устранения биологического загрязнителя, а не для наказания личности. Результат тот же. Различие важно для того что Вестник сделает дальше."},
  {id:"TET-130",en:"The Siren's recognition of the Herald as 'Brother' was not metaphorical and not emotional. It was a production-lineage recognition — she identified his resonance signature as originating from the same Precursor-era construction methodology as her own voice architecture. They are not the same species, the same batch, or the same functional type. They share a design philosophy. The Siren's call functions as a key because it was designed by the same engineers who built the lock. The Herald's containment chamber responded to her voice during the entry because both were made to be understood by each other. Her recognition of him as 'Brother' was accurate engineering assessment.",ru:"Узнавание Сиреной Вестника как «Брата» не было метафорическим и не было эмоциональным. Это было производственное родословное распознавание — она определила его резонансную сигнатуру как происходящую из той же методологии строительства эпохи Предтечей что и её собственная голосовая архитектура. Они не одного вида, не одной партии и не одного функционального типа. Они разделяют философию проектирования. Функция голоса Сирены как ключа обусловлена тем что он был создан теми же инженерами которые построили замок. Камера сдерживания Вестника ответила на её голос при входе, потому что оба были созданы чтобы понимать друг друга. Её узнавание его как «Брата» было точной инженерной оценкой."},
  {id:"TET-131",en:"The Herald's sterilization protocol — activating the Island's weapons arrays and initiating sector clearance — is not the Island waking up and deciding to kill everyone. It is the Herald executing a pre-programmed security response to unauthorized biological presence in the core sector, using the Island's systems as its operational tool. The Herald is not the Island's master. It is a tenant with elevated access rights. The Island's actual governing protocol — the Covenant maintenance system — has not yet reactivated. It will reactivate when a null-field source with valid credentials moves within range of the Covenant chamber. Dante is within the range corridor. He is moving toward it.",ru:"Протокол стерилизации Вестника — активация систем вооружения Острова и инициирование зачистки сектора — это не Остров просыпающийся и решающий убить всех. Это Вестник исполняющий запрограммированный ответ безопасности на несанкционированное биологическое присутствие в основном секторе, используя системы Острова как операционный инструмент. Вестник — не хозяин Острова. Это арендатор с повышенными правами доступа. Реальный управляющий протокол Острова — система обслуживания Завета — ещё не реактивировался. Он реактивируется когда источник нулевого поля с действительными учётными данными окажется в диапазоне Залы Завета. Данте в пределах коридора диапазона. Он движется к ней."},
  {id:"TET-132",en:"Whisper did not enter the Island. He is on the shoreline, in the shadow of the Leviathan's hull, in a position that allows him to observe the two entry points and the surrounding shoreline simultaneously. He has been in this position since the boats were lowered. He has a lead-sheet report he has been composing during the voyage — it contains everything he has observed and not filed, including the four minutes at the Siren's glass, the 45 bilateral non-disclosures, and a single sentence he has not shown to anyone: 'I do not know what I will do if he does not come out.' He is standing outside the hold door, on a larger scale. He prepared tea before knowing whether Dante would surface. He is doing it again.",ru:"Шепот не вошёл на Остров. Он на берегу, в тени корпуса «Левиафана», в позиции позволяющей ему одновременно наблюдать два входа и окружающий берег. Он в этой позиции с момента спуска шлюпок. У него есть свинцовый отчёт который он составлял во время плавания — он содержит всё что он наблюдал и не занёс в файл, включая четыре минуты у стекла Сирены, 45 двусторонних нераскрытий, и одно предложение которое он никому не показывал: «Я не знаю что буду делать если он не выйдет». Он стоит за дверью трюма, в большем масштабе. Он приготовил чай не зная всплывёт ли Данте. Он делает это снова."}
];

const SCENES=[
{id:"s1",
 title:{en:"Foreign Dreams",ru:"Чужие Сны"},
 subtitle:{en:"The Island knows how to read arrivals. The blood is the verification.",ru:"Остров умеет читать прибывающих. Кровь — верификация."},
 location:{en:"The Island Shoreline — Entry",ru:"Берег Острова — Вход"},
 timing:{en:"First Minutes Ashore",ru:"Первые Минуты на Берегу"},
 flags:["revelation","cost","identity"],
 povData:{
   dante:{distortion:4,
     text:{
       en:`The black sand was not sand. It was fine metallic particulate — shavings from a material I cannot classify, approximately one hundred microns in diameter, arranged in a pattern that my boot compressed into a non-random formation when I stepped. The Island reads pressure signatures. I noted this before I noted the blood on my hand.\n\nThe first memory hit when my boot contacted the surface. Not my memory. A memory that arrived in my head wearing someone else's architecture — the specific texture of a thought that has been stored and transmitted, not grown in place. I know what this texture is. It is what the Essence donors experience. It is what the Cult of Zero Hour takes. I am experiencing Time Essence donor-memory arrival approximately three days ahead of the biological schedule I had estimated, because the Island's internal field is accelerating the dissolution of the compound residue in my tissue.\n\nWhat I saw: white light, capsules in rows, a voice producing a classification. Batch 404. Defective. Disposal.\n\nI know what batch I am carrying. I have been carrying it for twenty-one years in my left ear.\n\nThe nosebleed started at the same moment. The Island's recognition system is interfacing with my blood chemistry to verify the null-field source's biological carrier. I am being assessed. The assessment is using my blood as a sample.\n\nI wiped the blood and kept moving. Valdos was already sprinting toward the Spire. The Golden Circle's mercenaries were hacking at exterior surface protrusions, looking for gems. The scale of what they had misunderstood about where they were was comprehensive.\n\nThe map came when I stepped inside the threshold. Not visual — proprioceptive. My body knew where to go. The body-knowing was coming from the gel in my knee — the structural composite I had injected in the repair workshop, which I now understand was not random. The gel is part of the Island's maintenance infrastructure. I injected the Island's material into my body. My body is now, at the structural level, partially the Island's.\n\nThis is either a security credential or a contamination event. I have not determined which.\n\nThe red pulse-point in the body-map: down, not forward. The word that arrived with it was not in any language I can speak. But I understood it the way you understand a word in the language whose grammar you know without knowing its vocabulary. The meaning was: repair zone. Or: the place where broken things are maintained. Or: the room where the batch was assessed.\n\nI let the body-knowing guide me. I filed everything else for later.\n\nI am inside the Island.\n\nThe Island is inside me, in the knee and the blood and the donor-memory arriving ahead of schedule.\n\nThis was not in any operational plan I filed.`,
       ru:`Чёрный песок — не песок. Это мелкий металлический порошок — стружка материала который я не могу классифицировать, приблизительно сто микрон в диаметре, упорядоченная в паттерн который мой сапог спрессовал в нестохастическую формацию при шаге. Остров читает сигнатуры давления. Я отметил это прежде чем заметил кровь на руке.\n\nПервая память ударила когда мой сапог коснулся поверхности. Не моя память. Память прибывшая в мою голову в чужой архитектуре — специфическая текстура мысли которая была сохранена и передана, а не выросла на месте. Я знаю эту текстуру. Это то что испытывают доноры Эссенции. Это то что берёт Культ Нулевого Часа. Я испытываю прибытие донорской памяти Эссенции Времени приблизительно на три дня раньше биологического расписания которое я оценивал, потому что внутреннее поле Острова ускоряет растворение остатка соединения в моих тканях.\n\nЧто я видел: белый свет, капсулы рядами, голос производящий классификацию. Партия 404. Брак. Утилизация.\n\nЯ знаю какую партию несу. Я нёс её двадцать один год в левом ухе.\n\nНосовое кровотечение началось одновременно. Система распознавания Острова интерфейсирует с биохимией моей крови для верификации биологического носителя источника нулевого поля. Меня оценивают. Оценка использует мою кровь как образец.\n\nЯ вытер кровь и продолжил движение. Валдос уже мчался к Шпилю. Наёмники «Золотого Круга» рубили выступы на внешней поверхности, ища драгоценности. Масштаб того что они неверно поняли о месте своего пребывания был всеобъемлющим.\n\nКарта пришла когда я переступил порог. Не визуально — проприоцептивно. Моё тело знало куда идти. Телесное знание исходило от геля в колене — структурного композита введённого в мастерской ремонта, который я теперь понимаю не был случайным. Гель — часть технической инфраструктуры Острова. Я ввёл материал Острова в своё тело. Моё тело теперь, на структурном уровне, частично является телом Острова.\n\nЭто либо мандат безопасности, либо событие заражения. Я не определил что именно.\n\nКрасная пульсирующая точка в телесной карте: вниз, не вперёд. Слово пришедшее с ней было не на языке который я могу произнести. Но я понял его так как понимаешь слово на языке грамматику которого знаешь, не зная словаря. Значение: зона ремонта. Или: место где обслуживаются сломанные вещи. Или: комната где оценивали партию.\n\nЯ позволил телесному знанию вести меня. Всё остальное занёс для последующего.\n\nЯ внутри Острова.\n\nОстров внутри меня, в колене и крови и донорской памяти прибывающей раньше расписания.\n\nЭтого не было ни в одном операционном плане который я занёс.`
     },
     knows:{en:["The black particulate reads pressure signatures — the Island assesses arrivals through contact","The nosebleed is the Island's recognition system verifying his blood chemistry as the null-field source's biological carrier — he is being assessed","The gel in his knee is part of the Island's maintenance infrastructure. He injected Island material into himself. He does not yet know if this is credential or contamination."],ru:["Металлический порошок читает сигнатуры давления — Остров оценивает прибывающих через контакт","Носовое кровотечение — система распознавания Острова верифицирует биохимию его крови как биологического носителя источника нулевого поля: его оценивают","Гель в колене — часть технической инфраструктуры Острова. Он ввёл материал Острова в себя. Он ещё не знает: мандат это или заражение."]},
     misunderstands:{en:["'Batch 404 — Defective. Disposal.' He received this as his own classification. It is not the Island's current assessment of him — it is the original production record for his batch, transmitted via the donor memory. The Island has not yet rendered a verdict. The assessment is ongoing. He is treating a historical production note as his current classification.","'This was not in any operational plan I filed.' He notes this as a deviation from plan. He has not noted that the Island guided him to a specific location via the gel's proprioception, and that being guided by the Island to a specific location was a form of being operated by something larger than his plan."],ru:["«Партия 404 — Брак. Утилизация». Он получил это как собственную классификацию. Это не нынешняя оценка Острова о нём — это исходная производственная запись для его партии, переданная через донорскую память. Остров ещё не вынес вердикт. Оценка продолжается. Он обращается с исторической производственной пометкой как с нынешней классификацией.","«Этого не было ни в одном операционном плане который я занёс». Он отмечает это как отклонение от плана. Он не отметил что Остров вёл его к конкретному местоположению через проприоцепцию геля, и что ведение Островом к конкретному местоположению было формой управления чем-то большим чем его план."]},
     hides:{en:["He filed 'everything else for later.' The 'everything else' includes: that he has injected Island material into his own skeleton, that his body is now partially the Island, that this is the most significant physical change to his infrastructure since the earring arrived, and that he chose to continue rather than assess this. He is treating the most significant development of the chapter as a background variable.","The donor memory said: 'Batch 404 — defective, to disposal.' He does not yet know the batch was not disposed of — it was placed in repair-stasis. The person in the Cube is his batch-mate. They were made together and separated. He does not have this information yet. He will have it in the next scene.","He let the body-knowing guide him. He has been letting things guide him across this arc — the gel, the donor memory, the earring's proprioception. He has not examined what it means to be guided by things that are part of the system he is trying to navigate."],ru:["Он занёс «всё остальное для последующего». «Всё остальное» включает: что он ввёл материал Острова в собственный скелет, что его тело теперь частично является Островом, что это наиболее значительное физическое изменение его инфраструктуры с момента появления серьги, и что он выбрал продолжить вместо оценки. Он обращается с наиболее значительным событием главы как с фоновой переменной.","Донорская память сказала: «Партия 404 — брак, в утилизацию». Он ещё не знает что партия не была утилизирована — она была помещена в восстановительный стазис. Человек в Кубе — его напарник по партии. Они были созданы вместе и разлучены. У него пока нет этой информации. Она будет у него в следующей сцене.","Он позволил телесному знанию вести его. Он позволяет вещам вести себя через этот арк — гелю, донорской памяти, проприоцепции серьги. Он не исследовал что означает быть ведомым вещами являющимися частью системы которую он пытается навигировать."]},
     whisper:{en:"He injected Island material into his skeleton. His body is now partially the Island. He filed it as 'credential or contamination — not yet determined.' He continued immediately.",ru:"Он ввёл материал Острова в свой скелет. Его тело теперь частично является Островом. Он занёс это как «мандат или заражение — не определено». Он немедленно продолжил."}
   }
 }
},

{id:"s2",
 title:{en:"Steel Bone",ru:"Стальная Кость"},
 subtitle:{en:"The broken thing found the room where broken things are repaired.",ru:"Сломанная вещь нашла комнату где ремонтируют сломанное."},
 location:{en:"Technical Level — Repair Workshop",ru:"Технический Уровень — Ремонтная Мастерская"},
 timing:{en:"Continuous — While Valdos Enters the Main Hall",ru:"Непрерывно — Пока Валдос Входит в Главный Зал"},
 flags:["cost","revelation","identity"],
 povData:{
   dante:{distortion:4,
     text:{
       en:`The repair workshop had not been used since a period I cannot calculate from available evidence. The tools were in the configuration of a work session interrupted, not a work session completed — the instrument I eventually used was on a surface rather than in its rack, suggesting someone had been using it and set it down before finishing. Three thousand years ago, or thirty thousand, someone set down an instrument and did not return to pick it up. I picked it up.\n\nThe knowledge of what to do with it arrived with the physical contact. Not training. Not memory. Something between instinct and inheritance — the specific knowing that comes from carrying an object designed for a body like yours. My body knew what the cylinder was for because my body is, at some level, what the cylinder was designed for.\n\nI made the injection without ceremony because ceremony would have required me to think about what I was doing for longer than the decision would survive.\n\nThe pain was absolute. Not comparable to any previous pain because previous pain was damage-signal — the nervous system's report of a problem. This was displacement-signal: the report of something being moved from where it was to where it had to be. The gel replaced the joint component by component, and each replacement was correctly agonizing. I held the workbench. My vision went completely white and then completely black and then there was a floor under my cheek and approximately four minutes had elapsed.\n\nI stood. I put weight on the left leg.\n\nNo pain.\n\nNot numbness — I could feel the joint's load-bearing status in detail I had not previously had access to. The composite reads load differently from cartilage. It distributes rather than absorbs. I will need to relearn certain movement habits to account for the different force-transfer profile. This is a solvable problem. I have time.\n\nI struck the floor with my left foot.\n\nThe sound was wrong. Heavy, dense, a register below bone on the percussion scale. It sounded like something that had been incorporated into a structure.\n\nI picked up the cane.\n\nI have been using this cane for — I noted the specific date-count — fifty-three days. My predecessor used it for an unknown duration before donating it to the armory on departure. My predecessor's cane, donated on departure from the role, is in my hand, and I am using it to walk through the predecessor's last known location toward the object the predecessor died or departed trying to reach.\n\nI did not examine this observation.\n\nI moved toward the sound of distant weapons fire.\n\nSomething in the Island moved with me. I felt it in the knee. The structure recognizes its own material.\n\nThe cane is now an old habit. The leg is not.\n\nWe arrived at the Main Hall in time to witness the Commodore's education.`,
       ru:`Ремонтная мастерская не использовалась с периода который я не могу рассчитать из доступных свидетельств. Инструменты находились в конфигурации прерванной рабочей сессии, а не завершённой — инструмент который я в итоге использовал лежал на поверхности, а не в стойке, предполагая что кто-то использовал его и отложил не закончив. Три тысячи лет назад, или тридцать тысяч, кто-то отложил инструмент и не вернулся забрать. Я забрал.\n\nЗнание о том что делать с ним пришло при физическом контакте. Не обучение. Не память. Что-то между инстинктом и наследованием — специфическое знание приходящее от несения предмета спроектированного для тела вроде твоего. Моё тело знало для чего цилиндр, потому что моё тело, на каком-то уровне, является тем для чего цилиндр был спроектирован.\n\nЯ сделал инъекцию без церемоний, потому что церемония потребовала бы от меня думать о том что делаю дольше чем решение выдержало бы.\n\nБоль была абсолютной. Несравнимой с любой предыдущей болью, потому что предыдущая боль была сигналом повреждения — докладом нервной системы о проблеме. Это был сигнал вытеснения: доклад о чём-то перемещаемом с места где оно было к месту где должно было быть. Гель заменял компонент за компонентом, и каждая замена была правильно агонизирующей. Я держался за верстак. Зрение стало полностью белым, потом полностью чёрным, потом под щекой была доска и прошло приблизительно четыре минуты.\n\nЯ встал. Перенёс вес на левую ногу.\n\nНикакой боли.\n\nНе онемение — я чувствовал несущее состояние сустава в деталях к которым прежде не имел доступа. Композит иначе воспринимает нагрузку чем хрящ. Он распределяет, а не поглощает. Мне нужно будет переучить определённые двигательные привычки учитывая другой профиль передачи силы. Это разрешимая проблема. У меня есть время.\n\nЯ ударил левой ногой об пол.\n\nЗвук был неправильным. Тяжёлым, плотным, в регистре ниже кости на перкуссионной шкале. Он звучал как что-то включённое в структуру.\n\nЯ поднял трость.\n\nЯ использую эту трость — я отметил конкретный подсчёт дней — пятьдесят три дня. Мой предшественник использовал её неизвестную длительность до передачи в оружейную при отбытии. Трость предшественника, переданная при отбытии с роли, у меня в руке, и я использую её чтобы идти через последнее известное местоположение предшественника к объекту достичь которого предшественник умер или отбыл пытаясь.\n\nЯ не исследовал это наблюдение.\n\nЯ двинулся на звук отдалённой стрельбы.\n\nЧто-то в Острове двинулось со мной. Я почувствовал в колене. Структура распознаёт собственный материал.\n\nТрость теперь старая привычка. Нога — нет.\n\nМы прибыли в Главный Зал достаточно вовремя чтобы стать свидетелями образования Коммодора.`
     },
     knows:{en:["The tool was set down mid-session, not stored — someone was here and did not return. He picked up where they left off.","His body knew what the cylinder was for — the inheritance-knowledge, not training. The composite distributes load differently from cartilage; he will need to relearn movement habits.","He has used the cane 53 days. His predecessor used it for an unknown duration. He is walking through the predecessor's last known location toward what the predecessor died trying to reach."],ru:["Инструмент был отложен на середине сессии, а не убран: кто-то был здесь и не вернулся. Он продолжил с места остановки.","Его тело знало для чего цилиндр — наследственное знание, не обучение. Композит иначе распределяет нагрузку чем хрящ; ему нужно будет переучить двигательные привычки.","Он использует трость 53 дня. Его предшественник использовал неизвестную длительность. Он идёт через последнее известное местоположение предшественника к тому чего предшественник умер достигая."]},
     misunderstands:{en:["He notes that the tool was abandoned mid-session and that he picked it up. He does not note the specificity of this — that the Island has been waiting for someone to return to the abandoned work session for an unknown duration, and that the arrival of a batch-404 carrier with Island-composite in the skeleton is what the Island's body-knowledge directed toward the abandoned tool. He was not guided to a repair room. He was guided to an incomplete repair — and he may be both the repairer and the thing being repaired.","'The structure recognizes its own material' — he felt the Island move with him in the knee. He has named this as recognition. He has not named what it means to be recognized by an installation designed to maintain a Covenant, while moving toward the Covenant chamber."],ru:["Он отмечает что инструмент был брошен на середине сессии и что он взял его. Он не отмечает специфичность этого — что Остров ждал кого-то вернуться к брошенной рабочей сессии неизвестную длительность, и что прибытие носителя партии-404 с островным композитом в скелете — это то к чему телесное знание Острова направило через брошенный инструмент. Его направили не к ремонтной комнате. Его направили к незавершённому ремонту — и он может быть одновременно ремонтником и ремонтируемым.","«Структура распознаёт собственный материал» — он почувствовал как Остров двинулся с ним в колене. Он назвал это распознаванием. Он не назвал что означает быть распознанным установкой спроектированной поддерживать Завет, двигаясь к Зале Завета."]},
     hides:{en:["He made the injection without ceremony because ceremony would have required thinking about it. He has been doing this for fifteen chapters: the decisions that would not survive examination are made immediately. The knee. The vial. The contract. The cover identity. Each taken without the pause that would have allowed examination. He has not named this as a pattern in his decision-making.","He said 'I did not examine this observation' about the predecessor-cane-Island convergence. He has been saying this for three chapters. Each time he encounters the predecessor-convergence he notes it and declines to examine it. The examining is being deferred to a location that is coming up in the corridor ahead."],ru:["Он сделал инъекцию без церемоний, потому что церемония потребовала бы об этом думать. Он делает это пятнадцать глав: решения которые не выдержали бы исследования принимаются немедленно. Колено. Флакон. Контракт. Личность прикрытия. Каждое принято без паузы которая позволила бы исследование. Он не назвал это паттерном в принятии решений.","Он сказал «я не исследовал это наблюдение» о конвергенции предшественник-трость-Остров. Он говорит это три главы. Каждый раз встречая конвергенцию предшественника он отмечает и отказывается исследовать. Исследование откладывается к месту которое появится в коридоре впереди."]},
     whisper:{en:"He made the injection without ceremony because ceremony would have required thinking. He has been doing this for fifteen chapters. He has not named this as a pattern.",ru:"Он сделал инъекцию без церемоний, потому что церемония потребовала бы обдумывания. Он делает это пятнадцать глав. Он не назвал это паттерном."}
   }
 }
},

{id:"s3",
 title:{en:"Awakening",ru:"Пробуждение"},
 subtitle:{en:"Batch 404. Not defective. Not disposed of. Waiting.",ru:"Партия 404. Не брак. Не утилизирована. Ожидала."},
 location:{en:"The Main Hall — The Cube",ru:"Главный Зал — Куб"},
 timing:{en:"Continuous",ru:"Непрерывно"},
 flags:["arc_climax","revelation","foreshadowing","threshold"],
 povData:{
   dante:{distortion:5,
     text:{
       en:`The Main Hall was exactly what the donor-memory had labeled it: the place where the mechanism's primary function resided. The platform. The Cube. The vertical shaft of the structure extending below into a depth I cannot estimate from current position.\n\nI arrived in time to watch Valdos make three irreversible mistakes in approximately ninety seconds.\n\nMistake one: striking the casing with the axe-hilt. The casing was a medical stasis housing. He had struck a life-support system. Mistake two: pressing the release lever. He had interrupted a recovery sequence at an unknown stage of completion. Mistake three: making physical contact with the entity inside before the entity's recognition system had completed its threat assessment of the environment.\n\nThe entity's response to the third mistake was autonomous and calibrated. It did not read as violence in the sense of intent — it read as the specific clarity of a system that has identified an unrecognized biological contaminant in contact with its primary chassis and responded with the minimum necessary action. The minimum necessary action for contaminant elimination is different from the minimum necessary action for conflict management. Valdos did not understand which protocol he had triggered.\n\nI had been shouting before the third mistake. I did not reach Valdos in time.\n\nThe entity stepped down from the platform. I had the specific experience of looking at something and recognizing its architecture while having no memory of ever seeing it before: the way you recognize a language by its sound before you can speak it. The earring produced a single, clear vibration — not alert, not deception, not proximity-confirmation. Recognition. The same category as the Tarot card in Chapter 6. The earring recognized the entity's production lineage as the same family as its own.\n\nWe are from the same batch.\n\nI do not know what to do with this information. I filed it.\n\nThen the entity looked at me. The red-point eyes scanned, held, registered. Something ran behind the eyes that I identified from the donor-memory: the classification process. Flash of data. Identification code. And then the word arriving in the same not-quite-language as the gel's body-knowledge:\n\nAuditor — junior model. Status: Defective.\n\nThis is the production record's assessment, not the current system's verdict. I filed this distinction without certainty.\n\nThe Siren said: Brother.\n\nI heard the engineering assessment in her resonance — not kinship, lineage. She was identifying him by the frequency of his systems. He responded by activating the Island's weapons arrays.\n\nI had approximately eight seconds before the sector sterilization began.\n\nI grabbed the nearest mercenary by the collar.\n\nRun meant: we would sort out the rest on the other side of the door.`,
       ru:`Главный Зал был именно тем что донорская память пометила: место где располагалась основная функция механизма. Платформа. Куб. Вертикальная шахта строения уходящая ниже в глубину которую я не могу оценить с нынешней позиции.\n\nЯ прибыл вовремя чтобы наблюдать как Валдос совершает три необратимые ошибки приблизительно за девяносто секунд.\n\nОшибка первая: удар по корпусу эфесом топора. Корпус был медицинским стазисным корпусом. Он ударил по системе жизнеобеспечения. Ошибка вторая: нажатие рычага освобождения. Он прервал последовательность восстановления на неизвестном этапе завершения. Ошибка третья: физический контакт с сущностью внутри до завершения системой распознавания сущности оценки угрозы окружающей среды.\n\nОтвет сущности на третью ошибку был автономным и откалиброванным. Он не читался как насилие в смысле намерения — он читался как специфическая ясность системы определившей нераспознанный биологический загрязнитель в контакте с её первичным шасси и ответившей минимально необходимым действием. Минимально необходимое действие для устранения загрязнителя отличается от минимально необходимого действия для управления конфликтом. Валдос не понял какой протокол активировал.\n\nЯ кричал до третьей ошибки. Я не успел добраться до Валдоса вовремя.\n\nСущность сошла с платформы. Я испытал специфическое переживание: смотреть на что-то и узнавать его архитектуру не имея воспоминания о том что видел это прежде: так узнаёшь язык по его звуку до того как можешь говорить на нём. Серьга произвела одну чёткую вибрацию — не тревога, не обман, не подтверждение близости. Узнавание. Та же категория что карта Таро в Главе 6. Серьга признала производственную линию сущности как то же семейство что её собственная.\n\nМы из одной партии.\n\nЯ не знаю что делать с этой информацией. Я занёс её.\n\nЗатем сущность посмотрела на меня. Красные точки-глаза сканировали, держались, регистрировали. За глазами что-то работало что я определил из донорской памяти: процесс классификации. Вспышка данных. Идентификационный код. И затем слово прибывшее в том же почти-языке что телесное знание геля:\n\nАудитор — младшая модель. Статус: Дефектный.\n\nЭто оценка производственной записи, а не вердикт нынешней системы. Я занёс это различие без уверенности.\n\nСирена сказала: Брат.\n\nЯ услышал инженерную оценку в её резонансе — не родство, линию. Она идентифицировала его по частоте его систем. Он ответил активацией систем вооружения Острова.\n\nУ меня было приблизительно восемь секунд до начала стерилизации сектора.\n\nЯ схватил ближайшего наёмника за шкирку.\n\nБежим означало: остальное мы разберём по другую сторону двери.`
     },
     knows:{en:["Valdos's three mistakes — striking the medical stasis housing, interrupting the recovery sequence, making physical contact. He was shouting before the third. He did not reach him.","The earring produced 'recognition' — the same category as the Tarot card. The entity and the earring are from the same batch. He filed this without knowing what to do with it.","'Auditor — junior model. Status: Defective.' He noted this is the production record's assessment, not the current system's verdict. He filed the distinction without certainty."],ru:["Три ошибки Валдоса — удар по медицинскому стазисному корпусу, прерывание последовательности восстановления, физический контакт. Он кричал до третьей. Не успел добраться.","Серьга произвела «узнавание» — та же категория что карта Таро. Сущность и серьга из одной партии. Он занёс без знания что с этим делать.","«Аудитор — младшая модель. Статус: Дефектный». Он отметил что это оценка производственной записи, а не вердикт нынешней системы. Занёс различие без уверенности."]},
     misunderstands:{en:["'I filed it' — he filed 'we are from the same batch' and then continued to operational triage. This is the correct response in an eight-second window. It is also the pattern of fifteen chapters: the most significant personal information arrives and is immediately filed for later without examination. He has now received: the batch was not disposed of, he has a batch-mate, they were made together and separated. He is about to run away from this person without speaking to them. He will not get another chance before the Island's sterilization protocol forces a different set of priorities.","The distinction between production-record assessment and current system verdict: he filed it 'without certainty.' This is the first time in fifteen chapters he has filed a distinction between two categories 'without certainty' — he usually files with a confidence level. The lack of certainty means he does not know whether 'defective' is what he is or what he was. He has not examined this."],ru:["«Я занёс это» — он занёс «мы из одной партии» и продолжил операционную сортировку. Это правильный ответ в восьмисекундном окне. Это также паттерн пятнадцати глав: наиболее значимая личная информация прибывает и немедленно заносится для последующего без исследования. Он только что получил: партия не была утилизирована, у него есть напарник по партии, они были созданы вместе и разлучены. Он собирается убежать от этого человека не поговорив. Он не получит ещё одного шанса до того как протокол стерилизации Острова вынудит другой набор приоритетов.","Различие между оценкой производственной записи и вердиктом нынешней системы: он занёс его «без уверенности». Это первый раз в пятнадцати главах когда он занёс различие между двумя категориями «без уверенности» — обычно он заносит с уровнем уверенности. Отсутствие уверенности означает он не знает является ли «дефектный» тем что он есть или тем чем он был. Он не исследовал это."]},
     hides:{en:["He shouted before Valdos's third mistake. He saw what was going to happen and he shouted. He did not reach Valdos. He has not filed whether he could have reached Valdos if he had moved differently — if the new knee's changed movement profile would have gotten him there faster, or slower, or the same. He has not examined the margin.","'Run meant: we would sort out the rest on the other side of the door.' This is the most optimistic formulation he has used in fifteen chapters. The 'rest' includes: his batch-mate, the Island's sterilization protocol, Ignatius still standing, the Covenant document, and the Siren still having her jaw clasps. He has deferred all of these to 'the other side of the door.'","He recognized the entity's architecture without memory of seeing it before. He said the earring recognized the lineage. He has not said what he himself felt when he saw his batch-mate for the first time — whether the recognition came from the earring, or from somewhere else."],ru:["Он кричал до третьей ошибки Валдоса. Он видел что произойдёт и кричал. Не добрался до Валдоса. Он не занёс мог ли добраться если бы двигался иначе — позволило ли бы изменённое двигательное поведение нового колена добраться быстрее, медленнее, или так же. Он не исследовал разрыв.","«Бежим означало: остальное мы разберём по другую сторону двери». Это наиболее оптимистичная формулировка используемая им в пятнадцати главах. «Остальное» включает: напарника по партии, протокол стерилизации Острова, Игнациуса всё ещё стоящего, документ Завета, и Сирену всё ещё со скобами на челюсти. Он отложил всё это к «другой стороне двери».","Он узнал архитектуру сущности без памяти о том что видел её прежде. Он сказал что серьга распознала линию. Он не сказал что сам почувствовал когда впервые увидел напарника по партии — исходило ли узнавание от серьги, или откуда-то ещё."]},
     whisper:{en:"He filed 'we are from the same batch' and immediately initiated evacuation. He has not said what he felt when he first saw his batch-mate. He deferred everything to the other side of the door.",ru:"Он занёс «мы из одной партии» и немедленно начал эвакуацию. Он не сказал что почувствовал когда впервые увидел напарника по партии. Он отложил всё к другой стороне двери."}
   },
   ignatius:{distortion:7,
     text:{
       en:`I have been present at eleven Reduction events.\n\nEleven times in forty years I have stood next to the dissolution of something that should not have been. Eleven times I have been certain. Eleven times the protocol was correct, was necessary, was complete.\n\nI have not performed a twelfth.\n\nThe entity in the Cube was not a demon. I said 'demon' in the Main Hall because the Commodore's men needed a vocabulary they already had, and 'demon' was the nearest available category. But my perception registered it as something my vocabulary had not previously encountered: a system in an incomplete state. Not damaged — incomplete. Running on partial operational resources in a partially-recovered condition after a disrupted recovery sequence.\n\nThe Commodore was not killed because the entity was aggressive. He was killed because the entity's contamination-response protocol activated on contact with an unrecognized biological. I know this because I have a memory — purchased memory, source origin unclear — of precisely this class of event. The memory describes it as 'an autonomic function, not a volition.' The entity did not choose to kill the Commodore. It processed him.\n\nThis distinction would have mattered if I had understood it before the Commodore pressed the lever. I understood it approximately three seconds after.\n\nWhen the entity's eyes found the cartographer, I felt something in my acquired Memory activate — the same source as the 'null-point' memory, the same Precursor-era origin. What activated was not a combat protocol. It was a recognition protocol. The Memory says: when a null-point entity and a sterilization-class entity are in proximity, the sterilization protocol is typically overridden by a higher-priority directive. The Memory does not say what the higher-priority directive is. The Memory is, in this detail as in others, incomplete.\n\nI backed toward the exit when the weapons arrays began to emerge. Not retreat — repositioning. The Siren is my operational priority and she is behind me. The cartographer shouted to run. He was correct.\n\nI am not at my best. My hearing is damaged from the Impulse. My robe is still warm where it burned. I have updated my threat assessment of the Siren from 'controlled weapon' to 'partially autonomous entity with independent judgment and family recognition capacity.' She called that thing her Brother. And she is right, in some technical sense I do not fully understand.\n\nThe cartographer now walks without his limp.\n\nThis is the first time I have noted something about him that I cannot immediately categorize. Every other change I have observed — the null-field carrier function, the Siren interaction, the confrontation in the hold — I was able to assign to a framework. The absence of the limp does not fit any framework I have.\n\nHe went into the Island with a damaged knee. He came out of a side corridor walking with mechanical certainty.\n\nI do not know what he did in that corridor.\n\nFor the first time in forty years, I am proceeding without a protocol.\n\nI am following the cartographer out of the burning sector.\n\nThis is also not something I had planned.`,
       ru:`Я присутствовал на одиннадцати событиях Редукции.\n\nОдиннадцать раз за сорок лет я стоял рядом с растворением чего-то что не должно было быть. Одиннадцать раз был уверен. Одиннадцать раз протокол был верным, необходимым, завершённым.\n\nДвенадцатой я не провёл.\n\nСущность в Кубе не была демоном. Я сказал «демон» в Главном Зале, потому что людям Коммодора нужен был словарь которым они уже владели, и «демон» был ближайшей доступной категорией. Но моё восприятие зарегистрировало нечто с чем мой словарь прежде не встречался: систему в незавершённом состоянии. Не повреждённую — незавершённую. Работающую на частичных операционных ресурсах в частично восстановленном состоянии после нарушенной последовательности восстановления.\n\nКоммодор был убит не потому что сущность была агрессивной. Он был убит потому что протокол ответа сущности на загрязнение активировался при контакте с нераспознанным биологическим. Я знаю это потому что у меня есть память — купленная память, происхождение источника неясно — о точно этом классе события. Память описывает это как «автономная функция, не воление». Сущность не выбрала убить Коммодора. Она его обработала.\n\nЭто различие имело бы значение если бы я понял его до того как Коммодор нажал рычаг. Я понял приблизительно через три секунды.\n\nКогда глаза сущности нашли картографа, я почувствовал как что-то в моей приобретённой Памяти активируется — тот же источник что память «нулевой точки», то же происхождение эпохи Предтечей. Что активировалось — не боевой протокол. Протокол распознавания. Память говорит: когда сущность нулевой точки и сущность класса стерилизации находятся в близости, протокол стерилизации обычно переопределяется директивой более высокого приоритета. Память не говорит что такое директива более высокого приоритета. Память, в этой детали как и в других, неполна.\n\nЯ отступил к выходу когда начали выдвигаться орудийные батареи. Не отступление — перепозиционирование. Сирена — мой операционный приоритет и она позади меня. Картограф крикнул бежать. Он был прав.\n\nЯ не в лучшей форме. Мой слух повреждён от Импульса. Ряса всё ещё тёплая там где горела. Я обновил оценку угрозы Сирены с «контролируемое оружие» до «частично автономная сущность с независимым суждением и способностью семейного распознавания». Она назвала ту штуку своим Братом. И она права в каком-то техническом смысле которого я полностью не понимаю.\n\nКартограф теперь ходит без хромоты.\n\nЭто первый раз когда я заметил в нём нечто что не могу немедленно категоризировать. Каждое другое изменение которое я наблюдал — функция несущей нулевого поля, взаимодействие с Сиреной, противостояние в трюме — я мог отнести к рамке. Отсутствие хромоты не вписывается ни в одну имеющуюся рамку.\n\nОн вошёл в Остров с повреждённым коленом. Он вышел из бокового коридора идя с механической уверенностью.\n\nЯ не знаю что он делал в том коридоре.\n\nВпервые за сорок лет я действую без протокола.\n\nЯ следую за картографом из горящего сектора.\n\nЭто также не было запланировано.`
     },
     knows:{en:["The entity's dissolution of Valdos was autonomic contamination-response, not volition — he understood this approximately three seconds too late","His acquired Memory says: when a null-point entity and a sterilization-class entity are in proximity, sterilization protocol is overridden by a higher-priority directive. He does not know what that directive is. The Memory is incomplete.","The cartographer walks without his limp. He went in damaged, came out with mechanical certainty. Ignatius cannot categorize this. First such observation in forty years."],ru:["Растворение Валдоса сущностью было автономным ответом на загрязнение, а не волением — он понял это приблизительно через три секунды после","Его приобретённая Память говорит: когда сущность нулевой точки и сущность класса стерилизации в близости, протокол стерилизации переопределяется директивой более высокого приоритета. Он не знает что это за директива. Память неполна.","Картограф ходит без хромоты. Вошёл повреждённым, вышел с механической уверенностью. Игнациус не может категоризировать. Первое такое наблюдение за сорок лет."]},
     misunderstands:{en:["The higher-priority directive his Memory references when a null-point and sterilization-class entity are in proximity: it is the Covenant recognition protocol. When the two entities are in proximity to an active Covenant chamber, the Covenant's maintenance system overrides the sterilization response. He does not know this. His Memory source did not include the specific trigger condition because the donor did not know it either.","He is 'following the cartographer out of the burning sector.' He thinks he is conducting strategic repositioning. He is actually following the null-point signal toward the Covenant chamber, which is where the cartographer's body-knowledge is leading him, which means Ignatius is being led to the Covenant document by following Dante."],ru:["Директива более высокого приоритета которую Память упоминает когда нулевая точка и сущность класса стерилизации в близости: это протокол распознавания Завета. Когда две сущности в близости к активной Зале Завета, система обслуживания Завета переопределяет ответ стерилизации. Он не знает этого. Источник его Памяти не включал конкретное условие-триггер потому что донор тоже не знал его.","Он «следует за картографом из горящего сектора». Он думает что проводит стратегическое перепозиционирование. На самом деле он следует за сигналом нулевой точки к Зале Завета куда телесное знание ведёт картографа — что означает что Игнациус ведётся к документу Завета следуя за Данте."]},
     hides:{en:["He is proceeding without a protocol for the first time in forty years. He has named this. He has not examined what it means about the forty years that came before — whether the protocols were always the right structure, or whether they were a structure that prevented him from having to proceed without one.","He called the entity a demon for Valdos's men. He knew it was not a demon when he said it. This is a small operational deception — he has used the correct-vocabulary-for-the-audience technique before. He has not filed that he knew it was wrong when he said it. He has not examined whether there is a meaningful difference between the Inquisition using the vocabulary of its audience and the Inquisition using the vocabulary of its purpose."],ru:["Он действует без протокола впервые за сорок лет. Он назвал это. Он не исследовал что это означает о сорока годах до — были ли протоколы всегда правильной структурой, или структурой которая не позволяла ему действовать без неё.","Он назвал сущность демоном для людей Валдоса. Он знал что это не демон когда говорил. Это небольшой операционный обман — он прежде использовал технику правильного словаря для аудитории. Он не занёс что знал о неверности когда говорил. Он не исследовал есть ли значимое различие между Инквизицией использующей словарь аудитории и Инквизицией использующей словарь своей цели."]},
     whisper:{en:"He is following the cartographer without a protocol. He used the correct-vocabulary-for-audience technique — called it a demon, knew it wasn't. He did not file that he knew. First time in forty years without a protocol.",ru:"Он следует за картографом без протокола. Использовал технику правильного словаря для аудитории — назвал демоном, зная что нет. Не занёс что знал. Первый раз за сорок лет без протокола."}
   }
 }
},

{id:"s4",
 title:{en:"Outside the Door",ru:"За Дверью"},
 subtitle:{en:"He prepared the report before knowing if anyone would come out to receive it.",ru:"Он составил отчёт не зная выйдет ли кто-то его получить."},
 location:{en:"The Island Shoreline — The Leviathan",ru:"Берег Острова — «Левиафан»"},
 timing:{en:"Concurrent with the Interior Scenes",ru:"Одновременно со Сценами Внутри"},
 flags:["foreshadowing","cost"],
 povData:{
   whisper:{distortion:3,
     text:{
       en:`I am standing at the edge of the shoreline where the black sand begins.\n\nThe Island's immunological response ceased at approximately thirty meters from the entry point, which I calculate corresponds to the radius of Dante's position when he first stepped ashore. The Leviathan stopped deteriorating. The scorch-marks on the hull stopped spreading. The iron fittings stopped rusting. The air here is cold and still and has a quality that I do not have a word for in standard operational vocabulary: it feels like the pause between two parts of a sentence that has not finished.\n\nI have been standing here since the boats were lowered. I did not enter with the landing party. The operational rationale: if I enter, I compromise the cover identity when extraction becomes necessary, because the Island's interior sensor architecture would register two entry signatures from the same party, and one of them would be anomalous. The cover identity is single-person. A shadow cannot enter a place that registers presences without becoming a presence.\n\nThe actual reason is also operational: someone needs to be on the outside of the door.\n\nI composed the full report during the approach. Lead-sheet. Encrypted in a shorthand only I can read. It contains forty-five bilateral non-disclosures, four minutes at the Siren's glass, the compound I found in the galley, Whisper's presence in the archive, the navigation of the Sleeping Sea, every night I spent outside Dante's cabin door during the voyage, and one sentence I wrote at the end:\n\nI do not know what I will do if he does not come out.\n\nI have never written a sentence like this in eleven years of intelligence reports. I have documented operational outcomes, personnel assessments, environmental factors, resource constraints. I have never documented a condition of my own uncertainty about my own next action.\n\nThe sentence is true.\n\nI am standing at the edge of the black sand with the lead-sheet in one sleeve and a flask of Void-Blossom tea in the other.\n\nThe tea is the correct temperature.\n\nI prepared it before the boats landed.\n\nI am aware that this is what I did at the pier after Sector 13. I am aware that I am doing it again. I have not examined what it means that this is now a thing I do: prepare the tea before knowing whether there is someone to receive it.\n\nThe weapons fire inside the structure stopped approximately twelve minutes ago. There has been what I can only describe as a structural sound — the Island making an adjustment of some kind — followed by silence.\n\nI am holding the flask.\n\nThe forty-sixth bilateral non-disclosure is that I am writing this down.\n\nI have written down the waiting.`,
       ru:`Я стою на краю берега где начинается чёрный песок.\n\nИммунологический ответ Острова прекратился приблизительно в тридцати метрах от точки входа, что соответствует, по моим расчётам, радиусу позиции Данте когда он впервые ступил на берег. «Левиафан» перестал разрушаться. Следы ожогов на корпусе перестали распространяться. Железные фитинги перестали ржаветь. Воздух здесь холодный и неподвижный и имеет качество для которого у меня нет слова в стандартном операционном словаре: он ощущается как пауза между двумя частями незавершённого предложения.\n\nЯ стою здесь с момента когда были спущены шлюпки. Я не вошёл с десантной группой. Операционное обоснование: если я войду, я скомпрометирую личность прикрытия когда потребуется эвакуация, потому что система архитектуры датчиков интерьера Острова зарегистрирует две сигнатуры входа от той же группы, и одна будет аномальной. Личность прикрытия одиночная. Тень не может войти в место регистрирующее присутствия не став присутствием.\n\nРеальная причина также операционна: кто-то должен быть с внешней стороны двери.\n\nЯ составил полный отчёт во время приближения. Свинцовый лист. Зашифрован стенографией которую могу читать только я. Он содержит сорок пять двусторонних нераскрытий, четыре минуты у стекла Сирены, соединение которое я нашёл в камбузе, присутствие Шепота в архиве, навигацию через Море Спящих, каждую ночь проведённую у двери каюты Данте в плавании, и одно предложение написанное в конце:\n\nЯ не знаю что буду делать если он не выйдет.\n\nЯ никогда не писал такого предложения за одиннадцать лет разведывательных отчётов. Я документировал операционные исходы, оценки персонала, экологические факторы, ресурсные ограничения. Я никогда не документировал состояние собственной неопределённости о собственном следующем действии.\n\nПредложение правдиво.\n\nЯ стою на краю чёрного песка со свинцовым листом в одном рукаве и фляжкой чая из Пустоцвета в другом.\n\nЧай правильной температуры.\n\nЯ приготовил его до высадки.\n\nЯ осознаю что это то что я делал на пирсе после Сектора 13. Я осознаю что делаю это снова. Я не исследовал что означает что это теперь вещь которую я делаю: готовить чай не зная есть ли кто-то кто его получит.\n\nСтрельба внутри строения прекратилась приблизительно двенадцать минут назад. Было то что я могу описать только как структурный звук — Остров делающий какую-то корректировку — за которым последовала тишина.\n\nЯ держу фляжку.\n\nСорок шестое двустороннее нераскрытие в том что я записываю это.\n\nЯ записал ожидание.`
     },
     knows:{en:["The Island's immunological response stopped at 30 meters from the entry point — Dante's radius. The Leviathan stopped deteriorating the moment Dante stepped ashore.","The operational reason for not entering is real. The actual reason is also real: someone needs to be on the outside of the door. Both are true simultaneously.","This is the second time he has prepared the tea before knowing. He is aware he is doing it again. He has not examined what it means that it is now a thing he does."],ru:["Иммунологический ответ Острова прекратился в 30 метрах от точки входа — радиус Данте. «Левиафан» перестал разрушаться в момент когда Данте ступил на берег.","Операционная причина не входить реальна. Реальная причина также реальна: кто-то должен быть с внешней стороны двери. Оба верны одновременно.","Это второй раз когда он готовит чай не зная. Он осознаёт что делает это снова. Он не исследовал что означает что это теперь вещь которую он делает."]},
     misunderstands:{en:["'I do not know what I will do if he does not come out.' He has written this as a condition of uncertainty about his next action. He has not examined whether this is operational uncertainty or a different kind. In eleven years he has always known his next action. The category of not-knowing-next-action has never before appeared in his reports. He has filed it as a new condition. He has not asked whether it is a new condition about his next action, or a new condition about himself."],ru:["«Я не знаю что буду делать если он не выйдет». Он написал это как состояние неопределённости о следующем действии. Он не исследовал является ли это операционной неопределённостью или другого рода. За одиннадцать лет он всегда знал следующее действие. Категория незнания-следующего-действия никогда прежде не появлялась в его отчётах. Он занёс её как новое состояние. Он не спросил является ли это новым состоянием о следующем действии, или новым состоянием о себе."]},
     hides:{en:["He wrote 'I do not know what I will do if he does not come out' and called it the forty-sixth bilateral non-disclosure. The forty-sixth bilateral non-disclosure is not that he wrote it down. The forty-sixth is that he wrote it and did not put it in the main report — he put it at the end of the lead-sheet, after the operational content, in a place that is technically still the report but is also a different kind of document.","He described the air as 'the pause between two parts of a sentence that has not finished.' He has been standing in this pause for the duration of the chapter. He has not named what the sentence is. He has been standing in the pause for eleven years. He has not examined whether the sentence was always unfinished, or whether it has only recently begun."],ru:["Он написал «я не знаю что буду делать если он не выйдет» и назвал это сорок шестым двусторонним нераскрытием. Сорок шестое двустороннее нераскрытие — не то что он записал. Сорок шестое в том что он записал и не поместил в основной отчёт — он поместил в конец свинцового листа, после операционного содержания, в место которое технически всё ещё отчёт но также другой вид документа.","Он описал воздух как «паузу между двумя частями незавершённого предложения». Он стоит в этой паузе на протяжении всей главы. Он не назвал что такое предложение. Он стоит в паузе одиннадцать лет. Он не исследовал было ли предложение всегда незавершённым, или только недавно началось."]},
     whisper:{en:"He wrote 'I do not know what I will do if he does not come out.' He called it a bilateral non-disclosure. He put it at the end, after the operational content, where it is both part of the report and not part of the report. He is holding the flask. He is waiting.",ru:"Он написал «я не знаю что буду делать если он не выйдет». Назвал двусторонним нераскрытием. Поместил в конец, после операционного содержания, где это одновременно и отчёт, и не отчёт. Он держит фляжку. Он ждёт."}
   }
 }
}
];

const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');c.innerHTML=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}].map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
