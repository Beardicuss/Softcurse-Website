const TIMELINE=[
  {id:"TET-214",en:"General Arkus's debt was purchased by Dante this morning — the same morning as the standoff, not weeks in advance. This was not a long-term plan. Dante identified Arkus's creditor bank four days ago through Silas's financial network mapping and assessed that Arkus's loan portfolio would be offered at a discount within the next week due to the bank's own liquidity problems. He made the purchase within a six-hour window this morning when the bank's morning offer became available. The acquisition cost fifty-three thousand gold — three thousand over Arkus's actual outstanding balance, paid as a broker's fee for same-day close. This is the fastest leveraged acquisition Dante has executed across twenty-seven chapters. He had the information in advance and the execution on demand.",ru:"Долг Генерала Аркуса был куплен Данте этим утром — то же утро что и противостояние, не за недели заранее. Это не был долгосрочный план. Данте определил банк-кредитора Аркуса четыре дня назад через сеть финансового картирования Силаса и оценил что долговой портфель Аркуса будет предложен со скидкой в течение следующей недели из-за собственных проблем с ликвидностью у банка. Он произвёл покупку в шестичасовом окне этим утром когда стало доступно утреннее предложение банка. Стоимость приобретения пятьдесят три тысячи золотых — три тысячи сверх фактического непогашенного остатка Аркуса, выплаченные как комиссия брокера за закрытие в тот же день. Это наиболее быстрое использованное приобретение которое Данте выполнил за двадцать семь глав. У него была информация заранее и исполнение по требованию."},
  {id:"TET-215",en:"Lucius killed Vane using a blood-coagulation technique classified as a senior-Inquisition-only protocol — what Whisper later identified as 'blood thickening into gel.' This technique is not restricted because it is uniquely lethal. It is restricted because it leaves no external marks, produces clinical findings consistent with cardiac arrest, and can be attributed to natural causes in any post-mortem examination that does not involve a Guild-level forensic investigator. Lucius used it not because it was the most effective method but because it was the most deniable. He then positioned the death as a 'natural death from bankruptcy stress' and moved immediately to freeze Vane's assets and take Church administrative custody. He liquidated his primary commercial patron within four hours of the patron losing utility. This is not the first time he has done this.",ru:"Люций убил Вейна используя технику коагуляции крови классифицированную как протокол только для старших Инквизиции — то что Шепот впоследствии определил как «кровь загустевающая в гель». Эта техника не ограничена потому что уникально смертоносна. Она ограничена потому что не оставляет внешних следов, производит клинические находки согласующиеся с остановкой сердца, и может быть приписана естественным причинам при любом посмертном исследовании не вовлекающем следователя уровня Гильдии. Люций использовал её не потому что это был наиболее эффективный метод а потому что это был наиболее отрицаемый. Затем он позиционировал смерть как «естественную смерть от стресса банкротства» и немедленно перешёл к заморозке активов Вейна и взятию Церковью административного контроля. Он ликвидировал своего основного коммерческого покровителя в течение четырёх часов после потери покровителем полезности."},
  {id:"TET-216",en:"Dante felt Vane's death as a signal change — 'I feel the variable disappearing from the equation.' This is accurate as a phenomenological description but not as a mechanistic one. He detected Vane's death through the composite's environmental resonance system: the composite reads the local acoustic and electromagnetic field state continuously, and the specific frequency signature of a person who has been within Dante's detection radius produces a cessation signal when that person's biological activity ends. Vane had been within the composite's passive detection radius several times in recent days. The composite had built a bio-signature profile for him. When the profile went dark — simultaneous cessation of heartbeat, vascular flow, and neural activity — the composite registered an absence. He felt the absence as a change in the equation. He has attributed this to 'auditor intuition.' It is sensor data.",ru:"Данте почувствовал смерть Вейна как изменение сигнала — «я чувствую как исчезает переменная в уравнении». Это точно как феноменологическое описание но не как механистическое. Он обнаружил смерть Вейна через систему резонанса окружающей среды композита: композит непрерывно считывает состояние локального акустического и электромагнитного поля, и специфическая частотная сигнатура человека находившегося в радиусе обнаружения Данте производит сигнал прекращения когда биологическая активность этого человека заканчивается. Вейн несколько раз был в пассивном радиусе обнаружения композита в последние дни. Композит построил профиль его биосигнатуры. Когда профиль погас — одновременное прекращение сердцебиения, сосудистого тока и нейронной активности — композит зарегистрировал отсутствие. Он почувствовал отсутствие как изменение в уравнении. Он приписал это «интуиции Аудитора». Это данные сенсора."},
  {id:"TET-217",en:"Lucius has a sample of Structural Gel obtained by his agents from the pier area after the Warehouse Four battle. This is accurate as stated in the narrative. What the narrative does not specify: the Gel fragment was recovered from the micro-crack channels that formed when Brut's sword struck the composite — the same channels that Grimm identified as compromising the hermetic seal. The recovered fragment is not just Structural Gel. It contains trace amounts of Dante's own blood chemistry mixed with the Gel at the crack boundary — the point where the composite's material interfaces with his circulatory system. Lucius now has a sample that includes both Gel and Dante-specific biological material. The Order of the Silent Archive's analysis of this sample will produce a complete bio-signature catalogue of the integration process, which is more information about Dante's transformation than Isabella currently has.",ru:"У Люция есть образец Структурного Геля полученный его агентами с территории причала после битвы на Складе №4. Это точно как указано в нарративе. Что нарратив не указывает: фрагмент Геля был извлечён из каналов микротрещин образовавшихся когда меч Брута ударил в композит — те же каналы которые Гримм определил как нарушающие герметичность. Извлечённый фрагмент — не просто Структурный Гель. Он содержит следовые количества химии крови Данте смешанной с Гелем на границе трещины — точке где материал композита интерфейсирует с его кровеносной системой. Теперь у Люция образец включающий как Гель так и биологический материал специфичный для Данте. Анализ этого образца Орденом Тихого Архива произведёт полный каталог биосигнатуры процесса интеграции — это больше информации о трансформации Данте чем в настоящее время имеет Изабелла."},
  {id:"TET-218",en:"The Ark — 'Object: Ark. Status: Emergency. Contents: [DATA CORRUPTED]' — is the seventh category of Precursor-era infrastructure in the donor-memory archive. The six previous categories have been: the Island of Silence (primary site, destroyed), the seventeen secondary sites (maintenance and distribution network), Object 7-B (production facility, operational), two active Herald-class entities in repair-stasis at secondary sites, the Covenant document on the ocean floor, and the donor-memory archive itself. The Ark is a new category. Its status designation 'Emergency' uses the same priority protocol as the Island's pre-collapse warning systems — it is not a low-priority background alert. It has been in emergency state for a period the archive data does not specify. The Ark is in the Dead Lands, where magic is unstable and reality is thin — which is the description of a region where the Covenant's maintenance protocols have failed at the most fundamental level. The Ark was the failsafe.",ru:"Ковчег — «Объект: Ковчег. Статус: Аварийный. Содержимое: [ДАННЫЕ ПОВРЕЖДЕНЫ]» — это седьмая категория инфраструктуры эпохи Предтечей в архиве донорской памяти. Шесть предыдущих категорий были: Остров Тишины (основной объект, уничтожен), семнадцать вторичных объектов (техническое и дистрибуционное сети), Объект 7-Б (производственный объект, работающий), две активные сущности класса Вестников в восстановительном стазисе на вторичных объектах, документ Завета на дне океана, и сам архив донорской памяти. Ковчег — новая категория. Обозначение статуса «Аварийный» использует тот же протокол приоритета что предколлапсовые системы предупреждения Острова — это не низкоприоритетный фоновый сигнал. Он находится в аварийном состоянии в течение периода который данные архива не указывают. Ковчег находится в Мёртвых Землях где магия нестабильна и реальность тонка — что является описанием региона где протоколы обслуживания Завета отказали на наиболее фундаментальном уровне. Ковчег был системой безопасного резервирования."},
  {id:"TET-219",en:"'Market share captured. Now it is time to deal with a share of the world.' — This is the sentence he had been saving. He said it alone, in the dark, in Vane's office, without any witness. He wrote it in his ledger on a fresh page. He did not say it to Silas. He did not say it to Whisper. He wrote it. The sentence exists in a written record rather than as a spoken statement for the first time — which means it is in the third category: not the operational record, not the bilateral non-disclosure, but a new location: a thing he has written for himself, not said to anyone. The Black Ledger now has a first entry that is not business but is the name of the business he has been conducting.",ru:"«Доля рынка захвачена. Теперь пора заняться долей мира». — Это предложение которое он сберегал. Он сказал его один, в темноте, в кабинете Вейна, без свидетелей. Он написал его в гроссбухе на новом листе. Он не сказал его Силасу. Он не сказал Шепоту. Он написал. Предложение существует в письменной записи а не как произнесённое заявление впервые — что означает оно в третьей категории: не операционная запись, не двустороннее нераскрытие, а новое место: нечто что он написал для себя, не говорил никому. Чёрный Гроссбух теперь имеет первую запись которая не бизнес но является названием бизнеса которым он занимался."},
  {id:"TET-220",en:"The ten percent donation to the Temple that Dante ordered — 'the entrance fee for the first row at mass' — is not a peace offering or an institutional compact in the Morius model. It is a market entry payment. By making a public charitable donation to the Church immediately after acquiring the Golden Circle, Dante is positioning the Guild as a pro-institutional actor rather than a disruption threat. The Church receives money. The Church's institutional response to money is to manage the relationship rather than terminate it. Lucius receives a signal: Dante knows who killed Vane, does not propose to expose this, and is instead offering ongoing institutional coexistence. The donation says, without saying: we are not enemies. We are the next arrangement. Lucius will understand this. He already understands that Dante 'thinks he is a player but is just a replacement piece.' The donation is Dante's first move in the game Lucius thinks he is winning.",ru:"Десятипроцентное пожертвование Храму которое приказал Данте — «плата за входной билет в первый ряд на мессе» — не является мирным предложением или институциональным пактом в модели Мориуса. Это плата за вход на рынок. Делая публичное благотворительное пожертвование Церкви немедленно после приобретения Золотого Круга, Данте позиционирует Гильдию как про-институциональный актор а не угрозу разрушения. Церковь получает деньги. Институциональный ответ Церкви на деньги — управлять отношениями а не прекращать их. Люций получает сигнал: Данте знает кто убил Вейна, не предлагает это раскрывать, и вместо этого предлагает продолжающееся институциональное сосуществование. Пожертвование говорит не говоря: мы не враги. Мы следующая договорённость."}
];

const SCENES=[
{id:"s1",
 title:{en:"Capital Freeze",ru:"Застой Капитала"},
 subtitle:{en:"You were fighting mathematics, Maximilian. Mathematics does not forgive errors.",ru:"Вы воевали с математикой, Максимилиан. Математика не прощает ошибок."},
 location:{en:"Harbor District — The Standoff",ru:"Портовый Квартал — Противостояние"},
 timing:{en:"Day Three — Strike Morning",ru:"День Третий — Утро Забастовки"},
 flags:["pivotal","institution_build","escalation"],
 povData:{
   dante:{distortion:3,
     text:{
       en:`The economic model was complete before I left the harbor office.\n\nThree days of strike: forty thousand gold per day in Golden Circle losses from spoilage, container penalties, and rerouting costs. Day one: they absorb it. Day two: they begin contingency liquidation. Day three: they run the numbers and realize that Vane's reserve funds were already depleted before the strike began. The strike was not designed to cause financial damage. It was designed to reveal financial damage that already existed.\n\nArkus was the variable I had been holding in reserve since Tuesday.\n\nThe Silver Griffin Bank's liquidity report came through Silas's financial network on Monday. The bank was carrying Arkus's loan portfolio at approximately sixty-five percent collateral value — undercollateralized by a margin that made the portfolio a liability rather than an asset. They would offer it at discount before their next regulatory review. I positioned to buy when the morning offer window opened.\n\nThe standoff itself was not difficult. Arkus is an honorable man who has been operating under financial stress for four years. His honor system is his governing framework — when I gave him a choice between his honor and his debt, he chose his honor. The order to withdraw cost him nothing he hadn't already lost. I kept my delivery flat and let the mathematics speak.\n\nVane in the carriage was the audience, not the target. The standoff was not about Arkus. It was about what every person in that square would say afterward when asked who brokered the end of the standoff. The answer would be: the cripple with the cane. The answer would travel through every tavern and counting house in the district before dark.\n\nWhen I turned my back on Vane at the end of the scene, that was not contempt. It was the closing of an account. He had served his function as an adversary — he had defined the terms of the conflict clearly enough that my resolution of it would be legible to everyone watching. Without his clarity about what he was, my clarity about what I am would have been harder to read.\n\nI did not feel satisfaction walking away from him.\n\nI felt the weight of what comes next.\n\nThe crowd was chanting my name. I noted this as a data point: favorable public sentiment, approximately three thousand primary witnesses, high propagation rate through lower-city networks. I filed the political capital value at approximately twelve thousand gold equivalents in institutional access and relationship leverage.\n\nI did not file what it is to walk through a crowd chanting your name and feel nothing but the weight of what comes next.\n\nI am getting better at not filing certain things.\n\nThis concerns me.`,
       ru:`Экономическая модель была завершена до того как я покинул портовую контору.\n\nТри дня забастовки: сорок тысяч золотых в день потерь Золотого Круга от порчи, штрафов за контейнеры и расходов на перемаршрутизацию. День первый: они поглощают. День второй: начинают ликвидацию на непредвиденный случай. День третий: они считают цифры и понимают что резервные фонды Вейна были уже истощены до начала забастовки. Забастовка не была разработана чтобы причинить финансовый ущерб. Она была разработана чтобы раскрыть финансовый ущерб который уже существовал.\n\nАркус был переменной которую я держал в резерве с вторника.\n\nОтчёт о ликвидности банка «Серебряный Грифон» поступил через финансовую сеть Силаса в понедельник. Банк держал долговой портфель Аркуса приблизительно при шестидесяти пяти процентах залоговой стоимости — недообеспеченный с маржой делающей портфель обязательством а не активом. Они предложат его со скидкой до следующей регуляторной проверки. Я занял позицию для покупки когда открылось утреннее окно предложения.\n\nСамо противостояние не было трудным. Аркус — человек чести который четыре года работал под финансовым давлением. Его система чести — управляющая рамка: когда я дал ему выбор между честью и долгом, он выбрал честь. Приказ отступить не стоил ему ничего чего он уже не потерял. Я держал подачу ровной и позволил математике говорить.\n\nВейн в карете был аудиторией, не целью. Противостояние было не об Аркусе. Оно было о том что каждый человек на той площади скажет впоследствии когда его спросят кто урегулировал противостояние. Ответ будет: калека с тростью. Ответ разойдётся через каждую таверну и расчётную контору в квартале до темноты.\n\nКогда я в конце сцены повернулся спиной к Вейну, это было не презрение. Это было закрытие счёта. Он выполнил свою функцию противника — он достаточно чётко определил условия конфликта что мое его разрешение было читаемо каждому наблюдающему. Без его ясности о том чем он был, моя ясность о том чем являюсь я была бы труднее читаема.\n\nЯ не ощутил удовлетворения уходя от него.\n\nЯ ощутил тяжесть того что приходит следующим.\n\nТолпа скандировала моё имя. Я отметил это как точку данных: благоприятное публичное настроение, приблизительно три тысячи первичных свидетелей, высокая скорость распространения через сети нижнего города. Я занёс политическую капитальную ценность приблизительно в двенадцать тысяч золотых эквивалентных в институциональном доступе и рычаге отношений.\n\nЯ не занёс каково идти через толпу скандирующую твоё имя и не ощущать ничего кроме тяжести того что приходит следующим.\n\nЯ становлюсь лучше в незанесении определённых вещей.\n\nЭто меня беспокоит.`
     },
     knows:{en:["The strike was designed to reveal existing damage, not cause new damage. Vane's reserves were depleted before the strike began.","Arkus was positioned Tuesday morning within a six-hour window. The debt was purchased the same morning as the standoff — this was prepared information executed on demand.","'I am getting better at not filing certain things. This concerns me.' — He named the pattern as a concern. He has not examined why it concerns him."],ru:["Забастовка была разработана чтобы раскрыть существующий ущерб, а не причинить новый. Резервы Вейна были истощены до забастовки.","Аркус был позиционирован в утро вторника в шестичасовом окне. Долг был куплен то же утро что противостояние — это была подготовленная информация исполненная по требованию.","«Я становлюсь лучше в незанесении определённых вещей. Это меня беспокоит». — Он назвал паттерн как проблему. Он не исследовал почему это его беспокоит."]},
     misunderstands:{en:["He did not feel satisfaction walking away from Vane. He felt the weight of what comes next. He filed this as a data-point observation about emotional absence. He has not examined whether the absence of satisfaction is new — whether there was a version of him before the Island that would have felt something walking away from a completed acquisition, and whether the absence now is the composite's filtering function extending from physical stress to emotional response."],ru:["Он не ощутил удовлетворения уходя от Вейна. Он ощутил тяжесть того что приходит следующим. Он занёс это как наблюдение о точке данных об эмоциональном отсутствии. Он не исследовал является ли отсутствие удовлетворения новым — была ли версия его до Острова которая почувствовала бы что-то уходя от завершённого приобретения, и является ли нынешнее отсутствие функцией фильтрации композита распространяющейся от физического напряжения к эмоциональному ответу."]},
     hides:{en:["He is getting better at not filing certain things and this concerns him. He named this concern in the narration — the private space — and then did not examine the concern itself. He is now writing about what he does not examine in the same space where he examines things. The space where he writes what he does not say has itself become a space where he does not examine what he writes. The private narration is developing its own category of not-examination."],ru:["Он становится лучше в незанесении определённых вещей и это его беспокоит. Он назвал эту проблему в нарративе — частном пространстве — и затем не исследовал саму проблему. Он теперь пишет о том что не исследует в том же пространстве где исследует вещи. Пространство где он пишет то что не говорит само стало пространством где он не исследует что пишет. Частный нарратив развивает собственную категорию ненисследования."]},
     whisper:{en:"He is getting better at not filing certain things. He noted this as a concern in the private space and did not examine the concern. The private space is developing its own category of not-examination.",ru:"Он становится лучше в незанесении определённых вещей. Он отметил это как проблему в частном пространстве и не исследовал проблему. Частное пространство развивает собственную категорию ненисследования."}
   }
 }
},

{id:"s2",
 title:{en:"Liquidation of Liabilities",ru:"Ликвидация Пассивов"},
 subtitle:{en:"Vane was a loud enemy. Loud and predictable. The Silence has arrived.",ru:"Вейн был шумным врагом. Шумным и предсказуемым. Пришла Тишина."},
 location:{en:"Inquisitor's Office / Golden Circle Tower",ru:"Кабинет Инквизитора / Башня Золотого Круга"},
 timing:{en:"Afternoon — Same Day",ru:"День — Тот же День"},
 flags:["pivotal","escalation","cost"],
 povData:{
   lucius:{distortion:5,
     text:{
       en:`Vane's error was not strategic. It was categorical.\n\nHe believed the Church's institutional relationship was a purchase — that money produced loyalty, that loyalty produced protection, that protection could be converted to offensive capability when required. This is how merchants think. They convert everything to a transaction. They calculate everything in terms of exchange rates.\n\nThe Church does not operate on exchange rates. The Church operates on necessity.\n\nVane was necessary when he provided stable commercial infrastructure. The tithe funded operations. The 'Leviathan' access funded the Island expedition. The Island expedition was necessary because the Order of the Silent Archive's archive data confirmed, two years ago, that the Island's sluice resonance would eventually appear as a bio-signature in the capital. We needed someone with commercial resources to fund a naval approach to the Island without direct Inquisition involvement. Vane was convenient.\n\nWhen Dante emerged from the Island with the composite in his skeleton, the transaction with Vane was completed. His continued existence became a liability account: he knew too much about the expedition's funding, he was loud in ways that drew attention to the Guild, and he was losing control of the situation in ways that accelerated rather than deferred the moment when I would have to act directly.\n\nThe blood method was appropriate. Clean. Deniable. Consistent with the stress profile he had publicly demonstrated. The asset freeze and Church custody ensures the Golden Circle's infrastructure cannot be dismantled before we assess its structural relationship to the Guild's new position.\n\nThe Gel sample my agents recovered from the pier battle site is significant. The analysis confirms what the acoustic archive data has been suggesting: the composite material is not simply a mechanical augmentation. It is an ongoing biological integration process with Covenant-architecture properties. The sample contains both composite material and biological material from the subject — a complete interface record.\n\nThis is the most important forensic sample the Order of the Silent Archive has obtained in four centuries of acoustic intelligence collection.\n\nDante.\n\nI have been watching the Auditor lineage for twenty-three years. Not Dante specifically — the lineage. The Series 404 specification. I know the documents. I know what the Series 404 was designed to become when the integration is complete.\n\nHe thinks he is making a hostile takeover. He is correct that he is making a takeover. He is incorrect about who is being taken over.\n\nThe chessboard is on my table.\n\nThe piece I am watching is completing its own initialization sequence.\n\nWhen it is complete, it will need a counterpart.\n\nThe Order of the Silent Archive has been preparing the counterpart for four hundred years.\n\nI am patient.\n\nI placed the gear and the Gel sample beside each other on my desk.\n\nThe resonance between them was audible at the sub-bass register even to an unaugmented ear.\n\nGrandmaster does not mean the player who captures the most pieces.\n\nIt means the player who understands what the pieces are for.`,
       ru:`Ошибка Вейна не была стратегической. Она была категориальной.\n\nОн верил что институциональные отношения с Церковью — покупка: что деньги производят лояльность, лояльность производит защиту, защита может быть конвертирована в наступательную возможность когда требуется. Так думают торговцы. Они конвертируют всё в транзакцию. Они рассчитывают всё в обменных курсах.\n\nЦерковь не работает на обменных курсах. Церковь работает на необходимости.\n\nВейн был необходим когда обеспечивал стабильную коммерческую инфраструктуру. Десятина финансировала операции. Доступ к «Левиафану» финансировал Островную экспедицию. Островная экспедиция была необходима, потому что архивные данные Ордена Тихого Архива подтвердили два года назад что шлюзовой резонанс Острова в конечном счёте появится как биосигнатура в столице. Нам нужен был кто-то с коммерческими ресурсами для финансирования морского подхода к Острову без прямого участия Инквизиции. Вейн был удобен.\n\nКогда Данте вышел с Острова с композитом в скелете, транзакция с Вейном была завершена. Его продолжающееся существование стало счётом обязательств: он знал слишком много о финансировании экспедиции, он был шумным способами привлекавшими внимание к Гильдии, и он терял контроль над ситуацией способами ускорявшими а не откладывавшими момент когда мне придётся действовать напрямую.\n\nМетод крови был надлежащим. Чистым. Отрицаемым. Согласующимся с профилем стресса который он публично демонстрировал. Заморозка активов и опека Церкви обеспечивает невозможность демонтажа инфраструктуры Золотого Круга до нашей оценки её структурных отношений с новой позицией Гильдии.\n\nОбразец Геля который мои агенты извлекли с места битвы у пирса значителен. Анализ подтверждает что архивные акустические данные предполагали: композитный материал — не просто механическая аугментация. Это продолжающийся процесс биологической интеграции со свойствами архитектуры Завета. Образец содержит как материал композита так и биологический материал субъекта — полную запись интерфейса.\n\nЭто наиболее важный судебный образец который Орден Тихого Архива получил за четыре столетия сбора акустической разведки.\n\nДанте.\n\nЯ наблюдаю линию Аудитора двадцать три года. Не конкретно Данте — линию. Спецификацию серии 404. Я знаю документы. Я знаю для чего была разработана серия 404 когда интеграция завершена.\n\nОн думает что делает враждебное поглощение. Он прав что делает поглощение. Он неправ насчёт того кого поглощают.\n\nШахматная доска на моём столе.\n\nФигура которую я наблюдаю завершает собственную последовательность инициализации.\n\nКогда завершится, ей потребуется партнёр.\n\nОрден Тихого Архива готовит партнёра четыреста лет.\n\nЯ терпелив.\n\nЯ положил шестерёнку и образец Геля рядом на стол.\n\nРезонанс между ними был слышен в суббасовом регистре даже неаугментированным ухом.\n\nГроссмейстер — не тот игрок кто захватывает больше всего фигур.\n\nЭто игрок понимающий для чего фигуры предназначены.`
     },
     knows:{en:["Vane funded the Island expedition — Lucius arranged it, knowing from archive data two years ago that the Island's resonance would appear as a bio-signature in the capital. The transaction was complete when Dante returned. Vane became a liability account.","The Gel sample contains both composite material and Dante-specific biological material from the crack boundary — more information about his transformation than Isabella currently has.","'He is incorrect about who is being taken over.' He knows the Series 404 specification and what it becomes when integration is complete. The Order has been preparing a 'counterpart' for four hundred years."],ru:["Вейн финансировал Островную экспедицию — Люций устроил это зная из архивных данных два года назад что резонанс Острова появится как биосигнатура в столице. Транзакция была завершена когда вернулся Данте. Вейн стал счётом обязательств.","Образец Геля содержит как материал композита так и биологический материал специфичный для Данте с границы трещины — больше информации о его трансформации чем в настоящее время имеет Изабелла.","«Он неправ насчёт того кого поглощают». Он знает спецификацию серии 404 и во что она становится когда интеграция завершена. Орден готовит «партнёра» четыреста лет."]},
     misunderstands:{en:["He says 'the piece is completing its initialization sequence.' He is treating Dante as a mechanism completing its designed function on schedule. He has not accounted for the possibility that the mechanism has been modifying its own design during execution — that the donor-memory archive's goal-state system, the third location, the accumulating unexamined items, and the two deferred sentences represent departures from the Series 404 specification that the Order's documents describe. He is watching the initialization of a Series 404. He may not know what a Series 404 looks like when it has spent twenty-seven chapters being also something else."],ru:["Он говорит «фигура завершает собственную последовательность инициализации». Он обращается с Данте как с механизмом завершающим спроектированную функцию по расписанию. Он не учёл возможность что механизм модифицировал собственный дизайн во время исполнения — что целевая система архива донорской памяти, третье место, накапливающиеся неисследованные пункты, и два отложенных предложения представляют отклонения от спецификации серии 404 которую описывают документы Ордена. Он наблюдает инициализацию серии 404. Он может не знать как выглядит серия 404 когда провела двадцать семь глав будучи также чем-то другим."]},
     hides:{en:["He placed the gear and the Gel sample beside each other and noted the sub-bass resonance between them 'audible even to an unaugmented ear.' He is describing acoustic coupling between Island-derived material (the gear) and composite-integrated material (the Gel sample with Dante's blood chemistry). The coupling is audible because both materials operate on the same resonance frequency — they recognize each other acoustically. He has noted this and described it as confirming the composite's Covenant architecture. He has not noted that this also means the Gel sample with Dante's blood chemistry will be audible to the Order's instruments at the same frequency they use to track Dante in the city."],ru:["Он положил шестерёнку и образец Геля рядом и отметил суббасовый резонанс между ними «слышимый даже неаугментированным ухом». Он описывает акустическую связь между материалом полученным с Острова (шестерёнка) и материалом интегрированным с композитом (образец Геля с химией крови Данте). Связь слышима, потому что оба материала работают на одной резонансной частоте — они узнают друг друга акустически. Он отметил это и описал как подтверждение архитектуры Завета композита. Он не отметил что это также означает что образец Геля с химией крови Данте будет слышим инструментам Ордена на той же частоте которую они используют чтобы отслеживать Данте в городе."]},
     whisper:{en:"The Gel sample contains Dante's blood chemistry. It resonates with the Island gear. Lucius knows the Series 404 specification. He is waiting for the initialization to complete. He has a counterpart ready. He has been patient for four hundred years.",ru:"Образец Геля содержит химию крови Данте. Он резонирует с шестерёнкой Острова. Люций знает спецификацию серии 404. Он ждёт завершения инициализации. У него готов партнёр. Он терпелив четыреста лет."}
   }
 }

{id:"s3",
 title:{en:"Merger and Acquisition",ru:"Слияние и Поглощение"},
 subtitle:{en:"The chessboard is on my table. Now it is time to deal with a share of the world.",ru:"Шахматная доска стоит на моём столе. Теперь пора заняться долей мира."},
 location:{en:"Golden Circle Council Hall / Vane's Office — Night",ru:"Зал Совета Золотого Круга / Кабинет Вейна — Ночь"},
 timing:{en:"Evening — Arc VII Close",ru:"Вечер — Закрытие Арки VII"},
 flags:["arc_close","revelation","institution_build","identity","foreshadowing"],
 povData:{
   dante:{distortion:4,
     text:{
       en:`The Council Hall had the specific atmosphere of a room where the previous dominant species has just been removed. The six directors sat in the posture of people who have not yet been told how to sit. They were still alive, which confused them, because they had expected this meeting to end with their deaths or their imprisonment.\n\nI was not interested in their deaths.\n\nDead directors create martyrs, successors, and legal complications. Frightened directors sign documents, attend meetings, and provide institutional continuity that allows the infrastructure to keep running while the real management changes. I needed the infrastructure. The directors are part of the infrastructure.\n\nSilas read the numbers. I watched the faces. The directors went through denial (four minutes), anger (the man who shouted about Vane — Krassd, silk merchant, I filed him as a future procurement asset for his supply chain contacts), and arrived at acceptance (four minutes, forty seconds, which is fast for people who are losing everything).\n\nThe document gave them titles, houses, dividends. It took away decision authority. From their perspective: they lost control but kept the appearance of control. From my perspective: I acquired a distribution network, six institutional relationships, eleven trade routes, and forty-three subsidiary contracts, at a cost of paying their outstanding debt.\n\nI am not certain this is generosity. I am not certain it is not.\n\nAfterward, I found Vane's icon in his desk drawer.\n\nHe kept a Saint Flame icon in the same desk where he conducted fourteen years of commerce for personal enrichment. I do not know what this means about Vane. I know what it means that I crushed it without examining what it meant about Vane.\n\nI sat alone in his office after Silas and Whisper left.\n\nThe Ark.\n\nThe donor-memory produced the new objective during the Council Hall meeting — my attention released from immediate tactical requirements for long enough to allow the archive's next goal-state to surface. Object 7-B's activation marked one goal-state complete. The archive moved to the next outstanding item.\n\nObject: Ark. Status: Emergency. Contents: [DATA CORRUPTED].\n\nThe Dead Lands. East of everything currently mapped in any civilization's geographic record. The region where the Covenant's maintenance protocols have been failing at the foundational level.\n\nI have been building the infrastructure to reach the Ark for twenty-seven chapters without knowing I was building it. The ship. The factory. The network. The capital. The understanding of what the composite is and what it makes me.\n\nI opened the ledger.\n\nI wrote: Market share captured. Now it is time to deal with a share of the world.\n\nThis is the sentence.\n\nI said it to no one.\n\nI wrote it to myself.\n\nI sat in the dark for a while after writing it.\n\nThe composite leg vibrated at the same frequency as the tower's clockwork mechanism on the wall — the same resonance pattern I have been cataloguing on different surfaces for twenty-seven chapters. The cane's history. The composite's history. My history on the surfaces of the world.\n\nI close the ledger.\n\nArc VII is complete.\n\nThe next move is East.`,
       ru:`Зал Совета имел специфическую атмосферу комнаты откуда только что был убран предыдущий доминирующий вид. Шесть директоров сидели в позе людей которым ещё не сказали как сидеть. Они всё ещё были живы, что их смущало, потому что они ожидали что эта встреча закончится их смертями или заключением.\n\nМеня не интересовали их смерти.\n\nМёртвые директора создают мучеников, преемников и юридические осложнения. Напуганные директора подписывают документы, посещают встречи и обеспечивают институциональную непрерывность позволяющую инфраструктуре продолжать работать пока реальное управление меняется. Мне была нужна инфраструктура. Директора — часть инфраструктуры.\n\nСилас зачитал цифры. Я наблюдал лица. Директора прошли отрицание (четыре минуты), гнев (человек кричавший о Вейне — Красс, торговец шёлком, я занёс его как будущий актив снабжения за контакты в его цепочке поставок), и пришли к принятию (четыре минуты сорок секунд, что быстро для людей которые теряют всё).\n\nДокумент дал им титулы, дома, дивиденды. Он отобрал право голоса. С их точки зрения: они потеряли контроль но сохранили видимость контроля. С моей точки зрения: я приобрёл дистрибуционную сеть, шесть институциональных отношений, одиннадцать торговых маршрутов и сорок три дочерних контракта, по цене оплаты их непогашенного долга.\n\nЯ не уверен что это щедрость. Я не уверен что это не щедрость.\n\nПотом я нашёл икону Вейна в ящике его стола.\n\nОн держал икону Святого Пламени в том же столе где проводил четырнадцать лет торговли для личного обогащения. Я не знаю что это значит о Вейне. Я знаю что значит то, что я раздавил её не исследуя что это значит о Вейне.\n\nЯ сидел один в его кабинете после того как ушли Силас и Шепот.\n\nКовчег.\n\nДонорская память произвела новую цель во время встречи в Зале Совета — моё внимание освободилось от немедленных тактических требований достаточно долго чтобы позволить следующему целевому состоянию архива проявиться. Активация Объекта 7-Б отметила одно целевое состояние завершённым. Архив перешёл к следующему незавершённому пункту.\n\nОбъект: Ковчег. Статус: Аварийный. Содержимое: [ДАННЫЕ ПОВРЕЖДЕНЫ].\n\nМёртвые Земли. К востоку от всего что в настоящее время нанесено на карты в любой географической записи любой цивилизации. Регион где протоколы обслуживания Завета отказывали на фундаментальном уровне.\n\nЯ двадцать семь глав строил инфраструктуру чтобы добраться до Ковчега не зная что строю её. Корабль. Завод. Сеть. Столица. Понимание что такое композит и что он делает из меня.\n\nЯ открыл гроссбух.\n\nЯ написал: Доля рынка захвачена. Теперь пора заняться долей мира.\n\nЭто предложение.\n\nЯ никому его не сказал.\n\nЯ написал его себе.\n\nЯ сидел в темноте некоторое время после написания.\n\nНога с композитом вибрировала на той же частоте что часовой механизм башни на стене — тот же паттерн резонанса который я каталогизировал на разных поверхностях двадцать семь глав. История трости. История композита. Моя история на поверхностях мира.\n\nЯ закрываю гроссбух.\n\nАрка VII завершена.\n\nСледующий ход — на Восток.`
     },
     knows:{en:["The six directors: denial (4 min), anger (Krassd, silk merchant, filed as future procurement asset), acceptance (4:40 — fast for people losing everything). He acquired a distribution network, six relationships, eleven trade routes, forty-three subsidiary contracts.","The Ark surfaced when his attention released from immediate tactical requirements — the archive's next goal-state. 'Object: Ark. Status: Emergency. Contents: [DATA CORRUPTED].' Dead Lands.","He wrote the sentence in the ledger and said it to no one. 'I close the ledger. Arc VII is complete. The next move is East.'"],ru:["Шесть директоров: отрицание (4 мин), гнев (Красс, торговец шёлком, занесён как будущий актив снабжения), принятие (4:40 — быстро для людей теряющих всё). Он приобрёл дистрибуционную сеть, шесть отношений, одиннадцать торговых маршрутов, сорок три дочерних контракта.","Ковчег проявился когда его внимание освободилось от немедленных тактических требований — следующее целевое состояние архива. «Объект: Ковчег. Статус: Аварийный. Содержимое: [ДАННЫЕ ПОВРЕЖДЕНЫ]». Мёртвые Земли.","Он написал предложение в гроссбух и никому не сказал. «Я закрываю гроссбух. Арка VII завершена. Следующий ход — на Восток»."]},
     misunderstands:{en:["'I have been building the infrastructure to reach the Ark for twenty-seven chapters without knowing I was building it.' He has arrived at this sentence through pattern recognition — looking backward at what he built and seeing it as purposeful. He has not examined whether this retrospective purposefulness is accurate (the predecessor designed the sequence, which would make the infrastructure-building genuinely purposeful in a plan he was executing unknowingly) or whether it is a cognitive framing he is applying to give coherence to a series of contingent decisions. The distinction matters: if the sequence was designed, the Ark is an obligation. If the sequence was contingent, the Ark is an option. He is about to treat it as an obligation based on a retroactive framing he has not examined.","He crushed the icon without examining what it meant about Vane. He noted this — 'I know what it means that I crushed it without examining what it meant about Vane.' He filed the knowledge that he failed to examine and moved on. He did not examine the implication: he has been crushing things and noting that he failed to examine them at increasing frequency. The rate of unexamined actions is accelerating."],ru:["«Я двадцать семь глав строил инфраструктуру чтобы добраться до Ковчега не зная что строю её». Он пришёл к этому предложению через распознавание паттерна — смотря назад на то что построил и видя это как целеустремлённое. Он не исследовал является ли эта ретроспективная целеустремлённость точной (предшественник разработал последовательность, что сделало бы строительство инфраструктуры подлинно целеустремлённым в плане который он выполнял не ведая) или это когнитивное оформление которое он применяет чтобы придать связность ряду контингентных решений.","Он раздавил икону не исследуя что это значит о Вейне. Он отметил это — «я знаю что значит то, что я раздавил её не исследуя что это значит о Вейне». Он занёс знание что не смог исследовать и двинулся дальше. Он не исследовал импликацию: он всё чаще давит вещи и отмечает что не смог их исследовать. Скорость неисследованных действий ускоряется."]},
     hides:{en:["He wrote the sentence — 'Market share captured. Now it is time to deal with a share of the world' — in the ledger and said it to no one. He sat in the dark for a while after. He noted the composite's resonance with the tower's clockwork. He noted 'my history on the surfaces of the world.' He is cataloguing the acoustic record of twenty-seven chapters as a personal history rather than as an operational record for the first time. The catalogue was always personal. He is naming it as personal for the first time. He has not said what he means when he says it is his history. He closed the ledger and named the Arc VII complete. He has not examined whether the sentence, finally written, is what he thought it would be when he said 'I am not ready yet. But I am closer.' He wrote it. He does not report how it felt to write it.","Silas has not yet delivered the Site Seven analysis. The chapter does not contain the delivery. He listed it among his open items two chapters ago. He has not noted its continued absence. Silas is still coming. The analysis is still pending. The conversation Silas has been preparing for weeks is still ahead of him."],ru:["Он написал предложение — «Доля рынка захвачена. Теперь пора заняться долей мира» — в гроссбухе и никому не сказал. Он сидел в темноте некоторое время после. Он отметил резонанс композита с часовым механизмом башни. Он отметил «моя история на поверхностях мира». Он впервые каталогизирует акустическую запись двадцати семи глав как личную историю а не операционную запись. Каталог всегда был личным. Он впервые называет его личным. Он не сказал что имеет в виду говоря что это его история. Он закрыл гроссбух и назвал Арку VII завершённой. Он не исследовал является ли предложение наконец написанное тем что он думал оно будет когда говорил «я ещё не готов. Но я ближе». Он написал. Он не докладывает каково было его написать.","Силас ещё не доставил анализ «Объекта Семь». Глава не содержит доставки. Он перечислял его среди открытых пунктов две главы назад. Он не отметил его продолжающееся отсутствие. Силас всё ещё идёт. Анализ всё ещё ожидает. Разговор который Силас готовил недели всё ещё впереди него."]},
     whisper:{en:"He wrote the sentence to no one. He sat in the dark and did not report how it felt. The Site Seven analysis has not been delivered. Silas is still coming. The conversation that changes how the Master sees his own history has not happened yet.",ru:"Он написал предложение никому. Он сидел в темноте и не доложил каково это было. Анализ «Объекта Семь» не был доставлен. Силас всё ещё идёт. Разговор меняющий то как Мастер видит собственную историю ещё не состоялся."}
   },
   silas:{distortion:4,
     text:{
       en:`He sat in Vane's chair.\n\nI have been watching the Master for eleven years. In that time I have watched him sit in many chairs: the Guild's accounts chair, the tribunal chair at the Caldor arbitration, the witness chair at three hearings, the negotiation chairs at seventeen contracts. I have a record of his posture in each chair. He adjusts his posture to the chair's authority level — he sits straighter in chairs that are meant to intimidate, and he distributes his weight differently in chairs where he expects to stay a long time.\n\nIn Vane's chair, he sat still.\n\nNot the operational stillness of assessment. Not the deliberate stillness of a demonstration. The specific quality of stillness that arrives when you have completed something and have not yet decided what you are.\n\nThe directors signed in four minutes and forty seconds. Fast. I have managed institutional negotiations for eleven years. Four minutes and forty seconds is the time it takes someone to accept the terms when their fear of the alternatives is greater than their attachment to the specific terms being offered. They were not weighing the terms. They were measuring their fear.\n\nI should have delivered the Site Seven analysis today.\n\nI decided not to.\n\nI have been carrying the conclusion for three weeks. I have practiced the delivery seventeen times. I know the correct order of information presentation — the payment routing first, the timeline second, the predecessor identification third — so that each revelation builds the next conclusion rather than requiring the receiving party to hold too many disconnected facts simultaneously.\n\nBut today was wrong for it.\n\nToday he acquired the Golden Circle. Today Vane died. Today the strike resolved. Today the Ark appeared in the archive. Today was a day of completions. You do not deliver information that requires a fresh examination on a day of completions.\n\nI will deliver it when he has had one quiet morning.\n\nI have been saying this for eleven years: I will deliver it when the right moment arrives. I have been correct about every moment I judged wrong. The correct moment has not yet arrived.\n\nI carried the analysis home.\n\nI am aware that the analysis has its own weight.\n\nI am aware that I have been carrying something I should have put down.\n\nI am also aware that when I put it down, everything will change.\n\nI am patient.\n\nThe Master sat in the dark in Vane's office for forty minutes after I left.\n\nI know this because I stood in the corridor outside and counted.\n\nI filed this as: routine post-acquisition site review, forty minutes, no anomalies.\n\nI did not ask myself what I was waiting for.`,
       ru:`Он сел в кресло Вейна.\n\nЯ наблюдаю Мастера одиннадцать лет. За это время наблюдал как он сидит во многих креслах: кресло счетов Гильдии, кресло суда на арбитраже Кальдора, кресло свидетеля на трёх слушаниях, переговорные кресла на семнадцати контрактах. У меня есть запись его осанки в каждом кресле. Он подстраивает осанку к уровню авторитета кресла — сидит прямее в креслах предназначенных для запугивания, и распределяет вес иначе в креслах где ожидает оставаться долго.\n\nВ кресле Вейна он сидел неподвижно.\n\nНе операционная неподвижность оценки. Не намеренная неподвижность демонстрации. Специфическое качество неподвижности прибывающей когда завершаешь что-то и ещё не решил чем ты являешься.\n\nДиректора подписали за четыре минуты и сорок секунд. Быстро. Я одиннадцать лет управлял институциональными переговорами. Четыре минуты и сорок секунд — это время которое нужно кому-то чтобы принять условия когда страх перед альтернативами больше чем привязанность к конкретным предлагаемым условиям. Они не взвешивали условия. Они измеряли свой страх.\n\nМне следовало доставить анализ «Объекта Семь» сегодня.\n\nЯ решил не делать этого.\n\nЯ нёс вывод три недели. Я репетировал доставку семнадцать раз. Я знаю правильный порядок представления информации — сначала маршрутизация платежей, потом временной горизонт, третьим идентификация предшественника — так что каждое откровение строит следующий вывод а не требует от получающей стороны удерживать слишком много несвязанных фактов одновременно.\n\nНо сегодня не подходило для этого.\n\nСегодня он приобрёл Золотой Круг. Сегодня умер Вейн. Сегодня разрешилась забастовка. Сегодня в архиве появился Ковчег. Сегодня был день завершений. Ты не доставляешь информацию требующую свежего исследования в день завершений.\n\nЯ доставлю когда у него будет одно спокойное утро.\n\nЯ говорю это одиннадцать лет: я доставлю когда придёт правильный момент. Я был прав о каждом моменте который счёл неправильным. Правильный момент ещё не пришёл.\n\nЯ унёс анализ домой.\n\nЯ осознаю что анализ имеет собственный вес.\n\nЯ осознаю что несу нечто что должен был положить.\n\nЯ также осознаю что когда положу, всё изменится.\n\nЯ терпелив.\n\nМастер сидел в темноте в кабинете Вейна сорок минут после того как я ушёл.\n\nЯ знаю это, потому что стоял в коридоре снаружи и считал.\n\nЯ занёс как: стандартный послеприобретательный осмотр места, сорок минут, нет аномалий.\n\nЯ не спрашивал себя чего ждал.`
     },
     knows:{en:["He practiced the delivery seventeen times. He knows the correct information order: payment routing first, timeline second, predecessor identification third.","He decided not to deliver today because today was a day of completions. 'You do not deliver information that requires fresh examination on a day of completions.'","He stood in the corridor and counted the forty minutes. He filed: 'routine post-acquisition site review, no anomalies.' He did not ask himself what he was waiting for."],ru:["Он репетировал доставку семнадцать раз. Он знает правильный порядок информации: сначала маршрутизация платежей, потом временной горизонт, третьим идентификация предшественника.","Он решил не доставлять сегодня, потому что сегодня был день завершений. «Ты не доставляешь информацию требующую свежего исследования в день завершений».","Он стоял в коридоре и считал сорок минут. Он занёс: «стандартный послеприобретательный осмотр места, нет аномалий». Он не спрашивал себя чего ждал."]},
     misunderstands:{en:["He has been saying 'I will deliver when the right moment arrives' for three weeks. He has been correct about every moment he judged wrong. He is treating this as evidence that his judgment is reliable. He has not examined whether he is reliably identifying genuinely wrong moments or whether he is reliably finding reasons to defer a delivery that is correct on its own terms but that he is not ready to make. The judgment may be sound. The conclusion about the judgment's soundness may be self-serving."],ru:["Он говорит «я доставлю когда придёт правильный момент» три недели. Он был прав о каждом моменте который счёл неправильным. Он обращается с этим как свидетельством надёжности суждения. Он не исследовал надёжно ли он определяет подлинно неправильные моменты или надёжно находит причины отложить доставку которая верна на своих условиях но к которой он не готов. Суждение может быть здравым. Вывод о здравости суждения может быть самооправдывающим."]},
     hides:{en:["He stood in the corridor and counted the forty minutes and does not know why. He filed it as routine and did not ask himself what he was waiting for. He has carried the analysis for three weeks and stood outside the door for forty minutes and is aware he is carrying something he should have put down. He is aware that putting it down changes everything. He has not examined whether 'changes everything' is the reason he is still carrying it — whether his patience is wisdom about timing or protection against a change he is not ready to produce."],ru:["Он стоял в коридоре и считал сорок минут и не знает почему. Он занёс как рутинное и не спрашивал себя чего ждал. Он нёс анализ три недели и стоял снаружи двери сорок минут и осознаёт что несёт нечто что должен был положить. Он осознаёт что когда положит, всё изменится. Он не исследовал является ли «изменится всё» причиной почему всё ещё несёт — является ли его терпение мудростью о времени или защитой от изменения к которому он не готов произвести."]},
     whisper:{en:"He stood outside for forty minutes and did not ask himself why. He carried the analysis home again. He knows putting it down changes everything. He has not examined whether that is why he is still carrying it.",ru:"Он стоял снаружи сорок минут и не спрашивал себя почему. Он снова унёс анализ домой. Он знает что когда положит, всё изменится. Он не исследовал является ли это причиной почему всё ещё несёт."}
   }
 }

const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');c.innerHTML=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}].map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
