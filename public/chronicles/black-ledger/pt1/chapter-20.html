.d6,.d7{animation:flicker-mid 7s infinite;}

#whisper-panel{background:var(--bg2);border:1px solid var(--border);border-top:none;border-left:3px solid var(--pov-p);padding:15px 40px 17px;margin-bottom:12px;opacity:0;transform:translateY(-2px);transition:opacity 1.6s,transform 1.2s;pointer-events:none;}

const TIMELINE=[
  {id:"TET-157",en:"The baker whose son Thomas served on the Leviathan: Thomas is one of forty-three surviving crew members who did not desert when Dante took control of the ship. Dante's debt-assumption and guard assignment was not charity. It was a demonstration performed for an audience of all the remaining petitioners and, by extension, the entire lower-city network. Within forty-eight hours, the story of the baker's protection will have reached every person in the capital who depends on the Guild's network for their livelihood. The Golden Circle's strategy of intimidating Dante's civilian contacts will encounter, at each contact point, the specific knowledge that choosing the Guild produces visible protection. The protection is real. The demonstration is also calculated.",ru:"Пекарь чей сын Томас служил на «Левиафане»: Томас один из сорока трёх выживших членов экипажа которые не дезертировали когда Данте взял под контроль корабль. Принятие Данте долгов и назначение охраны не было благотворительностью. Это была демонстрация выполненная для аудитории всех оставшихся просителей и через них — всей сети нижнего города. В течение сорока восьми часов история защиты пекаря достигнет каждого человека в столице зависящего от сети Гильдии в своём существовании. Стратегия «Золотого Круга» по запугиванию гражданских контактов Данте встретит в каждой точке контакта конкретное знание о том что выбор Гильдии производит видимую защиту. Защита реальна. Демонстрация также рассчитана."},
  {id:"TET-158",en:"The assassin Dante sent to Grimm's 'Walker-1 prototype calibration' was not killed. She was fitted with the prototype leg assembly from Grimm's experimental series — two functioning composite-adjacent lower limb replacements that Grimm had been building without authorization, using technical notation from his six Pale Echelon pages as the design basis. The prototypes are functional at approximately 30% of the Island composite's capability. They are also partially integrated with her nervous system, which Grimm achieved in four hours through a process that he has not documented and cannot fully explain. She will walk. She will be able to run. She will be sent back to the Lord-Director as Dante promised. She will also, for the rest of her life, be a walking advertisement for what the Guild can build, and a source of data on how biological systems integrate with Pale Echelon materials in subjects who did not receive Island-soil composite.",ru:"Убийца которую Данте отправил на «калибровку прототипа 'Ходок-1' Гримма» не была убита. Ей установили сборку прототипа ног из экспериментальной серии Гримма — два функционирующих заменителя нижних конечностей близких к композиту которые Гримм строил без авторизации, используя технические нотации из его шести страниц Бледного Эшелона как основу дизайна. Прототипы функционируют на приблизительно 30% возможностей островного композита. Они также частично интегрированы с её нервной системой, что Гримм достиг за четыре часа через процесс который он не задокументировал и не может полностью объяснить. Она будет ходить. Она сможет бегать. Она будет отправлена обратно к Лорд-Директору как обещал Данте. Она также на протяжении всей жизни будет живой рекламой того что может построить Гильдия, и источником данных о том как биологические системы интегрируются с материалами Бледного Эшелона у субъектов не получивших островной почвенный композит."},
  {id:"TET-159",en:"Silas has been watching the leg at every opportunity since the harbor. He has now observed it in the garden (the blow to the cobblestone — he was standing six meters away and felt the vibration through the ground), in the carriage, and during the prison visit. He has not submitted the Site Seven analysis to Dante because he is waiting to understand whether the leg and the Site Seven payment are connected. They are. The Site Seven payment recipient established the payment routing infrastructure that directed the Island expedition's funding through a channel that predates Dante's appointment. The leg is composed of material from the Island. The connection is: the payment recipient anticipated not just the Auditor, but what the Auditor would find and bring back. Silas is two analytical steps from this conclusion and has approximately six hours left before Dante's review system flags his Site Seven queries.",ru:"Силас наблюдал за ногой при каждой возможности с гавани. Теперь он наблюдал её в саду (удар по брусчатке — он стоял в шести метрах и почувствовал вибрацию через землю), в карете и во время визита в тюрьму. Он не подал анализ «Объекта Семь» Данте, потому что ждёт понимания связаны ли нога и платёж «Объекта Семь». Связаны. Получатель платежей «Объекта Семь» установил инфраструктуру маршрутизации платежей направившую финансирование Островной экспедиции через канал предшествующий назначению Данте. Нога состоит из материала с Острова. Связь: получатель платежей предвидел не только Аудитора, но что Аудитор найдёт и принесёт обратно. Силас в двух аналитических шагах от этого вывода и у него примерно шесть часов до того как система проверки Данте пометит его запросы по «Объекту Семь»."},
  {id:"TET-160",en:"The blow to the assassin's shackle chain: Dante struck the chain link not with the stiletto but with the cane itself, transmitting the composite leg's structural disruption resonance through the cane's handle into the chain. The chain broke at the link because the null-field micro-resonance cancelled the crystalline lattice of the iron at the strike point. He did not know this was going to happen. He struck the chain expecting to break it through mechanical force. The chain broke through a mechanism he did not choose. He has now used the composite's undiscovered disruptive capability accidentally a second time. The first was the harbor cobblestone. The second is this. He has not connected these two events as the same mechanism. He thinks he broke the chain with force.",ru:"Удар по цепи наручников убийцы: Данте ударил по звену цепи не стилетом а самой тростью, передав структурный разрушающий резонанс ноги с композитом через рукоять трости в цепь. Цепь сломалась в звене, потому что нулевой микрорезонанс отменил кристаллическую решётку железа в точке удара. Он не знал что это произойдёт. Он ударил цепь ожидая сломать её механической силой. Цепь сломалась через механизм который он не выбирал. Он второй раз случайно использовал необнаруженную разрушительную возможность композита. Первый был портовая брусчатка. Второй — это. Он не связал эти два события как один и тот же механизм. Он думает что сломал цепь силой."},
  {id:"TET-161",en:"Torin Black-Pickaxe's identification of 'dead metal' in Dante's leg is incorrect in one specific direction and correct in the most important one. Incorrect: the composite is not dead, it is highly active. Correct: Torin's engineering instinct identified a material that should not be in a biological context through acoustic perception alone — the sub-bass resonance of the composite under load, which Grimm's dampening system does not fully suppress. Torin has been working with metals his entire life. He heard something in the cane-strike that he has never heard in any naturally-occurring or alchemically-produced alloy. The composite is Precursor-era material and is acoustically distinct from everything produced in the last three thousand years. Torin will become the first Guild member besides Grimm to understand what the leg actually is, and he will arrive at this understanding not through technical documentation but through professional listening.",ru:"Определение Торином «мёртвого металла» в ноге Данте неверно в одном конкретном направлении и верно в наиболее важном. Неверно: композит не мёртв, он высокоактивен. Верно: инженерный инстинкт Торина определил материал который не должен быть в биологическом контексте только через слуховое восприятие — суббасовый резонанс композита под нагрузкой который система демпфирования Гримма не подавляет полностью. Торин всю жизнь работал с металлами. Он услышал в ударе тростью нечто чего никогда не слышал ни в каком природном или алхимически произведённом сплаве. Композит — материал эпохи Предтечей и акустически отличается от всего произведённого за последние три тысячи лет. Торин станет первым членом Гильдии кроме Гримма понимающим что такое нога на самом деле, и он придёт к этому пониманию не через техническую документацию а через профессиональное слушание."},
  {id:"TET-162",en:"Colonel Kroll's crime inventory — selling coastal batteries, embezzling food supplies, falsifying death records — is not merely convenient leverage for Dante's acquisition of prisoners. Kroll himself will be exposed within four months when the Imperial inspection he mentioned arrives. The prisoners' absence will be noted, and the prepared falsification documents Dante provided will not withstand a proper forensic audit. Kroll will face Imperial justice regardless of what he does with Dante's visit. What Dante has done is: given Kroll an operational reason to cooperate today while securing a documented paper trail that will destroy Kroll's version of events if he later attempts to report the transaction to anyone. Dante has not merely leveraged Kroll. He has structured Kroll's incentives so that every action Kroll takes to protect himself accelerates his own exposure.",ru:"Инвентарь преступлений полковника Кролла — продажа береговых батарей, растрата продовольственных запасов, фальсификация записей о смертях — не просто удобный рычаг для приобретения Данте заключённых. Сам Кролл будет разоблачён в течение четырёх месяцев когда прибудет упомянутая им Имперская инспекция. Отсутствие заключённых будет отмечено, и документы о фальсификации предоставленные Данте не выдержат надлежащей судебно-медицинской проверки. Кролл столкнётся с Имперским правосудием независимо от того что делает с визитом Данте. Что сделал Данте: дал Кроллу операционную причину сотрудничать сегодня, одновременно обеспечив документальный след который уничтожит версию событий Кролла если тот впоследствии попытается сообщить о транзакции кому-либо. Данте не просто использовал Кролла как рычаг. Он структурировал стимулы Кролла так что каждое действие Кролла по защите себя ускоряет его собственное разоблачение."},
  {id:"TET-163",en:"'Hope and hatred, Silas, until we reach the North — that will be enough.' — This is the most operationally accurate and most personally revealing statement Dante has made about how he manages people across twenty chapters. He has been operating on hope and hatred as primary motivators since Chapter 1 — offering each person he recruits the version of these that matches their specific architecture: Valeria got hope (for youth, for silence), Torin gets hatred (of the Empire, of captivity), the crew of the Leviathan got hope (for wages, for survival), the baker's family got hope (for protection, for continuation). What he has not previously stated aloud is that he knows this is the mechanism. He knows he is feeding their hope and their hatred. He has named it in the carriage as a truth about operations. He has not examined whether he is doing this to himself.",ru:"«Надеждой и ненавистью, Силас, пока не доберёмся до Севера — этого хватит». — Это наиболее операционно точное и наиболее лично раскрывающее заявление которое Данте сделал о том как управляет людьми за двадцать глав. Он работает на надежде и ненависти как первичных мотиваторах с Главы 1 — предлагая каждому кого вербует их версию соответствующую их конкретной архитектуре: Валерия получила надежду (на молодость, на тишину), Торин получает ненависть (к Империи, к заключению), экипаж «Левиафана» получил надежду (на жалованье, на выживание), семья пекаря получила надежду (на защиту, на продолжение). Что он прежде не произносил вслух — он знает что это механизм. Он знает что питает их надежду и их ненависть. Он назвал это в карете как правду об операциях. Он не исследовал делает ли он это с собой."},
  {id:"TET-164",en:"The 'no one touches my toys' contract from Chapter 11 was the first time Dante used a first-person possessive. In Chapter 20 he uses: 'my assets,' 'my ship,' 'my people,' 'my Guild,' 'my clients,' 'my perimeter.' He has been building a possessive vocabulary since arriving at the Island. The vocabulary is not accumulation of property. It is articulation of responsibility. Each 'my' is a declaration of what he will defend. He has not connected the expanding possessive vocabulary to the 'business continues — this time I mean it' resolution from Chapter 17. They are the same development. The sentence is arriving. The meaning is what it means to defend something.",ru:"Контракт «никто не смеет трогать мои игрушки» из Главы 11 был первым разом когда Данте использовал притяжательное местоимение первого лица. В Главе 20 он использует: «мои активы», «мой корабль», «мои люди», «моя Гильдия», «мои клиенты», «мой периметр». Он строит притяжательный словарный запас с момента прибытия на Остров. Словарный запас — не накопление собственности. Это артикуляция ответственности. Каждое «мой» — декларация того что он будет защищать. Он не соединил расширяющийся притяжательный словарный запас с разрешением «бизнес продолжается — на этот раз я имею в виду» из Главы 17. Это одно и то же развитие. Предложение прибывает. Смысл — это то что значит защищать что-то."}
];

const SCENES=[
{id:"s1",
 title:{en:"A Protocol Violation",ru:"Нарушение Регламента"},
 subtitle:{en:"Monsters guard the garden. The baker weeps. The assassin has no legs.",ru:"Монстры охраняют сад. Пекарь плачет. У убийцы нет ног."},
 location:{en:"Guild HQ — The Inner Garden",ru:"Штаб-Квартира Гильдии — Внутренний Сад"},
 timing:{en:"Friday — Day of Petitioners",ru:"Пятница — День Просителей"},
 flags:["pivotal","institution_build","escalation","cost"],
 povData:{
   dante:{distortion:3,
     text:{
       en:`The Friday hearing is institutional architecture, not charity. I established it six weeks before the Island expedition because an institution that is accessible only through its contracted services is an institution that can be bypassed when its services become inconvenient. The petitioners who come here on Fridays do not have contracts. They have nowhere else to go. By offering them a final instance, I create a constituency that exists within the Guild's network and has direct positive experience of what the Guild's presence means.\n\nThis is called building a base.\n\nThe baker's son is on the Leviathan's crew register. His retention when I assumed command is a documented expression of institutional loyalty on his part. Institutional loyalty is an asset. Assets are not abandoned to intimidation campaigns by hostile entities. The debt assumption and the guard detail cost the Guild approximately two hundred gold monthly. The intelligence value of the baker's network contacts — lower city commercial relationships, supply chain access, informal information flows — is worth considerably more than that over any twelve-month period.\n\nI noted all of this. I noted it before the baker finished speaking. I was already calculating the asset-cost ratio when he fell to his knees.\n\nI told him: without emotion, this is a deal.\n\nThis is accurate.\n\nThe assassin arrived with a contact weapon — a crystalline gas sphere, fragile, momentum-sensitive, designed to detonate on ground contact and produce a chemical cloud at breathing level. The delivery timing was chosen for maximum civilian exposure: a crowd of vulnerable contacts, midday, outdoors, the wind from the south carrying the dispersal east toward the garden's enclosed perimeter.\n\nLisa had already identified her in the queue. She identified her at the gate. The neutralization took approximately one second.\n\nI gave the assassin to Grimm. This was the correct decision. The message it sends to the Lord-Director is more useful than executing her: we are not afraid of assassination attempts, we have technical infrastructure that converts threats into demonstrations, and we return our demonstrations to sender.\n\nThe Grimm decision was also faster than I expected it to be. I had not previously used Grimm in an operational capacity. I directed him to the assassin without assessing whether this was appropriate use of a technical asset in an active threat scenario.\n\nI noted this deviation from protocol and filed it without examining the speed at which I made it.\n\nAfter the garden cleared I sat in the office. The leg ached at the joint interface — not pain in the biological sense, but a sustained signal from the composite's load-monitoring system that the dampeners were running at capacity and the 10% residual resonance was operating against the leather's fatigue tolerance.\n\nThe assassin's lesson was correct. The vulnerability is: I protect things.\n\nWhisper said this will be used against me.\n\nHe is right.\n\nI have known this since Chapter 1.`,
       ru:`Пятничные слушания — институциональная архитектура, а не благотворительность. Я установил их за шесть недель до Островной экспедиции, потому что институция доступная только через свои контрактные услуги — институция которую можно обойти когда её услуги становятся неудобными. Просители приходящие сюда по пятницам не имеют контрактов. Им больше некуда идти. Предлагая им последнюю инстанцию, я создаю электоральную базу существующую внутри сети Гильдии и имеющую прямой позитивный опыт того что означает присутствие Гильдии.\n\nЭто называется формирование базы.\n\nСын пекаря в регистре экипажа «Левиафана». Его удержание когда я принял командование — задокументированное выражение институциональной лояльности с его стороны. Институциональная лояльность — актив. Активы не бросаются кампаниям запугивания враждебных структур. Принятие долга и охрана обходятся Гильдии приблизительно в двести золотых ежемесячно. Разведывательная ценность контактов пекарной сети — коммерческие отношения нижнего города, доступ к цепочкам поставок, неформальные информационные потоки — значительно превышает это за любой двенадцатимесячный период.\n\nЯ отметил всё это. Я отметил это до того как пекарь закончил говорить. Я уже рассчитывал соотношение актив-стоимость когда он упал на колени.\n\nЯ сказал ему: без эмоций, это сделка.\n\nЭто точно.\n\nУбийца прибыла с контактным оружием — кристаллическая газовая сфера, хрупкая, чувствительная к импульсу, разработанная для детонации при контакте с землёй и производства химического облака на уровне дыхания. Время доставки было выбрано для максимального гражданского воздействия: толпа уязвимых контактов, полдень, на открытом воздухе, ветер с юга несущий распыление на восток к замкнутому периметру сада.\n\nЛиса уже определила её в очереди. Она определила её у ворот. Нейтрализация заняла приблизительно одну секунду.\n\nЯ отдал убийцу Гримму. Это было верное решение. Послание которое оно отправляет Лорд-Директору более полезно чем её казнь: мы не боимся покушений, у нас есть техническая инфраструктура конвертирующая угрозы в демонстрации, и мы возвращаем наши демонстрации отправителю.\n\nРешение Гримма также было принято быстрее чем я ожидал. Я прежде не использовал Гримма в операционной мощности. Я направил его к убийце без оценки является ли это надлежащим использованием технического актива в сценарии активной угрозы.\n\nЯ отметил это отклонение от протокола и занёс без исследования скорости с которой принял это решение.\n\nПосле того как сад опустел я сел в кабинете. Нога ныла в суставном интерфейсе — не боль в биологическом смысле, а устойчивый сигнал от системы мониторинга нагрузки композита что демпферы работают на пределе мощности и 10% остаточного резонанса действует против усталостного допуска кожи.\n\nУрок убийцы был верным. Уязвимость: я защищаю вещи.\n\nШепот сказал это будет использовано против меня.\n\nОн прав.\n\nЯ знал это с Главы 1.`
     },
     knows:{en:["The baker's asset-cost calculation: 200 gold/month in protection vs the intelligence value of lower-city commercial network access — the latter worth considerably more over any twelve-month period","Lisa identified the assassin at the gate before she joined the queue — one second from identification to neutralization","The leg is signaling at the joint interface: dampeners at capacity, 10% residual resonance operating against the leather's fatigue tolerance"],ru:["Расчёт актив-стоимость пекаря: 200 золота/месяц в охрану против разведывательной ценности доступа к коммерческой сети нижнего города — последнее значительно больше за любой двенадцатимесячный период","Лиса определила убийцу у ворот до того как та встала в очередь — одна секунда от определения до нейтрализации","Нога сигнализирует в суставном интерфейсе: демпферы на пределе мощности, 10% остаточного резонанса действует против усталостного допуска кожи"]},
     misunderstands:{en:["He directed Grimm to the assassin 'without assessing whether this was appropriate use of a technical asset.' He filed this as a protocol deviation. What he has not filed: that he directed Grimm to the assassin without hesitation in the same way he jumped between the Herald and the Siren, gave the vial to Whisper, broke the chain in the prison. He moves before assessing when something he has placed inside his perimeter is threatened. Grimm is inside the perimeter. He deployed Grimm the way you deploy something that is yours to deploy. He has not connected this to the expanding possessive vocabulary.","'I have known this since Chapter 1.' He says this about the vulnerability-of-protection. He has known it as an operational fact. He has not examined whether knowing it as an operational fact and doing it anyway is different from what he was doing in Chapter 1 — when 'protection' was a service he provided. It is now something else. He has not named the difference."],ru:["Он направил Гримма к убийце «без оценки является ли это надлежащим использованием технического актива». Он занёс это как отклонение от протокола. Что он не занёс: что направил Гримма к убийце без колебаний так же как прыгнул между Вестником и Сиреной, дал флакон Шепоту, сломал цепь в тюрьме. Он двигается до оценки когда что-то помещённое внутри его периметра под угрозой. Гримм внутри периметра. Он задействовал Гримма так как задействуют что-то принадлежащее тебе. Он не соединил это с расширяющимся притяжательным словарным запасом.","«Я знал это с Главы 1». Он говорит это об уязвимости защиты. Он знал это как операционный факт. Он не исследовал отличается ли знание этого как операционного факта и всё равно это делание от того что делал в Главе 1 — когда «защита» была услугой которую предоставлял. Теперь это что-то иное. Он не назвал разницу."]},
     hides:{en:["'I was already calculating the asset-cost ratio when he fell to his knees.' He has noted this as an observation about his own processing order. He has not noted that being aware of the calculation while the person is on their knees — holding the two registers simultaneously — is not the same as being indifferent to the person on the knees. In nineteen chapters of meticulous observation, this is the first time he has caught himself mid-calculation during a human moment and reported both, in the same sentence, without resolving which one was the real reason he acted.","He filed the Grimm deployment 'without examining the speed.' The speed means: he is now extending the 'move before assessing survivability' pattern — which appeared with the Herald and the Siren — to situations where it is operationally unnecessary. He moved to protect Grimm at the speed of reflex, not strategy."],ru:["«Я уже рассчитывал соотношение актив-стоимость когда он упал на колени». Он отметил это как наблюдение о собственном порядке обработки. Он не отметил что быть осведомлённым о расчёте пока человек на коленях — удерживать оба регистра одновременно — не то же что быть безразличным к человеку на коленях. В девятнадцати главах тщательного наблюдения это первый раз когда он застал себя в середине расчёта во время человеческого момента и доложил о них обоих, в одном предложении, не разрешая который был реальной причиной его действия.","Он занёс задействование Гримма «без исследования скорости». Скорость означает: он теперь распространяет паттерн «двигаться до оценки выживаемости» — появившийся с Вестником и Сиреной — на ситуации где это операционно необязательно. Он двинулся защищать Гримма со скоростью рефлекса, а не стратегии."]},
     whisper:{en:"He was calculating while the baker knelt. He filed both without resolving which was real. He deployed Grimm at reflex speed. He has not examined the speed.",ru:"Он рассчитывал пока пекарь стоял на коленях. Он занёс оба без разрешения который был реальным. Он задействовал Гримма со скоростью рефлекса. Он не исследовал скорость."}
   },
   silas:{distortion:4,
     text:{
       en:`I have been the Guild's treasurer for eleven years and I have never seen the Master hold a hearing day.\n\nWhen he announced it six weeks before the expedition, I thought it was a political calculation — standard patron-building, the kind of thing institutions do when they want to appear accessible while remaining effectively opaque. I was correct about this. I was incorrect about what I was seeing alongside it.\n\nThe baker's son is Thomas Wren. He is twenty-two years old, from the harbor district, second-generation dockworker family with three younger sisters and a widowed mother who runs a laundry. The baker himself — father, Edvard Wren — has been supplying bread to six street-level vendors who are also informal Guild contacts. His laundry income goes partially toward a debt held by a Golden Circle subsidiary that I identified in the Guild's passive-accounts ledger four months ago and never acted on.\n\nThe Master took the debt on the balance sheet without asking me to price the acquisition. He paid a fair price — more than fair. And then he told the baker it was a deal, not a gift.\n\nI have been watching the Master for eleven years. I have seen him make thirty-seven operational decisions in the time it takes most people to frame a question. I have never seen him make a decision that was not, somewhere in its architecture, a calculation. He calculates. This is his nature. It is also his professional identity.\n\nToday, for the first time, I watched him calculate and then watch the result of the calculation kneel on his lawn. Both things happened. He watched both.\n\nThe gas sphere. I felt the dispersal wave from six meters back — a pressure shift, barely perceptible. If it had detonated on the grass, the petitioner queue would have taken a cloud of what I have since identified as a contact-absorbable paralytic agent at approximately seventy percent effective concentration at the target range. Eighteen to twenty-two people. Several fatalities.\n\nThe assassin is in the basement with Grimm. I do not know what is happening down there. I know the Master said 'Walker-1 prototype.' I know what Grimm does with prototypes. I chose not to ask.\n\nI am sitting with the Site Seven analysis. The payment predates the appointment by one year. The recipient knew. The leg is composed of something that is not metal and not bone. The leg came from the Island. The Island is where the predecessor went nineteen years ago.\n\nIf the Site Seven payment recipient anticipated the Auditor's role and its contents — the Island, the material, the infrastructure — then the recipient is either the predecessor, or someone who knew what the predecessor was building, or something larger than both.\n\nI have four hours. Probably less.\n\nThe Master told the baker: without emotion, this is a deal.\n\nI have been watching him for eleven years.\n\nToday was the first time that sentence did not fully describe what I saw.`,
       ru:`Я казначей Гильдии одиннадцать лет и я никогда не видел чтобы Мастер проводил приёмный день.\n\nКогда он объявил его за шесть недель до экспедиции, я думал что это политический расчёт — стандартное формирование патроната, тот вид вещей который делают институции когда хотят казаться доступными оставаясь фактически непрозрачными. Я был прав насчёт этого. Я был неправ насчёт того что видел рядом с этим.\n\nСын пекаря — Томас Рен. Ему двадцать два года, из портового квартала, семья докеров во втором поколении с тремя младшими сёстрами и вдовой-матерью ведущей прачечную. Сам пекарь — отец, Эдвард Рен — поставляет хлеб шести уличным торговцам также являющимся неформальными контактами Гильдии. Его доход от прачечной частично идёт на долг дочерней компании «Золотого Круга» которую я определил в книге пассивных счетов Гильдии четыре месяца назад и так и не предпринял действий.\n\nМастер принял долг на баланс не прося меня оценить приобретение. Он заплатил справедливую цену — более чем справедливую. А затем сказал пекарю что это сделка, не подарок.\n\nЯ наблюдаю Мастера одиннадцать лет. Я видел как он принимает тридцать семь операционных решений за время которое большинству людей нужно чтобы сформулировать вопрос. Я никогда не видел от него решения которое не было бы, где-то в своей архитектуре, расчётом. Он рассчитывает. Это его природа. Это также его профессиональная идентичность.\n\nСегодня, впервые, я наблюдал как он рассчитывает и затем наблюдает результат расчёта стоящим на коленях на его лужайке. Оба события произошли. Он наблюдал оба.\n\nГазовая сфера. Я почувствовал волну распыления с шести метров назад — едва заметный перепад давления. Если бы она взорвалась на траве, очередь просителей получила бы облако того что я с тех пор определил как контактно-поглощаемый паралитический агент при приблизительно семидесяти процентах эффективной концентрации на целевом расстоянии. Восемнадцать-двадцать два человека. Несколько смертей.\n\nУбийца в подвале с Граммом. Я не знаю что там происходит. Я знаю что Мастер сказал «прототип 'Ходок-1'». Я знаю что Гримм делает с прототипами. Я выбрал не спрашивать.\n\nЯ сижу с анализом «Объекта Семь». Платёж предшествует назначению на один год. Получатель знал. Нога состоит из чего-то что не является металлом и не является костью. Нога пришла с Острова. Остров — то куда предшественник ушёл девятнадцать лет назад.\n\nЕсли получатель платежа «Объекта Семь» предвидел роль Аудитора и её содержание — Остров, материал, инфраструктуру — то получатель либо предшественник, либо кто-то знавший что предшественник строил, либо что-то большее чем оба.\n\nУ меня четыре часа. Вероятно меньше.\n\nМастер сказал пекарю: без эмоций, это сделка.\n\nЯ наблюдаю его одиннадцать лет.\n\nСегодня впервые это предложение не полностью описывало то что я видел.`
     },
     knows:{en:["Thomas Wren, twenty-two, harbor district — Silas pulled his full family profile immediately. The father's debt is to a Golden Circle subsidiary Silas identified four months ago and never acted on.","He felt the gas sphere's pressure wave at six meters — 18-22 people, several fatalities if detonated. He has since identified the agent.","Site Seven conclusion: the payment recipient anticipated not just the Auditor but what the Auditor would find and bring back. Three possibilities: the predecessor, someone who knew what the predecessor was building, or something larger than both."],ru:["Томас Рен, двадцать два, портовый квартал — Силас немедленно извлёк его полный семейный профиль. Долг отца — дочерней компании «Золотого Круга» которую Силас определил четыре месяца назад и так и не предпринял действий.","Он почувствовал волну давления газовой сферы с шести метров — 18-22 человека, несколько смертей при детонации. Он с тех пор определил агент.","Вывод по «Объекту Семь»: получатель платежа предвидел не только Аудитора но что Аудитор найдёт и принесёт. Три возможности: предшественник, кто-то знавший что предшественник строил, или что-то большее чем оба."]},
     misunderstands:{en:["'Today was the first time that sentence did not fully describe what I saw.' He is correct that something he has not previously observed was present. He has identified the phenomenon but not its category: what he saw was the calculation and the person-watching coexisting. He has been categorizing the Master as 'pure calculation' for eleven years. Today he saw that the category is incomplete. He does not yet know what the complete category is."],ru:["«Сегодня впервые это предложение не полностью описывало то что я видел». Он прав что присутствовало что-то чего он прежде не наблюдал. Он определил явление но не его категорию: то что он видел — расчёт и наблюдение-за-человеком сосуществующие. Он одиннадцать лет категоризировал Мастера как «чистый расчёт». Сегодня он увидел что категория неполна. Он пока не знает что такое полная категория."]},
     hides:{en:["He chose not to ask what is happening in the basement with the assassin and Grimm. He filed this as a choice. In eleven years he has always asked. He stopped asking in this chapter. He has not noted that he stopped asking. He has not examined why.","He has four hours and he has not decided what to do with the Site Seven analysis. The reason he has not decided: he is not sure which version of events is worse — that the predecessor is alive and was already building toward this, or that someone else was building toward this and Dante does not know they were. He is holding off deciding because both conclusions require him to do something he has not done in eleven years: bring information to the Master that could change how the Master sees his own history."],ru:["Он выбрал не спрашивать что происходит в подвале с убийцей и Граммом. Он занёс это как выбор. За одиннадцать лет он всегда спрашивал. Он перестал спрашивать в этой главе. Он не отметил что перестал спрашивать. Он не исследовал почему.","У него четыре часа и он не решил что делать с анализом «Объекта Семь». Причина не решить: он не уверен какая версия событий хуже — что предшественник жив и уже строил к этому, или что кто-то другой строил к этому и Данте не знает что они строили. Он откладывает решение потому что оба вывода требуют от него сделать что-то чего он не делал одиннадцать лет: принести Мастеру информацию способную изменить то как Мастер видит собственную историю."]},
     whisper:{en:"He has four hours. He stopped asking questions this chapter. He is holding the conclusion because both versions require him to bring information that changes how the Master sees his history.",ru:"У него четыре часа. Он перестал задавать вопросы в этой главе. Он удерживает вывод потому что обе версии требуют принести информацию меняющую то как Мастер видит свою историю."}
   }
 }
},

{id:"s2",
 title:{en:"Inventory of Souls",ru:"Инвентаризация Душ"},
 subtitle:{en:"The warden thinks he made the deal of the century. He will be audited in four months.",ru:"Начальник думает что совершил сделку века. Через четыре месяца его проверят."},
 location:{en:"Iron Bottom Prison — The Pit / The Warden's Office",ru:"Тюрьма «Железное Дно» — Карьер / Кабинет Начальника"},
 timing:{en:"Following Day",ru:"Следующий День"},
 flags:["social_combat","institution_build","foreshadowing"],
 povData:{
   dante:{distortion:2,
     text:{
       en:`The prison's aerial view, from the Leviathan's deck: a spiral wound into the earth, getting narrower and darker as it deepened. The architectural message is not subtle — this is a place designed to make people feel that they are descending into something irreversible. The message serves the warden's authority. It also explains why the people at the bottom are dangerous in specific ways: when you tell someone every day that they are in a place they cannot leave, some of them stop believing in the concept of leaving and start building toward the concept of destroying the structure from within.\n\nThose are the people I came for.\n\nKroll was not difficult. He was corrupt in the specific way of institutional functionaries who have held a position long enough that the institution's resources have become conceptually indistinguishable from their own. He sold the coastal batteries because the money was available and the risk of discovery seemed remote. He embezzled the food budget because the prisoners could not report him to anyone who would act. He falsified the death records because the system's incentive structure made falsification the path of least resistance.\n\nI gave him a path of less resistance.\n\nThe coastal battery sale, the food embezzlement, the falsification records: I had all three before entering the harbor. Whisper built the file over eight months during the period when I was identifying leverage points across the capital's institutional landscape. Kroll was on the list at position fourteen — not a priority, but present.\n\nHe became priority when the northern expedition required personnel with specific capabilities in deep excavation and mechanical systems under extreme conditions.\n\nThe falsification documents I provided were real documents — properly formatted, correctly stamped, consistent with the Warden's established falsification pattern. They will survive a visual inspection and fail a forensic audit in approximately four months. The forensic audit will arrive when the Imperial inspection committee notes that Kroll's prisoner population has declined by ten percent since the last review period.\n\nKroll is not getting away with anything. He is getting a four-month extension on his existing sentence.\n\nI gave him the documents because he needed to believe he was cooperating in his own interest. He is. His interest just happens to align perfectly with a four-month window I need before anyone in the capital notices that two hundred people have disappeared from a prison.\n\nTorin.\n\nThe strike on the shackle chain was not the calculated demonstration I presented it as. I placed the cane against the chain link, applied load, and the link failed. The failure was faster and cleaner than the mechanical force I applied should have produced. I noted this in the same second and did not show it in my expression.\n\nThe composite is doing something through the cane when I apply load to it. I have now observed this twice. It is not mechanical force. It is something I do not yet understand.\n\nTorin heard it. He called it 'dead metal.' He was wrong about the category but right about the perception: there is something in the acoustic signature of the composite that is distinct from any natural alloy.\n\nHe is an engineer. He will keep listening.`,
       ru:`Вид тюрьмы сверху, с палубы «Левиафана»: спираль уходящая в землю, сужающаяся и темнеющая с глубиной. Архитектурное послание не тонкое — это место разработанное чтобы заставить людей чувствовать что они спускаются во что-то необратимое. Послание служит власти начальника. Оно также объясняет почему люди внизу опасны специфическими способами: когда вы говорите кому-то каждый день что он в месте которое не может покинуть, некоторые из них перестают верить в концепцию покидания и начинают строить к концепции разрушения структуры изнутри.\n\nЭти люди были теми за кем я пришёл.\n\nКролл был не сложен. Он был коррумпирован специфическим образом институциональных функционеров которые занимали позицию достаточно долго что ресурсы институции стали концептуально неотличимы от их собственных. Он продал береговые батареи потому что деньги были доступны и риск обнаружения казался отдалённым. Он растратил продовольственный бюджет потому что заключённые не могли на него доложить тому кто бы действовал. Он фальсифицировал записи о смертях потому что структура стимулов системы делала фальсификацию путём наименьшего сопротивления.\n\nЯ дал ему путь меньшего сопротивления.\n\nПродажа береговых батарей, растрата продовольствия, фальсифицированные записи: у меня было всё три до входа в гавань. Шепот строил досье восемь месяцев в период когда я определял точки рычагов в институциональном ландшафте столицы. Кролл был в списке на позиции четырнадцать — не приоритет, но присутствует.\n\nОн стал приоритетом когда северная экспедиция потребовала персонал с конкретными возможностями в глубокой выработке и механических системах в экстремальных условиях.\n\nДокументы о фальсификации которые я предоставил были реальными документами — правильно отформатированными, корректно проштампованными, согласующимися с установленным паттерном фальсификации Начальника. Они выдержат визуальную проверку и провалят судебно-медицинскую проверку приблизительно через четыре месяца. Судебно-медицинская проверка прибудет когда Имперская инспекционная комиссия отметит что население заключённых Кролла снизилось на десять процентов с последнего периода проверки.\n\nКролл ни от чего не уходит. Он получает четырёхмесячное продление существующего приговора.\n\nЯ дал ему документы, потому что ему нужно было верить что он сотрудничает в собственных интересах. Так и есть. Его интересы просто случайно совершенно совпадают с четырёхмесячным окном которое мне нужно до того как кто-то в столице заметит что двести человек исчезли из тюрьмы.\n\nТорин.\n\nУдар по звену цепи не был рассчитанной демонстрацией которой я её представил. Я приложил трость к звену цепи, применил нагрузку, и звено сломалось. Поломка была быстрее и чище чем должна была производить механическая сила которую я приложил. Я отметил это в ту же секунду и не показал этого в выражении.\n\nКомпозит делает что-то через трость когда я прилагаю к ней нагрузку. Я наблюдал это дважды. Это не механическая сила. Это что-то что я ещё не понимаю.\n\nТорин услышал. Он назвал это «мёртвым металлом». Он был неправ насчёт категории но прав насчёт восприятия: в акустической сигнатуре композита есть что-то отличное от любого природного сплава.\n\nОн инженер. Он продолжит слушать.`
     },
     knows:{en:["Kroll's documents will fail forensic audit in four months — he is giving a four-month extension on an existing sentence, not providing escape","The chain link failed faster and cleaner than mechanical force should produce. This is the second time he has observed this. 'It is not mechanical force. It is something I do not yet understand.'","Torin heard the composite in the acoustic signature. He is an engineer. He will keep listening."],ru:["Документы Кролла провалят судебно-медицинскую проверку через четыре месяца — он даёт четырёхмесячное продление существующего приговора, а не обеспечивает побег","Звено цепи сломалось быстрее и чище чем должна производить механическая сила. Это второй раз когда он наблюдает это. «Это не механическая сила. Это что-то что я ещё не понимаю».","Торин услышал композит в акустической сигнатуре. Он инженер. Он продолжит слушать."]},
     misunderstands:{en:["'The strike on the shackle chain was not the calculated demonstration I presented it as.' He noted this and continued. This is the second consecutive scene in which he noted an uncontrolled composite capability event and continued without examining it. Harbor cobblestones: Chapter 18, noted without examination. Torin's shackle chain: Chapter 20, noted without examination. The two events are the same mechanism. He has now explicitly noted that they are not what he presented them as. He has still not asked what they are."],ru:["«Удар по звену цепи не был рассчитанной демонстрацией которой я её представил». Он отметил это и продолжил. Это вторая последовательная сцена в которой он отметил событие неконтролируемой возможности композита и продолжил без исследования. Брусчатка гавани: Глава 18, отмечено без исследования. Цепь Торина: Глава 20, отмечено без исследования. Два события — один механизм. Он теперь явно отметил что они не то что он представил. Он всё ещё не спросил что они такое."]},
     hides:{en:["He has now observed the composite's disruptive capability accidentally twice and presented both as deliberate twice. He is building a reputation for a capability he does not understand and cannot control. The reputation is accurate — the capability exists. The understanding is false — he does not know when or why it triggers. He has accepted the gap between what he controls and what he presents as a feature of operations rather than examining it as a risk.","He told Torins: 'The metal is alive. And it very much wants to work.' He said this about the composite. He was framing Torin's employment offer. He was also, for the first time, saying something true about the composite in non-operational terms: it is alive, it wants to work, and it is currently living inside him and working on him continuously. He said the true thing about the object. He did not say it about himself."],ru:["Он теперь дважды случайно наблюдал разрушительную возможность композита и дважды представил их как намеренные. Он строит репутацию возможности которую не понимает и не контролирует. Репутация точна — возможность существует. Понимание ложно — он не знает когда и почему срабатывает. Он принял разрыв между тем что контролирует и тем что представляет как особенность операций а не исследовал как риск.","Он сказал Торину: «Он живой. И он очень хочет работать». Он сказал это о композите. Он оформлял предложение о трудоустройстве Торина. Он также впервые говорил что-то правдивое о композите в неоперационных терминах: он живой, он хочет работать, и в настоящее время живёт внутри него и непрерывно работает с ним. Он сказал правдивое о предмете. Он не сказал этого о себе."]},
     whisper:{en:"He has observed the composite capability twice and presented both as deliberate. He does not know when it triggers. He told Torin 'the metal is alive and wants to work.' He did not say it about himself.",ru:"Он наблюдал возможность композита дважды и дважды представил как намеренные. Он не знает когда она срабатывает. Он сказал Торину «металл живой и хочет работать». Он не сказал этого о себе."}
   },
   torin:{distortion:4,
     text:{
       en:`I have been at the bottom of this hole for three years.\n\nBefore the hole: forty years of mining. Fourteen different operations on three continents, eleven different rock types, seven different extraction methodologies. I know what tools sound like. I know what rock sounds like. I know what metal sounds like. Every material has a voice when it works. The voice tells you: grain, fracture plane, hardness, crystalline structure, water content, gas inclusion, load-bearing capacity.\n\nWhen the man struck my chain with his cane, I heard something.\n\nNot iron. Not alloy. Not any processed metal I have encountered in forty years of professional work. The sound was — lower than it should have been. Not in pitch but in register. Like the difference between water in a cup and water in an ocean — same material, completely different acoustic mass. And it had a secondary harmonic: a frequency that shouldn't be present in metal at all, that resonates at the boundary between mechanical sound and organic sound.\n\nLiving rock does this. Very young geological formations, still settling. They have a resonance at the border between stone and biology because they're still being made by biological processes. The man's leg has this quality. It sounds like it is still being made.\n\nHe called it alive. He said: the metal is alive and wants to work.\n\nI do not think he was being poetic.\n\nI also do not think he fully understands what he said.\n\nI have heard dead metal. Ruins, artifacts, recovered Precursor-adjacent materials — all silent. Cold. Finished. This was not finished. Whatever is in his leg is still processing. Still responding. Still adjusting.\n\nHe offered me: the North, a factory, a partnership, beer.\n\nI did not accept because of any of those things.\n\nI accepted because I have been in this hole for three years and the last interesting thing I heard was the sound of a man whose leg is still being built.\n\nI told him: if the beer is watered down, I'll bring the factory down on his head.\n\nI meant it.\n\nBut I also meant: I want to see the factory. I want to know what made his leg.\n\nI want to hear what it sounds like when it's working at full capacity.`,
       ru:`Я на дне этой ямы три года.\n\nДо ямы: сорок лет горного дела. Четырнадцать разных операций на трёх континентах, одиннадцать разных типов породы, семь разных методологий добычи. Я знаю как звучат инструменты. Я знаю как звучит порода. Я знаю как звучит металл. Каждый материал имеет голос когда работает. Голос говорит: зерно, плоскость разлома, твёрдость, кристаллическая структура, содержание воды, включение газа, несущая способность.\n\nКогда мужчина ударил мою цепь тростью, я услышал кое-что.\n\nНе железо. Не сплав. Не какой-либо обработанный металл с которым я сталкивался за сорок лет профессиональной работы. Звук был — ниже чем должен быть. Не по высоте а по регистру. Как разница между водой в стакане и водой в океане — тот же материал, совершенно другая акустическая масса. И у него была вторичная гармоника: частота которая вообще не должна присутствовать в металле, резонирующая на границе между механическим звуком и органическим.\n\nЖивая порода делает это. Очень молодые геологические образования, всё ещё оседающие. У них есть резонанс на границе между камнем и биологией, потому что они всё ещё создаются биологическими процессами. У ноги мужчины это качество. Она звучит так, словно всё ещё создаётся.\n\nОн назвал её живой. Он сказал: металл живой и хочет работать.\n\nЯ не думаю что он говорил поэтически.\n\nЯ также не думаю что он полностью понимает что сказал.\n\nЯ слышал мёртвый металл. Руины, артефакты, recovered предтечи-смежные материалы — все тихие. Холодные. Законченные. Это было не законченным. Что бы ни было в его ноге, оно всё ещё обрабатывает. Всё ещё реагирует. Всё ещё подстраивается.\n\nОн предложил мне: Север, завод, партнёрство, пиво.\n\nЯ не принял ни из-за одного из этих вещей.\n\nЯ принял, потому что провёл в этой яме три года и последним интересным что я слышал был звук ноги мужчины которая всё ещё строится.\n\nЯ сказал ему: если пиво разбавленное, я обрушу завод ему на голову.\n\nЯ имел в виду.\n\nНо я также имел в виду: я хочу увидеть завод. Я хочу знать что сделало его ногу.\n\nЯ хочу услышать как она звучит когда работает на полную мощность.`
     },
     knows:{en:["The secondary harmonic is at the boundary between mechanical and organic sound — he has heard living rock do this: young geological formations still being made by biological processes","'Whatever is in his leg is still processing. Still responding. Still adjusting.' The leg is not finished. It is not an artifact. It is an ongoing process.","He did not accept for the North, the factory, the partnership, or the beer. He accepted to hear what the leg sounds like at full capacity."],ru:["Вторичная гармоника на границе между механическим и органическим звуком — он слышал как это делает живая порода: молодые геологические образования всё ещё создаваемые биологическими процессами","«Что бы ни было в его ноге, оно всё ещё обрабатывает. Всё ещё реагирует. Всё ещё подстраивается». Нога не закончена. Это не артефакт. Это продолжающийся процесс.","Он принял не ради Севера, завода, партнёрства или пива. Он принял чтобы услышать как нога звучит на полную мощность."]},
     misunderstands:{en:["'I do not think he fully understands what he said.' — He said 'the metal is alive and wants to work.' Torin heard this as an incomplete self-description. He is correct. What Torin has not accounted for: Dante said 'the metal is alive' about the composite in the context of selling Torin a job. He was describing an object. Torin heard a person not understanding their own description. The ambiguity is real: the metal is alive, the person carrying it is becoming more like it, and the person does not know this is happening at the pace it is happening."],ru:["«Я не думаю что он полностью понимает что сказал». — Он сказал «металл живой и хочет работать». Торин услышал это как неполное самоописание. Он прав. Что Торин не учёл: Данте сказал «металл живой» о композите в контексте продажи Торину работы. Он описывал предмет. Торин услышал человека не понимающего собственного описания. Двусмысленность реальна: металл живой, человек несущий его становится более похожим на него, и человек не знает что это происходит с той скоростью с которой происходит."]},
     hides:{en:["He said: I want to hear what it sounds like at full capacity. He has been at the bottom of a hole for three years. He accepted a job from a stranger whose leg is still being built. He did not ask what the factory produces, what the Guild does with the product, or what role he will play in the larger operation. He asked none of these questions because the answer that mattered was the acoustic one. He is a professional listener who has been in silence for three years. He accepted the first interesting sound."],ru:["Он сказал: я хочу услышать как она звучит на полную мощность. Он три года на дне ямы. Он принял работу от незнакомца чья нога всё ещё строится. Он не спрашивал что производит завод, что Гильдия делает с продуктом, какую роль он сыграет в более крупной операции. Он не задал ни одного из этих вопросов, потому что ответ который имел значение был акустическим. Он профессиональный слушатель три года проведший в тишине. Он принял первый интересный звук."]},
     whisper:{en:"He accepted because of the sound. He wants to hear the leg at full capacity. He did not ask what the factory produces. He is a professional listener who has been in silence for three years.",ru:"Он принял из-за звука. Он хочет услышать ногу на полную мощность. Он не спросил что производит завод. Он профессиональный слушатель три года проведший в тишине."}
   }
 }
},

{id:"s3",
 title:{en:"Departure",ru:"Отплытие"},
 subtitle:{en:"Hope and hatred, Silas. Until we reach the North, that will be enough.",ru:"Надеждой и ненавистью, Силас. Пока не доберёмся до Севера — хватит."},
 location:{en:"The Leviathan — Departing for the Dragon's Teeth",ru:"«Левиафан» — Отплытие к Драконьим Зубам"},
 timing:{en:"Evening",ru:"Вечер"},
 flags:["foreshadowing","institution_build"],
 povData:{
   dante:{distortion:2,
     text:{
       en:`Two hundred people below decks. Forty-three crew above. The specific sound of a ship that is at capacity with human beings rather than cargo: the acoustic difference between objects and bodies. Objects shift. Bodies redistribute. Objects do not adapt to stress. Bodies do.\n\nI stood on the bridge and felt the vibration of three hundred and fifteen separate biological presences through the deck. The composite leg reads structural vibration at a precision that the rest of my body does not. Every footstep on the lower decks produced a distinct signature. I catalogued them without trying to.\n\nSilas appeared at my elbow, his accounting ledger pressed to his chest, his expression that of a man calculating whether the structural capacity of his moral framework exceeds the current load. — How will we feed them? — Hope and hatred, Silas. Until we reach the North, that will be enough.\n\nI said this as an operational truth. It is. The two hundred from the prison are not neutral. They are people who have been told for years — by the Empire, by the prison system, by Kroll, by the architecture of the pit — that they are the bottom. They have two responses to this available to them: despair, or the specific energy that accumulates when people who have been told they are the bottom decide they are going to prove it wrong.\n\nI recruited the second type. Not because I prefer them as people — preference is irrelevant in institutional construction — but because the second type produces more consistent output under difficult conditions.\n\nThe hope is: a factory, a wage, a purpose that isn't survival.\nThe hatred is: every person on this ship hates someone different, and what I need from them is directed work rather than directed violence. At the factory, directed work and directed hatred become the same thing. They will fight the mountain the way they would fight the Empire — with everything they have, because mountains do not negotiate.\n\nI know this is a mechanism.\n\nI know I am using it deliberately.\n\nI know the people I am using it on.\n\nI said to Silas: hope and hatred. I gave him the operational framing.\n\nI did not say: I also know what the hope is that I am running on, and I also know what the hatred is that I am running on, and I also know that I have been managing myself with the same mechanism I use to manage them.\n\nThe horizon moved north as we left the harbor behind.\n\nThe composite leg registered every wave through the deck.\n\nThe Leviathan goes north.\n\nThe hostile takeover continues.`,
       ru:`Двести человек ниже палубы. Сорок три члена экипажа сверху. Специфический звук корабля в котором вместо груза полная загрузка людьми: акустическая разница между предметами и телами. Предметы смещаются. Тела перераспределяются. Предметы не адаптируются к стрессу. Тела адаптируются.\n\nЯ стоял на мостике и чувствовал вибрацию трёхсот пятнадцати отдельных биологических присутствий через палубу. Нога с композитом считывает структурную вибрацию с точностью которой не имеет остальная часть моего тела. Каждый шаг на нижних палубах производил отдельную сигнатуру. Я каталогизировал их не пытаясь.\n\nСилас появился у моего локтя, его бухгалтерская книга прижата к груди, его выражение — выражение человека рассчитывающего превышает ли структурная мощность его морального каркаса текущую нагрузку. — Чем мы будем их кормить? — Надеждой и ненавистью, Силас. Пока не доберёмся до Севера, этого хватит.\n\nЯ сказал это как операционную истину. Так и есть. Двести из тюрьмы не нейтральны. Это люди которым годами говорили — Империя, тюремная система, Кролл, архитектура карьера — что они дно. У них есть два доступных ответа: отчаяние, или специфическая энергия накапливающаяся когда люди которым сказали что они дно решают доказать что это неправда.\n\nЯ завербовал второй тип. Не потому что предпочитаю их как людей — предпочтение нерелевантно в институциональном строительстве — а потому что второй тип производит более последовательный вывод в сложных условиях.\n\nНадежда: завод, жалованье, цель которая не выживание.\nНенависть: каждый человек на этом корабле ненавидит кого-то разного, и что мне нужно от них — направленная работа а не направленное насилие. На заводе направленная работа и направленная ненависть становятся одним и тем же. Они будут воевать с горой так как воевали бы с Империей — со всем что имеют, потому что горы не ведут переговоры.\n\nЯ знаю что это механизм.\n\nЯ знаю что использую его намеренно.\n\nЯ знаю людей которых использую.\n\nЯ сказал Силасу: надежда и ненависть. Я дал ему операционное оформление.\n\nЯ не сказал: я также знаю какова надежда на которой работаю, и я также знаю какова ненависть на которой работаю, и я также знаю что управляю собой тем же механизмом которым управляю ими.\n\nГоризонт двинулся на север когда мы оставили гавань позади.\n\nНога с композитом регистрировала каждую волну через палубу.\n\n«Левиафан» идёт на север.\n\nРейдерский захват продолжается.`
     },
     knows:{en:["The composite leg reads every footstep on the lower decks as a distinct structural vibration signature — it is cataloguing 315 biological presences without his direction","Hope and hatred as mechanism: he recruited the second type not from preference but because they produce more consistent output under difficult conditions","'I also know that I have been managing myself with the same mechanism I use to manage them.' He said this in private. He did not say it to Silas."],ru:["Нога с композитом считывает каждый шаг на нижних палубах как отдельную структурную вибрационную сигнатуру — она каталогизирует 315 биологических присутствий без его указания","Надежда и ненависть как механизм: он завербовал второй тип не из предпочтения а потому что производит более последовательный вывод в сложных условиях","«Я также знаю что управляю собой тем же механизмом которым управляю ими». Он сказал это в частном. Он не сказал Силасу."]},
     misunderstands:{en:["'I know I am using it deliberately. I know the people I am using it on.' He has named all three parts of the self-awareness: the mechanism, the deliberateness, the people. He has not named the fourth: what the mechanism is being used for beyond the operational objective. In twenty chapters the operational objective has been stated correctly each time — iron peak, sector 13, Valeria, the Island, the takeover. The operational objective is always accurate and always incomplete. The incomplete part is what the mechanism is building toward. He has not named this."],ru:["«Я знаю что использую его намеренно. Я знаю людей которых использую». Он назвал все три части самосознания: механизм, намеренность, людей. Он не назвал четвёртую: для чего используется механизм сверх операционного объекта. В двадцати главах операционный объект был правильно заявлен каждый раз — Железный Пик, Сектор 13, Валерия, Остров, захват. Операционный объект всегда точен и всегда неполон. Неполная часть — к чему строит механизм. Он не назвал этого."]},
     hides:{en:["He did not say the fourth thing to Silas. He said it in private. In the narration. To whoever reads the narration. This is the first time in twenty chapters that a significant operational truth has been stated in the narration that was explicitly not said to any other character in the scene. He has crossed a threshold in his record-keeping that he has not noted: he is now writing things he is not telling anyone.","The composite is cataloguing 315 biological presences continuously. He noted this as an acoustic observation. He has not noted that the composite is building a map of every person on the ship — their weight, their gait, their stress signatures — and that this map is stored somewhere he does not have conscious access to. He is building an intelligence file on his own crew with his leg, without trying to, and without examining what the leg is doing with the data."],ru:["Он не сказал четвёртую вещь Силасу. Он сказал это в частном. В нарративе. Тому кто читает нарратив. Это первый раз за двадцать глав когда значимая операционная истина была заявлена в нарративе которая явно не была сказана ни одному другому персонажу в сцене. Он пересёк порог в своём ведении записей который не отметил: он теперь пишет вещи которые никому не рассказывает.","Композит каталогизирует 315 биологических присутствий непрерывно. Он отметил это как акустическое наблюдение. Он не отметил что композит строит карту каждого человека на корабле — их вес, походку, сигнатуры стресса — и что эта карта хранится где-то к чему у него нет сознательного доступа. Он строит разведывательный файл на собственный экипаж своей ногой, не пытаясь, и не исследуя что нога делает с данными."]},
     whisper:{en:"He wrote something in the narration that he did not say to Silas: 'I have been managing myself with the same mechanism.' He is now writing things he is not telling anyone. He has not noted this threshold.",ru:"Он написал в нарративе что-то что не сказал Силасу: «я управлял собой тем же механизмом». Теперь он пишет вещи которые никому не рассказывает. Он не отметил этот порог."}
   }
 }
}

const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');c.innerHTML=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}].map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
