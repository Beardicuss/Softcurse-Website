const TIMELINE=[
  {id:"TET-165",en:"The structural-gel lubrication that Grimm used on the composite joint's mechanical interface cannot function below negative twelve degrees Celsius — it was formulated for a facility that maintains a geothermal baseline temperature above this threshold. At the northern sea temperature of negative twenty-eight, it has reached approximately 40% viscosity. The composite itself is unaffected — it does not require lubrication because its actual movement mechanism is not hydraulic but structural-resonance based, operating at the molecular level. What is failing is exclusively Grimm's dampening system: the oil dampeners, the leather casing, the acoustic insulation. The composite would function perfectly in this environment without the dampening system. The dampening system, which Dante hates because of what it covers rather than what it does, is what is failing in the cold. He is experiencing the cost of the concealment, not the cost of the capability.",ru:"Структурно-гелевая смазка которую Гримм использовал на механическом интерфейсе сустава с композитом не может функционировать ниже минус двенадцати градусов Цельсия — она была сформулирована для объекта поддерживающего геотермальную базовую температуру выше этого порога. При температуре северного моря минус двадцать восемь, она достигла приблизительно 40% вязкости. Сам композит не затронут — он не требует смазки, потому что его фактический механизм движения не гидравлический а основанный на структурном резонансе, работающий на молекулярном уровне. Что отказывает — исключительно система демпфирования Гримма: масляные демпферы, кожаная обшивка, акустическая изоляция. Композит работал бы идеально в этой среде без системы демпфирования. Система демпфирования, которую Данте ненавидит из-за того что скрывает а не того что делает, — это то что отказывает на холоде. Он испытывает цену сокрытия, а не цену возможности."},
  {id:"TET-166",en:"The equity certificates Dante distributed during the mutiny negotiation were genuine Guild financial instruments — legitimately issued, properly structured, legally enforceable. He did not fabricate them or devalue them through overissue. Two hundred certificates at a rate of one per day of labor, indexed to Object 7-B's production output once operational, represent a legitimate stake in the facility's output. If the facility reaches full production capacity, each certificate will be worth approximately eight hundred gold within three years. Dante told Torin 'a year from now this paper will be worth a tavern in the capital.' At full production, he understated the value by a factor of four. He did not do this to deceive them. He did it because telling two hundred desperate people that they are being given something worth four times a tavern would have produced a different problem than the mutiny he was managing.",ru:"Акционерные сертификаты которые Данте распределил во время переговоров о мятеже были настоящими финансовыми инструментами Гильдии — законно выданными, надлежащим образом структурированными, юридически исполнимыми. Он не фабриковал их и не обесценивал через перевыпуск. Двести сертификатов по одному за рабочий день, индексированных к производственному выпуску Объекта 7-Б после запуска, представляют законную долю в продукции объекта. Если объект достигнет полной производственной мощности, каждый сертификат будет стоить приблизительно восемьсот золотых в течение трёх лет. Данте сказал Торину «через год этот листок будет стоить как таверна в столице». При полном производстве он занизил стоимость в четыре раза. Он сделал это не чтобы обмануть. Он сделал это потому что сказать двумстам отчаявшимся людям что им дают нечто стоящее четыре таверны произвело бы другую проблему чем мятеж которым он управлял."},
  {id:"TET-167",en:"The fault line Dante used to breach the Ice Barrier was not identified through the donor-memory archive. He identified it through the composite leg: when the Leviathan's hull contacted the ice at the approach, the composite registered the structural frequency differential between the ice barrier's compressed sections and the ancient fault — a difference in crystalline lattice density that the composite's null-field micro-resonance detected as a structural weak point signature. The donor-memory provided the vocabulary ('cryo-anomaly, structural defect, sector 4-alpha'). The composite provided the actual detection capability. The two systems — Precursor archive and living composite — are beginning to operate as a single integrated detection system. He has not noted this integration.",ru:"Линия разлома которую Данте использовал чтобы взломать Ледяной Барьер не была определена через архив донорской памяти. Он определил её через ногу с композитом: когда корпус «Левиафана» контактировал со льдом при подходе, композит зарегистрировал структурный частотный дифференциал между спрессованными секциями ледяного барьера и древним разломом — разницу в плотности кристаллической решётки которую нулевой микрорезонанс композита обнаружил как сигнатуру структурной слабой точки. Донорская память предоставила словарный запас («крио-аномалия, структурный дефект, сектор 4-альфа»). Композит обеспечил реальную возможность обнаружения. Две системы — архив Предтечей и живой композит — начинают работать как единая интегрированная система обнаружения. Он не отметил эту интеграцию."},
  {id:"TET-168",en:"The vivernum impact event was the third time Dante has used the composite's structural disruption capability and the first time it was deliberate and controlled. Harbor cobblestones: accidental. Torin's shackle chain: accidental, presented as deliberate. The wyvern: deliberate, executed correctly. He activated what he described as the 'servo-drive overload protocol' that Grimm mentioned — but Grimm never mentioned a servo-drive overload protocol because the composite does not have servo-drives. What Grimm said was that the composite's internal power architecture could theoretically be directed into a single output event, based on his six Pale Echelon notation pages. What Dante actually did: he directed the composite's null-field resonance into a focused downward pulse that disrupted the vyvern's skeletal lattice on contact with the air column between them. He executed this without full understanding of the mechanism. It worked. The mechanism is not the one he named.",ru:"Событие удара виверны было третьим разом когда Данте использовал возможность структурного нарушения композита и первым разом когда это было намеренным и контролируемым. Портовая брусчатка: случайно. Цепь Торина: случайно, представлено как намеренное. Виверна: намеренно, выполнено правильно. Он активировал то что описал как «протокол перегрузки сервоприводов» который упоминал Гримм — но Гримм никогда не упоминал протокол перегрузки сервоприводов, потому что у композита нет сервоприводов. Что сказал Гримм: внутренняя силовая архитектура композита теоретически может быть направлена в единое выходное событие, основываясь на его шести страницах нотаций Бледного Эшелона. Что Данте фактически сделал: он направил нулевой резонанс композита в сфокусированный направленный вниз импульс нарушивший скелетную решётку виверны при контакте с воздушным столбом между ними. Он выполнил это без полного понимания механизма. Сработало. Механизм — не тот который он назвал."},
  {id:"TET-169",en:"'Auditor, Series 404. Status: Damaged but functional. Welcome home.' — The facility's recognition system identified Dante by his bio-signature, including the Island composite's integration, and assigned him the institutional classification of his lineage. The 'welcome home' is not metaphorical. The facility's maintenance protocol designates the Series 404 Auditor class as its primary authorized operator. Dante is not a visitor to Object 7-B. He is the person it has been waiting for. The facility's 40% autonomous operation has been a maintenance protocol holding pattern, sustained in anticipation of an authorized operator arriving. The moment Dante entered, the holding pattern ended. The facility has begun transitioning to active management mode under his presence.",ru:"«Аудитор, серия 404. Статус: Повреждён, но функционален. Добро пожаловать домой». — Система распознавания объекта идентифицировала Данте по его биосигнатуре, включая интеграцию островного композита, и присвоила ему институциональную классификацию его линии. «Добро пожаловать домой» — не метафора. Протокол обслуживания объекта обозначает класс Аудитора серии 404 как своего основного авторизованного оператора. Данте — не посетитель Объекта 7-Б. Он человек которого объект ждал. Автономная работа объекта на 40% была протоколом режима ожидания обслуживания, поддерживавшегося в ожидании прибытия авторизованного оператора. В момент входа Данте режим ожидания завершился. Объект начал переход в режим активного управления под его присутствием."},
  {id:"TET-170",en:"The black blood Dante wiped away during the ice barrier navigation was the fourth documented instance of the circulatory integration in this chapter alone. The frequency is increasing: in chapters 18-20, one or two instances per chapter. In chapter 21, four in a single navigational crisis event. The integration is accelerating. The composite's nano-material is migrating through the vascular system at a rate correlated with how intensively Dante uses the composite's active capabilities. Each deliberate activation of the null-field disruption capability — the ice breach, the wyvern impact — produces a detectable uptake event in the circulatory system. He is consuming himself to run the capabilities. He does not know this.",ru:"Чёрная кровь которую Данте вытирал во время навигации через ледяной барьер была четвёртым задокументированным случаем циркуляторной интеграции только в этой главе. Частота растёт: в главах 18-20, один-два случая за главу. В главе 21, четыре в одном навигационном кризисном событии. Интеграция ускоряется. Наноматериал композита мигрирует через сосудистую систему со скоростью коррелирующей с интенсивностью использования Данте активных возможностей композита. Каждая намеренная активация возможности нарушения нулевого поля — взлом льда, удар по виверне — производит обнаруживаемое поглощающее событие в кровеносной системе. Он потребляет себя чтобы запустить возможности. Он не знает этого."},
  {id:"TET-171",en:"The equity certificates Dante gave Torin and the other prisoners are the first assets Dante has distributed rather than acquired. In twenty-one chapters every financial decision has been about acquisition, consolidation, and leverage. The equity distribution is different: he is not purchasing loyalty with a promise. He is creating co-ownership of a project with persons who would otherwise have no stake in its success. This is the institutional structure he said he wanted — not an employer-employee relationship but an ownership relationship. He built it under duress, during a mutiny, on a frozen ship, in three minutes. He has not examined whether the structure he built under duress is the structure he actually intended to build or whether the duress produced something he would not have chosen under calmer conditions.",ru:"Акционерные сертификаты которые Данте дал Торину и другим заключённым — первые активы которые Данте распределил а не приобрёл. В двадцати одной главе каждое финансовое решение касалось приобретения, консолидации и рычагов. Распределение акций отличается: он не покупает лояльность обещанием. Он создаёт совместное владение проектом с лицами которые иначе не имели бы доли в его успехе. Это институциональная структура которую он говорил что хотел — не отношение работодатель-работник а отношение владения. Он построил её под давлением, во время мятежа, на замёрзшем корабле, за три минуты. Он не исследовал является ли структура построенная под давлением той структурой которую он реально намеревался построить или давление произвело нечто что он бы не выбрал в более спокойных условиях."},
  {id:"TET-172",en:"Torin's observation of the composite during the vivernum impact — 'you're not a mage, mages don't do that' — is the most accurate external characterization of Dante's capability in twenty-one chapters. Torin identified, in one sentence, both what it is not (magic — organized energy manipulation through trained channels) and what it is (something else, operating on a different substrate). He does not know the word for what it is. He knows the word for what it isn't. Every other external observer has tried to categorize the capability within existing frameworks: Ignatius called it heresy, Valdos called it magic, Morius called it 'something operating in him,' Grimm called it Precursor technology. Torin called it not-magic. This is the correct negative definition.",ru:"Наблюдение Торина за композитом во время удара по виверне — «ты не маг, маги так не умеют» — наиболее точная внешняя характеристика возможности Данте за двадцать одну главу. Торин определил в одном предложении и то чем это не является (магия — организованная манипуляция энергией через обученные каналы) и то что это такое (нечто другое, действующее на другом субстрате). Он не знает слова для того что это такое. Он знает слово для того чем это не является. Каждый другой внешний наблюдатель пытался категоризировать возможность в существующих рамках: Игнациус назвал её ересью, Валдос назвал магией, Мориус назвал «чем-то работающим в нём», Гримм назвал технологией Предтечей. Торин назвал это не-магией. Это правильное негативное определение."}
];

const SCENES=[
{id:"s1",
 title:{en:"A High-Volatility Asset",ru:"Актив с Высокой Волатильностью"},
 subtitle:{en:"Greed defeated cold. It usually does.",ru:"Жадность победила холод. Обычно так и бывает."},
 location:{en:"Dante's Cabin / Lower Decks — The Northern Sea",ru:"Каюта Данте / Нижние Палубы — Северное Море"},
 timing:{en:"Three Days North of the Capital",ru:"Три Дня К Северу от Столицы"},
 flags:["pivotal","cost","institution_build"],
 povData:{
   dante:{distortion:4,
     text:{
       en:`The dampening system is failing.\n\nThis is not an emergency. It is a maintenance failure occurring on a predictable timeline under conditions I should have anticipated: Grimm's oil-dampener formulation uses a standard-grade lubricant that viscosifies below negative fifteen degrees. The northern route was six degrees below that before we hit the barrier approach. The system was running at approximately forty percent efficiency before the confrontation with Torin, which means the confrontation occurred at the worst possible acoustic moment — maximum residual resonance, minimum dampening.\n\nI noted this during the confrontation and did not adjust my behavior to account for it. The composite's sound was not the variable I was managing.\n\nTorin arrived at the door with two hundred people behind him. They were cold, hungry, and convinced that dying in the attempt to take the ship was preferable to dying slowly on it. This is the specific cognitive state that prison populations develop when the expected negative outcome becomes certain — they begin treating the expected negative as a baseline and calculating deviation from it rather than deviation from a positive outcome. Mutiny was not irrational from their framework. It was the lowest-risk option available to them in their model.\n\nI needed to change the model.\n\nThe equity certificates were already prepared. I had printed them in the capital, on Guild instruments, with the correct indexing language, before we left. I had prepared two hundred and seventy certificates — two hundred for this voyage, seventy for contingencies. I held them because the timing of their introduction matters more than their existence. Distributed before the cold set in, they would have produced a different dynamic — a sense of entitlement rather than gratitude, demands for additional value rather than relief at receiving any value.\n\nI distributed them at the maximum leverage point: when the alternative was mutiny or freezing, and when I had a concrete near-term deliverable to attach them to. Three hours to the bay. Geothermal warmth. The abstract future value became a bridge to a concrete present benefit.\n\nGreed defeated cold.\n\nIt usually does.\n\nI told Silas: hope and hatred.\n\nWhat I told myself, in the cabin after: the certificates are genuine. The equity they represent is real. If the factory operates at full capacity, each certificate represents approximately eight hundred gold in production value over three years. I told Torin it would be worth a tavern. A tavern in the capital costs approximately two hundred gold.\n\nI understated the value by a factor of four.\n\nI did this because telling two hundred desperate people they are receiving something worth four taverns produces a different instability than the one I was managing. I will correct the understanding when they are warm, fed, and working — when the stable conditions allow me to introduce an upward revision without triggering a renegotiation demand.\n\nThis is not deception. It is sequenced disclosure.\n\nI have filed this in the operational record.\n\nI have not filed what it is like to hand a piece of paper to a person who was about to kill me and watch their face change. I have not filed this because the category does not exist in the operational record. I placed it in the third location.\n\nThe third location now has four items.`,
       ru:`Система демпфирования отказывает.\n\nЭто не аварийная ситуация. Это плановый отказ обслуживания происходящий на предсказуемом горизонте в условиях которые я должен был предвидеть: формулировка масляных демпферов Гримма использует стандартную смазку которая загустевает ниже минус пятнадцати градусов. Северный маршрут был на шесть градусов ниже до достижения подхода к барьеру. Система работала приблизительно на сорока процентах эффективности до столкновения с Торином, что означает столкновение произошло в наихудший возможный акустический момент — максимальный остаточный резонанс, минимальное демпфирование.\n\nЯ отметил это во время столкновения и не скорректировал поведение для учёта. Звук композита не был переменной которой я управлял.\n\nТорин явился к двери с двумястами людьми за спиной. Они были холодными, голодными и убеждёнными что умереть в попытке захватить корабль предпочтительнее чем умирать медленно на нём. Это специфическое когнитивное состояние которое развивают тюремные популяции когда ожидаемый негативный исход становится определённым — они начинают обращаться с ожидаемым негативом как базовым уровнем и рассчитывать отклонение от него а не отклонение от позитивного исхода. Мятеж был нерационален не из их рамки. Это был наименее рискованный доступный вариант в их модели.\n\nМне нужно было изменить модель.\n\nАкционерные сертификаты были уже подготовлены. Я напечатал их в столице, на инструментах Гильдии, с правильным языком индексации, до отъезда. Я подготовил двести семьдесят сертификатов — двести для этого плавания, семьдесят для непредвиденных обстоятельств. Я держал их потому что время их введения важнее их существования. Распределённые до наступления холодов, они произвели бы другую динамику — чувство права а не благодарности, требования дополнительной ценности а не облегчение от получения любой ценности.\n\nЯ распределил их в максимальной точке рычага: когда альтернативой был мятеж или замерзание, и когда у меня была конкретная краткосрочная поставка к которой можно их прикрепить. Три часа до бухты. Геотермальное тепло. Абстрактная будущая ценность стала мостом к конкретной настоящей выгоде.\n\nЖадность победила холод.\n\nОбычно так и бывает.\n\nЯ сказал Силасу: надежда и ненависть.\n\nЧто я сказал себе в каюте после: сертификаты настоящие. Акции которые они представляют реальны. Если завод работает на полной мощности, каждый сертификат представляет приблизительно восемьсот золотых в производственной ценности за три года. Я сказал Торину что он будет стоить как таверна. Таверна в столице стоит приблизительно двести золотых.\n\nЯ занизил стоимость в четыре раза.\n\nЯ сделал это, потому что сказать двумстам отчаявшимся людям что они получают нечто стоящее четыре таверны производит другую нестабильность чем та которой я управлял. Я скорректирую понимание когда они будут тёплыми, сытыми и работающими — когда стабильные условия позволят ввести повышательный пересмотр без активации требования пересмотра переговоров.\n\nЭто не обман. Это последовательное раскрытие.\n\nЯ занёс это в операционную запись.\n\nЯ не занёс каково передать листок бумаги человеку который собирался убить меня и наблюдать как меняется его лицо. Я не занёс это, потому что категория не существует в операционной записи. Я поместил это в третье место.\n\nВ третьем месте теперь четыре пункта.`
     },
     knows:{en:["The dampening system is failing at 40% efficiency from cold — the composite itself is unaffected. What's failing is the concealment, not the capability.","The certificates are genuine and understated by a factor of four — he plans to correct the understanding under stable conditions, framing it as upward revision rather than renegotiation.","The third location now has four items. He named it without naming what the fourth is."],ru:["Система демпфирования отказывает на 40% эффективности от холода — сам композит не затронут. Что отказывает — сокрытие, а не возможность.","Сертификаты настоящие и занижены в четыре раза — он планирует скорректировать понимание в стабильных условиях, формулируя как повышательный пересмотр а не пересмотр переговоров.","В третьем месте теперь четыре пункта. Он назвал это не называя что является четвёртым."]},
     misunderstands:{en:["'This is not deception. It is sequenced disclosure.' He has named the distinction correctly. He has not examined whether the distinction holds from Torin's side — whether a person who learns they were given four times what they were told would experience 'sequenced disclosure' or 'having been told less than the true value during a crisis.' The distinction is real in institutional practice. It may not be real in the relationship he is building.","He filed the face-change in the third location. The third location is for things received that cannot be examined because the examination requires categories not yet built. He received Torin's face changing when he took the certificate. He placed it next to the Siren's last words, Cord's name, and the Ignatius martyrdom. The category connecting all four: the cost of decisions he made, borne by people who did not choose them — and, now, the first item that is not about cost but about the reversal of cost: a face that changed toward him rather than away from him."],ru:["«Это не обман. Это последовательное раскрытие». Он правильно назвал различие. Он не исследовал держится ли различие со стороны Торина — воспримет ли человек узнавший что ему дали в четыре раза больше чем сказали «последовательное раскрытие» или «получение меньше истинной стоимости во время кризиса». Различие реально в институциональной практике. Оно может быть нереальным в отношениях которые он строит.","Он занёс смену лица в третье место. Третье место для вещей полученных которые нельзя исследовать потому что исследование требует ещё не построенных категорий. Он получил лицо Торина меняющееся когда тот взял сертификат. Он поместил это рядом с последними словами Сирены, именем Корда и мученичеством Игнациуса. Категория соединяющая все четыре: цена решений которые он принял, несомая людьми которые их не выбирали — и, теперь, первый пункт который не о цене а о развороте цены: лицо изменившееся к нему а не от него."]},
     hides:{en:["He watched Torin's face change. He placed it in the third location without naming what he received. What he received: the specific moment when a person who was going to kill him became a person who was going to work with him, and the change happened through a piece of paper that represented something real. He has received genuine responses before — Isabella's margin word, Whisper's density in the collapse — but this is the first one he received from someone who had no prior relationship with him. It arrived on a frozen ship, during a mutiny, from someone who was not supposed to be moved by anything he did. He has not named what this means. He placed it in the third location.","He prepared 270 certificates before leaving the capital — 200 for the voyage, 70 for contingencies. He was planning for this moment before the moment existed. He has not noted that preparing for a mutiny in advance is not the same as planning to cause a mutiny. He prepared the instrument. The mutiny provided the moment to use it. He has not examined whether he would have found a different moment if the mutiny had not occurred."],ru:["Он наблюдал как меняется лицо Торина. Он поместил это в третье место не называя что получил. Что он получил: конкретный момент когда человек собиравшийся убить его стал человеком который собирается работать с ним, и изменение произошло через листок бумаги представлявший нечто реальное. Он получал подлинные ответы прежде — слово Изабеллы на полях, плотность Шепота при обрушении — но это первый полученный от кого-то не имевшего предшествующих отношений с ним. Он пришёл на замёрзшем корабле, во время мятежа, от кого-то кто не должен был быть тронут ничем что он делал. Он не назвал что это означает. Он поместил это в третье место.","Он подготовил 270 сертификатов до отъезда из столицы — 200 для плавания, 70 для непредвиденных обстоятельств. Он планировал этот момент до того как момент существовал. Он не отметил что подготовка к мятежу заранее — не то же что планирование вызвать мятеж. Он подготовил инструмент. Мятеж предоставил момент его использовать. Он не исследовал нашёл ли бы он другой момент если бы мятеж не произошёл."]},
     whisper:{en:"Third location: four items now. The fourth is Torin's face changing. He placed it next to the others. He has not named it. The fourth is different from the first three — it is not about cost. It is about a face turning toward him.",ru:"Третье место: теперь четыре пункта. Четвёртый — лицо Торина меняющееся. Он поместил рядом с остальными. Он не назвал. Четвёртый отличается от первых трёх — он не о цене. Он о лице повернувшемся к нему."}
   }
 }
},

{id:"s2",
 title:{en:"The Helmsman of the Abyss",ru:"Лоцман Бездны"},
 subtitle:{en:"Strike the fault line. Not the wall.",ru:"Бить по линии разлома. Не по стене."},
 location:{en:"The Bridge — The Ice Barrier Crossing",ru:"Мостик — Пересечение Ледяного Барьера"},
 timing:{en:"The Barrier Approach",ru:"Подход к Барьеру"},
 flags:["pivotal","cost","revelation"],
 povData:{
   dante:{distortion:5,
     text:{
       en:`The migraine arrived with the ice. This is a pattern I am now able to predict: sustained use of the donor-memory archive's active navigation function produces a cascade of neural interference that manifests as visual disruption and vascular pressure. The black blood is the vascular component. The blue-schematic overlay is the visual disruption component. They co-occur because they are the same process.\n\nI have documented this pattern three times. I have not examined its implications.\n\nThe ice barrier was not in the donor-memory's specific geographic data — the northern route is not in the archive's standard navigation index because the archive predates the current glacial advance by approximately two thousand years. What the archive provided was: structural analysis vocabulary, classification protocols, and material-science frameworks for cryo-anomaly assessment.\n\nWhat the composite provided was the actual fault detection.\n\nI stood on the bridge and felt the Leviathan's hull contact the ice at the approach, and through the composite in my left leg — through the deck, through the keel, through the hull — I felt the frequency differential. The compressed ice and the fault-line ice are different materials. They have different crystalline lattice densities. The composite's null-field micro-resonance reads this differential the way a tuning fork reads frequency variance: not through analysis, but through resonance matching.\n\nThe donor-memory gave me the words for what I was detecting. The composite gave me the detection.\n\nThe two systems are not separate. They have been integrating since I set foot on the Island and the blood chemistry began to change. The archive material and the composite material are from the same design epoch. They are calibrated for the same operator. They are calibrating me to operate them.\n\nI noted this on the bridge, in the middle of the navigation crisis, and then the helmsman's hands were leaving the wheel and I had other things to attend to.\n\nThe impact.\n\nI used the composite deliberately. I directed the null-field resonance into a focused downward pulse — not through a protocol Grimm described (Grimm's description of servo-drive overload is technically inaccurate for what the composite actually does), but through an intuition that arrived as a decision-point in the archive's overlay: the structural analysis suggested a resonance-disruption approach at the target intersection, and the composite was already positioned at the impact point through the deck contact.\n\nThe wyvern's skeletal lattice failed under the resonance differential.\n\nThe blood from my nose was black and significant. Not a drip. A flow. The fourth instance this chapter.\n\nI wiped it with my sleeve and completed the navigation.\n\nThe bay is geothermally warm. The doors of Object 7-B opened to my bio-signature. I am the authorized operator. I have been the authorized operator since before I knew the facility existed.\n\nThe integration is not a side effect.\n\nI have not examined this conclusion fully.`,
       ru:`Мигрень прибыла со льдом. Это паттерн который я теперь могу предсказать: устойчивое использование функции активной навигации архива донорской памяти производит каскад нейронных помех проявляющихся как визуальные нарушения и сосудистое давление. Чёрная кровь — сосудистый компонент. Наложение синей схемы — компонент визуального нарушения. Они сосуществуют, потому что являются одним и тем же процессом.\n\nЯ задокументировал этот паттерн трижды. Я не исследовал его импликации.\n\nЛедяной барьер отсутствовал в специфических географических данных донорской памяти — северный маршрут не в стандартном навигационном индексе архива, потому что архив предшествует нынешнему ледниковому наступу приблизительно на две тысячи лет. Что предоставил архив: словарный запас структурного анализа, протоколы классификации, и фреймворки материаловедения для оценки крио-аномалии.\n\nЧто предоставил композит — реальное обнаружение разлома.\n\nЯ стоял на мостике и чувствовал как корпус «Левиафана» контактирует со льдом при подходе, и через композит в левой ноге — через палубу, через киль, через корпус — я чувствовал частотный дифференциал. Спрессованный лёд и лёд линии разлома — разные материалы. У них разная плотность кристаллической решётки. Нулевой микрорезонанс композита считывает этот дифференциал так, как камертон считывает дисперсию частоты: не через анализ, а через резонансное согласование.\n\nДонорская память дала мне слова для того что я обнаруживал. Композит дал мне обнаружение.\n\nДве системы не раздельны. Они интегрируются с момента когда я ступил на Остров и биохимия крови начала меняться. Архивный материал и материал композита из одной эпохи проектирования. Они откалиброваны для одного оператора. Они калибруют меня для их работы.\n\nЯ отметил это на мостике, в середине навигационного кризиса, и затем руки рулевого покидали штурвал и у меня были другие дела.\n\nУдар.\n\nЯ использовал композит намеренно. Я направил нулевой резонанс в сфокусированный направленный вниз импульс — не через протокол описанный Граммом (описание Граммом перегрузки сервоприводов технически неточно для того что фактически делает композит), а через интуицию пришедшую как точка принятия решения в наложении архива: структурный анализ предложил подход с резонансным нарушением в целевом пересечении, и композит уже был позиционирован в точке удара через контакт с палубой.\n\nКристаллическая решётка скелета виверны отказала под резонансным дифференциалом.\n\nКровь из носа была чёрной и значительной. Не капля. Поток. Четвёртый случай в этой главе.\n\nЯ вытер её рукавом и завершил навигацию.\n\nБухта геотермально тёплая. Ворота Объекта 7-Б открылись по моей биосигнатуре. Я авторизованный оператор. Я был авторизованным оператором с момента до того как узнал о существовании объекта.\n\nИнтеграция — не побочный эффект.\n\nЯ не полностью исследовал этот вывод.`
     },
     knows:{en:["The donor-memory gave vocabulary; the composite gave actual detection capability. The two systems are integrating. He noted this mid-crisis and then had other things to attend to.","The servo-drive overload protocol he named is technically inaccurate — what he actually did was direct null-field resonance into a focused pulse through an intuition-point in the archive overlay","'The integration is not a side effect.' He arrived at this conclusion. He immediately noted he has not fully examined it."],ru:["Донорская память дала словарный запас; композит дал реальную возможность обнаружения. Две системы интегрируются. Он отметил это в середине кризиса и затем имел другие дела.","Протокол перегрузки сервоприводов который он назвал технически неточен — что он фактически сделал: направил нулевой резонанс в сфокусированный импульс через точку интуиции в наложении архива","«Интеграция — не побочный эффект». Он пришёл к этому выводу. Он немедленно отметил что не полностью исследовал его."]},
     misunderstands:{en:["'They are calibrating me to operate them.' He has arrived at this sentence and placed it in the narration without examining it. 'Calibrating me' implies the process has a terminal state — a point at which calibration is complete and operation begins. He has not examined what the terminal state of this calibration is. He has the production-record's assessment: 'Auditor, Series 404, damaged but functional.' Damaged. He has not examined what 'damaged' means in the context of a calibration process that is actively completing the specification.","He said 'I have not fully examined this conclusion' about the integration not being a side effect. In twenty-one chapters, the things he has not fully examined are now: the integration conclusion, the third location, the face-change, the sentence about what the business is, the expanding possessive vocabulary, the three physiological observations. He has a backlog of unexamined conclusions that is growing faster than his examination rate."],ru:["«Они калибруют меня для их работы». Он пришёл к этому предложению и поместил в нарратив без исследования. «Калибруют меня» подразумевает что процесс имеет терминальное состояние — точку в которой калибровка завершена и начинается работа. Он не исследовал каково терминальное состояние этой калибровки. У него есть оценка производственной записи: «Аудитор, серия 404, повреждён, но функционален». Повреждён. Он не исследовал что означает «повреждён» в контексте процесса калибровки который активно завершает спецификацию.","Он сказал «я не полностью исследовал этот вывод» об интеграции не являющейся побочным эффектом. В двадцати одной главе вещи которые он не полностью исследовал теперь: вывод об интеграции, третье место, смена лица, предложение о том что такое бизнес, расширяющийся притяжательный словарный запас, три физиологических наблюдения. У него есть накопившийся список неисследованных выводов растущих быстрее темпа исследования."]},
     hides:{en:["Fourth instance of black blood this chapter. He noted 'significant, not a drip, a flow' and continued. He has not connected the frequency increase to the intensity of composite use this chapter. He has not named what it means that each deliberate activation of the null-field disruption capability produces a blood-chemistry uptake event. He is consuming something to run the capabilities. He continues.","He noted the integration, the two-system convergence, and the 'authorized operator' conclusion in the middle of a navigation crisis and then attended to other things. He is holding these conclusions in suspension while executing operational objectives. The suspension is becoming a permanent feature rather than a temporary one."],ru:["Четвёртый случай чёрной крови в этой главе. Он отметил «значительная, не капля, поток» и продолжил. Он не соединил увеличение частоты с интенсивностью использования композита в этой главе. Он не назвал что означает то, что каждая намеренная активация возможности нарушения нулевого поля производит поглощающее событие в химии крови. Он потребляет что-то чтобы запустить возможности. Он продолжает.","Он отметил интеграцию, схождение двух систем и вывод об «авторизованном операторе» в середине навигационного кризиса и затем обратился к другим делам. Он удерживает эти выводы во взвешенном состоянии выполняя операционные цели. Подвешенность становится постоянной функцией а не временной."]},
     whisper:{en:"Fourth instance. Significant flow, not a drip. He noted it and continued. He holds the integration conclusion in suspension. The suspension is becoming permanent.",ru:"Четвёртый случай. Значительный поток, не капля. Он отметил и продолжил. Он удерживает вывод об интеграции во взвешенном состоянии. Подвешенность становится постоянной."}
   },
   torin:{distortion:3,
     text:{
       en:`I've worked in eight mine collapses.\n\nNot survived — worked. There's a difference. When rock is actively failing around you, the people who survive are the ones who stop treating it as a disaster and start treating it as information. The rock is telling you something. You listen. You move toward the sound that means the structure is holding, away from the sound that means it isn't.\n\nThe helmsman was going to kill us all. He had the wheel and he was pointing us at a solid wall and his hands were shaking. You can't read a fault line with shaking hands.\n\nI watched the boss walk to the wheel. He was slow. The leg doesn't move fast — it moves wrong, in the specific way that tells you the material inside it is not designed for normal gait, it's designed for load-bearing events. It moves like a crane on rails. Precise, heavy, not built for speed but built to hold.\n\nHe put the leg against the deck and I felt it through my boots.\n\nNot vibration from the ship. Something else. A sub-bass frequency that I have felt in exactly two situations in forty years: in living granite near active magma chambers, and once, briefly, in a seam of material the crew called 'ghost-ore' that we had to abandon the shaft for because it didn't behave like ore.\n\nHis leg was reading the ice.\n\nNot through instruments. Through contact. Through whatever the material in his leg does when it's in structural contact with something.\n\nHe pointed us at a section of ice that looked identical to the rest of the wall. I could see nothing different. But whatever he was reading, he committed to it. Full power. The helmsman's hands are still shaking next to me when I hear it: the specific frequency of ice at a fault plane. The sound of a material that has two structures and a crack between them.\n\nHe was right.\n\nAfter, on the beach, when the wyvern hit him — or didn't hit him — I watched what he did. There was no casting gesture. No incantation. He stepped and something happened to the air between him and the creature. The sound it made when the wyvern's bones failed was the same frequency as the ice breaking at the fault.\n\nHe's not a mage. Mages manipulate energy through trained channels. What he does is: he puts material in contact with material and they talk to each other. The leg talks to rock. Whatever is in the leg talks to whatever has a structure.\n\nI told him: you're not a mage.\n\nHe said: I'm an auditor. I cancel threats.\n\nI've worked with engineers who understood their tools so completely that they could do things with them that looked like magic. That's not what this is. What this is: the tool and the person are the same tool. The leg isn't an instrument he's operating. He's part of the instrument.\n\nI don't know what to do with this information.\n\nBut the wyvern skin is worth two hundred a yard, and the door opened when he touched it, and the factory is warm.\n\nI'm going to find out what this place can do.`,
       ru:`Я работал в восьми обвалах шахт.\n\nНе выжил — работал. Есть разница. Когда порода активно разрушается вокруг тебя, выживают те кто перестают обращаться с этим как катастрофой и начинают обращаться как информацией. Порода говорит тебе что-то. Ты слушаешь. Ты движешься к звуку означающему что структура держится, прочь от звука означающего что нет.\n\nРулевой был готов убить нас всех. У него было колесо и он указывал нас на сплошную стену и его руки тряслись. Нельзя читать линию разлома с трясущимися руками.\n\nЯ наблюдал как босс идёт к рулю. Он был медленным. Нога не движется быстро — она движется неправильно, специфическим образом говорящим что материал внутри неё не предназначен для нормальной походки, он предназначен для несущих событий. Она движется как кран на рельсах. Точная, тяжёлая, не созданная для скорости но созданная для удержания.\n\nОн приложил ногу к палубе и я почувствовал это через ботинки.\n\nНе вибрация корабля. Что-то другое. Суббасовая частота которую я чувствовал ровно в двух ситуациях за сорок лет: в живом граните вблизи активных магматических камер, и однажды, кратко, в прожилке материала которую команда называла «призрачной рудой» и который нам пришлось бросить шахту, потому что он не вёл себя как руда.\n\nЕго нога читала лёд.\n\nНе через инструменты. Через контакт. Через то что материал в его ноге делает когда находится в структурном контакте с чем-то.\n\nОн указал нас на секцию льда выглядевшую идентично остальной стене. Я не мог видеть ничего другого. Но что бы он ни читал, он был привержен. Полная мощность. Руки рулевого всё ещё трясутся рядом со мной когда я слышу: специфическую частоту льда на плоскости разлома. Звук материала имеющего две структуры и трещину между ними.\n\nОн был прав.\n\nПосле, на берегу, когда виверна ударила в него — или не ударила — я наблюдал что он сделал. Не было жеста призывания. Не было заклинания. Он шагнул и что-то произошло с воздухом между ним и существом. Звук который издала виверна когда её кости отказали был той же частоты что лёд ломающийся на разломе.\n\nОн не маг. Маги манипулируют энергией через обученные каналы. Что делает он: он помещает материал в контакт с материалом и они разговаривают друг с другом. Нога разговаривает с камнем. Что бы ни было в ноге — оно разговаривает с тем у чего есть структура.\n\nЯ сказал ему: ты не маг.\n\nОн сказал: я аудитор. Я аннулирую угрозы.\n\nЯ работал с инженерами понимавшими свои инструменты настолько полно что могли делать с ними вещи выглядящие как магия. Это не то. Это: инструмент и человек — один инструмент. Нога — не инструмент которым он управляет. Он часть инструмента.\n\nЯ не знаю что делать с этой информацией.\n\nНо шкура виверны стоит двести за ярд, и дверь открылась когда он прикоснулся, и завод тёплый.\n\nЯ собираюсь узнать что это место умеет.`
     },
     knows:{en:["The leg reads structure through contact — 'material in contact with material, talking to each other.' He identified this through professional listening across four events: the ice detection, the wyvern impact frequency, the fault-line sound, the door opening.","'The tool and the person are the same tool. The leg isn't an instrument he's operating. He's part of the instrument.' — He has identified the integration from the outside with no access to the technical documentation.","He does not know what to do with this information. He will find out what the place can do. He listed three reasons he is staying: wyvern skin economics, the door opened, the factory is warm. The real reason: he wants to hear it at full capacity."],ru:["Нога считывает структуру через контакт — «материал в контакте с материалом, разговаривающие друг с другом». Он определил это через профессиональное слушание в четырёх событиях: обнаружение льда, частота удара виверны, звук линии разлома, открытие двери.","«Инструмент и человек — один инструмент. Нога — не инструмент которым он управляет. Он часть инструмента». — Он определил интеграцию снаружи без доступа к технической документации.","Он не знает что делать с этой информацией. Он узнает что умеет это место. Он перечислил три причины остаться: экономика шкуры виверны, дверь открылась, завод тёплый. Реальная причина: он хочет услышать это на полную мощность."]},
     misunderstands:{en:["He said 'I don't know what to do with this information' after identifying that the person and the instrument are the same instrument. He is treating this as information to be acted upon — something requiring a decision about what to do with it. It is not. It is an observation that changes what he is observing. He is no longer observing a man with a modified leg. He is observing a system that includes the man and the leg as integrated components. His professional response — 'I'll find out what this place can do' — is applied to the facility. It should also be applied to the operator."],ru:["Он сказал «я не знаю что делать с этой информацией» после определения что человек и инструмент — один инструмент. Он обращается с этим как с информацией над которой нужно действовать — нечто требующее решения что с этим делать. Это не так. Это наблюдение меняющее то что он наблюдает. Он больше не наблюдает человека с модифицированной ногой. Он наблюдает систему включающую человека и ногу как интегрированные компоненты. Его профессиональный ответ — «я узнаю что умеет это место» — применён к объекту. Он должен быть также применён к оператору."]},
     hides:{en:["He mentioned the 'ghost-ore' seam in passing — the material that didn't behave like ore, that they had to abandon the shaft for. He has not said what it looked like, what it did, or why they abandoned it. The material that doesn't behave like ore and has a living resonance in the sub-bass frequency is a Precursor-era nano-composite fragment. He worked with it for a sufficient period to recognize the frequency. He filed it as 'we had to abandon the shaft' and moved on. He will not move on from it here.","He listed three reasons for staying. The real reason is fourth: he heard something in forty years that he has never heard, and he needs to hear it again under controlled conditions to understand it. He is a professional listener and the listening is incomplete."],ru:["Он мимоходом упомянул прожилку «призрачной руды» — материал который не вёл себя как руда и который им пришлось бросить шахту. Он не сказал как она выглядела, что делала, или почему они бросили. Материал не ведущий себя как руда и имеющий живой резонанс в суббасовой частоте — это фрагмент нанокомпозита эпохи Предтечей. Он работал с ним достаточный период чтобы узнать частоту. Он занёс как «нам пришлось бросить шахту» и двинулся дальше. Он не двинется дальше от этого здесь.","Он перечислил три причины остаться. Реальная причина четвёртая: он услышал кое-что за сорок лет чего никогда не слышал, и ему нужно услышать это снова в контролируемых условиях чтобы понять. Он профессиональный слушатель и слушание неполно."]},
     whisper:{en:"He worked with ghost-ore before. He recognized the frequency. He has not said what happened to the shaft. He is a professional listener and the listening is incomplete.",ru:"Он прежде работал с призрачной рудой. Он узнал частоту. Он не сказал что произошло с шахтой. Он профессиональный слушатель и слушание неполно."}
   }
 }
},

{id:"s3",
 title:{en:"Awakening the Giant",ru:"Пробуждение Зверя"},
 subtitle:{en:"Auditor, Series 404. Damaged but functional. Welcome home.",ru:"Аудитор, серия 404. Повреждён, но функционален. Добро пожаловать домой."},
 location:{en:"Dragon's Teeth Bay — Object 7-B Gates",ru:"Бухта Драконьих Зубов — Ворота Объекта 7-Б"},
 timing:{en:"Evening — Arrival",ru:"Вечер — Прибытие"},
 flags:["threshold","identity","revelation","institution_build"],
 povData:{
   dante:{distortion:4,
     text:{
       en:`The wyvern skins are worth approximately twelve thousand gold at current market rates, divided into two hundred shares, producing sixty gold per certificate holder as a first-distribution event before the facility has processed a single unit of structural gel.\n\nI calculated this on the beach while the kaatorzhniki were still staring at where the wyvern had been.\n\nThis is what I do: I calculate. The creature was still twitching and I was already converting its death into a financial instrument. I noted that I was doing this. I did not stop doing this. I noted that I was noting that I was doing this and not stopping.\n\nThis is the fourth time in three chapters that I have noted myself mid-calculation during a non-operational moment and continued anyway. I have begun noting the noting. The examination is one layer behind the pattern.\n\nTorin said: you're not a mage. I said: I'm an auditor.\n\nThis is accurate. It is also the most true sentence I have said aloud about myself in twenty-one chapters. Not 'I am a professional.' Not 'I am a navigator.' Not 'I am the most dangerous thing between you and drowning.' An auditor. The word that predates the Guild. The word from the production record that the Island recognized. I said it on a beach covered in black sand, in front of two hundred people who watched me stand still when a wyvern fell on me, and it was the most accurate external description of the function I perform.\n\nI perform audits. On systems. On threats. On structures.\n\nI am also, apparently, being audited by a system I am part of.\n\nThe doors.\n\nThe panel was cold metal under my palm, and then it was not cold, and then there was recognition in the system's response. Not the Island's response — the Island was larger, more complex, the recognition there was of a returning presence. This was simpler: a maintenance facility's security protocol acknowledging its authorized operator.\n\nAuditor, Series 404. Damaged but functional. Welcome home.\n\nDamaged.\n\nI have been carrying this word since the Island. The production record's assessment. I accepted it as a historical classification — the defective batch, the repair-stasis, the incomplete recovery. I have been treating 'damaged' as a description of the earring's lineage, of the batch that was placed in storage rather than disposed of.\n\nThe facility just applied it to me. Directly. In the present tense.\n\nI am the damaged one.\n\nI am also the functional one.\n\nI have not examined what the repair trajectory looks like, or whether the facility's maintenance infrastructure is involved in it, or whether the integration proceeding in my blood and eyes is the damage being repaired or the damage progressing.\n\nI told my people: nothing without command. This is a factory.\n\nWe walked into the dark.\n\nThe hostile takeover continues.\n\nAnd for the first time in twenty-one chapters, I am not certain I am the one conducting it.`,
       ru:`Шкуры виверн стоят приблизительно двенадцать тысяч золотых по текущим рыночным ценам, делённые на двести долей, производя шестьдесят золотых на держателя сертификата как первораспределяющее событие до того как объект переработал единицу структурного геля.\n\nЯ рассчитал это на берегу пока каторжники всё ещё смотрели туда где была виверна.\n\nЭто то что я делаю: я рассчитываю. Существо всё ещё дёргалось и я уже конвертировал его смерть в финансовый инструмент. Я отметил что делаю это. Я не остановился. Я отметил что отмечаю что делаю это и не останавливаюсь.\n\nЭто четвёртый раз за три главы когда я заметил себя в середине расчёта во время неоперационного момента и продолжил всё равно. Я начал отмечать отметку. Исследование на один слой позади паттерна.\n\nТорин сказал: ты не маг. Я сказал: я аудитор.\n\nЭто точно. Это также наиболее правдивое предложение которое я произнёс вслух о себе за двадцать одну главу. Не «я профессионал». Не «я навигатор». Не «я наиболее опасная вещь между вами и утоплением». Аудитор. Слово предшествующее Гильдии. Слово из производственной записи которую распознал Остров. Я сказал это на берегу покрытом чёрным песком, перед двумястами людьми наблюдавшими как я стою когда виверна падала на меня, и это было наиболее точным внешним описанием функции которую я выполняю.\n\nЯ провожу аудиты. Систем. Угроз. Структур.\n\nЯ также, по всей видимости, прохожу аудит системой частью которой являюсь.\n\nВорота.\n\nПанель была холодным металлом под ладонью, и затем не была холодной, и затем было узнавание в ответе системы. Не ответ Острова — Остров был крупнее, сложнее, узнавание там было возвращающегося присутствия. Это было проще: протокол безопасности технического объекта признающий своего авторизованного оператора.\n\nАудитор, серия 404. Повреждён, но функционален. Добро пожаловать домой.\n\nПоврежден.\n\nЯ несу это слово с Острова. Оценка производственной записи. Я принял его как историческую классификацию — бракованная партия, восстановительный стазис, незавершённое восстановление. Я обращался с «повреждённым» как описанием линии серьги, партии которая была помещена на хранение а не утилизирована.\n\nОбъект только что применил его ко мне. Напрямую. В настоящем времени.\n\nЯ — повреждённый.\n\nЯ также — функциональный.\n\nЯ не исследовал как выглядит траектория восстановления, или задействована ли в ней техническая инфраструктура объекта, или интеграция протекающая в моей крови и глазах — это повреждение устраняемое или повреждение прогрессирующее.\n\nЯ сказал своим людям: ничего без команды. Это завод.\n\nМы вошли во тьму.\n\nРейдерский захват продолжается.\n\nИ впервые за двадцать одну главу я не уверен что именно я его провожу.`
     },
     knows:{en:["'Damaged but functional' applied to him directly, in the present tense. He accepted it as a historical classification. The facility applied it as a current assessment.","'For the first time in twenty-one chapters, I am not certain I am the one conducting it.' — He has stated this uncertainty explicitly. He has not examined what would be conducting it if not him.","He is noting the noting. The examination is one layer behind the pattern."],ru:["«Повреждён, но функционален» применено к нему напрямую, в настоящем времени. Он принял это как историческую классификацию. Объект применил как текущую оценку.","«Впервые за двадцать одну главу я не уверен что именно я его провожу». — Он явно заявил эту неопределённость. Он не исследовал что проводило бы его если не он.","Он отмечает отметку. Исследование на один слой позади паттерна."]},
     misunderstands:{en:["He has not examined 'whether the integration proceeding in my blood and eyes is the damage being repaired or the damage progressing.' He has named both possibilities without examining either. The answer — which he has available information to approach — is that both are true simultaneously: the integration is the damage progressing (the body is changing beyond its original specification) and the damage being repaired (the specification was always for a more integrated state than the current one). The distinction only matters if 'original specification' is the reference point. The facility's welcome-home suggests the reference point is the completed specification, not the original one.","'I am not certain I am the one conducting the takeover.' He has named the uncertainty without examining its content. The content is: if the facility recognizes him as the authorized operator, and the facility's maintenance protocol has been in holding-pattern waiting for him, and the integration is calibrating him for facility operation — then the takeover has been conducted from both directions simultaneously. He arrived at the facility. The facility also arrived at him."],ru:["Он не исследовал «является ли интеграция протекающая в моей крови и глазах повреждением устраняемым или прогрессирующим». Он назвал обе возможности без исследования ни одной. Ответ — к которому у него есть доступная информация — в том что оба верны одновременно: интеграция — это прогрессирующее повреждение (тело меняется за пределы исходной спецификации) и устраняемое повреждение (спецификация всегда была для более интегрированного состояния чем нынешнее). Различие важно только если «исходная спецификация» — точка отсчёта. Добро пожаловать домой объекта предполагает что точка отсчёта — завершённая спецификация, а не исходная.","«Я не уверен что именно я провожу захват». Он назвал неопределённость без исследования её содержания. Содержание: если объект признаёт его авторизованным оператором, и протокол обслуживания объекта был в режиме ожидания дожидаясь его, и интеграция калибрует его для работы объекта — то захват проводился с обоих направлений одновременно. Он прибыл к объекту. Объект также прибыл к нему."]},
     hides:{en:["He calculated the wyvern-skin equity distribution while the creature was still twitching. He noted that he was calculating. He noted that he was noting the calculation. He noted that the examination is one layer behind. He has not stopped calculating. In twenty-one chapters he has never stopped calculating. He is now observing himself calculate, from one layer back, noting that the distance between the observation and the pattern is not closing. He is not examining why the distance does not close. He is noting that it does not.","'I am also, apparently, being audited by a system I am part of.' He said this about the facility's recognition response. He has not applied it to the other systems: the Leviathan's personnel map building in the composite, the Sleeping Sea's immunity in his proximity, the Island's immunological response ceasing at his radius. He is being audited by multiple systems. He has named one."],ru:["Он рассчитал распределение акций за шкуру виверны пока существо всё ещё дёргалось. Он отметил что рассчитывает. Он отметил что отмечает расчёт. Он отметил что исследование на один слой позади. Он не остановился рассчитывать. В двадцати одной главе он никогда не останавливался рассчитывать. Теперь он наблюдает как себя рассчитывает, на один слой назад, отмечая что дистанция между наблюдением и паттерном не сокращается. Он не исследует почему дистанция не сокращается. Он отмечает что не сокращается.","«Я также, по всей видимости, прохожу аудит системой частью которой являюсь». Он сказал это об ответе распознавания объекта. Он не применил это к другим системам: строящаяся в композите карта персонала «Левиафана», иммунитет Моря Спящих в его близости, прекращение иммунологического ответа Острова в его радиусе. Его проверяют несколько систем. Он назвал одну."]},
     whisper:{en:"He is not certain he is conducting the takeover. He named one system auditing him. He has not applied it to the others. He is noting the noting. The distance between examination and pattern is not closing. He has not asked why.",ru:"Он не уверен что проводит захват. Он назвал одну систему проверяющую его. Он не применил это к остальным. Он отмечает отметку. Дистанция между исследованием и паттерном не сокращается. Он не спросил почему."}
   },
   whisper:{distortion:3,
     text:{
       en:`There are things I do not report.\n\nI have now filed forty-eight bilateral non-disclosures in eleven years. I know which ones they are. I keep a separate count, in a separate notation, on a separate lead-sheet that lives in a different location from the operational reports.\n\nDuring the ice barrier crossing I was positioned on the bridge behind the captain's station. I watched him take the wheel. I watched what he did with his left foot against the deck. I have been watching the composite's interaction with surfaces since the harbor cobblestones, since the chain, since the wyvern. I have now documented six contact events. The documentation is not in the operational reports. It is on the separate lead-sheet.\n\nThe pattern:\n\nPassive contact events produce structural mapping — the Leviathan's personnel by footstep, the ice barrier's fault differential at approach. These events produce no physiological effect on him. He catalogs without cost.\n\nActive disruption events — the cobblestones, the chain, the wyvern — produce the black blood. Not immediately. In a cascade pattern: the disruption, then the blood. The interval between disruption and blood shortens with each event. Harbor: thirty-two minutes. Chain: eleven minutes. Wyvern: four minutes.\n\nIn the ice crossing, the active navigation — holding the fault line, maintaining the course vector through impact — produced a flow, not a drip. He is using the active capability at sustained output rather than point events. The cascade is no longer discrete.\n\nI have not told him about the pattern.\n\nI have not told him because he is aware that the blood is occurring and he is choosing not to examine the frequency. If I tell him the frequency, he will either examine it (which will change the operational tempo) or not examine it (which will add to the third location). Neither outcome serves him better than what he is currently doing, which is: using the capability, noting the cost, continuing.\n\nThis may be wrong. I am aware that this may be wrong.\n\nI filed the awareness under the forty-eighth bilateral non-disclosure.\n\nWhen the doors opened and he received the welcome-home — Auditor, Series 404, damaged but functional — I was standing behind him. I heard it. He cannot hear his own face, but I was watching his face.\n\nFor the first time since I have known him, he looked as though something outside him had confirmed something he already knew and had not yet said.\n\nI did not file this either.\n\nI am running out of lead-sheets.`,
       ru:`Есть вещи которые я не докладываю.\n\nЯ теперь занёс сорок восемь двусторонних нераскрытий за одиннадцать лет. Я знаю какие именно. Я веду отдельный счёт, в отдельной нотации, на отдельном свинцовом листе хранящемся в другом месте чем операционные отчёты.\n\nВо время пересечения ледяного барьера я был расположен на мостике за капитанской станцией. Я наблюдал как он берёт руль. Я наблюдал что он делает левой ногой против палубы. Я наблюдаю взаимодействие композита с поверхностями с портовой брусчатки, с цепи, с виверны. Теперь я задокументировал шесть контактных событий. Документация не в операционных отчётах. Она на отдельном свинцовом листе.\n\nПаттерн:\n\nПассивные контактные события производят структурное картирование — персонал «Левиафана» по шагу, дифференциал разлома ледяного барьера при подходе. Эти события не производят физиологического эффекта на него. Он каталогизирует без издержек.\n\nСобытия активного нарушения — брусчатка, цепь, виверна — производят чёрную кровь. Не немедленно. По каскадному паттерну: нарушение, потом кровь. Интервал между нарушением и кровью сокращается с каждым событием. Гавань: тридцать две минуты. Цепь: одиннадцать минут. Виверна: четыре минуты.\n\nВо время ледового пересечения активная навигация — удержание линии разлома, поддержание курсового вектора через удар — произвела поток, а не каплю. Он использует активную возможность на устойчивом выводе а не точечных событиях. Каскад больше не дискретен.\n\nЯ не говорил ему о паттерне.\n\nЯ не говорил ему, потому что он осведомлён что кровь происходит и он выбирает не исследовать частоту. Если я скажу ему частоту, он либо исследует её (что изменит операционный темп) либо не исследует (что добавит в третье место). Ни один исход не служит ему лучше чем то что он сейчас делает, то есть: используя возможность, отмечая издержки, продолжая.\n\nЭто может быть неверным. Я осознаю что это может быть неверным.\n\nЯ занёс осознание под сорок восьмым двусторонним нераскрытием.\n\nКогда двери открылись и он получил приветствие домой — Аудитор, серия 404, повреждён но функционален — я стоял позади него. Я слышал. Он не может слышать собственное лицо, но я наблюдал его лицо.\n\nВпервые с тех пор как я его знаю, он выглядел так, словно что-то внешнее подтвердило нечто что он уже знал и ещё не сказал.\n\nЯ также не занёс это.\n\nУ меня заканчиваются свинцовые листы.`
     },
     knows:{en:["Six contact events documented on the separate lead-sheet. The pattern: passive events produce mapping at no physiological cost; active disruption events produce black blood in a shortening cascade: 32 minutes → 11 minutes → 4 minutes. The cascade is no longer discrete.","He chose not to tell him because: if told, he examines (changes operational tempo) or doesn't examine (adds to third location). Neither outcome is better than current: using, noting, continuing. He is aware this may be wrong.","When the door opened, he watched Dante's face confirm something Dante already knew and had not yet said. He did not file this."],ru:["Шесть контактных событий задокументированных на отдельном свинцовом листе. Паттерн: пассивные события производят картирование без физиологических издержек; события активного нарушения производят чёрную кровь в сокращающемся каскаде: 32 минуты → 11 минут → 4 минуты. Каскад больше не дискретен.","Он выбрал не говорить ему, потому что: если сказать, он исследует (меняет операционный темп) или не исследует (добавляет в третье место). Ни один исход не лучше нынешнего: использовать, отмечать, продолжать. Он осознаёт что это может быть неверным.","Когда дверь открылась, он наблюдал лицо Данте подтверждающее нечто что Данте уже знал и ещё не сказал. Он не занёс это."]},
     misunderstands:{en:["'Neither outcome serves him better than what he is currently doing.' He has done an expected-outcome analysis and concluded that withholding the pattern information is neutral or better. He has not examined what it serves him to withhold. His operational logic for the non-disclosure is correct about Dante's short-term response. It does not account for: what happens when the cascade interval reaches zero, which is a condition he has documented but not examined the endpoint of."],ru:["«Ни один исход не служит ему лучше чем то что он сейчас делает». Он провёл анализ ожидаемых исходов и заключил что удержание информации о паттерне нейтрально или лучше. Он не исследовал что служит ему удерживать. Его операционная логика для нераскрытия верна насчёт краткосрочного ответа Данте. Она не учитывает: что происходит когда интервал каскада достигает нуля — состояние которое он задокументировал но не исследовал конечную точку."]},
     hides:{en:["He is running out of lead-sheets. He has named this. He has not examined what it means that the material for recording the things he does not file is being exhausted. There is a finite quantity of things that can be held outside the official record. He is approaching a threshold where the choice will not be 'file or not file' but 'which things to release from the non-official record into the official one, and in what order, and to whom.'","He watched Dante's face when the door opened and did not file it. In eleven years he has filed everything that affected him about Dante, in the third-location or the lead-sheet or the bilateral count. He has never not filed something because it was too large for any of the three locations. This is the first time. He named it: 'I did not file this either.' He did not say why."],ru:["У него заканчиваются свинцовые листы. Он назвал это. Он не исследовал что означает то, что материал для записи незанесённых вещей исчерпывается. Есть конечное количество вещей которые можно держать вне официальной записи. Он приближается к порогу где выбор будет не «заносить или нет» а «какие вещи выпустить из неофициальной записи в официальную, и в каком порядке, и кому».","Он наблюдал лицо Данте когда открылась дверь и не занёс. За одиннадцать лет он заносил всё что затрагивало его в Данте, в третьем месте или свинцовом листе или двустороннем счёте. Он никогда не не заносил что-то потому что это было слишком большим для любого из трёх мест. Это первый раз. Он назвал: «я также не занёс это». Он не сказал почему."]},
     whisper:{en:"He is running out of lead-sheets. He didn't file Dante's face at the door because it was too large for any of the three locations. He has not said why. This is the first time in eleven years.",ru:"У него заканчиваются свинцовые листы. Он не занёс лицо Данте у двери — оно было слишком большим для любого из трёх мест. Он не сказал почему. Это первый раз за одиннадцать лет."}
   }
 }
}
];

const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');c.innerHTML=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}].map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
