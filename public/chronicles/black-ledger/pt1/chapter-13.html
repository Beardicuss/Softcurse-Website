.d3,.d4,.d5{animation:flicker-soft 14s infinite;}

@keyframes flicker-mid{0%,88%,100%{opacity:1;}90%{opacity:.75;}92%{opacity:.9;}93%{opacity:.68;}94%{opacity:1;}}

const TIMELINE=[
  {id:"TET-101",en:"The 'Passenger' in the lead-shielded hold is not an ordinary siren. She is the last surviving speaker of the Covenant's founding linguistic layer — a constructed voice that was engineered by the Precursor era as the literal key to the Island of Silence's outer barrier. She was discovered three years ago by the Golden Circle's memory-acquisition team, extracted from a population of deep-water resonance-speakers in the southern archipelago, and has been held aboard the Leviathan's precursor vessel since, transferred to this ship when the expedition was finalized. Ignatius does not control her through faith. He controls her through a resonance inhibitor embedded in the blindfold he placed over her eyes — the red-tear painted mark is a suppression sigil. She is not his weapon. She is his prisoner. She sings because it is the only thing she can do with what was done to her.",ru:"«Пассажир» в свинцово-экранированном трюме — не обычная сирена. Она последний выживший носитель основополагающего лингвистического слоя Завета — построенный голос, спроектированный в эпоху Предтечей как буквальный ключ к внешнему барьеру Острова Тишины. Она была обнаружена три года назад командой «Золотого Круга» по получению памяти, извлечена из популяции глубоководных резонансных говорящих в южном архипелаге, и с тех пор удерживается на предшествующем судне «Левиафана», переведённая на этот корабль при окончательном оформлении экспедиции. Игнациус не контролирует её через веру. Он контролирует её через резонансный ингибитор, встроенный в повязку, наложенную на её глаза — отметка с нарисованной красной слезой является подавляющей сигилью. Она не его оружие. Она его пленница. Она поёт, потому что это единственное, что она может сделать с тем, что с ней сделали."},
  {id:"TET-102",en:"The Sea of the Sleeping is exactly what Dante described — a region where an ancient war left permanent ether-scars that produce mass hallucination in exposed populations. What he did not tell the crew is: the hallucinations are not random. They are echoes of the specific psychic trauma of the people who died in that war, imprinted into the local ether-field. The ship is crossing a battlefield. Every person on board is experiencing the death-fear residue of a combatant from an epoch before any current civilization. The matrose who jumped was following a hallucination, but the hallucination was a real memory — just not his.",ru:"Море Спящих именно то, что описал Данте — регион, где древняя война оставила постоянные эфирные шрамы, производящие массовые галлюцинации у подвергшегося воздействию населения. Чего он не сказал команде: галлюцинации не случайны. Они — отражения конкретной психической травмы людей, погибших в той войне, запечатлённые в локальном эфирном поле. Корабль пересекает поле битвы. Каждый человек на борту переживает остаток смертного страха бойца из эпохи до любой нынешней цивилизации. Матрос, прыгнувший за борт, следовал галлюцинации, но галлюцинация была реальным воспоминанием — просто не его."},
  {id:"TET-103",en:"When Dante struck the cane against the deck and released the Silence pulse, it cost him more than he indicated. The exhaustion was not from a single large expenditure of null-field energy — it was from operating as a continuous suppression anchor for three hours while guiding the ship through the Anomaly. The earring's null-field, when actively maintained at suppression rather than passive-idle, draws on a biological resource that is not well-understood by anyone including Dante. The pale face and blackout-adjacent moment were genuine physiological distress. The knee pain on top of it was incidental. What he experienced was equivalent to a body that has been doing sustained load-bearing work at a level above its structural rating.",ru:"Когда Данте ударил тростью о палубу и выпустил импульс Тишины, это обошлось ему дороже чем он показал. Истощение было не от единовременного крупного расхода энергии нулевого поля — оно было от работы непрерывным якорем подавления три часа пока он вёл корабль через Аномалию. Нулевое поле серьги при активном поддержании в режиме подавления, а не пассивного ожидания, черпает биологический ресурс, который никто, включая Данте, не понимает хорошо. Бледность и момент, близкий к обмороку, были реальным физиологическим стрессом. Боль в колене поверх этого была случайной. То, что он испытал, было эквивалентом тела, выполнявшего устойчивую несущую работу на уровне выше структурного предела."},
  {id:"TET-104",en:"Ignatius's whispered 'heresy — useful but unforgivable' was not a private observation. Whisper heard it from the mast shadow. Ignatius knew someone was listening and said it deliberately — it was a message to the shadow, not to himself. He has identified that Dante has an operational partner who is not visible. He does not know who or what the partner is. He knows one is there. The message was: I know you are there. I know what your master is. And I have already made my decision.",ru:"Прошептанное Игнациусом «ересь — полезная, но непростительная» не было частным наблюдением. Шепот услышал это из тени мачты. Игнациус знал что кто-то слушает и сказал это намеренно — это было сообщением тени, а не самому себе. Он определил что у Данте есть оперативный партнёр, который не виден. Он не знает кто или что это. Он знает что кто-то там есть. Сообщение было: я знаю что ты там. Я знаю что такое твой мастер. И я уже принял решение."},
  {id:"TET-105",en:"Valdos saw his old burning ship in the Sea of the Sleeping. This was not a random projection. The war-memory echo imprinted into the Sleeping Sea found in Valdos a matching psychic signature — he has guilt about a ship that burned. The ship is the one he was captaining nineteen years ago when the predecessor-cartographer came aboard and the ship subsequently disappeared in circumstances Valdos has never fully reconciled. The hallucination was showing him an event he witnessed — or caused — that he has never processed. He has filed it in the same category as Dante's ghost familiarity: 'things that happened at sea, before.'",ru:"Валдос видел свой старый горящий корабль в Море Спящих. Это было не случайной проекцией. Отражение военной памяти, запечатлённое в Море Спящих, нашло в Валдосе совпадающую психическую сигнатуру — у него есть вина за сгоревший корабль. Корабль — тот, которым он командовал девятнадцать лет назад, когда предшественник-картограф поднялся на борт и корабль впоследствии исчез при обстоятельствах, которые Валдос никогда полностью не примирил. Галлюцинация показывала ему событие, которому он был свидетелем — или которое он причинил — что он никогда не обрабатывал. Он занёс это в ту же категорию что знакомость-призрак Данте: «вещи случившиеся в море, прежде»."},
  {id:"TET-106",en:"The physical contact Ignatius made with Dante's wrist was the most significant intelligence-gathering event on the ship so far. Through sustained skin contact, Ignatius can perform a deeper structural reading than his ambient perception allows. What he found in those four seconds: the null-field is not centered in Dante's body — it emanates from the left ear. The earring is the source. He now knows what to target if he decides Reduction is necessary. He has not told anyone this. The information is in the same mental archive as his forty years of purchased Memory.",ru:"Физический контакт Игнациуса с запястьем Данте был наиболее значимым событием разведки на корабле на данный момент. Через устойчивый кожный контакт Игнациус может выполнить более глубокое структурное считывание чем позволяет его окружающее восприятие. Что он нашёл за те четыре секунды: нулевое поле не центрировано в теле Данте — оно исходит из левого уха. Серьга — источник. Теперь он знает что нацеливать если решит что Редукция необходима. Он никому не говорил этого. Информация в том же ментальном архиве что его сорок лет купленной Памяти."},
  {id:"TET-107",en:"Dante's plan to reach the Passenger and convert her from weapon to ally contains one correct insight and one significant error. The correct insight: a prisoner who has been blinded and silenced except for weaponized singing will not be loyal to her captors. The significant error: the Passenger does not experience herself as either weapon or prisoner in the categories Dante is using. She is the last speaker of a language that is the literal key to the Covenant. She knows what she is. She has been waiting for someone who can understand what she is. When Dante said 'the blind and mute should stand together,' he was using it as a tactical formulation. She will hear it differently.",ru:"В плане Данте достичь Пассажира и превратить её из оружия в союзника есть одно верное понимание и одна значительная ошибка. Верное понимание: пленник, которого ослепили и заставили молчать кроме оружейного пения, не будет лоялен своим пленителям. Значительная ошибка: Пассажир не воспринимает себя ни оружием, ни пленником в категориях, используемых Данте. Она — последний носитель языка, являющегося буквальным ключом к Завету. Она знает что она такое. Она ждала того, кто сможет понять что она такое. Когда Данте сказал «слепые и немые должны держаться вместе», он использовал это как тактическую формулировку. Она услышит это иначе."},
  {id:"TET-108",en:"The matrose who jumped for the mermaid hallucination was the youngest crew member, age seventeen, on his first deep-water voyage. His name was in the crew manifest Whisper provided. His name was Cord. He had joined the expedition because the Trade League offered two years' wages in advance for any volunteer with deep-water experience. He did not have deep-water experience. He had lied on the application. He had younger siblings in the harbor district. Dante received the manifest. He knows the name. The sea accepted the sacrifice silently. Dante said nothing. He returned to the knee.",ru:"Матрос, прыгнувший за призраком русалки, был самым молодым членом экипажа — семнадцати лет, в своём первом дальневодном плавании. Его имя было в манифесте экипажа, предоставленном Шепотом. Его звали Корд. Он присоединился к экспедиции, потому что Торговая Лига предлагала двухлетнее жалованье авансом любому добровольцу с опытом дальних вод. У него не было опыта дальних вод. Он солгал в заявке. У него были младшие братья и сёстры в портовом районе. Данте получил манифест. Он знает имя. Море приняло жертву молча. Данте ничего не сказал. Он вернулся к колену."}
];

const SCENES=[

/* ─── SCENE 1: THE BELLY OF THE LEVIATHAN ─── */
{id:"s1",
 title:{en:"The Belly of the Leviathan",ru:"Желудок Левиафана"},
 subtitle:{en:"The passenger sings. The cargo breathes. The Auditor rubs his knee.",ru:"Пассажир поёт. Груз дышит. Аудитор разминает колено."},
 location:{en:"Dante's Cabin / Lower Decks — At Sea",ru:"Каюта Данте / Нижние Палубы — В Море"},
 timing:{en:"Evening, First Night Out",ru:"Вечер, Первая Ночь"},
 flags:["field_operation","revelation"],
 povData:{
   dante:{distortion:2,
     text:{
       en:`Sea air and joint fluid do not have a productive relationship. The meteorological conditions aboard this vessel — sustained humidity between seventy and eighty percent, temperature variance across deck levels producing condensation cycles — will make the knee a consistent operational background variable for the duration of the voyage. I have adjusted my morning protocol to include Isabella's compound at a lower dose for anti-inflammatory effect without the opiate component, since I cannot afford reduced perception during active navigation.\n\nWhisper's hold survey confirmed what the lead-crate configuration suggested: the Golden Circle is not coming to excavate artifacts. They are coming to extract a living entity. The binding specifications on those cages are Herald-class containment architecture. Either they know considerably more about what the Island contains than my current working model suggests, or they have been given specifications by someone who does.\n\nThe Passenger.\n\nI heard it from my cabin for approximately twelve minutes before Whisper returned to brief me. Not music in the standard sense — the frequency range included components my ears cannot process directly, but the earring registered them as structural harmonics in a dialect I do not have a full reference set for. It is not siren song in the folklore sense. It is a language. A very old language, and she is speaking it the only way left available to her — through sound rather than symbol, through the body she still has.\n\nThey have taken her eyes. They have taken her writing hand. The Inquisition's technique for silencing communicants who cannot be killed for political reasons: remove the channels, leave the capacity. She can still speak it. She speaks it into the hold, into the dark, because the language requires vocalization to function and stopping would be a kind of death she has decided not to choose.\n\nI know this because I know the language class she is speaking. I do not know it well. I know it the way you know a language you learned at a critical time and have not used since — not the vocabulary, but the grammar. The grammar is familiar because the earring was manufactured in the same epoch as the language's last fluent speakers.\n\nWhisper said: the blind and mute should stand together.\n\nI said it. I meant it tactically. I have not yet fully examined what I meant by it in the other way.`,
       ru:`Морской воздух и суставная жидкость не имеют продуктивных отношений. Метеорологические условия на этом судне — устойчивая влажность между семьюдесятью и восемьюдесятью процентами, перепады температур по уровням палубы производящие циклы конденсации — сделают колено постоянной операционной фоновой переменной на протяжении плавания. Я скорректировал утренний протокол чтобы включить соединение Изабеллы в меньшей дозе для противовоспалительного эффекта без опиатного компонента, поскольку не могу позволить себе сниженное восприятие во время активной навигации.\n\nОбследование трюма Шепотом подтвердило что конфигурация свинцовых ящиков предполагала: «Золотой Круг» приходит не раскапывать артефакты. Они приходят извлечь живую сущность. Спецификации связывания тех клеток — архитектура сдерживания класса Вестников. Либо они знают значительно больше о том, что содержит Остров, чем предполагает моя нынешняя рабочая модель, либо им предоставили спецификации те, кто это знает.\n\nПассажир.\n\nЯ слышал это из своей каюты приблизительно двенадцать минут до возвращения Шепота для брифинга. Не музыка в стандартном смысле — диапазон частот включал компоненты, которые мои уши не могут обработать напрямую, но серьга зарегистрировала их как структурные гармоники в диалекте, для которого у меня нет полного набора ссылок. Это не пение сирены в фольклорном смысле. Это язык. Очень старый язык, и она говорит на нём единственным доступным ей способом — через звук, а не символ, через тело, которое у неё ещё есть.\n\nОни забрали её глаза. Они забрали её пишущую руку. Техника Инквизиции для заставления молчать тех, кого нельзя убить по политическим причинам: убрать каналы, оставить способность. Она ещё может говорить на нём. Она говорит его в трюм, в темноту, потому что язык требует вокализации для функционирования, и останавливаться было бы видом смерти который она решила не выбирать.\n\nЯ знаю это потому что знаю класс языка которым она говорит. Я не знаю его хорошо. Я знаю его так, как знаешь язык, выученный в критическое время и не используемый с тех пор — не словарь, а грамматику. Грамматика знакома, потому что серьга была изготовлена в ту же эпоху что и последние свободно говорящие на этом языке.\n\nШепот сказал: слепые и немые должны держаться вместе.\n\nЯ сказал это. Я имел в виду тактически. Я ещё не полностью исследовал что я имел в виду в другом смысле.`
     },
     knows:{en:["The Passenger is speaking a Precursor-era language through forced vocalization — the earring registered the structural harmonics","The Golden Circle's cage specifications are Herald-class containment architecture — they have been given exact specifications by someone who knows","He knows the language class the Passenger is speaking — the grammar is familiar because the earring was made in the same epoch as its last fluent speakers"],ru:["Пассажир говорит на языке эпохи Предтечей через принудительную вокализацию — серьга зарегистрировала структурные гармоники","Спецификации клеток «Золотого Круга» — архитектура сдерживания класса Вестников: им были предоставлены точные спецификации тем, кто это знает","Он знает класс языка которым говорит Пассажир — грамматика знакома, потому что серьга была изготовлена в ту же эпоху что и её последние свободно говорящие"]},
     misunderstands:{en:["'She can still speak it. She speaks it into the hold, into the dark, because stopping would be a kind of death she has decided not to choose.' He has attributed a decision to her — the decision not to stop. He is correct. What he has not attributed is the other decision inside it: she is speaking the language because she knows what it opens. She has been speaking it into the hold because the hold is part of a ship approaching the Island. She is not surviving. She is navigating.",'"I said it. I meant it tactically. I have not yet fully examined what I meant by it in the other way." The other meaning is not undiscovered. He has deferred examining it because examining it would require him to say something in the second person that he has not said to anyone in the book.'],ru:["«Она всё ещё может говорить на нём. Она говорит его в трюм, в темноту, потому что останавливаться было бы видом смерти который она решила не выбирать». Он приписал ей решение — решение не останавливаться. Он прав. Что он не приписал — другое решение внутри него: она говорит на языке потому что знает что он открывает. Она говорила его в трюм потому что трюм — часть корабля, приближающегося к Острову. Она не выживает. Она навигирует.","«Я сказал это. Я имел в виду тактически. Я ещё не полностью исследовал что я имел в виду в другом смысле». Другой смысл не неоткрыт. Он отложил его исследование, потому что исследование потребовало бы от него сказать что-то во втором лице, что он не говорил никому в книге."]},
     hides:{en:["He knows the language class. He cannot speak it fluently. He knows this is a gap in his operational profile that the Passenger's existence could fill. He has not said this to Whisper. He has said 'reach the Passenger before Ignatius and make her an ally.' He has not said: 'she knows things about the Covenant document that I will need when we reach the Island.'","The matrose named Cord. He is in the manifest. Dante received the manifest. This is the second name in this arc that Dante is carrying without using. He has not examined why he keeps acquiring names he does not deploy."],ru:["Он знает класс языка. Он не может говорить на нём свободно. Он знает это — разрыв в его операционном профиле который существование Пассажира могло бы заполнить. Он не говорил этого Шепоту. Он сказал «достичь Пассажира до Игнациуса и сделать её союзником». Он не сказал: «она знает о документе Завета вещи которые мне понадобятся когда мы достигнем Острова».","Матрос по имени Корд. Он в манифесте. Данте получил манифест. Это второе имя в этом арке которое Данте несёт не используя. Он не исследовал почему продолжает приобретать имена которые не применяет."]},
     whisper:{en:"He knows the grammar of the Passenger's language. The earring was made in the same epoch. He has not examined what he meant by 'the blind and mute should stand together' in the other way.",ru:"Он знает грамматику языка Пассажира. Серьга была изготовлена в ту же эпоху. Он не исследовал что имел в виду под «слепые и немые должны держаться вместе» в другом смысле."}
   }
 }
},

/* ─── SCENE 2: DINNER WITH PREDATORS ─── */
{id:"s2",
 title:{en:"Dinner with Predators",ru:"Ужин с Хищниками"},
 subtitle:{en:"The hand on the wrist. The silence that passed through it.",ru:"Рука на запястье. Тишина, прошедшая через неё."},
 location:{en:"Officers' Mess, The Leviathan",ru:"Кают-Компания, «Левиафан»"},
 timing:{en:"Evening, Day Two",ru:"Вечер, Второй День"},
 flags:["social_combat","pivotal","revelation"],
 povData:{
   dante:{distortion:3,
     text:{
       en:`The table was Valdos's stage: crystal, century wine, stasis-preserved fruit. The crystal was the same cut as the decanter in his cabin — he travels with a matched set, which means he has been expecting to entertain, which means he was expecting the expedition to produce social occasions requiring display. A man who packs crystal for a voyage to an absolute-danger classified island is a man whose imagination has resolved the danger into manageable background before the voyage begins.\n\nI drank from my own flask. The compound in the ship's water supply would have reached this table's vintage. I did not explain this. I noted that Ignatius drank only water — his own, from a sealed vessel he carries. Either he knows about the compound, or he has his own reasons for dietary isolation. Both possibilities are operationally relevant.\n\nIgnatius observed that matrosses were afraid of me — the cessation of gulls, the stilling of wind. He described this accurately. The null-field at idle state does produce a reduction in ambient noise and biological signal in immediate proximity, because it is suppressing the field-resonance that those phenomena are partly responsive to. I am, when operating passively, a local node of quiet. He has been watching this for two days.\n\nI gave him the maps-have-no-soul formulation. He gave me the everything-can-be-burned formulation. Neither of us was speaking to the other. He was warning me. I was noting the warning.\n\nThen the hand.\n\nHe crossed the table and gripped my wrist with a speed that did not correspond to his apparent age. The grip was genuine — structural, not performative. He was reading me. I let him read me for four seconds before I released the null-field through the contact point.\n\nWhat he felt: his own sensory magic went silent. Not suppressed from the outside — silenced at the source. The null-field passed through his technique and deactivated it for the duration of contact. He experienced being without his primary perception for approximately two seconds after the hand-release — the recovery time for his particular technique after null-field contact is slower than he expected. He had not encountered this before. I could tell because he did not move for those two seconds.\n\nI said: cartographers are empty things. I told him not to touch wet ink.\n\nHe smiled. Thin, bloodless lips. The smile of a man who has just confirmed what he needed to confirm.\n\nValeric is correct that Ignatius has his own weapon in the hold. What Valdos does not know is that Ignatius has already decided what category I am. He is not deciding. He has decided. His smile was the smile of a man who is now in the next phase of a protocol he began yesterday.`,
       ru:`Стол был сценой Валдоса: хрусталь, вековое вино, фрукты в стазисе. Хрусталь той же огранки что декантер в его каюте — он путешествует с подобранным набором, что означает он ожидал развлекать, что означает он ожидал что экспедиция создаст социальные поводы требующие демонстрации. Человек, упаковывающий хрусталь для плавания на остров класса абсолютной опасности — человек, чьё воображение разрешило опасность в управляемый фон ещё до начала плавания.\n\nЯ пил из своей фляги. Соединение в судовом водоснабжении могло достигнуть этого стола со старинным вином. Я не объяснил этого. Я отметил что Игнациус пил только воду — свою, из запечатанного сосуда. Либо он знает о соединении, либо у него есть собственные причины для пищевой изоляции. Оба варианта операционно релевантны.\n\nИгнациус наблюдал что матросы боятся меня — прекращение криков чаек, стихание ветра. Он описал это точно. Нулевое поле в режиме ожидания действительно производит уменьшение фонового шума и биологического сигнала в непосредственной близости, потому что подавляет полевой резонанс которому эти явления частично отзывчивы. Я, работая пассивно, — локальный узел тишины. Он наблюдал это два дня.\n\nЯ дал ему формулировку о картах без души. Он дал мне формулировку о том, что всё можно сжечь. Ни один из нас не говорил с другим. Он предупреждал меня. Я отмечал предупреждение.\n\nПотом рука.\n\nОн пересёк стол и схватил моё запястье со скоростью не соответствующей его видимому возрасту. Хватка была подлинной — структурной, не демонстративной. Он читал меня. Я позволил ему читать меня четыре секунды перед тем как выпустил нулевое поле через точку контакта.\n\nЧто он почувствовал: его собственная сенсорная магия умолкла. Не подавленная снаружи — заглушённая у источника. Нулевое поле прошло через его технику и деактивировало её на время контакта. Он испытал отсутствие основного восприятия приблизительно две секунды после отпускания руки — время восстановления его конкретной техники после контакта с нулевым полем медленнее чем он ожидал. Он не встречал этого прежде. Я мог сказать потому что он не двигался эти две секунды.\n\nЯ сказал: картографы — пустые вещи. Я сказал ему не трогать влажные чернила.\n\nОн улыбнулся. Тонкие, бескровные губы. Улыбка человека, только что подтвердившего то, что ему нужно было подтвердить.\n\nВалдос прав что у Игнациуса есть собственное оружие в трюме. Чего Валдос не знает — Игнациус уже решил к какой категории я принадлежу. Он не решает. Он решил. Его улыбка была улыбкой человека, сейчас находящегося в следующей фазе протокола который он начал вчера.`
     },
     knows:{en:["Ignatius's smile after the hand-release was confirmation that he has moved to the next protocol phase — he is past deciding and into executing","The null-field deactivated Ignatius's sensory technique at source, not from outside — and the recovery time was slower than Ignatius expected. He has not encountered this before.","Ignatius also has dietary isolation — sealed water vessel. Either he knows about the compound or has independent reasons. Both operationally relevant."],ru:["Улыбка Игнациуса после отпускания руки подтвердила что он перешёл к следующей фазе протокола — он прошёл решение и перешёл к исполнению","Нулевое поле деактивировало сенсорную технику Игнациуса у источника, а не снаружи — и время восстановления было медленнее чем ожидал Игнациус. Он не встречал этого прежде.","Игнациус также имеет пищевую изоляцию — запечатанный сосуд с водой. Либо знает о соединении, либо имеет независимые причины. Оба операционно релевантны."]},
     misunderstands:{en:["'He has decided.' Dante has concluded that Ignatius has decided his category. He has not modeled what Ignatius's four-second contact read during that wrist grip — that the null-field source is the earring, specifically. He knows Ignatius was reading him. He does not know what Ignatius read and filed.","'Cartographers are empty things. I told him not to touch wet ink.' He reframed the wrist-grip exchange as a counter-statement about his professional identity. Ignatius did not hear a professional identity statement. He heard: you have now touched the field and I have let you. He heard confirmation, not deflection."],ru:["«Он решил». Данте заключил что Игнациус определился с его категорией. Он не моделировал что четырёхсекундный контакт Игнациуса прочитал при захвате запястья — что источник нулевого поля — серьга конкретно. Он знает что Игнациус читал его. Он не знает что Игнациус прочитал и занёс.","«Картографы — пустые вещи. Я сказал ему не трогать влажные чернила». Он переформулировал обмен с захватом запястья как встречное утверждение о своей профессиональной идентичности. Игнациус не услышал заявление о профессиональной идентичности. Он услышал: ты теперь прикоснулся к полю и я позволил тебе. Он услышал подтверждение, а не уклонение."]},
     hides:{en:["He let Ignatius grip his wrist for four seconds before releasing the null-field. He chose the duration. Four seconds is long enough to confirm a read was happening. He allowed the read to begin and then terminated it — providing Ignatius with partial data rather than none. This was not defensive reflex. It was a decision about how much information to give someone who is going to acquire it eventually anyway.","He has now used the null-field as a direct counter-measure twice — the wrist contact, and the deck pulse during the Anomaly. Before this voyage he used it as passive detection for twenty-one years. The transition to active deployment is accelerating. He has not noted this as a trend."],ru:["Он позволил Игнациусу держать запястье четыре секунды до выпуска нулевого поля. Он выбрал длительность. Четыре секунды достаточно чтобы подтвердить что читали. Он позволил считыванию начаться затем прервал его — предоставив Игнациусу частичные данные, а не отсутствие. Это не был оборонительный рефлекс. Это было решение о том, сколько информации давать тому, кто в конечном счёте её получит.","Он теперь использовал нулевое поле как прямую контрмеру дважды — контакт запястья и импульс палубы во время Аномалии. До этого плавания он использовал его как пассивное обнаружение двадцать один год. Переход к активному применению ускоряется. Он не отметил это как тенденцию."]},
     whisper:{en:"He let Ignatius read for four seconds. He chose the duration. He gave him partial data. He has not noted that active deployment of the null-field is accelerating.",ru:"Он позволил Игнациусу читать четыре секунды. Он выбрал длительность. Он дал ему частичные данные. Он не отметил что активное применение нулевого поля ускоряется."}
   },
   ignatius:{distortion:7,
     text:{
       en:`He passed the test I designed for him.\n\nThe dinner was the second test. The first was his approach to the ship — the way he walked through the guards, the way he deployed the seal rather than the document. A man who understands that symbols operate faster than texts is a man who has thought carefully about how cognition works. Interesting, but inconclusive.\n\nThe dinner gave me two data points. The first: he drinks from his own supply. He is chemically cautious in exactly the way that someone would be if they knew about the compound I detected in the galley water four hours ago. Either he detected it independently, or he placed it there and is protecting himself from his own preparation. The first option makes him an equal adversary. The second makes him a different kind of problem.\n\nThe second data point: the wrist.\n\nI have performed contact reading approximately six hundred times across forty years of inquisitorial service. The range of responses I have encountered: resistance, capitulation, the specific blankness of deep suppression training, the specific chaos of genuine mental illness, and three times the partial-transparency of individuals who have undertaken certain irreversible procedures that affect soul-architecture. I have never encountered silence.\n\nNot suppression. Not resistance. Silence. My technique contacted his field and found — nothing in the location where something should be. And then the nothing became a specific quality of nothing that I have a word for only in the memory I cannot explain the origin of. The word is: null-point. The memory says: null-point is not absence. Null-point is function that has been compressed past the point of detectable signature. It is not a void. It is a weapon at rest.\n\nI recovered my technique in approximately two seconds. He did not react during those two seconds. He knew what the recovery time would be. He has done this before.\n\nI whispered the word after he left the table. Someone in the shadow of the mast heard it. I intended them to. The shadow moved at the edge of my perception — not visible, not magical, simply a place where light did not quite reach. The shadow has been with him since the harbor. The shadow passed the test before he did: I identified it in the second hour of the first day, which means it is very good at what it does, which means the cartographer has operational support of a quality consistent with an institutional mandate I have not been provided.\n\nHeresy. Useful. Unforgivable.\n\nThe Passenger sings in the hold and the null-point man walks the deck and the shadow follows the null-point man and I am threading my prayer beads with the specific texture of a problem that has no clean solution.\n\nI will not move against him until we reach the Island. Whatever is at the Island requires his specific capability to access. Reduction before the objective would be — premature. Reduction after, however, is already scheduled in the protocol I initiated the day I boarded.\n\nThe Order is patient. Forty years has taught me patience.\n\nSo has the sea.`,
       ru:`Он прошёл тест который я для него разработал.\n\nУжин был вторым тестом. Первым был его подход к кораблю — то как он прошёл через охранников, то как он применил печать, а не документ. Человек понимающий что символы работают быстрее текстов — человек тщательно думавший о том, как работает познание. Интересно, но не окончательно.\n\nУжин дал мне две точки данных. Первая: он пьёт из собственного запаса. Он химически осторожен именно так, как был бы кто-то знающий о соединении которое я обнаружил в камбузной воде четыре часа назад. Либо он обнаружил его самостоятельно, либо поместил его туда и защищает себя от собственной подготовки. Первый вариант делает его равным противником. Второй — другим видом проблемы.\n\nВторая точка данных: запястье.\n\nЯ провёл контактное считывание приблизительно шестьсот раз за сорок лет инквизиционной службы. Диапазон ответов: сопротивление, капитуляция, специфическая пустота глубокой тренировки подавления, специфический хаос подлинного психического заболевания, и трижды частичная прозрачность людей прошедших определённые необратимые процедуры затрагивающие архитектуру души. Я никогда не встречал тишину.\n\nНе подавление. Не сопротивление. Тишину. Моя техника контактировала с его полем и нашла — ничто в том месте где должно быть что-то. Затем ничто стало специфическим качеством ничто для которого у меня есть слово только в памяти которую я не могу объяснить происхождение. Слово: нулевая точка. Память говорит: нулевая точка — не отсутствие. Нулевая точка — функция сжатая до точки неопределяемой сигнатуры. Это не пустота. Это оружие в покое.\n\nЯ восстановил технику приблизительно за две секунды. Он не реагировал эти две секунды. Он знал каким будет время восстановления. Он делал это прежде.\n\nЯ прошептал слово после того как он покинул стол. Кто-то в тени мачты услышал. Я намеревался чтобы услышали. Тень двинулась на краю моего восприятия — не видимая, не магическая, просто место где свет не вполне достигал. Тень была с ним с гавани. Тень прошла тест до него: я определил её на втором часу первого дня, что означает она очень хороша в том что делает, что означает у картографа есть операционная поддержка качества согласующегося с институциональным мандатом который мне не был предоставлен.\n\nЕресь. Полезная. Непростительная.\n\nПассажир поёт в трюме, человек-нулевая-точка ходит по палубе, тень следует за человеком-нулевой-точкой, и я перебираю четки со специфической текстурой проблемы не имеющей чистого решения.\n\nЯ не буду действовать против него до достижения Острова. Что бы ни было на Острове, для доступа требуется его конкретная возможность. Редукция до цели была бы — преждевременной. Редукция после, однако, уже запланирована в протоколе инициированном в день когда я поднялся на борт.\n\nОрден терпелив. Сорок лет научили меня терпению.\n\nМоре тоже.`
     },
     knows:{en:["The null-field source is the earring — four seconds of contact read confirmed this. He knows what to target if Reduction becomes necessary.","He identified Whisper in the mast shadow on the second hour of the first day. His whispered message after dinner was directed at Whisper deliberately.","He has already scheduled Reduction in the protocol — after the Island objective, not before. He will not move until the Island is reached."],ru:["Источник нулевого поля — серьга: четыре секунды контактного считывания подтвердили это. Он знает что нацеливать если Редукция станет необходимой.","Он определил Шепота в тени мачты на втором часу первого дня. Его прошептанное сообщение после ужина было намеренно направлено Шепоту.","Он уже запланировал Редукцию в протоколе — после цели Острова, а не до. Он не будет действовать до достижения Острова."]},
     misunderstands:{en:["He believes Reduction is the correct protocol for a 'null-point.' His memory of the term comes from a purchased Node One Memory — a Precursor-era source. What the Precursor-era source said about null-points, in full, was: 'null-point entities are not weapons at rest. They are witnesses at rest. The distinction matters for protocol.' He has the word. He does not have the full sentence. The purchased memory was incomplete."],ru:["Он считает что Редукция — правильный протокол для «нулевой точки». Его память о термине происходит из купленной Памяти Узла Первого — источника эпохи Предтечей. Что источник эпохи Предтечей сказал о нулевых точках полностью было: «сущности нулевой точки — не оружие в покое. Они — свидетели в покое. Различие важно для протокола». У него есть слово. У него нет полного предложения. Купленная память была неполной."]},
     hides:{en:["His purchased Memory from Node One is incomplete — it was sold to him as 'complete account of a Herald interface event' but the Cult's Memory commodity process can only transmit what the donor themselves retained, and the donor had not understood the full significance of what they witnessed. Ignatius has been operating on a partial data set for forty years and does not know it.","He scheduled Reduction. He has not examined whether he is certain this is the correct protocol. He has performed Reduction eleven times across forty years. The twelfth time feels different to him in a way he cannot attribute to anything specific. He has attributed it to the sea."],ru:["Его купленная Память из Узла Первого неполна — она была продана ему как «полное описание события интерфейса с Вестником», но процесс товара Памяти Культа может передавать только то, что сам донор сохранил, а донор не понял полного значения того чему был свидетелем. Игнациус работает на неполном наборе данных сорок лет и не знает об этом.","Он запланировал Редукцию. Он не исследовал уверен ли что это правильный протокол. Он проводил Редукцию одиннадцать раз за сорок лет. Двенадцатый ощущается ему иначе способом который он не может приписать ничему конкретному. Он приписал это морю."]},
     whisper:{en:"He has the word 'null-point.' He does not have the full sentence. The purchased Memory was incomplete. He has been operating on partial data for forty years. He has already scheduled Reduction.",ru:"У него есть слово «нулевая точка». У него нет полного предложения. Купленная Память была неполной. Он работает на неполных данных сорок лет. Он уже запланировал Редукцию."}
   }
 }

/* ─── SCENE 3: THE WHISPER OF THE DEAD ─── */
{id:"s3",
 title:{en:"The Whisper of the Dead",ru:"Шёпот Мертвецов"},
 subtitle:{en:"The Anomaly speaks. The cartographer holds the wheel. The sea takes a name.",ru:"Аномалия говорит. Картограф держит штурвал. Море берёт имя."},
 location:{en:"The Leviathan — The Sea of the Sleeping Anomaly",ru:"«Левиафан» — Аномалия Моря Спящих"},
 timing:{en:"Midday, Day Three",ru:"Полдень, Третий День"},
 flags:["pivotal","cost","field_operation"],
 povData:{
   dante:{distortion:4,
     text:{
       en:`The Anomaly arrived without announcement. The color of the water changed first — from the black-oil quality of the open deep to something white-grey, the color of cataracts, of eyes that have been too long in the light and seen too much of it. The fog followed. Ozone and the specific smell of ether-scar tissue — not rot, but the absence of regeneration.\n\nThe crew's response was immediate and non-coordinated: each person experienced their personal fear-archive accessing without their consent, the Sleeping Sea finding the unlocked files in each consciousness and opening them. The Anomaly is not interested in creating fear. It is interested in finding what is already there.\n\nI have noted this for later examination: the Anomaly did not affect me. I passed through its perimeter and felt nothing except the earring's continuous steady register — not alert, not deactivation, simply presence-confirmation. The null-field at idle state appears to be transparent to the Sleeping Sea's mechanism, because the mechanism reads psychic residue and the null-field suppresses the ambient psychic resonance around me below the Anomaly's detection threshold.\n\nI am, in the Sleeping Sea, effectively invisible.\n\nThis is operationally convenient. It also means that whatever the Anomaly would have shown me — whatever fear-archive it would have found and opened — I did not see. I do not know what is in the archive. I have spent eleven chapters noting things I do not record, things I have not examined, things I carry without using. I do not know whether the Anomaly's silence around me is protection or deprivation.\n\nValerie's burning ship was genuine — I saw his face and he was not performing. Cord's hallucination was genuine.\n\nI did not let myself think about Cord's name until after I had delivered the Silence pulse and we were through the Anomaly. The pulse cost me something I have not had a category for — not pain, not exhaustion in the conventional sense, but a reduction in the clarity that usually accompanies my operational state. I was dimmer for two hours afterward. The earring was dimmer. We both recovered.\n\nI spoke to Valdos after. He told me about Ignatius's request to have me shackled.\n\nHe also told me about the Passenger. The siren with burned eyes and no writing hand. A voice that can sing destruction.\n\nI thought: a voice that can sing construction. A voice that can speak the language the Island is waiting to hear.\n\nAnd I thought: the blind and mute should stand together.\n\nThis time I examined both meanings simultaneously.\n\nThe second meaning was: I am also, in certain ways, blind and mute. I have carried things I cannot speak. I have seen things I have not recorded. I have the grammar of a language I cannot speak fluently. She has the fluency I lack. We need the same Island. We have arrived on the same ship.\n\nI asked Whisper to begin planning access to the hold.\n\nCord's name is in my pocket. I have not put it anywhere else.`,
       ru:`Аномалия прибыла без объявления. Первым изменился цвет воды — от чёрно-нефтяного качества открытой глубины к чему-то бело-серому, цвету катаракты, глаз слишком долго бывших на свету и видевших слишком много. Туман последовал. Озон и специфический запах тканей с эфирным шрамом — не гниль, а отсутствие регенерации.\n\nОтклик экипажа был немедленным и нескоординированным: каждый человек испытал доступ своего личного архива страхов без их согласия, Море Спящих нашло разблокированные файлы в каждом сознании и открыло их. Аномалия не заинтересована в создании страха. Она заинтересована в обнаружении того, что уже есть.\n\nЯ отметил это для последующего исследования: Аномалия не затронула меня. Я прошёл через её периметр и не почувствовал ничего кроме непрерывного устойчивого регистра серьги — не тревога, не деактивация, просто подтверждение присутствия. Нулевое поле в режиме ожидания, по всей видимости, прозрачно для механизма Моря Спящих, потому что механизм читает психический осадок, а нулевое поле подавляет окружающий психический резонанс вокруг меня ниже порога обнаружения Аномалии.\n\nЯ, в Море Спящих, фактически невидим.\n\nЭто операционно удобно. Это также означает что то, что Аномалия показала бы мне — какой архив страха она нашла бы и открыла — я не видел. Я не знаю что в архиве. Я провёл одиннадцать глав отмечая вещи которые не записываю, вещи которые не исследовал, вещи которые несу не используя. Я не знаю является ли тишина Аномалии вокруг меня защитой или лишением.\n\nГорящий корабль Валдоса был подлинным — я видел его лицо и он не исполнял. Галлюцинация Корда была подлинной.\n\nЯ не позволял себе думать об имени Корда пока не выпустил импульс Тишины и мы не прошли Аномалию. Импульс стоил мне чего-то для чего у меня нет категории — не боли, не истощения в обычном смысле, а снижения ясности обычно сопровождающей моё операционное состояние. Я был тусклее два часа после. Серьга была тусклее. Мы оба восстановились.\n\nЯ говорил с Валдосом после. Он рассказал мне о запросе Игнациуса заковать меня в кандалы.\n\nОн также рассказал мне о Пассажире. Сирена с сожжёнными глазами и без пишущей руки. Голос, способный петь разрушение.\n\nЯ подумал: голос, способный петь созидание. Голос, способный говорить на языке которого ждёт Остров.\n\nИ я подумал: слепые и немые должны держаться вместе.\n\nНа этот раз я исследовал оба смысла одновременно.\n\nВторой смысл был: я тоже, в определённых смыслах, слепой и немой. Я нёс вещи, о которых не мог говорить. Я видел вещи которые не записывал. У меня есть грамматика языка которым я не могу говорить свободно. У неё есть свободное владение которого мне не хватает. Нам нужен один и тот же Остров. Мы прибыли на одном корабле.\n\nЯ попросил Шепота начать планирование доступа к трюму.\n\nИмя Корда у меня в кармане. Я не поместил его больше никуда.`
     },
     knows:{en:["The Anomaly reads psychic residue — the null-field makes him invisible to it. He did not experience what it would have shown him.","He simultaneously examined both meanings of 'blind and mute' for the first time — and arrived at: she has the fluency he lacks, he has the null-field she may need, they both need the Island. First simultaneous dual-meaning examination in thirteen chapters.","He is dimmer for two hours after the Silence pulse — earring also dimmer. He has not filed this under a category yet."],ru:["Аномалия читает психический осадок — нулевое поле делает его невидимым для неё. Он не испытал что она показала бы ему.","Он одновременно исследовал оба смысла «слепые и немые» впервые — и пришёл к: у неё есть свободное владение которого ему не хватает, у него есть нулевое поле которое ей может понадобиться, им обоим нужен Остров. Первое одновременное двойное смысловое исследование за тринадцать глав.","Он тусклее два часа после импульса Тишины — серьга также тусклее. Он ещё не занёс это под категорию."]},
     misunderstands:{en:["'I do not know whether the Anomaly's silence around me is protection or deprivation.' He has named the correct question. He has not stayed with it long enough to attempt an answer. The answer is: both, and the proportion varies by what the archive would have contained. He cannot know the proportion. This is not a manageable unknown — it is the kind of unknown that can only be resolved by removing the protection to see what the deprivation would reveal. He will not do this voluntarily.","Cord's name is in his pocket. He said 'I have not put it anywhere else.' He has not examined the specific category difference between 'in my pocket' and 'in the file of things I do not record.' These are different storage locations for different reasons. Pocket means: not yet processed. File means: processed and held. Cord is in pocket. He is still in transit."],ru:["«Я не знаю является ли тишина Аномалии вокруг меня защитой или лишением». Он назвал верный вопрос. Он не задержался с ним достаточно долго чтобы попытаться ответить. Ответ: и то и другое, и пропорция варьируется в зависимости от того, что содержал бы архив. Он не может знать пропорцию. Это не управляемое неизвестное — это вид неизвестного, который можно разрешить только убрав защиту чтобы увидеть что лишение обнажило бы. Он не сделает этого добровольно.","Имя Корда у него в кармане. Он сказал «я не поместил его больше никуда». Он не исследовал конкретную категориальную разницу между «в кармане» и «в файле вещей которые не записываю». Это разные места хранения по разным причинам. Карман означает: ещё не обработано. Файл означает: обработано и удержано. Корд в кармане. Он ещё в транзите."]},
     hides:{en:["'I did not let myself think about Cord's name until after the pulse.' This sentence confirms he was suppressing it during the Anomaly — not because the Anomaly would have found it, but because thinking about Cord during active navigation of a crisis would have been a resource allocation decision. He was triage-managing his own grief. He has not called it grief.","He now knows the second meaning of 'blind and mute should stand together' — that it describes himself as much as her. He has examined this. He has not yet said it to Whisper. He is not hiding it deliberately. He does not have a sentence for it yet. This is the same category as the sentence he cannot complete about the cages in Sector 13.","He is planning access to the Passenger. He knows she is the key to the Island's outer barrier. He has not yet formulated the question he will ask her when he reaches her. He does not have the vocabulary. This is also the cane's grammar situation."],ru:["«Я не позволял себе думать об имени Корда до импульса». Это предложение подтверждает что он подавлял его во время Аномалии — не потому что Аномалия нашла бы его, а потому что думать о Корде во время активной навигации в кризис было бы решением о распределении ресурсов. Он управлял собственным горем в режиме триажа. Он не называл это горем.","Теперь он знает второй смысл «слепые и немые должны держаться вместе» — что это описывает его так же как её. Он исследовал это. Он ещё не сказал этого Шепоту. Он не скрывает это намеренно. У него пока нет предложения для этого. Это та же категория что предложение которое он не может завершить о клетках в Секторе 13.","Он планирует доступ к Пассажиру. Он знает что она — ключ к внешнему барьеру Острова. Он ещё не сформулировал вопрос который задаст ей когда достигнет её. У него нет словарного запаса для этого. Это также ситуация грамматики трости."]},
     whisper:{en:"Cord's name is in his pocket. Not the file. Pocket means not yet processed. He is still in transit. He managed his own grief during the crisis. He has not called it grief.",ru:"Имя Корда у него в кармане. Не в файле. Карман означает ещё не обработано. Он ещё в транзите. Он управлял собственным горем во время кризиса. Он не называл это горем."}
   },
   valdos:{distortion:5,
     text:{
       en:`I commanded pirate fleets through three wars, two plagues, and a harbour fire that killed two hundred and sixty men on my order. I have never been afraid of the sea.\n\nThe Sleeping Sea made me afraid of the sea.\n\nI saw the Insolent — my first command, the ship I lost at the Coral Ridge nineteen years ago. She was burning. I could see the faces of the men I left behind when I took the longboat. I left them because there was nothing to be done and staying would have been sentimentality without utility. I know this. I knew it then. I have known it every night since.\n\nIn the Anomaly, I forgot the knowledge for approximately four minutes. I only had the faces.\n\nI had my saber out. I was going to kill the helmsman for not turning. Then the cartographer struck the deck with his cane and whatever it was he did — the fog cleared. The faces went away. The water was empty. The ship was still whole.\n\nHe looked like death was wearing his face and had borrowed it for the occasion — pale, bent over the wheel, gripping the raven handle. But the course held. We were through.\n\nAfterward he sat on a coil of rope and breathed. I went to him. I told him about Ignatius's request to shackle him. I told him about the Passenger, because the Passenger is information he either already has or should have, and giving information to useful people before they need it is how you keep useful people alive long enough to keep being useful.\n\nHe said nothing for a moment. Then: 'the blind and mute should stand together.'\n\nI don't know what that means. But when he said it, something in the tone reminded me of the way the cartographer from nineteen years ago talked — not the voice, the register. The register of someone who has already decided something and is telling you the conclusion, not the reasoning.\n\nI went back to my cabin. I looked at the manifest.\n\nCord's name was crossed off by the mate who saw him go over. Age seventeen. I looked at it for a moment.\n\nI know what the sea takes. I have given the sea things. I have received no receipts.\n\nBusiness, as the cartographer would say. Continuing.`,
       ru:`Я командовал пиратскими флотами через три войны, две чумы и пожар в гавани унёсший двести шестьдесят человек по моему приказу. Я никогда не боялся моря.\n\nМоре Спящих заставило меня бояться моря.\n\nЯ видел «Дерзкую» — мою первую команду, корабль который я потерял у Кораллового Рифа девятнадцать лет назад. Она горела. Я видел лица людей которых оставил когда взял шлюпку. Я оставил их потому что ничего нельзя было сделать и оставаться было бы сентиментальностью без полезности. Я знаю это. Я знал тогда. Я знал это каждую ночь с тех пор.\n\nВ Аномалии я забыл это знание приблизительно на четыре минуты. У меня были только лица.\n\nЯ извлёк саблю. Я собирался убить рулевого за отказ поворачивать. Затем картограф ударил тростью о палубу и что бы он ни сделал — туман рассеялся. Лица ушли. Вода была пустой. Корабль всё ещё был цел.\n\nОн выглядел как смерть носящая его лицо по случаю — бледный, согнувшийся над штурвалом, сжимающий рукоять ворона. Но курс держался. Мы прошли.\n\nПосле он сидел на бухте каната и дышал. Я подошёл к нему. Я рассказал о запросе Игнациуса заковать его. Рассказал о Пассажире — потому что Пассажир — информация которую он либо уже имеет либо должен иметь, а давать информацию полезным людям до того как она им понадобится — это как вы сохраняете полезных людей живыми достаточно долго чтобы продолжать быть полезными.\n\nОн молчал мгновение. Затем: «слепые и немые должны держаться вместе».\n\nЯ не знаю что это означает. Но когда он говорил, что-то в тоне напомнило мне то как говорил картограф девятнадцать лет назад — не голос, регистр. Регистр кого-то уже принявшего решение и сообщающего вам вывод, а не рассуждение.\n\nЯ вернулся в каюту. Посмотрел на манифест.\n\nИмя Корда было вычеркнуто помощником видевшим как он ушёл за борт. Семнадцать лет. Я смотрел на него мгновение.\n\nЯ знаю что берёт море. Я давал морю вещи. Квитанций я не получал.\n\nБизнес, как сказал бы картограф. Продолжается.`
     },
     knows:{en:["He saw the Insolent — his first command, lost at Coral Ridge nineteen years ago. He was in the longboat when he left the crew behind. He knows it was the correct decision. He has known it every night since.","The register of Dante's voice when he said 'blind and mute should stand together' matched the register of the cartographer from nineteen years ago — not the voice, the register. He has noticed this. He is not connecting it.","Cord's name is crossed off the manifest. He looked at it. He has given things to the sea before. He knows what that means."],ru:["Он видел «Дерзкую» — свою первую команду, потерянную у Кораллового Рифа девятнадцать лет назад. Он был в шлюпке когда оставил экипаж. Он знает что это было правильным решением. Он знает это каждую ночь с тех пор.","Регистр голоса Данте когда он сказал «слепые и немые должны держаться вместе» совпал с регистром картографа девятнадцать лет назад — не голос, регистр. Он заметил это. Он не соединяет.","Имя Корда вычеркнуто из манифеста. Он посмотрел на него. Он прежде давал вещи морю. Он знает что это означает."]},
     misunderstands:{en:["'Business, as the cartographer would say. Continuing.' He has adopted this formulation because Dante used it in a way that sounded resolute rather than resigned. He has misread the formulation's content — he thinks 'business continues' is a statement of professional resilience. It is a statement Dante has been testing for thirteen chapters and has not yet found a version that satisfies him."],ru:["«Бизнес, как сказал бы картограф. Продолжается». Он принял эту формулировку потому что Данте использовал её звучавшей решительно, а не покорно. Он неверно прочитал содержание формулировки — он думает что «бизнес продолжается» — заявление профессиональной стойкости. Это заявление которое Данте проверяет тринадцать глав и ещё не нашёл версию которая его удовлетворяет."]},
     hides:{en:["He sat with Cord's name for a moment. He has given the sea things before. He received no receipts. He did not stay with Cord's name longer than a moment — he looked at it and moved to the closing formulation. He knows what the sea takes. He is, in this way, not unlike the Auditor: he knows, he moves forward, he does not examine why moving forward is what he does.","The register he recognized in Dante's voice — the cartographer from nineteen years ago. He has not connected this. But the recognition has been filed somewhere, and it is next to the manifest with the crossed-off name, and those two things are becoming adjacent in a way that will eventually require a connection."],ru:["Он сидел с именем Корда мгновение. Он прежде давал морю вещи. Квитанций не получал. Он не задержался с именем Корда дольше мгновения — посмотрел на него и перешёл к заключительной формулировке. Он знает что берёт море. В этом он не так уж не похож на Аудитора: знает, движется вперёд, не исследует почему движение вперёд — то что он делает.","Регистр который он узнал в голосе Данте — картограф девятнадцать лет назад. Он не соединил это. Но узнавание было занесено куда-то, и оно рядом с манифестом с вычеркнутым именем, и эти две вещи становятся соседними способом который в конечном счёте потребует связи."]},
     whisper:{en:"He noticed the register. He is not connecting it yet. The recognition is filed next to Cord's name in his memory. They are becoming adjacent.",ru:"Он заметил регистр. Он ещё не соединяет. Узнавание занесено рядом с именем Корда в его памяти. Они становятся соседними."}
   }
 }
}

/* ═══ ENGINE ═══ */
const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');const secs=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}];c.innerHTML=secs.map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
