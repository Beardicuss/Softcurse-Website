<style>

.lang-btn:first-child{border-right:none;}

.header-ornament{font-family:var(--ff-mono);font-size:12px;letter-spacing:.4em;color:var(--pov-s);text-transform:uppercase;margin-bottom:14px;opacity:.7;transition:color .8s;}

.dist-bar.ex{background:#bb0000;animation:barpulse 1.8s infinite;}
@keyframes barpulse{0%,100%{opacity:1;}50%{opacity:.3;}}
#narrative-text{font-size:20px;line-height:1.9;color:var(--pov-t);transition:color .7s,opacity .3s;position:relative;z-index:1;}
#narrative-text p{margin-bottom:1.3em;}
#narrative-text p:last-child{margin-bottom:0;}
.d3,.d4,.d5{animation:flicker-soft 14s infinite;}
.d6,.d7{animation:flicker-mid 7s infinite;}
.d8,.d9{animation:flicker-hard 4s infinite,glitch-mid 16s infinite;}
.d10{animation:flicker-hard 2s infinite,glitch-hard 8s infinite;filter:blur(.4px);}
@keyframes flicker-soft{0%,94%,100%{opacity:1;}96%{opacity:.88;}}
@keyframes flicker-mid{0%,88%,100%{opacity:1;}90%{opacity:.75;}92%{opacity:.9;}93%{opacity:.68;}94%{opacity:1;}}
@keyframes flicker-hard{0%,80%,100%{opacity:1;}82%{opacity:.6;}83%{opacity:.9;}84%{opacity:.55;}85%{opacity:.85;}86%{opacity:.7;}87%{opacity:1;}}
@keyframes glitch-mid{0%,92%,100%{transform:none;filter:none;}93%{transform:translate(-3px,0);filter:drop-shadow(3px 0 rgba(255,0,0,.3));}94%{transform:translate(3px,0);filter:drop-shadow(-3px 0 rgba(0,100,255,.2));}95%{transform:translate(-1px,1px);}96%{transform:none;}}
@keyframes glitch-hard{0%,88%,100%{transform:none;filter:none;}89%{transform:translate(-4px,0) skewX(-1deg);filter:drop-shadow(4px 0 rgba(255,0,0,.4)) saturate(2);}90%{transform:translate(4px,-1px) skewX(1deg);filter:drop-shadow(-4px 0 rgba(0,150,255,.3));}91%{transform:translate(-2px,2px);filter:brightness(.7);}92%{transform:translate(1px,-1px);}93%{transform:none;filter:none;}}
#whisper-panel{background:var(--bg2);border:1px solid var(--border);border-top:none;border-left:3px solid var(--pov-p);padding:15px 40px 17px;margin-bottom:12px;opacity:0;transform:translateY(-2px);transition:opacity 1.6s,transform 1.2s,border-left-color .7s;pointer-events:none;}

.intel-section.misunderstands .intel-section-head{color:#5a5a20;}
.intel-section.hides .intel-section-head{color:#5a2020;}
.intel-list{list-style:none;display:flex;flex-direction:column;gap:5px;}

#scene-nav{display:flex;align-items:center;justify-content:space-between;padding:22px 0;border-top:1px solid var(--border);}

</style>

const TIMELINE=[
  {id:"TET-93",en:"The lead-lined crates aboard the Leviathan do not contain general cargo. They contain a Cognitive Iron extraction and transport system — specifically, seventeen empty containment vessels designed to the same specification as the Precursor-era Covenant Object containers. The Golden Circle has been building this equipment for nine years, funded initially through Node One of the Cult of Zero Hour. They are not planning to recover artifacts from the Island. They are planning to recover a Herald. They believe the Island contains a dormant Herald-class entity that can be extracted and operated as a weapon. The cages are for it.",ru:"Ящики, обитые свинцом, на борту «Левиафана» содержат не обычный груз. В них находится система извлечения и транспортировки Когнитивного Железа — конкретно, семнадцать пустых контейнеров для хранения, спроектированных по той же спецификации что контейнеры Объектов Завета эпохи Предтечей. «Золотой Круг» строил это оборудование девять лет, изначально финансируя через Узел Первый Культа Нулевого Часа. Они не планируют извлечь артефакты с Острова. Они планируют извлечь Вестника. Они считают что Остров содержит спящую сущность класса Вестника, которую можно извлечь и использовать как оружие. Клетки — для неё."},
  {id:"TET-94",en:"Father Ignatius is not primarily a Church operative. He is a Cult of Zero Hour Node One client — a Memory commodity purchaser who has used the Cult's service to selectively retain and curate his own memory architecture over forty years. He remembers everything he has chosen to remember and nothing he has chosen to release. His ecclesiastical position and his blindfold are both genuine — he lost his sight in a theological dispute forty years ago and has developed compensatory Void-adjacent perception since. His perception of Dante's 'emptiness' is accurate: he is sensing the earring's null-field operating at idle state. He does not know what he is sensing. He knows it is not standard human soul-signature.",ru:"Отец Игнациус — не преимущественно церковный оперативник. Он клиент Узла Первого Культа Нулевого Часа — покупатель товара Памяти, использующий услугу Культа для избирательного сохранения и курирования собственной архитектуры памяти на протяжении сорока лет. Он помнит всё, что выбрал помнить, и ничего из того, что выбрал отпустить. Его церковное положение и повязка — оба подлинные: он потерял зрение в теологическом споре сорок лет назад и с тех пор развил компенсаторное восприятие, смежное с Пустотой. Его восприятие «пустоты» Данте точно: он чувствует нулевое поле серьги в режиме ожидания. Он не знает что воспринимает. Он знает что это не стандартная сигнатура человеческой души."},
  {id:"TET-95",en:"Commodore Valdos's previous navigator did not go mad in the Fog of the Dead. He was sent to the top of the mast in a storm to settle a 3,000-gold debt — a standard Valdos enforcement method that Whisper's two-year intelligence collection documents across six prior instances. The 'blood from the eyes' detail was added to the anecdote by Valdos over time as the story traveled. The navigator's name was Perrin. He was twenty-three. He had a family in the harbor district. This information is in Whisper's intelligence package. Dante received the package. He knows the name. He did not use it in the interview.",ru:"Предыдущий навигатор коммодора Валдоса не сошёл с ума в Тумане Мертвецов. Его отправили на верхушку мачты в шторм чтобы погасить долг в 3000 золотых — стандартный метод принуждения Валдоса, задокументированный в двухлетнем разведывательном сборнике Шепота в шести предыдущих случаях. Деталь о «крови из глаз» была добавлена Валдосом к анекдоту со временем по мере распространения истории. Имя навигатора — Перрин. Ему было двадцать три года. У него была семья в портовом районе. Эта информация находится в разведывательном пакете Шепота. Данте получил пакет. Он знает имя. Он не использовал его на собеседовании."},
  {id:"TET-96",en:"The Silence Dante demonstrated on Valdos's enchanted navigation chart was not a deliberate magical act. He placed his hand on the chart and allowed the earring's null-field to expand slightly — he 'stopped suppressing' rather than 'casting.' The chart's enchantment dissolved because it was not designed to function in proximity to a null-field operating above ambient. The chart is not broken; it will recover in approximately four hours once Dante's hand is removed. What Valdos saw was real: the hidden rocks, the instability zones. The chart's suppression of these features was not malicious design but magical smoothing of uncertain data. Dante's null-field revealed the uncertainty rather than creating it.",ru:"Тишина, которую Данте продемонстрировал на зачарованной навигационной карте Валдоса, не была намеренным магическим действием. Он положил руку на карту и позволил нулевому полю серьги немного расшириться — он «прекратил подавлять», а не «применил заклинание». Зачарование карты растворилось, потому что оно не было спроектировано для работы в близости к нулевому полю, работающему выше фонового. Карта не сломана; она восстановится приблизительно через четыре часа после убирания руки Данте. То, что видел Валдос, было реальным: скрытые скалы, зоны нестабильности. Подавление этих особенностей картой было не злонамеренным проектированием, а магическим сглаживанием неопределённых данных. Нулевое поле Данте обнажило неопределённость, а не создало её."},
  {id:"TET-97",en:"Dante's food and water isolation demand is not paranoia about poisoning. The food supply aboard the Leviathan includes a standard Cult of Zero Hour dietary supplement that has been included in the ship's provisioning by a Golden Circle operative in the harbor. The supplement is a micro-dose Memory commodity compound — a memory-affecting agent that, consumed regularly over a two-week voyage, would produce selective amnesia in all ship personnel regarding specific events of the voyage. Dante has not detected this; he requested isolation for a different reason (the Void-Blossom tea supply). The isolation will incidentally protect him from the compound's effects. He will not know he avoided something.",ru:"Требование Данте изолировать еду и воду — не паранойя об отравлении. Продовольственное снабжение на «Левиафане» включает стандартную диетическую добавку Культа Нулевого Часа, включённую в корабельное снабжение оперативником «Золотого Круга» в гавани. Добавка — микродозный компонент товара Памяти: агент, влияющий на память, который при регулярном употреблении в течение двухнедельного плавания вызвал бы избирательную амнезию у всего персонала корабля относительно конкретных событий путешествия. Данте не обнаружил этого; он запросил изоляцию по другой причине (запас чая из Пустоцвета). Изоляция случайно защитит его от воздействия соединения. Он не будет знать что избежал чего-то."},
  {id:"TET-98",en:"The cages in the hold are specifically designed for a living Herald-class entity. The binding runes are not standard containment script — they are transcribed from a pre-Sundering source that the Golden Circle obtained through Node One's Memory commodity: a client who had purchased and retained the memory of a Precursor-era artificer, which included design specifications for Herald containment. The runes are functionally accurate. They would work. The Golden Circle's intelligence about the Island of Silence is better than Dante's current working model — they know there is a dormant Herald there. They do not know Dante is not the dormant Herald they are looking for. He may be a different kind of problem.",ru:"Клетки в трюме специально предназначены для живой сущности класса Вестника. Руны сдерживания — не стандартный сдерживающий шрифт: они переписаны из до-Раскольного источника, полученного «Золотым Кругом» через товар Памяти Узла Первого: клиента, купившего и сохранившего память мастера-умельца эпохи Предтечей, включавшую проектные спецификации для сдерживания Вестников. Руны функционально точны. Они бы сработали. Разведывательные данные «Золотого Круга» об Острове Тишины лучше текущей рабочей модели Данте: они знают что там есть спящий Вестник. Они не знают что Данте — не тот спящий Вестник которого они ищут. Он может быть другим видом проблемы."},
  {id:"TET-99",en:"Whisper is aboard the Leviathan in Dante's shadow. He boarded by dissolving into the ambient shadow-architecture of the hold during loading, before the detection wards at the gangway were fully operational. He has been aboard for three hours before Dante arrived. He has mapped the ship's lower decks, identified the cargo manifest discrepancy, located the cages, and documented the rune specifications. This information is in a report he is composing in shorthand on a lead-sheet he carries. He will give it to Dante in the first private moment aboard. He has not told Dante he boarded early. He has not told Dante he has been on the ship longer than Dante has.",ru:"Шепот на борту «Левиафана» в тени Данте. Он поднялся на борт, растворившись в теневой архитектуре трюма во время загрузки, до того как детекторы охраны у трапа были полностью активированы. Он на борту три часа до прибытия Данте. Он нанёс на карту нижние палубы корабля, выявил расхождение в грузовом манифесте, обнаружил клетки и задокументировал спецификации рун. Эта информация — в отчёте, который он составляет стенографически на свинцовом листе. Он передаст его Данте при первом личном моменте на борту. Он не говорил Данте что поднялся на борт заранее. Он не говорил Данте что был на корабле дольше Данте."},
  {id:"TET-100",en:"Dante's cover identity — Master of Cartography from the Free Cities, bad temper, limp, genius navigation — was his predecessor's cover from an approach to the Island nineteen years ago, recovered from the predecessor's personal effects by Morius. Valdos's reaction to Dante across the interview: the 'grave certainty' that made old scars ache. Valdos has met someone with this specific quality before. Nineteen years ago, a cartographer from the Free Cities with a limp requested passage on a vessel Valdos was then captaining — as a much younger man, before the fortune, before the title. That cartographer never returned from the voyage. Valdos has not connected these facts. He has felt something he does not have a category for: the specific discomfort of someone who reminds you of someone you failed.",ru:"Прикрытие Данте — Магистр Картографии из Вольных Городов, скверный характер, хромота, гениальная навигация — было прикрытием его предшественника при подходе к Острову девятнадцать лет назад, извлечённым из личных вещей предшественника Мориусом. Реакция Валдоса на Данте на протяжении собеседования: «могильная уверенность», от которой заныли старые шрамы. Валдос встречал кого-то с этим специфическим качеством прежде. Девятнадцать лет назад картограф из Вольных Городов с хромотой запросил место на судне, которым тогда командовал Валдос — как значительно более молодой человек, до состояния, до титула. Тот картограф так и не вернулся из плавания. Валдос не соединил эти факты. Он почувствовал нечто, для чего у него нет категории: специфический дискомфорт человека, которому напоминают кого-то, кому ты не смог помочь."}
];

const SCENES=[

/* ─── SCENE 1: THE GOLDEN HARBOR ─── */
{id:"s1",
 title:{en:"The Golden Harbor",ru:"Золотая Гавань"},
 subtitle:{en:"A nest of vultures who imagine themselves eagles.",ru:"Гнездо стервятников, вообразивших себя орлами."},
 location:{en:"Trade League Harbor — Pier One",ru:"Порт Торговой Лиги — Пирс Первый"},
 timing:{en:"Morning, Day of Departure",ru:"Утро, День Отплытия"},
 flags:["field_operation","foreshadowing"],
 povData:{
   dante:{distortion:2,
     text:{
       en:`The Trade League port does not smell like fish. This is the first significant data point. A port that smells of lacquered wood, expensive spice, and the metallic freshness of concentrated capital is a port that has systematically excluded the economic activity that produces smell. Poverty produces smell. The Trade League has made the eradication of poverty's proximity a core branding decision.\n\nThe knee registered the sea air immediately. Damp cold seeks the path of least resistance through clothing, and joint fluid at reduced metabolic rate is more responsive to barometric pressure than healthy tissue. I transferred weight to the cane. The cane on the harbor cobblestones produced a sound between the marble of the Citadel and the stone of Valeria's garden — wooden planking registers differently from both. I noted this without examining why I am building this catalogue of the cane's acoustic register across surfaces.\n\nWhisper was in my shadow. He had been in my shadow since we left the Guild courtyard. I did not ask what he had been doing before I arrived at the harbor. He did not volunteer. This is the arrangement.\n\nThe Leviathan. Four masts of white iron oak, enchanted bronze plating on the hull, emerald-eyed serpent figurehead. The ship is worth a small kingdom. The lead-lined crates being loaded through the secondary hatch are worth significantly more — not in monetary terms, but in operational terms. That much lead shielding, in that configuration, means either outgoing Void-radiation emission containment or incoming containment preparation. The quantity and configuration suggests the second: they are building a holding infrastructure. They are planning to bring something back.\n\nI present the credential at the gangway. The guard reads it, checks the seal, looks at the cane, looks at my face, checks the seal again. People look at the cane first when they are performing threat assessment. I have been monitoring this as a behavioral pattern since acquiring the cane. The cane has become an element of every interaction. I had not anticipated this when I requisitioned it eleven days ago.\n\nI had the credential prepared. I had the name ready. I had the character ready — the cartographer from the Free Cities, bad temper, genius navigation, limp.\n\nI had not asked Morius how he had this specific cover already prepared.\n\nI had filed the question. The file is heavier than it was in Chapter 11.`,
       ru:`Порт Торговой Лиги не пахнет рыбой. Это первая значимая точка данных. Порт, пахнущий лакированным деревом, дорогими специями и металлической свежестью сконцентрированного капитала — порт, систематически исключивший экономическую деятельность, производящую запах. Бедность производит запах. Торговая Лига сделала устранение близости бедности основным брендинговым решением.\n\nКолено немедленно зарегистрировало морской воздух. Влажный холод ищет путь наименьшего сопротивления через одежду, а суставная жидкость при пониженной скорости метаболизма более чувствительна к барометрическому давлению, чем здоровая ткань. Я перенёс вес на трость. Трость по портовой брусчатке производила звук между мрамором Цитадели и камнем сада Валерии — деревянные доски регистрируются иначе от обоих. Я отметил это, не исследуя почему строю этот каталог акустического регистра трости на разных поверхностях.\n\nШепот был в моей тени. Он был в моей тени с тех пор как мы покинули двор Гильдии. Я не спросил что он делал до моего прибытия в гавань. Он не сообщил. Такова договорённость.\n\n«Левиафан». Четыре мачты из белого железного дуба, зачарованные бронзовые пластины на корпусе, изумрудноглазая носовая фигура змея. Корабль стоит небольшое королевство. Ящики, обитые свинцом, загружаемые через вторичный люк, стоят значительно больше — не в денежном, а в операционном выражении. Такое количество свинцовой защиты, в такой конфигурации, означает либо сдерживание исходящего излучения Пустоты, либо подготовку входящего сдерживания. Количество и конфигурация предполагает второе: они строят удерживающую инфраструктуру. Они планируют привезти что-то обратно.\n\nЯ предъявляю верительную грамоту у трапа. Охранник читает её, проверяет печать, смотрит на трость, смотрит на моё лицо, снова проверяет печать. Люди смотрят на трость первой при оценке угрозы. Я отслеживаю это как поведенческий паттерн с момента приобретения трости. Трость стала элементом каждого взаимодействия. Я не предвидел этого когда запрашивал её одиннадцать дней назад.\n\nУ меня была подготовлена верительная грамота. Имя готово. Персонаж готов — картограф из Вольных Городов, скверный характер, гениальная навигация, хромота.\n\nЯ не спрашивал Мориуса как у него оказалось именно это прикрытие уже подготовленным.\n\nЯ занёс вопрос в файл. Файл тяжелее, чем был в Главе 11.`
     },
     knows:{en:["The lead-lined crates are incoming containment preparation — they are building holding infrastructure to bring something back. Not outgoing shielding.","Whisper was in his shadow from the Guild courtyard — he did not ask what Whisper was doing before he arrived. The arrangement continues.","The cane has become an element of every interaction since he acquired it — he is monitoring this as a behavioral pattern. He had not anticipated this."],ru:["Ящики со свинцом — подготовка входящего сдерживания: они строят удерживающую инфраструктуру чтобы привезти что-то обратно. Не исходящая защита.","Шепот был в его тени от двора Гильдии — он не спрашивал что Шепот делал до его прибытия. Договорённость продолжается.","Трость стала элементом каждого взаимодействия с момента приобретения — он отслеживает это как поведенческий паттерн. Он не предвидел этого."]},
     misunderstands:{en:["He notes the cane's acoustic register across surfaces without examining why he is building this catalogue. The catalogue is a record of where he has been with the predecessor's cane — every surface the predecessor's cane would have touched if the predecessor had made this approach nineteen years ago. He is not building a sound diary. He may be building a ghost map.","'The file is heavier than it was in Chapter 11.' He acknowledges the unanswered question is accumulating weight. He has not asked it. This is a filing decision, not an operational decision. The distinction is becoming load-bearing."],ru:["Он отмечает акустический регистр трости на разных поверхностях не исследуя почему строит этот каталог. Каталог — запись мест, где он был с тростью предшественника: каждая поверхность, которую трость предшественника касалась бы, если бы предшественник совершил этот подход девятнадцать лет назад. Он строит не звуковой дневник. Он может строить карту призрака.","«Файл тяжелее, чем был в Главе 11». Он признаёт что неотвеченный вопрос накапливает вес. Он не задал его. Это решение об архивировании, а не операционное решение. Различие становится несущим."]},
     hides:{en:["He knows the navigator Valdos sent to the mast was named Perrin, was twenty-three, had a family in the harbor district. This information is in Whisper's package. He received it. He did not use Perrin's name in this scene or in the interview. He has the name. He is carrying it.","He has been tracking the cane's sound on every surface since Valeria's garden. He has not named what he is tracking. He has named it 'a catalogue of acoustic register' — which is accurate and is also a way of not naming what the catalogue is for."],ru:["Он знает что навигатора, которого Валдос отправил на мачту, звали Перрин, ему было двадцать три года, у него была семья в портовом районе. Эта информация в пакете Шепота. Он получил его. Он не использовал имя Перрина в этой сцене или на собеседовании. У него есть имя. Он его несёт.","Он отслеживает звук трости на каждой поверхности с сада Валерии. Он не называл что отслеживает. Он назвал это «каталогом акустического регистра» — что точно и также является способом не называть для чего каталог."]},
     whisper:{en:"He is tracking the cane's sound on every surface. He has not named what the catalogue is for. He is carrying the navigator's name. He did not use it.",ru:"Он отслеживает звук трости на каждой поверхности. Он не назвал для чего каталог. Он несёт имя навигатора. Он не использовал его."}
   }
 }
},

/* ─── SCENE 2: INTERVIEW WITH A SHARK ─── */
{id:"s2",
 title:{en:"Interview with a Shark",ru:"Собеседование с Акулой"},
 subtitle:{en:"He sells truth. She sells comfort. Valdos buys whichever feels safer.",ru:"Он продаёт правду. Она продаёт комфорт. Валдос покупает то, что ощущается безопаснее."},
 location:{en:"Captain's Cabin, The Leviathan",ru:"Каюта Капитана, «Левиафан»"},
 timing:{en:"One Hour Before Departure",ru:"Час До Отплытия"},
 flags:["social_combat","reveal"],
 povData:{
   dante:{distortion:2,
     text:{
       en:`Valdos's cabin is twelve feet larger than my office at the Guild. This is not accidental. Every element of this room is a status statement that has been revised and updated approximately once per year for the past twenty years: the snow leopard rugs, the gold-framed charts, the mahogany table. The accumulated weight of these choices tells me more about Valdos than any intelligence file — he is a man who acquires and upgrades, which means he is a man who has never stopped proving something to someone who is no longer watching.\n\nHe called me a cripple before I sat down. This is faster than average — most people wait until they are comfortable before deploying social dominance testing. He is uncomfortable immediately and is covering it with aggression. I noted: the specific discomfort of a man who recognizes something he cannot name.\n\nI sat without being invited. The chair was comfortable. I put the cane on my knee and held the raven's head. The earring gave no signal. No deception in the room — everything Valdos believes about his power here is accurate within the boundaries of his understanding.\n\nThe story about the previous navigator. Whisper provided me Perrin's complete file before I entered the harbor. I know the name, the family, the debt structure, the enforcement method. I know which storm it was and what the mast height was. I did not use any of this. I used only the information that Valdos volunteered — the debt — to signal that I had independent intelligence. The signal was sufficient. I did not need to deploy the name.\n\nThe chart demonstration was not planned. I placed my hand on the chart because the chart's magical suppression of hazard data was producing false confidence in a person whose ship I am about to be on, and false confidence in a captain on a dangerous voyage is an operational risk to me. I allowed the null-field to operate without suppression. The chart dissolved. The rocks appeared. This was the outcome I needed, arrived at faster than a verbal argument would have produced it.\n\nHe thought I cast something. I did not correct this impression. An operator who is understood is an operator whose methods can be countered. An operator who is mysterious is an operator whose methods remain available.\n\nThe contract conditions: separate cabin, independent provisions, course authority. The first two protect operational security. The third is the mission requirement. He objected to the third as an affront to his authority. I told him to pray to himself when we enter the Silent Waters, or hire me and let me be his prophet.\n\nHe signed.\n\nHe was afraid. Not of me specifically — of the quality I carry, which is the same quality I noticed the templars responding to at the Citadel gate. Whatever the Herald null-field produces as a social perception, it reads as categorical certainty about outcomes. People find this alarming in someone they cannot buy.`,
       ru:`Каюта Валдоса на двенадцать футов больше моего кабинета в Гильдии. Это не случайно. Каждый элемент этой комнаты — заявление статуса, которое пересматривалось и обновлялось приблизительно раз в год на протяжении последних двадцати лет: шкуры снежных барсов, карты в золотых рамах, стол из красного дерева. Накопленный вес этих выборов говорит мне о Валдосе больше, чем любой разведывательный файл — он человек, приобретающий и модернизирующий, что означает человека, так и не переставшего что-то доказывать кому-то, кто больше не смотрит.\n\nОн назвал меня калекой до того как я сел. Это быстрее среднего — большинство людей ждут пока не почувствуют себя комфортно прежде чем применять социальное доминирующее тестирование. Он испытывает немедленный дискомфорт и прикрывает это агрессией. Я отметил: специфический дискомфорт человека, узнающего что-то, что не может назвать.\n\nЯ сел без приглашения. Кресло было удобным. Я положил трость на колено и держал голову ворона. Серьга не подала сигнала. В комнате нет обмана — всё, во что Валдос верит о своей власти здесь, точно в пределах его понимания.\n\nИстория о предыдущем навигаторе. Шепот предоставил мне полное досье Перрина до входа в гавань. Я знаю имя, семью, структуру долга, метод принуждения. Я знаю какой это был шторм и какой была высота мачты. Я ничего из этого не использовал. Я использовал только информацию, которую добровольно предоставил Валдос — долг — чтобы сигнализировать что у меня есть независимая разведка. Сигнала было достаточно. Мне не нужно было применять имя.\n\nДемонстрация карты не была запланирована. Я положил руку на карту, потому что магическое подавление данных об опасностях производило ложную уверенность у человека, на чьём корабле мне предстоит быть, а ложная уверенность капитана в опасном плавании является для меня операционным риском. Я позволил нулевому полю работать без подавления. Карта растворилась. Появились скалы. Это был нужный мне исход, достигнутый быстрее чем словесный аргумент.\n\nОн думал что я применил заклинание. Я не исправил это впечатление. Оператор, которого понимают — оператор, чьи методы можно противодействовать. Таинственный оператор — оператор, чьи методы остаются доступными.\n\nУсловия контракта: отдельная каюта, независимое снабжение, право прокладки курса. Первые два защищают операционную безопасность. Третье — требование миссии. Он возражал против третьего как оскорбления своей власти. Я сказал ему молиться себе когда войдём в Тихие Воды, или нанять меня и позволить быть его пророком.\n\nОн подписал.\n\nОн боялся. Не меня конкретно — качества, которое я несу: то же качество, которое я заметил что храмовники воспринимали у ворот Цитадели. Что бы нулевое поле Вестника ни производило как социальное восприятие, это читается как категорическая уверенность в исходах. Люди находят это тревожащим в том, кого нельзя купить.`
     },
     knows:{en:["He knows Perrin's full file — name, family, debt, enforcement, the storm, the mast height. He chose not to deploy the name.","The chart demonstration was unplanned — he allowed the null-field to expand to solve an operational problem (captain's false confidence). He did not correct Valdos's impression that he cast something.","The 'grave certainty' Valdos responded to is the Herald null-field's social perception — it reads as categorical certainty about outcomes. He has now named this effect explicitly."],ru:["Он знает полное досье Перрина — имя, семья, долг, принуждение, шторм, высота мачты. Он выбрал не применять имя.","Демонстрация карты была незапланированной — он позволил нулевому полю расшириться чтобы решить операционную проблему (ложная уверенность капитана). Он не исправил впечатление Валдоса что он применил заклинание.","«Могильная уверенность», на которую отреагировал Валдос — социальное восприятие нулевого поля Вестника: читается как категорическая уверенность в исходах. Он теперь явно назвал этот эффект."]},
     misunderstands:{en:["'I did not use any of this. I used only what Valdos volunteered.' He chose not to deploy Perrin's name as a tactical decision — it would have escalated Valdos past negotiation into something less productive. This is correct. It is also the second time in this chapter he has chosen not to use a name he is carrying. The chapter has a name-carrying pattern he has not noted."],ru:["«Я ничего из этого не использовал. Я использовал только то, что Валдос добровольно предоставил». Он выбрал не применять имя Перрина как тактическое решение — это бы эскалировало Валдоса за пределы переговоров во что-то менее продуктивное. Это верно. Это также второй раз в этой главе когда он выбирает не использовать имя которое несёт. В главе есть паттерн несения имён, который он не отметил."]},
     hides:{en:["The chart dissolution was not planned. He notes this and immediately notes the operational outcome. He does not note the one-second pause between placing his hand and releasing the null-field — the moment of deliberate choice to let it happen. The choice was made. The deliberation is not in the narration.","'He was afraid of the quality I carry.' He has described this quality as a social effect of the null-field. He has not yet examined whether the quality is entirely a property of the earring, or whether some portion of it is a property of the person who carries the earring for twenty-one years. These may be the same thing. They may not be."],ru:["Растворение карты не было запланировано. Он отмечает это и немедленно отмечает операционный исход. Он не отмечает однословную паузу между укладкой руки и высвобождением нулевого поля — момент намеренного выбора позволить этому произойти. Выбор был сделан. Обдумывание не в нарративе.","«Он боялся качества которое я несу». Он описал это качество как социальный эффект нулевого поля. Он ещё не исследовал является ли это качество полностью свойством серьги, или какая-то его часть — свойством человека, несущего серьгу двадцать один год. Это может быть одним и тем же. Может и нет."]},
     whisper:{en:"He chose not to use the navigator's name. He is carrying Perrin's file. He has carried the name since the harbor. This is the second scene. He still has not used it.",ru:"Он выбрал не использовать имя навигатора. Он несёт досье Перрина. Он несёт имя с гавани. Это вторая сцена. Он всё ещё не использовал его."}
   },
   valdos:{distortion:5,
     text:{
       en:`I have met navigators. I have met mages. I have met scholars, killers, and men who claimed to be all three. I have not met whatever walked into my cabin today.\n\nHe sat down without waiting. This alone would normally earn someone a lesson in manners. Instead I watched myself wait to see what he would do next, which is not something I do. I make people wait. I do not wait for them.\n\nThe cane. He holds it like it's part of him, not like he's leaning on it. There's a difference. Men who lean on canes are diminished by them. This man is extended by his. The silver raven on the handle was looking at me the entire conversation and I could not tell you why that bothered me, but it did.\n\nI told him about the previous navigator. I included the blood from the eyes because that's the good part of the story, the part that travels well. He didn't react to it the way people usually do — no widening of the eyes, no performative concern. He looked at me as though I had confirmed something he already knew.\n\nI pressed on the route. He said the chart lied. I was going to push back until he put his hand on the chart and the charm went out and I saw the rocks. Twenty years at sea. I know those waters. Those rocks are real. They are not on any chart I have ever read because the charts make it look clean because the charts are made for people who pay for the charts. He showed me what was actually there in about four seconds.\n\nI don't know what he did. My mage has no explanation. She says: 'he didn't cast anything, the chart simply — stopped.' I have stopped pressing her for an explanation because the explanation is not going to make me more comfortable.\n\nI signed the contract. I crossed off the captain-authority clause back once he wasn't looking and my lawyer can argue it later if we need to. A man who is afraid of drowning doesn't argue fine print at the gangway.\n\nThere's something about him that's familiar in the way that ghosts are familiar — not that I've seen him before, but that I've seen the outline of him. Someone who walked like that, thought like that. Someone who came on one of my ships a long time ago and didn't come back.\n\nI don't believe in ghosts. But I checked the manifest twice after he left the cabin and I'm not entirely sure why.`,
       ru:`Я встречал навигаторов. Я встречал магов. Я встречал учёных, убийц и людей, претендующих быть всем тремя. Я не встречал того, что вошло в мою каюту сегодня.\n\nОн сел не дожидаясь. Одного этого обычно было бы достаточно чтобы преподать кому-то урок манер. Вместо этого я наблюдал как жду посмотреть что он сделает дальше — чего я не делаю. Я заставляю людей ждать. Я не жду их.\n\nТрость. Он держит её так, словно она часть его, а не опирается на неё. Есть разница. Люди, опирающиеся на трости, умаляются ими. Этот человек расширяется своей. Серебряный ворон на рукояти смотрел на меня весь разговор, и я не могу сказать почему это беспокоило меня, но беспокоило.\n\nЯ рассказал ему о предыдущем навигаторе. Включил кровь из глаз — это хорошая часть истории, та что путешествует хорошо. Он не отреагировал так как люди обычно реагируют — никакого расширения глаз, никакой демонстративной озабоченности. Он смотрел на меня так, словно я подтвердил нечто что он уже знал.\n\nЯ надавил на маршрут. Он сказал что карта лжёт. Я был готов возразить пока он не положил руку на карту, чары не ушли, и я не увидел скалы. Двадцать лет в море. Я знаю эти воды. Те скалы реальны. Их нет ни на одной карте что я читал, потому что карты делают это выглядящим чисто, потому что карты делаются для людей, платящих за карты. Он показал мне что там реально за четыре секунды.\n\nЯ не знаю что он сделал. У моего мага нет объяснения. Она говорит: «он не применял заклинание, карта просто — остановилась». Я перестал давить на неё за объяснение потому что объяснение не сделает меня комфортнее.\n\nЯ подписал контракт. Я вычеркнул пункт о власти капитана раз когда он не смотрел, и мой юрист может спорить об этом позже если понадобится. Человек, боящийся утонуть, не спорит о мелком шрифте у трапа.\n\nВ нём есть что-то знакомое так, как знакомы призраки — не что я видел его прежде, а что я видел его контур. Кто-то, ходивший так, думавший так. Кто-то, когда-то давно поднявшийся на одно из моих судов и не вернувшийся.\n\nЯ не верю в призраков. Но я дважды проверил манифест после того как он ушёл из каюты, и я не вполне уверен почему.`
     },
     knows:{en:["The rocks on the chart are real — he has twenty years of sea experience and recognized them immediately when the charm failed","He crossed off the captain-authority clause back when Dante wasn't looking — he has a legal workaround he plans to deploy if needed","The familiarity he felt is real — he has sensed 'the outline' of someone who came on one of his ships and didn't return"],ru:["Скалы на карте реальны — у него двадцать лет морского опыта и он немедленно узнал их когда чары пропали","Он вычеркнул пункт о власти капитана когда Данте не смотрел — у него есть юридический обходной манёвр","Знакомость которую он почувствовал реальна — он ощутил «контур» кого-то кто поднялся на одно из его судов и не вернулся"]},
     misunderstands:{en:["'I don't believe in ghosts. But I checked the manifest twice.' He believes checking the manifest was a practical action unrelated to the ghost feeling. It was not. He checked the manifest because something in the interaction activated a nineteen-year-old pattern recognition he has never resolved. He is looking for a discrepancy that would explain the familiarity. He will not find it in the manifest.","He crossed off the captain-authority clause assuming this gives him legal recourse. The clause Dante crossed off was written to be redundant — Dante's actual authority mechanism is not dependent on a contractual provision. Dante crossed off the clause because he knew Valdos would cross it back, and he wanted Valdos to feel he had retained something."],ru:["«Я не верю в призраков. Но я дважды проверил манифест». Он считает что проверка манифеста была практическим действием не связанным с ощущением призрака. Нет. Он проверил манифест потому что что-то во взаимодействии активировало девятнадцатилетнее распознавание паттернов которое он никогда не разрешил. Он ищет расхождение которое объяснило бы знакомость. Он не найдёт его в манифесте.","Он вычеркнул пункт о власти капитана полагая что это даёт ему юридические права. Пункт который вычеркнул Данте был написан чтобы быть избыточным — реальный механизм власти Данте не зависит от договорного положения. Данте вычеркнул пункт потому что знал что Валдос вычеркнет его обратно, и хотел чтобы Валдос почувствовал что сохранил что-то."]},
     hides:{en:["He has crossed the captain-authority clause back and has not told Dante. He will discover this does not matter in a way he is not prepared for.","He checked the manifest twice after Dante left. He has not told anyone about the ghost-familiarity feeling. He has not told anyone about the cartographer from nineteen years ago who came aboard his ship and didn't come back. He has not told anyone this because he has never formally connected these events — the cartographer is a memory he has never fully processed, left in the category of 'things that happened at sea, before.'"],ru:["Он вычеркнул пункт о власти капитана обратно и не говорил Данте. Он обнаружит что это не имеет значения способом к которому не готов.","Он дважды проверил манифест после ухода Данте. Он не говорил никому об ощущении знакомости-призрака. Не говорил никому о картографе девятнадцать лет назад поднявшемся на его корабль и не вернувшемся. Он не говорил никому об этом потому что никогда формально не связывал эти события — картограф — воспоминание которое он никогда не обработал полностью, оставленное в категории «вещи случившиеся в море, прежде»."]},
     whisper:{en:"He checked the manifest twice after Dante left. He thinks he doesn't believe in ghosts. He is looking for a discrepancy that would explain the familiarity. He will not find it there.",ru:"Он дважды проверил манифест после ухода Данте. Он думает что не верит в призраков. Он ищет расхождение объясняющее знакомость. Он не найдёт его там."}
   }
 }

{id:"s3",
 title:{en:"The Shadow on Deck",ru:"Тень на Палубе"},
 subtitle:{en:"Two variables the cartographer did not declare. One is watching him.",ru:"Две переменные, которые картограф не задекларировал. Одна наблюдает за ним."},
 location:{en:"The Leviathan — Open Water",ru:"«Левиафан» — Открытое Море"},
 timing:{en:"One Hour After Departure",ru:"Час После Отплытия"},
 flags:["pivotal","threat","foreshadowing"],
 povData:{
   dante:{distortion:3,
     text:{
       en:`The ship was provisioned with a dietary supplement in the main galley supply that I identified from the chemical resonance when I passed the galley hatch. Not food contamination in the standard sense — the compound is dissolved into the general cooking water at a concentration that produces effects across approximately fourteen days of regular consumption. I did not touch the galley supply when I established my independent provisions. I did not tell Valdos. I did not tell Whisper, because Whisper, in my shadow, would have been close enough to the galley to register the resonance independently — and he did not tell me about it, which means he found it before I did and made the same decision I made, which means we have now made a bilateral non-disclosure about a discovered threat to the expedition personnel without discussing it.\n\nThis is the forty-fourth.\n\nI was standing at the stern watching the harbor recede when Valdos appeared with the introduction. The earring was cold the entire time I had been on deck. No active deception in anyone's immediate vicinity.\n\nThen the door opened.\n\nFather Ignatius. A man in a grey robe with a rope belt, a blindfold painted with a red tear, finger-bones as prayer beads. Supreme Inquisitor of the Order of Purity. His Void-adjacent perception was immediately apparent — he turned directly toward me, without any of the standard spatial cues that a blind person uses to orient toward a sound source. He oriented toward the null-field. He can feel it. He knows something is there.\n\nHe said: I sense emptiness. Unusual. People are generally full of sins or faith. Here — silence.\n\nI said: maps have no soul. Cartographers are empty things.\n\nHe smiled with thin lips and said: everything has a soul, and everything can be burned to save it.\n\nThe earring gave no alert. He was not deceiving me. He believes what he said completely. That is the most dangerous kind of person to be on a ship with — a man whose genuine conviction that something is wrong cannot be managed by exposing the fiction, because there is no fiction. His perception is accurate. I am, in the terms his training would use, a void-signature — a thing that does not produce the standard output his perception is calibrated to read.\n\nI have two operational parameters now. Valdos: manageable through information leverage, motivated by profit and self-preservation, will follow course authority as long as he believes I am the most dangerous thing between him and drowning. Ignatius: not manageable through standard means. His perception works on a different layer. He has already correctly identified that I am not standard-human.\n\nHe has not yet correctly identified what I am. That gap is the entire safety margin.\n\nI gripped the raven's head on the cane and looked at the horizon.\n\nLong voyage. Long voyage indeed.`,
       ru:`Корабль был снабжён диетической добавкой в основном запасе камбуза, которую я определил по химическому резонансу проходя мимо люка камбуза. Не заражение еды в стандартном смысле — соединение растворено в общей кулинарной воде в концентрации, производящей эффекты приблизительно через четырнадцать дней регулярного потребления. Я не прикасался к камбузному снабжению когда устанавливал независимые запасы. Я не говорил Валдосу. Я не говорил Шепоту, потому что Шепот в моей тени мог быть достаточно близко к камбузу для самостоятельной регистрации резонанса — и он не говорил мне об этом, что означает: он нашёл его до меня и принял то же решение что я, что означает: мы сделали двустороннее нераскрытие об обнаруженной угрозе персоналу экспедиции без обсуждения.\n\nЭто сорок четвёртое.\n\nЯ стоял на корме наблюдая как гавань удаляется, когда появился Валдос с представлением. Серьга была холодной всё время пока я был на палубе. Никакого активного обмана в непосредственном окружении.\n\nПотом дверь открылась.\n\nОтец Игнациус. Человек в серой рясе с верёвочным поясом, повязкой с нарисованной красной слезой, фалангами пальцев в качестве чёток. Верховный Инквизитор Ордена Чистоты. Его восприятие смежное с Пустотой было немедленно очевидным — он повернулся прямо ко мне, без каких-либо стандартных пространственных сигналов которые слепой человек использует для ориентирования на источник звука. Он ориентировался на нулевое поле. Он может его чувствовать. Он знает что там что-то есть.\n\nОн сказал: я чувствую пустоту. Необычно. Люди обычно полны грехов или веры. Здесь — тишина.\n\nЯ сказал: у карт нет души. Картографы — пустые вещи.\n\nОн улыбнулся тонкими губами и сказал: всё имеет душу, и всё можно сжечь чтобы её спасти.\n\nСерьга не подала сигнала. Он не обманывал меня. Он полностью верит в то что сказал. Это самый опасный вид человека для совместного плавания — человек, чьё подлинное убеждение что что-то не так не поддаётся управлению через разоблачение выдумки, потому что выдумки нет. Его восприятие точно. Я, в терминах которыми использовала бы его подготовка, — сигнатура пустоты: вещь, не производящая стандартного вывода который откалиброван читать его восприятием.\n\nТеперь у меня два операционных параметра. Валдос: управляемый через информационный рычаг, мотивированный прибылью и самосохранением, будет следовать права прокладки курса пока считает меня наиболее опасной вещью между собой и утоплением. Игнациус: не управляемый стандартными средствами. Его восприятие работает на другом слое. Он уже правильно определил что я не стандартно-человеческий.\n\nОн ещё не определил правильно что я такое. Этот разрыв — весь запас безопасности.\n\nЯ сжал голову ворона на трости и посмотрел на горизонт.\n\nДолгое плавание. Воистину долгое.`
     },
     knows:{en:["The galley dietary supplement is a Memory commodity compound — 14-day dissolution producing selective amnesia. He registered it from chemical resonance and established independent provisions.","Whisper also found it and made the same non-disclosure decision — making this the 44th bilateral non-disclosure. He counted it immediately.","Ignatius oriented toward the null-field, not a sound source — his Void-adjacent perception is already tracking the earring. The only safety margin is: he has not yet correctly identified what he is sensing."],ru:["Диетическая добавка камбуза — соединение товара Памяти: 14-дневное растворение производящее избирательную амнезию. Он зарегистрировал по химическому резонансу и установил независимые запасы.","Шепот также нашёл и принял то же решение о нераскрытии — делая это 44-м двусторонним нераскрытием. Он немедленно сосчитал.","Игнациус ориентировался на нулевое поле, а не на источник звука — его Пустотно-смежное восприятие уже отслеживает серьгу. Единственный запас безопасности: он ещё не правильно определил что воспринимает."]},
     misunderstands:{en:["He frames Ignatius as 'not manageable through standard means' and identifies the safety margin as the gap between 'not standard-human' and 'correctly identified what I am.' He has not yet modeled the possibility that Ignatius, being a Node One Cult client, has information about Herald-class signatures that might close that gap faster than Dante expects.","'I gripped the raven's head and looked at the horizon.' He does not note that he has gripped the raven's head as a tactile anchor in five of the twelve chapters — always in moments of named uncertainty. He has noted the cane's acoustic register on surfaces. He has not noted the grip pattern."],ru:["Он формулирует Игнациуса как «не управляемого стандартными средствами» и определяет запас безопасности как разрыв между «не стандартно-человеческий» и «правильно определил что я такое». Он ещё не моделировал возможность что Игнациус, будучи клиентом Узла Первого Культа, имеет информацию о сигнатурах класса Вестников способную закрыть этот разрыв быстрее чем ожидает Данте.","«Я сжал голову ворона и посмотрел на горизонт». Он не отмечает что сжимал голову ворона как тактильный якорь в пяти из двенадцати глав — всегда в моменты названной неопределённости. Он отмечал акустический регистр трости на поверхностях. Он не отмечал паттерн хватки."]},
     hides:{en:["The 44th bilateral non-disclosure — the galley compound — happened without any communication. They both found it. They both said nothing. He counted it immediately. He has not examined what it means that they have now reached a count where he immediately knows the number when another instance occurs.","He gripped the raven's head on the cane. He looked at the horizon. He said: long voyage. He did not note what he felt when Ignatius's blindfold looked directly at him — not at his face, at his earring. He did not note this as a near-miss. He noted the operational parameters.","The navigator Perrin. His name has been in Dante's possession since the harbor. The chapter ends. He has not used it in any scene. It is in his pocket like something he has not yet decided what to do with."],ru:["44-е двустороннее нераскрытие — соединение камбуза — произошло без какой-либо коммуникации. Они оба нашли его. Оба ничего не сказали. Он сосчитал немедленно. Он не исследовал что означает то, что они теперь достигли счёта где он немедленно знает число при возникновении очередного случая.","Он сжал голову ворона на трости. Посмотрел на горизонт. Сказал: долгое плавание. Он не отметил что почувствовал когда повязка Игнациуса смотрела прямо на него — не на его лицо, на его серьгу. Он не отметил это как чуть не промах. Он отметил операционные параметры.","Навигатор Перрин. Его имя находится во владении Данте с гавани. Глава заканчивается. Он не использовал его ни в одной сцене. Оно в его кармане как нечто, о котором он ещё не решил что делать."]},
     whisper:{en:"44 bilateral non-disclosures. He counted it the moment he realized Whisper had also found the compound. The navigator's name is still in his pocket. The chapter ends.",ru:"44 двусторонних нераскрытия. Он сосчитал в момент осознания что Шепот также нашёл соединение. Имя навигатора всё ещё у него в кармане. Глава заканчивается."}
   },
   ignatius:{distortion:7,
     text:{
       en:`The air changes before a thing that does not belong to it.\n\nI have been blind for forty years. Before that I had eyes, and with eyes I learned what people look like. After that I learned what people feel like — not the crude assessment of the fraudulent sensitive, but the structural perception that develops when one sensory channel closes and the others expand to fill the architecture. I feel faith. I feel the particular texture of genuine belief against the particular texture of performed belief. I feel guilt, which has a density to it like wet sand. I feel fear, which is thin and fast.\n\nWhat I felt when the door of the cabin opened to this air was none of these.\n\nI felt absence.\n\nNot the absence of feeling in the way that a wall is absent of feeling — walls do not have a presence that then becomes absence. This was presence that was organized around a center of not-there. A structure built from the outside of nothing. Like a ring that defines its hole by existing around it.\n\nThe cartographer from the Free Cities. He announced himself as empty things — maps with no soul. He smiled, I could hear the quality of it, without warmth but without cruelty. Precision. A man who has reached a form of precision that has become indistinguishable from calm.\n\nI have encountered three things in forty years of service to the Order that I could not read. The first was a demon whose mind was structured in a language so alien that my perception slid off it. The second was an artifact that pre-dated the Order's own founding documents. The third is this man.\n\nHe is not a demon. He is not an artifact. He is structured like a person — the layers of decision and memory and habit that accumulate into selfhood are present. But at the center of those layers, where the soul-signature sits in a normal human person, there is the ring.\n\nThe ring defines its hole.\n\nI told him everything has a soul and everything can be burned to save it. This is true. It is also a warning — I give warnings when I am uncertain. The Order has a protocol for things that do not fit standard categories. The protocol begins with observation and ends, if necessary, with reduction to components. I have initiated observation.\n\nI will not tell Valdos yet. Valdos is a pragmatist. He will make commercial calculations.\n\nI will tell the Order when we make port, if we make port. Until then: observation. The thing that has no center is the most important variable on this ship.\n\nI ran my thumb across the finger-bone prayer beads.\n\nThe sea is patient. So am I.`,
       ru:`Воздух меняется прежде чего-то, что ему не принадлежит.\n\nЯ слеп сорок лет. До этого у меня были глаза, и с глазами я узнал как выглядят люди. После этого я узнал каковы люди на ощупь — не грубую оценку мошеннического экстрасенса, а структурное восприятие, развивающееся когда один сенсорный канал закрывается и другие расширяются чтобы заполнить архитектуру. Я чувствую веру. Я чувствую особую текстуру подлинного убеждения против особой текстуры исполненного убеждения. Я чувствую вину — у неё есть плотность как у мокрого песка. Я чувствую страх — он тонкий и быстрый.\n\nЧто я почувствовал когда дверь каюты открылась в этот воздух — ни одно из этого.\n\nЯ почувствовал отсутствие.\n\nНе отсутствие чувства так как стена лишена чувства — у стен нет присутствия которое затем становится отсутствием. Это было присутствие, организованное вокруг центра несуществования. Структура, построенная с внешней стороны ничего. Как кольцо, определяющее свою дыру существованием вокруг неё.\n\nКартограф из Вольных Городов. Он объявил себя пустыми вещами — картами без души. Он улыбнулся — я слышал её качество — без тепла но без жестокости. Точность. Человек, достигший формы точности, ставшей неотличимой от спокойствия.\n\nЗа сорок лет службы Ордену я встретил три вещи которые не мог прочитать. Первой был демон, чей разум был структурирован на столь чуждом языке что моё восприятие соскальзывало с него. Второй был артефакт, предшествующий собственным основополагающим документам Ордена. Третий — этот человек.\n\nОн не демон. Он не артефакт. Он структурирован как личность — слои решений, памяти и привычки, накапливающиеся в самость, присутствуют. Но в центре этих слоёв, где в нормальном человеке находится сигнатура души, — кольцо.\n\nКольцо определяет свою дыру.\n\nЯ сказал ему: всё имеет душу, и всё можно сжечь чтобы её спасти. Это правда. Это также предупреждение — я даю предупреждения когда неуверен. У Ордена есть протокол для вещей не укладывающихся в стандартные категории. Протокол начинается с наблюдения и заканчивается при необходимости редукцией до компонентов. Я инициировал наблюдение.\n\nЯ не буду говорить Валдосу пока. Валдос прагматик. Он сделает коммерческие расчёты.\n\nЯ сообщу Ордену когда войдём в порт — если войдём. До тех пор: наблюдение. Вещь без центра — наиболее важная переменная на этом корабле.\n\nЯ провёл большим пальцем по чёткам из фаланг пальцев.\n\nМоре терпеливо. И я тоже.`
     },
     knows:{en:["The 'ring that defines its hole' is his perception of the earring's null-field — he has correctly described the structural nature of it without knowing what it is","He has encountered three unreadable things in forty years — demon, pre-Order artifact, now this man. He has placed Dante in this category correctly.","The Order protocol: observation, then if necessary reduction to components. He has initiated observation. He has not told Valdos."],ru:["«Кольцо, определяющее свою дыру» — его восприятие нулевого поля серьги: он правильно описал структурную природу этого не зная что это такое","Он встретил три нечитаемые вещи за сорок лет — демон, артефакт до Ордена, теперь этот человек. Он правильно поместил Данте в эту категорию.","Протокол Ордена: наблюдение, затем при необходимости редукция до компонентов. Он инициировал наблюдение. Он не говорил Валдосу."]},
     misunderstands:{en:["'He is structured like a person — the layers of decision and memory and habit are present.' He is correct that the layers are there. He concludes from this that the absence is at the center (the soul-location). The absence is not at the center. The earring's null-field is peripheral — it suppresses external detection of Dante's internal signature rather than replacing it. Ignatius is reading the earring's effect as the absence of a soul. The soul is present. He cannot see past the null-field to verify this."],ru:["«Он структурирован как личность — слои решений, памяти и привычки присутствуют». Он прав что слои там есть. Он заключает из этого что отсутствие — в центре (место души). Отсутствие не в центре. Нулевое поле серьги — периферийное: оно подавляет внешнее обнаружение внутренней сигнатуры Данте, а не замещает её. Игнациус читает эффект серьги как отсутствие души. Душа присутствует. Он не может видеть сквозь нулевое поле чтобы это верифицировать."]},
     hides:{en:["He is a Node One Cult client — forty years of purchased Memory has given him access to experiential knowledge of things he has not personally experienced. One of his purchased memories is from a Precursor-era source — a partial account of a Herald interaction. He does not know this is what he remembers. He knows he has a frame of reference for 'the ring' that he cannot explain the origin of.","He will report to the Order when they make port. He has not decided yet what category designation to request. He knows the protocol for 'thing without a soul that is structured like a person' is Reduction. He is uncomfortable with this conclusion but has not yet found an alternative protocol."],ru:["Он клиент Узла Первого Культа — сорок лет купленной Памяти дали ему доступ к экспериментальным знаниям о вещах которые он лично не переживал. Одно из его купленных воспоминаний — из источника эпохи Предтечей: частичное описание взаимодействия с Вестником. Он не знает что именно это помнит. Он знает что у него есть система отсчёта для «кольца», происхождение которой он не может объяснить.","Он сообщит Ордену когда войдут в порт. Он ещё не решил какое обозначение категории запросить. Он знает что протокол для «вещи без души, структурированной как человек» — Редукция. Он испытывает дискомфорт от этого вывода, но пока не нашёл альтернативного протокола."]},
     whisper:{en:"'The ring that defines its hole.' He has correctly described the earring's null-field. He is already thinking about Reduction. He has a purchased memory from a Precursor-era source he cannot explain. He does not know what it is.",ru:"«Кольцо, определяющее свою дыру». Он правильно описал нулевое поле серьги. Он уже думает о Редукции. У него есть купленное воспоминание из источника эпохи Предтечей которое он не может объяснить. Он не знает что это такое."}
   }
 }

/* ═══ ENGINE ═══ */
const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');const secs=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}];c.innerHTML=secs.map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
