<style>

.lang-btn:first-child{border-right:none;}
.lang-btn.active{color:var(--pov-s);border-color:var(--pov-p);background:var(--bg3);}

#site-header{padding:56px 0 36px;text-align:center;}
.header-ornament{font-family:var(--ff-mono);font-size:12px;letter-spacing:.4em;color:var(--pov-s);text-transform:uppercase;margin-bottom:14px;opacity:.7;transition:color .8s;}

@keyframes barpulse{0%,100%{opacity:1;}50%{opacity:.3;}}

#narrative-text p{margin-bottom:1.3em;}
#narrative-text p:last-child{margin-bottom:0;}
.d3,.d4,.d5{animation:flicker-soft 14s infinite;}
.d6,.d7{animation:flicker-mid 7s infinite;}
.d8,.d9{animation:flicker-hard 4s infinite,glitch-mid 16s infinite;}
.d10{animation:flicker-hard 2s infinite,glitch-hard 8s infinite;filter:blur(.4px);}
@keyframes flicker-soft{0%,94%,100%{opacity:1;}96%{opacity:.88;}}
@keyframes flicker-mid{0%,88%,100%{opacity:1;}90%{opacity:.75;}92%{opacity:.9;}93%{opacity:.68;}94%{opacity:1;}}
@keyframes flicker-hard{0%,80%,100%{opacity:1;}82%{opacity:.6;}83%{opacity:.9;}84%{opacity:.55;}85%{opacity:.85;}86%{opacity:.7;}87%{opacity:1;}}
@keyframes glitch-mid{0%,92%,100%{transform:none;filter:none;}93%{transform:translate(-3px,0);filter:drop-shadow(3px 0 rgba(255,0,0,.3));}94%{transform:translate(3px,0);filter:drop-shadow(-3px 0 rgba(0,100,255,.2));}95%{transform:translate(-1px,1px);}96%{transform:none;}}
@keyframes glitch-hard{0%,88%,100%{transform:none;filter:none;}89%{transform:translate(-4px,0) skewX(-1deg);filter:drop-shadow(4px 0 rgba(255,0,0,.4)) saturate(2);}90%{transform:translate(4px,-1px) skewX(1deg);filter:drop-shadow(-4px 0 rgba(0,150,255,.3));}91%{transform:translate(-2px,2px);filter:brightness(.7);}92%{transform:translate(1px,-1px);}93%{transform:none;filter:none;}}

.intel-section.misunderstands .intel-section-head{color:#5a5a20;}
.intel-section.hides .intel-section-head{color:#5a2020;}
.intel-list{list-style:none;display:flex;flex-direction:column;gap:5px;}

.intel-section.knows .intel-list li{color:#5a8a5a;}

#ledger-trigger:hover{color:#8a0080;border-color:#4a003a;box-shadow:0 0 22px rgba(140,0,110,.18);background:#0c0010;}

</style>

const TIMELINE=[
  {id:"TET-21",en:"The Alchemist Consortium's 15% retention was a deliberate leverage test, not a genuine complaint about methods. Their chief negotiator had previously tested a 2% hold on a minor contract and Dante recovered it within 48 hours. They escalated to test where the floor was. Silas knew this and did not report the intelligence framing to Dante — only the stated reason.",ru:"Удержание 15% Консорциумом Алхимиков было намеренной проверкой рычагов давления, а не подлинной жалобой на методы. Главный переговорщик Консорциума ранее проверял 2%-ную задержку на незначительном контракте и Данте вернул её в течение 48 часов. Они эскалировали, чтобы проверить, где находится нижняя граница. Силас знал об этом и не сообщил Данте о разведывательной подоплёке — только заявленную причину."},
  {id:"TET-22",en:"Silas has been quietly skimming 0.3% from every large contract payment before reporting to Dante, routing the difference to a private account in a frontier banking house. He has done this for six years. His ledgers are otherwise flawless. He has skimmed a total of eleven times Dante's annual operating stipend.",ru:"Силас тихо снимает 0,3% с каждой крупной контрактной выплаты до отчёта Данте, направляя разницу на частный счёт в пограничном банковском доме. Он делает это шесть лет. Его гроссбухи в остальном безупречны. В сумме он снял в одиннадцать раз больше годового операционного жалованья Данте."},
  {id:"TET-23",en:"Baron Caldor did not become possessed accidentally. Three months ago, following the economic devastation caused by the Green Frontier contamination ripple, Caldor's province was effectively bankrupt. He traveled to the Wastes, found a Void-contact site documented in stolen Church records, and made deliberate contact. He sought the entity. It answered. The deal was struck voluntarily.",ru:"Барон Кальдор не был одержим случайно. Три месяца назад, после экономического опустошения, вызванного волной заражения Зелёного Предела, провинция Кальдора фактически обанкротилась. Он отправился в Пустоши, нашёл место контакта с Пустотой, задокументированное в похищенных церковных записях, и вступил в намеренный контакт. Он искал сущность. Она ответила. Сделка была заключена добровольно."},
  {id:"TET-24",en:"The Church sent two teams to the Iron Peak before approaching Dante. The first team vanished without trace eleven days ago. The second team returned five days ago. Brother Callum, the team leader, returned. He is alive and speaks fluently. He speaks in the Baron's voice. Cardinal Morius was the presiding officer at Callum's debrief. He did not disclose any of this to Dante.",ru:"Церковь отправила две группы в Железный Пик до обращения к Данте. Первая группа исчезла без следа одиннадцать дней назад. Вторая группа вернулась пять дней назад. Брат Каллум, командир группы, вернулся. Он жив и говорит свободно. Он говорит голосом Барона. Кардинал Мориус председательствовал на допросе Каллума. Он не раскрыл ничего из этого Данте."},
  {id:"TET-25",en:"The Antediluvian Era section of the Church's Secret Archives contains three files directly relevant to Dante's earring. Morius has read all three. The offer of archive access is genuine. The sub-section containing the most relevant files — cross-referenced under 'Covenant Objects, Pre-Sundering' — was not mentioned by Morius. He will observe which documents Dante examines and in what order.",ru:"Раздел Допотопной Эры Секретных Архивов Церкви содержит три файла, непосредственно касающихся серьги Данте. Мориус прочитал все три. Предложение доступа к архиву подлинное. Подраздел с наиболее релевантными файлами — перекрёстно индексированный под «Объекты Завета, До-Раскольного периода» — Мориус не упомянул. Он будет наблюдать, какие документы Данте исследует и в каком порядке."},
  {id:"TET-26",en:"The Void crystal in the ivory box reacted to Dante's earring. Not with silence — with a suppressed vibration that lasted 0.4 seconds before going quiet. Dante detected this and chose not to acknowledge it. The entity in the crystal recognized the earring and chose to be still. This recognition is bidirectional: the earring's material has a documented relationship with Void-contact objects that predates its current ownership.",ru:"Кристалл Пустоты в ларце из слоновой кости отреагировал на серьгу Данте. Не тишиной — подавленной вибрацией, длившейся 0,4 секунды до затихания. Данте обнаружил это и решил не признавать. Сущность в кристалле узнала серьгу и решила замереть. Это узнавание двунаправленное: материал серьги имеет задокументированную связь с объектами контакта Пустоты, предшествующую её нынешнему владельцу."},
  {id:"TET-27",en:"The Heavy Protocol, once activated, seals the designated zone from magical travel, communication, and retreat — for all parties, including Dante's own team. Once the Protocol is active, no one inside the zone can leave until it is lifted from outside. Dante knows this. He activated it anyway. The Protocol was last used nine years ago. The team it sealed inside did not fully return.",ru:"Тяжёлый Протокол после активации запечатывает обозначенную зону от магических перемещений, связи и отступления — для всех сторон, включая команду Данте. После активации Протокола никто внутри зоны не может покинуть её, пока не будет снят снаружи. Данте знает это. Он всё равно его активировал. Протокол последний раз применялся девять лет назад. Команда, запечатанная внутри, не вернулась в полном составе."},
  {id:"TET-28",en:"The Twins are not simply unstable agents. They are the surviving subjects of a Guild experiment to create operators capable of perceiving Void-layer reality directly. The experiment worked. They see underneath appearance, before causality resolves. Dante wrote 'debrief impossible' in their incident report. The words he crossed out three times before arriving at that notation were: 'they are still them.' He has not told anyone what this means. Veris read the indentation.",ru:"Близнецы — не просто нестабильные агенты. Они выжившие субъекты эксперимента Гильдии по созданию операторов, способных напрямую воспринимать реальность слоя Пустоты. Эксперимент удался. Они видят под поверхностью явлений, до разрешения причинности. Данте написал «допрос невозможен» в их рапорте об инциденте. Слова, которые он трижды зачеркнул перед этой формулировкой, были: «они всё ещё они». Он никому не сказал, что это означает. Верис прочитал отпечаток."}
];

const SCENES=[

/* ─── SCENE 1: THE OFFICE ─── */
{id:"s1",
 title:{en:"The Office",ru:"Кабинет"},
 subtitle:{en:"The world is administered, not merely lived in.",ru:"Мир управляется, а не просто населяется."},
 location:{en:"Dante's Office, Guild Citadel, Capital",ru:"Кабинет Данте, Цитадель Гильдии, Столица"},
 timing:{en:"Morning, Several Days After Chapter Two",ru:"Утро, Несколько Дней После Второй Главы"},
 flags:["introduction","foreshadowing"],
 povData:{
   dante:{distortion:1,
     text:{
       en:`The Consortium's fifteen percent retention is a negotiating position, not a complaint. They want to establish a precedent: that method approval is a condition of full payment. I will not set that precedent. The letter Silas drafts will be polite in tone and exact in content. The substance of it is this — the next uncontrolled biological event within their operating radius will proceed without Guild intervention unless they clarify their understanding of contract terms. The reference to the Eternal Fire Church is not a threat. It is a reminder that I maintain parallel relationships with all institutional clients, and that the value of one relationship is, in part, a function of the others.\n\nThe gnome's figures are accurate to the coin. He has run a clean ledger for six years. I have audited his accounts twice without finding a discrepancy. This is either exceptional competence or exceptional care in concealment. I have decided the distinction does not affect operational efficiency and have not investigated further.\n\nThe Green Frontier file is technically closed. The Consortium's complaint about roughness is aesthetically interesting: they wanted the Seed stopped and were willing to pay for it; they did not want to know what stopping it required. This is the standard position of clients who understand outcomes and not processes. I accommodate it by controlling information flow. They received: ritual terminated, practitioner neutralized, region contained. They did not receive the sequencing. This is not deception. This is billing structure.\n\nWhen Silas mentioned the Cardinal's name, my hand completed its move to the document before the left hand moved to the earring. I noted that sequence. The earring was cold. No active deception in the room. Morius came in good faith. That is more alarming than any trap.`,
       ru:`Удержание Консорциумом пятнадцати процентов — переговорная позиция, а не жалоба. Они хотят установить прецедент: что одобрение методов является условием полной оплаты. Я не буду устанавливать этот прецедент. Письмо, которое составит Силас, будет вежливым по тону и точным по содержанию. Его суть такова: следующее неконтролируемое биологическое событие в их операционном радиусе пройдёт без вмешательства Гильдии, если они не прояснят своё понимание условий контракта. Ссылка на Церковь Вечного Огня — не угроза. Это напоминание о том, что я поддерживаю параллельные отношения со всеми институциональными клиентами и что ценность одних отношений частично зависит от других.\n\nЦифры гнома точны до монеты. Он ведёт чистый гроссбух шесть лет. Я дважды проверял его счета без обнаружения расхождений. Это либо исключительная компетентность, либо исключительная тщательность в сокрытии. Я решил, что это различие не влияет на операционную эффективность, и не стал исследовать дальше.\n\nДосье Зелёного Предела технически закрыто. Жалоба Консорциума на грубость эстетически интересна: они хотели остановки Семени и были готовы за это платить; они не хотели знать, что для этого потребовалось. Это стандартная позиция клиентов, понимающих результаты, но не процессы. Я размещаю это, контролируя информационный поток. Они получили: ритуал прекращён, практикующая нейтрализована, регион локализован. Последовательность они не получили. Это не обман. Это структура выставления счёта.\n\nКогда Силас назвал имя кардинала, моя правая рука завершила движение к документу, прежде чем левая потянулась к серьге. Я отметил эту последовательность. Металл был холодным. В комнате нет активного обмана. Мориус пришёл в доброй воле. Это тревожнее любой ловушки.`
     },
     knows:{en:["The Consortium's complaint is a leverage test — they are probing for his floor on payment disputes","The Green Frontier sequencing (public Ash dispersal) was deliberate crowd-engineering, not tactical necessity","The earring's silence means Morius carries no active deception — and that this is the more dangerous category"],ru:["Жалоба Консорциума — проверка рычагов давления: они зондируют его нижнюю границу в спорах об оплате","Последовательность в Зелёном Пределе (публичное рассеивание Пепла) была намеренным конструированием толпы, а не тактической необходимостью","Молчание серьги означает, что Мориус не несёт активного обмана — и это более опасная категория"]},
     misunderstands:{en:["Believes Silas's audit record reflects either competence or concealment — has not yet determined which. He is correct about the uncertainty. He is wrong about which it is."],ru:["Считает, что аудиторская репутация Силаса отражает либо компетентность, либо сокрытие — ещё не определил, что именно. Он прав относительно неопределённости. Он ошибается относительно того, что это на самом деле."]},
     hides:{en:["He has not audited Silas's sub-accounts at frontier institutions. He has the capability to do so. He has not.","The recurring payment to a site in the Wastes — documented in Silas's ledger as 'Operational Reserve: Site Seven' — is a payment Dante makes to a person, not a location. He has not told Veris or Silas who."],ru:["Он не проверял субсчета Силаса в пограничных учреждениях. У него есть возможность. Он не стал.","Регулярный платёж в объект в Пустошах — задокументированный в гроссбухе Силаса как «Оперативный Резерв: Объект Семь» — это платёж, который Данте делает человеку, а не месту. Он не сказал Верису или Силасу кому."]},
     whisper:{en:"He audited Silas twice and found nothing. He did not audit the frontier accounts. He decided not to.",ru:"Он проверял Силаса дважды и не нашёл ничего. Фронтирные счета он не проверял. Он решил не делать этого."}
   },
   silas:{distortion:3,
     text:{
       en:`The Master does not look up when I enter. He never does. I have worked for four Masters in thirty-one years as Guild Treasurer. Three of them made eye contact during briefings. Dante makes calculations.\n\nI delivered the Consortium shortfall with the standard framing: fifteen percent retained, reputational damage cited, methodological excess alleged. I gave him their stated reason. I did not give him the actual reason, which is that their chief negotiator tested me three weeks ago with a two-percent hold on a minor contract, Dante recovered it within forty-eight hours with interest, and now they are attempting fifteen because they want to know where his floor is.\n\nI know where his floor is. It is lower than they think and it does not move.\n\nI gave him only the stated reason because the intelligence framing was information I gathered through my own network and I do not volunteer the provenance of information that might prompt questions about the scope of my networks.\n\nThe Master's response when I mentioned the Cardinal was the most information he has given me in six months of daily proximity. His right hand completed its move to the document. Then his left hand moved to the earring. That sequence is significant. He checked the document first — the earring was a reflex, not a protocol. He was surprised. He did not want to be surprised.\n\nI have managed Guild finances for six years under this Master. In that time I have documented: forty-three operational expenditures classified above my clearance level, eleven retainer structures to entities I cannot identify by name, and one recurring payment, quarterly, to a location in the Wastes that does not correspond to any known outpost or supplier. It appears in my ledger as 'Site Seven.' I have never asked. The Master pays me well to count what I can see and to stop precisely at the edges of what I cannot.`,
       ru:`Мастер не поднимает взгляд, когда я вхожу. Никогда. Я работал на четырёх Мастеров за тридцать один год казначея Гильдии. Трое из них устанавливали зрительный контакт на брифингах. Данте производит расчёты.\n\nЯ изложил недостачу Консорциума со стандартной формулировкой: удержано пятнадцать процентов, репутационный ущерб, предполагаемые методологические излишества. Я дал ему заявленную причину. Я не дал ему реальную: их главный переговорщик три недели назад проверил меня двухпроцентной задержкой на незначительном контракте, Данте вернул её с процентами в течение сорока восьми часов, и теперь они пробуют пятнадцать — хотят знать, где его нижняя граница.\n\nЯ знаю, где его нижняя граница. Она ниже, чем они думают, и не двигается.\n\nЯ дал ему только заявленную причину, потому что разведывательная подоплёка — информация, которую я собрал через свою собственную сеть, и я не сообщаю происхождение сведений, которые могут спровоцировать вопросы о масштабах моих сетей.\n\nРеакция Мастера при упоминании кардинала дала мне больше информации, чем шесть месяцев ежедневной близости. Его правая рука завершила движение к документу. Потом левая потянулась к серьге. Эта последовательность значима. Он сначала проверил документ — серьга была рефлексом, а не протоколом. Он был удивлён. Он не хотел быть удивлён.\n\nЯ управляю финансами Гильдии шесть лет под этим Мастером. За это время я задокументировал: сорок три оперативных расхода, классифицированных выше моего уровня допуска, одиннадцать структур гонораров структурам, которые я не могу идентифицировать по имени, и один регулярный платёж, ежеквартально, в место в Пустошах, не соответствующее никакому известному аванпосту или поставщику. В моём гроссбухе он значится как «Объект Семь». Я никогда не спрашивал. Мастер хорошо платит мне за подсчёт того, что я вижу, и за остановку точно на краю того, чего не вижу.`
     },
     knows:{en:["The Consortium's 15% retention is a leverage probe, not a genuine complaint — he gathered this through his own intelligence network","Dante's earring-reflex confirmed surprise at Morius's name — the most readable expression he has produced in six months","The quarterly 'Site Seven' payment exists and is anomalous by every accounting standard"],ru:["15%-ное удержание Консорциума — зондирование рычагов давления, не подлинная жалоба — он собрал это через собственную разведывательную сеть","Рефлекс серьги Данте подтвердил удивление при имени Мориуса — наиболее читаемое выражение за шесть месяцев","Квартальный платёж «Объект Семь» существует и аномален по всем бухгалтерским стандартам"]},
     misunderstands:{en:["Believes Dante has not investigated his sub-accounts because he trusts the main ledger audit — the actual reason Dante has not investigated is more uncomfortable to consider"],ru:["Считает, что Данте не исследовал его субсчета, потому что доверяет аудиту главного гроссбуха — реальная причина, по которой Данте не исследовал, требует более неудобного осмысления"]},
     hides:{en:["He has been skimming 0.3% from every large contract payment for six years, routing it to a private account in a frontier banking house. Total accumulated: eleven times Dante's annual operating stipend","He told Dante only the Consortium's stated reason for the dispute, not the leverage-test intelligence he gathered independently","His 'own network' for gathering commercial intelligence is partially staffed by people he has placed inside the Consortium itself"],ru:["Он снимает 0,3% с каждой крупной контрактной выплаты шесть лет, направляя на частный счёт в пограничном банковском доме. Накоплено: в одиннадцать раз больше годового жалованья Данте","Он сообщил Данте только заявленную причину спора Консорциума, не разведданные о проверке рычагов давления, собранные самостоятельно","Его «собственная сеть» для сбора коммерческой разведки частично укомплектована людьми, которых он внедрил в сам Консорциум"]},
     whisper:{en:"He has worked for four Masters. He has stolen from all four. He is very good at his job.",ru:"Он работал на четырёх Мастеров. Он крал у всех четырёх. Он очень хорошо делает свою работу."}
   }
 }
},

/* ─── SCENE 2: THE NEGOTIATION HALL ─── */
{id:"s2",
 title:{en:"The Negotiation Hall",ru:"Зал Переговоров"},
 subtitle:{en:"Two professionals meet to discuss the end of the world.",ru:"Два профессионала встречаются, чтобы обсудить конец света."},
 location:{en:"Negotiation Hall, Guild Citadel",ru:"Зал Переговоров, Цитадель Гильдии"},
 timing:{en:"Same Morning, One Hour After Scene One",ru:"То же Утро, Час После Первой Сцены"},
 flags:["pivotal","negotiation"],
 povData:{
   dante:{distortion:2,
     text:{
       en:`The Cardinal sat with his back to the entrance. This is either a dominance display or a calculated vulnerability offer. Both establish that the initiating party does not fear the meeting. Morius is positioned highly enough that either reading is consistent with his record. I chose not to determine which.\n\nHe opened with the tapestry. Historical romanticism as social lubrication. I deflected with the prayer remark. This established the register: neither of us is here to perform sincerity.\n\nHis face has the quality of a man who has run the same moral calculations so many times that the machinery has become automatic and the original ethical questions have been retired. This is not cynicism. It is expertise. We are more similar in this than either of us would find comfortable to state.\n\nHe led with Galahad. This was a test — he needed to see whether I would apologize before he delivered the actual agenda. I did not apologize. He registered this and moved forward.\n\nThe crystal.\n\nI recognized the Void-contact radiation before the lid was fully open. Class IV minimum based on thermal output. The earring was silent — and then, for 0.4 seconds, it was not. A vibration that stopped as though something had decided to let it stop. I did not acknowledge this. I filed it.\n\nThe entity in the crystal does not deceive in ways the earring detects. It operates at a level outside the earring's calibration range. This could mean it is older than the earring's design parameters. Or it could mean it is the same order of phenomenon as whatever produced the earring. The second possibility is one I have been managing as a background consideration for twenty-one years. This is the first time it has arrived in a room with me.\n\nHe offered the archives. My heart missed a beat. I noted this the way I note operational anomalies: as data, without sentiment. The response was involuntary. The fact that I have a response at all to that specific offer is itself significant data.\n\nI took the contract. The archives were not the reason.`,
       ru:`Кардинал сидел спиной ко входу. Это либо демонстрация доминирования, либо просчитанное предложение уязвимости. Оба варианта устанавливают, что инициирующая сторона не боится встречи. Мориус занимает достаточно высокое положение, чтобы оба прочтения соответствовали его репутации. Я решил не определять, которое верно.\n\nОн начал с гобелена. Исторический романтизм как социальная смазка. Я отклонил замечанием о молитвах. Это установило регистр: ни один из нас здесь не для демонстрации искренности.\n\nЕго лицо имеет качество человека, который так часто проводил одни и те же моральные расчёты, что механизм стал автоматическим, а первоначальные этические вопросы были отправлены в отставку. Это не цинизм. Это экспертиза. Мы более схожи в этом, чем любой из нас нашёл бы удобным заявить вслух.\n\nОн начал с Галахада. Это была проверка — ему нужно было увидеть, стану ли я извиняться до того, как он изложит настоящую повестку. Я не извинился. Он зафиксировал это и двинулся дальше.\n\nКристалл.\n\nЯ узнал радиацию контакта с Пустотой до того, как крышка была полностью открыта. Минимум Класс IV по тепловому излучению. Серьга молчала — а потом, на 0,4 секунды, нет. Вибрация, остановившаяся так, словно что-то решило её остановить. Я не признал этого. Я занёс в досье.\n\nСущность в кристалле не обманывает способами, которые улавливает серьга. Она действует на уровне, выходящем за пределы диапазона калибровки серьги. Это может означать, что она старше, чем параметры проектирования серьги. Или это означает, что она является явлением того же порядка, что и то, что произвело серьгу. Второй вариант — это соображение, которым я управляю как фоновым в течение двадцати одного года. Это первый раз, когда оно оказалось в комнате вместе со мной.\n\nОн предложил архивы. Моё сердце пропустило удар. Я отметил это так, как отмечаю операционные аномалии: как данные, без сентиментальности. Реакция была непроизвольной. Сам факт наличия у меня реакции именно на это предложение является значимыми данными.\n\nЯ взял контракт. Архивы не были причиной.`
     },
     knows:{en:["The earring vibrated for 0.4 seconds in response to the crystal before going silent — the entity recognized the earring and chose stillness","Morius's profile: a man whose moral machinery is automatic and whose original ethical questions have been retired — like Dante's own","The crystal contains a Void-contact entity of Class IV or higher — outside the earring's normal detection parameters"],ru:["Серьга вибрировала 0,4 секунды в ответ на кристалл, прежде чем замолчать — сущность узнала серьгу и выбрала неподвижность","Профиль Мориуса: человек, чей моральный механизм автоматичен и чьи первоначальные этические вопросы были отправлены в отставку — как у самого Данте","Кристалл содержит сущность контакта с Пустотой Класса IV или выше — вне нормальных параметров обнаружения серьги"]},
     misunderstands:{en:["Does not know about Brother Callum and the two failed Church teams at the Iron Peak","Does not know Morius has read the archive files on his earring and is observing which documents he will examine","Does not know Baron Caldor sought the Void entity deliberately — Dante still believes it was a possession, not a bargain"],ru:["Не знает о брате Каллуме и двух провалившихся церковных группах в Железном Пике","Не знает, что Мориус прочитал архивные файлы о его серьге и наблюдает, какие документы он изучит","Не знает, что барон Кальдор искал сущность Пустоты намеренно — Данте всё ещё считает это одержимостью, а не сделкой"]},
     hides:{en:["He felt the earring vibrate and chose not to mention it","His reason for taking the contract is not the archives — but he has not yet identified what the reason actually is","The 0.4-second recognition event between the crystal and the earring is the most significant anomaly he has encountered in twenty-one years of operation. He has filed it as data."],ru:["Он почувствовал вибрацию серьги и решил не упоминать об этом","Его причина взять контракт — не архивы, но он ещё не определил, что ею на самом деле является","Событие узнавания длительностью 0,4 секунды между кристаллом и серьгой — наиболее значимая аномалия, с которой он столкнулся за двадцать один год операций. Он занёс её в досье."]},
     whisper:{en:"For 0.4 seconds, something ancient recognized something he wears. He filed it. He has not stopped thinking about it.",ru:"На 0,4 секунды что-то древнее узнало что-то, что он носит. Он занёс это в досье. Он не перестаёт об этом думать."}
   },
   morius:{distortion:5,
     text:{
       en:`Forty years in the Church teaches you that the divine is not a requirement for miracles. Bureaucracy, correctly applied, moves mountains. The Church has governed the world for eight centuries not because God spoke through its priests but because its priests spoke consistently, its ledgers were accurate, and its enemies were identified before they became threats.\n\nI sat with my back to the door because I wanted him to see me choose it. A man who turns his back on the Guild's Auditor in the Guild's own hall is either very foolish or very certain. I have not been foolish for a long time.\n\nHe deflected my opener smoothly. Good. I did not want preamble. I wanted to see how he handles casual provocation before the weight arrives.\n\nHe did not flinch at Galahad. Expected, but confirmatory. He framed the operation as systems maintenance. This is exactly the cognitive register I needed him in for what came next.\n\nThe crystal was the test. I watched his hand when I pushed the box across the table. No withdrawal. A brief stillness — not fear, recalibration. He recognized the Void signature. This means his operational knowledge extends beyond what our intelligence had mapped. He looked at the crystal the way a chemist looks at a new compound: with the alertness of someone who already has a category for this and is now updating the category's edge parameters.\n\nHis earring did not react visibly. I watched for it. The Church has maintained a seven-hundred-year file on that earring. The entity in the crystal should have triggered a response. The fact that it did not — or that Dante chose not to show a response — means either the earring has been modified, or the entity recognized it and chose silence. I need to know which. This is the most important datum this meeting has produced.\n\nI offered the archives. He hesitated for one heartbeat. In thirty years of negotiations I have seen every variety of performed indifference. This was not performed. He wants those files. Whatever they contain, he has been carrying the question for a long time.\n\nI told him not to look into the Abyss too long. He will think this is aphorism. It is not. I was in the room during Brother Callum's debrief. I heard what the Baron's voice sounded like coming from Callum's mouth. I know what happens at close range. I did not tell him any of this. He would want to know why. I do not want that conversation yet.`,
       ru:`Сорок лет в Церкви учат, что для чудес не нужно ничего сверхъестественного. Бюрократия, применённая правильно, движет горами. Церковь управляла миром восемь столетий не потому, что Бог говорил устами священников, а потому что священники говорили последовательно, их гроссбухи были точными и враги определялись прежде, чем становились угрозами.\n\nЯ сидел спиной к двери, потому что хотел, чтобы он видел, как я это выбираю. Человек, который поворачивается спиной к Аудитору Гильдии в собственном зале Гильдии, либо очень глуп, либо очень уверен. Я давно не глуп.\n\nОн плавно отклонил мою вступительную реплику. Хорошо. Мне не нужна была преамбула. Я хотел посмотреть, как он справляется с непринуждёнными провокациями до того, как придёт настоящий вес.\n\nОн не дрогнул при Галахаде. Ожидаемо, но подтверждающе. Он представил операцию как обслуживание систем. Именно этот когнитивный регистр мне был нужен для того, что последовало.\n\nКристалл был испытанием. Я следил за его рукой, когда толкал ларец через стол. Никакого отстранения. Краткая неподвижность — не страх, перекалибровка. Он узнал сигнатуру Пустоты. Это означает, что его оперативные знания выходят за пределы того, что картографировала наша разведка. Он смотрел на кристалл так, как химик смотрит на новое соединение: с бдительностью человека, у которого уже есть категория для этого, и он сейчас обновляет граничные параметры этой категории.\n\nЕго серьга не отреагировала видимым образом. Я следил. У Церкви есть семисотлетнее досье на эту серьгу. Сущность в кристалле должна была вызвать реакцию. Тот факт, что этого не произошло — или что Данте решил не показывать реакцию — означает либо, что серьга была модифицирована, либо сущность узнала её и выбрала тишину. Мне нужно знать, которое из двух. Это наиболее важный результат этой встречи.\n\nЯ предложил архивы. Он на одно мгновение замер. За тридцать лет переговоров я видел каждый вариант исполненного безразличия. Это было не исполненным. Он хочет эти файлы. Что бы в них ни содержалось, он носит этот вопрос давно.\n\nЯ сказал ему не смотреть в Бездну слишком долго. Он решит, что это афоризм. Это не афоризм. Я присутствовал на допросе брата Каллума. Я слышал, как звучит голос Барона из уст Каллума. Я знаю, что происходит на близком расстоянии. Я ничего из этого не сообщил Данте. Он бы захотел знать почему. Я не хочу этого разговора пока.`
     },
     knows:{en:["The Church has a seven-hundred-year file on Dante's earring — and Morius has read it","The entity in the crystal should have triggered the earring. The fact that it appeared not to is the meeting's most important datum","Brother Callum returned from the Iron Peak speaking in the Baron's voice — Morius presided over his debrief. He did not disclose this.","The archive access offer is genuine — but the most relevant sub-section was not mentioned"],ru:["У Церкви есть семисотлетнее досье на серьгу Данте — и Мориус его прочитал","Сущность в кристалле должна была активировать серьгу. Тот факт, что внешне этого не произошло — важнейший результат встречи","Брат Каллум вернулся из Железного Пика, говоря голосом Барона — Мориус председательствовал на его допросе. Он не раскрыл этого.","Предложение архивного доступа подлинное — но наиболее релевантный подраздел не был упомянут"]},
     misunderstands:{en:["Believes the archive offer will function as a controlled intelligence operation — he will observe what Dante reads. He does not anticipate that Dante will identify the un-mentioned sub-section and understand why it was omitted.","Frames Dante as 'a necessary tumor' — and does not fully reckon with what it means that the tumor recognized the Void crystal before it was opened"],ru:["Считает, что предложение архива будет работать как контролируемая разведывательная операция — он будет наблюдать, что Данте читает. Он не предвидит, что Данте определит неупомянутый подраздел и поймёт, почему он был пропущен.","Определяет Данте как «необходимую опухоль» — и не в полной мере осмысляет, что означает то, что опухоль узнала кристалл Пустоты до его открытия"]},
     hides:{en:["Two failed Church teams at the Iron Peak. Eleven operatives. None recovered from the first. Callum from the second, speaking with the Baron's voice.","His final warning about the Abyss was not rhetoric — it was specific, grounded in what he witnessed at Callum's debrief","He has spent thirty years learning how to make what he needs to happen feel like what the other party has decided to do"],ru:["Две провалившихся церковных группы в Железном Пике. Одиннадцать оперативников. Никого из первой. Каллум из второй, говорящий голосом Барона.","Его финальное предупреждение о Бездне было не риторикой — это было конкретным, основанным на том, чему он был свидетелем на допросе Каллума","Он потратил тридцать лет, обучаясь делать так, чтобы то, что ему нужно, ощущалось как то, что другая сторона решила сделать"]},
     whisper:{en:"He said 'don't look into the Abyss too long.' He was in the room when Callum came back. He knows what it costs.",ru:"Он сказал «не смотри в Бездну слишком долго». Он был в комнате, когда вернулся Каллум. Он знает, чего это стоит."}
   }
 }
},

/* ─── SCENE 3: THE DECISION ─── */
{id:"s3",
 title:{en:"The Decision",ru:"Решение"},
 subtitle:{en:"He wakes the Twins. He has done this before.",ru:"Он будит Близнецов. Он делал это раньше."},
 location:{en:"Negotiation Hall / Guild Citadel, Transition",ru:"Зал Переговоров / Цитадель Гильдии, Переход"},
 timing:{en:"Immediately After Scene Two",ru:"Сразу После Второй Сцены"},
 flags:["threshold","foreshadowing"],
 povData:{
   dante:{distortion:2,
     text:{
       en:`The Twins have been in containment for three years. The incident report from their last deployment is in the restricted archive — seventeen pages of field data followed by one page of outcome notation. The outcome notation reads, in full: "Debrief impossible. Standard cognitive framework not applicable. Recommend indefinite containment pending reclassification."\n\nI wrote that notation. The words I wrote before it — and crossed out three times — were: they are still them.\n\nThey are not mad in the way that madness usually presents: chaotic, a system that has lost its organizing principle. They are mad in the way that a perfectly calibrated instrument is mad when calibrated to measure something that should not be measurable. They see the structure underneath appearance. They see the debt ledger of cause and effect before the entries are made. In proximity to a Void entity, this is not a liability. It is the only operational approach I know of that functions.\n\nThe entity in the crystal does not deceive in ways I can intercept. I will be operating blind on the primary threat vector. The Twins are not blind in that direction. They are precisely, terrifyingly sighted in exactly the direction I cannot look.\n\nThe Heavy Protocol seals the zone. This includes my team. This is standard operational containment for Void-contact scenarios and it is not something I deliberate over each time. The arithmetic is straightforward: one sealed zone and one dead Auditor is better than an open zone and a continent that becomes what Callum has become.\n\nI know what Callum has become. Morius doesn't know I know this.\n\nI found the Iron Peak on the map. The finger I used to trace the route has been steady for twenty-one years of this work. It was steady now.\n\nThe contracts are written in blood. Sometimes the blood is yours.\n\nI adjusted my mustache on the way out of the hall. Left side. Two degrees of drift from the morning's work. Symmetry restored.\n\nBusiness continues.`,
       ru:`Близнецы находятся в изоляции три года. Рапорт об инциденте от их последнего развёртывания — в закрытом архиве: семнадцать страниц полевых данных, за которыми следует одна страница результирующей записи. Результирующая запись гласит, полностью: «Допрос невозможен. Стандартная когнитивная система неприменима. Рекомендована бессрочная изоляция до переклассификации».\n\nЯ написал эту запись. Слова, которые я написал перед ней — и зачёркивал трижды — были: они всё ещё они.\n\nОни не безумны так, как обычно проявляется безумие: хаотично, как система, потерявшая организующий принцип. Они безумны так, как безумен идеально откалиброванный инструмент, откалиброванный для измерения того, что не должно быть измеримым. Они видят структуру под видимостью. Они видят гроссбух причинно-следственных связей до того, как сделаны записи. В близости к сущности Пустоты это не недостаток. Это единственный оперативный подход, который, как мне известно, работает.\n\nСущность в кристалле не обманывает способами, которые я могу перехватить. Я буду действовать вслепую по основному вектору угрозы. Близнецы не слепы в этом направлении. Они точно, устрашающе зрячи именно в том направлении, в котором я не могу смотреть.\n\nТяжёлый Протокол запечатывает зону. Включая мою команду. Это стандартное оперативное сдерживание для сценариев контакта с Пустотой, и это не то, о чём я каждый раз рассуждаю. Арифметика проста: одна запечатанная зона и один мёртвый Аудитор лучше, чем открытая зона и континент, который становится тем, чем стал Каллум.\n\nЯ знаю, чем стал Каллум. Мориус не знает, что я это знаю.\n\nЯ нашёл Железный Пик на карте. Палец, которым я провёл по маршруту, был твёрдым двадцать один год этой работы. Он был твёрдым сейчас.\n\nКонтракты пишутся кровью. Иногда кровь — твоя.\n\nЯ поправил ус на выходе из зала. Левая сторона. Два градуса смещения от утренней работы. Симметрия восстановлена.\n\nБизнес продолжается.`
     },
     knows:{en:["The Twins see Void-layer reality directly — they are the only operational asset functional against an entity the earring cannot detect","Brother Callum returned from the Iron Peak speaking with the Baron's voice — Dante has an intelligence source Morius is unaware of","The Heavy Protocol seals his own team inside the zone. He is activating it anyway. He has calculated the alternative."],ru:["Близнецы видят реальность слоя Пустоты напрямую — они единственный оперативный актив, функциональный против сущности, которую серьга не может обнаружить","Брат Каллум вернулся из Железного Пика, говоря голосом Барона — у Данте есть разведывательный источник, о котором Мориус не знает","Тяжёлый Протокол запечатывает его собственную команду внутри зоны. Он активирует его всё равно. Он просчитал альтернативу."]},
     misunderstands:{en:["He frames the Protocol as standard containment procedure. It is not standard — it was last used nine years ago and the team it sealed did not fully return. He is not misremembering this. He is re-framing it."],ru:["Он описывает Протокол как стандартную процедуру сдерживания. Это не стандарт — он последний раз применялся девять лет назад, и команда, которую он запечатал, не вернулась в полном составе. Он не забыл об этом. Он переформулирует."]},
     hides:{en:["The words he crossed out in the Twins' incident report were: 'they are still them.' He has never explained to anyone what this means or why it was harder to write than any other notation in his operational file","He knows what Callum has become. His intelligence source is someone inside the Church who attended the debrief. He has had this contact for nine years — since the Protocol was last used.","He adjusted his mustache. This was not vanity. It was the only behavior he could produce that required no decision."],ru:["Слова, которые он зачеркнул в рапорте Близнецов, были: «они всё ещё они». Он никогда никому не объяснял, что это означает и почему это было труднее написать, чем любую другую запись в его операционном файле","Он знает, чем стал Каллум. Его разведывательный источник — человек внутри Церкви, присутствовавший на допросе. Этому контакту девять лет — с тех пор, как Протокол применялся последний раз.","Он поправил ус. Это не было тщеславием. Это было единственным поведением, которое он мог произвести, не требующим решения."]},
     whisper:{en:"The words he crossed out were: they are still them. He has never told anyone what he meant.",ru:"Зачёркнутые слова были: они всё ещё они. Он никогда никому не говорил, что имел в виду."}
   },
   veris:{distortion:4,
     text:{
       en:`He called me through the tube at twenty minutes past the Cardinal's departure. I had been waiting.\n\nI knew Morius was here before Silas knew — the Chronicler's archive receives every visitor manifest in real time. When I saw the Cardinal's name I went to my office, sat down, and thought about what a Cardinal comes to the Guild for in person, in daylight, without retinue. The answer I arrived at was: something the Church cannot manage, something that must be managed, and something that must be managed by a man who has no institutional stake in the outcome.\n\nThe Master said: wake the Twins.\n\nI have been Chronicler for forty-one years. I have written everything the Guild has done since I was old enough to hold a pen without shaking. Contracts. Operations. Costs. In a separate ledger, kept in a place I will not name here, I have also written the things I noticed that I was not asked to notice.\n\nThe Twins are in that private ledger. Their creation. Their deployment. The incident. The notation the Master wrote in their file, and the four words that came before the notation — words he crossed out three times before arriving at "debrief impossible" — which I read from the indentations in the page below, because reading what has been erased is the first skill a Chronicler is taught.\n\nThe crossed-out words were: they are still them.\n\nI do not know what this means. I have been considering it for three years.\n\nThe Master will go to the Iron Peak. He will take the Twins. He will activate the Heavy Protocol. I will prepare the documentation now, correctly and completely. He has always returned. I do not know on what basis I continue to believe this. I believe it anyway.\n\nThis, too, I will not write in any chronicle that others will read.`,
       ru:`Он позвонил мне через переговорную трубу через двадцать минут после ухода кардинала. Я ждал.\n\nЯ знал, что Мориус здесь, до того как Силас узнал — архив летописца получает каждый список посетителей в реальном времени. Когда я увидел имя кардинала, я пошёл в свой кабинет, сел и подумал о том, зачем кардинал приходит в Гильдию лично, при свете дня, без свиты. Ответ, к которому я пришёл: что-то, с чем Церковь не может справиться, что-то, что должно быть решено, и что-то, что должно быть решено человеком, у которого нет институционального интереса в результате.\n\nМастер сказал: разбудите Близнецов.\n\nЯ работаю летописцем сорок один год. Я записал всё, что делала Гильдия, с тех пор как был достаточно взрослым, чтобы держать перо, не дрожа. Контракты. Операции. Издержки. В отдельном гроссбухе, хранящемся в месте, которое я не назову здесь, я также записал то, что замечал, хотя меня не просили замечать.\n\nБлизнецы есть в том частном гроссбухе. Их создание. Их развёртывание. Инцидент. Запись, которую Мастер сделал в их файле, и четыре слова, предшествовавшие записи — слова, которые он зачёркивал трижды до того, как пришёл к «допрос невозможен» — которые я прочитал по отпечаткам на странице ниже, потому что чтение стёртого — первый навык, которому учат летописца.\n\nЗачёркнутые слова были: они всё ещё они.\n\nЯ не знаю, что это означает. Я обдумываю это три года.\n\nМастер отправится в Железный Пик. Возьмёт Близнецов. Активирует Тяжёлый Протокол. Я подготовлю документацию сейчас, правильно и полностью. Он всегда возвращался. Я не знаю, на каком основании продолжаю верить, что так будет. Я верю в это всё равно.\n\nЭтого я тоже не напишу ни в какой летописи, которую прочитают другие.`
     },
     knows:{en:["He read the indentations in the page below the crossed-out words in the Twins' file: 'they are still them'","He maintains a private chronicle of things he noticed but was not asked to notice — forty-one years of entries","The Heavy Protocol documentation — he has prepared it correctly. He knows what it seals in."],ru:["Он прочитал отпечатки на странице ниже зачёркнутых слов в файле Близнецов: «они всё ещё они»","Он ведёт частную летопись вещей, которые заметил, хотя его не просили замечать — сорок один год записей","Документация Тяжёлого Протокола — он подготовил её правильно. Он знает, что это запечатывает."]},
     misunderstands:{en:["He believes his private chronicle is unknown to everyone. Dante knows it exists. He has never read it. He has decided this is one of the edges he does not cross."],ru:["Он считает, что его частная летопись никому не известна. Данте знает о её существовании. Он никогда её не читал. Он решил, что это один из краёв, которые он не пересекает."]},
     hides:{en:["His private chronicle exists and is forty-one years deep","He believes the Master will return from the Iron Peak. He does not know why. He will not examine whether the belief is warranted because if it is not warranted he does not know what he would do with that information.","He cried after writing the Twins' original incident report. He has not told anyone. He cried because of the words he crossed out."],ru:["Его частная летопись существует и имеет глубину сорока одного года","Он верит, что Мастер вернётся из Железного Пика. Он не знает почему. Он не будет исследовать, обоснована ли эта вера, потому что если нет — он не знает, что будет делать с этой информацией.","Он плакал после написания оригинального рапорта Близнецов. Он никому не говорил. Он плакал из-за зачёркнутых слов."]},
     whisper:{en:"He has written everything the Guild has done for forty-one years. He cried once, after the Twins' report. He has not written why.",ru:"Он записал всё, что делала Гильдия, сорок один год. Он плакал один раз — после рапорта Близнецов. Он не написал почему."}
   }
 }

/* ═══ ENGINE ═══ */
const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;

function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');const secs=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}];c.innerHTML=secs.map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});

renderScene(0,'dante',false);
</script>
</body>
</html>
