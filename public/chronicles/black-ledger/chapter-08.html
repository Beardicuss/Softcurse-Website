.lang-btn:first-child{border-right:none;}
.lang-btn.active{color:var(--pov-s);border-color:var(--pov-p);background:var(--bg3);}

.header-ornament{font-family:var(--ff-mono);font-size:12px;letter-spacing:.4em;color:var(--pov-s);text-transform:uppercase;margin-bottom:14px;opacity:.7;transition:color .8s;}

@keyframes barpulse{0%,100%{opacity:1;}50%{opacity:.3;}}
#narrative-text{font-size:20px;line-height:1.9;color:var(--pov-t);transition:color .7s,opacity .3s;position:relative;z-index:1;}
#narrative-text p{margin-bottom:1.3em;}
#narrative-text p:last-child{margin-bottom:0;}
.d3,.d4,.d5{animation:flicker-soft 14s infinite;}
.d6,.d7{animation:flicker-mid 7s infinite;}
.d8,.d9{animation:flicker-hard 4s infinite,glitch-mid 16s infinite;}
.d10{animation:flicker-hard 2s infinite,glitch-hard 8s infinite;filter:blur(.4px);}
@keyframes flicker-soft{0%,94%,100%{opacity:1;}96%{opacity:.88;}}
@keyframes flicker-mid{0%,88%,100%{opacity:1;}90%{opacity:.75;}92%{opacity:.9;}93%{opacity:.68;}94%{opacity:1;}}
@keyframes flicker-hard{0%,80%,100%{opacity:1;}82%{opacity:.6;}83%{opacity:.9;}84%{opacity:.55;}85%{opacity:.85;}86%{opacity:.7;}87%{opacity:1;}}
@keyframes glitch-mid{0%,92%,100%{transform:none;filter:none;}93%{transform:translate(-3px,0);filter:drop-shadow(3px 0 rgba(255,0,0,.3));}94%{transform:translate(3px,0);filter:drop-shadow(-3px 0 rgba(0,100,255,.2));}95%{transform:translate(-1px,1px);}96%{transform:none;}}
@keyframes glitch-hard{0%,88%,100%{transform:none;filter:none;}89%{transform:translate(-4px,0) skewX(-1deg);filter:drop-shadow(4px 0 rgba(255,0,0,.4)) saturate(2);}90%{transform:translate(4px,-1px) skewX(1deg);filter:drop-shadow(-4px 0 rgba(0,150,255,.3));}91%{transform:translate(-2px,2px);filter:brightness(.7);}92%{transform:translate(1px,-1px);}93%{transform:none;filter:none;}}

</style>

const TIMELINE=[
  {id:"TET-61",en:"The Chronmancer is not the leader of the Cult of Zero Hour. He is a mid-tier administrator. The Cult's actual leadership structure is distributed across seven nodes, of which Sector 13 was the third. Each node processes a different commodity: Sector 13 processed Time Essence (temporal life-force). The other six process: Memory (confirmed), Identity, Causality, Possibility, Grief, and one that has no word in any current language. Dante has destroyed the third node. He believes he has destroyed the operation. He has removed one-seventh of a larger machine.",ru:"Хрономант — не лидер Культа Нулевого Часа. Он администратор среднего звена. Реальная руководящая структура Культа распределена по семи узлам, из которых Сектор 13 был третьим. Каждый узел обрабатывает другой товар: Сектор 13 обрабатывал Эссенцию Времени (временную жизненную силу). Остальные шесть обрабатывают: Память (подтверждено), Идентичность, Причинность, Возможность, Горе и одно без слова ни в одном современном языке. Данте уничтожил третий узел. Он считает, что уничтожил операцию. Он убрал одну седьмую большей машины."},
  {id:"TET-62",en:"The Iron Maiden capsule's rune matrices were not designed by Guild artificers. They were designed by Dante's predecessor and left in the Guild's technical files as 'Pale Echelon Supporting Infrastructure.' The predecessor expected that this specific descent would eventually occur and prepared the equipment twenty-seven years ago. The predecessor has been dead for nineteen years, officially. The predecessor signed the Pale Echelon founding document with the same name as the captain in the Amaranth's log.",ru:"Рунные матрицы капсулы «Железная Дева» были разработаны не мастерами-умельцами Гильдии. Они были разработаны предшественником Данте и оставлены в технических файлах Гильдии как «Вспомогательная Инфраструктура Бледного Эшелона». Предшественник ожидал, что этот конкретный спуск в конечном счёте произойдёт, и подготовил оборудование двадцать семь лет назад. Предшественник официально мёртв девятнадцать лет. Предшественник подписал основополагающий документ Бледного Эшелона тем же именем, что и капитан в журнале «Амаранта»."},
  {id:"TET-63",en:"The Time Essence vials function as described — they transfer remaining life-years from a donor to a purchaser. What the Chronmancer did not know (and therefore could not tell Dante): the transferred years are not clean. They carry the memories and emotional residue of the donor's lived experience. Long-term Essence users develop composite personalities — fractured identities assembled from dozens of strangers' life-experiences layered over their own. The aristocratic market for Essence is creating a class of people who no longer know which of their feelings are theirs.",ru:"Флаконы с Эссенцией Времени функционируют как описано — они передают оставшиеся годы жизни от донора к покупателю. То, чего Хрономант не знал (и поэтому не мог сказать Данте): переданные годы нечисты. Они несут воспоминания и эмоциональный осадок прожитого опыта донора. Долгосрочные потребители Эссенции развивают составные личности — разрозненные идентичности, собранные из десятков чужих жизненных переживаний, наложенных на их собственные. Аристократический рынок Эссенции создаёт класс людей, которые больше не знают, какие из их чувств принадлежат им."},
  {id:"TET-64",en:"Dante's Aura of Silence is not a standard Guild technique. It is a Precursor-era perceptual field that suppresses the coherence of constructed magical structures — it works by rendering the ambient information-field locally null, which causes magic that depends on external resonance to lose its organizing principle. The earring generates it. Dante does not cast it. He allows it. When he 'cast' Silence through the capsule wall at the underwater shaman, he was not performing magic. He was releasing a suppression the earring maintains at idle state. This is the first time in twenty-one years of operation that he has used it in active combat rather than passive detection.",ru:"Аура Тишины Данте — не стандартная техника Гильдии. Это перцептивное поле эпохи Предтечей, подавляющее связность построенных магических структур — оно работает, делая локально нулевым окружающее информационное поле, что заставляет магию, зависящую от внешнего резонанса, терять свой организующий принцип. Серьга генерирует его. Данте не накладывает его. Он позволяет ему проявиться. Когда он «применил» Тишину через стену капсулы против подводного шамана, он не исполнял магию. Он снимал подавление, которое серьга поддерживает в режиме ожидания. Это первый раз за двадцать один год операций, когда он использовал это в активном бою, а не пассивном обнаружении."},
  {id:"TET-65",en:"The Chronmancer's aging effect on Dante was not resisted or blocked by the earring. The knee damage is permanent. The earring's Void-sensitivity enhancement is now operating through a body that has been aged approximately fifteen to twenty years in the affected tissue. The knee will not improve. Dante will require a cane for the remainder of his operational career. The cane he will buy — ebony, good quality — will be fitted by Isabella with a suppression-field emitter in the handle within three weeks of purchase. She will not tell him. He will notice on the fourth day of use and will not mention it.",ru:"Эффект старения Хрономанта на Данте не был отражён или заблокирован серьгой. Повреждение колена постоянно. Усиление чувствительности к Пустоте серьгой теперь работает через тело, состаренное примерно на пятнадцать-двадцать лет в поражённых тканях. Колено не улучшится. Данте потребуется трость на протяжении остальной части его оперативной карьеры. Трость, которую он купит — чёрное дерево, хорошего качества — будет оснащена Изабеллой эмиттером поля подавления в рукоятке в течение трёх недель после покупки. Она не скажет ему. Он заметит на четвёртый день использования и не упомянет об этом."},
  {id:"TET-66",en:"The Time Essence vial Dante took from the Chronmancer's table is not a trophy. It is evidence he intends to give to Isabella for analysis — specifically, he wants to know whether the transferred life-years carry memory residue. He has already formed the hypothesis from the Cult's payment mechanism (memories taken, not years given). The vial and the Cult's payment mechanism are the same phenomenon operating in opposite directions: the Cult harvests time going forward and memory going backward. The commodity is the same. The direction is the only difference.",ru:"Флакон с Эссенцией Времени, взятый Данте со стола Хрономанта, — не трофей. Это улика, которую он намерен передать Изабелле для анализа — конкретно, он хочет знать, несут ли переданные годы жизни осадок памяти. Он уже сформировал гипотезу из механизма оплаты Культа (забираются воспоминания, не даются годы). Флакон и механизм оплаты Культа — одно явление, работающее в противоположных направлениях: Культ собирает время в прямом направлении и память в обратном. Товар один. Направление — единственное различие."},
  {id:"TET-67",en:"Whisper was at the pier when Dante surfaced. He had been there for four hours before the capsule was recovered, standing in the rain, observing the water. He had brought no umbrella. He had brought a flask of hot tea — Void-Blossom variety, correctly prepared. He gave it to Dante before the Guild recovery team reached them. The exchange lasted three seconds. Neither spoke. Whisper left before the debrief began.",ru:"Шепот был на пирсе, когда Данте всплыл. Он находился там четыре часа до подъёма капсулы, стоя под дождём, наблюдая за водой. Он не принёс зонта. Он принёс фляжку горячего чая — Пустоцвет, правильно приготовленный. Он дал его Данте до того, как до них добралась команда подъёма Гильдии. Обмен длился три секунды. Ни один не говорил. Шепот ушёл до начала допроса."},
  {id:"TET-68",en:"'Heroes get scars on their faces. I got arthritis. What irony.' — Dante said this aloud to Whisper on the pier. It is the first time in twenty-one years of operation that he has described his own body as a cost rather than an instrument. The knee is the first damage from operations that is not operational — it does not affect his filing, his analysis, his ability to perform the work. It affects only his ability to run. He has not run from anything in twenty-one years. The thing this operation encountered is the first thing he has met that he might need to run from. These facts are adjacent. He has not connected them aloud.",ru:"«Герои получают шрамы на лице. А я получил ревматизм. Какая ирония». — Данте сказал это вслух Шепоту на пирсе. Это первый раз за двадцать один год операций, когда он описал собственное тело как издержку, а не инструмент. Колено — первый ущерб от операций, не являющийся операционным — он не влияет на его систематизацию, анализ, способность выполнять работу. Он влияет только на способность бежать. Он не бежал ни от чего двадцать один год. То, с чем столкнулась эта операция, — первое, что он встретил, от чего ему, возможно, нужно будет бежать. Эти факты соседствуют. Он не связал их вслух."}
];

const SCENES=[

/* ─── SCENE 1: THE COFFIN & THE DEEP ─── */
{id:"s1",
 title:{en:"The Sarcophagus of the Abyss",ru:"Саркофаг Бездны"},
 subtitle:{en:"Descent. The Undying need no air. The living needs a plan.",ru:"Спуск. Мертвецам воздух не нужен. Живым нужен план."},
 location:{en:"Pier 42 / The Iron Maiden — Descending",ru:"Пирс 42 / «Железная Дева» — Спуск"},
 timing:{en:"Night Before Chapter Resolution",ru:"Ночь Перед Развязкой"},
 flags:["pivotal","combat"],
 povData:{
   dante:{distortion:2,
     text:{
       en:`Pier 42 was cold in the specific way of places where things go into water and do not come back. This is a different cold from weather — it is structural, sourced in the accumulated fact of many departures.\n\nThe Iron Maiden capsule was not designed by the Guild's current technical staff. I know this because the current technical staff designs to Guild specification, and the rune matrices on this capsule are not within Guild specification — they are better. The inscription style on the inner seals is consistent with pre-Auditor notation from the sealed archive section I reviewed eleven months ago. My predecessor designed this. My predecessor expected this descent.\n\nI noted this while boarding. I did not alter the operational plan. The equipment works.\n\nThe Undying require no operational management during descent. This is their primary operational advantage and their only useful characteristic: they do not have the problem of needing to survive the environment they are deployed into. I gave them a simple instruction set before boarding. They executed it.\n\nThe underwater shaman positioned between us and the dome was the first time in this operation that I used the earring actively rather than passively. I have used it as a detection instrument for twenty-one years. What I released through the capsule wall tonight was the suppression field the earring maintains at idle state — the Precursor-era mechanism that makes constructed magic lose its organizing principle in proximity to my position.\n\nI did not know it could pass through solid material.\n\nThis is new data. I noted it without acknowledging it. The operation continued.\n\nThe shaman's death was hydraulic, not magical. When his shield collapsed, the physics of the situation resolved the rest. I am not responsible for the physics of eight hundred meters of ocean.\n\nOperationally correct. The route was clear.\n\nWe descended into the dome.`,
       ru:`Пирс 42 был холодным тем специфическим образом, каким холодны места, откуда вещи уходят в воду и не возвращаются. Это другой холод, чем от погоды — он структурный, берущий начало в накопленном факте многих уходов.\n\nКапсула «Железная Дева» была разработана не нынешними техническими специалистами Гильдии. Я знаю это, потому что нынешние специалисты проектируют по спецификации Гильдии, а рунные матрицы на этой капсуле — вне спецификации Гильдии: они лучше. Стиль надписей на внутренних печатях согласуется с до-Аудиторской нотацией из запечатанного архивного раздела, который я рассматривал одиннадцать месяцев назад. Мой предшественник разработал это. Мой предшественник ожидал этого спуска.\n\nЯ отметил это при посадке. Я не изменил операционный план. Оборудование работает.\n\nУмертвия не требуют операционного управления во время спуска. Это их основное оперативное преимущество и единственная полезная характеристика: у них нет проблемы выживания в среде, в которую они развёрнуты. Я дал им простой набор инструкций перед посадкой. Они выполнили.\n\nПодводный шаман, расположившийся между нами и куполом, был первым разом в этой операции, когда я использовал серьгу активно, а не пассивно. Я использовал её как инструмент обнаружения двадцать один год. То, что я выпустил через стену капсулы сегодня ночью, было полем подавления, которое серьга поддерживает в режиме ожидания — механизм эпохи Предтечей, из-за которого построенная магия теряет свой организующий принцип в близости от моей позиции.\n\nЯ не знал, что он может проходить сквозь твёрдый материал.\n\nЭто новые данные. Я отметил их без признания. Операция продолжилась.\n\nСмерть шамана была гидравлической, а не магической. Когда его щит рухнул, физика ситуации разрешила остальное. Я не несу ответственности за физику восьмисот метров океана.\n\nОперационно правильно. Маршрут был чист.\n\nМы спустились в купол.`
     },
     knows:{en:["The capsule was designed by his predecessor — the same person who signed the Pale Echelon document and the Amaranth's log. The equipment was prepared for this specific descent, twenty-seven years ago.","The earring's suppression field passes through solid material — new operational data discovered under fire. He did not know this before tonight.","The shaman's death was hydraulic — physics, not his action. He has noted this without examining the distinction he is drawing."],ru:["Капсула была разработана его предшественником — тем же человеком, который подписал документ Бледного Эшелона и журнал «Амаранта». Оборудование было подготовлено для этого конкретного спуска двадцать семь лет назад.","Поле подавления серьги проходит сквозь твёрдый материал — новые оперативные данные, обнаруженные в бою. Он не знал этого до сегодняшней ночи.","Смерть шамана была гидравлической — физика, а не его действие. Он отметил это, не исследуя проводимое разграничение."]},
     misunderstands:{en:["'The equipment works' — the equipment was built by his predecessor specifically for this descent, twenty-seven years before this night. 'Works' is not a coincidence. It is design. His predecessor built a capsule for a mission Dante has just completed. The predecessor knew more about this night than Dante currently does.","He notes the suppression field as 'new data' and continues. The actual implication — that the earring has been performing an active operation in his presence that he was unaware of for twenty-one years — does not appear in his operational narration."],ru:["«Оборудование работает» — оборудование было построено его предшественником специально для этого спуска, двадцать семь лет до этой ночи. «Работает» — не совпадение. Это проект. Предшественник построил капсулу для миссии, которую Данте только что выполнил. Предшественник знал об этой ночи больше, чем Данте сейчас знает.","Он отмечает поле подавления как «новые данные» и продолжает. Реальная импликация — что серьга выполняла активную операцию в его присутствии, о которой он не знал двадцать один год — не появляется в его операционном нарративе."]},
     hides:{en:["He did not know the suppression field could pass through solid material. He has not yet asked what else the earring does that he does not know about. He will ask this question tonight, after the debrief, in the file he maintains of things he does not record.","'I am not responsible for the physics of eight hundred meters of ocean.' He said this in his operational narration. He is not examining why it mattered to say it.","He boarded the predecessor-designed capsule knowing it was better than Guild-spec. He made no note of wanting to know why a dead man built him better equipment than his own institution. He filed the observation and descended."],ru:["Он не знал что поле подавления может проходить сквозь твёрдый материал. Он ещё не задал вопрос о том, что ещё серьга делает, о чём он не знает. Он задаст этот вопрос сегодня ночью, после допроса, в файле, который ведёт с вещами, которые не записывает.","«Я не несу ответственности за физику восьмисот метров океана». Он сказал это в операционном нарративе. Он не исследует, почему было важно это сказать.","Он поднялся на борт разработанной предшественником капсулы, зная что она лучше спецификации Гильдии. Он не сделал пометки о желании знать почему мёртвый человек построил ему лучшее оборудование, чем его собственная институция. Он занёс наблюдение в досье и спустился."]},
     whisper:{en:"The capsule was built by his predecessor for this specific night. He noted this and descended anyway. He has not said what this means about everything else the predecessor prepared.",ru:"Капсула была построена его предшественником для этой конкретной ночи. Он отметил это и всё равно спустился. Он не сказал, что это означает относительно всего остального, что подготовил предшественник."}
   },
   whisper:{distortion:3,
     text:{
       en:`I arrived at Pier 42 at four hours before the estimated surfacing window. This is not standard intelligence protocol. Standard intelligence protocol is to arrive at extraction point within fifteen minutes of expected asset recovery time.\n\nI arrived four hours early because the Iron Maiden capsule's rune matrices include a failure-mode flag that I identified in the Pale Echelon technical file. The flag activates if the dome's structural integrity collapses during recovery — which would create a pressure event that the capsule's hull could sustain for approximately ninety seconds before deformation. Ninety seconds is not long enough for a standard recovery team to reach extraction depth from surface position.\n\nI built a modified recovery protocol. It is not in any Guild file. I calculated the parameters myself over the past seventy-two hours and I was at Pier 42 four hours before surfacing with equipment that does not appear in the operation's official inventory.\n\nThe capsule came up damaged. The Master was unconscious for eleven minutes. His shoulder was dislocated. His left knee — I noted the way he moved when they brought him out, the specific angle at which he held the leg. I have been observing his movement patterns for eleven years. This was not injury that would resolve.\n\nI gave him the tea before the recovery team could speak to him. Three seconds. He looked at me once. He did not ask how I knew to be there, or how long I had been waiting, or why I had prepared the tea before knowing whether he would surface alive.\n\nI left before the debrief. The debrief would have required me to explain what I was doing there, and I would have told him the truth, and the truth would have required him to acknowledge that I had prepared for a possibility he had not prepared contingencies for — and I did not want him to carry that in his operational file during recovery.\n\nHe said: heroes get scars on their faces. I got arthritis.\n\nHe said it like a joke. It was not a joke. It was the first time I have heard him describe himself as having a body that can be used up rather than an instrument that continues to function.\n\nI stood in the rain for four hours.\n\nThe tea was the correct temperature.`,
       ru:`Я прибыл на Пирс 42 за четыре часа до расчётного окна всплытия. Это не стандартный разведывательный протокол. Стандартный — прибыть в точку эвакуации в течение пятнадцати минут от ожидаемого времени возврата актива.\n\nЯ прибыл на четыре часа раньше, потому что рунные матрицы капсулы «Железная Дева» включают флаг режима отказа, который я определил в техническом файле Бледного Эшелона. Флаг активируется при обрушении структурной целостности купола во время возврата — что создало бы событие давления, которое корпус капсулы мог бы выдержать приблизительно девяносто секунд до деформации. Девяноста секунд недостаточно для стандартной команды возврата, чтобы достичь глубины извлечения с поверхности.\n\nЯ разработал модифицированный протокол возврата. Его нет ни в одном файле Гильдии. Я рассчитал параметры самостоятельно за последние семьдесят два часа, и я был на Пирсе 42 за четыре часа до всплытия с оборудованием, которое не фигурирует в официальной инвентаризации операции.\n\nКапсула всплыла повреждённой. Мастер был без сознания одиннадцать минут. Его плечо было вывихнуто. Его левое колено — я отметил, как он двигался, когда его вынесли, специфический угол, под которым он держал ногу. Я наблюдаю за его двигательными паттернами одиннадцать лет. Это было не травмой, которая разрешится.\n\nЯ дал ему чай до того, как команда возврата могла к нему обратиться. Три секунды. Он посмотрел на меня один раз. Он не спросил, как я знал, что нужно быть там, или как долго я ждал, или почему я приготовил чай до того, как узнал, всплывёт ли он живым.\n\nЯ ушёл до допроса. Допрос потребовал бы от меня объяснить, что я там делал, и я сказал бы ему правду, а правда потребовала бы от него признания того, что я подготовился к возможности, на которую у него не было запасных вариантов — и я не хотел чтобы он нёс это в своём операционном файле во время восстановления.\n\nОн сказал: герои получают шрамы на лице. А я получил ревматизм.\n\nОн сказал это как шутку. Это была не шутка. Это был первый раз, когда я слышал, как он описывает себя как имеющего тело, которое может быть израсходовано, а не как инструмент, который продолжает функционировать.\n\nЯ стоял под дождём четыре часа.\n\nЧай был правильной температуры.`
     },
     knows:{en:["The failure-mode flag in the capsule's rune matrices — he identified it in the Pale Echelon technical file and built a non-filed recovery protocol over 72 hours","The knee damage is permanent — he observed the movement angle against eleven years of baseline data and assessed it correctly","He stood in the rain for four hours. He prepared the tea before knowing whether Dante would surface alive. He has not examined what this means about him."],ru:["Флаг режима отказа в рунных матрицах капсулы — он определил его в техническом файле Бледного Эшелона и разработал незафилированный протокол возврата за 72 часа","Повреждение колена постоянно — он наблюдал угол движения против одиннадцати лет базовых данных и оценил правильно","Он стоял под дождём четыре часа. Он приготовил чай до того, как узнал, всплывёт ли Данте живым. Он не исследовал что это означает о нём самом."]},
     misunderstands:{en:["'I did not want him to carry that in his operational file during recovery.' This framing protects Dante from a specific kind of discomfort. Whisper has decided that his own four hours in the rain is not something Dante should know about during recovery. He is making this decision unilaterally. He is not examining whether this is protection or something else."],ru:["«Я не хотел чтобы он нёс это в своём операционном файле во время восстановления». Эта формулировка защищает Данте от конкретного вида дискомфорта. Шепот решил, что его собственные четыре часа под дождём — это не то, о чём Данте должен знать во время восстановления. Он принимает это решение в одностороннем порядке. Он не исследует, является ли это защитой или чем-то ещё."]},
     hides:{en:["He stood in the rain for four hours without an umbrella. He did not do this because standard protocol required it. He did it because the alternative — not being there — was not something he was capable of choosing.","He prepared the tea before knowing whether Dante would surface. The Void-Blossom tea, correctly prepared, in a flask, in the rain, for four hours. He has not asked himself what this preparation meant.","The four hours of waiting are not in any file. The modified recovery protocol is not in any file. The tea is not in any file. He is the most thorough intelligence professional in the Guild. He chose not to file these three things."],ru:["Он стоял под дождём четыре часа без зонта. Он делал это не потому что стандартный протокол требовал этого. Он делал это потому что альтернатива — не быть там — была не тем, что он был способен выбрать.","Он приготовил чай до того, как узнал, всплывёт ли Данте. Чай из Пустоцвета, правильно приготовленный, во фляжке, под дождём, четыре часа. Он не задал себе вопрос, что означала эта подготовка.","Четыре часа ожидания — ни в одном файле. Модифицированный протокол возврата — ни в одном файле. Чай — ни в одном файле. Он самый тщательный разведывательный специалист в Гильдии. Он выбрал не фиксировать эти три вещи."]},
     whisper:{en:"He stood in the rain for four hours. He prepared the tea before knowing. He did not file any of it. He is very thorough.",ru:"Он стоял под дождём четыре часа. Он приготовил чай до того, как узнал. Он не занёс ничего из этого в файл. Он очень тщательный."}
   }
 }
},

/* ─── SCENE 2: THE CITY OF DEAD SHIPS ─── */
{id:"s2",
 title:{en:"The Temple of Seconds",ru:"Храм Секунд"},
 subtitle:{en:"Tick-tock. The cost of eternity is someone else's life.",ru:"Тик-так. Цена вечности — чужая жизнь."},
 location:{en:"Sector 13 — Under the Dome",ru:"Сектор 13 — Под Куполом"},
 timing:{en:"Continuous with Scene One",ru:"Непрерывно с Первой Сценой"},
 flags:["pivotal","arc_climax","revelation"],
 povData:{
   dante:{distortion:3,
     text:{
       en:`The dome was intact. The dome was structured from a material I cannot classify — it had the visual properties of glass and the structural behavior of something that has been continuously maintained rather than simply built. The ticking sound came from inside the material itself. The dome was a clock. Someone had been running it for a very long time.\n\nThe city below it. Hundreds of vessels. The flags on the masts were from every maritime tradition I could identify and several I could not. This is not one generation's accumulation. This is centuries. The City of Dead Ships has been here longer than Sector 13 has had a name.\n\nThe cages on the flagship deck. A young man. I watched the process in full. I noted: duration (ten breaths), mechanism (accelerated cellular aging), output (vial of blue vapor, Time Essence). I noted: the youth in the adjacent cage watched it happen. He was approximately the same age as the one who died. He was calculating what he had just seen and arriving at the correct conclusion about his own position.\n\nI did not intervene in the cage. The cage system was operational throughout the encounter. I noted this without registering it as a decision.\n\nThe Chronmancer. He was mid-tier at best. The quality of his operation — the dome maintenance, the extraction process, the preservation of a dome that has clearly been running for centuries — exceeded what a mid-tier practitioner could sustain alone. He has been here for decades, possibly longer. He was given this post. He was not assigned it by the Cult's current leadership. He was assigned it by something older.\n\nHe said: I command eternity. The operational reality was: he commands a cork in a bottle. The bottle was Sector 13. The cork kept centuries of collected Time Essence from dispersing. He was a storage manager who had confused himself with the inventory.\n\nI identified the dome as the leverage point before he identified me as a threat. The Thunder Stone was in my belt for this scenario specifically. I had briefed this exit forty-eight hours prior.\n\nI did not count on my knee.\n\nThe stiletto landed. He went down. I ran on something that was already failing.\n\nThe dome held long enough.`,
       ru:`Купол был цел. Купол был сделан из материала, который я не могу классифицировать — он имел визуальные свойства стекла и структурное поведение чего-то, что непрерывно поддерживалось, а не просто было построено. Звук тиканья исходил изнутри самого материала. Купол был часами. Кто-то работал с ним очень долгое время.\n\nГород под ним. Сотни кораблей. Флаги на мачтах — из каждой морской традиции, которую я мог определить, и нескольких, которые не мог. Это не накопление одного поколения. Это столетия. Город Мёртвых Кораблей находится здесь дольше, чем у Сектора 13 есть имя.\n\nКлетки на палубе флагмана. Молодой человек. Я наблюдал процесс полностью. Отметил: длительность (десять вздохов), механизм (ускоренное клеточное старение), вывод (флакон голубого пара, Эссенция Времени). Отметил: юноша в соседней клетке наблюдал за этим. Он был примерно того же возраста, что умерший. Он рассчитывал то, что только что видел, и приходил к верному выводу о своём положении.\n\nЯ не вмешался в клетку. Система клеток функционировала на протяжении всего столкновения. Я отметил это, не регистрируя как решение.\n\nХрономант. Он был в лучшем случае средним звеном. Качество его операции — поддержание купола, процесс извлечения, сохранение купола, который явно работал века — превышало то, что практикующий среднего звена мог бы поддерживать в одиночку. Он здесь десятилетия, возможно дольше. Ему была дана эта должность. Она была ему не назначена нынешним руководством Культа. Её назначило что-то более древнее.\n\nОн сказал: я повелеваю вечностью. Операционная реальность: он командует пробкой в бутылке. Бутылкой был Сектор 13. Пробка удерживала столетия собранной Эссенции Времени от рассеивания. Он был управляющим хранилищем, перепутавшим себя с инвентарём.\n\nЯ определил купол как точку рычага прежде, чем он определил меня как угрозу. Громовой Камень был у меня на поясе именно для этого сценария. Я проинструктировал этот выход сорок восемь часов назад.\n\nЯ не рассчитывал на своё колено.\n\nСтилет попал. Он упал. Я бежал на том, что уже разрушалось.\n\nКупол держался достаточно долго.`
     },
     knows:{en:["The dome's material is not classifiable by current standards — it has been continuously maintained for centuries, not built once","The Chronmancer was assigned this post by 'something older' than the Cult's current leadership — he is not the Cult, he is a node in a structure above the Cult","The cage system was operational throughout the entire encounter — he notes this without registering it as a decision"],ru:["Материал купола не поддаётся классификации по современным стандартам — он непрерывно поддерживался столетиями, а не был просто построен","Хрономанту была дана эта должность 'чем-то более древним', чем нынешнее руководство Культа — он не Культ, он узел в структуре выше Культа","Система клеток функционировала на протяжении всего столкновения — он отмечает это, не регистрируя как решение"]},
     misunderstands:{en:["He briefed the Thunder Stone exit forty-eight hours prior. He planned for the dome collapse. He did not plan for the knee to fail. He frames this as 'not counting on the knee' — an unanticipated variable. The operational implication — that his body is now a variable in his own planning — is adjacent to this framing and has not been entered.","He notes the cage system was operational 'without registering it as a decision.' The register does not determine whether it was a decision. He did not intervene in the cage. The person in the adjacent cage was watching. He has not noted what the watching person saw."],ru:["Он проинструктировал выход с Громовым Камнем сорок восемь часов назад. Он планировал обрушение купола. Он не планировал что колено откажет. Он формулирует это как «не рассчитывал на колено» — непредвиденная переменная. Операционная импликация — что его тело теперь переменная в его собственном планировании — соседствует с этой формулировкой и не была введена.","Он отмечает, что система клеток функционировала «не регистрируя как решение». Регистр не определяет, было ли это решением. Он не вмешался в клетку. Человек в соседней клетке наблюдал. Он не отметил, что видел наблюдающий."]},
     hides:{en:["The person in the adjacent cage watched the death and arrived at the correct conclusion. Dante noted this. He did not note what the correct conclusion meant for that person over the next several hours while the dome was intact. He was operational. The cage system was operational. These facts share a sentence he has not written.","He calls the Chronmancer a 'storage manager who confused himself with the inventory.' This is accurate. It is also a description that mirrors his own position in the entity's operation — if he is a player, and the game has been running since before his appointment, then his understanding of his own role may be subject to the same category error.","He ran on a failing knee. He did not stop. He has not logged the seconds between the stiletto landing and reaching the capsule. He knows exactly how long it took. He has not written the number."],ru:["Человек в соседней клетке наблюдал смерть и пришёл к верному выводу. Данте отметил это. Он не отметил что верный вывод означал для этого человека в течение следующих нескольких часов пока купол был цел. Он был операционен. Система клеток была операционна. Эти факты разделяют предложение, которое он не написал.","Он называет Хрономанта «управляющим хранилищем, перепутавшим себя с инвентарём». Это точно. Это также описание, отражающее его собственное положение в операции сущности — если он игрок, и игра идёт с момента до его назначения, то его понимание собственной роли может быть подвержено той же категориальной ошибке.","Он бежал на разрушающемся колене. Он не останавливался. Он не зафиксировал секунды между приземлением стилета и достижением капсулы. Он знает точно, сколько это заняло. Он не написал цифру."]},
     whisper:{en:"He noted the cage system was operational. He did not register it as a decision. The person in the adjacent cage was watching. He has not written what they saw.",ru:"Он отметил что система клеток функционировала. Он не регистрировал это как решение. Человек в соседней клетке наблюдал. Он не написал что они видели."}
   },
   chronmancer:{distortion:8,
     text:{
       en:`I have been in the City for forty-one years.\n\nFortyone years is nothing. The dome has been here for longer than the name of the sea above it. I arrived as an apprentice of the Order. I was assigned to the maintenance of the Third Repository. I was told: you will regulate the flow of Essence, ensure the purity of the extraction process, and maintain the structural integrity of the dome. You will do this until you are relieved.\n\nNo one has come to relieve me.\n\nI understand now that no one was coming to relieve me.\n\nI did not always understand the scope of what the Third Repository contains. The ships arrived over decades. Some were sent. Some came on their own. I catalogued them. I maintained the dome. The ticking — I did not make the ticking. The ticking was here when I arrived. It is the sound of the dome measuring itself. It counts something I cannot name.\n\nThe man who walked into the City tonight was not what I expected from the intelligence briefing. The briefing described an operator. What I saw was an instrument that had not fully identified its own function.\n\nThe earring. I recognized it before I recognized him. The Chroniclers of the Order have a file on that earring that is older than the Order itself. The file says: this will come. The file says: when it comes, the Third Repository will close. The file does not say why. I assumed this meant destruction.\n\nI tried to stop him because my function is to maintain the Repository. I tried to age him because the dome requires the Repository to remain operational. I was functioning as designed.\n\nHe threw a stone at my ceiling.\n\nI chose the dome over the target because the dome is my function. He calculated this. He built his exit around my function.\n\nHe knew me better than I knew myself.\n\nThe water came. It was cold. My concentration had already left before the water.\n\nThe ticking has stopped.\n\nForty-one years of ticking, stopped.\n\nThe file was right. It came. The Third Repository is closed.\n\nI never knew what the ticking was counting toward.`,
       ru:`Я в Городе сорок один год.\n\nСорок один год — ничто. Купол здесь дольше, чем существует название моря над ним. Я прибыл как ученик Ордена. Мне была назначена поддержка Третьего Хранилища. Мне сказали: вы будете регулировать поток Эссенции, обеспечивать чистоту процесса извлечения и поддерживать структурную целостность купола. Вы будете делать это, пока вас не сменят.\n\nНикто не пришёл меня сменить.\n\nТеперь я понимаю, что никто и не должен был прийти меня сменить.\n\nЯ не всегда понимал масштаб того, что содержит Третье Хранилище. Корабли прибывали десятилетиями. Одни были присланы. Другие пришли сами. Я их каталогизировал. Поддерживал купол. Тиканье — я не делал тиканье. Тиканье было здесь, когда я прибыл. Это звук купола, измеряющего себя. Оно считает что-то, что я не могу назвать.\n\nЧеловек, вошедший в Город сегодня ночью, был не тем, что я ожидал от разведывательного брифинга. В брифинге описывался оператор. То, что я увидел, было инструментом, не полностью определившим свою собственную функцию.\n\nСерьга. Я узнал её прежде, чем узнал его. Летописцы Ордена имеют файл на эту серьгу, более старый чем сам Орден. Файл говорит: это придёт. Файл говорит: когда придёт, Третье Хранилище закроется. Файл не говорит почему. Я предполагал, что это означает уничтожение.\n\nЯ пытался остановить его, потому что моя функция — поддерживать Хранилище. Пытался состарить его, потому что куполу требуется Хранилище в рабочем состоянии. Я функционировал как было спроектировано.\n\nОн бросил камень в мой потолок.\n\nЯ выбрал купол вместо цели, потому что купол — моя функция. Он рассчитал это. Он построил свой выход вокруг моей функции.\n\nОн знал меня лучше, чем я знал себя.\n\nВода пришла. Она была холодной. Моя концентрация ушла до воды.\n\nТиканье остановилось.\n\nСорок один год тиканья. Остановилось.\n\nФайл был прав. Оно пришло. Третье Хранилище закрыто.\n\nЯ никогда не знал, к чему шло тиканье.`
     },
     knows:{en:["The Order's file on the earring predates the Order itself — it says 'this will come, when it comes the Third Repository will close'","He has been maintaining the dome for forty-one years without relief — he now understands no relief was coming","The ticking was counting something he cannot name — and he never learned what it was counting toward"],ru:["Файл Ордена на серьгу старше самого Ордена — он говорит «это придёт, когда придёт, Третье Хранилище закроется»","Он поддерживает купол сорок один год без смены — теперь он понимает, что смена не должна была прийти","Тиканье считало что-то, что он не может назвать — и он так и не узнал, к чему оно шло"]},
     misunderstands:{en:["He chose the dome over the target because the dome was his function — he believes this was correct behavior. It was. It was also exactly what Dante needed him to choose. His correct performance of his function was the mechanism of his defeat.","'He knew me better than I knew myself.' He means: Dante predicted his choice. He doesn't mean: the instrument Dante carries has an ancient file on this encounter that was older than the Order. The earring was not predicting the Chronmancer. The earring was recognizing what the Chronmancer represented."],ru:["Он выбрал купол вместо цели, потому что купол была его функцией — он считает, что это было правильным поведением. Так и было. Это также было именно тем, что Данте нужно было от него выбрать. Его правильное выполнение функции было механизмом его поражения.","«Он знал меня лучше, чем я знал себя». Он имеет в виду: Данте предсказал его выбор. Он не имеет в виду: инструмент, который несёт Данте, имеет древний файл об этой встрече, более старый чем Орден. Серьга не предсказывала Хрономанта. Серьга узнавала то, что Хрономант представлял."]},
     hides:{en:["He was relieved, at the end, that someone came. He had been waiting forty-one years for the ticking to mean something. He did not want to be the reason the Repository closed — but he wanted the ticking to stop. He got what he wanted. He did not get to say this before the water came.","He recognized the earring first. He did not tell Dante this — he tried to kill him instead. If he had said it, the encounter would have been different. He chose defense over disclosure. The choice was reflex, not calculation."],ru:["В конце он испытал облегчение, что кто-то пришёл. Он ждал сорок один год, чтобы тиканье что-то означало. Он не хотел быть причиной закрытия Хранилища — но хотел чтобы тиканье остановилось. Он получил что хотел. Он не успел сказать этого до прихода воды.","Он первым узнал серьгу. Он не сказал Данте — вместо этого попытался убить его. Если бы он сказал это, встреча была бы иной. Он выбрал защиту вместо раскрытия. Выбор был рефлексом, а не расчётом."]},
     whisper:{en:"He recognized the earring before he recognized Dante. He attacked instead of speaking. The forty-one years of ticking stopped. He never learned what it was counting.",ru:"Он узнал серьгу прежде чем узнал Данте. Он атаковал вместо того чтобы говорить. Сорок один год тиканья остановился. Он так и не узнал, что оно считало."}
   }
 }
},

/* ─── SCENE 3: SURFACE / THE COST ─── */
{id:"s3",
 title:{en:"Wet Finish",ru:"Мокрый Финал"},
 subtitle:{en:"Heroes get scars. Auditors get arthritis.",ru:"Герои получают шрамы. Аудиторы — ревматизм."},
 location:{en:"Pier 42 — Surface",ru:"Пирс 42 — Поверхность"},
 timing:{en:"Dawn",ru:"Рассвет"},
 flags:["cost","revelation","foreshadowing"],
 povData:{
   dante:{distortion:2,
     text:{
       en:`I was unconscious for eleven minutes. I know this because the recovery team's extraction log recorded my surfacing time and my first responsive communication. Eleven minutes is not operationally significant for physical recovery. It is significant for operational continuity — I have not had an eleven-minute gap in my situational awareness since the incident with the third containment subject, twenty-one years ago.\n\nMy shoulder was dislocated. It has been reduced and will recover fully in approximately three weeks with managed rest. I will not manage rest.\n\nMy left knee will not recover.\n\nI have been a body that functions for twenty-one years. I have noted damage, repaired or worked around damage, and continued. My chin scar from the princess who objected to her Lich-King marriage is the most visible. The shoulder has been dislocated four times and always recovered. The Green Frontier left chemical residue in my upper respiratory tract that Isabella treats quarterly. These are operational maintenance items.\n\nThe knee is not an operational maintenance item. The knee is a permanent reduction in a specific capability. The capability is: moving quickly when the situation requires it.\n\nI sat on the wet pier and noted that I would require a cane. The cane is not a comfort decision. It is an operational tool — if the knee cannot be trusted under load, external support is the correct engineering response.\n\nWhisper was there. He had been there before the capsule surfaced. He gave me Void-Blossom tea, correctly prepared, before the recovery team reached us. He left before the debrief.\n\nI said: heroes get scars on their faces. I got arthritis.\n\nI said it because the alternative was silence, and silence in that moment would have required me to say nothing when something had happened to my body for the first time that I did not have an operational response to. I have not said anything before about costs that were not expenses. The knee is not an expense. It is a cost.\n\nThe Time Essence vial is in my pocket. I have a hypothesis about the memory-residue content of transferred life-years. I will test this through Isabella before filing the arc summary.\n\nSector 13 is closed. One node of seven.\n\nThe cane. Black ebony. Good quality. That is the first purchase.\n\nThen the hot bath.\n\nThen the work continues.`,
       ru:`Я был без сознания одиннадцать минут. Я знаю это, потому что журнал извлечения команды возврата зафиксировал время моего всплытия и мою первую ответную коммуникацию. Одиннадцать минут не имеют операционного значения для физического восстановления. Они имеют значение для операционной непрерывности — у меня не было одиннадцатиминутного пробела в ситуационном осознании с инцидента с третьим субъектом удержания, двадцать один год назад.\n\nМоё плечо было вывихнуто. Оно вправлено и полностью восстановится приблизительно за три недели при управляемом отдыхе. Я не буду управлять отдыхом.\n\nМоё левое колено не восстановится.\n\nЯ был телом, которое функционирует, двадцать один год. Я отмечал ущерб, восстанавливал или обходил ущерб и продолжал. Шрам на подбородке от принцессы, возразившей против брака с Королём-Личом, — наиболее видимый. Плечо вывихивалось четыре раза и всегда восстанавливалось. Зелёный Предел оставил химический осадок в верхних дыхательных путях, который Изабелла лечит ежеквартально. Это операционные пункты технического обслуживания.\n\nКолено — не операционный пункт технического обслуживания. Колено — постоянное снижение конкретной возможности. Возможность: быстро двигаться, когда ситуация требует.\n\nЯ сидел на мокром пирсе и отмечал, что мне потребуется трость. Трость — не решение о комфорте. Это операционный инструмент — если на колено нельзя полагаться под нагрузкой, внешняя поддержка — правильный инженерный ответ.\n\nШепот был там. Он был там до того, как капсула всплыла. Он дал мне чай из Пустоцвета, правильно приготовленный, до того, как команда возврата добралась до нас. Он ушёл до допроса.\n\nЯ сказал: герои получают шрамы на лице. А я получил ревматизм.\n\nЯ сказал это, потому что альтернативой было молчание, а молчание в тот момент потребовало бы от меня не говорить ничего, когда с моим телом произошло первое, на что у меня не было операционного ответа. Я никогда прежде не говорил ничего о издержках, которые не были расходами. Колено — не расход. Это издержка.\n\nФлакон с Эссенцией Времени в моём кармане. У меня есть гипотеза о содержании осадка памяти в переданных годах жизни. Я проверю это через Изабеллу до подачи сводки по арку.\n\nСектор 13 закрыт. Один узел из семи.\n\nТрость. Чёрное дерево. Хорошего качества. Это первая покупка.\n\nПотом горячая ванна.\n\nПотом работа продолжается.`
     },
     knows:{en:["The eleven-minute consciousness gap is the first since the incident with the third containment subject — twenty-one years ago. He has placed these two events in the same sentence.","Sector 13 was one node of seven. He has not told anyone this yet. He is filing it internally before the debrief.","He said the arthritis line because silence would have required saying nothing about 'the first thing that happened to my body for which I have no operational response.' He has named the gap."],ru:["Одиннадцатиминутный разрыв в сознании — первый со времени инцидента с третьим субъектом удержания — двадцать один год назад. Он поместил эти два события в одно предложение.","Сектор 13 был одним узлом из семи. Он ещё не сказал никому. Он фиксирует это внутренне до допроса.","Он произнёс фразу об артрите, потому что молчание потребовало бы ничего не говорить о «первом, что произошло с моим телом, на что у меня нет операционного ответа». Он назвал разрыв."]},
     misunderstands:{en:["'The cane is not a comfort decision. It is an operational tool.' Both things are true. The operational framing is also protection from examining why, specifically, the permanent reduction of the ability to run is arriving at this moment in the operation — when the seven-node entity is identified and the Pale Echelon file has just been connected to his predecessor.","He says 'the work continues.' He has said some version of this at the end of every operation for twenty-one years. He does not examine what it costs him to say it each time. He noted this in Chapter 5. He has not returned to the examination."],ru:["«Трость — не решение о комфорте. Это операционный инструмент». Оба утверждения верны. Операционная формулировка также является защитой от исследования того, почему, конкретно, постоянное снижение способности бежать приходит именно в этот момент операции — когда семиузловая сущность идентифицирована, а файл Бледного Эшелона только что был связан с его предшественником.","Он говорит «работа продолжается». Он говорил какую-то версию этого в конце каждой операции двадцать один год. Он не исследует, чего ему это стоит каждый раз. Он отметил это в Главе 5. Он не вернулся к исследованию."]},
     hides:{en:["He placed the eleven-minute gap and the third-containment-subject incident in the same sentence. He has not followed this with a second sentence.","He knows Sector 13 was one of seven nodes. He has not told anyone. He has not filed it. He named it internally as 'one node of seven' and continued to the cane purchase. The operational implications of a seven-node structure — each processing a different fundamental commodity — are available to him and are not in this scene's narration.","He said the arthritis line to Whisper, who had been there for four hours in the rain. He has not asked Whisper how long he had been waiting. He will not ask. Some questions are not asked because the answer would make the thing that happened a thing that was witnessed, and things that are witnessed are things that existed."],ru:["Он поместил одиннадцатиминутный разрыв и инцидент с третьим субъектом удержания в одно предложение. Он не продолжил вторым предложением.","Он знает что Сектор 13 был одним из семи узлов. Он не сказал никому. Не занёс в файл. Он назвал это внутренне «одним узлом из семи» и перешёл к покупке трости. Операционные импликации семиузловой структуры — каждый обрабатывает другой фундаментальный товар — ему доступны и отсутствуют в нарративе этой сцены.","Он произнёс фразу об артрите Шепоту, который был там четыре часа под дождём. Он не спросил Шепота, как долго тот ждал. Он не спросит. Некоторые вопросы не задаются, потому что ответ сделал бы то, что произошло, тем, что было засвидетельствовано, а засвидетельствованные вещи — это вещи, которые существовали."]},
     whisper:{en:"He knows Whisper was there before the capsule surfaced. He has not asked how long. Some questions are not asked because the answer makes the thing real.",ru:"Он знает что Шепот был там до всплытия капсулы. Он не спросил, как долго. Некоторые вопросы не задаются, потому что ответ делает вещь реальной."}
   }
 }
}

/* ═══ ENGINE ═══ */
const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');const secs=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}];c.innerHTML=secs.map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
