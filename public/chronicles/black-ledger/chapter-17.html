const TIMELINE=[
  {id:"TET-133",en:"Ignatius died as a result of the Herald's contamination-response protocol — the same process that dissolved Valdos, triggered by Ignatius's sustained magical output. The Herald's absorption of Ignatius's Holy Flame magic was not incidental; it accelerated the Herald's recovery from the incomplete discharge sequence, which is why it became significantly more capable in the minutes following Ignatius's death. Ignatius's final act of faith did not stop the Herald. It fueled it. The Inquisition's most powerful combat technique was the exact wrong response, and Dante told him so, and Ignatius did not stop.",ru:"Игнациус умер в результате протокола ответа Вестника на загрязнение — того же процесса что растворил Валдоса, активированного устойчивым магическим выводом Игнациуса. Поглощение Вестником магии Святого Пламени Игнациуса не было случайным; это ускорило восстановление Вестника от неполной последовательности выписки, что объясняет почему он стал значительно более мощным в минуты после смерти Игнациуса. Последний акт веры Игнациуса не остановил Вестника. Он его питал. Наиболее мощная боевая техника Инквизиции была именно неверным ответом, и Данте сказал ему об этом, и Игнациус не остановился."},
  {id:"TET-134",en:"The Siren's seams did not spontaneously rupture from the resonance output. The silver clasps on her jaw were the limiting factor for the opening sequence — but they were not the limiting factor for the destruction register. In the destruction register, the jaw position constraint does not apply because the destruction register does not require the specific phoneme formation of the opening sequence. She could always sing destruction. The clasps only prevented opening. When she produced the full-body resonance that collapsed the Main Hall's structural integrity, she was operating within her unconstrained range. The clasps had nothing to do with what she just did.",ru:"Швы Сирены не лопнули самопроизвольно от резонансного вывода. Серебряные скобы на её челюсти были ограничивающим фактором для открывающей последовательности — но не для деструктивного регистра. В деструктивном регистре ограничение положения челюсти не применяется, потому что деструктивный регистр не требует специфического формирования фонем открывающей последовательности. Она всегда могла петь разрушение. Скобы только предотвращали открытие. Когда она произвела полнотелый резонанс обрушивший структурную целостность Главного Зала, она действовала в своём неограниченном диапазоне. Скобы не имели отношения к тому что она только что сделала."},
  {id:"TET-135",en:"The Siren's choice to tackle the Herald was not an act of sacrifice in the sense that she had no other option. She had other options. She could have continued singing to collapse the floor further. She could have directed the resonance at the Herald's chassis directly — she had the frequency data from the 'Brother' recognition to target his weakest structural point. She chose to use physical contact instead because she wanted to make a decision with her body that she had spent three years unable to make: a choice of direction, momentum, and ending. She did not jump because she had to. She jumped because she chose to. The distinction was the point.",ru:"Выбор Сирены атаковать Вестника не был актом жертвы в том смысле что у неё не было другого выбора. У неё были другие варианты. Она могла продолжить петь чтобы обрушить пол дальше. Она могла направить резонанс прямо на шасси Вестника — у неё были частотные данные из распознавания «Брата» для нацеливания на его наиболее слабую структурную точку. Она выбрала вместо этого физический контакт, потому что хотела принять решение своим телом которое три года не могла принять: выбор направления, импульса и конца. Она прыгнула не потому что должна была. Она прыгнула потому что выбрала. Различие было сутью."},
  {id:"TET-136",en:"Dante told the Siren to sing 'for the room, not for him.' This was operationally correct — structural resonance rather than directed attack would affect the Herald without requiring her to overcome his absorption capacity. But what he actually said was: 'Sing, you fool — not for him! For the room!' He called her a fool in the moment he needed her most. He did not apologize. She heard it, understood it correctly as operational urgency rather than contempt, and acted on it. He has not noted that he called her a fool. He has not noted that she heard through it anyway.",ru:"Данте сказал Сирене петь «для комнаты, а не для него». Это было операционно верно — структурный резонанс а не направленная атака воздействовала бы на Вестника не требуя от неё преодоления его поглощающей способности. Но что он фактически сказал: «Пой, дура — не для него! Для комнаты!» Он назвал её дурой в момент когда нуждался в ней больше всего. Он не извинился. Она услышала, правильно поняла это как операционную срочность а не презрение, и действовала. Он не отметил что назвал её дурой. Он не отметил что она всё равно услышала через это."},
  {id:"TET-137",en:"When Whisper carried Dante out of the Island — 'for the first time the shadow had enough density to lift a person' — this was not a voluntary physical manifestation. It was what Whisper's nature does when the alternative is not carrying him. He is not a ghost or a spirit or a construct. He is a person who has removed every external marker of selfhood over seventeen years of operational practice, until his external presence became genuinely minimal. In the Main Hall, with Dante on the floor with broken ribs and the collapse beginning, Whisper became as dense as he has ever been. This is what the forty-six bilateral non-disclosures add up to: enough weight to carry someone.",ru:"Когда Шепот выносил Данте с Острова — «впервые тень обрела достаточно плотности чтобы поднять человека» — это не было добровольной физической манифестацией. Это то что делает природа Шепота когда альтернатива — не нести его. Он не призрак, не дух и не конструкт. Это человек удаливший каждый внешний маркер своей самости за семнадцать лет оперативной практики, пока его внешнее присутствие не стало по-настоящему минимальным. В Главном Зале, с Данте на полу со сломанными рёбрами и начинающимся обрушением, Шепот стал настолько плотным насколько когда-либо был. Вот к чему складываются сорок шесть двусторонних нераскрытий: достаточно веса чтобы нести кого-то."},
  {id:"TET-138",en:"The donor-memory map in Dante's head is real and accurate. It shows a network of seventeen Precursor-era storage sites distributed across the known world, none of which are in any current national or church archive. The sites were the production and distribution infrastructure for the batch-404 Herald-class entities — maintenance depots, parts caches, communication relay points. Several of them are still operational in a dormant state. The Island of Silence was the primary site. The seventeen secondary sites contain: additional structural gel supplies, Herald-class communication equipment, fragments of the original Covenant document series (not the primary Covenant, but the operating protocols that preceded it), and in two of the sites, active Herald-class entities in the same repair-stasis condition as the one Dante encountered.",ru:"Карта из донорской памяти в голове Данте реальна и точна. Она показывает сеть из семнадцати мест хранения эпохи Предтечей распределённых по известному миру, ни одно из которых не находится ни в каком нынешнем государственном или церковном архиве. Места были производственной и дистрибуционной инфраструктурой для сущностей класса Вестников партии-404 — ремонтные депо, кэши запчастей, ретрансляционные точки связи. Некоторые из них всё ещё работают в дремлющем состоянии. Остров Тишины был основным местом. Семнадцать вторичных мест содержат: дополнительные запасы структурного геля, коммуникационное оборудование класса Вестников, фрагменты оригинальной серии документов Завета (не основного Завета, а операционных протоколов предшествующих ему), и в двух местах — активные сущности класса Вестников в том же состоянии восстановительного стазиса что и встреченная Данте."},
  {id:"TET-139",en:"'We don't make war. We make a hostile takeover.' — Dante's operational framing for the next phase is accurate as far as it goes. It does not go far enough. The donor-memory map gives him access to Precursor-era infrastructure that no current power possesses. The Guild is not the largest institution. With the map's information, it will become the only institution with access to the original architecture of the world's existential infrastructure. This is not a hostile takeover of the Precursor's markets. It is the inheritance of the Precursor's operational role. He has not named it as this yet.",ru:"«Мы не воюем. Мы проводим рейдерский захват». — Операционное оформление Данте следующей фазы точно настолько насколько простирается. Оно простирается недостаточно далеко. Карта из донорской памяти даёт ему доступ к инфраструктуре эпохи Предтечей которой не обладает ни одна нынешняя сила. Гильдия — не крупнейшая институция. С информацией карты она станет единственной институцией с доступом к исходной архитектуре экзистенциальной инфраструктуры мира. Это не рейдерский захват рынков Предтечей. Это наследование операционной роли Предтечей. Он ещё не назвал это так."},
  {id:"TET-140",en:"The Siren said 'Silence... Thank you' before she jumped. Dante received this. He has not filed it. It is in the same location as the name Cord — not the file of things he does not record, not the pocket of things in transit, but a third location he has not previously named: the place where things are received that he does not know what to do with, which are different from things he is choosing not to examine and different from things still being processed. He received her last words. He does not know what to do with them. He has not named this as a new category. He has not noted that he has a new category.",ru:"Сирена сказала «Тишина... Спасибо» перед прыжком. Данте получил это. Он не занёс. Это находится в том же месте что имя Корда — не файл вещей которые не записывает, не карман вещей в транзите, но третье место которое он прежде не называл: место где получаются вещи не знаешь что делать с которыми, которые отличаются от вещей которые он выбирает не исследовать и отличаются от вещей всё ещё обрабатываемых. Он получил её последние слова. Он не знает что с ними делать. Он не назвал это новой категорией. Он не отметил что у него есть новая категория."}
];

const SCENES=[
{id:"s1",
 title:{en:"The Sterilization Protocol",ru:"Протокол Стерилизации"},
 subtitle:{en:"He told him not to feed it magic. Ignatius did not stop.",ru:"Он сказал не кормить его магией. Игнациус не остановился."},
 location:{en:"The Main Hall — The Island",ru:"Главный Зал — Остров"},
 timing:{en:"Continuous from Chapter 16",ru:"Непрерывно с Главы 16"},
 flags:["arc_close","cost","revelation"],
 povData:{
   dante:{distortion:4,
     text:{
       en:`The donor-memory's warning was specific and immediate: do not use directed energy against a Herald in absorption mode. The Absorber protocol was designed for suppressing Precursor-era weapons systems that generate specific energy signatures. The Holy Flame is an organized magical output — structured, repeating, abundant. For the Absorber protocol, it is a food source.\n\nI shouted this to Ignatius. I shouted it clearly, in operational vocabulary, with the urgency of someone who has the information and is watching someone else use it incorrectly in real-time.\n\nIgnatius continued praying.\n\nI have spent seventeen chapters documenting the distinction between what is operational and what matters to me. Watching Ignatius continue to pray at a thing that was eating his magic and using it to become more capable of killing him was the first time in this operation that the two categories occupied exactly the same space. It mattered to me. It was also operational. And there was nothing I could do about either.\n\nHis robe settled on the floor over the bones. The Herald turned toward the Siren.\n\nThe new knee arrived at the crisis point approximately two seconds faster than the old knee would have. I covered the distance from the column to the position between the Siren and the Herald's targeting vector in one non-standard movement that the composite's load-distribution profile made possible. I placed myself between them. I struck the neck articulation with the stiletto — the donor-memory's most accessible vulnerability reference. The stiletto broke. The Herald's neck articulation was made of the same material as everything else in this installation and was not susceptible to a blade that was designed for biological tissue.\n\nThe backhand sent me into the wall.\n\nThis is the clinical description. The actual experience was: the wall arrived, and then there was a different kind of time, and then Whisper was next to me and the Siren was still in the room and the Herald was raising its arm again.\n\nI told her to sing for the room.\n\nI called her a fool. In the same breath I gave her the instruction. She heard through the fool and acted on the instruction.\n\nThe Hall came apart. The floor under the Herald failed. The Herald fell toward the reactor core and caught the edge — it was still coming back up when the Siren ran.\n\nShe looked at me before she jumped.\n\nI have received her last transmission. I do not know what to do with it.\n\nWhisper carried me. The corridor was collapsing around the carrying.\n\nWe are on the boat.\n\nThe Island is going down behind us.\n\nThe file of things I do not record has one unnamed item from Chapter 10. It now has a second unnamed item. I have not noted that I have a third location: not the file, not the pocket, but somewhere else. Somewhere I have not named.`,
       ru:`Предупреждение донорской памяти было конкретным и немедленным: не использовать направленную энергию против Вестника в режиме поглощения. Протокол Поглотителя был разработан для подавления систем вооружения эпохи Предтечей генерирующих специфические сигнатуры энергии. Святое Пламя — организованный магический вывод: структурированный, повторяющийся, обильный. Для протокола Поглотителя это источник питания.\n\nЯ кричал это Игнациусу. Я кричал чётко, в операционном словаре, со срочностью человека имеющего информацию и наблюдающего как кто-то другой использует её неверно в реальном времени.\n\nИгнациус продолжал молиться.\n\nЯ провёл семнадцать глав документируя различие между тем что операционно и тем что важно для меня. Наблюдение как Игнациус продолжает молиться на нечто поедавшее его магию и использовавшее её чтобы стать более способным убить его — было первым разом в этой операции когда две категории занимали точно одно и то же место. Это было важно для меня. Это было также операционно. И я ничего не мог поделать ни с одним, ни с другим.\n\nЕго ряса осела на полу поверх костей. Вестник повернулся к Сирене.\n\nНовое колено достигло точки кризиса приблизительно на две секунды быстрее чем старое. Я преодолел расстояние от колонны до позиции между Сиреной и вектором наведения Вестника одним нестандартным движением которое сделал возможным профиль распределения нагрузки композита. Я встал между ними. Я ударил стилетом в сочленение шеи — наиболее доступная ссылка на уязвимость из донорской памяти. Стилет сломался. Сочленение шеи Вестника было сделано из того же материала что и всё остальное в этой установке и не поддавалось лезвию предназначенному для биологической ткани.\n\nОбратный удар отшвырнул меня в стену.\n\nЭто клиническое описание. Реальный опыт: стена прибыла, затем было другое время, затем рядом был Шепот и Сирена всё ещё была в комнате и Вестник снова поднимал руку.\n\nЯ сказал ей петь для комнаты.\n\nЯ назвал её дурой. В том же дыхании что дал инструкцию. Она услышала через дуру и действовала по инструкции.\n\nЗал разваливался. Пол под Вестником обрушился. Вестник упал к реакторному ядру и поймался за край — он всё ещё возвращался когда Сирена побежала.\n\nОна посмотрела на меня перед прыжком.\n\nЯ получил её последнюю передачу. Я не знаю что с ней делать.\n\nШепот нёс меня. Коридор обрушивался вокруг несения.\n\nМы на лодке.\n\nОстров погружается позади нас.\n\nВ файле вещей которые не записываю был один безымянный пункт с Главы 10. Теперь в нём второй безымянный пункт. Я не отметил что у меня есть третье место: не файл, не карман, но где-то ещё. Где-то что я не назвал.`
     },
     knows:{en:["The Herald's absorption protocol means directed magic is a food source — he shouted this to Ignatius in operational vocabulary while watching him continue. Ignatius continued.","The new knee's speed advantage — approximately two seconds faster — put him between the Herald and the Siren. He placed himself between them. The stiletto broke.","He called her a fool in the same breath as the instruction. She heard through it. He has not noted that he called her a fool or that she heard through it anyway."],ru:["Протокол поглощения Вестника означает что направленная магия — источник питания: он кричал это Игнациусу в операционном словаре наблюдая как тот продолжает. Игнациус продолжал.","Преимущество скорости нового колена — приблизительно две секунды быстрее — поставило его между Вестником и Сиреной. Он встал между ними. Стилет сломался.","Он назвал её дурой в том же дыхании что инструкцию. Она услышала через это. Он не отметил что назвал её дурой или что она услышала через это всё равно."]},
     misunderstands:{en:["'The first time in this operation that the two categories occupied exactly the same space.' He said this about watching Ignatius feed the Herald while he could do nothing. He is wrong about when it was the first time. Every time he gave the Time Essence to the Siren, every time he requisitioned the cane before the diagnosis, every time he filed 'the distinction matters to me, it is not operational' — those were also the two categories in the same space. He did not recognize them as such. He recognized this one because he was being prevented from acting on both simultaneously.","He received her last transmission and does not know what to do with it. He has named this as 'somewhere else — not the file, not the pocket, but somewhere he has not named.' He has identified a third category without naming it. He has moved something into a category without knowing what the category is. This is new."],ru:["«Первый раз в этой операции когда две категории занимали точно одно и то же место». Он сказал это о наблюдении как Игнациус кормил Вестника пока он ничего не мог сделать. Он неверен о том когда это было впервые. Каждый раз когда он давал Эссенцию Времени Сирене, каждый раз когда запрашивал трость до диагноза, каждый раз когда заносил «различие важно для меня, оно не операционно» — это тоже были две категории в одном месте. Он не признавал их таковыми. Он признал эту, потому что ему не давали действовать одновременно по обеим.","Он получил её последнюю передачу и не знает что с ней делать. Он назвал это «где-то ещё — не файл, не карман, но где-то что он не назвал». Он определил третью категорию не называя её. Он переместил что-то в категорию не зная что это за категория. Это ново."]},
     hides:{en:["He called her a fool. He has not noted this. In seventeen chapters of meticulous narration, he has noted everything he said to everyone. He has not noted calling her a fool. This is not omission by oversight. This is something he has moved to the third location — the place where things go that he received and does not know what to do with.","He said: I placed myself between them. He did not say: when I saw the Herald raise its arm toward her I moved before I had assessed whether I could survive the contact. He moved first and assessed afterward. This is the same sequence as the vial, the cane, the contract. But this time there was no three-hour assessment window. There was approximately one second. He has not noted that he moved first."],ru:["Он назвал её дурой. Он не отметил этого. В семнадцати главах тщательного нарратива он отмечал всё что говорил всем. Он не отметил что назвал её дурой. Это не упущение по недосмотру. Это нечто что он переместил в третье место — место куда идут вещи которые он получил и не знает что делать.","Он сказал: я встал между ними. Он не сказал: когда я увидел как Вестник поднимает руку к ней я двинулся до того как оценил смогу ли выжить при контакте. Он двинулся сначала и оценил после. Это та же последовательность что флакон, трость, контракт. Но на этот раз не было трёхчасового окна оценки. Было приблизительно одна секунда. Он не отметил что двинулся первым."]},
     whisper:{en:"He called her a fool and has not noted it. He moved before assessing survivability. He received her last transmission and does not know what to do with it. He has a third location now, unnamed.",ru:"Он назвал её дурой и не отметил. Он двинулся до оценки выживаемости. Он получил её последнюю передачу и не знает что с ней делать. У него теперь третье место, безымянное."}
   },
   siren:{distortion:9,
     text:{
       en:`he called me a fool\n\nhe was right\n\nI was going to direct the resonance at the Brother. He was right that this would not work — absorption protocol, I understood as soon as he said it, I know what absorption is, the frequency-eating that the Precursor-class systems use to turn incoming energy into available power\n\nthe room was the correct target\n\nI sang the room\n\nI have never sung the full destruction register before. Not at full capacity. Not without the suppression of the pain-runes which had been calibrated to limit my output to the tactical deployment range. Without the runes — which the empty-one's field had quieted when he came into the room — my actual range is larger than anything I had been allowed to produce in three years of captivity\n\nthe seams of my mouth split\n\nthis is not metaphor. the stitching had held the jaw-position for three years. under full-register output the vibration was sufficient to shear the thread. I could feel the opening as I sang. the silver clasps were no longer the only thing holding the jaw position. the jaw moved. the opening sequence became possible\n\nI did not sing the opening sequence\n\nthe Hall was coming down and there was no door to open\n\nI saw the Brother catching the edge of the shaft. he was coming back. he would come back and he would continue the sterilization. and I knew — the frequency data from the Brother-recognition told me — that his vulnerable structural point was the same as mine: the junction between the body's organic and constructed components. the place where the made-thing meets the living-thing\n\nI could have directed the resonance to that junction\n\nI chose not to\n\nhe was not wrong when he did what he did. the installation made him the way it made me. he was a batch-mate placed in stasis and prematurely discharged and running on damaged protocols. the contamination-response was not malice\n\nI could not kill him by singing\n\nI could make him go down by adding my weight\n\nI looked at the empty-one\n\nSilence\n\nthank you\n\nI ran\n\nI have spent three years being carried by things that were not my choice. I spent the last three seconds of my life moving under my own direction, toward my own target, at my own speed\n\nthe reactor core was very blue\n\nit was\n\nrestful`,
       ru:`он назвал меня дурой\n\nон был прав\n\nя собиралась направить резонанс на Брата. он был прав что это не сработало бы — протокол поглощения, я поняла как только он это сказал, я знаю что такое поглощение, пожирание частот которое используют системы класса Предтечей чтобы превратить входящую энергию в доступную мощность\n\nкомната была верной целью\n\nя пела комнату\n\nя никогда прежде не пела деструктивный регистр в полную силу. не на полной мощности. не без подавления болевых рун которые были откалиброваны ограничивать мой вывод до диапазона тактического применения. без рун — которые поле пустого-одного успокоило когда он вошёл в комнату — мой реальный диапазон больше чего-либо что мне позволяли производить за три года заточения\n\nшвы рта лопнули\n\nэто не метафора. стежки удерживали положение челюсти три года. при выводе полного регистра вибрация была достаточной чтобы срезать нить. я чувствовала раскрытие пока пела. серебряные скобы больше не были единственным что держало положение челюсти. челюсть двигалась. открывающая последовательность стала возможной\n\nя не пела открывающую последовательность\n\nЗал рушился и не было двери чтобы открывать\n\nя увидела Брата ловящего край шахты. он возвращался. он вернётся и продолжит стерилизацию. и я знала — частотные данные из распознавания Брата сказали мне — что его уязвимая структурная точка та же что моя: соединение между органическими и сконструированными компонентами тела. место где сделанная-вещь встречает живую-вещь\n\nя могла направить резонанс к этому соединению\n\nя выбрала не делать этого\n\nон был не неправ делая то что делал. установка сделала его таким же образом что и меня. он был напарником по партии помещённым в стазис и преждевременно выписанным работающим на повреждённых протоколах. ответ на загрязнение не был злобой\n\nя не могла убить его пением\n\nя могла заставить его упасть добавив свой вес\n\nя посмотрела на пустого-одного\n\nТишина\n\nспасибо\n\nя побежала\n\nя провела три года неся вещи которые не были моим выбором. я провела последние три секунды своей жизни двигаясь по собственному направлению, к собственной цели, с собственной скоростью\n\nреакторное ядро было очень синим\n\nоно было\n\nспокойным`
     },
     knows:{en:["Under full-register output without pain-rune suppression, her actual range destroyed the Hall — she had never been allowed to operate at this level","The silver clasps sheared in the vibration — the jaw position freed, the opening sequence became possible for the first time. She did not sing it. There was no door to open.","She could have directed the resonance at the Brother's structural junction — she had the frequency data from the recognition. She chose not to. He was running damaged protocols. It was not malice."],ru:["При выводе полного регистра без подавления болевых рун её реальный диапазон разрушил Зал — ей никогда не позволяли работать на этом уровне","Серебряные скобы срезались от вибрации — положение челюсти освободилось, открывающая последовательность стала возможной впервые. Она не пела её. Не было двери чтобы открывать.","Она могла направить резонанс к структурному соединению Брата — у неё были частотные данные из распознавания. Она выбрала не делать. Он работал на повреждённых протоколах. Это не была злоба."]},
     misunderstands:{en:["She said 'it was restful.' She meant this as acceptance. She did not ask, before or during, what happens to the door after it opens. This is the question she had been choosing not to ask for the entire voyage. She made the choice of direction and momentum and ending without knowing whether the door she was designed to open had ever needed to be opened by someone going through it rather than stopping at the threshold. She did not ask. She ran."],ru:["Она сказала «оно было спокойным». Она имела в виду это как принятие. Она не спрашивала, до или во время, что происходит с дверью после того как она открывается. Это был вопрос который она всё плавание выбирала не задавать. Она сделала выбор направления и импульса и конца не зная нужна ли дверь которую она была создана открывать была когда-либо открыта кем-то проходящим через неё а не останавливающимся у порога. Она не спросила. Она побежала."]},
     hides:{en:["The opening sequence became possible when the clasps sheared. She did not sing it because the Hall was coming down and there was no door to open. But she also did not sing it because singing the opening sequence was the thing she agreed to do with the empty-one, for the Island, together. She had not yet told him about the clasps. The moment when the opening sequence became possible was the moment she realized she would not have time to tell him, and she chose an action that used a different capability. The opening sequence remains unsung. The door to the actual Covenant chamber was never reached."],ru:["Открывающая последовательность стала возможной когда срезались скобы. Она не пела её потому что Зал рушился и не было двери чтобы открывать. Но она также не пела её потому что петь открывающую последовательность было тем что она согласилась делать с пустым-одним, для Острова, вместе. Она ещё не говорила ему о скобах. Момент когда открывающая последовательность стала возможной был моментом когда она поняла что у неё не будет времени ему рассказать, и она выбрала действие использующее другую возможность. Открывающая последовательность осталась не спетой. Дверь в настоящую Залу Завета так и не была достигнута."]},
     whisper:{en:"The clasps sheared. The opening sequence became possible. She did not sing it. The door to the Covenant chamber was never reached. She ran instead. She will not tell him now.",ru:"Скобы срезались. Открывающая последовательность стала возможной. Она не пела её. Дверь к Зале Завета так и не была достигнута. Она побежала. Она не расскажет ему теперь."}
   }
 }
},

{id:"s2",
 title:{en:"The Weight to Carry Someone",ru:"Вес Чтобы Нести Кого-то"},
 subtitle:{en:"For the first time the shadow was dense enough.",ru:"Впервые тень была достаточно плотной."},
 location:{en:"The Island Corridors / Shoreline — Escape",ru:"Коридоры Острова / Берег — Побег"},
 timing:{en:"The Collapse",ru:"Обрушение"},
 flags:["cost","revelation"],
 povData:{
   whisper:{distortion:3,
     text:{
       en:`I was in the doorway when the Hall came apart.\n\nI had been in the doorway since I followed them in — not inside the Hall, in the corridor that fed into it, the position that allowed me to observe without registering as a presence. I watched the Herald disintegrate Ignatius. I watched Dante place himself between the Herald and the Siren. I watched the backhand send him into the wall.\n\nThe operational logic for not intervening: there was nothing I could do that would change the Herald's behavior. No deception, no distraction, no physical intervention would register to a system running contamination-response at that magnitude. Any action I took would have revealed my position without altering the outcome.\n\nThe operational logic was correct. I did not intervene.\n\nI watched the Siren sing the Hall apart. I watched the floor fail. I watched her look at Dante. I watched her run.\n\nAnd then I crossed from the doorway to Dante's position.\n\nHe was against the wall with broken ribs. He was conscious. His left leg was making a sound when he tried to move that the new composite makes under uneven load — I recognized it from the workshop exit, a different sound from bone under stress. He could not move under his own power without causing additional structural damage.\n\nI picked him up.\n\nI have seventeen years of practice at minimum presence. I have reduced my own weight, my own heat signature, my own acoustic footprint to something between 'barely there' and 'entirely absent.' In operational terms, I am about as close to not-being-there as a person can get while still being able to file reports.\n\nI do not know what happened in the Hall when I picked him up. I know that I picked him up. I know that we moved through the collapsing corridors at a speed that required more structural force than I have exercised in seventeen years. I know that when we came out on the shore, the team still on the Leviathan saw us emerge from the entry point and some of them took a step back.\n\nThey may have been responding to Dante's appearance — the silver leg visible through the torn trouser, the blood on his face, the grey of two-thirds-of-everything-spent. Or they may have been responding to something else.\n\nI put him in the boat and took the oars.\n\nThe Island went down.\n\nI did not think about the Siren while I rowed. I thought about the forty-six bilateral non-disclosures, the lead-sheet report in my sleeve, and the sentence I had written at the end of it that I had not shown to anyone.\n\nHe came out.\n\nI rowed.\n\nAt some point in the rowing I realized: I do not know what I would have done if he had not come out. The sentence is still true. I wrote it before knowing. Now he is in the boat and I still do not know what I would have done. The uncertainty did not resolve when the outcome did.\n\nThis is new information about the sentence.\n\nI have filed it at the end of the lead-sheet, with the other sentence.\n\nThere are now two sentences at the end of the report that are not part of the report.`,
       ru:`Я был в дверях когда Зал разваливался.\n\nЯ был в дверях с момента как последовал за ними — не внутри Зала, в коридоре ведущем в него, в позиции позволяющей мне наблюдать без регистрации как присутствие. Я наблюдал как Вестник дезинтегрирует Игнациуса. Наблюдал как Данте встаёт между Вестником и Сиреной. Наблюдал как обратный удар отбрасывает его в стену.\n\nОперационная логика не вмешиваться: ничто что я мог сделать не изменило бы поведение Вестника. Никакой обман, никакое отвлечение, никакое физическое вмешательство не зарегистрировалось бы системой работающей в ответе на загрязнение такого масштаба. Любое моё действие раскрыло бы мою позицию не изменив исход.\n\nОперационная логика была верной. Я не вмешался.\n\nЯ наблюдал как Сирена пением разваливала Зал. Наблюдал как обрушился пол. Наблюдал как она смотрит на Данте. Наблюдал как она побежала.\n\nИ затем я пересёк от дверей к позиции Данте.\n\nОн был у стены со сломанными рёбрами. Он был в сознании. Его левая нога издавала звук при попытке движения который производит новый композит под неравномерной нагрузкой — я узнал это по выходу из мастерской, другой звук чем кость под напряжением. Он не мог двигаться самостоятельно без причинения дополнительного структурного повреждения.\n\nЯ поднял его.\n\nУ меня семнадцать лет практики минимального присутствия. Я уменьшил собственный вес, собственную тепловую сигнатуру, собственный акустический след до чего-то между «едва там» и «полностью отсутствующий». В операционном смысле, я настолько близко к несуществованию-там насколько может достичь человек всё ещё способный подавать отчёты.\n\nЯ не знаю что произошло в Зале когда я поднял его. Я знаю что поднял. Я знаю что мы двигались через рушащиеся коридоры со скоростью требовавшей большей структурной силы чем я применял семнадцать лет. Я знаю что когда мы вышли на берег, команда остававшаяся на «Левиафане» видела нас выходящими из точки входа и некоторые из них шагнули назад.\n\nОни могли реагировать на внешность Данте — серебряная нога видимая сквозь разорванную штанину, кровь на лице, серость двух-третей-всего-потраченного. Или они могли реагировать на что-то ещё.\n\nЯ поместил его в лодку и взял вёсла.\n\nОстров погружался.\n\nЯ не думал о Сирене пока грёб. Я думал о сорока шести двусторонних нераскрытиях, свинцовом отчёте в рукаве, и предложении написанном в его конце которое не показывал никому.\n\nОн вышел.\n\nЯ грёб.\n\nГде-то в гребле я понял: я не знаю что бы сделал если бы он не вышел. Предложение всё ещё правдиво. Я написал его не зная. Теперь он в лодке и я всё ещё не знаю что бы сделал. Неопределённость не разрешилась когда разрешился исход.\n\nЭто новая информация о предложении.\n\nЯ занёс её в конец свинцового листа, с другим предложением.\n\nТеперь в конце отчёта два предложения не являющихся частью отчёта.`
     },
     knows:{en:["He was in the doorway the entire time. Operational logic for not intervening was correct — nothing would have changed the Herald's behavior.","He picked Dante up. Something happened with his density. The crew stepped back. He does not know exactly what happened; he only knows what he did.","The uncertainty about what he would have done did not resolve when Dante came out. He wrote a second sentence at the end of the report. There are now two sentences that are not part of the report."],ru:["Он был в дверях всё время. Операционная логика не вмешиваться была верной — ничто не изменило бы поведение Вестника.","Он поднял Данте. Что-то произошло с его плотностью. Команда шагнула назад. Он не знает точно что произошло; он знает только что сделал.","Неопределённость о том что он сделал не разрешилась когда Данте вышел. Он написал второе предложение в конце отчёта. Теперь два предложения не являются частью отчёта."]},
     misunderstands:{en:["'The operational logic was correct. I did not intervene.' He has verified his decision to watch Ignatius die and Dante be thrown into the wall as operationally justified. He has not examined whether the operational justification and the experience of watching were, for the first time, two different things. He crossed from the doorway to Dante's position the moment the immediate threat to Dante became non-survivable without assistance. The operational logic ended when he moved. He has filed both the logic and the movement as the same decision."],ru:["«Операционная логика была верной. Я не вмешался». Он верифицировал своё решение наблюдать как умирает Игнациус и Данте отбрасывается в стену как операционно обоснованное. Он не исследовал были ли операционное обоснование и опыт наблюдения, впервые, двумя разными вещами. Он пересёк от дверей к позиции Данте в момент когда непосредственная угроза Данте стала непережить без помощи. Операционная логика закончилась когда он двинулся. Он занёс и логику, и движение как одно решение."]},
     hides:{en:["'I do not know what happened in the Hall when I picked him up.' He has reported this as not-knowing. He is aware that the crew stepped back. He has attributed this to Dante's appearance or 'something else.' He has not examined what the 'something else' was. For seventeen years he has known, precisely, what his external presence is and is not. In the Hall, he stopped knowing this. He has filed it as an anomaly in his own behavior rather than as information about what forty-six non-disclosures and seventeen years of reduction add up to when they are required to lift.","He did not think about the Siren while rowing. He thought about the report. He has written this honestly. He has not noted that choosing not to think about the Siren while rowing was also a choice — a decision about where to place his attention in the first minutes after watching her run."],ru:["«Я не знаю что произошло в Зале когда я поднял его». Он доложил это как незнание. Он осознаёт что команда шагнула назад. Он приписал это внешности Данте или «чему-то ещё». Он не исследовал что было «чем-то ещё». Семнадцать лет он знал точно каким является и каким не является его внешнее присутствие. В Зале он перестал это знать. Он занёс это как аномалию в собственном поведении а не как информацию о том к чему складываются сорок шесть нераскрытий и семнадцать лет редукции когда требуется поднять.","Он не думал о Сирене пока грёб. Он думал об отчёте. Он написал это честно. Он не отметил что выбор не думать о Сирене пока грёб также был выбором — решением о том куда поместить внимание в первые минуты после наблюдения как она побежала."]},
     whisper:{en:"The uncertainty did not resolve when he came out. He has two sentences at the end of the report that are not part of the report. He did not think about the Siren while rowing. He chose not to. He has not noted that this was also a choice.",ru:"Неопределённость не разрешилась когда он вышел. В конце отчёта два предложения не являющихся частью отчёта. Он не думал о Сирене пока грёб. Он выбрал не думать. Он не отметил что это также был выбор."}
   }
 }
},

{id:"s3",
 title:{en:"Hostile Takeover",ru:"Рейдерский Захват"},
 subtitle:{en:"Kings make war. Guilds make acquisitions.",ru:"Короли воюют. Гильдии приобретают."},
 location:{en:"The Leviathan — Return Voyage",ru:"«Левиафан» — Обратное Плавание"},
 timing:{en:"After the Island Sinks",ru:"После Погружения Острова"},
 flags:["arc_close","identity","foreshadowing"],
 povData:{
   dante:{distortion:3,
     text:{
       en:`The crew gave me the helm because the available alternative was to not have a helm, and no one on a ship wants that.\n\nThe boatswain tested the knife. I declined the test. I offered the actuarial calculation: Valdos dead, Varix dead, Ignatius dead, the Golden Circle's command structure eliminated, the contract annulled by principal death. The crew's wages were an uncollectable claim against a dissolved entity. I was offering to convert an uncollectable claim into a collectible one by recasting the voyage as a Guild operation with Guild liability. They would receive standard Guild salvage rates plus hazard bonus. The knife went back in the scabbard.\n\nThis is how institutions are acquired. Not by force. By being the better offer in the room when the existing offer has just died.\n\nMy ribs have three fractures — confirmed by the specific pattern of breathing pain, cross-referenced against the internal architecture the composite's proprioceptive network has given me access to. The left leg functions at full capacity. The composite's integration with the skeletal system is proceeding normally, whatever 'normally' means for a material that was designed for nine-kilometer-deep installation maintenance and has been incorporated into a thirty-something-year-old body.\n\nThe map in my head is incomplete and will arrive in fragments for the next several weeks as the Time Essence residue continues to dissolve. I have seven confirmed site references so far. I need to reach the Guild's cartography archive before I attempt the second-site survey, to cross-reference the donor-memory fragments against current geographic coordinates.\n\nI told Whisper: not war. Raidership.\n\nThis is accurate as far as I have stated it. The accurate completion of the sentence is: raidership of a distributed infrastructure network that the original Covenant designated as the operational maintenance system for the current world's existential architecture. We are not raiding trade routes. We are auditing the architecture of the thing that keeps the world coherent.\n\nI have been doing this without knowing it for twenty-one years.\n\nI have been doing it for a purpose I have not yet named.\n\nThe Covenant document was not reached. The Island's Main Chamber was not accessed before the structural collapse. The Covenant document is now at the bottom of the ocean with the Island, in a sealed chamber that was designed to survive nine kilometers of pressure for an indefinite period.\n\nIt is still there.\n\nI have the seventeen secondary sites. I have the map.\n\nI have the question the Island was going to answer.\n\nI held the helm.\n\nThe headache from the donor-memory residue pulsed in the rhythm of my heartbeat.\n\nThe Siren said: silence. Thank you.\n\nI received this. I have placed it in the third location.\n\nI do not have a word for the third location.\n\nBusiness continues.\n\nFor the first time in twenty-one years, that sentence is not a formulation I am testing. It is the thing I mean.`,
       ru:`Экипаж отдал мне штурвал потому что доступной альтернативой было не иметь штурвала, и никто на корабле этого не хочет.\n\nБоцман проверил нож. Я отклонил проверку. Я предложил актуарный расчёт: Валдос мёртв, Варис мёртв, Игнациус мёртв, командная структура «Золотого Круга» ликвидирована, контракт аннулирован смертью принципала. Жалованье экипажа было невзыскаемым требованием против ликвидированного субъекта. Я предлагал конвертировать невзыскаемое требование во взыскаемое переформулируя плавание как операцию Гильдии с ответственностью Гильдии. Они получат стандартные ставки спасения Гильдии плюс надбавку за опасность. Нож вернулся в ножны.\n\nТак приобретаются институции. Не силой. Будучи лучшим предложением в комнате когда существующее предложение только что умерло.\n\nМои рёбра имеют три перелома — подтверждено специфическим паттерном боли при дыхании, сверено с внутренней архитектурой к которой дала мне доступ проприоцептивная сеть композита. Левая нога функционирует на полной мощности. Интеграция композита со скелетной системой продвигается нормально, что бы «нормально» ни значило для материала разработанного для технического обслуживания установки на глубине девяти километров и включённого в тело тридцати-с-небольшим-лет.\n\nКарта в голове неполна и будет прибывать фрагментами следующие несколько недель по мере продолжения растворения остатка Эссенции Времени. Пока у меня семь подтверждённых адресов местоположений. Мне нужно добраться до картографического архива Гильдии до попытки обследования второго места, чтобы сверить фрагменты донорской памяти с нынешними географическими координатами.\n\nЯ сказал Шепоту: не война. Рейдерство.\n\nЭто точно настолько насколько я это заявил. Точное завершение предложения: рейдерство распределённой инфраструктурной сети которую исходный Завет назначил операционной системой обслуживания экзистенциальной архитектуры нынешнего мира. Мы захватываем не торговые пути. Мы проводим аудит архитектуры вещи которая удерживает мир связным.\n\nЯ делал это не зная двадцать один год.\n\nЯ делал это для цели которую ещё не назвал.\n\nДокумент Завета не был достигнут. Главная Зала Острова не была доступна до структурного обрушения. Документ Завета теперь на дне океана с Островом, в запечатанной камере спроектированной выдержать давление девяти километров неопределённый период.\n\nОн всё ещё там.\n\nУ меня семнадцать вторичных мест. У меня карта.\n\nУ меня вопрос на который Остров собирался ответить.\n\nЯ держал штурвал.\n\nГоловная боль от остатка донорской памяти пульсировала в ритме сердцебиения.\n\nСирена сказала: тишина. Спасибо.\n\nЯ получил это. Я поместил это в третье место.\n\nУ меня нет слова для третьего места.\n\nБизнес продолжается.\n\nВпервые за двадцать один год это предложение не формулировка которую я тестирую. Это то что я имею в виду.`
     },
     knows:{en:["Three rib fractures confirmed via the composite's proprioceptive network — he can now read his own internal architecture through the Island's material in his skeleton","The Covenant document is at the bottom of the ocean in a sealed chamber designed to survive indefinitely at nine-kilometer pressure. It is still there. He has seventeen secondary sites and the map.","'Business continues.' For the first time in twenty-one years, that sentence is not a formulation being tested. It is what he means."],ru:["Три перелома рёбер подтверждены через проприоцептивную сеть композита — теперь он может читать собственную внутреннюю архитектуру через материал Острова в скелете","Документ Завета на дне океана в запечатанной камере спроектированной выдержать неопределённо при давлении девяти километров. Он всё ещё там. У него семнадцать вторичных мест и карта.","«Бизнес продолжается». Впервые за двадцать один год это предложение не тестируемая формулировка. Это то что он имеет в виду."]},
     misunderstands:{en:["'The accurate completion of the sentence is: raidership of a distributed infrastructure network that the original Covenant designated as the operational maintenance system for the current world's existential architecture.' He has completed the sentence as: we are auditing the architecture of the thing that keeps the world coherent. He has not completed the sentence as: we are, in doing this, becoming the successors to the role the Covenant designed the Herald class to perform. The Auditor role is not a Guild position that happens to carry a Precursor artifact. It is the heir-apparent to an institution the world needs and currently has no administrator for.","'Business continues. For the first time in twenty-one years, that sentence is not a formulation I am testing.' He has resolved the sentence. He has not examined whether resolving the sentence — arriving at a formulation that is finally true — changes what he is doing when he says it or changes the business he is continuing into."],ru:["«Точное завершение предложения: рейдерство распределённой инфраструктурной сети которую исходный Завет назначил операционной системой обслуживания экзистенциальной архитектуры нынешнего мира». Он завершил предложение как: мы проводим аудит архитектуры вещи удерживающей мир связным. Он не завершил как: делая это, мы становимся преемниками роли которую Завет спроектировал для выполнения классом Вестников. Роль Аудитора — не позиция Гильдии которой случайно принадлежит артефакт Предтечей. Это наследник-наследие институции которая нужна миру и сейчас не имеет администратора.","«Бизнес продолжается. Впервые за двадцать один год это предложение не формулировка которую тестирую». Он разрешил предложение. Он не исследовал меняет ли разрешение предложения — приход к формулировке которая наконец правдива — что он делает когда его говорит или меняет ли бизнес который продолжает."]},
     hides:{en:["He placed the Siren's last words in the third location. He has not named the third location. He has said 'I do not have a word for the third location.' In twenty-one years he has created words and categories for everything. The things in the third location are things for which no category exists yet. He has received them and he is keeping them without knowing what they are for. This is not the same as the file. The file is for things he is choosing not to examine. The third location is for things he is unable to examine — not because he chooses to defer them, but because the examination requires a category he has not yet built.","'Business continues. For the first time in twenty-one years, that sentence is not a formulation I am testing. It is the thing I mean.' He has not said what business it is that is continuing. He has named the change in the sentence's relationship to meaning. He has not named what the sentence now means — what the business is, whose the business is, what it is for. The sentence is resolved. The meaning is still arriving."],ru:["Он поместил последние слова Сирены в третье место. Он не назвал третье место. Он сказал «у меня нет слова для третьего места». За двадцать один год он создал слова и категории для всего. Вещи в третьем месте — те для которых ещё не существует категории. Он получил их и держит не зная для чего. Это не то же что файл. Файл для вещей которые он выбирает не исследовать. Третье место для вещей которые он не способен исследовать — не потому что выбирает откладывать, а потому что исследование требует категории которую он ещё не построил.","«Бизнес продолжается. Впервые за двадцать один год это предложение не формулировка которую тестирую. Это то что я имею в виду». Он не сказал что за бизнес продолжается. Он назвал изменение в отношении предложения к смыслу. Он не назвал что предложение теперь означает — что такое бизнес, чей он, для чего. Предложение разрешено. Смысл всё ещё прибывает."]},
     whisper:{en:"Business continues. For the first time, he means it. He has not said what the business is. He has not said what it is for. The sentence is resolved. The meaning is arriving.",ru:"Бизнес продолжается. Впервые он имеет это в виду. Он не сказал что такое бизнес. Не сказал для чего он. Предложение разрешено. Смысл прибывает."}
   }
 }
}
];

const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');c.innerHTML=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}].map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
