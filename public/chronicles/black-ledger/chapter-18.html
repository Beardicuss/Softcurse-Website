const TIMELINE=[
  {id:"TET-141",en:"The Leviathan's arrival produced exactly the institutional response Dante had planned for: the Golden Circle dispatched their senior counsel, Vane, with a bailiff and a hired company, expecting to arrest a returning navigator on piracy charges before he could establish legal standing on the dock. What Vane did not know: Whisper had spent the return voyage drafting a Maritime Code salvage claim that would take the Golden Circle's own contract language as its basis — their contract with Dante specified 'navigational authority over the vessel in conditions of extreme risk.' The claim was filed with three harbor notaries before the Leviathan had fully docked. The Golden Circle's legal team would spend four weeks discovering that their own contractual language had underwritten the acquisition.",ru:"Прибытие «Левиафана» произвело именно тот институциональный ответ который Данте планировал: «Золотой Круг» направил своего старшего юрисконсульта Вайна с судебным приставом и наёмной компанией, рассчитывая арестовать возвращающегося навигатора по обвинению в пиратстве до того как тот сможет установить правовой статус на причале. Чего Вайн не знал: Шепот провёл обратное плавание составляя претензию по спасению в соответствии с Морским Кодексом, основанную на собственном контрактном языке «Золотого Круга» — их контракт с Данте указывал «навигационные полномочия над судном в условиях крайнего риска». Претензия была зарегистрирована у трёх портовых нотариусов прежде чем «Левиафан» полностью пришвартовался. Правовая команда «Золотого Круга» потратит четыре недели обнаруживая что их собственный контрактный язык обеспечил приобретение."},
  {id:"TET-142",en:"The composite in Dante's knee is producing an unexpected secondary effect that he has not yet detected: when the composite leg strikes a surface with significant force, it conducts the null-field resonance through the contact point into the surrounding material, producing a localized structural disruption in the surface. The granite shattered not because of the mechanical force of the blow alone — the composite's embedded null-field micro-resonance disrupted the crystalline lattice of the stone at the molecular level simultaneously. This is how the Island's maintenance material interacts with non-Island architecture: it reads the target's structural frequency and introduces a cancellation wave. He has a weapon in his leg that he does not know is a weapon.",ru:"Композит в колене Данте производит неожиданный вторичный эффект который он ещё не обнаружил: когда нога с композитом ударяет по поверхности со значительной силой, она проводит нулевой резонанс через точку контакта в окружающий материал, производя локализованное структурное нарушение поверхности. Гранит раскрошился не только от механической силы удара — встроенный микрорезонанс нулевого поля композита одновременно нарушил кристаллическую решётку камня на молекулярном уровне. Так технический материал Острова взаимодействует с неостровной архитектурой: он считывает структурную частоту цели и вводит волну отмены. У него в ноге есть оружие о котором он не знает что это оружие."},
  {id:"TET-143",en:"Dante's stated hatred for the composite leg — 'I hate this thing, not for the pain but for what it represents: the professional who had to compromise their body to survive' — is accurate and incomplete. The complete version: he hates it because it makes sound. Every step is audible in a specific way that his previous movement pattern was not. He has been building an acoustic catalogue of the cane across surfaces for seventeen chapters. The composite produces a different register on every surface, and it is louder, and he cannot suppress it without suppressing the structural resonance that makes the leg functional. He lost the acoustic option he had been maintaining. He has not named this as the source of the hatred.",ru:"Заявленная ненависть Данте к ноге с композитом — «я ненавижу эту штуку, не за боль но за то что она символизирует: профессионал вынужденный идти на компромисс со своим телом чтобы выжить» — точна и неполна. Полная версия: он ненавидит её, потому что она издаёт звук. Каждый шаг слышен специфическим образом которым прежний двигательный паттерн не был. Он семнадцать глав строил акустический каталог трости на разных поверхностях. Композит производит другой регистр на каждой поверхности, он громче, и он не может подавить его не подавляя структурный резонанс делающий ногу функциональной. Он потерял акустическую опцию которую поддерживал. Он не назвал это источником ненависти."},
  {id:"TET-144",en:"Silas's behavioral anomaly log now contains: the crystal-resonance posture match (Chapter 2), the Valeria letter posture match (Chapter 9), the arm-injury from combat that lasted longer than expected (Chapter 8 — logged as inconsistent with reported mechanism), and now the leg. He does not know about the Island or the composite. He has been correlating Site Seven payment patterns with the skimming route for three weeks during Dante's absence, and has confirmed the match. He has four hours from this moment before Dante notices he has been reviewing Site Seven. He has not yet decided what to do with this information. He is, for the second time, watching the leg enter the carriage and thinking about the Site Seven payment recipient.",ru:"Журнал поведенческих аномалий Силаса теперь содержит: совпадение осанки при резонансе кристалла (Глава 2), совпадение осанки при письме Валерии (Глава 9), травму руки от боя продолжавшуюся дольше ожидаемого (Глава 8 — занесено как несоответствующее заявленному механизму), и теперь ногу. Он не знает об Острове или о композите. Он три недели в отсутствие Данте сопоставлял структуры платежей «Объекта Семь» с маршрутом снятия, и подтвердил совпадение. У него четыре часа с этого момента до того как Данте заметит что он просматривал «Объект Семь». Он ещё не решил что делать с этой информацией. Он второй раз наблюдает как нога входит в карету и думает о получателе платежей «Объекта Семь»."},
  {id:"TET-145",en:"Dante's instruction to Silas — 'tell no one about the leg, especially not Isabella' — is operationally backwards. Isabella already knows about the composite because she identified the structural gel in the repair workshop's inventory three months before the expedition departed, cross-referenced it to the Island's known material classification, and understood immediately what it would do to a biological joint if injected. She has been waiting for him to return with a modified knee for three months. She will not ask him about it. She will recalibrate the suppression-field emitter in the cane's handle within four days of his return to account for the null-field resonance change produced by the composite's integration. He will not mention this. She will not explain it. This will be the fourth unspoken arrangement between them.",ru:"Инструкция Данте Силасу — «никому не говори о ноге, особенно Изабелле» — в операционном смысле в обратном направлении. Изабелла уже знает о композите, потому что она определила структурный гель в инвентаре ремонтной мастерской три месяца до отплытия экспедиции, сопоставила его с известной классификацией материалов Острова, и немедленно поняла что он сделает с биологическим суставом при введении. Она три месяца ждала его возвращения с изменённым коленом. Она не спросит его об этом. Она перекалибрует эмиттер поля подавления в рукояти трости в течение четырёх дней по его возвращении с учётом изменения нулевого резонанса произведённого интеграцией композита. Он не упомянет. Она не объяснит. Это будет четвёртая негласная договорённость между ними."},
  {id:"TET-146",en:"'I want the squeak gone.' — Dante's final instruction to Whisper about the composite leg. This is the most precisely wrong framing of the problem he has made in eighteen chapters. The squeak is not a mechanical defect. It is the composite's structural integrity signal — the sound the Island's maintenance material produces when it registers load-bearing stress at the junction between the composite and the biological tissue. It is the composite reporting that the junction is performing correctly. Suppressing it is equivalent to removing the oil-pressure warning light from an engine: the silence will be more comfortable and the problem will arrive without announcement. An engineer who works with 'forbidden mechanics' will not be able to make this sound stop without either removing the composite or permanently damaging the junction. Dante does not know this yet.",ru:"«Я хочу чтобы скрип исчез». — Последняя инструкция Данте Шепоту о ноге с композитом. Это наиболее точно неверное оформление проблемы которое он сделал за восемнадцать глав. Скрип — не механический дефект. Это сигнал структурной целостности композита — звук который производит технический материал Острова когда регистрирует несущую нагрузку на соединении между композитом и биологической тканью. Это отчёт композита о том что соединение работает правильно. Подавление этого эквивалентно удалению предупреждающего индикатора давления масла из двигателя: тишина будет более комфортной и проблема прибудет без объявления. Инженер работающий с «запрещённой механикой» не сможет заставить этот звук прекратиться без удаления композита или необратимого повреждения соединения. Данте пока не знает этого."},
  {id:"TET-147",en:"The cane tap on the harbor cobblestones as Dante descended the gangway. He noted it. He has been noting the acoustic register of the cane across seventeen chapters of different surfaces: pier planking, stone, marble, Citadel corridor, Valeria's garden, the Island's black metal. Now: harbor cobblestone, with the composite leg providing a second, heavier register on the left side. The catalogue is no longer a single instrument's record. It is a duet. He has not noted that the catalogue has changed category. He has not examined what he is cataloguing or why.",ru:"Стук трости по портовой брусчатке когда Данте спускался по трапу. Он отметил это. Он семнадцать глав отмечает акустический регистр трости на разных поверхностях: доски причала, камень, мрамор, коридор Цитадели, сад Валерии, чёрный металл Острова. Теперь: портовая брусчатка, с ногой с композитом обеспечивающей второй, более тяжёлый регистр слева. Каталог больше не является записью одного инструмента. Это дуэт. Он не отметил что каталог сменил категорию. Он не исследовал что каталогизирует и почему."},
  {id:"TET-148",en:"Whisper's final observation of the return: standing on the pier after Dante entered the carriage, he remained in position for four additional minutes. He did not move to follow. He was not waiting for instructions. He was doing what he did at Pier 42 after Sector 13, and outside Dante's cabin door on the voyage, and at the Siren's glass, and outside the Island entry point. He was standing in the place where something had happened, after the person who made it happen had moved on. He filed this as: 'standard post-operation site debrief position, four minutes, no anomalies.' The filing was false in its category. He has filed a false category. He has not noted that he did this.",ru:"Последнее наблюдение Шепота при возвращении: стоя на причале после того как Данте вошёл в карету, он оставался в позиции ещё четыре дополнительные минуты. Он не двинулся следовать. Он не ждал инструкций. Он делал то что делал на Пирсе 42 после Сектора 13, и у двери каюты Данте в плавании, и у стекла Сирены, и у входной точки Острова. Он стоял в месте где что-то произошло, после того как человек сделавший это произойти двинулся дальше. Он занёс это как: «стандартная послеоперационная позиция дебрифинга на месте, четыре минуты, нет аномалий». Запись была неверной в категории. Он занёс неверную категорию. Он не отметил что сделал это."}
];

const SCENES=[
{id:"s1",
 title:{en:"Thunder on the Pier",ru:"Гром на Пирсе"},
 subtitle:{en:"Hostile takeover: be the best offer when the previous offer just died.",ru:"Рейдерский захват: быть лучшим предложением когда предыдущее только что умерло."},
 location:{en:"Capital Harbor — Pier One",ru:"Гавань Столицы — Первый Пирс"},
 timing:{en:"Morning, Day of Return",ru:"Утро, День Возвращения"},
 flags:["arc_open","social_combat","return"],
 povData:{
   dante:{distortion:2,
     text:{
       en:`The harbor smelled of salt and institutional anxiety. The Golden Circle's welcome party was visible from the Leviathan's deck before we docked: Vane in his powdered wig, the bailiff with his warrant case, two squads of Scarlet Fist mercenaries in formation behind them. They had brought chains. They were expecting a navigator returning alone from a failed expedition, without legal standing, without a ship, without institutional backing.\n\nThey were expecting the version of me that left.\n\nThe version that returned came down the gangway with forty-three surviving crew members behind me, a four-hundred-ton flagmere class vessel fully operational at my back, and a salvage claim filed with three harbor notaries before the Leviathan's keel had finished grounding.\n\nI descended carefully. The composite leg does not handle gangway angles naturally — the load-distribution profile reads inclined surfaces differently from horizontal ones, and I had not yet learned to correct for this. The result was a specific quality of step that I will characterize as: functional but graceless. I hate this. I hate it not because it hurts — it does not hurt, the nerve pathways at the junction are no longer standard biological — but because it sounds wrong. Professionals are supposed to move through space without announcing themselves. The composite announces itself on every surface it contacts.\n\nI noted the harbor cobblestones as I stepped off the gangway. Different from the pier's planking, different from the Leviathan's deck. The composite produces a different resonance on granite than on timber. The cane produced its own register on top of that. The sound profile is now a duet where it was a solo. I noted this without examining it.\n\nVane began shouting before I had fully cleared the gangway. This was a tactical error on his part: shouting first establishes emotional register before legal standing. I allowed him to complete the charge list — piracy, murder, theft of vessel — before responding.\n\nI offered the actuarial calculation. It took approximately ninety seconds.\n\nThe Scarlet Fist moved when Vane ordered them to. I did not move toward them. I moved my left foot. The composite struck the cobblestone at a load it was not designed for in an environment it was not designed for, and the null-field micro-resonance interacted with the granite's crystalline lattice in a way I had not anticipated and have not yet fully categorized. The stone shattered. Not broke — shattered, in a radius consistent with a structural disruption event rather than a mechanical impact event.\n\nI did not know it was going to do that.\n\nI processed this in approximately one second and decided not to convey uncertainty. The Scarlet Fist saw the cobblestone come apart. The Leviathan's gunports opened. Vane saw a legal position that had just become significantly less tenable.\n\nI offered him Dry Dock Five and twenty-four hours.\n\nHe took them.\n\nThe hostile takeover completed in the time it takes to walk from a gangway to a carriage.\n\nThis is how institutions are acquired. Not by force. By being the only functional offer in the room when the previous offer has just demonstrated its own volatility.\n\nSilas appeared at my elbow when the delegation retreated. He was looking at the leg.\n\nI told him not to look at the leg. I told him to process the ship. I told him nothing else.\n\nI sat in the carriage.\n\nThe headache from the donor-memory residue pulsed in the rhythm of my heartbeat.\n\nThe cane and the composite struck the carriage floor simultaneously as I settled.\n\nThe sound was different from anything in the catalogue.`,
       ru:`Гавань пахла солью и институциональной тревогой. Делегация встречи «Золотого Круга» была видна с палубы «Левиафана» до швартовки: Вайн в напудренном парике, пристав с папкой ордеров, два отряда наёмников «Алого Кулака» в строю позади. Они привезли кандалы. Они ожидали навигатора возвращающегося одного с провалившейся экспедиции, без правового статуса, без корабля, без институциональной поддержки.\n\nОни ожидали версию меня которая уехала.\n\nВерсия которая вернулась спустилась по трапу с сорока тремя выжившими членами экипажа позади, четырёхсоттонным флагманским кораблём полностью в рабочем состоянии за спиной, и претензией по спасению зарегистрированной у трёх портовых нотариусов до того как киль «Левиафана» закончил причаливание.\n\nЯ спускался осторожно. Нога с композитом не справляется с углами трапа естественно — профиль распределения нагрузки считывает наклонные поверхности иначе чем горизонтальные, и я ещё не научился поправлять для этого. Результатом было специфическое качество шага которое я охарактеризую как: функциональное но лишённое элегантности. Я ненавижу это. Ненавижу не потому что болит — не болит, нервные пути в соединении больше не являются стандартными биологическими — но потому что это звучит неправильно. Профессионалы должны двигаться в пространстве не объявляя о себе. Композит объявляет о себе на каждой поверхности с которой контактирует.\n\nЯ отметил портовую брусчатку когда сошёл с трапа. Отличается от досок причала, отличается от палубы «Левиафана». Композит производит другой резонанс на граните чем на дереве. Трость производила собственный регистр поверх этого. Звуковой профиль теперь дуэт там где был соло. Я отметил это не исследуя.\n\nВайн начал кричать до того как я полностью покинул трап. Это была тактическая ошибка с его стороны: первый крик устанавливает эмоциональный регистр прежде правового статуса. Я позволил ему завершить список обвинений — пиратство, убийство, угон судна — прежде чем ответить.\n\nЯ предложил актуарный расчёт. Это заняло приблизительно девяносто секунд.\n\n«Алый Кулак» двинулся когда Вайн приказал. Я не двинулся навстречу. Я переместил левую ногу. Композит ударил по брусчатке с нагрузкой для которой не был разработан в среде для которой не был разработан, и нулевой микрорезонанс взаимодействовал с кристаллической решёткой гранита способом которого я не предвидел и ещё не полностью категоризировал. Камень разлетелся. Не треснул — разлетелся, в радиусе согласующемся с событием структурного нарушения а не событием механического удара.\n\nЯ не знал что это так сработает.\n\nЯ обработал это приблизительно за секунду и решил не демонстрировать неопределённость. «Алый Кулак» видел как брусчатка рассыпалась. Орудийные порты «Левиафана» открылись. Вайн увидел правовую позицию ставшую значительно менее устойчивой.\n\nЯ предложил ему Сухой Док Пять и двадцать четыре часа.\n\nОн взял.\n\nРейдерский захват завершился за время ходьбы от трапа до кареты.\n\nТак приобретаются институции. Не силой. Будучи единственным функциональным предложением в комнате когда предыдущее только что продемонстрировало собственную нестабильность.\n\nСилас появился у моего локтя когда делегация отступила. Он смотрел на ногу.\n\nЯ сказал ему не смотреть на ногу. Сказал обрабатывать корабль. Больше ничего не говорил.\n\nЯ сел в карету.\n\nГоловная боль от остатка донорской памяти пульсировала в ритме сердцебиения.\n\nТрость и композит ударили по полу кареты одновременно когда я устраивался.\n\nЗвук отличался от всего в каталоге.`
     },
     knows:{en:["The composite shattered the granite in a radius consistent with structural disruption, not mechanical impact — he processed this in one second and decided not to convey uncertainty","The sound profile is now a duet: cane on the right, composite on the left, different registers on every surface. He noted this without examining it.","'I noted the harbor cobblestones. Different from the pier planking, different from the Leviathan's deck.' He has eighteen chapters of surface-cane data. He has not named what he is cataloguing."],ru:["Композит разбил гранит в радиусе согласующемся со структурным нарушением, а не механическим ударом — он обработал это за секунду и решил не демонстрировать неопределённость","Звуковой профиль теперь дуэт: трость справа, композит слева, разные регистры на каждой поверхности. Он отметил без исследования.","«Я отметил портовую брусчатку. Отличается от досок причала, от палубы Левиафана». У него восемнадцать глав данных о поверхностях-и-трости. Он не назвал что каталогизирует."]},
     misunderstands:{en:["'I did not know it was going to do that.' — He processed the composite's structural disruption effect in one second and presented it as controlled. He is presenting an uncharted capability as a deliberate demonstration. The Golden Circle will spend months attempting to replicate or counter a weapon that Dante does not understand and cannot control. He has accidentally created a deterrent from an accident.","'This is how institutions are acquired. Not by force. By being the only functional offer.' He has named the mechanism correctly. He has not noted that the mechanism required the composite's unanticipated structural disruption effect to work. Without the granite shattering, Vane's mercenaries would have moved and the legal argument would have required a different resolution. The takeover was successful because an accident looked like a demonstration."],ru:["«Я не знал что это так сработает». — Он обработал эффект структурного нарушения композита за секунду и представил как контролируемый. Он представляет неизведанную возможность как намеренную демонстрацию. «Золотой Круг» потратит месяцы пытаясь воспроизвести или противостоять оружию которое Данте не понимает и не может контролировать. Он случайно создал сдерживающий фактор из случайности.","«Так приобретаются институции. Не силой. Будучи единственным функциональным предложением». Он правильно назвал механизм. Он не отметил что механизм потребовал непредвиденного эффекта структурного нарушения композита чтобы сработать. Без рассыпания гранита наёмники Вайна двинулись бы и юридический аргумент потребовал бы другого разрешения. Захват был успешным потому что случайность выглядела как демонстрация."]},
     hides:{en:["'I hate it because it sounds wrong.' He has given one reason for hating the composite. The complete reason is in the observation two paragraphs later: the sound profile is now a duet where it was a solo. The acoustic catalogue he has been maintaining across eighteen chapters — the thing he has been noting without examining — is no longer the record he has been keeping. He lost the record. He has not said this.","The cane and the composite struck the carriage floor simultaneously. He noted that the sound was different from anything in the catalogue. He has not noted that this is the first time the catalogue entry required two instruments. He has not asked what the two-instrument record is a record of.","'The hostile takeover completed in the time it takes to walk from a gangway to a carriage.' He has filed this as an operational success summary. He has not filed that the success depended on an effect he did not know the composite would produce. He decided not to convey uncertainty in public. He has carried the uncertainty into the carriage."],ru:["«Я ненавижу это потому что это звучит неправильно». Он дал одну причину ненависти к композиту. Полная причина в наблюдении двумя абзацами позже: звуковой профиль теперь дуэт там где был соло. Акустический каталог который он поддерживал восемнадцать глав — вещь которую отмечал не исследуя — больше не та запись которую вёл. Он потерял запись. Он не сказал этого.","Трость и композит ударили по полу кареты одновременно. Он отметил что звук отличался от всего в каталоге. Он не отметил что это первый раз когда запись в каталоге потребовала двух инструментов. Он не спросил записью чего является двухинструментальная запись.","«Рейдерский захват завершился за время ходьбы от трапа до кареты». Он занёс это как краткое операционное резюме. Он не занёс что успех зависел от эффекта который он не знал что композит произведёт. Он решил не демонстрировать неопределённость публично. Он перенёс неопределённость в карету."]},
     whisper:{en:"The stone shattered and he didn't know it would. He presented it as deliberate. The takeover succeeded on an accident that looked like a demonstration. He carried the uncertainty into the carriage. The sound is now a duet.",ru:"Камень разлетелся, и он не знал что так будет. Он представил как намеренное. Захват удался из-за случайности выглядевшей как демонстрация. Он перенёс неопределённость в карету. Звук теперь дуэт."}
   },
   silas:{distortion:3,
     text:{
       en:`The Leviathan docked at six forty-two in the morning. I was on the pier at six thirty-five.\n\nI have been the Guild's treasurer for eleven years. In that time I have managed the financial architecture of operations I was not briefed on, processed disbursements for personnel I was not permitted to know, and maintained quarterly payments to an entity I still cannot identify at a location I still cannot map. I have never asked. This is the arrangement.\n\nThe arrangement was suspended when the Master returned from the Island of Silence with a left leg that does not belong to him.\n\nI want to be precise about what I saw: I saw him descend the gangway favoring the left leg in a specific way — not the limp from the Chronmancer operation, which was load-avoidance on an injured joint, but a deliberate weight-transfer that seemed to be managing a load-bearing differential rather than pain. The sap through the torn boot was not organic. I have been a treasurer long enough to know what different metals sound like when they hit stone. What I heard when he stepped onto the cobblestones was not bone. It was not alloy. It was something I do not have a reference for in any catalogue.\n\nThen the stone shattered.\n\nThe radius was approximately half a meter. The depth of the impression was three to four centimeters into solid granite. The Scarlet Fist mercenaries — professional soldiers, not given to theatrical response — took three steps back in unison. Their commander's hand moved to his sword and then stopped. He made an assessment in real time and the assessment was: not worth it.\n\nThe Master completed the legal argument. He offered Dry Dock Five. Vane accepted.\n\nI have spent three weeks reviewing the Site Seven payment structure. The payment has been routed through seven different intermediaries, all of which are shell constructions that lead to a single end-point I cannot access. The access credentials required are: navigation-class security clearance, modified with what appears to be a pre-standard cryptographic key. The modification predates the Guild's current cipher system by approximately twenty years. It also predates the Master's appointment by approximately one year.\n\nThe Site Seven payment recipient knew who was going to be Auditor before the Auditor appointment was made.\n\nI have been skimming 0.3% from the Site Seven payment for six years. The Site Seven payment structure matches the pattern of my own skimming route in three of seven routing nodes.\n\nI have four hours before the Master's review system flags my Site Seven analysis.\n\nI watched him get into the carriage. I watched the metal of the leg catch the light as he folded himself in. He told me to process the ship and say nothing about what I had seen.\n\nI am going to process the ship.\n\nThe rest requires more thought than four hours allows.`,
       ru:`«Левиафан» пришвартовался в шесть сорок два утра. Я был на причале в шесть тридцать пять.\n\nЯ одиннадцать лет казначей Гильдии. За это время я управлял финансовой архитектурой операций о которых меня не брифировали, обрабатывал выплаты персоналу который мне не было позволено знать, и поддерживал квартальные платежи структуре которую я всё ещё не могу идентифицировать в месте которое я всё ещё не могу нанести на карту. Я никогда не спрашивал. Такова договорённость.\n\nДоговорённость была приостановлена когда Мастер вернулся с Острова Тишины с левой ногой которая ему не принадлежит.\n\nЯ хочу быть точным в том что видел: я видел как он спускается по трапу щадя левую ногу специфическим образом — не хромота от операции с Хрономантом, которая была избеганием нагрузки на поврежденный сустав, а намеренным переносом веса управляющим нагрузочным дифференциалом а не болью. Синева через разрез сапога не была органической. Я достаточно долго казначей чтобы знать как звучат разные металлы ударяя о камень. То что я услышал когда он ступил на брусчатку — не кость. Не сплав. Что-то для чего у меня нет ссылки ни в одном каталоге.\n\nПотом камень разлетелся.\n\nРадиус был приблизительно полметра. Глубина отпечатка — три-четыре сантиметра в твёрдый гранит. Наёмники «Алого Кулака» — профессиональные солдаты, не склонные к театральным реакциям — сделали три шага назад в унисон. Рука их командира потянулась к мечу и остановилась. Он сделал оценку в реальном времени и оценка была: не стоит того.\n\nМастер завершил юридический аргумент. Он предложил Сухой Док Пять. Вайн принял.\n\nЯ провёл три недели изучая структуру платежей «Объекта Семь». Платёж был направлен через семь разных посредников, все из которых являются оболочечными конструкциями ведущими к единственной конечной точке к которой я не могу получить доступ. Требуемые учётные данные: допуск безопасности навигационного класса, изменённый тем что выглядит как до-стандартный криптографический ключ. Изменение предшествует нынешней шифровальной системе Гильдии приблизительно на двадцать лет. Оно также предшествует назначению Мастера приблизительно на один год.\n\nПолучатель платежей «Объекта Семь» знал кто будет Аудитором до того как было сделано назначение Аудитора.\n\nЯ снимал 0,3% с платежей «Объекта Семь» шесть лет. Структура платежа «Объекта Семь» совпадает с паттерном моего собственного маршрута снятия в трёх из семи узлов маршрутизации.\n\nУ меня четыре часа до того как система проверки Мастера пометит мой анализ «Объекта Семь».\n\nЯ наблюдал как он садится в карету. Наблюдал как металл ноги поймал свет пока он складывался. Он сказал мне обрабатывать корабль и ничего не говорить о том что я видел.\n\nЯ собираюсь обрабатывать корабль.\n\nОстальное требует больше размышлений чем позволяют четыре часа.`
     },
     knows:{en:["The Site Seven payment recipient knew who was going to be Auditor before the appointment was made — the cryptographic key predates both the current cipher system and Dante's appointment","His skimming route matches Site Seven in three of seven routing nodes — he has been inadvertently using the same infrastructure as the payment he processes","He has four hours before Dante's review system flags his Site Seven analysis. He has decided to process the ship. He has not decided what to do about the rest."],ru:["Получатель платежей «Объекта Семь» знал кто будет Аудитором до назначения: криптографический ключ предшествует как нынешней шифровальной системе, так и назначению Данте","Его маршрут снятия совпадает с «Объектом Семь» в трёх из семи узлов маршрутизации — он шесть лет невольно использовал ту же инфраструктуру что и обрабатываемый им платёж","У него четыре часа до того как система проверки Данте пометит анализ «Объекта Семь». Он решил обрабатывать корабль. Он не решил что делать с остальным."]},
     misunderstands:{en:["He has identified the Site Seven payment's cryptographic key as predating the Guild's current cipher system by twenty years and the Master's appointment by one year. He has not yet identified the key's origin — it is a Pale Echelon-class cipher from the predecessor's operational toolkit, placed in the Site Seven routing architecture before the predecessor departed. The Site Seven payment has been running on autopilot, maintained by the predecessor's infrastructure, feeding a destination the predecessor established. Silas is three analytical steps from this conclusion. He has four hours.","He observed the leg catching the light. He noted 'something I have no catalogue reference for.' In eleven years of institutional observation his behavioural anomaly log has been the most granular record of the Auditor's external state. This is the first entry for which he has no category at all — not an anomaly to be cross-referenced, but a new primary datum."],ru:["Он определил что криптографический ключ платежа «Объекта Семь» предшествует нынешней шифровальной системе Гильдии на двадцать лет и назначению Мастера на год. Он ещё не определил происхождение ключа — это шифр класса Бледного Эшелона из операционного инструментария предшественника, помещённый в архитектуру маршрутизации «Объекта Семь» до отбытия предшественника. Платёж «Объекта Семь» работал на автопилоте, поддерживаемый инфраструктурой предшественника, питая пункт назначения установленный предшественником. Силас в трёх аналитических шагах от этого вывода. У него четыре часа.","Он наблюдал как нога поймала свет. Он отметил «нечто для чего нет ссылки в каталоге». За одиннадцать лет институционального наблюдения его журнал поведенческих аномалий был наиболее детальной записью внешнего состояния Аудитора. Это первая запись для которой у него нет категории вообще — не аномалия для перекрёстного референса, а новый первичный факт."]},
     hides:{en:["He has been skimming from Site Seven for six years. His route matches Site Seven in three nodes. He has not yet asked whether the matching means the Site Seven recipient knows about the skimming, or whether the matching is coincidental infrastructure overlap. These are different scenarios with different implications for his safety.","'The rest requires more thought than four hours allows.' This is the most candid internal admission in his narration. In eleven years of institutional function he has always had the mental framework to process what he saw. He is telling himself he needs more time. He may need more than time."],ru:["Он снимал с «Объекта Семь» шесть лет. Его маршрут совпадает с «Объектом Семь» в трёх узлах. Он ещё не спросил означает ли совпадение что получатель «Объекта Семь» знает о снятии, или совпадение — случайное пересечение инфраструктуры. Это разные сценарии с разными импликациями для его безопасности.","«Остальное требует больше размышлений чем позволяют четыре часа». Это наиболее откровенное внутреннее признание в его нарративе. За одиннадцать лет институциональной функции у него всегда была ментальная рамка для обработки виденного. Он говорит себе что нужно больше времени. Ему может понадобиться больше чем время."]},
     whisper:{en:"He has four hours. The skimming route matches Site Seven in three of seven nodes. The payment predates the Master's appointment. The recipient knew who would be Auditor before it was decided. He is processing the ship. He has not decided about the rest.",ru:"У него четыре часа. Маршрут снятия совпадает с «Объектом Семь» в трёх из семи узлов. Платёж предшествует назначению Мастера. Получатель знал кто будет Аудитором до решения. Он обрабатывает корабль. Об остальном не решил."}
   }
 }
},

{id:"s2",
 title:{en:"Balance of Forces",ru:"Баланс Сил"},
 subtitle:{en:"Very heavy boots. Find me an engineer who knows how to keep quiet.",ru:"Очень тяжёлые сапоги. Найди мне инженера умеющего молчать."},
 location:{en:"The Carriage — Returning to Guild Headquarters",ru:"Карета — Возвращение в Штаб-Квартиру Гильдии"},
 timing:{en:"Morning, Following the Dock",ru:"Утро, После Причала"},
 flags:["cost","identity","foreshadowing"],
 povData:{
   dante:{distortion:2,
     text:{
       en:`The carriage interior was the first enclosed space I had been in since the Island that was not actively threatening me. I noted this as a category change: transition from operational deployment to operational recovery. The two states require different resource allocations.\n\nRibs: three fractures, third through fifth on the left side. The composite's proprioceptive network gives me architectural access I did not have before. I can feel the load-bearing status of every bone in my left leg with a clarity that normal biological proprioception does not provide. The ribs are not composite-integrated — they will heal on the standard biological timeline, which is approximately six weeks for a fracture of this severity with managed rest. I will not manage rest. Estimated recovery under operational conditions: twelve weeks.\n\nThe leg: functional. The skritch on the carriage floor is a different register from the composite on stone — softer, more resonant, less disruptive. The null-field micro-resonance interacts differently with timber than with granite. I filed this difference for later analysis.\n\nWhisper appeared on the seat opposite as the carriage door closed. He was the only one who knew what I had done in the Island's technical level — who knew what the composite was, what it had replaced, and what it was now doing in my skeleton. He had carried me through the collapse using a physical capacity he had not previously demonstrated. I have not asked him about the carrying. He has not asked me about the leg. This is the forty-seventh bilateral non-disclosure.\n\nI told him I wanted the squeak gone. I told him to find an engineer who worked with forbidden mechanics and who knew how to keep quiet.\n\nI hate the sound.\n\nI hate the sound because it is not in the catalogue. In eighteen chapters of acoustic notation across every surface I have walked on, I have been building a record of the cane's sound — the predecessor's cane, walking through the predecessor's world, touching the surfaces the predecessor touched or would have touched on this approach. The composite has introduced a second voice into the record that the predecessor did not have. I am no longer tracking the predecessor's instrument.\n\nI do not know what I am tracking now.\n\nWhisper said: they are afraid. The crew on the pier. Silas. Vane's mercenaries.\n\nI said: fear is a reliable currency.\n\nThis is accurate. It is also the version I say in carriages.\n\nThe donor-memory headache pulsed.\n\nThe map in my head has nine confirmed secondary sites now, with the seventh and ninth arriving as fragments during the return voyage. Two of the secondary sites show active energy signatures consistent with repair-stasis conditions. They are not empty.\n\nI have zippers in my head to secondary sites with living Herald-class entities in them. I have an Island-composite in my skeleton that functions as both a structural repair and an uncharted weapons system. I have a flagmere-class vessel in Dry Dock Five. I have the donor-memory map to Precursor infrastructure that no other institution knows exists.\n\nAnd I have a squeak in my leg that I cannot suppress without damaging the junction.\n\nBusiness continues.\n\nThis time I mean it.\n\nI closed my eyes and let the carriage carry me home.`,
       ru:`Интерьер кареты был первым замкнутым пространством в котором я был с момента Острова которое не угрожало мне активно. Я отметил это как смену категории: переход от операционного развёртывания к операционному восстановлению. Два состояния требуют разного распределения ресурсов.\n\nРёбра: три перелома, третье-пятое слева. Проприоцептивная сеть композита даёт мне архитектурный доступ которого у меня раньше не было. Я могу чувствовать несущий статус каждой кости левой ноги с чёткостью которую обычная биологическая проприоцепция не обеспечивает. Рёбра не интегрированы с композитом — они заживут по стандартному биологическому горизонту, что составляет приблизительно шесть недель для перелома такой тяжести при управляемом отдыхе. Я не буду управлять отдыхом. Оценочное восстановление в операционных условиях: двенадцать недель.\n\nНога: функциональна. Скрип по полу кареты — другой регистр чем композит по камню: мягче, более резонансный, менее разрушительный. Нулевой микрорезонанс взаимодействует с деревом иначе чем с гранитом. Я занёс это различие для последующего анализа.\n\nШепот появился на сиденье напротив когда дверь кареты закрылась. Он был единственным кто знал что я сделал на техническом уровне Острова — кто знал что такое композит, что он заменил, и что теперь делает в моём скелете. Он нёс меня через обрушение используя физическую способность которой прежде не демонстрировал. Я не спрашивал его о несении. Он не спрашивал меня о ноге. Это сорок седьмое двустороннее нераскрытие.\n\nЯ сказал ему что хочу чтобы скрип исчез. Сказал найти инженера работающего с запрещённой механикой и умеющего молчать.\n\nЯ ненавижу этот звук.\n\nЯ ненавижу его потому что он не в каталоге. В восемнадцати главах акустических нотаций на каждой поверхности по которой я ходил, я строил запись звука трости — трости предшественника, ходящей через мир предшественника, касающейся поверхностей которых касался предшественник или коснулся бы в этом подходе. Композит ввёл второй голос в запись которого у предшественника не было. Я больше не отслеживаю инструмент предшественника.\n\nЯ не знаю что я отслеживаю теперь.\n\nШепот сказал: они в ужасе. Экипаж на причале. Силас. Наёмники Вайна.\n\nЯ сказал: страх — надёжная валюта.\n\nЭто точно. Это также версия которую я говорю в каретах.\n\nГоловная боль от донорской памяти пульсировала.\n\nКарта в голове теперь имеет девять подтверждённых вторичных мест, с седьмым и девятым прибывшими как фрагменты в обратном плавании. Два вторичных места показывают активные сигнатуры энергии согласующиеся с условиями восстановительного стазиса. Они не пустые.\n\nУ меня в голове маршруты ко вторичным местам с живыми сущностями класса Вестников в них. У меня островной композит в скелете функционирующий как структурный ремонт и неизведанная система вооружения. У меня флагманский корабль в Сухом Доке Пять. У меня карта из донорской памяти к инфраструктуре Предтечей о существовании которой не знает ни одна другая институция.\n\nИ у меня скрип в ноге который я не могу подавить не повредив соединение.\n\nБизнес продолжается.\n\nНа этот раз я имею в виду.\n\nЯ закрыл глаза и позволил карете нести меня домой.`
     },
     knows:{en:["The 47th bilateral non-disclosure: he did not ask about the carrying, Whisper did not ask about the leg","The composite has introduced a second voice into the acoustic catalogue — he is no longer tracking the predecessor's instrument. 'I do not know what I am tracking now.'","Two of the nine confirmed secondary sites show active energy signatures consistent with repair-stasis — they are not empty. He has maps to living Herald-class entities."],ru:["47-е двустороннее нераскрытие: он не спросил о несении, Шепот не спросил о ноге","Композит ввёл второй голос в акустический каталог — он больше не отслеживает инструмент предшественника. «Я не знаю что отслеживаю теперь».","Два из девяти подтверждённых вторичных мест показывают активные сигнатуры энергии согласующиеся с восстановительным стазисом — они не пустые. У него маршруты к живым сущностям класса Вестников."]},
     misunderstands:{en:["'I hate the sound because it is not in the catalogue.' He has identified the problem as: the composite is not in his acoustic record of the predecessor's instrument. He has not identified that the acoustic catalogue was never just a record of surfaces — it was a record of following the predecessor's path, touching what the predecessor touched, tracking the ghost of who came before him. The composite has ended the ghost-tracking. He is now making a record of himself. He does not know this yet.","'I want the squeak gone.' He has asked Whisper to find an engineer to eliminate the composite's integrity signal. He has been moving toward the Covenant document with every chapter. The composite's structural integrity signal is the composite reporting that the junction is holding. He is about to ask someone to silence the report."],ru:["«Я ненавижу звук потому что он не в каталоге». Он определил проблему как: композит не в его акустической записи инструмента предшественника. Он не определил что акустический каталог никогда не был просто записью поверхностей — это была запись следования по пути предшественника, касания того чего касался предшественник, отслеживания призрака того кто пришёл до него. Композит завершил отслеживание призрака. Теперь он делает запись о себе. Он пока не знает этого.","«Я хочу чтобы скрип исчез». Он попросил Шепота найти инженера убрать сигнал целостности композита. Он двигался к документу Завета с каждой главой. Сигнал структурной целостности композита — отчёт композита о том что соединение держится. Он собирается попросить кого-то заглушить отчёт."]},
     hides:{en:["'Fear is a reliable currency. This is also the version I say in carriages.' He named, for the first time explicitly, that there are two versions: the one he says aloud and the other one. He has implied this throughout. He has not previously named the structure so plainly. He said it in a carriage, which means he said it in private, which means he said it to Whisper. He has told Whisper there are two versions. He has not told Whisper what the second version is.","'Business continues. This time I mean it.' — He has written this in the carriage narration. In Chapter 17 he wrote it on the Leviathan for the first time meaning it. He has now written it a second time, in the first private space since the Island, with the headache pulsing and the catalogue changed and the secondary sites alive in his memory. He is verifying the meaning. The meaning is still arriving."],ru:["«Страх — надёжная валюта. Это также версия которую я говорю в каретах». Он впервые явно назвал что есть две версии: та которую говорит вслух и другая. Он подразумевал это на протяжении. Он никогда прежде не называл структуру так прямо. Он сказал это в карете, что означает в частном, что означает Шепоту. Он сказал Шепоту что есть две версии. Он не сказал Шепоту что такое вторая версия.","«Бизнес продолжается. На этот раз я имею в виду». — Он написал это в нарративе кареты. В Главе 17 он написал это на «Левиафане» впервые имея в виду. Он написал это второй раз, в первом приватном пространстве после Острова, с пульсирующей головной болью, изменённым каталогом и живыми вторичными местами в памяти. Он верифицирует значение. Значение всё ещё прибывает."]},
     whisper:{en:"He told Whisper there are two versions — what he says aloud and the other one. He did not say what the second version is. They have 47 bilateral non-disclosures. He closed his eyes and let the carriage carry him home.",ru:"Он сказал Шепоту что есть две версии — то что говорит вслух и другая. Он не сказал что такое вторая версия. У них 47 двусторонних нераскрытий. Он закрыл глаза и позволил карете нести его домой."}
   },
   whisper:{distortion:3,
     text:{
       en:`He told me to find an engineer for the squeak.\n\nI have been in this carriage before, in the same position — the seat opposite, the closed door, him leaning against the far wall with his eyes shut — after the Iron Peak operation, after the Aspherat contract, after the Chronmancer. The pattern is consistent: when an operation completes above acceptable loss threshold, he sits in the carriage with his eyes closed and says nothing until the Guild district comes into view.\n\nThis time he said two things. He said: fear is a reliable currency. He said: that's also the version I say in carriages.\n\nI have heard him say 'fear is a reliable currency' in public four times across eighteen chapters. I heard it in the carriage. The carriage version was different from the public version in a way I cannot file in standard intelligence notation — not tone, not vocabulary, not delivery speed. Something in the construction. The public version is a statement of professional truth. The carriage version was something being said because the alternative was not saying it.\n\nHe told me there are two versions. He told me this in the carriage, in private, which means he told me. He did not tell me what the second version is.\n\nI already know what the second version is. I have been reading the gap between the public version and the one he says in carriages for eleven years. The second version is the one in the file of things he does not record, and the pocket of things in transit, and the third location he has not yet named.\n\nI did not say: I already know.\n\nI said: I'll find the engineer.\n\nThe forty-seventh bilateral non-disclosure.\n\nWhen we arrived at the Guild district he went inside without looking back. I remained in the carriage for a moment, then stepped out and stood on the Guild cobblestones.\n\nFour minutes.\n\nI filed: standard post-operation site debrief position. No anomalies.\n\nBoth of those were lies. I knew they were lies when I wrote them. I filed them anyway because the true category does not exist in standard intelligence notation either.\n\nI have now filed a false category twice in one day.\n\nI will find the engineer for the squeak. I will also not tell the engineer what the squeak is, what produces it, or what will happen if they try to silence it. I will give them access to the leg and let them discover the limits themselves. This is standard compartmentalization of sensitive asset information.\n\nThis is also not something I am proud of.\n\nI am aware that I am not proud of it.\n\nThis is the forty-seventh bilateral non-disclosure. The one where I let the engineer learn the limits by finding them.\n\nI filed this under: forty-eighth.`,
       ru:`Он сказал найти инженера для скрипа.\n\nЯ бывал в этой карете прежде, в той же позиции — сиденье напротив, закрытая дверь, он прислонившийся к дальней стене с закрытыми глазами — после операции в Железном Пике, после контракта с Асфератом, после Хрономанта. Паттерн последователен: когда операция завершается выше приемлемого порога потерь, он сидит в карете с закрытыми глазами и ничего не говорит пока квартал Гильдии не появляется в поле зрения.\n\nНа этот раз он сказал две вещи. Он сказал: страх — надёжная валюта. Он сказал: это также версия которую я говорю в каретах.\n\nЯ слышал как он говорит «страх — надёжная валюта» публично четыре раза за восемнадцать глав. Я слышал это в карете. Версия кареты отличалась от публичной версии способом который я не могу занести в стандартную разведывательную нотацию — не тон, не словарный запас, не скорость подачи. Что-то в конструкции. Публичная версия — заявление профессиональной истины. Версия кареты — нечто говорящееся потому что альтернативой было не говорить.\n\nОн сказал мне что есть две версии. Сказал мне это в карете, в частном, что означает — сказал мне. Он не сказал мне что такое вторая версия.\n\nЯ уже знаю что такое вторая версия. Я одиннадцать лет читаю разрыв между публичной версией и той которую он говорит в каретах. Вторая версия — та что в файле вещей которые он не записывает, в кармане вещей в транзите, и в третьем месте которое он ещё не назвал.\n\nЯ не сказал: я уже знаю.\n\nЯ сказал: я найду инженера.\n\nСорок седьмое двустороннее нераскрытие.\n\nКогда мы прибыли в квартал Гильдии он вошёл внутрь не оглядываясь. Я остался в карете на мгновение, потом вышел и встал на брусчатке Гильдии.\n\nЧетыре минуты.\n\nЯ занёс: стандартная послеоперационная позиция дебрифинга. Нет аномалий.\n\nОбе записи были неправдой. Я знал что это неправда когда писал. Я занёс их всё равно, потому что истинная категория также не существует в стандартной разведывательной нотации.\n\nТеперь я занёс ложную категорию дважды за один день.\n\nЯ найду инженера для скрипа. Я также не расскажу инженеру что такое скрип, что его производит, или что произойдёт если он попытается его заглушить. Я дам им доступ к ноге и позволю им самим обнаружить пределы. Это стандартное разграничение информации о чувствительном активе.\n\nЭто также не то чем я горжусь.\n\nЯ осознаю что не горжусь этим.\n\nЭто сорок седьмое двустороннее нераскрытие. То где я позволяю инженеру узнать пределы их найдя.\n\nЯ занёс это под: сорок восьмым.`
     },
     knows:{en:["He already knows what the second version is — he has been reading the gap between the public version and the carriage version for eleven years. He did not say so. He said: I'll find the engineer.","He filed 'standard post-operation debrief position, no anomalies' twice in one day — both false. He knew they were false when he filed them.","He will not tell the engineer what the squeak is or what happens if they silence it. He is aware that he is not proud of this. He filed it under: forty-eighth."],ru:["Он уже знает что такое вторая версия — одиннадцать лет читает разрыв между публичной версией и версией кареты. Он не сказал. Он сказал: я найду инженера.","Он занёс «стандартная послеоперационная позиция дебрифинга, нет аномалий» дважды за один день — оба раза неправда. Он знал что неправда когда заносил.","Он не расскажет инженеру что такое скрип или что произойдёт если заглушить. Он осознаёт что не гордится этим. Он занёс под: сорок восьмым."]},
     misunderstands:{en:["'I already know what the second version is.' He is correct about the file, the pocket, and the third location. He is missing what the second version of 'fear is a reliable currency' actually is in the carriage version. He has read the gap between public and private for eleven years. He reads it as content — the things in the file and the pocket and the third location. He has not read it as form: the carriage version is not a different content. It is a different speaker. He has not examined who the person is who says things in carriages."],ru:["«Я уже знаю что такое вторая версия». Он прав насчёт файла, кармана и третьего места. Он упускает что такое на самом деле вторая версия «страха как надёжной валюты» в версии кареты. Он читает разрыв между публичным и частным одиннадцать лет. Он читает его как содержание — вещи в файле, кармане и третьем месте. Он не читал его как форму: версия кареты — не другое содержание. Это другой говорящий. Он не исследовал кто такой человек говорящий вещи в каретах."]},
     hides:{en:["He has filed two false categories in one day and noted that he is aware he is not proud of it. He has filed the awareness itself under the forty-eighth bilateral non-disclosure. He is now archiving his own ethical discomfort inside the counting system. The count is not just a record of the things between them anymore. It is also a record of the things he chooses to carry rather than say.","He stood on the Guild cobblestones for four minutes after Dante went inside. He filed it as a debrief position. He has been doing this — standing in the place where something happened, after the person moved on — at Pier 42, at the cabin door, at the Siren's glass, at the Island entry, and now here. He has filed every instance as something operational. He has not examined what the standing is for."],ru:["Он занёс две ложные категории за день и отметил что осознаёт что не гордится. Он занёс само осознание под сорок восьмым двусторонним нераскрытием. Он теперь архивирует собственный этический дискомфорт внутри системы счёта. Счёт больше не только запись вещей между ними. Это также запись вещей которые он выбирает нести а не говорить.","Он стоял на брусчатке Гильдии четыре минуты после того как Данте вошёл. Занёс как позицию дебрифинга. Он делает это — стоять в месте где что-то произошло после того как человек двинулся дальше — на Пирсе 42, у двери каюты, у стекла Сирены, у входа в Остров, и теперь здесь. Он занёс каждый случай как что-то операционное. Он не исследовал для чего стояние."]},
     whisper:{en:"He filed two false categories in one day. He archived his own discomfort under the forty-eighth. The count is now also a record of what he carries rather than says. He stood for four minutes and filed it as a debrief position. He has not examined what the standing is for.",ru:"Он занёс две ложные категории за день. Заархивировал собственный дискомфорт под сорок восьмым. Счёт теперь также запись того что несёт а не говорит. Он стоял четыре минуты и занёс как позицию дебрифинга. Он не исследовал для чего стояние."}
   }
 }
}
];

const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');c.innerHTML=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}].map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
