const TIMELINE=[
  {id:"TET-206",en:"Peter returned within forty-eight hours of Dante ordering payment for his mother's treatment — faster than Dante predicted. The gratitude-and-guilt motivational structure activated more rapidly than the standard recruitment timeline because Peter's baseline relationship with the Guild was already positive (his father Thomas is a protected contact) and his betrayal was not ideologically motivated but instrumentally motivated (he needed money). When the Guild produced a response to his betrayal that was materially beneficial to someone he cares about, the psychological cost of the betrayal became immediately legible to him as a debt. He is now the fastest-activating agent in the lower-city network. He also has the highest personal motivation to prove his reliability, because guilt without opportunity to discharge it becomes corrosive. Dante has given him the opportunity.",ru:"Питер вернулся в течение сорока восьми часов после того как Данте приказал оплату лечения его матери — быстрее чем предсказал Данте. Мотивационная структура благодарности-и-вины активировалась быстрее стандартного временного горизонта вербовки, потому что базовые отношения Питера с Гильдией уже были позитивными (его отец Томас — защищённый контакт) а его предательство было мотивировано не идеологически а инструментально (ему нужны были деньги). Когда Гильдия произвела ответ на его предательство материально выгодный для кого-то кто ему небезразлично, психологическая стоимость предательства стала немедленно читаемой для него как долг. Теперь он наиболее быстро активирующийся агент в сети нижнего города. У него также наивысшая личная мотивация доказать надёжность, потому что вина без возможности погасить её становится разрушительной. Данте дал ему возможность."},
  {id:"TET-207",en:"The composite leg's performance during the Brut confrontation confirmed two previously uncertain capabilities. First: the bio-interface's stress-filtering function extends to weapon impacts of this magnitude — a two-handed sword strike that would have severed a biological leg was absorbed and distributed without structural failure. Second: the composite's null-field resonance, when directed through the leg's active articulation during Dante's kick against Brut's blade, produced a lattice-disruption effect in the hardened steel at the contact point. The blade shattered not from mechanical force alone but from the same crystalline disruption mechanism that broke the harbor cobblestones and Torin's chain. This was the fourth confirmed use of the disruption capability. The first three were accidental. This one was intentional. He did not call it by its correct mechanism name — he called it 'activating the hydraulics.' He understood the outcome without understanding the process.",ru:"Работа ноги с композитом во время противостояния с Брутом подтвердила две ранее неопределённые возможности. Первая: функция фильтрации напряжения биоинтерфейса распространяется на удары оружием этой силы — удар двуручного меча который отрубил бы биологическую ногу был поглощён и распределён без структурного отказа. Вторая: нулевой резонанс композита, направленный через активную артикуляцию ноги во время удара Данте по клинку Брута, произвёл эффект нарушения решётки в закалённой стали в точке контакта. Клинок разлетелся не только от механической силы но и от того же механизма кристаллического нарушения что разбил портовую брусчатку и цепь Торина. Это было четвёртое подтверждённое использование возможности нарушения. Первые три были случайными. Это намеренным. Он не назвал это правильным названием механизма — он назвал это «активацией гидравлики». Он понял результат не понимая процесса."},
  {id:"TET-208",en:"'Send the rest to the factory's Throat. Bio-mass should not go to waste.' — Dante ordered the bodies of thirty-nine Scarlet Fist mercenaries processed at Object 7-B. This is the first time he has explicitly designated human remains as substrate for the facility's production loop. The facility's intake specification is categorically non-specific (TET-174 established this): any vertebrate organic matter of sufficient density is acceptable. He knew this when he designed the supply chain with the White Fang. He knew this when he looked at his people in Chapter 22 when the system's non-specificity first became clear. He did not file the sequence of events between understanding the non-specificity and choosing the vivernum in that scene. He now filed the human bodies as 'bio-mass' using the same vocabulary as the vivernum, the White Fang's hunting waste, and the wyvern carcasses. The vocabulary is the same. The referent has changed.",ru:"«Остальных — в «Глотку» Завода. Биомасса не должна пропадать». — Данте приказал переработку тел тридцати девяти наёмников «Алого Кулака» на Объекте 7-Б. Это первый раз когда он явно обозначил человеческие останки как субстрат для производственного контура объекта. Спецификация забора объекта категорически неспецифична (ТЕТ-174 установил это): любое органическое вещество позвоночных достаточной плотности приемлемо. Он знал это когда разрабатывал цепочку поставок с Белым Клыком. Он знал это когда смотрел на своих людей в Главе 22 когда неспецифичность системы впервые стала ясной. Он не занёс последовательность событий между пониманием неспецифичности и выбором виверн в той сцене. Теперь он занёс человеческие тела как «биомассу» используя тот же словарный запас что виверны, охотничьи отходы Белого Клыка и туши виверн. Словарный запас тот же. Референт изменился."},
  {id:"TET-209",en:"The economics of fear that Dante described after the battle — 'the price of mercenaries in the city will drop by half by morning' — is correct as a market prediction, but not for the reason he stated. The drop will not come from fear of Dante's capability. It will come from Vane's response. When Vane loses forty elite mercenaries in a single engagement, his institutional response will be to deploy military force rather than mercenary force — escalating beyond the mercenary market entirely. This will temporarily reduce demand for mercenaries in the capital, not because they are afraid of Dante, but because Vane is no longer their primary buyer. Dante has accurately predicted the market effect but assigned it to the wrong cause.",ru:"Экономика страха которую описал Данте после битвы — «цена на наёмников в городе упадёт вдвое к утру» — верна как рыночное предсказание, но не по причине которую он указал. Падение придёт не от страха перед возможностями Данте. Оно придёт от ответа Вейна. Когда Вейн потеряет сорок элитных наёмников в одном столкновении, его институциональный ответ будет развернуть военную силу а не наёмную — эскалируя за пределы наёмного рынка полностью. Это временно снизит спрос на наёмников в столице не потому что они боятся Данте, а потому что Вейн больше не их основной покупатель. Данте точно предсказал рыночный эффект но приписал его неверной причине."},
  {id:"TET-210",en:"The strike deal with Olin represents a different class of leverage than any previous Guild operation. Every previous lever Dante has used has been bilateral — he gives something, someone gives something in return. The dockworkers' strike is multilateral: Dante gives Olin safety guarantees and Gel-treated tools; Olin gives strike action; the strike produces market disruption; the disruption benefits any trader who is not Vane; those traders become informal Guild allies simply by operating while the strike continues. Dante has structured a situation where acting in self-interest aligns with Guild interest for an entire class of market participants who have no direct relationship with the Guild. The strike is not a single lever. It is a market structure that generates ongoing beneficial outcomes for the Guild without requiring the Guild to manage each participant.",ru:"Сделка о забастовке с Олиным представляет другой класс рычага чем любая предыдущая операция Гильдии. Каждый предыдущий рычаг использованный Данте был двусторонним — он даёт что-то, кто-то даёт что-то взамен. Забастовка докеров многосторонняя: Данте даёт Олину гарантии безопасности и инструменты обработанные Гелем; Олин даёт забастовочное действие; забастовка производит рыночный сбой; сбой выгоден любому торговцу который не является Вейном; эти торговцы становятся неформальными союзниками Гильдии просто продолжая работать пока забастовка длится. Данте структурировал ситуацию где действие в собственных интересах согласуется с интересами Гильдии для целого класса рыночных участников не имеющих прямых отношений с Гильдией. Забастовка — не единственный рычаг. Это рыночная структура генерирующая продолжающиеся благоприятные результаты для Гильдии без требования от Гильдии управления каждым участником."},
  {id:"TET-211",en:"Vane's escalation decision — calling General Arkus and the Supreme Mage, demanding the warehouse be leveled and Dante burned in the square — represents a categorical shift in his decision architecture from the Chapter 24 model. In Chapter 24, Vane recognized that he had miscategorized Dante as a financial competitor. He removed his mask, named the correct category ('raider'), and deployed the Scarlet Fist. The Scarlet Fist has now been destroyed. Vane's next escalation is military and legal rather than mercenary: he is moving to state-level force. This is the correct next step in the escalation ladder. It is also the step that crosses the line between commercial conflict and political conflict. Once Vane deploys the General and the Archmage, the conflict becomes legible to the Inquisition, the Trade Houses, and the Imperial administration as a state-level event rather than a commercial dispute. This has implications for every other institution in the capital.",ru:"Решение Вейна об эскалации — вызов Генерала Аркуса и Верховного Мага, требование сравнять склад с землёй и сжечь Данте на площади — представляет категорический сдвиг в его архитектуре решений от модели Главы 24. В Главе 24 Вейн признал что неверно категоризировал Данте как финансового конкурента. Он снял маску, назвал верную категорию («захватчик») и развернул «Алый Кулак». «Алый Кулак» теперь уничтожен. Следующая эскалация Вейна военная и правовая а не наёмная: он движется к государственной силе. Это верный следующий шаг на лестнице эскалации. Это также шаг пересекающий черту между коммерческим конфликтом и политическим конфликтом. Когда Вейн развёртывает Генерала и Верховного Мага, конфликт становится читаемым Инквизиции, Торговым Домам и Имперской администрации как событие государственного уровня а не коммерческий спор."},
  {id:"TET-212",en:"Grimm's assessment of the composite leg after the battle — 'micro-cracks in the composite, structural integrity unaffected, hermetic seal compromised' — is technically accurate at the composite level. What Grimm did not assess, because he does not have instrumentation for it: the micro-cracks in the outer composite layer are permitting a small quantity of the null-field resonance to propagate outward through the crack channels rather than being contained within the composite boundary. This means the composite's resonance signature is now slightly more legible acoustically — the cracks are acting as resonance outlets. The Order of the Silent Archive, if they have instruments positioned within detection range of Dante's gait, will have detected an increase in the composite's acoustic signature following this battle. Dante asked Grimm to add another layer of sound insulation. This will not address the resonance outlet problem.",ru:"Оценка Гримма ноги с композитом после битвы — «микротрещины в композите, структурная целостность не затронута, герметичность нарушена» — технически точна на уровне композита. Что Гримм не оценил, потому что у него нет инструментария для этого: микротрещины в внешнем слое композита позволяют небольшому количеству нулевого резонанса распространяться наружу через каналы трещин а не содержаться в границе композита. Это означает что акустическая сигнатура резонанса композита теперь немного более читаема акустически — трещины действуют как резонансные выходы. Орден Тихого Архива, если у них есть инструменты в диапазоне обнаружения походки Данте, обнаружит увеличение акустической сигнатуры композита после этой битвы."},
  {id:"TET-213",en:"The strike siren in the harbor — the final image of the chapter — is not simply economic disruption. It is the first time in twenty-six chapters that an event originating from a Guild decision has produced an autonomous public action that Dante did not personally execute. Thomas's network operated autonomously. Peter returned autonomously. Olin called the strike autonomously. The lights went out in the harbor autonomously. Dante's institution has reached the scale at which it produces effects without requiring his direct intervention in each event. He is no longer operating a network. He is operating a system. The system produces effects he planned but did not execute. He has not yet examined what it means to operate a system at this scale — whether the system can be controlled, whether it can be stopped, whether its effects are still his effects or have become the system's effects."}
];

const SCENES=[
{id:"s1",
 title:{en:"Open Doors",ru:"Открытые Двери"},
 subtitle:{en:"The enemy should feel they are overcoming resistance. This dulls vigilance.",ru:"Враг должен чувствовать что преодолевает сопротивление. Это притупляет бдительность."},
 location:{en:"Warehouse Four — Eastern Docks",ru:"Склад №4 — Восточные Доки"},
 timing:{en:"Night, Third Day of Rain",ru:"Ночь, Третий День Дождя"},
 flags:["pivotal","escalation","identity"],
 povData:{
   dante:{distortion:3,
     text:{
       en:`The warehouse's acoustic properties are better than a concert hall for what I needed them for tonight. A single kerosene lamp at the center of an empty space produces maximum contrast between the illuminated position and the dark perimeter. The illuminated person appears to be alone and exposed. The dark perimeter appears empty. Both appearances are structural features of the design, not accidents.\n\nI sat in the lamp's circle and checked my watch.\n\nThe Scarlet Fist's approach signature — heavy footsteps on wet cobblestone, the specific clank of field-plate armor, the faint ozone trace of combat mages warming their channels — was detectable through the composite leg's contact with the warehouse floor from approximately eighty meters. The iron door registered the first battering-ram impact at 23:17. Second impact at 23:18. Third impact broke the door on 23:18:40.\n\nForty seconds for forty people to break a reinforced warehouse door.\n\nNot bad. Not impressive.\n\nI noted the timing not because it mattered operationally but because it mattered informatively. An elite unit that takes forty seconds to breach a single reinforced door is an elite unit that spends energy on dramatic entry. They had come prepared for a fight and were presenting themselves as threatening before contact. This is what you do when psychological pressure is your primary weapon.\n\nMy psychological pressure started earlier.\n\nBrut's scan of the empty room. His confident diagnosis: one man, no army, easy target. His conclusion formed in approximately three seconds. I watched it form from across the room — the relaxation in the shoulder plates when he found nothing threatening, the swagger that entered his walk when he turned toward me. He was already composing his victory report.\n\nI gave him the Corridor of Decisions. Option A. Option B. I did not tell him that Option B included the grid Grimm installed this afternoon, Lisa above, Varek in the sails.\n\nHe chose Option B.\n\nWhat followed was not a battle. A battle requires two parties capable of mutual threat. This was a controlled demonstration — I needed to achieve specific outcomes: eliminate the unit, preserve one messenger, produce maximum psychological impact at minimum infrastructure cost.\n\nThe bodies.\n\nI ordered them to the factory.\n\nI said: bio-mass should not go to waste.\n\nI said this while standing in a room full of dead people I had just arranged to kill.\n\nI have filed the order and the vocabulary in the operational record.\n\nI have not filed what it is to give that order and use that vocabulary.\n\nBrut's sword struck the composite and shattered. I felt it — not as pain, not as impact, not as weight. I felt it as a frequency: the specific resonance of the null-field interacting with the crystalline structure of the blade at the contact point. The blade's lattice cancelled in the same way the harbor cobblestone cancelled in Chapter 18, the chain in Chapter 20, the wyvern in Chapter 21. I called it activating the hydraulics. The hydraulics have nothing to do with it.\n\nI know this and said the other thing.\n\nThe messenger went. I stood in the room while Varek began sorting and thought about nothing.\n\nThen I called for a cab and went to dinner.\n\nBusiness continues.`,
       ru:`Акустические свойства склада лучше чем у концертного зала для того для чего они мне были нужны сегодня ночью. Единственная керосиновая лампа в центре пустого пространства производит максимальный контраст между освещённой позицией и тёмным периметром. Освещённый человек кажется одиноким и уязвимым. Тёмный периметр кажется пустым. Оба впечатления — структурные особенности дизайна, не случайности.\n\nЯ сидел в круге лампы и проверял часы.\n\nСигнатура приближения «Алого Кулака» — тяжёлые шаги по мокрой брусчатке, специфический лязг полевых пластинчатых доспехов, слабый озоновый след боевых магов прогревающих каналы — была обнаружима через ногу с композитом в контакте с полом склада приблизительно с восьмидесяти метров. Железная дверь зарегистрировала первый удар тараном в 23:17. Второй удар в 23:18. Третий удар выбил дверь в 23:18:40.\n\nСорок секунд для сорока человек чтобы выбить укреплённую дверь склада.\n\nНеплохо. Не впечатляет.\n\nЯ отметил время не потому что это имело операционное значение а потому что имело информационное. Элитное подразделение берущее сорок секунд на прорыв одной укреплённой двери — элитное подразделение тратящее энергию на драматический вход. Они пришли готовыми к бою и представлялись угрожающими до контакта. Это то что делаешь когда психологическое давление — твоё основное оружие.\n\nМоё психологическое давление началось раньше.\n\nСканирование Брутом пустой комнаты. Его уверенный диагноз: один человек, нет армии, лёгкая цель. Его вывод сформировался приблизительно за три секунды. Я наблюдал как он формируется через комнату — расслабление в наплечных пластинах когда он ничего угрожающего не нашёл, самодовольство вошедшее в его походку когда он повернулся ко мне. Он уже составлял отчёт о победе.\n\nЯ дал ему Коридор Решений. Вариант А. Вариант Б. Я не сказал ему что Вариант Б включал решётку которую Гримм установил сегодня днём, Лису наверху, Варека в парусах.\n\nОн выбрал Вариант Б.\n\nЧто последовало — не битва. Битва требует двух сторон способных к взаимной угрозе. Это была контролируемая демонстрация — мне нужно было достичь конкретных результатов: уничтожить подразделение, сохранить одного гонца, произвести максимальный психологический эффект при минимальных инфраструктурных затратах.\n\nТела.\n\nЯ приказал их на завод.\n\nЯ сказал: биомасса не должна пропадать.\n\nЯ сказал это стоя в комнате полной мёртвых людей которых я только что организовал убить.\n\nЯ занёс приказ и словарный запас в операционную запись.\n\nЯ не занёс каково отдать этот приказ и использовать этот словарный запас.\n\nМеч Брута ударил в композит и разлетелся. Я почувствовал это — не как боль, не как удар, не как вес. Я почувствовал это как частоту: специфический резонанс нулевого поля взаимодействующего с кристаллической структурой клинка в точке контакта. Решётка клинка отменилась так же как портовая брусчатка в Главе 18, цепь в Главе 20, виверна в Главе 21. Я назвал это активацией гидравлики. Гидравлика не имеет к этому отношения.\n\nЯ знаю это и сказал другое.\n\nГонец ушёл. Я стоял в комнате пока Варек начал сортировку и думал ни о чём.\n\nЗатем я вызвал кэб и поехал на ужин.\n\nБизнес продолжается.`
     },
     knows:{en:["The blade shattered from null-field crystalline disruption — the same mechanism as the cobblestone, chain, wyvern. He called it 'activating the hydraulics.' He knows this is wrong and said the other thing.","He felt the composite's frequency interaction with the blade at the contact point — perception through the null-field rather than through sensation. This is new.","He ordered the bodies to the factory as bio-mass. He filed the order and the vocabulary. He did not file what it is to give that order using that vocabulary."],ru:["Клинок разлетелся от нулевого кристаллического нарушения — тот же механизм что брусчатка, цепь, виверна. Он назвал «активацией гидравлики». Он знает что это неверно и сказал другое.","Он почувствовал частотное взаимодействие композита с клинком в точке контакта — восприятие через нулевое поле а не через ощущение. Это ново.","Он приказал тела на завод как биомассу. Он занёс приказ и словарный запас. Он не занёс каково отдать этот приказ используя этот словарный запас."]},
     misunderstands:{en:["He said 'I know this and said the other thing' about calling the disruption 'hydraulics.' He has documented that he used an incorrect name for a mechanism he understands. He has not examined the pattern: he used an incorrect name for the mechanism in the harbor (presented as deliberate), and the chain (presented as deliberate), and the wyvern (named by the wrong mechanism), and now this. Each time he uses the capability and names it incorrectly, he is also failing to develop an accurate vocabulary for what he is doing. He cannot pass this capability to another person or document it for later analysis because he has no accurate name for it. He has accumulated four uses of an undescribed capability and zero accurate descriptions."],ru:["Он сказал «я знаю это и сказал другое» о назывании нарушения «гидравликой». Он задокументировал что использовал неверное название механизма который понимает. Он не исследовал паттерн: он использовал неверное название механизма в гавани (представлено как намеренное), и цепи (представлено как намеренное), и виверны (названо неверным механизмом), и теперь это. Каждый раз когда он использует возможность и называет её неверно, он также не развивает точный словарный запас для того что делает. Он не может передать эту возможность другому человеку или задокументировать для последующего анализа, потому что у него нет точного названия. Он накопил четыре использования неописанной возможности и ноль точных описаний."]},
     hides:{en:["He ordered the bodies to the factory and said 'bio-mass should not go to waste.' He filed the order. He did not file what it is. In Chapter 22 he looked at his people when the facility's non-specificity became clear and chose the vivernum. He did not file that sequence. Now he has chosen human bodies and filed the order but not the choosing. The progression from vivernum to wyvern to White Fang hunting waste to enemy combatants is a progression he has not examined as a continuous line. Each step was filed as a separate operational decision. He has not connected the steps into a trajectory.","'I stood in the room while Varek began sorting and thought about nothing.' He has never before noted that he thought about nothing. In twenty-six chapters of meticulous internal observation, every moment in a significant event has produced thought. He is noting an absence of thought as a reportable condition. The absence is not an observation failure. It is a filing decision. There was something to report from that room. He chose not to."],ru:["Он приказал тела на завод и сказал «биомасса не должна пропадать». Он занёс приказ. Он не занёс что это такое. В Главе 22 он смотрел на своих людей когда неспецифичность объекта стала ясной и выбрал виверн. Он не занёс эту последовательность. Теперь он выбрал человеческие тела и занёс приказ но не выбор. Прогрессия от виверн к виверне к охотничьим отходам Белого Клыка к вражеским комбатантам — это прогрессия которую он не исследовал как непрерывную линию. Каждый шаг был занесён как отдельное операционное решение. Он не соединил шаги в траекторию.","«Я стоял в комнате пока Варек начал сортировку и думал ни о чём». Он никогда прежде не отмечал что думал ни о чём. В двадцати шести главах тщательного внутреннего наблюдения каждый момент в значительном событии производил мысль. Он отмечает отсутствие мысли как докладываемое состояние. Отсутствие — не сбой наблюдения. Это решение о занесении. Из той комнаты было что докладывать. Он выбрал не делать этого."]},
     whisper:{en:"He ordered human bodies to the factory and used the bio-mass vocabulary. He filed the order, not the choosing. He thought about nothing after. He has never done that before.",ru:"Он приказал человеческие тела на завод и использовал словарный запас биомассы. Он занёс приказ, не выбор. После думал ни о чём. Он никогда прежде этого не делал."}
   }
 }
},

{id:"s2",
 title:{en:"The Accounting of Death",ru:"Бухгалтерия Смерти"},
 subtitle:{en:"Logistics, not horror. Enemies become fuel. There is a grim but flawless harmony.",ru:"Логистика, не ужас. Враги становятся топливом. Есть мрачная но безупречная гармония."},
 location:{en:"Warehouse Four — Cleanup / Golden Anchor Restaurant",ru:"Склад №4 — Уборка / Ресторан «Золотой Якорь»"},
 timing:{en:"Same Night — One Hour Later",ru:"Та же Ночь — Час Спустя"},
 flags:["institution_build","escalation","foreshadowing"],
 povData:{
   whisper:{distortion:3,
     text:{
       en:`The warehouse cleanup took fifty-three minutes. Twenty-three of those minutes were Varek's time — he is thorough but not fast, and thoroughness is more valuable than speed in this context. The remaining thirty minutes were logistics: the barge, the barrels, the manifest documents listing 'fish offal and industrial waste' for the Dock Five receiving station.\n\nI filed this as: standard post-engagement site clearance. Time: 53 minutes. No anomalies.\n\nThis is the fourth consecutive operation I have filed as 'no anomalies' when the operational record contains things I have chosen not to categorize.\n\nThe anomalies are not in what happened. They are in how the Master narrated what happened, which is a different category of observation and one I have been tracking separately.\n\nHe said 'bio-mass should not go to waste' about the bodies. He said this with the same tone and vocabulary as every previous substrate designation. The wyvern carcasses at the bay. The White Fang's hunting waste. The factory's daily input from the sea-hunters. Each designation used the same vocabulary. The referent changed. He did not change the vocabulary.\n\nI have been tracking the composite's cascade since Chapter 21. The blood pattern: 32 minutes → 11 minutes → 4 minutes → continuous flow. Tonight, during the engagement — specifically during the moment when the blade struck the composite and the null-field disruption discharged — I observed no blood at all. Not a reduction. An absence.\n\nThis is new data. The cascade was producing continuous flow at last observation. Tonight: nothing.\n\nTwo possible explanations. First: the biological tissue at the composite boundary has been sufficiently replaced that the micro-tearing signal is no longer produced — the junction no longer contains enough biological tissue to tear. Second: the null-field's active discharge during the impact event temporarily suppressed the cascade response.\n\nI do not know which explanation is correct. I do not have sufficient instrumentation to determine this from my current position.\n\nI filed it as: no blood event observed during engagement. Deviation from established pattern. Category: unclear.\n\nThe Master called for a cab forty minutes after the engagement and went to dinner. He did not mention the bodies or the bio-mass order in the cab. He reviewed his notes on Olin. He adjusted his cufflinks twice. He checked his watch once.\n\nHe did not show me the dinner preparation notes. He usually shows me the dinner preparation notes.\n\nI walked behind the cab for two blocks before taking a parallel route. The stride was clean. The composite produced no audible signal.\n\nI filed that also.\n\nAt the restaurant, Olin agreed to the strike in eleven minutes. The Master did not eat.\n\nHe never eats when he is conducting something that he has not yet examined.\n\nI have now filed forty-nine bilateral non-disclosures.\n\nI am running out of things that can be filed.`,
       ru:`Уборка склада заняла пятьдесят три минуты. Двадцать три из этих минут — время Варека: он тщателен но не быстр, а тщательность более ценна чем скорость в этом контексте. Оставшиеся тридцать минут — логистика: баржа, бочки, документы манифеста перечисляющие «рыбные потроха и промышленные отходы» для пункта приёма Пирса Пять.\n\nЯ занёс это как: стандартная послеоперационная очистка места. Время: 53 минуты. Нет аномалий.\n\nЭто четвёртая последовательная операция которую я занёс как «нет аномалий» когда операционная запись содержит вещи которые я выбрал не категоризировать.\n\nАномалии не в том что произошло. Они в том как Мастер описал что произошло, что является другой категорией наблюдения и которую я отслеживаю отдельно.\n\nОн сказал «биомасса не должна пропадать» о телах. Он сказал это с тем же тоном и словарным запасом что и каждое предыдущее обозначение субстрата. Туши виверн в бухте. Охотничьи отходы Белого Клыка. Ежедневный ввод объекта от морских охотников. Каждое обозначение использовало тот же словарный запас. Референт изменился. Он не изменил словарный запас.\n\nЯ отслеживаю каскад композита с Главы 21. Паттерн крови: 32 минуты → 11 минут → 4 минуты → непрерывный поток. Сегодня ночью, во время столкновения — конкретно в момент когда клинок ударил в композит и разрядилось нулевое нарушение — я не наблюдал крови вообще. Не снижение. Отсутствие.\n\nЭто новые данные. Каскад производил непрерывный поток при последнем наблюдении. Сегодня ночью: ничего.\n\nДва возможных объяснения. Первое: биологическая ткань на границе композита была достаточно замещена что сигнал микроразрыва больше не производится — граница больше не содержит достаточно биологической ткани чтобы рваться. Второе: активный разряд нулевого поля во время события удара временно подавил ответ каскада.\n\nЯ не знаю какое объяснение верно. У меня недостаточно инструментария чтобы определить это с моей нынешней позиции.\n\nЯ занёс как: нет события крови наблюдённого во время столкновения. Отклонение от установленного паттерна. Категория: неясно.\n\nМастер вызвал кэб через сорок минут после столкновения и поехал на ужин. Он не упомянул тела или приказ о биомассе в кэбе. Он просматривал заметки об Олине. Он дважды поправил запонки. Один раз проверил часы.\n\nОн не показал мне заметки о подготовке к ужину. Обычно он показывает мне заметки о подготовке к ужину.\n\nЯ шёл за кэбом два квартала прежде чем взял параллельный маршрут. Шаг был чистым. Композит не производил слышимого сигнала.\n\nЯ занёс и это.\n\nВ ресторане Олин согласился на забастовку за одиннадцать минут. Мастер не ел.\n\nОн никогда не ест когда проводит что-то что ещё не исследовал.\n\nЯ теперь занёс сорок девять двусторонних нераскрытий.\n\nЯ заканчиваю вещи которые можно занести.`
     },
     knows:{en:["No blood event during the engagement — complete absence, not reduction. Two possible explanations: enough biological tissue at the composite boundary has been replaced that micro-tearing no longer occurs; or the active null-field discharge suppressed the cascade. He cannot determine which from his current position.","He did not show Whisper the dinner preparation notes. 'He never eats when he is conducting something he has not yet examined.'","Forty-nine bilateral non-disclosures. 'I am running out of things that can be filed.'"],ru:["Нет события крови во время столкновения — полное отсутствие, не снижение. Два возможных объяснения: достаточно биологической ткани на границе композита замещено что микроразрыв больше не происходит; или активный разряд нулевого поля подавил каскад. Он не может определить какое с нынешней позиции.","Он не показал Шепоту заметки о подготовке к ужину. «Он никогда не ест когда проводит что-то что ещё не исследовал».","Сорок девять двусторонних нераскрытий. «Я заканчиваю вещи которые можно занести»."]},
     misunderstands:{en:["He is tracking two parallel phenomena: the bio-mass vocabulary shift and the blood absence. He has not yet connected them. They are the same phenomenon from two angles: the bio-mass vocabulary shift is Dante's external narration of what is happening to the facility's substrate. The blood absence is the internal signal that his own biological tissue has been sufficiently replaced that the junction micro-tearing no longer produces blood. He is watching Dante convert other people into substrate while the same process continues in Dante. He has not said this in any of his forty-nine non-disclosures."],ru:["Он отслеживает два параллельных явления: сдвиг словарного запаса биомассы и отсутствие крови. Он ещё не соединил их. Это одно явление с двух углов: сдвиг словарного запаса биомассы — внешнее описание Данте того что происходит с субстратом объекта. Отсутствие крови — внутренний сигнал того что его собственная биологическая ткань была достаточно замещена что микроразрыв граница больше не производит кровь. Он наблюдает как Данте конвертирует других людей в субстрат пока тот же процесс продолжается в Данте. Он не сказал этого ни в одном из сорока девяти нераскрытий."]},
     hides:{en:["'I am running out of things that can be filed.' He has said this as a statement about the volume of non-disclosures. It is also a statement about what the filing categories can contain. He has been filing bilateral non-disclosures for eleven years because the filing system accommodates them — there is a location for things between them that do not belong in the operational record. He is approaching the limit of what the bilateral non-disclosure category can hold. The things that are accumulating are not getting smaller. The category is getting full. He has not named what happens after the category is full."],ru:["«Я заканчиваю вещи которые можно занести». Он сказал это как заявление об объёме нераскрытий. Это также заявление о том что могут содержать категории занесения. Он заносил двусторонние нераскрытия одиннадцать лет потому что система занесения их вмещает — есть место для вещей между ними не принадлежащих в операционную запись. Он приближается к пределу того что категория двустороннего нераскрытия может удержать. Вещи которые накапливаются не становятся меньше. Категория заполняется. Он не назвал что происходит когда категория полна."]},
     whisper:{en:"No blood during the active null-field discharge. 'Unclear' filed. He is running out of things that can be filed. The category is full. He has not named what happens after.",ru:"Нет крови во время активного разряда нулевого поля. Занесено «неясно». Он заканчивает вещи которые можно занести. Категория полна. Он не назвал что происходит после."}
   },
   vane:{distortion:7,
     text:{
       en:`I have held the Lord-Director position for fourteen years.\n\nIn fourteen years I have managed trade conflicts, regulatory disputes, political realignments, one attempted coup, three assassination attempts, and two institutional crises. I have survived each of these through the same mechanism: identifying the correct category of threat and applying the appropriate institutional response.\n\nI have been failing to identify the correct category of threat for six weeks.\n\nBrut came through the door and I could see, from the specific way he moved — hunched, bleeding, carrying the Guild card in his hand like it had weight — that the forty best mercenaries money could buy had been processed in approximately five minutes in a warehouse on the eastern docks. By one man. Surrounded by monsters.\n\nI kicked him. I fired him. I started calling for the General and the Archmage. I said: burn the warehouse, burn the cripple, burn everything.\n\nThis is what I do when I have run out of correct categorical responses. I escalate to the next available institutional resource. The General and the Archmage are the next resources in the escalation ladder.\n\nBut I was still talking when the lights went out in the harbor.\n\nI know what a strike siren sounds like. I have been on the other side of strikes before — suppressing them, breaking them, buying out the union leadership. I know the specific sound of a siren that means five thousand workers have simultaneously decided not to load your ships.\n\nHe must have been in the restaurant signing Olin while Brut was still bleeding on my carpet.\n\nThis is the correct observation. He was doing two things simultaneously, at opposite ends of the city, while I was still processing the first thing.\n\nThe General. The Archmage. Yes. I will burn the warehouse. I will suppress the strike. I will recapture the dock infrastructure.\n\nBut I noticed something when Brut handed me the card.\n\nThe card was warm.\n\nNot from Brut's body heat. Brut's hands were cold — he was in shock. The card was warm with the specific warmth of something that has been in contact with the composite material. The same warmth as the sphere he sent me last week.\n\nHe gave the card to Brut. Brut held it for an hour in the cold rain.\n\nThe card was still warm.\n\nI burned it. The green flame was the card's alchemical anti-duplication treatment, standard Guild issue. But I noticed the warmth before the flame.\n\nI did not tell anyone about the warmth.\n\nI am beginning to understand that there is a category of this threat I have not yet named.`,
       ru:`Я занимаю позицию Лорд-Директора четырнадцать лет.\n\nЗа четырнадцать лет я управлял торговыми конфликтами, регуляторными спорами, политическими перестройками, одной попыткой переворота, тремя покушениями и двумя институциональными кризисами. Я пережил каждый из них через тот же механизм: определение верной категории угрозы и применение надлежащего институционального ответа.\n\nЯ шесть недель не могу определить верную категорию угрозы.\n\nБрут вошёл в дверь и я мог видеть по специфическому способу движения — ссутулившийся, истекающий кровью, несущий карточку Гильдии в руке как будто она имела вес — что сорок лучших наёмников за которых можно купить деньги были обработаны приблизительно за пять минут на складе в восточных доках. Одним человеком. В окружении монстров.\n\nЯ пнул его. Я уволил его. Я начал звонить Генералу и Верховному Магу. Я сказал: сжечь склад, сжечь калеку, сжечь всё.\n\nЭто то что я делаю когда исчерпал верные категориальные ответы. Я эскалирую к следующему доступному институциональному ресурсу. Генерал и Верховный Маг — следующие ресурсы на лестнице эскалации.\n\nНо я ещё говорил когда погасли огни в гавани.\n\nЯ знаю как звучит сирена забастовки. Я был по другую сторону забастовок прежде — подавлял их, ломал, скупал руководство профсоюза. Я знаю специфический звук сирены означающей что пять тысяч рабочих одновременно решили не разгружать ваши корабли.\n\nОн должно быть был в ресторане подписывая Олина пока Брут ещё истекал кровью на моём ковре.\n\nЭто верное наблюдение. Он делал две вещи одновременно, на противоположных концах города, пока я ещё обрабатывал первую вещь.\n\nГенерал. Верховный Маг. Да. Я сожгу склад. Я подавлю забастовку. Я верну контроль над доковой инфраструктурой.\n\nНо я заметил кое-что когда Брут протянул мне карточку.\n\nКарточка была тёплой.\n\nНе от тепла тела Брута. Руки Брута были холодными — он был в шоке. Карточка была тёплой специфическим теплом чего-то находившегося в контакте с композитным материалом. Тем же теплом что сфера которую он прислал мне на прошлой неделе.\n\nОн дал карточку Бруту. Брут держал её час под холодным дождём.\n\nКарточка была ещё тёплой.\n\nЯ сжёг её. Зелёное пламя было алхимической обработкой карточки против дублирования, стандартный выпуск Гильдии. Но я заметил тепло до пламени.\n\nЯ не говорил никому о тепле.\n\nЯ начинаю понимать что есть категория этой угрозы которую я ещё не назвал.`
     },
     knows:{en:["He identified that Dante was signing Olin while Brut was still bleeding on his carpet — 'he was doing two things simultaneously while I was still processing the first one.'","The card was warm — the specific warmth of contact with the composite material, same as the sphere. It was warm after an hour in cold rain in Brut's cold hands.","He did not tell anyone about the warmth. 'I am beginning to understand that there is a category of this threat I have not yet named.'"],ru:["Он определил что Данте подписывал Олина пока Брут ещё истекал кровью на его ковре — «он делал две вещи одновременно пока я ещё обрабатывал первую».","Карточка была тёплой — специфическое тепло контакта с композитным материалом, то же что у сферы. Была тёплой после часа под холодным дождём в холодных руках Брута.","Он не говорил никому о тепле. «Я начинаю понимать что есть категория этой угрозы которую я ещё не назвал»."]},
     misunderstands:{en:["He says he will burn the warehouse, suppress the strike, and recapture the dock infrastructure. He is assigning these actions to the correct institutional resources (General, Archmage). He has not modeled what happens to his position if military force used against dockers produces the wrong outcome: the dockers have legal standing as a labor organization, and using military force against a legal labor action converts the commercial conflict into a political one that the Imperial administration will have to adjudicate. He is escalating in ways that produce new institutional actors with standing to intervene — and he does not control those actors."],ru:["Он говорит что сожжёт склад, подавит забастовку и вернёт контроль над доковой инфраструктурой. Он приписывает эти действия верным институциональным ресурсам (Генерал, Верховный Маг). Он не моделировал что происходит с его позицией если военная сила применённая против докеров производит неверный исход: докеры имеют правовой статус как трудовая организация, и применение военной силы против законного трудового действия конвертирует коммерческий конфликт в политический который Имперская администрация должна будет урегулировать."]},
     hides:{en:["He noticed the warmth of the card and did not tell anyone. He burned the card with its standard alchemical anti-duplication treatment. In fourteen years of threat management he has never concealed an observation from his own staff. He is concealing this one because naming it would require naming the category it belongs to, and he is 'beginning to understand' that category exists but has not yet named it. He is keeping the observation secret from himself by keeping it secret from others."],ru:["Он заметил тепло карточки и не говорил никому. Он сжёг карточку со стандартной алхимической обработкой против дублирования. За четырнадцать лет управления угрозами он никогда не скрывал наблюдение от собственного персонала. Он скрывает это, потому что называние потребовало бы назвать категорию которой оно принадлежит, и он «начинает понимать» что эта категория существует но ещё не назвал её. Он хранит наблюдение в тайне от себя скрывая его от других."]},
     whisper:{en:"The card was warm after an hour in cold rain. He noticed and told no one. He burned it. He is keeping the observation secret from himself by keeping it from others.",ru:"Карточка была тёплой после часа под холодным дождём. Он заметил и никому не сказал. Он сжёг её. Он хранит наблюдение в тайне от себя скрывая его от других."}
   }
 }
},

{id:"s3",
 title:{en:"The Strike",ru:"Забастовка"},
 subtitle:{en:"The war goes in warehouses, he thinks. We will show him the war goes in unions.",ru:"Война идёт на складах, думает он. Мы покажем ему, что война идёт в профсоюзах."},
 location:{en:"The Golden Anchor / The Harbor",ru:"«Золотой Якорь» / Гавань"},
 timing:{en:"Late Night — Strike Begins at 06:00",ru:"Поздняя Ночь — Забастовка Начинается в 06:00"},
 flags:["institution_build","escalation","foreshadowing","cost"],
 povData:{
   dante:{distortion:3,
     text:{
       en:`Olin took eleven minutes to accept the deal. The first three minutes were shock management — he had heard about Warehouse Four and needed to normalize his breathing before rational assessment was possible. The next four minutes were genuine negotiation: he pushed for Guild membership benefits for his workers, a medical fund contribution, and guaranteed access to the Gel tools for his district's other trades. I conceded the medical fund (smaller than he asked for), agreed in principle to tool access as a staged program (which I can delay indefinitely), and declined Guild membership (which would create governance complications I do not have time to manage).\n\nThe final four minutes were his acceptance. He was not afraid of the strike itself — dockworkers' unions have been striking since before the Golden Circle existed. He was afraid of what happens after a successful strike. Who fills the power vacuum. Who becomes the new authority the workers have proven they can resist.\n\nI answered that question by giving him the Gel-treated tool samples before he left the table. Not as payment. As demonstration of ongoing relationship. He walks out of this restaurant with functional evidence that the Guild delivers what it promises. That is more persuasive than any contract.\n\nThe economics of this operation:\n\nA dock strike costs the Golden Circle approximately forty thousand gold per day in container penalties, spoilage fees, and re-routing costs. At five days (minimum strike duration for the labor agreement to produce leverage), that is two hundred thousand gold. Against this, the Guild's cost is: thirty Gel-treated tools at production cost (negligible), a medical fund contribution of three thousand gold, and the Gel-tool program commitment (deferred). The labor disruption also benefits approximately twelve other trading houses who will continue operating while the Golden Circle's terminals are frozen. Several of those houses will seek Guild relationships as a consequence of this strike without being asked.\n\nI ordered nothing at dinner. I am not certain whether this is because I was not hungry or because I was not ready to sit in a restaurant and eat a meal in the normal way while thirty-nine people were en route to the factory's intake.\n\nI did not examine which reason it was.\n\nI am, as I told Thomas, still opening the foundations.\n\nValeria. Lisa. The preemptive order. The eastern wing.\n\nSilas is coming with the analysis.\n\nI have two sentences filed as later.\n\nThe strike starts at six.\n\nBusiness continues.\n\nI know what it is.\n\nI will say it when I am ready.\n\nI am not ready yet.\n\nBut I am closer.`,
       ru:`Олин взял одиннадцать минут чтобы принять сделку. Первые три минуты — управление шоком: он слышал о Складе №4 и ему нужно было нормализовать дыхание прежде чем стала возможной рациональная оценка. Следующие четыре минуты — реальные переговоры: он давил на членство в Гильдии для своих рабочих, вклад в медицинский фонд и гарантированный доступ к инструментам Геля для других профессий в его районе. Я уступил медицинский фонд (меньше чем просил), согласился в принципе на доступ к инструментам как поэтапную программу (которую я могу откладывать бесконечно), и отказал в членстве в Гильдии (что создало бы управленческие осложнения для которых у меня нет времени).\n\nПоследние четыре минуты — его принятие. Он не боялся самой забастовки — профсоюзы докеров бастуют ещё до того как существовал Золотой Круг. Он боялся того что происходит после успешной забастовки. Кто заполняет вакуум власти. Кто становится новой властью которой рабочие доказали что могут сопротивляться.\n\nЯ ответил на этот вопрос дав ему образцы инструментов обработанных Гелем до того как он покинул стол. Не как оплату. Как демонстрацию продолжающихся отношений. Он уходит из этого ресторана с функциональными свидетельствами того что Гильдия выполняет то что обещает. Это более убедительно чем любой контракт.\n\nЭкономика этой операции:\n\nДокерская забастовка обходится Золотому Кругу приблизительно в сорок тысяч золотых в день в штрафах за контейнеры, сборах за порчу и расходах на перемаршрутизацию. При пяти днях (минимальная продолжительность забастовки для трудового соглашения чтобы производить рычаг) — двести тысяч золотых. Против этого, затраты Гильдии: тридцать инструментов обработанных Гелем по производственной стоимости (ничтожно), вклад в медицинский фонд три тысячи золотых, обязательство по программе инструментов Геля (отложено). Трудовой сбой также выгоден приблизительно двенадцати другим торговым домам которые продолжат операции пока терминалы Золотого Круга заморожены. Несколько этих домов будут искать отношения с Гильдией как следствие этой забастовки без запроса.\n\nЯ ничего не заказал на ужине. Я не уверен причина ли в том что я не был голоден или в том что я не был готов сидеть в ресторане и есть обычным образом пока тридцать девять человек были в пути к забору объекта.\n\nЯ не исследовал которая причина.\n\nЯ, как сказал Томасу, всё ещё открываю фундамент.\n\nВалерия. Лиса. Превентивный приказ. Восточное крыло.\n\nСилас идёт с анализом.\n\nУ меня два предложения занесенных как позже.\n\nЗабастовка начинается в шесть.\n\nБизнес продолжается.\n\nЯ знаю что это такое.\n\nЯ скажу это когда буду готов.\n\nЯ ещё не готов.\n\nНо я ближе.`
     },
     knows:{en:["Eleven minutes to close Olin: 3 minutes shock management, 4 minutes genuine negotiation (he conceded on medical fund, agreed in principle to tool access, declined Guild membership), 4 minutes acceptance","Strike economics: 40,000 gold/day cost to Vane × 5 minimum days = 200,000 gold disruption. Guild cost: negligible. Twelve other trading houses benefit without being asked.","'I am not certain whether I did not eat because I was not hungry or because I was not ready to sit in a restaurant and eat a meal in the normal way while thirty-nine people were en route to the factory's intake. I did not examine which reason it was.'"],ru:["Одиннадцать минут чтобы закрыть Олина: 3 минуты управление шоком, 4 минуты реальные переговоры (уступил медицинский фонд, согласился в принципе на доступ к инструментам, отказал в членстве), 4 минуты принятие","Экономика забастовки: 40000 золотых/день затраты Вейна × 5 минимальных дней = 200000 золотых сбоя. Затраты Гильдии: ничтожны. Двенадцать других торговых домов выигрывают без запроса.","«Я не уверен не ел ли потому что не был голоден или потому что не был готов сидеть в ресторане и есть обычным образом пока тридцать девять человек были в пути к забору объекта. Я не исследовал которая причина»."]},
     misunderstands:{en:["He said 'I am not ready yet. But I am closer.' He is tracking his own readiness to say the business-sentence as a progress variable. He has been tracking it for three chapters — 'not in a bath,' 'when Silas arrives,' 'when I am ready.' He has not examined whether readiness is the correct framing. The sentence is not waiting for him to be ready to say it. It is waiting for him to be ready to hear what it means when he says it. Those are different thresholds. He may be closer to one and not the other."],ru:["Он сказал «я ещё не готов. Но я ближе». Он отслеживает собственную готовность сказать предложение о бизнесе как переменную прогресса. Он отслеживает это три главы — «не в ванной», «когда прибудет Силас», «когда буду готов». Он не исследовал является ли готовность правильным оформлением. Предложение не ждёт пока он будет готов его сказать. Оно ждёт пока он будет готов услышать что означает когда говорит. Это разные пороги. Он может быть ближе к одному и не к другому."]},
     hides:{en:["'I did not examine which reason it was' — whether he didn't eat from not being hungry or from the thirty-nine people en route to the factory. He has not examined it. He has named the non-examination explicitly. He has not named what it means that the non-examination is now explicit — that he is aware of the unexamined question and has chosen not to examine it in writing, in the narration, which is the space where he writes things he does not say aloud. He is not examining the question even in private. This is the first thing in twenty-six chapters he has not examined even in the space reserved for examination.","He listed: 'Valeria. Lisa. The preemptive order. The eastern wing.' as an inventory of open items. He listed these four as the things he is still opening foundations on. He did not list: the bio-mass order. The bodies en route to the factory. The vocabulary shift. He listed the items he can examine. He did not list the item he has chosen not to."],ru:["«Я не исследовал которая причина» — не ел ли из не голода или из тридцати девяти человек в пути к объекту. Он не исследовал. Он явно назвал ненисследование. Он не назвал что означает то, что ненисследование теперь явно — что он осознаёт неисследованный вопрос и выбрал не исследовать его в письменной форме, в нарративе, который является пространством где он пишет вещи которые не говорит вслух. Он не исследует вопрос даже в частном. Это первая вещь за двадцать шесть глав которую он не исследовал даже в пространстве reserved для исследования.","Он перечислил: «Валерия. Лиса. Превентивный приказ. Восточное крыло». как инвентарь открытых пунктов. Он перечислил эти четыре как вещи для которых он всё ещё открывает фундамент. Он не перечислил: приказ о биомассе. Тела в пути к объекту. Сдвиг словарного запаса. Он перечислил пункты которые может исследовать. Он не перечислил пункт который выбрал не исследовать."]},
     whisper:{en:"He did not examine which reason for not eating. He did not list the bio-mass order in his open inventory. He listed the items he can examine. He did not list the item he chose not to. This is the first thing in twenty-six chapters he has not examined even in the private space.",ru:"Он не исследовал которая причина не есть. Он не перечислил приказ о биомассе в открытом инвентаре. Он перечислил пункты которые может исследовать. Он не перечислил пункт который выбрал не исследовать. Это первая вещь за двадцать шесть глав которую он не исследовал даже в частном пространстве."}
   }
 }
}
];

const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');c.innerHTML=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}].map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
