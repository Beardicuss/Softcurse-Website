<style>

.lang-btn.active{color:var(--pov-s);border-color:var(--pov-p);background:var(--bg3);}

#narrative-text p:last-child{margin-bottom:0;}
.d3,.d4,.d5{animation:flicker-soft 14s infinite;}
.d6,.d7{animation:flicker-mid 7s infinite;}
.d8,.d9{animation:flicker-hard 4s infinite,glitch-mid 16s infinite;}
.d10{animation:flicker-hard 2s infinite,glitch-hard 8s infinite;filter:blur(.4px);}
@keyframes flicker-soft{0%,94%,100%{opacity:1;}96%{opacity:.88;}}
@keyframes flicker-mid{0%,88%,100%{opacity:1;}90%{opacity:.75;}92%{opacity:.9;}93%{opacity:.68;}94%{opacity:1;}}
@keyframes flicker-hard{0%,80%,100%{opacity:1;}82%{opacity:.6;}83%{opacity:.9;}84%{opacity:.55;}85%{opacity:.85;}86%{opacity:.7;}87%{opacity:1;}}
@keyframes glitch-mid{0%,92%,100%{transform:none;filter:none;}93%{transform:translate(-3px,0);filter:drop-shadow(3px 0 rgba(255,0,0,.3));}94%{transform:translate(3px,0);filter:drop-shadow(-3px 0 rgba(0,100,255,.2));}95%{transform:translate(-1px,1px);}96%{transform:none;}}
@keyframes glitch-hard{0%,88%,100%{transform:none;filter:none;}89%{transform:translate(-4px,0) skewX(-1deg);filter:drop-shadow(4px 0 rgba(255,0,0,.4)) saturate(2);}90%{transform:translate(4px,-1px) skewX(1deg);filter:drop-shadow(-4px 0 rgba(0,150,255,.3));}91%{transform:translate(-2px,2px);filter:brightness(.7);}92%{transform:translate(1px,-1px);}93%{transform:none;filter:none;}}
#whisper-panel{background:var(--bg2);border:1px solid var(--border);border-top:none;border-left:3px solid var(--pov-p);padding:15px 40px 17px;margin-bottom:12px;opacity:0;transform:translateY(-2px);transition:opacity 1.6s,transform 1.2s,border-left-color .7s;pointer-events:none;}

.intel-section.misunderstands .intel-section-head{color:#5a5a20;}
.intel-section.hides .intel-section-head{color:#5a2020;}
.intel-list{list-style:none;display:flex;flex-direction:column;gap:5px;}

#ledger-trigger{position:fixed;bottom:24px;right:24px;z-index:100;background:#06000a;border:1px solid #1a001a;color:#2a0028;font-family:var(--ff-mono);font-size:11px;letter-spacing:.3em;text-transform:uppercase;padding:9px 18px;cursor:pointer;transition:all .5s;}

</style>

const TIMELINE=[
  {id:"TET-29",en:"The Twins were not created as weapons. The original Guild experiment was an attempt to develop operators capable of reading Void-layer causality — precognitive structural analysts for high-uncertainty environments. The combat modifications came later, after the subjects demonstrated that Void-perception in human minds produces secondary effects that are difficult to contain and impossible to predict. The experiment produced what it produced. The Guild reclassified the file and built the collars.",ru:"Близнецы не были созданы как оружие. Оригинальный эксперимент Гильдии был попыткой разработать операторов, способных читать причинность слоя Пустоты — прекогнитивных структурных аналитиков для сред с высокой неопределённостью. Боевые модификации пришли позже, когда субъекты продемонстрировали, что Пустотное восприятие в человеческом разуме производит вторичные эффекты, которые сложно сдержать и невозможно предсказать. Эксперимент произвёл то, что произвёл. Гильдия переклассифицировала файл и создала ошейники."},
  {id:"TET-30",en:"Varek can break the collar. He has known this for fourteen months. He estimated the collar's tensile parameters on the third day of the new containment cycle and recalculated quarterly. The alloy is not as strong as the Guild believes. He has not broken it. The reason is not the threat of punishment — his pain tolerance eliminates this as an operative constraint. The reason is that he does not want to go where he has nowhere to go.",ru:"Варек может сломать ошейник. Он знает это четырнадцать месяцев. Он оценил параметры прочности ошейника на третий день нового цикла содержания и пересчитывал ежеквартально. Сплав не настолько прочен, как считает Гильдия. Он не ломал его. Причина не в угрозе наказания — его болевой порог устраняет это как операционное ограничение. Причина в том, что он не хочет идти туда, где ему некуда идти."},
  {id:"TET-31",en:"Lisa has been perceiving the entity at the Iron Peak since approximately forty kilometers out. She did not tell Dante. What she perceives is not threat-data — it is something closer to recognition. The entity at the Peak is not the same class of phenomenon as what she encounters in Void-perceiving meditation. It is larger. It is aware of her the way a deep ocean is aware of a single fish. She has not had a word for what she is perceiving. She has been trying to find one for the last two days of travel.",ru:"Лиса воспринимает сущность в Железном Пике приблизительно с сорока километров. Она не сказала Данте. То, что она воспринимает, — не данные об угрозе: это что-то ближе к узнаванию. Сущность в Пике — не того же класса явлений, что она встречает в медитации Пустотного восприятия. Она больше. Она осознаёт Лису так, как глубокий океан осознаёт одну рыбу. У неё не было слова для того, что она воспринимает. Последние два дня пути она пытается его найти."},
  {id:"TET-32",en:"The patrol encounter was not random. The entity at the Iron Peak was informed of Dante's approach before he left the capital — through the Void crystal in Morius's ivory box, which transmitted data when Dante's earring reacted to it. The patrol's positioning was deliberate. The Baron was testing Dante's assets, not attempting to stop him. The Twins' capabilities are now known to the entity inside the Peak.",ru:"Столкновение с патрулём не было случайным. Сущность в Железном Пике была уведомлена о приближении Данте ещё до того, как он покинул столицу — через кристалл Пустоты в ларце из слоновой кости Мориуса, который передал данные, когда серьга Данте отреагировала на него. Позиционирование патруля было намеренным. Барон проверял активы Данте, а не пытался остановить его. Возможности Близнецов теперь известны сущности внутри Пика."},
  {id:"TET-33",en:"The Void-infused spear wounds in Varek's back are not healing. The grey steam is a masking phenomenon — his body is producing it to cover the wound site. The Void energy from the spear tips is propagating along his skeletal structure at a rate of approximately two centimeters per hour. At current speed it will reach his core in thirty-one hours. He does not know this. Lisa knows. She has not said anything.",ru:"Раны от копий, пропитанных Пустотой, на спине Варека не заживают. Серый пар — маскирующее явление: его тело производит его, чтобы прикрыть место раны. Пустотная энергия от наконечников копий распространяется по его скелетной структуре со скоростью приблизительно два сантиметра в час. При текущей скорости она достигнет его ядра через тридцать один час. Он не знает этого. Лиса знает. Она ничего не сказала."},
  {id:"TET-34",en:"Dante's ventilation shaft map is from archive records that are nine years old. In that time, Baron Caldor — before the Void-entity contact — undertook three major renovation cycles on the Iron Peak's substructure. The shaft Dante plans to use for his solo infiltration has been converted into a primary coolant channel for the crystal-heart network. It is pressurized, superheated, and monitored. The Baron knows this map exists — it was in the stolen Church records Caldor used to find the Void contact site.",ru:"Карта вентиляционных штолен Данте из архивных записей девятилетней давности. За это время барон Кальдор — до контакта с Пустотной сущностью — провёл три крупных цикла реконструкции подструктуры Железного Пика. Штольня, которую Данте планирует использовать для одиночной инфильтрации, была переоборудована в основной охлаждающий канал для сети кристальных сердец. Она находится под давлением, перегрета и контролируется. Барон знает, что эта карта существует: она была в похищенных церковных документах, которые Кальдор использовал для поиска места контакта с Пустотой."},
  {id:"TET-35",en:"The collars contain a secondary function that Dante has not disclosed to either Twin: in addition to the pain-induction circuit, each collar carries a lethal charge that Dante can trigger remotely from a range of up to four kilometers. He has never used this function. He has also never been in a situation where the Primary Protocol would have required it. This is the first time both Twins will be operating simultaneously at maximum capacity outside containment.",ru:"Ошейники содержат вторичную функцию, которую Данте не раскрыл ни одному из Близнецов: помимо цепи болевой индукции, каждый ошейник несёт летальный заряд, который Данте может активировать дистанционно с расстояния до четырёх километров. Он никогда не использовал эту функцию. Он также никогда не был в ситуации, когда Первичный Протокол потребовал бы этого. Это первый раз, когда оба Близнеца будут работать одновременно на максимальной мощности вне изоляции."},
  {id:"TET-36",en:"The entity at the Iron Peak is not interested in the Twins. It is not particularly interested in Baron Caldor. It is interested in the earring. The entire approach, the patrol test, the architecture of the trap being constructed inside the ventilation system — it is designed for one visitor. The Twins are irrelevant to its calculation. The Baron has been told this and does not understand what it implies about his own position in the arrangement.",ru:"Сущность в Железном Пике не интересуется Близнецами. Она не особо интересуется бароном Кальдором. Её интересует серьга. Всё приближение, проверка патрулём, архитектура ловушки, строящейся внутри вентиляционной системы — всё это предназначено для одного посетителя. Близнецы нерелевантны для её расчётов. Барону было сказано об этом, и он не понимает, что это подразумевает о его собственном положении в договорённости."}
];

const SCENES=[

/* ─── SCENE 1: THE AWAKENING ─── */
{id:"s1",
 title:{en:"The Awakening",ru:"Пробуждение"},
 subtitle:{en:"You do not open this door without knowing what you owe.",ru:"Эту дверь не открывают, не зная, что ты должен."},
 location:{en:"Minus-Seventh Level, Guild Citadel",ru:"Минус Седьмой Уровень, Цитадель Гильдии"},
 timing:{en:"Pre-Dawn, Day of Departure",ru:"Перед Рассветом, День Отъезда"},
 flags:["introduction","threshold"],
 povData:{
   dante:{distortion:2,
     text:{
       en:`The Containment Protocol for level seven requires a blood key because the Guild's earliest artificers understood something that has since been forgotten by the current technical staff: you should not be able to open a door like this while wearing gloves. The moment of contact must carry the cost of what you are about to release.\n\nI have known both of them for eleven years. This is a fact that sits uncomfortably next to the operational file, which refers to them as "assets" and "subjects" and never by the names I gave them after the experiment. Lisa named herself. Varek cannot speak well enough to have done so. I gave him his.\n\nWhen the door opened Varek was already watching me. He had been awake. I do not know for how long. His eyes do not close the way human eyes close — there is no distinction between sleep and vigil for him, only degrees of engagement. He was at low engagement when I entered, which is as close to rest as he reaches.\n\nLisa dropped from the ceiling beam in one movement. She smells better than she should given the circumstances. This has always been true and I have never investigated why because some data points are not operationally relevant and remain that way through deliberate maintenance of the boundary.\n\nI gave them the protocol word: Hunt. I watched them receive it. Varek's response is always immediate and legible — the musculature change, the jaw. Lisa's response is internal. Her fingers moved on the threads before her face changed. Whatever she processes, she processes it before she shows it.\n\nThe earring was quiet during the briefing. No deception in the room. Whatever the Twins are, they are not lying to me. This is the most stable fact I operate on.\n\nI told them about the collars. I always tell them about the collars before deployment. It would be operationally cleaner not to. I tell them anyway.`,
       ru:`Протокол удержания седьмого уровня требует кровяного ключа, потому что ранние мастера-умельцы Гильдии понимали нечто, с тех пор забытое нынешним техническим персоналом: не следует открывать дверь такого рода в перчатках. Момент контакта должен нести цену того, что ты собираешься освободить.\n\nЯ знаю их обоих одиннадцать лет. Это факт, который сидит неудобно рядом с операционным файлом, называющим их «активами» и «субъектами», но никогда — именами, которые я дал им после эксперимента. Лиса назвала себя сама. Варек не может говорить достаточно хорошо, чтобы сделать это. Я дал ему его.\n\nКогда дверь открылась, Варек уже наблюдал за мной. Он не спал. Я не знаю, как долго. Его глаза не закрываются так, как закрываются человеческие — для него нет различия между сном и бодрствованием, только степени вовлечённости. При входе он был в режиме низкой вовлечённости, что для него ближе всего к отдыху.\n\nЛиса спрыгнула с потолочной балки одним движением. Она пахнет лучше, чем должна с учётом обстоятельств. Это всегда было правдой, и я никогда не исследовал почему — потому что некоторые точки данных операционно нерелевантны и остаются таковыми через намеренное поддержание границы.\n\nЯ дал им протокольное слово: Охота. Я наблюдал, как они его получают. Реакция Варека всегда немедленна и читаема — изменение мускулатуры, челюсть. Реакция Лисы внутренняя. Её пальцы двинулись по нитям прежде, чем изменилось лицо. Что бы она ни обрабатывала, она обрабатывает это прежде, чем показывает.\n\nСерьга молчала во время брифинга. В комнате не было обмана. Что бы Близнецы ни представляли собой, они не лгут мне. Это самый стабильный факт, на котором я работаю.\n\nЯ сказал им об ошейниках. Я всегда говорю им об ошейниках перед развёртыванием. Операционно было бы чище не говорить. Я говорю им всё равно.`
     },
     knows:{en:["The collars carry a lethal secondary charge he can trigger remotely — he has told them about the pain circuit only","He gave Varek his name eleven years ago. This is not in any operational file.","The earring's silence during the briefing is the most reliable data point he operates on: the Twins do not deceive him"],ru:["Ошейники несут летальный вторичный заряд, который он может активировать дистанционно — он сказал им только о цепи боли","Он дал Вареку его имя одиннадцать лет назад. Этого нет ни в одном операционном файле.","Молчание серьги во время брифинга — наиболее надёжная точка данных, на которой он работает: Близнецы не лгут ему"]},
     misunderstands:{en:["Believes the wound-masking steam from Varek's back indicates healing — it is concealment, not recovery","Does not know Lisa has been perceiving the entity at the Iron Peak for two days and has chosen not to report it","Believes the ventilation shaft route is viable — the map is nine years out of date"],ru:["Считает, что маскирующий пар со спины Варека указывает на заживление — это сокрытие, а не восстановление","Не знает, что Лиса воспринимает сущность в Железном Пике два дня и выбрала не сообщать об этом","Считает маршрут через вентиляционную штольню жизнеспособным — карта устарела на девять лет"]},
     hides:{en:["The collars' lethal secondary function — disclosed only as pain-induction","He has a name he uses for Varek that is not in any file. He has not said it since the incident three years ago.","He told them about the collars before deployment 'anyway.' The reason he does this — when operational efficiency recommends against it — is not something he has examined."],ru:["Летальная вторичная функция ошейников — раскрыта только как болевая индукция","У него есть имя, которое он использует для Варека и которого нет ни в одном файле. Он не произносил его с инцидента три года назад.","Он сказал им об ошейниках перед развёртыванием «всё равно». Причину, по которой он это делает — когда операционная эффективность рекомендует обратное — он не исследовал."]},
     whisper:{en:"He told them about the collars. He always does. He has never examined why.",ru:"Он сказал им об ошейниках. Он всегда это делает. Он никогда не исследовал почему."}
   },
   veris:{distortion:4,
     text:{
       en:`I have prepared this documentation four times. Each time the Master has returned, I have filed it in the sealed section and begun the next set of standard ledgers. Each time it has been the same sequence: the blood-key authorization, the Protocol word, the journey, and then either his return or — in one case, nine years ago — a partial return with numbers that did not match what went in.\n\nHe moved past the weapons rack without looking at it. He always does. He chose the twins and the lead box and the earring, and those are the only three things he has ever brought to a Void-contact operation. I have observed this pattern across seven such operations in twenty years. The weapons rack has never been touched for a scenario above threat level six.\n\nI did not enter the containment cell. I have not entered that cell since the initial deactivation three years ago, when I helped carry what was left of the third containment subject — who does not appear in any file — from the chamber. The Master said: do not write this down. I did not write it down. The private chronicle has no entry for that day. There are some things I protect him from having documented, and there are some things I protect myself from having seen.\n\nWhen the door opened I heard Varek's resting state: the sound of something very large, very contained, breathing in a room designed to hold it. And then, beneath it, almost too quiet to register, Lisa's voice — not speaking, just the same sound she makes when she is following a thread. The same sound she made the first day, when she was still small enough to carry.\n\nI noted the departure time. I prepared the Heavy Protocol paperwork. I stood in the corridor for six minutes after they left before I was able to walk normally.\n\nI do not know what I am afraid of. I know what I am afraid of. I have not written it in any chronicle.`,
       ru:`Я готовил эту документацию четыре раза. Каждый раз, когда Мастер возвращался, я помещал её в запечатанный раздел и начинал следующий набор стандартных гроссбухов. Каждый раз это была одна и та же последовательность: авторизация кровяным ключом, протокольное слово, путешествие, а затем либо его возвращение, либо — один раз, девять лет назад — частичное возвращение с числами, не совпадавшими с тем, что ушло.\n\nОн прошёл мимо стойки с оружием, не глядя на неё. Всегда так. Он выбрал Близнецов, свинцовый ларец и серьгу — и это единственные три вещи, которые он когда-либо брал на операцию с контактом Пустоты. Я наблюдал эту закономерность в семи таких операциях за двадцать лет. Стойка с оружием никогда не была тронута для сценария выше шестого уровня угрозы.\n\nЯ не вошёл в камеру удержания. Я не входил в эту камеру с момента первоначальной деактивации три года назад, когда помогал выносить то, что осталось от третьего субъекта удержания — которого нет ни в одном файле — из камеры. Мастер сказал: не записывайте это. Я не записал. В частной летописи нет записи об этом дне. Есть вещи, от документирования которых я его защищаю, и есть вещи, от которых защищаю себя.\n\nКогда дверь открылась, я услышал состояние покоя Варека: звук чего-то очень большого, очень сдержанного, дышащего в комнате, спроектированной его удерживать. А затем, под ним, почти слишком тихо, чтобы зарегистрировать, — голос Лисы: не говорящий, просто тот же звук, который она издаёт, когда следует нити. Тот же звук, который она издавала в первый день, когда была ещё достаточно мала, чтобы её носить.\n\nЯ отметил время отъезда. Подготовил документацию Тяжёлого Протокола. Простоял в коридоре шесть минут после их ухода, прежде чем смог идти нормально.\n\nЯ не знаю, чего боюсь. Я знаю, чего боюсь. Я не написал этого ни в одной летописи.`
     },
     knows:{en:["The sequence: seven Void-contact operations. Seven blood-key authorizations. He has counted them.","Nine years ago the numbers didn't match on return. He filed the partial-return data without comment.","There was a third containment subject. He helped carry what remained out of the cell. He was told not to write it down. He didn't."],ru:["Последовательность: семь операций контакта с Пустотой. Семь авторизаций кровяным ключом. Он их считал.","Девять лет назад числа не совпали при возвращении. Он подал данные о частичном возвращении без комментариев.","Был третий субъект удержания. Он помогал выносить то, что осталось, из камеры. Ему сказали не записывать. Он не записал."]},
     misunderstands:{en:["He thinks he does not know what he is afraid of. He knows exactly what he is afraid of. The sentence 'I do not know what I am afraid of. I know what I am afraid of.' is the private chronicle's most precise entry."],ru:["Он думает, что не знает, чего боится. Он точно знает, чего боится. Предложение «Я не знаю, чего боюсь. Я знаю, чего боюсь» — наиболее точная запись частной летописи."]},
     hides:{en:["The third subject's name. He knows it. He will not write it anywhere.","He stood in the corridor for six minutes. He was not unable to move. He was choosing to remain close to the door as long as the sound inside was still audible.","He has never told Dante that he knows about the private chronicle — that the Master knows it exists — because acknowledging this would require him to account for what is in it"],ru:["Имя третьего субъекта. Он знает его. Он не напишет его нигде.","Он стоял в коридоре шесть минут. Он не был неспособен двигаться. Он выбирал оставаться рядом с дверью, пока звук внутри ещё был слышен.","Он никогда не говорил Данте, что знает о частной летописи — что Мастер знает о её существовании — потому что признание этого потребовало бы отчёта о том, что в ней"]},
     whisper:{en:"He stood in the corridor for six minutes. He was not unable to move.",ru:"Он стоял в коридоре шесть минут. Он не был неспособен двигаться."}
   }
 }
},

/* ─── SCENE 2: THE GREY LANDS ─── */
{id:"s2",
 title:{en:"The Grey Lands",ru:"Серые Земли"},
 subtitle:{en:"The world does not die here. It converts.",ru:"Мир здесь не умирает. Он конвертируется."},
 location:{en:"Border of Baron Caldor's Territory",ru:"Граница Владений Барона Кальдора"},
 timing:{en:"Two Days After Awakening, Midday",ru:"Два Дня После Пробуждения, Полдень"},
 flags:["field_operation","foreshadowing"],
 povData:{
   dante:{distortion:2,
     text:{
       en:`The biological suppression zone extends to approximately forty kilometers from the castle — wider than Church intelligence indicated. The fauna absence is total. The petrification of the vegetation is not a natural mineralization process; it is a crystallization driven by Void-field saturation. The iron grass underfoot is brittle and will conduct sound differently than organic terrain. I noted this for movement planning.\n\nThe horses' refusal was expected. Animals perceive the field before instruments register it. The earring began vibrating at the same point the horses stopped — not the sharp alert of detected deception, but the lower, sustained note that I associate with proximity to something that does not have intentions in the conventional sense. It is aware. It has no agenda in a framework I can model. These are not the same thing.\n\nThe patrol was precisely positioned at three hundred paces — the detection threshold I calculated from the crystal-shard sample Morius provided. The positioning was too exact to be default patrol pattern. They were placed there. The patrol was a calibration exercise: establish what assets I brought, observe how they operate, transmit.\n\nVariables updated from the engagement:\nCrystal network has real-time data transmission — confirmed by the spear response to Varek. The Void-infused weapons are a specific counter to the Twins' profile, not general armament. The network already had their capabilities on file before I deployed them. The Baron — or what speaks through the Baron — prepared for this.\n\nVarek's wound is producing grey steam. He says it is nothing. He has never said that before about anything. I am logging this and will assess at the next staging point.\n\nThe map shows the ventilation shafts intact. I will verify at closer range.`,
       ru:`Зона биологического подавления простирается приблизительно на сорок километров от замка — шире, чем указывала церковная разведка. Отсутствие фауны полное. Окаменение растительности — не естественный процесс минерализации; это кристаллизация, вызванная насыщением поля Пустоты. Металлическая трава под ногами хрупка и будет иначе проводить звук, чем органическая поверхность. Я отметил это для планирования передвижения.\n\nОтказ лошадей был ожидаемым. Животные воспринимают поле прежде, чем приборы его регистрируют. Серьга начала вибрировать в той же точке, где остановились лошади — не резкий сигнал обнаруженного обмана, а более низкая, устойчивая нота, которую я связываю с близостью к чему-то, не имеющему намерений в обычном смысле. Оно осознаёт. У него нет повестки в рамках, которую я могу моделировать. Это не одно и то же.\n\nПатруль был точно позиционирован на расстоянии трёхсот шагов — порог обнаружения, рассчитанный мной по осколку кристалла от Мориуса. Позиционирование было слишком точным для стандартного патрульного маршрута. Их туда поставили. Патруль был калибровочным упражнением: установить, каких активов я привёл, наблюдать за их работой, передать.\n\nПеременные, обновлённые по результатам столкновения:\nСеть кристаллов имеет передачу данных в реальном времени — подтверждено реакцией копий на Варека. Оружие, пропитанное Пустотой, является конкретной контрмерой к профилю Близнецов, а не общим вооружением. Сеть уже имела их возможности в файле до того, как я их развернул. Барон — или то, что говорит через барона — подготовился к этому.\n\nРана Варека производит серый пар. Он говорит, что это ничего. Он никогда раньше так не говорил ни о чём. Регистрирую это и оценю на следующей промежуточной точке.\n\nКарта показывает вентиляционные штольни нетронутыми. Верифицирую на более близком расстоянии.`
     },
     knows:{en:["The patrol was a deliberate calibration exercise — too precisely positioned to be standard patrol","The crystal network has real-time transmission — the Void-infused spear weapons were prepared specifically for the Twins' capability profile","Varek said 'nothing' about his wound for the first time. This is logged."],ru:["Патруль был намеренным калибровочным упражнением — слишком точно позиционирован для стандартного маршрута","Сеть кристаллов имеет передачу в реальном времени — оружие, пропитанное Пустотой, было подготовлено специально под профиль возможностей Близнецов","Варек впервые сказал «ничего» о своей ране. Зарегистрировано."]},
     misunderstands:{en:["'Will verify at closer range' — the ventilation shafts no longer exist as mapped. The entity has had nine years and the Baron's engineering resources to prepare the approach Dante will use.","Believes Varek's wound is something he can assess at the next staging point. The propagation timeline does not allow for a next staging point."],ru:["«Верифицирую на более близком расстоянии» — вентиляционные штольни больше не существуют в соответствии с картой. Сущность имела девять лет и инженерные ресурсы барона, чтобы подготовить подход, который использует Данте.","Считает, что рану Варека можно оценить на следующей промежуточной точке. Временной график распространения не позволяет дождаться следующей промежуточной точки."]},
     hides:{en:["He felt the earring's sustained low vibration — not deception-detection but proximity-to-something-older — and did not record what it felt like to have this be a continuous sensation rather than a triggered one","He registered 'variables updated' with the same notation he uses for weather affecting a trade route. The notation is accurate. The equanimity it implies is performed."],ru:["Он почувствовал устойчивую низкую вибрацию серьги — не обнаружение обмана, а близость к чему-то более древнему — и не записал, каково это — иметь ощущение непрерывным, а не триггерным","Он зарегистрировал «переменные обновлены» с той же нотацией, что использует для погоды, влияющей на торговый путь. Нотация точна. Подразумеваемое ею равновесие — исполнено."]},
     whisper:{en:"He wrote 'will verify at closer range.' The map is nine years old. He knows maps go stale. He has not said this aloud.",ru:"Он написал «верифицирую на более близком расстоянии». Карте девять лет. Он знает, что карты устаревают. Он не сказал этого вслух."}
   },
   varek:{distortion:3,
     text:{
       en:`IRON GRASS. WRONG.\n\nNot wrong like bad. Wrong like: my foot knows grass, my foot does not know this. Metal memory of grass. Something made it stop and hold the shape.\n\nHorses ran. Horses are smart. Horses know when to run. I do not run. Running is for when you lose. I have not lost.\n\nThe dead men came. I have fought dead men before. Wights. Risen. Bonepulled. I know how dead men fight — they do not tire, they do not break, they keep coming. These dead men were different. These dead men had insides. Not meat-insides. Machine-insides. I could hear them ticking when they got close enough.\n\nI hit the first one and it came apart at the waist. Good. That is what hitting should do.\n\nThe second ones went around me. I hate that. Going around means they are thinking. Dead men should not think. The spears went in below my shoulder blades. I am not going to say it hurt. It did not hurt. It was cold. Cold in a way that goes deeper than cold.\n\nLisa came. She is small but she cuts right. She found the joints. The ticking stopped.\n\nMy back is doing something. There is smoke. I told the Master it is nothing. He looked at me the way he looks when he is writing something in the file he carries in his head. He is writing something.\n\nI am not going to think about my back. I am going to think about the castle.\n\nThe castle is full of them. More than the patrol. I can feel the weight of it from here — not hear, not smell, feel. The way you feel a cliff before you see it in fog.\n\nMaster said: you go in front. You make noise. You make them look at you.\n\nGood. I am good at that. That is what I am for.\n\nI will make them look at me.`,
       ru:`ЖЕЛЕЗНАЯ ТРАВА. НЕПРАВИЛЬНО.\n\nНе неправильно как плохо. Неправильно как: моя нога знает траву, моя нога не знает это. Металлическая память травы. Что-то заставило её остановиться и удержать форму.\n\nЛошади убежали. Лошади умные. Лошади знают, когда бежать. Я не бегу. Бег — для тех, кто проиграл. Я не проигрывал.\n\nПришли мёртвые люди. Я дрался с мёртвыми людьми раньше. Утопленники. Поднятые. Костяные. Я знаю, как дерутся мёртвые люди — они не устают, не ломаются, продолжают идти. Эти мёртвые люди были другими. У этих мёртвых людей было нутро. Не мясное нутро. Машинное нутро. Я слышал, как они тикают, когда подошли достаточно близко.\n\nЯ ударил первого, и он разлетелся в поясе. Хорошо. Вот что должен делать удар.\n\nВторые обошли меня. Я ненавижу это. Обход означает, что они думают. Мёртвые люди не должны думать. Копья вошли под лопатки. Я не скажу, что это больно. Это не больно. Это холодно. Холодно так, что глубже холода.\n\nПришла Лиса. Она маленькая, но режет правильно. Она нашла суставы. Тиканье остановилось.\n\nМоя спина что-то делает. Есть дым. Я сказал Мастеру — ничего. Он посмотрел на меня так, как смотрит, когда записывает что-то в файл, который носит в голове. Он что-то записывает.\n\nЯ не буду думать о спине. Я буду думать о замке.\n\nЗамок полон ими. Больше, чем патруль. Я чувствую его тяжесть отсюда — не слышу, не нюхаю, чувствую. Как чувствуешь обрыв, прежде чем видишь его в тумане.\n\nМастер сказал: иди вперёд. Шуми. Заставь их смотреть на тебя.\n\nХорошо. Я хорошо умею это. Для этого я здесь.\n\nЯ заставлю их смотреть на меня.`
     },
     knows:{en:["The dead men in the patrol were thinking — they adapted tactically, which means some form of distributed cognition through the crystal network","The spear wounds are cold 'in a way that goes deeper than cold' — he has accurate sensation data but no interpretive framework for Void-propagation","He can feel the weight of the castle's occupants before seeing it — this is Void-perception registering as somatic sensation"],ru:["Мёртвые люди в патруле думали — они адаптировались тактически, что означает некую форму распределённого познания через сеть кристаллов","Раны от копий холодные «так, что глубже холода» — у него точные данные ощущений, но нет интерпретационной базы для распространения Пустоты","Он чувствует тяжесть обитателей замка, не видя его — это Пустотное восприятие, регистрируемое как соматическое ощущение"]},
     misunderstands:{en:["'I am not going to think about my back' — he cannot feel the propagation because his pain system works differently. His sensation of 'cold deeper than cold' is accurate. His conclusion that it is 'nothing' is not.","Believes 'that is what I am for' — the disposition that makes him useful also makes him the only asset the entity does not need to think carefully about"],ru:["«Я не буду думать о спине» — он не может чувствовать распространение, потому что его система боли работает иначе. Его ощущение «холода глубже холода» точно. Его вывод «ничего» — нет.","Считает «для этого я здесь» — диспозиция, делающая его полезным, также делает его единственным активом, о котором сущности не нужно тщательно думать"]},
     hides:{en:["He told Dante his wound was 'nothing' — the first time he has said this about anything. He knows this is not accurate. He said it because Dante looked at him the way he looks when he is about to change the plan.","He chose not to break the collar fourteen months ago and has not reconsidered. He does not tell Dante this because Dante has not asked — and because explaining it would require words he does not have."],ru:["Он сказал Данте, что рана «ничего» — впервые он говорит это о чём-либо. Он знает, что это неточно. Он сказал это, потому что Данте смотрел на него так, как смотрит, когда собирается изменить план.","Он выбрал не ломать ошейник четырнадцать месяцев назад и не пересматривал решение. Он не говорит Данте об этом, потому что Данте не спрашивал — и потому что объяснение потребует слов, которых у него нет."]},
     whisper:{en:"He said 'nothing.' He never says nothing. Dante wrote it down.",ru:"Он сказал «ничего». Он никогда не говорит «ничего». Данте это записал."}
   },
   lisa:{distortion:8,
     text:{
       en:`the grass is iron but the iron remembers being grass and I can hear that\n\nI have been hearing the castle for two days\n\nit is not sound. the word sound is wrong. it is pressure. the kind of pressure you feel when something very large has been thinking in one direction for a long time and the thinking has made grooves in the air\n\nI did not tell the Master\n\nhe would want to know what I am perceiving. he always wants to know. he takes what I perceive and makes it into numbers and then the numbers go into the file-he-carries-in-his-head and then the file tells him what to do. but this is not numbers. this is — I do not have the word. in the four years before the experiment I had two hundred words. after the experiment I have too many words and also not enough words for the things I now perceive that words were not made for\n\nthe patrol was simple. the patrol was machinery — crystal to crystal, each one a node, all of them thinking the same thought that the castle is thinking. I can hear machinery. machinery has rhythm. find the rhythm, find the joints, cut\n\nbut underneath the machinery is the other thing\n\nit was already awake when we left the capital. it felt the earring move through the city and then it felt the earring moving toward it and now the earring is here and the other thing is very very still the way deep water is still: not absent, just patient\n\nit has been patient for a long time\n\nit is not interested in Varek. it is not interested in me. I am like a bird to it. birds near the water. tolerated proximity. I am perceiving something that is perceiving something that is the Master\n\nVariek's back is doing a thing. the cold is inside the bone now. I can hear it like a clock. I will not tell him. he would stop walking and Varek stopped is worse than Varek moving forward because moving forward is all he has\n\nMaster said: make noise at the front gate.\n\nI said: yes.\n\nI know what making noise at the front gate means. I have always known what that kind of request means. I say yes anyway. The Master gave me my name. That is the only category I have for why.`,
       ru:`трава железная но железо помнит что было травой и я слышу это\n\nя слышу замок два дня\n\nэто не звук. слово звук неправильное. это давление. то давление которое чувствуешь когда что-то очень большое думало в одном направлении долгое время и мышление проделало борозды в воздухе\n\nя не сказала Мастеру\n\nон хотел бы знать что я воспринимаю. он всегда хочет знать. он берёт то что я воспринимаю и превращает в числа а потом числа идут в файл-который-он-носит-в-голове а потом файл говорит ему что делать. но это не числа. это — у меня нет слова. в четыре года до эксперимента у меня было двести слов. после эксперимента у меня слишком много слов и также недостаточно слов для вещей которые я теперь воспринимаю и для которых слова не были сделаны\n\nпатруль был простым. патруль был механизмом — кристалл к кристаллу, каждый узел, все думают одну мысль которую думает замок. я слышу механизмы. у механизмов есть ритм. найди ритм найди суставы режь\n\nно под механизмом другое\n\nоно уже было пробуждено когда мы покинули столицу. оно почувствовало движение серьги через город а потом почувствовало что серьга движется к нему и теперь серьга здесь и другое очень-очень тихое как тихая глубокая вода: не отсутствующая а просто терпеливая\n\nоно ждало долго\n\nему неинтересен Варек. мне неинтересна я. я как птица для него. птицы у воды. терпимое соседство. я воспринимаю что-то что воспринимает что-то которое есть Мастер\n\nсо спиной Варека происходит что-то. холод уже внутри кости. я слышу это как часы. не скажу ему. он остановится а остановившийся Варек хуже Варека идущего вперёд потому что идти вперёд — всё что у него есть\n\nМастер сказал: шуми у главных ворот.\n\nЯ сказала: да.\n\nЯ знаю что значит шуметь у главных ворот. я всегда знала что означает такой запрос. я говорю да всё равно. Мастер дал мне моё имя. это единственная категория которая у меня есть для объяснения почему.`
     },
     knows:{en:["The entity at the Iron Peak has been aware of the earring since they left the capital — through the Void crystal transmission. It is patient. It is specifically interested in Dante.","Varek's wound has Void-energy propagating through his skeleton — she hears it like a clock. She has calculated approximately when it reaches his core.","'Making noise at the front gate' is a diversion assignment that typically results in the diversion assets not surviving the operation"],ru:["Сущность в Железном Пике осознавала серьгу с момента их отъезда из столицы — через передачу кристалла Пустоты. Она терпелива. Её конкретно интересует Данте.","Рана Варека несёт Пустотную энергию, распространяющуюся по его скелету — она слышит это как часы. Она рассчитала приблизительно, когда она достигнет его ядра.","«Шуметь у главных ворот» — задание отвлечения, которое обычно означает, что активы отвлечения не переживают операцию"]},
     misunderstands:{en:["She perceives the entity's awareness of Dante as a structural fact, not as a threat context she can translate into operational data. Her perception is accurate. Her ability to communicate it is the gap.","She believes not telling Varek about his wound is protecting him. It is also protecting herself from the conversation that would follow."],ru:["Она воспринимает осознание сущностью Данте как структурный факт, а не как контекст угрозы, который она может перевести в операционные данные. Её восприятие точно. Её способность сообщить его — разрыв.","Она считает, что, не говоря Вареку о его ране, защищает его. Это также защищает её от разговора, который последовал бы."]},
     hides:{en:["The entity perceives Dante specifically — she has not told him this","Varek's propagation timeline — she has not told him this","She has been trying to find a word for what she perceives at the castle for two days. The closest she has arrived at is: waiting-that-has-become-place.","She said yes to the front gate assignment. The reason she gives — 'the Master gave me my name' — is true. It is not the whole reason. The other part she has not told anyone: she cannot hear anything inside the gate assignment that tells her she survives it, and the absence of that particular frequency is the most restful thing she has perceived in four years of operation."],ru:["Сущность воспринимает Данте конкретно — она не сказала ему этого","Временной график распространения Варека — она не сказала ему этого","Она два дня пытается найти слово для того, что воспринимает в замке. Ближайшее, к чему она пришла: ожидание-которое-стало-местом.","Она сказала да на задание у главных ворот. Причина, которую она называет — «Мастер дал мне моё имя» — правда. Это не вся причина. Другую часть она не говорила никому: она не слышит ничего внутри задания у ворот, что говорило бы о том, что она его переживёт, и отсутствие этой конкретной частоты — самое спокойное, что она воспринимала за четыре года работы."]},
     whisper:{en:"She said yes to the gate. She cannot hear herself surviving it. She finds this restful.",ru:"Она сказала да воротам. Она не слышит себя пережившей это. Она находит это успокоительным."}
   }
 }

/* ─── SCENE 3: THE HUNT BEGINS ─── */
{id:"s3",
 title:{en:"The Hunt Begins",ru:"Охота Начинается"},
 subtitle:{en:"The distraction goes in the front. The knife goes underneath.",ru:"Отвлечение идёт через парадный вход. Нож — снизу."},
 location:{en:"Edge of the Grey Lands, Iron Peak in Sight",ru:"Край Серых Земель, Железный Пик Виден"},
 timing:{en:"One Hour After the Patrol Encounter",ru:"Час После Столкновения с Патрулём"},
 flags:["pivotal","field_operation","foreshadowing"],
 povData:{
   dante:{distortion:2,
     text:{
       en:`I unrolled the archive map against the bonnet of the carriage. The paper is nine years old. I have used older. The ventilation shaft network is a structural feature of the original construction — a Baron modifying his castle for warmth distribution would retain and adapt it, not remove it. This reasoning holds for conventional renovation. I am operating on the assumption that the Baron — or whatever has been steering the Baron's decisions — undertook conventional renovation.\n\nThis assumption may not hold.\n\nI briefed the Twins on the split. Lisa absorbed the gate assignment without visible response, which means she processed it before I stated it. Varek responded with the chest-hit, which is his version of agreement and also his version of enthusiasm, which are the same thing. I did not look at his back.\n\nI checked the earring before I spoke the plan aloud. Quiet. The Void-presence is registering as pervasive ambient — it is not concentrated in any direction, which either means it is distributed throughout the field or means it is maintaining directionlessness as an active stance. Both interpretations require the same operational response: proceed as if observed from all angles at all times.\n\nThe Twins will generate maximum noise at the main gate. Maximum engagement for the crystal network. Every active node pointed in that direction. I will use that window to enter through the substructure.\n\nOnce I am inside: find the central node. The entity's presence in this region requires a physical anchor — the Void does not hold form without one. The crystal in Morius's box was an extracted splinter. The central crystal, still in situ, will be larger. More connected. More aware.\n\nI have operated against artifacts before. Against possessed persons. Against entities with distributed presence. I have always had the earring as a baseline: it tells me what is deception and what is not. Against something that does not deceive — that is simply present and aware and older than the earring's design parameters — I am working without a compass.\n\nI adjusted the map. The shafts should be here.\n\nWe deploy in ten minutes.\n\nThe world required this. The bill comes due. I pay it.\n\nBusiness continues.`,
       ru:`Я развернул архивную карту на капоте кареты. Бумаге девять лет. Я работал со старее. Сеть вентиляционных штолен — структурная особенность оригинальной конструкции: барон, модифицирующий свой замок для распределения тепла, сохранил бы и адаптировал её, а не убрал. Это рассуждение справедливо для обычной реконструкции. Я работаю на допущении, что барон — или то, что направляло решения барона, — осуществил обычную реконструкцию.\n\nЭто допущение может не выдержать.\n\nЯ изложил Близнецам разделение. Лиса поглотила задание у ворот без видимой реакции — значит, обработала его до того, как я его произнёс. Варек ответил ударом кулаком в ладонь, что является его версией согласия и также его версией энтузиазма — это одно и то же. Я не смотрел на его спину.\n\nЯ проверил серьгу перед тем, как произнёс план вслух. Тихо. Присутствие Пустоты регистрируется как повсеместный фон — оно не сконцентрировано ни в одном направлении, что означает либо его распределённость по всему полю, либо то, что оно поддерживает ненаправленность как активную позицию. Оба варианта интерпретации требуют одного и того же операционного ответа: действовать так, словно ведётся наблюдение со всех углов всё время.\n\nБлизнецы создадут максимальный шум у главных ворот. Максимальная нагрузка на сеть кристаллов. Каждый активный узел направлен в ту сторону. Я использую это окно для входа через подструктуру.\n\nОкажусь внутри: найти центральный узел. Присутствие сущности в этом регионе требует физического якоря — Пустота не удерживает форму без него. Кристалл в ларце Мориуса был извлечённым осколком. Центральный кристалл, всё ещё на месте, будет крупнее. Более связанным. Более осознающим.\n\nЯ работал против артефактов раньше. Против одержимых людей. Против сущностей с распределённым присутствием. У меня всегда была серьга как базовый ориентир: она говорит мне, что является обманом, а что нет. Против чего-то, что не обманывает — что просто присутствует, осознаёт и старше параметров проектирования серьги — я работаю без компаса.\n\nЯ скорректировал карту. Штольни должны быть здесь.\n\nРазвёртывание через десять минут.\n\nМир потребовал этого. Счёт предъявлен. Я плачу.\n\nБизнес продолжается.`
     },
     knows:{en:["His operational logic is sound for a conventional target. He is not operating against a conventional target.","The entity maintains directionlessness as a deliberate stance — he identified this from the earring's ambient reading. He is correct.","He has named the gap: against something that does not deceive, he is operating without a compass. This is the first time he has named the gap in an operation."],ru:["Его операционная логика верна для обычной цели. Он не работает против обычной цели.","Сущность поддерживает ненаправленность как намеренную позицию — он определил это по фоновому показанию серьги. Он прав.","Он назвал разрыв: против чего-то, что не обманывает, он работает без компаса. Это первый раз, когда он называет разрыв в ходе операции."]},
     misunderstands:{en:["'The shafts should be here' — the archive map is nine years old and the Baron had specific foreknowledge of this approach vector. The shafts are not where the map shows them. They are something else now.","His reasoning that 'conventional renovation retains structural features' is correct for a human renovator. The entity that has been steering the Baron is not a human renovator."],ru:["«Штольни должны быть здесь» — архивной карте девять лет, и барон имел конкретное предварительное знание об этом векторе подхода. Штольни не там, где карта их показывает. Они теперь что-то другое.","Его рассуждение о том, что «обычная реконструкция сохраняет структурные особенности», верно для человека-реконструктора. Сущность, направлявшая барона, — не человек-реконструктор."]},
     hides:{en:["'This assumption may not hold' — four words that contain the operational gap he is choosing to proceed through anyway. He wrote them. He did not expand them. He deployed.","He did not look at Varek's back. He made the decision not to look and then acted on it. The decision was deliberate.","He said 'business continues' in his operational notes and then checked his mustache in the carriage mirror. The two actions are the same action."],ru:["«Это допущение может не выдержать» — четыре слова, содержащие операционный разрыв, через который он выбирает двигаться всё равно. Он написал их. Не развернул. Развернул операцию.","Он не смотрел на спину Варека. Он принял решение не смотреть, а затем действовал на его основе. Решение было намеренным.","Он написал «бизнес продолжается» в операционных заметках, а затем проверил ус в зеркале кареты. Два действия — одно действие."]},
     whisper:{en:"'The shafts should be here.' He knows maps go stale. He deployed anyway.",ru:"«Штольни должны быть здесь». Он знает, что карты устаревают. Он всё равно развернул операцию."}
   },
   varek:{distortion:4,
     text:{
       en:`FRONT GATE.\n\nGood.\n\nFront gate is the right assignment for me. I am big. I am loud. Things that are big and loud go in front. Things that are small and quiet go underneath. This is correct distribution of force. The Master understands force.\n\nLisa is going too. Lisa is small and quiet but she is also front gate. She does not look worried. Lisa does not look like most things. I can hear her processing — the small sound her fingers make on the strings when she is running something through very fast. She ran something through very fast when the Master said front gate.\n\nMy back is doing the cold thing. It went deeper while we were standing still. Standing still is when you notice things. Moving is better. At the gate I will move.\n\nI do not think about the thing in the castle. I do not have the equipment for thinking about the thing in the castle. The Master has the equipment. That is why he goes underneath. I have different equipment. I go in front.\n\nThe castle is full. I felt it when we fought the patrol — the dead men were thinking the castle's thoughts. When I broke them their crystals went dark and I felt the castle notice. Not afraid. Just: noticing. Something that notices like that has been sitting there a very long time.\n\nMaster said: when I signal, pull back.\n\nI nodded.\n\nI will pull back when he signals. This is also correct operational procedure. I am very good at correct operational procedure. I have been doing it for eleven years.\n\nMy name is Varek. The Master gave it to me. Before that I did not have a name. Having a name means you exist in a way that makes sense to the person who named you. That is enough.\n\nFront gate. Make noise. Wait for signal.\n\nI will do this correctly.\n\nThe cold thing in my back does not matter until the gate is finished.\n\nFront gate. Yes.`,
       ru:`ГЛАВНЫЕ ВОРОТА.\n\nХорошо.\n\nГлавные ворота — правильное задание для меня. Я большой. Я шумный. То что большое и шумное идёт вперёд. То что маленькое и тихое идёт снизу. Это правильное распределение силы. Мастер понимает силу.\n\nЛиса тоже идёт. Лиса маленькая и тихая но тоже идёт к главным воротам. Она не выглядит обеспокоенной. Лиса вообще мало на что похоже выглядит. Я слышу как она обрабатывает — маленький звук её пальцев по нитям когда она прогоняет что-то очень быстро. Она прогнала что-то очень быстро когда Мастер сказал главные ворота.\n\nМоя спина делает холодное. Пошло глубже пока мы стояли. Стоять неподвижно — когда замечаешь вещи. Двигаться лучше. У ворот я буду двигаться.\n\nЯ не думаю о том что в замке. У меня нет оборудования для размышлений о том что в замке. У Мастера есть оборудование. Вот почему он идёт снизу. У меня другое оборудование. Я иду вперёд.\n\nЗамок полон. Я почувствовал это когда мы сражались с патрулём — мёртвые думали мысли замка. Когда я их ломал их кристаллы темнели и я чувствовал как замок это замечает. Не испуганно. Просто: замечает. Что-то что замечает вот так сидело там очень долгое время.\n\nМастер сказал: когда я подам сигнал — отступайте.\n\nЯ кивнул.\n\nЯ отступлю когда он подаст сигнал. Это тоже правильная операционная процедура. Я очень хорошо умею правильную операционную процедуру. Я делаю это одиннадцать лет.\n\nМоё имя Варек. Мастер дал его мне. До этого у меня не было имени. Иметь имя означает существовать так чтобы это имело смысл для человека который тебя назвал. Этого достаточно.\n\nГлавные ворота. Шуметь. Ждать сигнала.\n\nЯ сделаю это правильно.\n\nХолодное в моей спине не имеет значения пока ворота не закончены.\n\nГлавные ворота. Да.`
     },
     knows:{en:["The castle noticed when the patrol's crystals went dark — he perceived this as a somatic sensation and correctly interpreted it as network awareness","He heard Lisa process the gate assignment very fast — he knows this means something. He does not have a word for what it means.","'The cold thing in my back does not matter until the gate is finished' — he has prioritized operationally. This is accurate. The timeline is not."],ru:["Замок заметил когда кристаллы патруля потемнели — он воспринял это как соматическое ощущение и правильно интерпретировал как осознание сети","Он слышал как Лиса обработала задание у ворот очень быстро — он знает что это что-то значит. У него нет слова для того что это значит.","«Холодное в моей спине не имеет значения пока ворота не закончены» — он правильно расставил приоритеты операционно. Это точно. Временной график — нет."]},
     misunderstands:{en:["Believes he will receive the signal to pull back. The propagation timeline may not allow him to respond to a signal by the time it comes.","'Having a name means you exist in a way that makes sense to the person who named you. That is enough.' — he has resolved this. The resolution is genuine and it is what makes him deployable and what makes deploying him something Dante does not fully examine."],ru:["Считает что получит сигнал к отступлению. Временной график распространения может не позволить ему ответить на сигнал к тому времени когда он придёт.","«Иметь имя означает существовать так чтобы это имело смысл для человека который тебя назвал. Этого достаточно» — он разрешил это. Разрешение подлинное и именно оно делает его развёртываемым и именно оно делает его развёртывание чем-то что Данте не полностью исследует."]},
     hides:{en:["He knows the cold went deeper while standing still. He is managing this by planning to move. This is correct threat management. It is not correct medical management. The distinction does not exist for him as a category.","He heard Lisa. He did not ask her what she processed. He has learned not to ask Lisa what she processes because the answers require words for things he cannot perceive and this creates a kind of noise he dislikes."],ru:["Он знает что холод пошёл глубже пока он стоял. Он управляет этим планируя двигаться. Это правильное управление угрозой. Это неправильное медицинское управление. Различие не существует для него как категория.","Он слышал Лису. Он не спросил что она обработала. Он научился не спрашивать Лису что она обрабатывает потому что ответы требуют слов для вещей которые он не воспринимает и это создаёт вид шума который ему не нравится."]},
     whisper:{en:"'Having a name is enough.' He means it. That is why Dante deploys him. That is what Dante does not examine.",ru:"«Иметь имя достаточно». Он имеет это в виду. Вот почему Данте его развёртывает. Вот что Данте не исследует."}
   }
 }

/* ═══ ENGINE ═══ */
const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');const secs=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}];c.innerHTML=secs.map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
