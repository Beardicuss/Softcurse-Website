  {id:"TET-173",en:"Object 7-B is not a mining operation or a manufacturing plant in the conventional sense. It is a biological processing installation that converts organic matter into structural nano-composite through a molecular-level enzymatic pathway. The columns in the main hall are not structural supports — they are the facility's digestive architecture, equivalent to villi in an intestinal wall, maximizing surface area for molecular breakdown. The transparent capsules contain the facility's enzyme reservoir. The 'Receiver' voronka is the intake mechanism for the primary processing loop. The facility does not burn organic matter; it digests it at the molecular level and reconstitutes the useful components — proteins, calcium, carbon lattices — into the nano-composite through a synthesis pathway that Precursor-era bioengineers called 'structural transcription.' The wyvern carcasses were the correct fuel type: the facility is calibrated for large-mass vertebrate organic matter, which produces the highest transcription efficiency.",ru:"Объект 7-Б — не горнодобывающая операция и не производственный завод в традиционном смысле. Это установка биологической переработки преобразующая органическое вещество в структурный нанокомпозит через молекулярный ферментативный путь. Колонны в главном зале — не структурные опоры: это пищеварительная архитектура объекта, эквивалент ворсинок в стенке кишечника, максимизирующая площадь поверхности для молекулярного расщепления. Прозрачные капсулы содержат резервуар ферментов объекта. Воронка «Приёмника» — механизм забора для первичного перерабатывающего контура. Объект не сжигает органическое вещество; он переваривает его на молекулярном уровне и воссоздаёт полезные компоненты — белки, кальций, углеродные решётки — в нанокомпозит через синтетический путь который биоинженеры эпохи Предтечей называли «структурной транскрипцией». Туши виверн были правильным типом топлива: объект откалиброван для органического вещества позвоночных с большой массой, которое производит наивысшую эффективность транскрипции."},
  {id:"TET-174",en:"When Dante interfaced with the facility's control panel, the system request for 'bio-mass, 200 units, protein/calcium/carbon' was not a request for animal carcasses specifically. It was a request for any vertebrate organic matter at sufficient density to initiate the transcription cycle. The system classified the wyvern carcasses as acceptable substrate and processed them without issue. What the system did not specify — because the Precursor-era design documentation assumed this was understood — is that the facility can process any vertebrate organic matter of sufficient mass, including human. The '500 units per day for sustained cycle maintenance' figure is achievable with approximately two and a half tons of any vertebrate biomass per day. The White Fang clan's hunting operation produces approximately eight tons of usable organic waste per hunting season. Dante's supply chain deal will provide the facility with approximately 320% of minimum sustained-cycle requirements at peak hunting season.",ru:"Когда Данте взаимодействовал с панелью управления объекта, системный запрос на «биомассу, 200 единиц, белок/кальций/углерод» был не запросом на туши животных конкретно. Это был запрос на любое органическое вещество позвоночных достаточной плотности для инициирования цикла транскрипции. Система классифицировала туши виверн как приемлемый субстрат и переработала без проблем. Что система не уточнила — потому что проектная документация эпохи Предтечей предполагала что это понято — объект может перерабатывать любое органическое вещество позвоночных достаточной массы, включая человеческое. Цифра «500 единиц в сутки для поддержания устойчивого цикла» достижима с приблизительно двумя с половиной тоннами любой органики позвоночных в сутки. Охотничья операция клана Белого Клыка производит приблизительно восемь тонн пригодных органических отходов за сезон охоты. Сделка Данте по цепочке поставок обеспечит объект приблизительно 320% минимальных требований устойчивого цикла в пиковый сезон охоты."},
  {id:"TET-175",en:"Grimm is now one study session away from connecting his six Pale Echelon pages to the facility's architecture. When he touched the facility's bio-polymer wall surface and said 'grown as a single piece, bio-polymers' — he was identifying the construction methodology as the same one described in his six pages. The six pages describe a sub-section of this facility's own construction documentation. He does not know this yet. He will know it when he finds the facility's internal technical documentation archive, which is in the fourth sub-level, and reads the section headers. He will recognize the notation system. The recognition will be immediate.",ru:"Гримм теперь в одной учебной сессии от соединения своих шести страниц Бледного Эшелона с архитектурой объекта. Когда он коснулся поверхности стены биополимера объекта и сказал «выращен единым куском, биополимеры» — он идентифицировал методологию строительства как ту же что описана в его шести страницах. Шесть страниц описывают подраздел собственной строительной документации этого объекта. Он ещё не знает этого. Он узнает когда найдёт архив внутренней технической документации объекта — он на четвёртом подуровне — и прочитает заголовки разделов. Он узнает систему нотаций. Узнавание будет немедленным."},
  {id:"TET-176",en:"The Structural Gel demonstration with the wrench was genuine — the Gel reintegrated the wrench's crystalline lattice and reversed the oxidation damage because the Gel's transcription pathway includes a lattice-optimization step that produces a denser crystalline structure than the original material. The repaired wrench is not merely 'as new' — it is stronger than the original forged tool because the molecular density is higher after Gel treatment. This is not a repair process. It is an upgrade process. Torin called it 'liquid time.' The actual mechanism is the opposite of time: it is the reversal of entropy at the molecular level for any material the Gel contacts. The White Fang clan's Gel-treated harpoons and boats will not merely be repaired. They will be upgraded to a material performance standard that no current civilization's metallurgy can match.",ru:"Демонстрация Структурного Геля на гаечном ключе была подлинной — Гель реинтегрировал кристаллическую решётку ключа и обратил повреждение от окисления, потому что транскрипционный путь Геля включает шаг оптимизации решётки производящий более плотную кристаллическую структуру чем исходный материал. Отремонтированный ключ не просто «как новый» — он прочнее оригинального кованого инструмента, потому что молекулярная плотность выше после обработки Гелем. Это не процесс ремонта. Это процесс улучшения. Торин назвал это «жидким временем». Реальный механизм — противоположность времени: это обращение энтропии на молекулярном уровне для любого материала с которым контактирует Гель. Гарпуны и лодки клана Белого Клыка обработанные Гелем будут не просто отремонтированы. Они будут улучшены до стандарта характеристик материала которого не может достичь металлургия ни одной нынешней цивилизации."},
  {id:"TET-177",en:"Dante said 'sell evolution, not just armor.' The half-flask of Gel he is sending to Isabella is not a scientific curiosity. Isabella identified the Structural Gel in the repair workshop's inventory three months before the expedition and understood its biological integration properties because she had a Cognitive Iron sample — acquired six years ago from an unnamed contact — that operates on a similar transcription pathway. She has been waiting for the Gel for three months, not to study it, but to complete a synthesis she has already designed. The 'Vivisection Sector' she maintains is a research facility for controlled biological modification using existing reagents. With the Gel, she will have the primary catalyst for a biological upgrade process. She will not tell Dante what she has been preparing. This will be the fifth unspoken arrangement between them.",ru:"Данте сказал «продавать эволюцию, а не только броню». Полфлакона Геля которые он отправляет Изабелле — не научное любопытство. Изабелла определила Структурный Гель в инвентаре ремонтной мастерской за три месяца до экспедиции и поняла его свойства биологической интеграции, потому что у неё был образец Когнитивного Железа — приобретённый шесть лет назад от неназванного контакта — работающий на похожем транскрипционном пути. Она ждала Гель три месяца не чтобы изучить его, а чтобы завершить синтез который она уже разработала. «Сектор Вивисекции» который она поддерживает — исследовательский объект для контролируемой биологической модификации с использованием существующих реагентов. С Гелем у неё будет основной катализатор для процесса биологического улучшения. Она не скажет Данте что готовила. Это будет пятая негласная договорённость между ними."},
  {id:"TET-178",en:"The Auditor-memory's satisfaction response after Dante successfully initiated the facility — 'the Auditor's memory in his head quieted, satisfied that the protocol had been executed' — is the first time the donor-memory archive has produced an emotional state rather than an informational one. The archive is not simply a database of Precursor-era information. It is a goal-oriented system that has a completion state. Activating Object 7-B was one of its completion criteria. The quieting of the headache after successful initiation is not rest — it is the system marking a goal-state as achieved and temporarily reducing the urgency of its other outstanding objectives. The other outstanding objectives are: the sixteen remaining secondary Precursor sites, the Covenant document on the ocean floor, and the function Dante's Series 404 lineage was designed to perform. The system will resume urgency when the next goal-state becomes actionable.",ru:"Ответ удовлетворения памяти Аудитора после успешной инициации объекта Данте — «память Аудитора в голове затихла, удовлетворённая выполнением протокола» — первый раз когда архив донорской памяти произвёл эмоциональное состояние а не информационное. Архив — не просто база данных информации эпохи Предтечей. Это целеориентированная система имеющая состояние завершения. Активация Объекта 7-Б была одним из её критериев завершения. Затихание головной боли после успешной инициации — не отдых: это система помечающая целевое состояние как достигнутое и временно снижающая срочность других незавершённых объектов. Другие незавершённые объекты: шестнадцать оставшихся вторичных мест Предтечей, документ Завета на дне океана, и функция для выполнения которой была спроектирована линия 404 Данте. Система возобновит срочность когда следующее целевое состояние станет реализуемым."},
  {id:"TET-179",en:"Silas has now confirmed his Site Seven analysis and reached a conclusion he has not reported: the payment recipient anticipated not just the Auditor role but the specific operational sequence — Island expedition, material recovery, facility activation. The payment structure predates Dante's appointment by one year and the Island expedition's formal authorization by three years. The recipient did not predict the future. They knew the plan because they wrote it. The Pale Echelon document series that Grimm has six pages of, and that the predecessor designed, is the operational manual for the sequence Dante is executing. The sequence was written by the predecessor and has been running without the predecessor's presence since the predecessor's departure nineteen years ago. Dante is not executing his own plan. He is executing his predecessor's plan. He does not know this yet.",ru:"Силас теперь подтвердил анализ «Объекта Семь» и пришёл к выводу который не доложил: получатель платежа предвидел не только роль Аудитора но конкретную операционную последовательность — Островная экспедиция, извлечение материала, активация объекта. Структура платежа предшествует назначению Данте на один год и официальному разрешению Островной экспедиции на три года. Получатель не предсказал будущее. Он знал план, потому что написал его. Серия документов Бледного Эшелона которой Гримм имеет шесть страниц и которую спроектировал предшественник — операционное руководство для последовательности которую выполняет Данте. Последовательность была написана предшественником и выполняется без его присутствия с момента отбытия предшественника девятнадцать лет назад. Данте выполняет не собственный план. Он выполняет план предшественника. Он пока не знает этого."},
  {id:"TET-180",en:"The White Fang deal Dante struck is simultaneously the most equitable and the most asymmetric transaction he has made in twenty-two chapters. Most equitable: the deal is genuinely beneficial to both parties — Gel-treated tools will transform the clan's capability, and the organic waste supply will sustain the facility. Most asymmetric: the Gel's actual value to the clan is approximately 400 times what Dante has priced it at in the barter exchange. A single Gel-treated harpoon, once the upgrade's properties are understood, will be worth more than the clan's entire annual hunting output. Dante understated the value deliberately — not to deceive but because introducing the true value creates an incentive for the clan to acquire more Gel by other means, including attacking the facility. He has priced the deal at the level that maintains maximum dependency without triggering acquisition behavior. This is the same mechanism he used with Torin's equity certificates.",ru:"Сделка с Белым Клыком которую заключил Данте одновременно является наиболее равноправной и наиболее асимметричной транзакцией которую он совершил за двадцать две главы. Наиболее равноправной: сделка реально выгодна обеим сторонам — инструменты обработанные Гелем трансформируют возможности клана, а поставка органических отходов поддержит объект. Наиболее асимметричной: реальная ценность Геля для клана приблизительно в 400 раз больше того как Данте оценил её в бартерном обмене. Один гарпун обработанный Гелем, когда свойства улучшения будут поняты, будет стоить больше чем весь годовой охотничий выпуск клана. Данте намеренно занизил стоимость — не чтобы обмануть, а потому что введение истинной стоимости создаёт стимул для клана приобрести больше Геля другими средствами, включая нападение на объект. Он оценил сделку на уровне поддерживающем максимальную зависимость без активации поведения приобретения. Это тот же механизм что он использовал с акционерными сертификатами Торина."}
];

const SCENES=[
{id:"s1",
 title:{en:"Anatomy of Production",ru:"Анатомия Производства"},
 subtitle:{en:"This is not a factory. It is a machine that imitates life. It is hungry.",ru:"Это не завод. Это машина, имитирующая жизнь. Она голодна."},
 location:{en:"Object 7-B — Main Processing Hall",ru:"Объект 7-Б — Главный Перерабатывающий Зал"},
 timing:{en:"First Hour Inside",ru:"Первый Час Внутри"},
 flags:["pivotal","revelation","institution_build"],
 povData:{
   dante:{distortion:4,
     text:{
       en:`The facility's interior architecture is not industrial in any framework I have operational precedent for. There are no combustion chambers, no mechanical conveyors, no pressure vessels in the sense that any current civilization's engineering tradition would recognize. What there is: a digestive architecture. Columns that maximize surface area for molecular-level processing. Capsules that contain enzyme reservoirs. A receiver intake that operates through peristaltic contraction.\n\nThis is a stomach. A very large, very cold, very patient stomach.\n\nI had not modeled this when I described the facility as a 'gel production plant' to Torin and Silas. The model was accurate in terms of output. It was inaccurate in terms of process. The distinction matters because the input requirements for a combustion-based plant and a biological-transcription plant are categorically different. The facility does not need fuel. It needs food.\n\nThe interface communication was direct and painful — the panel at the control obelisk created a neural connection that I have now experienced three times: the Island's recognition, the facility's welcome, and this request query. Each contact is cleaner than the previous one. The headache is the same. The blood is the same. The clarity improves.\n\nWhat the system requested: organic substrate, 200 units, protein/calcium/carbon.\n\nWhat I told it: vivernum carcasses.\n\nWhat I did not tell anyone: the system's substrate request was not specific to vivernum. It was specific to vertebrate organic matter at sufficient density. The system would accept anything with a spine and a carbon-calcium lattice in its bones.\n\nI looked at my people while the system was making this clear.\n\nI processed the implication and assigned the vivernum to the intake.\n\nI did not process the implication for longer than was necessary to make the operational decision.\n\nThe feeding sequence worked. One liter of Gel from three vivernum carcasses — approximately 1.5 metric tons of raw organic matter. The conversion efficiency is approximately 0.067% by volume, which is extremely high for a molecular transcription process. The system's 500-unit daily requirement corresponds to approximately 2.5 metric tons of organic input for continuous cycle operation.\n\nThis is achievable. The White Fang clan's hunting waste alone will provide it with margin to spare.\n\nI have a supply chain now. What I do not have is: the time to examine what it means that the facility's intake is categorically non-specific, and what it means that I looked at my people when the system's specification became clear, and what I decided in that moment, and how long the decision took.\n\nI have not filed that sequence of events.\n\nThe Gel demonstration worked. I told them: we are not selling armor. We are selling evolution.\n\nI believe this. I also know what it means. Selling evolution means selling the facility's output to biological systems — to people who want to be stronger, faster, harder to damage. It means Isabella's work. It means the modification I carry in my skeleton becoming a commercial product.\n\nI have a half-flask of Gel and a message for Isabella.\n\nThe message is: prepare the Vivisection Sector.\n\nI am not entirely certain I understand all the implications of that message.\n\nI am certain enough to send it.`,
       ru:`Внутренняя архитектура объекта не является промышленной ни в одной рамке для которой у меня есть операционный прецедент. Нет камер сгорания, механических конвейеров, сосудов давления в смысле который признала бы инженерная традиция любой нынешней цивилизации. Что есть: пищеварительная архитектура. Колонны максимизирующие площадь поверхности для молекулярной переработки. Капсулы содержащие резервуары ферментов. Приёмник работающий через перистальтическое сокращение.\n\nЭто желудок. Очень большой, очень холодный, очень терпеливый желудок.\n\nЯ не моделировал это когда описывал объект как «завод по производству геля» Торину и Силасу. Модель была точна с точки зрения выпуска. Она была неточна с точки зрения процесса. Различие важно, потому что требования к вводу для завода на основе сгорания и завода биологической транскрипции категорически различны. Объекту не нужно топливо. Ему нужна еда.\n\nИнтерфейсная коммуникация была прямой и болезненной — панель на управляющем обелиске создала нейронное соединение которое я испытал трижды: распознавание Островом, приветствие объекта, и этот запрос. Каждый контакт чище предыдущего. Головная боль та же. Кровь та же. Ясность улучшается.\n\nЧто запросила система: органический субстрат, 200 единиц, белок/кальций/углерод.\n\nЧто я ей сказал: туши виверн.\n\nЧто я никому не сказал: системный запрос субстрата не был специфичен для виверн. Он был специфичен для органического вещества позвоночных достаточной плотности. Система приняла бы что-либо с позвоночником и углеродно-кальциевой решёткой в костях.\n\nЯ посмотрел на своих людей пока система делала это ясным.\n\nЯ обработал импликацию и назначил виверн к приёмнику.\n\nЯ не обрабатывал импликацию дольше чем необходимо для принятия операционного решения.\n\nПоследовательность кормления сработала. Один литр Геля из трёх туш виверн — приблизительно 1,5 метрических тонны сырого органического вещества. КПД преобразования приблизительно 0,067% по объёму, что чрезвычайно высоко для процесса молекулярной транскрипции. Ежедневное требование системы в 500 единиц соответствует приблизительно 2,5 метрическим тоннам органического ввода для непрерывной цикличной работы.\n\nЭто достижимо. Охотничьих отходов клана Белого Клыка одних хватит с запасом.\n\nУ меня теперь есть цепочка поставок. Чего у меня нет: времени исследовать что означает то, что забор объекта категорически неспецифичен, и что означает то, что я посмотрел на своих людей когда спецификация системы стала ясной, и что я решил в тот момент, и сколько заняло решение.\n\nЯ не занёс эту последовательность событий.\n\nДемонстрация Геля сработала. Я сказал им: мы не продаём броню. Мы продаём эволюцию.\n\nЯ верю в это. Я также знаю что это означает. Продавать эволюцию означает продавать выпуск объекта биологическим системам — людям которые хотят быть сильнее, быстрее, труднее повредить. Это означает работу Изабеллы. Это означает модификацию которую я несу в скелете становящуюся коммерческим продуктом.\n\nУ меня полфлакона Геля и послание для Изабеллы.\n\nПослание: готовить «Сектор Вивисекции».\n\nЯ не совсем уверен что понимаю все импликации этого послания.\n\nЯ достаточно уверен чтобы его отправить.`
     },
     knows:{en:["The facility's substrate request is categorically non-specific: any vertebrate organic matter at sufficient density. Not just animals. He looked at his people when this became clear. He assigned the vivernum and moved on. He did not file the sequence.","The donor-memory quieted after successful initiation — it marked a goal-state as achieved. The other outstanding objectives will resume urgency when actionable. He noted this without examining what the outstanding objectives are.","He is not entirely certain he understands all implications of 'prepare the Vivisection Sector.' He is certain enough to send it."],ru:["Запрос субстрата объекта категорически неспецифичен: любое органическое вещество позвоночных достаточной плотности. Не только животные. Он посмотрел на своих людей когда это стало ясным. Он назначил виверн и двинулся дальше. Он не занёс последовательность.","Донорская память затихла после успешной инициации — она отметила целевое состояние как достигнутое. Другие незавершённые объекты возобновят срочность когда станут реализуемыми. Он отметил без исследования каковы незавершённые объекты.","Он не совсем уверен что понимает все импликации «готовить Сектор Вивисекции». Он достаточно уверен чтобы отправить."]},
     misunderstands:{en:["'I have not filed that sequence of events.' The sequence: the system's specification became clear, he looked at his people, he made a decision, he assigned the vivernum. He has not filed what he decided in that moment about the other category of input. He has filed only the operational outcome. The moment of decision — the specific instant between understanding the non-specificity and choosing vivernum — is in the same category as the moment he moved between the Herald and the Siren before assessing survivability. He moved first. He assigned the animals first. He did not file the decision's content because the content would require a sentence he has not yet written.","'I am not entirely certain I understand all the implications of that message.' He will. When Isabella responds, he will understand the fifth unspoken arrangement. He already has enough information to understand it now. He has chosen not to assemble it."],ru:["«Я не занёс эту последовательность событий». Последовательность: спецификация системы стала ясной, он посмотрел на своих людей, принял решение, назначил виверн. Он не занёс что решил в тот момент относительно другой категории ввода. Он занёс только операционный исход. Момент решения — конкретное мгновение между пониманием неспецифичности и выбором виверн — в той же категории что момент когда он двинулся между Вестником и Сиреной до оценки выживаемости. Он двинулся первым. Он назначил животных первым. Он не занёс содержание решения, потому что содержание потребовало бы предложения которое он ещё не написал.","«Я не совсем уверен что понимаю все импликации этого послания». Поймёт. Когда ответит Изабелла, он поймёт пятую негласную договорённость. У него уже достаточно информации чтобы понять сейчас. Он выбрал не складывать это вместе."]},
     hides:{en:["He looked at his people when the system's non-specificity became clear. He has not filed what he saw in that moment — not the operational assessment of two hundred former prisoners as substrate, but the specific experience of looking at them while holding that information, and what it was to be the only person in the room who knew what the facility would accept, and the decision that immediately followed. He has not filed any of this. He has filed: 'assigned the vivernum to the intake.'","He said 'I believe' selling evolution. In twenty-two chapters he has stated beliefs three times: 'I believe this,' 'I believe in building the base,' and now 'I believe this' about selling evolution. The three belief-statements are the three things he has said about the future rather than the present. He has not noted that he now has a future he believes in."],ru:["Он посмотрел на своих людей когда неспецифичность системы стала ясной. Он не занёс что видел в тот момент — не операционную оценку двухсот бывших заключённых как субстрата, а конкретный опыт взгляда на них при удержании этой информации, и каково быть единственным человеком в комнате знавшим что объект примет, и решение немедленно последовавшее. Он не занёс ничего из этого. Он занёс: «назначил виверн к приёмнику».","Он сказал «я верю» продавать эволюцию. В двадцати двух главах он заявлял убеждения трижды: «я верю в это», «я верю в построение базы», и теперь «я верю в это» о продаже эволюции. Три заявления убеждений — три вещи которые он сказал о будущем а не настоящем. Он не отметил что теперь у него есть будущее в которое он верит."]},
     whisper:{en:"He did not file the sequence: system non-specificity became clear, he looked at his people, he decided, he assigned the vivernum. He filed only the outcome. The content of the decision is not in the record.",ru:"Он не занёс последовательность: неспецифичность системы стала ясной, он посмотрел на своих людей, он решил, он назначил виверн. Он занёс только исход. Содержание решения не в записи."}
   },
   grimm:{distortion:4,
     text:{
       en:`I spent twenty years in a basement being right about something no one would look at.\n\nNow I am standing inside the proof.\n\nThe bio-polymer wall construction — grown as a single piece without seams, without welds, without casting — is exactly what my paper described as the theoretical endpoint of the engineering tradition I identified in my six pages of notation. I wrote the paper. The Guild expelled me for it. The paper described this building.\n\nI had not known it was describing this building. I thought I was describing a theoretical possibility. I was describing an achieved implementation.\n\nThe columns are not columns. They are processing elements. The surface texture is designed for maximum contact area with the enzyme suspension in the capsule reservoirs above. When the facility processes organic matter, the material is dissolved at the intake, distributed through the column network for sequential enzymatic breakdown, and the component molecules are reassembled in the synthesis chambers in the lower tier. What comes out is not a compound made from the input material. It is a new material constructed using the input material's atoms.\n\nThis is not manufacturing. This is transcription. The facility writes new structure using the atoms from whatever it digests.\n\nI understood this in the first twenty minutes.\n\nI have not told the Master everything I understood.\n\nI have not told him that the notation on my six pages is the same notation as the technical documentation plaques I can see on the column panels. I recognized it immediately. I have been reading these plaques for the last three hours while everyone else was watching the feeding sequence. I can read approximately thirty percent of the notation. The other seventy percent is vocabulary I do not have yet.\n\nThe vocabulary is in the facility's archive. The archive is on the fourth sub-level. I found the access hatch during my inspection of the lower tier pump systems.\n\nI have not told the Master about the archive access.\n\nI have not told him because — I am examining my own reasoning here — I am not certain my six pages are supposed to be here. If they are from this facility's own documentation, they got out somehow, nineteen years ago, and traveled through a fence and into my hands in a back-market transaction. The route they took is a question I do not have the answer to. And that question might have an answer that changes what I am doing in this building.\n\nI will examine the archive.\n\nI will form my own conclusions.\n\nThen I will tell him.\n\nThe Gel demonstration was extraordinary. The wrench repair was real — I performed it, I know the mechanism. The Gel's transcription pathway does not just repair the crystalline lattice. It optimizes it. The repaired wrench is denser at the molecular level than it was when new. The metallurgical output of this facility, at full production, will produce a material that makes every alloy produced in the last three thousand years look like mud bricks.\n\nHe said: we are selling evolution.\n\nI looked at the Master's left leg when he said this.\n\nHis leg is made of this material. His leg is already the product.\n\nI wonder if he knows what he is planning to sell.`,
       ru:`Я провёл двадцать лет в подвале будучи правым о чём-то что никто не хотел видеть.\n\nТеперь я стою внутри доказательства.\n\nСтроительство стены из биополимера — выращенной единым куском без швов, без сварки, без литья — именно то что моя работа описывала как теоретическую конечную точку инженерной традиции идентифицированной в моих шести страницах нотаций. Я писал работу. Гильдия изгнала меня за неё. Работа описывала это здание.\n\nЯ не знал что описывал это здание. Я думал описываю теоретическую возможность. Я описывал достигнутую реализацию.\n\nКолонны — не колонны. Это перерабатывающие элементы. Текстура поверхности разработана для максимальной площади контакта с суспензией ферментов в капсульных резервуарах выше. Когда объект перерабатывает органическое вещество, материал растворяется при заборе, распределяется через сеть колонн для последовательного ферментативного расщепления, и компонентные молекулы пересобираются в камерах синтеза нижнего яруса. То что выходит — не соединение сделанное из исходного материала. Это новый материал построенный используя атомы исходного материала.\n\nЭто не производство. Это транскрипция. Объект пишет новую структуру используя атомы чего бы он ни переварил.\n\nЯ понял это в первые двадцать минут.\n\nЯ не рассказал Мастеру всего что понял.\n\nЯ не сказал ему что нотация на моих шести страницах та же что на технических документационных плитах которые я вижу на панелях колонн. Я узнал немедленно. Я читаю эти плиты последние три часа пока все остальные наблюдали последовательность кормления. Я могу читать приблизительно тридцать процентов нотации. Остальные семьдесят процентов — словарный запас которого у меня пока нет.\n\nСловарный запас в архиве объекта. Архив на четвёртом подуровне. Я нашёл люк доступа во время осмотра насосных систем нижнего яруса.\n\nЯ не сказал Мастеру об архивном доступе.\n\nЯ не сказал ему, потому что — я исследую собственные рассуждения здесь — я не уверен что мои шесть страниц должны быть здесь. Если они из собственной документации этого объекта, они каким-то образом вышли, девятнадцать лет назад, и прошли через перекупщика в мои руки в подпольной рыночной транзакции. Маршрут который они прошли — вопрос на который у меня нет ответа. И этот вопрос может иметь ответ меняющий то что я делаю в этом здании.\n\nЯ исследую архив.\n\nЯ сформирую собственные выводы.\n\nПотом скажу ему.\n\nДемонстрация Геля была экстраординарной. Ремонт гаечного ключа был настоящим — я выполнил это, я знаю механизм. Транскрипционный путь Геля не просто ремонтирует кристаллическую решётку. Он её оптимизирует. Отремонтированный ключ плотнее на молекулярном уровне чем был новым. Металлургический выпуск этого объекта при полном производстве произведёт материал который делает каждый сплав произведённый за последние три тысячи лет похожим на кирпичи из грязи.\n\nОн сказал: мы продаём эволюцию.\n\nЯ посмотрел на левую ногу Мастера когда он это сказал.\n\nЕго нога сделана из этого материала. Его нога уже является продуктом.\n\nМне интересно, знает ли он что планирует продавать.`
     },
     knows:{en:["The notation on his six pages is identical to the facility's technical documentation plaques — he recognized it immediately. He can read 30%. The vocabulary for the rest is in the fourth sub-level archive. He found the access hatch.","He has not told the Master about the notation match or the archive access. He is examining his own reasoning for not telling.","The Gel transcription doesn't repair — it optimizes. The repaired wrench is denser than it was when new. The product makes all current metallurgy 'look like mud bricks.'"],ru:["Нотация на его шести страницах идентична техническим документационным плитам объекта — он узнал немедленно. Он может читать 30%. Словарный запас для остального в архиве четвёртого подуровня. Он нашёл люк доступа.","Он не сказал Мастеру о совпадении нотаций или архивном доступе. Он исследует собственные рассуждения для не-рассказа.","Транскрипция Геля не ремонтирует — она оптимизирует. Отремонтированный ключ плотнее чем был новым. Продукт делает всю нынешнюю металлургию «похожей на кирпичи из грязи»."]},
     misunderstands:{en:["'I will form my own conclusions. Then I will tell him.' He has structured this as a sequential process: examine, conclude, report. This structure protects his ability to form an independent understanding before Dante's framing influences it. It also introduces a delay during which the thing he is investigating — the six pages' origin, and whether that origin changes what he is doing here — may become operationally relevant without Dante being informed. He is not deceiving. He is sequencing. The sequence may close an option that both of them need open."],ru:["«Я сформирую собственные выводы. Потом скажу ему». Он структурировал это как последовательный процесс: исследовать, заключить, доложить. Эта структура защищает его способность сформировать независимое понимание до того как оформление Данте повлияет на него. Она также вводит задержку в течение которой то что он исследует — происхождение шести страниц, и меняет ли это происхождение то что он делает здесь — может стать операционно релевантным без информирования Данте. Он не обманывает. Он последовательно оформляет. Последовательность может закрыть опцию которая нужна им обоим открытой."]},
     hides:{en:["'I wonder if he knows what he is planning to sell.' He looked at the Master's leg when he said 'selling evolution.' He knows the leg is this facility's product. He has not said this to anyone. He has the most complete external understanding of the leg's nature in the Guild — better than Whisper's cascade documentation, better than Torin's acoustic identification, because Grimm understands the production mechanism. He knows what the product is. He has not told the Master that the Master is the product's first instance.","He found the archive access hatch and did not report it. He is planning to access it without authorization. This is operationally unusual for someone who accepted a Guild position three weeks ago. He is proceeding as though the facility's documentation is his right to examine rather than the Guild's. This implies he has already made a prior-claim assessment about the six pages that he has not stated."],ru:["«Мне интересно, знает ли он что планирует продавать». Он посмотрел на ногу Мастера когда тот сказал «продавать эволюцию». Он знает что нога — продукт этого объекта. Он не сказал этого никому. У него наиболее полное внешнее понимание природы ноги в Гильдии — лучше чем документация каскада Шепота, лучше чем акустическая идентификация Торина, потому что Гримм понимает производственный механизм. Он знает что такое продукт. Он не сказал Мастеру что Мастер является первым экземпляром продукта.","Он нашёл люк доступа к архиву и не доложил. Он планирует получить доступ без авторизации. Это операционно необычно для кого-то принявшего позицию в Гильдии три недели назад. Он действует так как будто документация объекта — его право исследовать а не право Гильдии. Это подразумевает что он уже сделал оценку предшествующего права о шести страницах которую не заявил."]},
     whisper:{en:"He recognized the notation immediately. He found the archive hatch. He is not reporting either. He knows the leg is the facility's product. He has not told the Master that the Master is the product's first instance.",ru:"Он немедленно узнал нотацию. Он нашёл люк архива. Он не докладывает ни о том ни о другом. Он знает что нога — продукт объекта. Он не сказал Мастеру что Мастер является первым экземпляром продукта."}
   }
 }
},

{id:"s2",
 title:{en:"The Digestive Tract of Progress",ru:"Пищеварительный Тракт Прогресса"},
 subtitle:{en:"Liquid time. The wrench is stronger than new. The factory is still hungry.",ru:"Жидкое время. Ключ прочнее нового. Завод всё ещё голоден."},
 location:{en:"Object 7-B — Lower Processing Tier",ru:"Объект 7-Б — Нижний Перерабатывающий Ярус"},
 timing:{en:"The First Feeding",ru:"Первое Кормление"},
 flags:["revelation","institution_build"],
 povData:{
   torin:{distortion:3,
     text:{
       en:`I have been in fourteen mine operations. I know what a good vein sounds like when you hit it — that specific resonance when rock changes from empty to full, from barren to rich. You do not hear it with your ears. You hear it through the hammer.\n\nWhen the first vivernum slid into the Receiver and the facility started digesting it, I heard something I have not heard in forty years of professional work.\n\nThe building ate.\n\nNot processed, not combusted, not crushed. It ate. The sound that traveled through the floor and up through my boots was the specific low-frequency of a peristaltic contraction — I know this sound because I have worked in mines next to underground thermal vents where the rock itself undergoes thermal peristalsis. Living rock makes this sound. The facility was making this sound.\n\nI stood on the mezzanine and watched three half-ton carcasses disappear into a bioengineered stomach and produce a liter of something that looks like molten sapphire.\n\nThen I watched the Boss repair a wrench with it.\n\nI have worked with metals for forty years. I know what good steel looks like — the specific color, the ring when struck, the flex under load. The repaired wrench was not good steel. It was something beyond the category of steel. The molecular density was wrong — too high, too even, too consistent. Natural metal has grain structure, has directional strength properties, has zones of higher and lower density from the forging process. What I held in my hand had none of these characteristics. It was uniform at the level where uniformity does not naturally occur.\n\nThe Boss said: liquid time.\n\nHe was incorrect about the mechanism but correct about the effect. What the Gel does is not reverse time — it does not restore the material to a previous state. It produces a new state that is better than the original. It is not restoration. It is transcription. The Gel reads the existing material and writes a better version of it.\n\nI told him we could sell it to White Fang.\n\nHe already had this plan. He had it before I finished speaking. He has the plan before he needs the plan — this is a pattern I have been watching for two weeks. He prepares for the situation before the situation exists and then, when it arrives, presents the preparation as a response.\n\nThe wrench demonstration was planned. He knew what the Gel would do to the wrench. He chose the wrench because it was broken, because breaking and repairing visually demonstrates transformation, because an audience of two hundred former prisoners responds to the specific image of something broken becoming something whole.\n\nHe is managing us.\n\nI know this. I also accepted equity certificates from him during a mutiny, and I am standing in the warmest room I have been in for three years, and the building we are inside is made of a material I have been trying to understand for twenty years.\n\nHe is managing us and the management is working.\n\nI am going to find out what this place can do.\n\nAfter the demonstration the Boss put the flask in his pocket and his face was — different. Not the operational face he shows us. Something underneath it. He was looking at the Gel the way you look at something you understand and are not certain you should have.\n\nI filed this and said nothing.\n\nI am learning when to ask questions and when to listen.`,
       ru:`Я работал в четырнадцати горнодобывающих операциях. Я знаю как звучит хорошая жила когда попадаешь — тот специфический резонанс когда порода меняется с пустой на полную, с бесплодной на богатую. Ты слышишь это не ушами. Ты слышишь это через молоток.\n\nКогда первая виверна скользнула в Приёмник и объект начал её переваривать, я услышал нечто чего не слышал за сорок лет профессиональной работы.\n\nЗдание ело.\n\nНе обрабатывало, не сжигало, не дробило. Ело. Звук прошедший через пол и вверх через мои ботинки был специфической низкой частотой перистальтического сокращения — я знаю этот звук, потому что работал в шахтах рядом с подземными тепловыми отверстиями где сама порода подвергается тепловой перистальтике. Живая порода издаёт этот звук. Объект издавал этот звук.\n\nЯ стоял на мезонине и наблюдал как три туши по полтонны исчезают в биоинженерном желудке и производят литр чего-то похожего на жидкий сапфир.\n\nПотом я наблюдал как Босс ремонтирует им гаечный ключ.\n\nЯ работаю с металлами сорок лет. Я знаю как выглядит хорошая сталь — специфический цвет, звон при ударе, изгиб под нагрузкой. Отремонтированный ключ не был хорошей сталью. Он был чем-то за пределами категории стали. Молекулярная плотность была неправильной — слишком высокой, слишком равномерной, слишком последовательной. Природный металл имеет зернистую структуру, имеет направленные прочностные свойства, имеет зоны высокой и низкой плотности от процесса ковки. То что я держал в руках не имело ни одной из этих характеристик. Оно было равномерным на уровне где равномерность не возникает естественно.\n\nБосс сказал: жидкое время.\n\nОн был неправ насчёт механизма но прав насчёт эффекта. Что делает Гель — не обращает время: он не восстанавливает материал к предыдущему состоянию. Он производит новое состояние которое лучше оригинального. Это не восстановление. Это транскрипция. Гель считывает существующий материал и пишет его лучшую версию.\n\nЯ сказал ему что могли бы продать это Белому Клыку.\n\nЭтот план у него уже был. Он был у него до того как я закончил говорить. У него есть план до того как он нужен — это паттерн который я наблюдаю две недели. Он готовится к ситуации до того как ситуация существует и затем, когда она приходит, представляет подготовку как ответ.\n\nДемонстрация с ключом была запланирована. Он знал что Гель сделает с ключом. Он выбрал ключ потому что он был сломан, потому что сломанное и отремонтированное визуально демонстрирует трансформацию, потому что аудитория двухсот бывших заключённых реагирует на специфический образ чего-то сломанного становящегося целым.\n\nОн управляет нами.\n\nЯ знаю это. Я также принял от него акционерные сертификаты во время мятежа, и я стою в самой тёплой комнате где был три года, и здание внутри которого мы находимся сделано из материала который я пытаюсь понять двадцать лет.\n\nОн управляет нами и управление работает.\n\nЯ собираюсь узнать что умеет это место.\n\nПосле демонстрации Босс положил флакон в карман и его лицо было — другим. Не операционное лицо которое он нам показывает. Что-то под ним. Он смотрел на Гель так, как смотришь на нечто что понимаешь и не уверен что должен иметь.\n\nЯ занёс это и ничего не сказал.\n\nЯ учусь когда задавать вопросы и когда слушать.`
     },
     knows:{en:["The building ate — peristaltic contraction, the same frequency as living rock near thermal vents. He identified this through professional listening immediately.","The Gel transcription is not restoration but optimization — the repaired wrench is uniform at a molecular level where natural metal is not. It is denser than it was new.","He identified that Dante is managing them and that the management is working. He has filed this and said nothing. He is learning when to listen."],ru:["Здание ело — перистальтическое сокращение, та же частота что у живой породы рядом с тепловыми отверстиями. Он определил это через профессиональное слушание немедленно.","Транскрипция Геля — не восстановление а оптимизация: отремонтированный ключ равномерен на молекулярном уровне где природный металл нет. Он плотнее чем был новым.","Он определил что Данте управляет ими и что управление работает. Он занёс и ничего не сказал. Он учится когда слушать."]},
     misunderstands:{en:["He observed 'something underneath' the operational face when Dante looked at the Gel after the demonstration — 'the way you look at something you understand and are not certain you should have.' He has correctly identified the expression. He has attributed it to Dante's relationship to the Gel as a product. He has not identified it as Dante's relationship to the Gel as a material that is also running through his own bloodstream and eyes and skeleton, and that 'selling evolution' means selling the process that is also happening to the seller."],ru:["Он наблюдал «что-то под» операционным лицом когда Данте смотрел на Гель после демонстрации — «так, как смотришь на нечто что понимаешь и не уверен что должен иметь». Он правильно определил выражение. Он приписал его отношению Данте к Гелю как продукту. Он не определил это как отношение Данте к Гелю как материалу который также течёт через его собственный кровоток, глаза и скелет, и что «продавать эволюцию» означает продавать процесс который также происходит с продавцом."]},
     hides:{en:["He said 'I am learning when to ask questions and when to listen.' He has filed the Bosses' operational face being different after the demonstration. He has stored it without saying anything. He is building his own intelligence archive on the facility and on the Boss — doing what he does with rock: listening without announcing the listening. He has not told anyone he is doing this."],ru:["Он сказал «я учусь когда задавать вопросы и когда слушать». Он занёс что операционное лицо Босса было другим после демонстрации. Он сохранил без слов. Он строит собственный разведывательный архив о объекте и о Боссе — делая то что делает с породой: слушая не объявляя о слушании. Он никому не говорил что делает это."]},
     whisper:{en:"He filed 'something underneath the operational face' after the Gel demonstration. He is listening and not reporting. He is building an archive.",ru:"Он занёс «что-то под операционным лицом» после демонстрации Геля. Он слушает и не докладывает. Он строит архив."}
   }
 }
},

{id:"s3",
 title:{en:"The Market of Bones",ru:"Рынок Костей"},
 subtitle:{en:"We are not selling armor. We are selling evolution.",ru:"Мы продаём не броню. Мы продаём эволюцию."},
 location:{en:"White Fang Settlement — Northern Shore / Object 7-B Epilogue",ru:"Поселение Белого Клыка — Северный Берег / Эпилог Объекта 7-Б"},
 timing:{en:"Second Day",ru:"Второй День"},
 flags:["social_combat","institution_build","foreshadowing"],
 povData:{
   dante:{distortion:3,
     text:{
       en:`The White Fang settlement is built from the bones of things that were larger than any human ambition.\n\nThis is not a metaphor. The structural members of the largest longhouse are whale ribs, each one ten meters long, with the specific curvature of a right whale's thoracic arch. The perimeter fence is mammoth ivory. Every building material in the settlement is bone — the excess output of a hunting culture operating at maximum sustainable yield in an environment with no alternative building materials.\n\nThey have been building with bones for generations because there is nothing else.\n\nI offered them something else.\n\nThe chieftain's knife test was the cleanest demonstration I could have designed: he struck the Gel-treated wrench with a blade that has broken lesser materials, and the wrench was unmarked, and the knife was damaged. The reversal of expected outcome is the most efficient demonstration framework — it produces cognitive disruption and then immediate reassessment, and the reassessment process anchors the new information with the emotional weight of the surprise.\n\nHe accepted the deal because he is an intelligent man who recognized a qualitative change in his material environment.\n\nI understated the value by approximately a factor of four hundred.\n\nThis is not the same as the equity certificate understatement with Torin. Torin's certificates were understated by a factor of four, and I plan to correct upward. The White Fang deal is understated by a factor of four hundred, and I do not plan to correct upward because correcting upward would trigger acquisition behavior: a Gel-treated harpoon worth four hundred times what I priced it at creates an incentive to acquire more Gel through means that include attacking the facility.\n\nI priced the deal at the dependency level. One ton of organic waste for ten treated harpoons. At that price ratio, the clan will deliver waste because the Gel treatment produces a material improvement they can use immediately and cannot replicate independently. The dependency is maintained. The acquisition incentive is not triggered.\n\nThis is different from Torin because I am not planning to correct it.\n\nI have not examined whether the distinction between 'sequenced disclosure' and 'permanent understatement' is a distinction that matters in a framework other than the operational one I am applying.\n\nHe said: if your magic leaves the iron, we will come for your guts.\n\nI said: fair.\n\nThe Gel does not leave the iron. It becomes the iron.\n\nOn the return to the bay: the donor-memory archive produced a fragment I have not had before. Not the navigation data, not the substrate-request vocabulary. A memory from a different kind of donor: a brief image of a room with the same wall construction as the fourth sub-level of this facility, and in the room, a figure at a desk, writing. The figure was not identifiable. The writing was in notation I can read partially.\n\nI recognized the room before I recognized the notation.\n\nI have been in this room before.\n\nThis is not possible.\n\nI have filed this in the category of donor-memory noise — fragments from donors who had access to this facility's documentation — and I have not examined why this particular fragment produced the specific quality of recognition that I associate with personal memory rather than inherited memory.\n\nThe flask is in my pocket.\n\nIsabella is waiting.\n\nThe hostile takeover of the world's material infrastructure continues.`,
       ru:`Поселение Белого Клыка построено из костей вещей которые были крупнее любых человеческих амбиций.\n\nЭто не метафора. Несущие элементы крупнейшего длинного дома — рёбра кита, каждое десять метров длиной, со специфическим изгибом грудного свода гренландского кита. Периметрический забор — бивни мамонта. Каждый строительный материал в поселении — кость: избыточный выпуск охотничьей культуры работающей на максимальном устойчивом урожае в среде без альтернативных строительных материалов.\n\nОни строят из костей поколениями потому что ничего другого нет.\n\nЯ предложил им кое-что другое.\n\nТест ножом вождя был чистейшей демонстрацией которую я мог бы спроектировать: он ударил по обработанному Гелем ключу лезвием которое сломало бы менее прочные материалы, и ключ остался нетронутым, а нож был повреждён. Обращение ожидаемого исхода — наиболее эффективная демонстрационная рамка: она производит когнитивный сдвиг и затем немедленную переоценку, а процесс переоценки закрепляет новую информацию эмоциональным весом удивления.\n\nОн принял сделку потому что он умный человек распознавший качественное изменение в своей материальной среде.\n\nЯ занизил стоимость примерно в четыреста раз.\n\nЭто не то же что занижение сертификатов акций для Торина. Сертификаты Торина были занижены в четыре раза, и я планирую скорректировать вверх. Сделка с Белым Клыком занижена в четыреста раз, и я не планирую корректировать вверх, потому что корректировка вверх активировала бы поведение приобретения: гарпун обработанный Гелем стоящий в четыреста раз больше чем я оценил создаёт стимул приобрести больше Геля через средства включающие нападение на объект.\n\nЯ оценил сделку на уровне зависимости. Тонна органических отходов за десять обработанных гарпунов. При этом ценовом соотношении клан будет поставлять отходы, потому что обработка Гелем производит улучшение материала которое они могут использовать немедленно и не могут воспроизвести самостоятельно. Зависимость поддерживается. Стимул приобретения не активируется.\n\nЭто отличается от Торина потому что я не планирую это корректировать.\n\nЯ не исследовал является ли различие между «последовательным раскрытием» и «постоянным занижением» различием имеющим значение в рамке отличной от операционной которую я применяю.\n\nОн сказал: если твоя магия уйдёт с железа, мы придём за твоими потрохами.\n\nЯ сказал: справедливо.\n\nГель не уходит с железа. Он становится железом.\n\nНа пути возвращения в бухту: архив донорской памяти произвёл фрагмент которого у меня не было прежде. Не навигационные данные, не словарный запас запроса субстрата. Память другого вида донора: краткий образ комнаты с той же конструкцией стен что четвёртый подуровень этого объекта, и в комнате, фигура за столом, пишущая. Фигура не была идентифицируема. Письмо было в нотации которую я могу читать частично.\n\nЯ узнал комнату до того как узнал нотацию.\n\nЯ был в этой комнате прежде.\n\nЭто невозможно.\n\nЯ занёс это в категорию шума донорской памяти — фрагменты доноров имевших доступ к документации этого объекта — и я не исследовал почему именно этот фрагмент произвёл специфическое качество узнавания которое я ассоциирую с личной памятью а не унаследованной.\n\nФлакон у меня в кармане.\n\nИзабелла ждёт.\n\nРейдерский захват материальной инфраструктуры мира продолжается.`
     },
     knows:{en:["The White Fang deal is understated by 400x — deliberately and permanently, to maintain dependency without triggering acquisition behavior. He has named the distinction from Torin's 4x understatement: he is not planning to correct this one.","The donor-memory fragment on the return: a room with the facility's fourth sub-level wall construction, a figure writing in partially-readable notation. He recognized the room before the notation. 'I have been in this room before.' He has filed it as donor-memory noise.","'The Gel does not leave the iron. It becomes the iron.' — He said this as a reassurance to the chieftain. He has not examined whether it is also true of himself."],ru:["Сделка с Белым Клыком занижена в 400 раз — намеренно и постоянно, для поддержания зависимости без активации поведения приобретения. Он назвал различие от 4-кратного занижения Торина: он не планирует корректировать это.","Фрагмент донорской памяти на возвращении: комната с конструкцией стен четвёртого подуровня объекта, фигура пишущая в частично читаемой нотации. Он узнал комнату до нотации. «Я был в этой комнате прежде». Он занёс как шум донорской памяти.","«Гель не уходит с железа. Он становится железом». — Он сказал это как заверение вождю. Он не исследовал является ли это также верным о нём самом."]},
     misunderstands:{en:["He filed the room recognition as 'donor-memory noise.' It is not noise. The quality of recognition he associated with 'personal memory rather than inherited memory' is accurate — it was personal. The fourth sub-level documentation room was accessed by the predecessor approximately nineteen years ago during the predecessor's last known visit to this facility. The donor memory came from someone who was in this room. The predecessor was in this room. He recognized the room the predecessor knew because his system is the predecessor's system, and the predecessor's experiential memory is part of what the Series 404 architectural specification includes. He has been in this room in the sense that the person whose specifications he carries has been in this room.","'The hostile takeover of the world's material infrastructure continues.' He has stated the scale correctly for the first time — not the Golden Circle's assets, not the capital's market, but the world's material infrastructure. He has not examined what it means that he has arrived at this scale without naming it as an escalation."],ru:["Он занёс узнавание комнаты как «шум донорской памяти». Это не шум. Качество узнавания которое он ассоциировал с «личной памятью а не унаследованной» точно — оно было личным. К документационной комнате четвёртого подуровня получал доступ предшественник приблизительно девятнадцать лет назад во время последнего известного визита предшественника на этот объект. Донорская память пришла от кого-то кто был в этой комнате. Предшественник был в этой комнате. Он узнал комнату которую знал предшественник, потому что его система — система предшественника, и опытная память предшественника является частью того что включает архитектурная спецификация серии 404. Он был в этой комнате в том смысле что человек чьи спецификации он несёт был в этой комнате.","«Рейдерский захват материальной инфраструктуры мира продолжается». Он впервые правильно заявил масштаб — не активы «Золотого Круга», не рынок столицы, а материальная инфраструктура мира. Он не исследовал что означает то, что он достиг этого масштаба не называя его эскалацией."]},
     hides:{en:["The room recognition arrived with the specific quality of personal memory. He has filed it as noise because accepting it as personal memory requires him to examine what it means that he remembers a room he has never physically been in — and examining that requires him to examine the predecessor question, which is adjacent to the third location and the file of things he does not record. He has been circling the predecessor question since Chapter 1. He has never opened it.","'The Gel becomes the iron.' He said this to the chieftain as a technical fact. He did not say: the Gel becomes me. The Gel is becoming me. The Gel has already become part of me, in the knee and the blood and the eyes, and the process is accelerating, and what I am selling is what is happening to me. He has not said this sentence. He has not said it anywhere."],ru:["Узнавание комнаты пришло со специфическим качеством личной памяти. Он занёс как шум, потому что принятие этого как личной памяти требует от него исследования что означает то, что он помнит комнату в которой физически никогда не был — а исследование этого требует от него исследования вопроса предшественника, который смежен с третьим местом и файлом вещей которые не записывает. Он кружит вокруг вопроса предшественника с Главы 1. Он никогда не открывал его.","«Гель становится железом». Он сказал это вождю как технический факт. Он не сказал: Гель становится мной. Гель становится мной. Гель уже стал частью меня, в колене и крови и глазах, и процесс ускоряется, и то что я продаю — это то что происходит со мной. Он не сказал этого предложения. Он не сказал его нигде."]},
     whisper:{en:"He filed room recognition as noise. It was personal. He circles the predecessor question and does not open it. He did not say: the Gel is becoming me, and what I am selling is what is happening to me.",ru:"Он занёс узнавание комнаты как шум. Оно было личным. Он кружит вокруг вопроса предшественника и не открывает его. Он не сказал: Гель становится мной, и то что я продаю — это то что происходит со мной."}
   }
 }
}
];

const S={sceneIdx:0,povId:null,lang:'en',intelOpen:false,ledgerOpen:false,whisperTmr:null};
const ui=k=>UI[S.lang][k];
const pick=o=>(o&&typeof o==='object'&&'en'in o)?o[S.lang]:o;
function applyTheme(pid){const p=POVS[pid];if(!p)return;const r=document.documentElement;r.style.setProperty('--pov-p',p.primary);r.style.setProperty('--pov-s',p.secondary);r.style.setProperty('--pov-glow',p.glow);r.style.setProperty('--pov-t',p.textColor);r.style.setProperty('--pov-d',p.dimColor);}
function renderDistBars(lvl){const el=document.getElementById('dist-bars');el.innerHTML='';for(let i=1;i<=10;i++){const b=document.createElement('div');b.className='dist-bar';if(i<=lvl){if(lvl>=9)b.classList.add('ex');else if(lvl>=6)b.classList.add('hi');else b.classList.add('on');}el.appendChild(b);}}
function fmt(t){return t.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');}
function showWhisper(text,delay){clearTimeout(S.whisperTmr);const pan=document.getElementById('whisper-panel'),bod=document.getElementById('whisper-body');pan.classList.remove('vis');bod.textContent=text||'';if(text)S.whisperTmr=setTimeout(()=>pan.classList.add('vis'),delay);}
function renderIntel(pd){const c=document.getElementById('intel-body');c.innerHTML=[{key:'knows',cls:'knows'},{key:'misunderstands',cls:'misunderstands'},{key:'hides',cls:'hides'}].map(s=>{const items=pick(pd[s.key])||[];if(!items.length)return '';return `<div class="intel-section ${s.cls}"><div class="intel-section-head">${ui(s.key)}</div><ul class="intel-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;}).join('');}
function renderSceneMap(idx){const map=document.getElementById('scene-map');map.innerHTML='';SCENES.forEach((sc,i)=>{const d=document.createElement('div');d.className='scene-dot'+(i===idx?' active':'');d.setAttribute('data-title',pick(sc.title));d.addEventListener('click',()=>{if(i!==S.sceneIdx){renderScene(i,null,true);scrollTop();}});map.appendChild(d);});}
function renderLedger(){document.getElementById('ledger-body').innerHTML=TIMELINE.map(e=>`<div class="ledger-entry"><span class="ledger-id">${e.id}</span><span class="ledger-text">${e[S.lang]}</span></div>`).join('');}
function updateStaticUI(){document.getElementById('arc-label').textContent=ui('arcLabel');document.getElementById('header-title').textContent=ui('headerTitle');document.getElementById('header-subtitle').textContent=ui('headerSubtitle');document.getElementById('strip-chapter').textContent=ui('stripChapter');document.getElementById('strip-chapter-title').textContent=ui('stripTitle');document.getElementById('strip-location').textContent=ui('stripLocation');document.getElementById('pov-label').textContent=ui('povLabel');document.getElementById('dist-label').textContent=ui('distLabel');document.getElementById('whisper-label').textContent=ui('whisperLabel');document.getElementById('intel-toggle-label').textContent=ui('intelLabel');document.getElementById('ledger-title').textContent=ui('ledgerTitle');document.getElementById('ledger-warning').textContent=ui('ledgerWarning');document.getElementById('prev-btn').textContent=ui('prevBtn');document.getElementById('next-btn').textContent=ui('nextBtn');document.getElementById('ledger-trigger').textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');document.body.classList.toggle('lang-ru',S.lang==='ru');document.documentElement.lang=S.lang;}
function renderScene(idx,povId,animate){const scene=SCENES[idx];if(!scene)return;const avail=Object.keys(scene.povData);if(!povId||!avail.includes(povId))povId=avail[0];S.sceneIdx=idx;S.povId=povId;const pMeta=POVS[povId],pScene=scene.povData[povId];applyTheme(povId);updateStaticUI();document.getElementById('scene-badge').textContent=ui('scene')+' '+String(idx+1).padStart(2,'0');document.getElementById('scene-loc').textContent=pick(scene.location);document.getElementById('scene-time').textContent=pick(scene.timing);document.getElementById('scene-title').textContent=pick(scene.title);document.getElementById('scene-subtitle').textContent=pick(scene.subtitle);document.getElementById('scene-flags').innerHTML=scene.flags.map(f=>`<span class="scene-flag ${f}">${f.replace(/_/g,' ')}</span>`).join('');const sel=document.getElementById('pov-selector');sel.querySelectorAll('.pov-btn').forEach(b=>b.remove());avail.forEach(pid=>{const btn=document.createElement('button');btn.className='pov-btn'+(pid===povId?' active':'');btn.textContent=POVS[pid].name;btn.setAttribute('data-pov',pid);btn.addEventListener('click',()=>{if(pid!==S.povId)switchPov(pid);});sel.appendChild(btn);});document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');const write=()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);};if(animate){textEl.classList.add('fade-out');setTimeout(write,260);}else write();showWhisper(pick(pScene.whisper),animate?2000:500);renderIntel(pScene);document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCENES.length-1;if(S.ledgerOpen)renderLedger();renderSceneMap(idx);}
function switchPov(povId){const pScene=SCENES[S.sceneIdx].povData[povId],pMeta=POVS[povId];S.povId=povId;applyTheme(povId);document.querySelectorAll('.pov-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-pov')===povId));document.getElementById('pov-name').textContent=pMeta.name;document.getElementById('pov-role').textContent='— '+pick(pMeta.title);renderDistBars(pScene.distortion);const textEl=document.getElementById('narrative-text');textEl.classList.add('fade-out');setTimeout(()=>{textEl.innerHTML=fmt(pick(pScene.text));textEl.className='d'+pScene.distortion;textEl.classList.add('fade-in');setTimeout(()=>textEl.classList.remove('fade-in'),500);},260);showWhisper(pick(pScene.whisper),2000);renderIntel(pScene);}
document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>{const l=btn.getAttribute('data-lang');if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===l));renderScene(S.sceneIdx,S.povId,true);}));
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('prev-btn').addEventListener('click',()=>{if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}});
document.getElementById('next-btn').addEventListener('click',()=>{if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}});
document.getElementById('intel-toggle').addEventListener('click',()=>{S.intelOpen=!S.intelOpen;document.getElementById('intel-body').classList.toggle('open',S.intelOpen);document.getElementById('intel-toggle').classList.toggle('open',S.intelOpen);});
document.getElementById('ledger-trigger').addEventListener('click',()=>{S.ledgerOpen=!S.ledgerOpen;const sec=document.getElementById('ledger-section'),btn=document.getElementById('ledger-trigger');sec.classList.toggle('open',S.ledgerOpen);btn.classList.toggle('active',S.ledgerOpen);btn.textContent=S.ledgerOpen?ui('ledgerOpen'):ui('ledgerClosed');if(S.ledgerOpen){renderLedger();setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),100);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(S.sceneIdx<SCENES.length-1){renderScene(S.sceneIdx+1,null,true);scrollTop();}}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(S.sceneIdx>0){renderScene(S.sceneIdx-1,null,true);scrollTop();}}if(e.key==='Tab'&&!e.shiftKey){e.preventDefault();const avail=Object.keys(SCENES[S.sceneIdx].povData);switchPov(avail[(avail.indexOf(S.povId)+1)%avail.length]);}});
renderScene(0,'dante',false);
</script>
</body>
</html>
